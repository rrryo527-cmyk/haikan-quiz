<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建築設備 知識クイズ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@600;700&display=swap');

  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #f7f8fa;
    --border: #d0d7de;
    --accent: #e67e00;
    --accent2: #c05500;
    --text: #1f2328;
    --text-muted: #656d76;
    --correct: #1a7f37;
    --correct-bg: #dafbe1;
    --wrong: #cf222e;
    --wrong-bg: #ffebe9;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(90deg, transparent 49.5%, #dce3ea 49.5%, #dce3ea 50.5%, transparent 50.5%),
      linear-gradient(0deg, transparent 49.5%, #dce3ea 49.5%, #dce3ea 50.5%, transparent 50.5%);
    background-size: 80px 80px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .container { width: 100%; max-width: 760px; position: relative; z-index: 1; }

  .header { text-align: center; padding: 28px 0 20px; }
  .header-label { font-family: 'Oswald', sans-serif; font-size: 11px; letter-spacing: 4px; color: var(--accent); text-transform: uppercase; margin-bottom: 8px; }
  .header h1 { font-weight: 900; font-size: 26px; color: var(--text); line-height: 1.2; }
  .header h1 span { color: var(--accent); }

  #startScreen { text-align: center; padding: 30px 0; }

  .start-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 32px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .start-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 16px; color: var(--accent); }
  .start-card p { color: var(--text-muted); font-size: 14px; line-height: 1.8; margin-bottom: 8px; }

  .genre-selector { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 12px 0 20px; }
  .genre-btn { background: var(--surface2); border: 2px solid var(--border); color: var(--text-muted); padding: 10px 14px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit; transition: all 0.2s; flex: 1; min-width: 90px; text-align: center; line-height: 1.4; }
  .genre-btn:hover { border-color: var(--accent); color: var(--accent); }
  .genre-btn.selected { border-color: var(--accent); color: #fff; background: var(--accent); }
  .genre-btn .genre-icon { display: block; font-size: 22px; margin-bottom: 4px; }
  .genre-btn .genre-count { display: block; font-size: 10px; font-weight: 400; opacity: 0.8; margin-top: 2px; }

  .count-selector { display: flex; gap: 10px; justify-content: center; margin: 16px 0 24px; flex-wrap: wrap; }
  .count-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit; transition: all 0.2s; }
  .count-btn:hover, .count-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(230,126,0,0.08); }

  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-weight: 700; font-size: 16px; padding: 14px 48px; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; transition: all 0.2s; letter-spacing: 1px; }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(230,126,0,0.3); }
  .btn-secondary { background: transparent; color: var(--text-muted); font-size: 14px; padding: 10px 24px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; font-family: inherit; transition: all 0.2s; margin-top: 12px; }
  .btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }

  #quizScreen { display: none; }

  .progress-bar-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .progress-info { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
  .progress-info strong { color: var(--accent); font-size: 18px; }
  .bar-bg { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width 0.4s ease; }
  .score-display { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
  .score-display strong { color: var(--correct); }

  .genre-badge { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 700; white-space: nowrap; }
  .genre-0 { background: rgba(30,120,190,0.1); color: #1a6fb5; border: 1px solid rgba(30,120,190,0.3); }
  .genre-1 { background: rgba(220,60,60,0.1); color: #c03030; border: 1px solid rgba(220,60,60,0.3); }
  .genre-2 { background: rgba(40,160,80,0.1); color: #28803c; border: 1px solid rgba(40,160,80,0.3); }
  .genre-3 { background: rgba(160,60,160,0.1); color: #9c3c9c; border: 1px solid rgba(160,60,160,0.3); }

  .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: relative; }
  .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .q-difficulty { font-size: 11px; color: var(--text-muted); margin-left: auto; }

  .question-image { margin-bottom: 14px; text-align: center; display: none; }
  .question-image img { max-width: 100%; max-height: 260px; border-radius: 8px; border: 1px solid var(--border); object-fit: contain; background: #f9f9f9; }
  .question-image.show { display: block; }

  .question-text { font-size: 19px; font-weight: 700; line-height: 1.7; color: var(--text); }

  .result-badge { display: none; font-size: 20px; font-weight: 900; padding: 10px 20px; border-radius: 8px; text-align: center; margin-top: 16px; letter-spacing: 2px; }
  .result-badge.show { display: block; }
  .result-badge.correct { background: var(--correct-bg); color: var(--correct); border: 2px solid var(--correct); }
  .result-badge.wrong { background: var(--wrong-bg); color: var(--wrong); border: 2px solid var(--wrong); }

  .hint-area { margin-top: 12px; }
  .hint-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--accent); padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.2s; }
  .hint-btn:hover { background: rgba(230,126,0,0.08); border-color: var(--accent); }
  .hint-btn:disabled { cursor: default; opacity: 0.5; }
  .hint-text { background: #fff8ed; border: 1px solid #f0d9a8; border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 10px 14px; font-size: 13px; line-height: 1.7; color: #7a5c00; margin-top: 8px; display: none; }
  .hint-text.show { display: block; }

  .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .option-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 14px 18px; border-radius: 10px; cursor: pointer; font-size: 16px; font-family: inherit; text-align: left; transition: all 0.15s; display: flex; align-items: center; gap: 12px; line-height: 1.5; }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(230,126,0,0.08); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .option-label { width: 28px; height: 28px; min-width: 28px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; font-family: 'Oswald', sans-serif; }
  .option-btn.correct { border-color: var(--correct); background: var(--correct-bg); color: #1a7f37; }
  .option-btn.correct .option-label { background: var(--correct); border-color: var(--correct); color: #fff; }
  .option-btn.wrong { border-color: var(--wrong); background: var(--wrong-bg); color: #cf222e; }
  .option-btn.wrong .option-label { background: var(--wrong); border-color: var(--wrong); color: #fff; }
  .option-btn:disabled { cursor: default; }

  .option-explanation { font-size: 13px; line-height: 1.6; padding: 4px 12px 8px 58px; display: none; }
  .option-explanation.show { display: block; }
  .option-explanation.correct-exp { color: var(--correct); }
  .option-explanation.wrong-exp { color: #8b6914; }

  .explanation { background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 14px 18px; font-size: 15px; line-height: 1.8; color: var(--text-muted); margin-bottom: 14px; display: none; }
  .explanation.show { display: block; }
  .explanation strong { color: var(--text); }

  .nav-btn { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-weight: 700; font-size: 15px; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; transition: all 0.2s; display: none; }
  .nav-btn.show { display: block; }
  .nav-btn:hover { opacity: 0.9; }

  #resultScreen { display: none; text-align: center; padding: 30px 0; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 36px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .result-score { font-size: 72px; font-weight: 900; color: var(--accent); line-height: 1; margin: 14px 0 6px; font-family: 'Oswald', sans-serif; }
  .result-total { font-size: 16px; color: var(--text-muted); margin-bottom: 20px; }
  .result-rank { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
  .result-breakdown { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin: 20px 0; }
  .breakdown-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 8px; font-size: 12px; color: var(--text-muted); }
  .breakdown-item .val { font-size: 20px; font-weight: 700; color: var(--text); display: block; margin-bottom: 4px; font-family: 'Oswald', sans-serif; }

  /* 用語辞典 */
  #glossaryScreen { display: none; padding: 20px 0; }
  .glossary-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .glossary-header h2 { font-size: 20px; font-weight: 700; color: var(--accent); }
  .glossary-back { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 13px; }
  .glossary-back:hover { border-color: var(--accent); color: var(--accent); }
  .glossary-search { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; font-family: inherit; margin-bottom: 12px; background: var(--surface); color: var(--text); }
  .glossary-search:focus { outline: none; border-color: var(--accent); }
  .glossary-cats { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .glossary-cat-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.2s; }
  .glossary-cat-btn:hover, .glossary-cat-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(230,126,0,0.08); }
  .glossary-list { display: flex; flex-direction: column; gap: 8px; }
  .glossary-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .glossary-item-header { padding: 14px 18px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-weight: 700; font-size: 15px; color: var(--text); transition: background 0.15s; }
  .glossary-item-header:hover { background: var(--surface2); }
  .glossary-item-header .arrow { color: var(--text-muted); font-size: 12px; transition: transform 0.2s; }
  .glossary-item-header .arrow.open { transform: rotate(90deg); }
  .glossary-item-body { display: none; padding: 0 18px 16px; font-size: 14px; line-height: 1.8; color: var(--text-muted); border-top: 1px solid var(--border); }
  .glossary-item-body.show { display: block; padding-top: 12px; }
  .glossary-item-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
  .glossary-empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }

  @media (max-width: 600px) {
    body { padding: 10px; }
    .header h1 { font-size: 22px; }
    .question-text { font-size: 17px; }
    .option-btn { font-size: 15px; padding: 12px 14px; }
    .option-explanation { padding-left: 42px; }
    .result-breakdown { grid-template-columns: 1fr 1fr; }
    .question-card { padding: 18px; }
    .start-card { padding: 20px; }
    .result-badge { font-size: 18px; }
    .genre-btn { min-width: 70px; font-size: 11px; padding: 8px 6px; }
    .genre-btn .genre-icon { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-label">建築設備 トレーニング</div>
    <h1>建築設備<span>知識クイズ</span></h1>
  </div>

  <div id="startScreen">
    <div class="start-card">
      <h2>🔧 ジャンルを選んでください</h2>
      <div class="genre-selector" id="genreSelector">
        <button class="genre-btn selected" data-genre="0"><span class="genre-icon">🔧</span>配管工事<span class="genre-count" id="genreCount0"></span></button>
        <button class="genre-btn" data-genre="1"><span class="genre-icon">🧯</span>消防設備点検<span class="genre-count" id="genreCount1"></span></button>
        <button class="genre-btn" data-genre="2"><span class="genre-icon">💧</span>貯水槽清掃<span class="genre-count" id="genreCount2"></span></button>
        <button class="genre-btn" data-genre="3"><span class="genre-icon">🚿</span>排水管清掃<span class="genre-count" id="genreCount3"></span></button>
        <button class="genre-btn" data-genre="-1"><span class="genre-icon">🎲</span>全ジャンル<span class="genre-count" id="genreCountAll"></span></button>
      </div>
      <p>出題数を選んでスタートしてください。</p>
      <div class="count-selector">
        <button class="count-btn selected" data-count="10">10問</button>
        <button class="count-btn" data-count="20">20問</button>
        <button class="count-btn" data-count="30">30問</button>
        <button class="count-btn" data-count="50">50問</button>
        <button class="count-btn" data-count="9999">全問</button>
      </div>
      <button class="btn-primary" id="startBtn">クイズを始める</button><br>
      <button class="btn-secondary" id="glossaryBtn">📖 用語辞典を開く</button>
    </div>
  </div>

  <!-- 用語辞典画面 -->
  <div id="glossaryScreen">
    <div class="glossary-header">
      <button class="glossary-back" id="glossaryBack">← 戻る</button>
      <h2>📖 用語辞典</h2>
    </div>
    <input type="text" class="glossary-search" id="glossarySearch" placeholder="🔍 用語を検索...">
    <div class="glossary-cats" id="glossaryCats"></div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>

  <div id="quizScreen">
    <div class="progress-bar-wrap">
      <div class="progress-info"><strong id="qNum">1</strong> / <span id="qTotal">10</span></div>
      <div class="bar-bg"><div class="bar-fill" id="progressBar" style="width:0%"></div></div>
      <div class="score-display">正解 <strong id="scoreCount">0</strong></div>
    </div>
    <div class="question-card">
      <div class="q-meta">
        <span class="genre-badge" id="qGenre">配管工事</span>
        <span class="q-difficulty" id="qDifficulty">★☆☆</span>
      </div>
      <div class="question-image" id="questionImage"><img id="questionImg" src="" alt="問題画像"></div>
      <div class="question-text" id="questionText"></div>
      <div class="hint-area">
        <button class="hint-btn" id="hintBtn">💡 ヒントを見る</button>
        <div class="hint-text" id="hintText"></div>
      </div>
      <div class="result-badge" id="resultBadge"></div>
    </div>
    <div class="options" id="optionsContainer"></div>
    <div class="explanation" id="explanation"></div>
    <button class="nav-btn" id="nextBtn">次の問題へ →</button>
  </div>

  <div id="resultScreen">
    <div class="result-card">
      <div class="header-label">結果発表</div>
      <div class="result-score" id="finalScore">0</div>
      <div class="result-total" id="finalTotal">/ 10問中正解</div>
      <div class="result-rank" id="finalRank"></div>
      <div class="result-breakdown" id="resultBreakdown"></div>
    </div>
    <button class="btn-primary" id="retryBtn">もう一度挑戦する</button><br>
    <button class="btn-secondary" id="backBtn">ジャンル選択に戻る</button>
  </div>
</div>

let questions=[],currentIdx=0,score=0,answered=false,selectedCount=10,selectedGenre=0,genreStats={};
const optLabels=['A','B','C','D'];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function updateGenreCounts(){GENRES.forEach((g,i)=>{const c=ALL_QUESTIONS.filter(q=>q.genre===i).length;const e=document.getElementById('genreCount'+i);if(e)e.textContent=c+'問';});const e=document.getElementById('genreCountAll');if(e)e.textContent=ALL_QUESTIONS.length+'問';}

function getHint(q){if(q.h)return q.h;const f=q.ex.split('。')[0];let h=f;const ct=q.o[q.a];if(ct&&h.includes(ct))h=h.replace(ct,'○○○');if(h.length>50)h=h.substring(0,50)+'…';else h+='。';return h;}

function startQuiz(genre,count){let pool=genre===-1?[...ALL_QUESTIONS]:ALL_QUESTIONS.filter(q=>q.genre===genre);questions=shuffle(pool).slice(0,count);currentIdx=0;score=0;genreStats={};GENRES.forEach((_,i)=>{genreStats[i]={c:0,t:0};});document.getElementById('startScreen').style.display='none';document.getElementById('resultScreen').style.display='none';document.getElementById('quizScreen').style.display='block';document.getElementById('qTotal').textContent=questions.length;showQuestion();}

function showQuestion(){const q=questions[currentIdx];answered=false;document.getElementById('qNum').textContent=currentIdx+1;document.getElementById('progressBar').style.width=(currentIdx/questions.length*100)+'%';document.getElementById('scoreCount').textContent=score;const ge=document.getElementById('qGenre');ge.textContent=GENRES[q.genre].icon+' '+GENRES[q.genre].name;ge.className='genre-badge '+GENRES[q.genre].cls;document.getElementById('qDifficulty').textContent='★'.repeat(q.d)+'☆'.repeat(3-q.d);document.getElementById('questionText').textContent=q.q;const ia=document.getElementById('questionImage'),ie=document.getElementById('questionImg');if(q.img){ie.src=q.img;ie.onerror=function(){ia.className='question-image';};ia.className='question-image show';}else{ie.src='';ia.className='question-image';}document.getElementById('resultBadge').className='result-badge';document.getElementById('resultBadge').textContent='';const hb=document.getElementById('hintBtn'),ht=document.getElementById('hintText');hb.disabled=false;hb.textContent='💡 ヒントを見る';ht.className='hint-text';ht.innerHTML='';document.querySelectorAll('.option-explanation').forEach(el=>el.remove());const opts=document.getElementById('optionsContainer');opts.innerHTML='';q.o.forEach((text,i)=>{const btn=document.createElement('button');btn.className='option-btn';btn.innerHTML=`<span class="option-label">${optLabels[i]}</span><span>${text}</span>`;btn.addEventListener('click',()=>selectAnswer(i,q));opts.appendChild(btn);});document.getElementById('explanation').className='explanation';document.getElementById('explanation').innerHTML='';document.getElementById('nextBtn').className='nav-btn';}

function selectAnswer(ci,q){if(answered)return;answered=true;const btns=document.querySelectorAll('.option-btn');const ok=(ci===q.a);if(genreStats[q.genre])genreStats[q.genre].t++;const badge=document.getElementById('resultBadge');if(ok){score++;if(genreStats[q.genre])genreStats[q.genre].c++;btns[ci].classList.add('correct');badge.textContent='⭕ 正解！';badge.className='result-badge correct show';}else{btns[ci].classList.add('wrong');btns[q.a].classList.add('correct');badge.textContent='❌ 不正解';badge.className='result-badge wrong show';}btns.forEach(b=>b.disabled=true);if(q.oex&&q.oex.length===q.o.length){const oc=document.getElementById('optionsContainer');oc.querySelectorAll('.option-btn').forEach((btn,i)=>{const d=document.createElement('div');d.className='option-explanation show '+(i===q.a?'correct-exp':'wrong-exp');d.textContent=(i===q.a?'✓ ':'✗ ')+q.oex[i];btn.after(d);});}const expEl=document.getElementById('explanation');expEl.innerHTML='<strong>📌 解説：</strong>'+q.ex;expEl.classList.add('show');document.getElementById('nextBtn').classList.add('show');document.getElementById('scoreCount').textContent=score;}

document.getElementById('hintBtn').addEventListener('click',()=>{const q=questions[currentIdx];const ht=document.getElementById('hintText'),hb=document.getElementById('hintBtn');ht.innerHTML='💡 '+getHint(q);ht.classList.add('show');hb.disabled=true;hb.textContent='ヒント表示済み';});
document.getElementById('nextBtn').addEventListener('click',()=>{currentIdx++;if(currentIdx>=questions.length)showResult();else showQuestion();});

function showResult(){document.getElementById('quizScreen').style.display='none';document.getElementById('resultScreen').style.display='block';const total=questions.length;const pct=Math.round(score/total*100);document.getElementById('finalScore').textContent=score;document.getElementById('finalTotal').textContent=`/ ${total}問中正解`;let rank='';if(pct>=90)rank='🏆 最優秀！素晴らしい実力です！';else if(pct>=70)rank='🎯 合格レベル！さらに上を目指しましょう！';else if(pct>=50)rank='📖 もう少し！復習して再挑戦を！';else rank='💪 基礎からしっかり学習しましょう！';document.getElementById('finalRank').textContent=rank;const bd=document.getElementById('resultBreakdown');bd.innerHTML='';GENRES.forEach((g,i)=>{const s=genreStats[i];if(s&&s.t>0){const div=document.createElement('div');div.className='breakdown-item';div.innerHTML=`<span class="val">${s.c}/${s.t}</span>${g.icon} ${g.name}`;bd.appendChild(div);}});}

document.querySelectorAll('.genre-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.genre-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedGenre=parseInt(btn.dataset.genre);});});
document.querySelectorAll('.count-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.count-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedCount=parseInt(btn.dataset.count);});});
document.getElementById('startBtn').addEventListener('click',()=>{startQuiz(selectedGenre,selectedCount);});
document.getElementById('retryBtn').addEventListener('click',()=>{startQuiz(selectedGenre,selectedCount);});
document.getElementById('backBtn').addEventListener('click',()=>{document.getElementById('resultScreen').style.display='none';document.getElementById('startScreen').style.display='block';});
updateGenreCounts();

];

// 用語辞典ロジック
const glossaryCats = [...new Set(GLOSSARY.map(g=>g.cat))];
let activeGlossaryCat = null;

function renderGlossaryCats(){
  const el = document.getElementById('glossaryCats');
  el.innerHTML = '<button class="glossary-cat-btn active" data-cat="">すべて</button>' +
    glossaryCats.map(c=>'<button class="glossary-cat-btn" data-cat="'+c+'">'+c+'</button>').join('');
  el.querySelectorAll('.glossary-cat-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      el.querySelectorAll('.glossary-cat-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      activeGlossaryCat = btn.dataset.cat || null;
      renderGlossaryList();
    });
  });
}

function renderGlossaryList(){
  const search = document.getElementById('glossarySearch').value.toLowerCase();
  let items = GLOSSARY.filter(g=>{
    if(activeGlossaryCat && g.cat !== activeGlossaryCat) return false;
    if(search && !g.term.toLowerCase().includes(search) && !g.desc.toLowerCase().includes(search)) return false;
    return true;
  });
  const el = document.getElementById('glossaryList');
  if(items.length === 0){ el.innerHTML='<div class="glossary-empty">該当する用語がありません</div>'; return; }
  el.innerHTML = items.map((g,i)=>
    '<div class="glossary-item"><div class="glossary-item-header" data-idx="'+i+'"><span>'+g.term+'<span class="glossary-item-tag genre-badge" style="font-size:10px;padding:2px 8px;">'+g.cat+'</span></span><span class="arrow">▶</span></div><div class="glossary-item-body">'+g.desc+'</div></div>'
  ).join('');
  el.querySelectorAll('.glossary-item-header').forEach(h=>{
    h.addEventListener('click',()=>{
      const body = h.nextElementSibling;
      const arrow = h.querySelector('.arrow');
      body.classList.toggle('show');
      arrow.classList.toggle('open');
    });
  });
}

document.getElementById('glossaryBtn').addEventListener('click',()=>{
  document.getElementById('startScreen').style.display='none';
  document.getElementById('glossaryScreen').style.display='block';
  renderGlossaryCats();
  renderGlossaryList();
});

document.getElementById('glossaryBack').addEventListener('click',()=>{
  document.getElementById('glossaryScreen').style.display='none';
  document.getElementById('startScreen').style.display='block';
});

document.getElementById('glossarySearch').addEventListener('input',()=>{ renderGlossaryList(); });
</script>
