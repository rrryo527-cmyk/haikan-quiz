<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建築設備 知識クイズ Pro</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Inter:wght@400;500;600;700;800&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232633;
    --border: #2d3148;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --accent-glow: rgba(108,92,231,0.3);
    --text: #e8e8ef;
    --text-muted: #8b8fa3;
    --correct: #00b894;
    --correct-bg: rgba(0,184,148,0.15);
    --wrong: #ff6b6b;
    --wrong-bg: rgba(255,107,107,0.15);
    --gold: #ffd32a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', 'Inter', 'Hiragino Kaku Gothic ProN', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(108,92,231,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(162,155,254,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(0,184,148,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container { width: 100%; max-width: 760px; position: relative; z-index: 1; }

  .header { text-align: center; padding: 28px 0 20px; }
  .header-label { font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 4px; color: var(--accent2); text-transform: uppercase; margin-bottom: 8px; font-weight: 600; }
  .header h1 { font-weight: 900; font-size: 28px; color: var(--text); line-height: 1.2; background: linear-gradient(135deg, var(--accent2), var(--accent), var(--correct)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .header h1 span { -webkit-text-fill-color: var(--accent2); }

  #startScreen { text-align: center; padding: 30px 0; }

  .start-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; margin-bottom: 24px; box-shadow: 0 4px 24px rgba(0,0,0,0.2), 0 0 0 1px rgba(108,92,231,0.1); backdrop-filter: blur(10px); }
  .start-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 16px; color: var(--accent); }
  .start-card p { color: var(--text-muted); font-size: 14px; line-height: 1.8; margin-bottom: 8px; }

  .genre-selector { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 12px 0 20px; }
  .genre-btn { background: var(--surface2); border: 2px solid var(--border); color: var(--text-muted); padding: 10px 14px; border-radius: 12px; cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit; transition: all 0.3s; flex: 1; min-width: 90px; text-align: center; line-height: 1.4; }
  .genre-btn:hover { border-color: var(--accent); color: var(--accent2); box-shadow: 0 0 16px var(--accent-glow); }
  .genre-btn.selected { border-color: var(--accent); color: #fff; background: linear-gradient(135deg, var(--accent), #8b5cf6); box-shadow: 0 4px 16px var(--accent-glow); }
  .genre-btn .genre-icon { display: block; font-size: 22px; margin-bottom: 4px; }
  .genre-btn .genre-count { display: block; font-size: 10px; font-weight: 400; opacity: 0.8; margin-top: 2px; }

  .count-selector { display: flex; gap: 10px; justify-content: center; margin: 16px 0 24px; flex-wrap: wrap; }
  .count-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit; transition: all 0.2s; }
  .count-btn:hover, .count-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(230,126,0,0.08); }

  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-weight: 700; font-size: 16px; padding: 16px 48px; border: none; border-radius: 12px; cursor: pointer; font-family: inherit; transition: all 0.3s cubic-bezier(0.4,0,0.2,1); letter-spacing: 1px; box-shadow: 0 4px 16px var(--accent-glow); }
  .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 32px var(--accent-glow), 0 0 0 2px var(--accent); }
  .btn-secondary { background: var(--surface2); color: var(--text-muted); font-size: 14px; padding: 12px 24px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; font-family: inherit; transition: all 0.3s; margin-top: 12px; }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent2); background: rgba(108,92,231,0.08); }

  #quizScreen { display: none; }

  .progress-bar-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .progress-info { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
  .progress-info strong { color: var(--accent); font-size: 18px; }
  .bar-bg { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2), var(--correct)); border-radius: 4px; transition: width 0.4s ease; box-shadow: 0 0 8px var(--accent-glow); }
  .score-display { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
  .score-display strong { color: var(--correct); }

  .genre-badge { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 700; white-space: nowrap; }
  .genre-0 { background: rgba(30,120,190,0.1); color: #1a6fb5; border: 1px solid rgba(30,120,190,0.3); }
  .genre-1 { background: rgba(220,60,60,0.1); color: #c03030; border: 1px solid rgba(220,60,60,0.3); }
  .genre-2 { background: rgba(40,160,80,0.1); color: #28803c; border: 1px solid rgba(40,160,80,0.3); }
  .genre-3 { background: rgba(160,60,160,0.1); color: #9c3c9c; border: 1px solid rgba(160,60,160,0.3); }
  .genre-4 { background: rgba(200,150,30,0.1); color: #9a7a10; border: 1px solid rgba(200,150,30,0.3); }
  .genre-5 { background: rgba(70,130,180,0.1); color: #3a7ab5; border: 1px solid rgba(70,130,180,0.3); }
  .genre-6 { background: rgba(139,90,43,0.1); color: #8b5a2b; border: 1px solid rgba(139,90,43,0.3); }
  .genre-7 { background: rgba(100,60,150,0.1); color: #6a3ca0; border: 1px solid rgba(100,60,150,0.3); }
  .genre-8 { background: rgba(180,100,30,0.1); color: #b46420; border: 1px solid rgba(180,100,30,0.3); }
  .genre-9 { background: rgba(0,100,180,0.1); color: #0064b4; border: 1px solid rgba(0,100,180,0.3); }
  .genre-10 { background: rgba(0,128,128,0.1); color: #008080; border: 1px solid rgba(0,128,128,0.3); }
  .genre-11 { background: rgba(220,120,20,0.1); color: #d07814; border: 1px solid rgba(220,120,20,0.3); }

  .question-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.2); position: relative; }
  .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .q-difficulty { font-size: 11px; color: var(--text-muted); margin-left: auto; }

  .question-image { margin-bottom: 14px; text-align: center; display: none; }
  .question-image img { max-width: 100%; max-height: 260px; border-radius: 8px; border: 1px solid var(--border); object-fit: contain; background: #f9f9f9; }
  .question-image.show { display: block; }

  .question-text { font-size: 19px; font-weight: 700; line-height: 1.7; color: var(--text); }

  .result-badge { display: none; font-size: 20px; font-weight: 900; padding: 10px 20px; border-radius: 8px; text-align: center; margin-top: 16px; letter-spacing: 2px; }
  .result-badge.show { display: block; }
  .result-badge.correct { background: var(--correct-bg); color: var(--correct); border: 2px solid var(--correct); }
  .result-badge.wrong { background: var(--wrong-bg); color: var(--wrong); border: 2px solid var(--wrong); }

  .hint-area { margin-top: 12px; }
  .hint-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--accent); padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.2s; }
  .hint-btn:hover { background: rgba(230,126,0,0.08); border-color: var(--accent); }
  .hint-btn:disabled { cursor: default; opacity: 0.5; }
  .hint-text { background: #fff8ed; border: 1px solid #f0d9a8; border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 10px 14px; font-size: 13px; line-height: 1.7; color: #7a5c00; margin-top: 8px; display: none; }
  .hint-text.show { display: block; }

  .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .option-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 14px 18px; border-radius: 12px; cursor: pointer; font-size: 16px; font-family: inherit; text-align: left; transition: all 0.25s cubic-bezier(0.4,0,0.2,1); display: flex; align-items: center; gap: 12px; line-height: 1.5; }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(108,92,231,0.1); box-shadow: 0 2px 12px var(--accent-glow); transform: translateX(4px); }
  .option-label { width: 28px; height: 28px; min-width: 28px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; font-family: 'Oswald', sans-serif; }
  .option-btn.correct { border-color: var(--correct); background: var(--correct-bg); color: #1a7f37; }
  .option-btn.correct .option-label { background: var(--correct); border-color: var(--correct); color: #fff; }
  .option-btn.wrong { border-color: var(--wrong); background: var(--wrong-bg); color: #cf222e; }
  .option-btn.wrong .option-label { background: var(--wrong); border-color: var(--wrong); color: #fff; }
  .option-btn:disabled { cursor: default; }

  .option-explanation { font-size: 13px; line-height: 1.6; padding: 4px 12px 8px 58px; display: none; }
  .option-explanation.show { display: block; }
  .option-explanation.correct-exp { color: var(--correct); }
  .option-explanation.wrong-exp { color: #8b6914; }

  .explanation { background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 14px 18px; font-size: 15px; line-height: 1.8; color: var(--text-muted); margin-bottom: 14px; display: none; }
  .explanation.show { display: block; }
  .explanation strong { color: var(--text); }

  .nav-btn { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-weight: 700; font-size: 15px; padding: 16px; border: none; border-radius: 12px; cursor: pointer; font-family: inherit; transition: all 0.3s; display: none; box-shadow: 0 4px 16px var(--accent-glow); }
  .nav-btn.show { display: block; }
  .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent-glow); }

  .quiz-sub-actions { display: flex; gap: 8px; margin-top: 10px; margin-bottom: 30px; }
  .quiz-sub-btn { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); font-size: 13px; padding: 10px; border-radius: 8px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .quiz-sub-btn:hover { border-color: var(--accent); color: var(--accent); }

  #resultScreen { display: none; text-align: center; padding: 30px 0; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 36px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .result-score { font-size: 72px; font-weight: 900; background: linear-gradient(135deg, var(--accent2), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin: 14px 0 6px; font-family: 'Inter', sans-serif; }
  .result-total { font-size: 16px; color: var(--text-muted); margin-bottom: 20px; }
  .result-rank { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
  .result-breakdown { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin: 20px 0; }
  .breakdown-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 8px; font-size: 12px; color: var(--text-muted); }
  .breakdown-item .val { font-size: 20px; font-weight: 700; color: var(--text); display: block; margin-bottom: 4px; font-family: 'Oswald', sans-serif; }

  /* 用語辞典 */
  #glossaryScreen { display: none; padding: 20px 0; }
  .glossary-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .glossary-header h2 { font-size: 20px; font-weight: 700; color: var(--accent); }
  .glossary-back { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 13px; }
  .glossary-back:hover { border-color: var(--accent); color: var(--accent); }
  .glossary-search { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; font-family: inherit; margin-bottom: 12px; background: var(--surface); color: var(--text); }
  .glossary-search:focus { outline: none; border-color: var(--accent); }
  .glossary-cats { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .glossary-cat-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.2s; }
  .glossary-cat-btn:hover, .glossary-cat-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(230,126,0,0.08); }
  .glossary-list { display: flex; flex-direction: column; gap: 8px; }
  .glossary-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .glossary-item-header { padding: 14px 18px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-weight: 700; font-size: 15px; color: var(--text); transition: background 0.15s; }
  .glossary-item-header:hover { background: var(--surface2); }
  .glossary-item-header .arrow { color: var(--text-muted); font-size: 12px; transition: transform 0.2s; }
  .glossary-item-header .arrow.open { transform: rotate(90deg); }
  .glossary-item-body { display: none; padding: 0 18px 16px; font-size: 14px; line-height: 1.8; color: var(--text-muted); border-top: 1px solid var(--border); }
  .glossary-item-body.show { display: block; padding-top: 12px; }
  .glossary-item-img { max-width: 200px; max-height: 150px; border-radius: 6px; border: 1px solid var(--border); margin-top: 8px; object-fit: contain; background: #f9f9f9; display: block; }
  .glossary-item-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
  .glossary-empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }

  @media (max-width: 600px) {
    body { padding: 10px; padding-bottom: 40px; }
    .header h1 { font-size: 22px; }
    .question-text { font-size: 17px; }
    .option-btn { font-size: 15px; padding: 12px 14px; }
    .option-explanation { padding-left: 42px; }
    .result-breakdown { grid-template-columns: 1fr 1fr; }
    .question-card { padding: 18px; }
    .start-card { padding: 20px; }
    .result-badge { font-size: 18px; }
    .genre-btn { min-width: 70px; font-size: 11px; padding: 8px 6px; }
    .genre-btn .genre-icon { font-size: 18px; }
    .nav-btn { margin-bottom: 8px; }
    .quiz-sub-actions { margin-bottom: 40px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-label">Professional Training System</div>
    <h1>建築設備 知識クイズ Pro</h1>
  </div>

  <div id="startScreen">
    <div class="start-card">
      <h2>🔧 ジャンルを選んでください</h2>
      <div class="genre-selector" id="genreSelector">
        <button class="genre-btn selected" data-genre="0"><span class="genre-icon">🔧</span>配管工事<span class="genre-count" id="genreCount0"></span></button>
        <button class="genre-btn" data-genre="1"><span class="genre-icon">🧯</span>消防設備点検<span class="genre-count" id="genreCount1"></span></button>
        <button class="genre-btn" data-genre="2"><span class="genre-icon">💧</span>貯水槽清掃<span class="genre-count" id="genreCount2"></span></button>
        <button class="genre-btn" data-genre="3"><span class="genre-icon">🚿</span>排水管清掃<span class="genre-count" id="genreCount3"></span></button>
        <button class="genre-btn" data-genre="4"><span class="genre-icon">📋</span>設備点検<span class="genre-count" id="genreCount4"></span></button>
        <button class="genre-btn" data-genre="5"><span class="genre-icon">🤝</span>ビジネスマナー<span class="genre-count" id="genreCount5"></span></button>
        <button class="genre-btn" data-genre="6"><span class="genre-icon">🏗️</span>内装工事<span class="genre-count" id="genreCount6"></span></button>
        <button class="genre-btn" data-genre="7"><span class="genre-icon">🔧</span>管工事施工管理<span class="genre-count" id="genreCount7"></span></button>
        <button class="genre-btn" data-genre="8"><span class="genre-icon">🚧</span>土木施工管理<span class="genre-count" id="genreCount8"></span></button>
        <button class="genre-btn" data-genre="9"><span class="genre-icon">🏢</span>建築施工管理<span class="genre-count" id="genreCount9"></span></button>
        <button class="genre-btn" data-genre="10"><span class="genre-icon">🚰</span>給水装置<span class="genre-count" id="genreCount10"></span></button>
        <button class="genre-btn" data-genre="11"><span class="genre-icon">⚡</span>第2種電気工事士<span class="genre-count" id="genreCount11"></span></button>
        <button class="genre-btn" data-genre="-1"><span class="genre-icon">🎲</span>全ジャンル<span class="genre-count" id="genreCountAll"></span></button>
      </div>
      <h2 style="font-size:16px;margin-top:20px;color:var(--text);">📊 難易度を選択</h2>
      <div class="count-selector" id="diffSelector">
        <button class="count-btn selected" data-diff="0">🎲 すべて</button>
        <button class="count-btn" data-diff="1">⭐ Easy</button>
        <button class="count-btn" data-diff="2">⭐⭐ Normal</button>
        <button class="count-btn" data-diff="3">⭐⭐⭐ Hard</button>
      </div>
      <p>出題数を選んでスタートしてください。</p>
      <div class="count-selector">
        <button class="count-btn selected" data-count="10">10問</button>
        <button class="count-btn" data-count="20">20問</button>
        <button class="count-btn" data-count="30">30問</button>
        <button class="count-btn" data-count="50">50問</button>
        <button class="count-btn" data-count="9999">全問</button>
      </div>
      <div style="margin:16px 0;">
        <input type="text" id="userNameInput" placeholder="名字を漢字で入力（例：荒木）" required style="padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;width:100%;max-width:300px;margin-bottom:8px;">
      </div>
      <button class="btn-primary" id="startBtn">⚔️ 挑戦者</button><br>
      <button class="btn-secondary" id="glossaryBtn">📖 用語辞典を開く</button>
      <button class="btn-secondary" id="manualBtn">📋 作業マニュアル</button>
      <button class="btn-secondary" id="historyBtn">📊 成績履歴を見る</button>
      <button class="btn-secondary" id="adminBtn">👑 王の玉座</button>
    </div>
  </div>

  <!-- 用語辞典画面 -->
  <div id="glossaryScreen">
    <div class="glossary-header">
      <button class="glossary-back" id="glossaryBack">← 戻る</button>
      <h2>📖 用語辞典</h2>
    </div>
    <input type="text" class="glossary-search" id="glossarySearch" placeholder="🔍 用語を検索...">
    <div class="glossary-cats" id="glossaryCats"></div>
    <div class="glossary-list" id="glossaryList"></div>
  </div>

  <!-- 作業マニュアル画面 -->
  <div id="manualScreen" style="display:none;padding:20px 0;">
    <div class="glossary-header">
      <button class="glossary-back" id="manualBack">← 戻る</button>
      <h2>📋 作業マニュアル</h2>
    </div>
    <div class="glossary-cats" id="manualCats"></div>
    <div id="manualContent" class="glossary-list"></div>
  </div>

  <!-- 管理者画面 -->
  <div id="adminScreen" style="display:none;padding:20px 0;">

{"q":"消防設備士の資格において「甲種」と「乙種」の違いはどれか？","o":["甲種は設置・整備・点検ができ、乙種は整備・点検のみできる","甲種は消防本部が発行し、乙種は都道府県が発行する","甲種は特定施設のみ、乙種は一般施設のみ","資格の種類に違いはない"],"a":0,"genre":0,"d":2,"ex":"甲種消防設備士は消防設備の設置工事・整備・点検ができます。乙種は整備・点検のみで設置工事はできません。","oex":["正解。甲種消防設備士は消防設備の設置工事・整備・点検ができます","不正解。甲種は消防本部が発行し、乙種は都道府県が発行するではなく、甲種は設置・整備・点検ができ、乙種は整備・点検のみできるが正しい答えです。","不正解。甲種は特定施設のみ、乙種は一般施設のみではなく、甲種は設置・整備・点検ができ、乙種は整備・点検のみできるが正しい答えです。","不正解。資格の種類に違いはないではなく、甲種は設置・整備・点検ができ、乙種は整備・点検のみできるが正しい答えです。"]},

{"q":"VP管・HIVP管の施工で「クロスコネクション」が最も危険とされる理由はどれか？","o":["異なる水源が接続されると水質汚染・健康被害につながるから","配管が複雑になるから","工事費が高くなるから","管が破損しやすいから"],"a":0,"genre":0,"d":2,"ex":"クロスコネクションは市水道・井戸・雑用水など異なる水源の配管を誤接続することで、深刻な水質汚染を引き起こします。バルブや逆止弁を付けても根本的な解決にはなりません。","oex":["正解。クロスコネクションは市水道・井戸・雑用水など異なる水源の配管を誤接続す…","不正解。配管が複雑になるからではなく、異なる水源が接続されると水質汚染・健康被害につながるからが正しい答えです。","不正解。工事費が高くなるからではなく、異なる水源が接続されると水質汚染・健康被害につながるからが正しい答えです。","不正解。管が破損しやすいからではなく、異なる水源が接続されると水質汚染・健康被害につながるからが正しい答えです。"]},
{"q":"HT管（耐熱塩ビ管）の施工で最も注意すべき点はどれか？","o":["接着剤が不要","熱による伸縮が非常に大きく、直線配管での拘束は厳禁","重量が重い","接着時間が短い"],"a":1,"genre":0,"d":2,"ex":"HT管は熱伸縮が非常に大きく、直線配管で両端を固定（拘束）すると管が曲がったり破損する恐れがあります。露出配管では「逃げ」となるルート取りが必要です。","oex":["不正解。接着剤が不要ではなく、熱による伸縮が非常に大きく、直線配管での拘束は厳禁が正しい答えです。","正解。HT管は熱伸縮が非常に大きく、直線配管で両端を固定（拘束）すると管が曲…","不正解。重量が重いではなく、熱による伸縮が非常に大きく、直線配管での拘束は厳禁が正しい答えです。","不正解。接着時間が短いではなく、熱による伸縮が非常に大きく、直線配管での拘束は厳禁が正しい答えです。"]},

{"q":"ステンレス管が一般家庭の給水・給湯管よりも食品工場・医療施設等に多く使われる主な理由はどれか？","o":["施工が簡単だから","衛生性が高く腐食しにくいが、一般住宅には高価すぎるため","塩ビ管より安いから","曲げ加工が容易だから"],"a":1,"genre":0,"d":2,"ex":"ステンレス管は赤水が出ず衛生性が極めて高いですが、材料費・施工費ともに高いため、一般住宅より衛生基準の厳しい食品工場・医療施設等での採用が多いです。","oex":["不正解。施工が簡単だからではなく、衛生性が高く腐食しにくいが、一般住宅には高価すぎるためが正しい答えです。","正解。ステンレス管は赤水が出ず衛生性が極めて高いですが、材料費・施工費ともに…","不正解。塩ビ管より安いからではなく、衛生性が高く腐食しにくいが、一般住宅には高価すぎるためが正しい答えです。","不正解。曲げ加工が容易だからではなく、衛生性が高く腐食しにくいが、一般住宅には高価すぎるためが正しい答えです。"]},
{"q":"ステンレス管のねじ切り加工を行う際の注意点はどれか？","o":["鋼管と同じチューザー（ダイス）を使用できる","材質が硬いためステンレス専用チューザーに交換する必要がある","ねじ切り不要","ハンドツールは使えない"],"a":1,"genre":0,"d":2,"ex":"ステンレスは硬度が高く、鋼管用チューザーでは磨耗が激しく正確なねじが切れません。ステンレス専用チューザーへの交換が必要です。","oex":["不正解。鋼管と同じチューザー（ダイス）を使用できるではなく、材質が硬いためステンレス専用チューザーに交換する必要があるが正しい答えです。","正解。ステンレスは硬度が高く、鋼管用チューザーでは磨耗が激しく正確なねじが切…","不正解。ねじ切り不要ではなく、材質が硬いためステンレス専用チューザーに交換する必要があるが正しい答えです。","不正解。ハンドツールは使えないではなく、材質が硬いためステンレス専用チューザーに交換する必要があるが正しい答えです。"]},
{"q":"ダクタイル鋳鉄管（DIP）のメカニカル継手接合で品質に最も影響するポイントはどれか？","o":["ボルトの色","パッキンの挿入状態（清掃・均一な噛み込み確認）","管の外観の綺麗さ","施工時間"],"a":1,"genre":0,"d":2,"ex":"DIPのメカニカル継手はパッキンが均一に噛み込んでいないと漏水します。接合前に継手と管端を清掃し、パッキンの砂噛みや不均一な挿入がないか慎重に確認が必要です。","oex":["不正解。ボルトの色ではなく、パッキンの挿入状態（清掃・均一な噛み込み確認）が正しい答えです。","正解。DIPのメカニカル継手はパッキンが均一に噛み込んでいないと漏水します","不正解。管の外観の綺麗さではなく、パッキンの挿入状態（清掃・均一な噛み込み確認）が正しい答えです。","不正解。施工時間ではなく、パッキンの挿入状態（清掃・均一な噛み込み確認）が正しい答えです。"]},

{"q":"チェック弁（逆止弁）の設置方向について正しいものはどれか？","o":["どの方向でも設置できる","スイング式・リフト式等の種類により設置方向（水平・垂直等）を厳守する必要がある","縦向きのみ設置できる","水平のみ設置できる"],"a":1,"genre":0,"d":2,"ex":"チェック弁はスイング式（水平推奨）やリフト式（垂直推奨）など種類によって設置できる方向が異なります。誤方向の設置は逆止機能が働かない原因になります。","oex":["不正解。どの方向でも設置できるではなく、スイング式・リフト式等の種類により設置方向（水平・垂直等）を厳守する必要があるが正しい答えです。","正解。チェック弁はスイング式（水平推奨）やリフト式（垂直推奨）など種類によっ…","不正解。縦向きのみ設置できるではなく、スイング式・リフト式等の種類により設置方向（水平・垂直等）を厳守する必要があるが正しい答えです。","不正解。水平のみ設置できるではなく、スイング式・リフト式等の種類により設置方向（水平・垂直等）を厳守する必要があるが正しい答えです。"]},
{"q":"ストレーナー（Yストレーナー）はバルブとセットで設置されることが多い。その主な目的はどれか？","o":["ストレーナー清掃・交換時にバルブで流体を止めて作業できるようにするため","流量を増やすため","圧力を下げるため","管の腐食を防ぐため"],"a":0,"genre":0,"d":2,"ex":"ストレーナーは定期的な清掃が必要なため、上流側にバルブを設けて流体を止めた状態で安全に清掃・交換できる構成にします。","oex":["正解。ストレーナーは定期的な清掃が必要なため、上流側にバルブを設けて流体を止…","不正解。流量を増やすためではなく、ストレーナー清掃・交換時にバルブで流体を止めて作業できるようにするためが正しい答えです。","不正解。圧力を下げるためではなく、ストレーナー清掃・交換時にバルブで流体を止めて作業できるようにするためが正しい答えです。","不正解。管の腐食を防ぐためではなく、ストレーナー清掃・交換時にバルブで流体を止めて作業できるようにするためが正しい答えです。"]},
{"q":"電動弁（モーター弁）が主に使用される場所はどれか？","o":["一般住宅の水栓","空調機・熱交換器周りの自動制御配管","道路の消火栓","受水槽のオーバーフロー管"],"a":1,"genre":0,"d":2,"ex":"電動弁は自動制御システムに組み込まれ、空調機・熱交換器・温水システム等で流量・温度を自動調節するために使用されます。","oex":["不正解。一般住宅の水栓ではなく、空調機・熱交換器周りの自動制御配管が正しい答えです。","正解。電動弁は自動制御システムに組み込まれ、空調機・熱交換器・温水システム等…","不正解。道路の消火栓ではなく、空調機・熱交換器周りの自動制御配管が正しい答えです。","不正解。受水槽のオーバーフロー管ではなく、空調機・熱交換器周りの自動制御配管が正しい答えです。"]},
{"q":"バタフライバルブの特徴として正しいものはどれか？","o":["弁体（ディスク）が軽量・薄型で大口径でも操作しやすく、過度な急開閉は要注意","小口径専用で大口径には使えない","流量調整には全く向かない","圧力損失が最も小さいバルブ"],"a":0,"genre":0,"d":2,"ex":"バタフライバルブは円板状ディスクを回転させる弁で、大口径でも軽量・コンパクト。空調・冷却水の大口径管に多用されますが、急開閉によるウォーターハンマーには注意が必要です。","oex":["正解。バタフライバルブは円板状ディスクを回転させる弁で、大口径でも軽量・コン…","不正解。小口径専用で大口径には使えないではなく、弁体（ディスク）が軽量・薄型で大口径でも操作しやすく、過度な急開閉は要注意が正しい答えです。","不正解。流量調整には全く向かないではなく、弁体（ディスク）が軽量・薄型で大口径でも操作しやすく、過度な急開閉は要注意が正しい答えです。","不正解。圧力損失が最も小さいバルブではなく、弁体（ディスク）が軽量・薄型で大口径でも操作しやすく、過度な急開閉は要注意が正しい答えです。"]},

{"q":"配管用パッキン類の交換について正しい説明はどれか？","o":["老朽化したパッキンは硬化・変形し漏水しやすいため、必ず新品に交換する","パッキンは繰り返し使用できる","パッキンは水で洗えば再利用できる","メーカー指定品でなくてよい"],"a":0,"genre":0,"d":1,"ex":"パッキンは経年劣化で硬化・変形すると弾性を失い漏水します。点検・修理時には必ず新品に交換することが原則です。","oex":["正解。パッキンは経年劣化で硬化・変形すると弾性を失い漏水します","不正解。パッキンは繰り返し使用できるではなく、老朽化したパッキンは硬化・変形し漏水しやすいため、必ず新品に交換するが正しい答えです。","不正解。パッキンは水で洗えば再利用できるではなく、老朽化したパッキンは硬化・変形し漏水しやすいため、必ず新品に交換するが正しい答えです。","不正解。メーカー指定品でなくてよいではなく、老朽化したパッキンは硬化・変形し漏水しやすいため、必ず新品に交換するが正しい答えです。"]},

{"q":"配管施工の「全体を見る」という考え方で最も重要なことはどれか？","o":["敷地や建物に対して平行・垂直を意識し、真上から見て解りやすく綺麗に配管する","できるだけ多くの継手を使う","管を最短距離で引く","勾配は無視してよい"],"a":0,"genre":0,"d":2,"ex":"「全体を見る」とは建物・敷地に対して平行・垂直を基本とし、後から他の職人や施主が見てもわかりやすく、整然とした配管を心がけることです。","oex":["正解。「全体を見る」とは建物・敷地に対して平行・垂直を基本とし、後から他の職…","不正解。できるだけ多くの継手を使うではなく、敷地や建物に対して平行・垂直を意識し、真上から見て解りやすく綺麗に配管するが正しい答えです。","不正解。管を最短距離で引くではなく、敷地や建物に対して平行・垂直を意識し、真上から見て解りやすく綺麗に配管するが正しい答えです。","不正解。勾配は無視してよいではなく、敷地や建物に対して平行・垂直を意識し、真上から見て解りやすく綺麗に配管するが正しい答えです。"]},

{"q":"ライニング鋼管（SGP-VL等）の継手接合で「管端防食コア（インサート）なし」の継手を使用すると起きる問題はどれか？","o":["施工が難しくなる","流量が下がる","ライニングが途切れた管端部から腐食（赤水）が発生する","継手が合わない"],"a":2,"genre":0,"d":2,"ex":"ライニング鋼管は内面の樹脂コーティングが切断端部で途切れています。管端防食コアがない継手を使うと露出した鋼部分から腐食が進み、赤水の原因になります。","oex":["不正解。施工が難しくなるではなく、ライニングが途切れた管端部から腐食（赤水）が発生するが正しい答えです。","不正解。流量が下がるではなく、ライニングが途切れた管端部から腐食（赤水）が発生するが正しい答えです。","正解。ライニング鋼管は内面の樹脂コーティングが切断端部で途切れています","不正解。継手が合わないではなく、ライニングが途切れた管端部から腐食（赤水）が発生するが正しい答えです。"]},
{"q":"「サドル分水栓」を用いた工事（穿孔作業）の手順として正しいものはどれか？","o":["サドル取付→サドル漏れ確認→止水栓が開いていることを確認→穿孔→穿孔完了を感触で確認の順で行う","穿孔後にサドルを取り付ける","断水してから穿孔する","穿孔機のスピードは最大速度で行う"],"a":0,"genre":0,"d":3,"ex":"サドル分水栓での穿孔は、サドル取付→漏れ確認→止水栓開確認→穿孔（刃の下げはゆっくり・回転は速く）→完了確認の順で行います。埋設位置の記録写真も重要です。","oex":["正解。サドル分水栓での穿孔は、サドル取付→漏れ確認→止水栓開確認→穿孔（刃の…","不正解。穿孔後にサドルを取り付けるではなく、サドル取付→サドル漏れ確認→止水栓が開いていることを確認→穿孔→穿孔完了を感触で確認の順で行うが正しい答えです。","不正解。断水してから穿孔するではなく、サドル取付→サドル漏れ確認→止水栓が開いていることを確認→穿孔→穿孔完了を感触で確認の順で行うが正しい答えです。","不正解。穿孔機のスピードは最大速度で行うではなく、サドル取付→サドル漏れ確認→止水栓が開いていることを確認→穿孔→穿孔完了を感触で確認の順で行うが正しい答えです。"]},
{"q":"配管の「勾配確認」を埋設中も怠らない理由はどれか？","o":["管が見えている間に修正できるが、埋めてしまうと後から修正が大変だから","勾配は見た目だけの問題","勾配はポンプで補える","勾配は施工後に確認すればよい"],"a":0,"genre":0,"d":2,"ex":"排水管は適切な勾配が排水性能の生命線です。埋設中は管が見えているうちに随時勾配確認し、不適切なら即修正します。埋め戻し後の修正は大変な手間となります。","oex":["正解。排水管は適切な勾配が排水性能の生命線です","不正解。勾配は見た目だけの問題ではなく、管が見えている間に修正できるが、埋めてしまうと後から修正が大変だからが正しい答えです。","不正解。勾配はポンプで補えるではなく、管が見えている間に修正できるが、埋めてしまうと後から修正が大変だからが正しい答えです。","不正解。勾配は施工後に確認すればよいではなく、管が見えている間に修正できるが、埋めてしまうと後から修正が大変だからが正しい答えです。"]},

let questions=[],currentIdx=0,score=0,answered=false,selectedCount=10,selectedGenre=0,selectedDiff=0,genreStats={};
const optLabels=['A','B','C','D'];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function updateGenreCounts(){GENRES.forEach((g,i)=>{const c=ALL_QUESTIONS.filter(q=>q.genre===i).length;const e=document.getElementById('genreCount'+i);if(e)e.textContent=c+'問';});const e=document.getElementById('genreCountAll');if(e)e.textContent=ALL_QUESTIONS.length+'問';}

function getHint(q){if(q.h)return q.h;const f=q.ex.split('。')[0];let h=f;const ct=q.o[q.a];if(ct&&h.includes(ct))h=h.replace(ct,'○○○');if(h.length>50)h=h.substring(0,50)+'…';else h+='。';return h;}

function startQuiz(genre,count){let pool=genre===-1?[...ALL_QUESTIONS]:ALL_QUESTIONS.filter(q=>q.genre===genre);if(selectedDiff>0)pool=pool.filter(q=>q.d===selectedDiff);if(pool.length===0){alert('該当する問題がありません。条件を変更してください。');return;}questions=shuffle(pool).slice(0,count);currentIdx=0;score=0;genreStats={};GENRES.forEach((_,i)=>{genreStats[i]={c:0,t:0};});document.getElementById('startScreen').style.display='none';document.getElementById('resultScreen').style.display='none';document.getElementById('quizScreen').style.display='block';document.getElementById('qTotal').textContent=questions.length;window.scrollTo(0,0);showQuestion();}

function showQuestion(){const q=questions[currentIdx];answered=false;document.getElementById('qNum').textContent=currentIdx+1;document.getElementById('progressBar').style.width=(currentIdx/questions.length*100)+'%';document.getElementById('scoreCount').textContent=score;const ge=document.getElementById('qGenre');ge.textContent=GENRES[q.genre].icon+' '+GENRES[q.genre].name;ge.className='genre-badge '+GENRES[q.genre].cls;document.getElementById('qDifficulty').textContent='★'.repeat(q.d)+'☆'.repeat(3-q.d);document.getElementById('questionText').textContent=q.q;const ia=document.getElementById('questionImage'),ie=document.getElementById('questionImg');if(q.img){ie.src=q.img;ie.onerror=function(){ia.className='question-image';};ia.className='question-image show';}else{ie.src='';ia.className='question-image';}document.getElementById('resultBadge').className='result-badge';document.getElementById('resultBadge').textContent='';const hb=document.getElementById('hintBtn'),ht=document.getElementById('hintText');hb.disabled=false;hb.textContent='💡 ヒントを見る';ht.className='hint-text';ht.innerHTML='';document.querySelectorAll('.option-explanation').forEach(el=>el.remove());const opts=document.getElementById('optionsContainer');opts.innerHTML='';q.o.forEach((text,i)=>{const btn=document.createElement('button');btn.className='option-btn';btn.innerHTML=`<span class="option-label">${optLabels[i]}</span><span>${text}</span>`;btn.addEventListener('click',()=>selectAnswer(i,q));opts.appendChild(btn);});document.getElementById('explanation').className='explanation';document.getElementById('explanation').innerHTML='';document.getElementById('nextBtn').className='nav-btn';}

let wrongQuestions=[];
function selectAnswer(ci,q){if(answered)return;answered=true;const btns=document.querySelectorAll('.option-btn');const ok=(ci===q.a);if(genreStats[q.genre])genreStats[q.genre].t++;const badge=document.getElementById('resultBadge');if(ok){score++;if(genreStats[q.genre])genreStats[q.genre].c++;btns[ci].classList.add('correct');badge.textContent='⭕ 正解！';badge.className='result-badge correct show';}else{btns[ci].classList.add('wrong');btns[q.a].classList.add('correct');badge.textContent='❌ 不正解';badge.className='result-badge wrong show';wrongQuestions.push({q:q.q,correct:q.o[q.a],chosen:q.o[ci],ex:q.ex,genre:q.genre});}btns.forEach(b=>b.disabled=true);if(q.oex&&q.oex.length===q.o.length){const oc=document.getElementById('optionsContainer');oc.querySelectorAll('.option-btn').forEach((btn,i)=>{const d=document.createElement('div');d.className='option-explanation show '+(i===q.a?'correct-exp':'wrong-exp');d.textContent=(i===q.a?'✓ ':'✗ ')+q.oex[i];btn.after(d);});}const expEl=document.getElementById('explanation');expEl.innerHTML='<strong>📌 解説：</strong>'+q.ex;expEl.classList.add('show');document.getElementById('nextBtn').classList.add('show');document.getElementById('scoreCount').textContent=score;}

document.getElementById('hintBtn').addEventListener('click',()=>{const q=questions[currentIdx];const ht=document.getElementById('hintText'),hb=document.getElementById('hintBtn');ht.innerHTML='💡 '+getHint(q);ht.classList.add('show');hb.disabled=true;hb.textContent='ヒント表示済み';});
document.getElementById('nextBtn').addEventListener('click',()=>{currentIdx++;if(currentIdx>=questions.length)showResult();else{showQuestion();window.scrollTo(0,0);}});
document.getElementById('quitBtn').addEventListener('click',()=>{if(confirm('トップに戻りますか？（進捗はリセットされます）')){document.getElementById('quizScreen').style.display='none';document.getElementById('startScreen').style.display='block';window.scrollTo(0,0);}});
document.getElementById('stopBtn').addEventListener('click',()=>{if(confirm('ここまでの結果を表示しますか？')){questions=questions.slice(0,currentIdx+(answered?1:0));showResult();}});

function showResult(){document.getElementById('quizScreen').style.display='none';document.getElementById('resultScreen').style.display='block';window.scrollTo(0,0);
// 間違えた問題を保存
saveWrongQuestions();
const total=questions.length;const pct=Math.round(score/total*100);document.getElementById('finalScore').textContent=score;document.getElementById('finalTotal').textContent=`/ ${total}問中正解`;let rank='';if(pct>=90)rank='🏆 最優秀！素晴らしい実力です！';else if(pct>=70)rank='🎯 合格レベル！さらに上を目指しましょう！';else if(pct>=50)rank='📖 もう少し！復習して再挑戦を！';else rank='💪 基礎からしっかり学習しましょう！';document.getElementById('finalRank').textContent=rank;const bd=document.getElementById('resultBreakdown');bd.innerHTML='';GENRES.forEach((g,i)=>{const s=genreStats[i];if(s&&s.t>0){const div=document.createElement('div');div.className='breakdown-item';div.innerHTML=`<span class="val">${s.c}/${s.t}</span>${g.icon} ${g.name}`;bd.appendChild(div);}});saveHistory(total,score,pct);}
function saveHistory(total,score,pct){try{const h=JSON.parse(localStorage.getItem('quizHistory')||'[]');h.push({date:new Date().toISOString(),genre:selectedGenre,total,score,pct});if(h.length>100)h.splice(0,h.length-100);localStorage.setItem('quizHistory',JSON.stringify(h));}catch(e){}}
function getHistory(){try{return JSON.parse(localStorage.getItem('quizHistory')||'[]');}catch(e){return [];}}

document.querySelectorAll('.genre-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.genre-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedGenre=parseInt(btn.dataset.genre);});});
document.querySelectorAll('.count-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.count-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedCount=parseInt(btn.dataset.count);});});
document.querySelectorAll('#diffSelector .count-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('#diffSelector .count-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedDiff=parseInt(btn.dataset.diff);});});
document.getElementById('startBtn').addEventListener('click',()=>{wrongQuestions=[];startQuiz(selectedGenre,selectedCount);});
document.getElementById('retryBtn').addEventListener('click',()=>{startQuiz(selectedGenre,selectedCount);});
document.getElementById('backBtn').addEventListener('click',()=>{document.getElementById('resultScreen').style.display='none';document.getElementById('startScreen').style.display='block';window.scrollTo(0,0);});
updateGenreCounts();

{"term":"HIVP管","cat":"管種","desc":"耐衝撃性硬質塩化ビニル管。VP管に耐衝撃性を持たせた管で、給水管に使用。色は暗い青灰色。"},
{"term":"HT管","cat":"管種","desc":"耐熱性硬質塩化ビニル管。90℃程度の高温排水に対応。熱伸縮が非常に大きいため固定方法に注意が必要。色は茶色。"},
{"term":"架橋ポリエチレン管","cat":"管種","desc":"ポリエチレンを架橋処理した樹脂管。柔軟で曲げ配管が可能。給水・給湯の両方に使用でき、耐熱・耐圧性に優れる。"},
{"term":"ポリブデン管","cat":"管種","desc":"柔軟性と耐熱性に優れた樹脂管。給湯配管や床暖房パネル配管に適している。架橋ポリより柔らかい。"},
{"term":"銅管","cat":"管種","desc":"熱伝導性・耐食性に優れた金属管。給湯管に多く使用。ろう付け（はんだ付け）で接合する。K/L/Mの3種類で肉厚が異なる。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/77/Rorskararemedror.jpg/330px-Rorskararemedror.jpg"},
{"term":"ステンレス管","cat":"管種","desc":"SUS304/316等のステンレス鋼管。赤水が出ず衛生性が高い。プレス接合が主流。食品工場・医療施設で多用。"},
{"term":"ライニング鋼管","cat":"管種","desc":"鋼管の内面に塩ビ等の樹脂をコーティングした管。錆や赤水を防ぐ。SGP-VL、SGP-PL等の種類がある。"},
{"term":"ダクタイル鋳鉄管（DIP）","cat":"管種","desc":"球状黒鉛鋳鉄管。高強度で水道本管に使用。メカニカル継手で接合。非常に重いため2名以上で作業。"},
{"term":"HDPE管","cat":"管種","desc":"高密度ポリエチレン管。耐薬品性・耐食性に優れ可撓性がある。EF（電気融着）接合で接合。地中埋設に多用。"},
{"term":"耐火二層管","cat":"管種","desc":"塩ビ管の外側を繊維モルタルで被覆した管。防火区画貫通部に使用でき、排水管として広く使われる。"},
{"term":"ボール弁","cat":"バルブ","desc":"球体の弁体を90度回転させて開閉する弁。1/4回転で全開・全閉が可能で操作が素早い。圧力損失が少ない。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/58/Ball.PNG/330px-Ball.PNG"},
{"term":"ゲート弁（仕切弁）","cat":"バルブ","desc":"板状の弁体を上下させて開閉する弁。全開時の圧力損失が小さいが、多回転が必要で開閉に時間がかかる。"},
{"term":"グローブ弁（玉形弁）","cat":"バルブ","desc":"弁体がディスク状で流量の微調整に優れた弁。圧力損失は大きいが精密な制御が可能。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Carbon_steel_globe_valve.jpg/330px-Carbon_steel_globe_valve.jpg"},
{"term":"バタフライ弁","cat":"バルブ","desc":"円板を回転させる弁。大口径でも軽量・コンパクト。空調・冷却水の大口径管に多用される。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Yagisawa_power_station_inlet_valve.jpg/330px-Yagisawa_power_station_inlet_valve.jpg"},
{"term":"逆止弁（チェック弁）","cat":"バルブ","desc":"流体の逆流を防止する弁。スイング式・リフト式等がある。設置方向に注意が必要。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/25/Inconel-Tilting_disc_check_valve--The-Alloy-Valve-Stockist.JPG/330px-Inconel-Tilting_disc_check_valve--The-Alloy-Valve-Stockist.JPG"},
{"term":"減圧弁","cat":"バルブ","desc":"上流側の高い圧力を下流側で一定の低い圧力に調整する弁。給水圧力が高い場合に使用。"},
{"term":"ボールタップ","cat":"バルブ","desc":"浮き球の上下により弁を開閉し、水位を自動制御する装置。受水槽やトイレのロータンクに使用。"},
{"term":"定水位弁","cat":"バルブ","desc":"ボールタップの信号により大口径の弁を開閉し、受水槽の水位を一定に制御する装置。大型受水槽用。"},
{"term":"エルボ","cat":"継手","desc":"配管の方向を変えるL字型の継手。45°と90°がある。"},
{"term":"チーズ（T字継手）","cat":"継手","desc":"直管からT字に分岐するための継手。同径チーズと異径チーズがある。"},
{"term":"レジューサー","cat":"継手","desc":"管径を変更する異径継手。同心と偏心がある。"},
{"term":"ユニオン","cat":"継手","desc":"配管の途中で容易に脱着できる継手。機器接続部やメンテナンス箇所に使用。"},
{"term":"フランジ","cat":"継手","desc":"ボルトで締結する継手。対角方向に均等に締め付ける。大口径管や機器接続に使用。"},
{"term":"バルブソケット（VS）","cat":"継手","desc":"片方がTS接合（塩ビ）、もう片方がねじ接合の異種管接合継手。"},
{"term":"インクリーザー（IN）","cat":"継手","desc":"管の口径を変更する継手。レジューサーと同義で使われることもある。"},
{"term":"パイプカッター","cat":"工具","desc":"管を切断するための工具。回転させながら徐々に切り込みを入れる。塩ビカッターは刃で直接切断する。"},
{"term":"パイプレンチ","cat":"工具","desc":"管やねじ込み継手を回すための工具。歯がかみ合い管を挟んで回す。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Ridgid_10%22_pipe_wrench.jpg/330px-Ridgid_10%22_pipe_wrench.jpg"},
{"term":"モンキーレンチ","cat":"工具","desc":"口幅を無段階に調整できる汎用レンチ。スパナは固定幅。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Coes_monkey_wrench.jpg/330px-Coes_monkey_wrench.jpg"},
{"term":"トルクレンチ","cat":"工具","desc":"締め付けトルクを管理する工具。フランジボルト等を規定値で締め付ける。"},
{"term":"水平器（レベル）","cat":"工具","desc":"配管の勾配や水平を確認するための工具。気泡式・レーザー・デジタル式がある。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/ba/DetalleNivelDeBurbuja.jpg/330px-DetalleNivelDeBurbuja.jpg"},
{"term":"ねじ切り機","cat":"工具","desc":"鋼管にねじを切るための機械。電動式と手動式がある。リードバイス付きダイヘッドで切削。"},
{"term":"トーチランプ","cat":"工具","desc":"ガスの炎で加熱する工具。銅管のろう付けや凍結管の解凍に使用。プロパン/ブタンガス。"},
{"term":"リーマー","cat":"工具","desc":"管の切断面のバリ（かえり）を除去し面取りをする工具。"},
{"term":"ハンマードリル","cat":"工具","desc":"回転+打撃でコンクリートに穴をあける工具。アンカー取付等に使用。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/Hammer_drill-1.jpg/330px-Hammer_drill-1.jpg"},
{"term":"Pトラップ","cat":"排水","desc":"壁排水に対応したP字型のトラップ。洗面器・浴槽等に広く使用される。"},
{"term":"Sトラップ","cat":"排水","desc":"床排水に対応したS字型のトラップ。自己サイホンによる破封が起きやすい。"},
{"term":"グリーストラップ","cat":"排水","desc":"厨房排水から油脂・残渣を分離する阻集器。バスケット→仕切り板→トラップの3槽構造。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/Grease_trap_for_greywater_%285293658840%29.jpg/330px-Grease_trap_for_greywater_%285293658840%29.jpg"},
{"term":"インバート桝","cat":"排水","desc":"排水桝の底部に半円形の溝（水路）を設けた桝。排水をスムーズに流す構造。"},
{"term":"掃除口（CO）","cat":"排水","desc":"排水管の清掃・点検用の開口部。管の屈曲部や30m以内ごとに設置。"},
{"term":"通気管","cat":"排水","desc":"トラップの封水保護と排水の円滑化のために設ける管。管内の気圧変動を緩和する。"},
{"term":"排水トラップ","cat":"排水","desc":"封水（5～10cm）により下水臭気の逆流を防ぐ装置。各衛生器具に設置。"},
{"term":"消火器（ABC粉末）","cat":"消防","desc":"リン酸アンモニウムを主成分とする最も一般的な消火器。普通火災(A)・油火災(B)・電気火災(C)に対応。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Wheeled_fire_extinguisher.jpg/330px-Wheeled_fire_extinguisher.jpg"},
{"term":"屋内消火栓","cat":"消防","desc":"建物内に設置する消火設備。1号（130L/min、2名操作）と2号（60L/min、1名操作）がある。"},
{"term":"スプリンクラーヘッド","cat":"消防","desc":"火災時の熱で自動的に開放し放水する装置。72℃（無色）、96℃（黄）、139℃（赤）等の温度区分がある。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/Fire_sprinkler_roof_mount_side_view.jpg/330px-Fire_sprinkler_roof_mount_side_view.jpg"},
{"term":"差動式スポット型感知器","cat":"消防","desc":"周囲温度の急激な上昇を感知して作動する熱感知器。居室・事務室等に設置。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Residential_heat_detector.jpg/330px-Residential_heat_detector.jpg"},
{"term":"定温式スポット型感知器","cat":"消防","desc":"一定温度に達すると作動する感知器。厨房・ボイラー室等の常時高温の場所に適する。"},
{"term":"光電式スポット型感知器","cat":"消防","desc":"煙による光の散乱を検知する煙感知器。階段・廊下等に設置。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Smoke_detector.JPG/330px-Smoke_detector.JPG"},
{"term":"誘導灯","cat":"消防","desc":"避難経路を示す照明設備。避難口誘導灯・通路誘導灯・階段通路誘導灯がある。非常電源20分以上。"},
{"term":"連結送水管","cat":"消防","desc":"消防隊が消防ポンプ車から送水し上階で放水するための設備。送水口65mm。"},
{"term":"緩降機","cat":"消防","desc":"ロープを使って一定速度（0.5～1.5m/s）で降下する避難器具。"},
{"term":"受水槽","cat":"貯水槽","desc":"水道本管から供給された水を一時的に貯留するタンク。有効容量は1日使用水量の約1/2が目安。"},
{"term":"高置水槽","cat":"貯水槽","desc":"建物の屋上等に設置し重力で給水する水槽。有効容量は1日使用水量の約1/10。"},
{"term":"簡易専用水道","cat":"貯水槽","desc":"受水槽の有効容量が10m³を超える水道設備。年1回の清掃と登録検査機関による検査が義務。"},
{"term":"FRP製受水槽","cat":"貯水槽","desc":"繊維強化プラスチック製のパネル型受水槽。軽量・耐食性に優れるが紫外線に弱い。"},
{"term":"次亜塩素酸ナトリウム","cat":"貯水槽","desc":"貯水槽の消毒に使用する薬品。有効塩素濃度50～100mg/Lで30分以上接触させる。"},
{"term":"残留塩素","cat":"貯水槽","desc":"水道水中に残留する塩素。遊離残留塩素0.1mg/L以上が基準。殺菌効果の指標。"},
{"term":"電極棒","cat":"貯水槽","desc":"受水槽の水位を電気的に検知するセンサー。ポンプ発停や満水・減水警報を制御。"},
{"term":"消火栓ポンプ","cat":"消防","desc":"消火栓やスプリンクラーに水を供給する加圧送水ポンプ。消火栓箱内の起動ボタンで起動する。"},
{"term":"アラーム弁（流水検知装置）","cat":"消防","desc":"スプリンクラー配管内の水流動を検知して警報を発する装置。SPヘッド開放時に作動する。"},
{"term":"P型受信機","cat":"消防","desc":"火災報知設備の受信機。共通信号方式で警戒区域単位の火災表示を行う。1級〜3級がある。"},
{"term":"R型受信機","cat":"消防","desc":"火災報知設備の受信機。各感知器にアドレスを割り当て、個別識別で火災場所を特定できる高機能型。"},
{"term":"発信機","cat":"消防","desc":"火災を発見した人が手動で火災信号を送るための押しボタン装置。床面から0.8〜1.5mに設置。"},
{"term":"防火管理者","cat":"消防","desc":"建物の防火管理業務を行う責任者。消防計画の作成・届出、避難訓練の実施等を担当。甲種・乙種の2種類。"},
{"term":"甲種消防設備士","cat":"消防","desc":"消防設備の設置工事・整備・点検ができる資格。類別（1〜5類）ごとに対象設備が異なる。"},
{"term":"乙種消防設備士","cat":"消防","desc":"消防設備の整備・点検ができる資格（設置工事は不可）。6類（消火器）、7類（漏電火災警報器）は乙種のみ。"},
{"term":"防火対象物","cat":"消防","desc":"消防法の規制対象となる建築物等の総称。特定防火対象物（不特定多数利用）と非特定に区分される。"},
{"term":"予作動式スプリンクラー","cat":"消防","desc":"感知器の信号で予作動弁を開放し、さらにヘッドが熱で開放して放水する二重条件方式。誤放水防止に優れる。"},
{"term":"泡消火設備","cat":"消防","desc":"泡で油面を覆い酸素を遮断して消火する設備。駐車場・航空機格納庫・危険物施設等に設置。"},
{"term":"非常コンセント","cat":"消防","desc":"火災時に消防隊が照明器具や排煙機等の電源として使用する設備。階段室等に設置。"},
{"term":"防排煙設備","cat":"消防","desc":"防煙壁で煙の拡散を防ぎ、排煙設備で煙を排出して避難経路を確保する設備。"},
{"term":"連結散水設備","cat":"消防","desc":"地下街・地下駐車場等に設置。消防隊が送水口から送水し、天井の散水ヘッドから放水する設備。"},
{"term":"ハロゲン化物消火設備","cat":"消防","desc":"ハロゲン化物ガスで消火する設備。電気設備に安全で汚損が少ない。環境負荷（オゾン層）の問題あり。"},
{"term":"蓄圧式消火器","cat":"消防","desc":"常時ガスで内部加圧されている消火器。圧力ゲージ（指示圧力計）で圧力を常時確認可能。"},
{"term":"加圧式消火器","cat":"消防","desc":"使用時にレバーで内部のガスボンベを破封して加圧する消火器。圧力ゲージはない。"},
{"term":"強化液消火器","cat":"消防","desc":"炭酸カリウム等のアルカリ金属塩水溶液を放射する消火器。冷却・浸透効果に優れ再燃防止に有効。"},
{"term":"末端試験弁","cat":"消防","desc":"SP配管の最末端に設置し、最も水圧が低い条件での放水圧力・放水量を確認するための試験弁。"},
{"term":"排水横枝管","cat":"排水","desc":"各衛生器具のトラップから排水立て管に接続するまでの水平方向の排水管。"},
{"term":"排水横主管","cat":"排水","desc":"排水立て管の最下部から建物外の最終桝までを結ぶ横走りの排水管。"},
{"term":"排水立て管","cat":"排水","desc":"建物内を垂直に通る排水の幹線管。各階の排水横枝管が接続される。"},
{"term":"最終桝（公共桝）","cat":"排水","desc":"建物敷地内の排水を取りまとめ公共下水道本管に接続する最後の排水桝。"},
{"term":"封水","cat":"排水","desc":"排水トラップ内に溜まった水。5〜10cmの深さで下水臭気の逆流を防ぐ。蒸発や破封に注意。"},
{"term":"破封","cat":"排水","desc":"トラップの封水が失われる現象。自己サイホン・誘導サイホン・蒸発等が原因。下水臭の逆流を招く。"},
{"term":"DFU（器具排水負荷単位）","cat":"排水","desc":"各衛生器具の排水負荷を数値化した単位。排水管の管径決定に使用。洗面器=1、大便器=4等。"},
{"term":"ノーハブ継手","cat":"排水","desc":"ハブ（受口）がない鋳鉄管をゴムカップリングとステンレスバンドで接合する継手。施工が容易。"},
{"term":"木根侵入","cat":"排水","desc":"地中の排水管の接合部や亀裂から樹木の根が侵入し、管内で成長して閉塞させる現象。"},
{"term":"逆噴射ノズル","cat":"排水","desc":"後方に水を噴射する高圧洗浄ノズル。推進力でホースが自走しながら管壁を洗浄する。"},
{"term":"貫通ノズル","cat":"排水","desc":"前方に強力な水流を集中させ、詰まりの貫通・除去に特化した高圧洗浄ノズル。"},
{"term":"ドレンクリーナー","cat":"排水","desc":"回転するワイヤーで排水管の詰まりを物理的に除去する工具。スネークとも呼ばれる。"},
{"term":"CIPP工法","cat":"排水","desc":"Cured-In-Place Pipe。樹脂含浸ライナーを管内に反転挿入し現場硬化させる管更生工法。"},
{"term":"管内コーティング工法","cat":"排水","desc":"既設排水管の内面にエポキシ樹脂を塗布して管を再生する更生工法。管を撤去せず施工可能。"},
{"term":"超音波肉厚測定","cat":"排水","desc":"管壁に超音波を当てて残存肉厚を非破壊で測定する方法。腐食による減肉の程度を診断。"},
{"term":"尿石","cat":"排水","desc":"尿中のカルシウムが排水管やトイレ内に堆積した硬い付着物。酸性洗浄剤で除去。"},
{"term":"脂肪酸カルシウム","cat":"排水","desc":"油脂と水中のカルシウムが反応して生成される石鹸状の硬い付着物。除去が困難。"},
{"term":"管閉塞率","cat":"排水","desc":"排水管断面のうち付着物で塞がれている割合。カメラ調査等で確認し清掃の必要性を判断。"},
{"term":"マニフェスト","cat":"排水","desc":"産業廃棄物管理票。排水管清掃の汚泥処理で運搬・処分の流れを追跡し不法投棄を防止。"},
{"term":"BOD","cat":"排水","desc":"生物化学的酸素要求量。微生物が有機物を分解する際に消費する酸素量。排水の汚染度指標。"},
{"term":"SS","cat":"排水","desc":"浮遊物質量（Suspended Solids）。排水中に浮遊する微細な固形物の量。水質汚濁の指標。"},
{"term":"オーバーフロー管","cat":"貯水槽","desc":"受水槽が満水時に余剰水を排出する管。先端には防虫網を設置。間接排水とする。"},
{"term":"水抜き管","cat":"貯水槽","desc":"受水槽底部に設け、清掃時に槽内の水を完全に排出するための管。底部最低部に設置。"},
{"term":"吐水口空間","cat":"貯水槽","desc":"給水管の吐水口と受水槽のオーバーフロー水面との間に確保する垂直距離。逆サイホン防止用。"},
{"term":"防虫網","cat":"貯水槽","desc":"通気管・オーバーフロー管の先端に設置する16メッシュ以上の網。虫・小動物の侵入防止。"},
{"term":"6面点検","cat":"貯水槽","desc":"受水槽の上下左右前後6面全てに点検空間を確保すること。上部100cm以上、側面・底部60cm以上。"},

// 用語辞典ロジック
const glossaryCats = [...new Set(GLOSSARY.map(g=>g.cat))];
let activeGlossaryCat = null;

function renderGlossaryCats(){
  const el = document.getElementById('glossaryCats');
  el.innerHTML = '<button class="glossary-cat-btn active" data-cat="">すべて</button>' +
    glossaryCats.map(c=>'<button class="glossary-cat-btn" data-cat="'+c+'">'+c+'</button>').join('');
  el.querySelectorAll('.glossary-cat-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      el.querySelectorAll('.glossary-cat-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      activeGlossaryCat = btn.dataset.cat || null;
      renderGlossaryList();
    });
  });
}

function renderGlossaryList(){
  const search = document.getElementById('glossarySearch').value.toLowerCase();
  let items = GLOSSARY.filter(g=>{
    if(activeGlossaryCat && g.cat !== activeGlossaryCat) return false;
    if(search && !g.term.toLowerCase().includes(search) && !g.desc.toLowerCase().includes(search)) return false;
    return true;
  });
  const el = document.getElementById('glossaryList');
  if(items.length === 0){ el.innerHTML='<div class="glossary-empty">該当する用語がありません</div>'; return; }
  el.innerHTML = items.map((g,i)=>{
    const imgHtml=g.img?'<img class="glossary-item-img" src="'+g.img+'" alt="'+g.term+'" onerror="this.style.display=\'none\'">':'';
    return '<div class="glossary-item"><div class="glossary-item-header" data-idx="'+i+'"><span>'+g.term+'<span class="glossary-item-tag genre-badge" style="font-size:10px;padding:2px 8px;">'+g.cat+'</span></span><span class="arrow">▶</span></div><div class="glossary-item-body">'+g.desc+imgHtml+'</div></div>';
  }).join('');
  el.querySelectorAll('.glossary-item-header').forEach(h=>{
    h.addEventListener('click',()=>{
      const body = h.nextElementSibling;
      const arrow = h.querySelector('.arrow');
      body.classList.toggle('show');
      arrow.classList.toggle('open');
    });
  });
}

document.getElementById('glossaryBtn').addEventListener('click',()=>{
  document.getElementById('startScreen').style.display='none';
  document.getElementById('glossaryScreen').style.display='block';
  renderGlossaryCats();
  renderGlossaryList();
});

document.getElementById('glossaryBack').addEventListener('click',()=>{
  document.getElementById('glossaryScreen').style.display='none';
  document.getElementById('startScreen').style.display='block';
});

document.getElementById('glossarySearch').addEventListener('input',()=>{ renderGlossaryList(); });

function renderManual(){
  const cats = MANUAL_DATA.map(m=>m.cat);
  const catsEl = document.getElementById('manualCats');
  let activeCat = null;
  catsEl.innerHTML = '<button class="glossary-cat-btn active" data-cat="">すべて</button>' +
    cats.map(c=>'<button class="glossary-cat-btn" data-cat="'+c+'">'+c+'</button>').join('');
  catsEl.querySelectorAll('.glossary-cat-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      catsEl.querySelectorAll('.glossary-cat-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      activeCat = btn.dataset.cat || null;
      renderManualItems(activeCat);
    });
  });
  renderManualItems(null);
}

function renderManualItems(cat){
  const el = document.getElementById('manualContent');
  let items = [];
  MANUAL_DATA.forEach(m=>{
    if(cat && m.cat !== cat) return;
    m.items.forEach(item=>items.push({...item,cat:m.cat}));
  });
  el.innerHTML = items.map(item=>
    '<div class="glossary-item"><div class="glossary-item-header"><span>'+item.title+'<span class="glossary-item-tag genre-badge" style="font-size:10px;padding:2px 8px;">'+item.cat+'</span></span><span class="arrow">▶</span></div><div class="glossary-item-body"><pre style="white-space:pre-wrap;font-family:inherit;margin:0;">'+item.content+'</pre></div></div>'
  ).join('');
  el.querySelectorAll('.glossary-item-header').forEach(h=>{
    h.addEventListener('click',()=>{
      const body = h.nextElementSibling;
      const arrow = h.querySelector('.arrow');
      body.classList.toggle('show');
      arrow.classList.toggle('open');
    });
  });
}

function renderAdminDashboard(){
  const data=JSON.parse(localStorage.getItem('allUsersData')||'{}');
  const el=document.getElementById('adminContent');
  const users=Object.keys(data);
  if(users.length===0){
    el.innerHTML='<div class="glossary-empty">まだユーザーデータがありません。</div>';
    return;
  }
  let html='<div class="start-card" style="text-align:left;">';
  html+='<h3 style="color:var(--accent);margin-bottom:16px;">👥 ユーザー一覧 ('+users.length+'名)</h3>';
  users.forEach(user=>{
    const records=data[user];
    const totalAttempts=records.length;
    const avgPct=Math.round(records.reduce((s,r)=>s+r.pct,0)/totalAttempts);
    const totalQ=records.reduce((s,r)=>s+r.total,0);
    const totalCorrect=records.reduce((s,r)=>s+r.score,0);
    const lastDate=new Date(records[records.length-1].date);
    const dateStr=lastDate.getFullYear()+'/'+(lastDate.getMonth()+1)+'/'+lastDate.getDate();
    const color=avgPct>=70?'var(--correct)':avgPct>=50?'var(--accent)':'var(--wrong)';
    html+='<div class="glossary-item" style="margin-bottom:8px;padding:14px 18px;">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;">';
    html+='<div><strong style="font-size:16px;">'+user+'</strong><br>';
    html+='<span style="font-size:12px;color:var(--text-muted);">挑戦回数: '+totalAttempts+'回 | 総問題数: '+totalQ+'問 | 最終: '+dateStr+'</span></div>';
    html+='<div style="text-align:right;"><span style="font-size:24px;font-weight:900;color:'+color+';font-family:Oswald;">'+avgPct+'%</span><br>';
    html+='<span style="font-size:12px;color:var(--text-muted);">平均正答率</span></div></div>';
    // 詳細
    html+='<details style="margin-top:8px;"><summary style="cursor:pointer;font-size:13px;color:var(--accent);">詳細を見る</summary>';
    html+='<div style="margin-top:8px;font-size:12px;">';
    records.slice().reverse().slice(0,20).forEach(r=>{
      const d=new Date(r.date);
      const ds=d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
      const gn=r.genre===-1?'全ジャンル':(GENRES[r.genre]?GENRES[r.genre].name:'不明');
      html+='<div style="padding:4px 0;border-bottom:1px solid var(--border);">'+ds+' | '+gn+' | '+r.score+'/'+r.total+' ('+r.pct+'%)';
      if(r.wrong&&r.wrong.length>0)html+=' | 不正解: '+r.wrong.length+'問';
      html+='</div>';
    });
    html+='</div></details></div>';
  });
  html+='</div>';
  el.innerHTML=html;
}

// 間違えた問題の見返し機能
function saveWrongQuestions(){
  try{
    const saved=JSON.parse(localStorage.getItem('wrongQuestions')||'[]');
    wrongQuestions.forEach(wq=>saved.push({...wq,date:new Date().toISOString()}));
    if(saved.length>500)saved.splice(0,saved.length-500);
    localStorage.setItem('wrongQuestions',JSON.stringify(saved));
  }catch(e){}
}
document.getElementById('showWrongBtn').addEventListener('click',()=>{
  const el=document.getElementById('wrongList');
  if(el.style.display==='block'){el.style.display='none';return;}
  if(wrongQuestions.length===0){el.innerHTML='<div class="glossary-empty">全問正解です！おめでとうございます！</div>';el.style.display='block';return;}
  el.innerHTML='<h3 style="color:var(--wrong);margin-bottom:12px;">❌ 間違えた問題 ('+wrongQuestions.length+'問)</h3>'+
    wrongQuestions.map((wq,i)=>'<div class="glossary-item" style="margin-bottom:8px;padding:14px;"><div style="font-weight:700;margin-bottom:6px;">Q'+(i+1)+'. '+wq.q+'</div><div style="color:var(--wrong);font-size:13px;">あなたの回答: '+wq.chosen+'</div><div style="color:var(--correct);font-size:13px;">正解: '+wq.correct+'</div><div style="color:var(--text-muted);font-size:13px;margin-top:4px;">'+wq.ex+'</div></div>').join('');
  el.style.display='block';
});

const ADMIN_ID='araki0527';

function saveUserResult(userName){
  try{
    const data=JSON.parse(localStorage.getItem('allUsersData')||'{}');
    if(!data[userName])data[userName]=[];
    data[userName].push({date:new Date().toISOString(),genre:selectedGenre,total:questions.length,score,pct:Math.round(score/questions.length*100),wrong:wrongQuestions.map(w=>w.q)});
    if(data[userName].length>200)data[userName].splice(0,data[userName].length-200);
    localStorage.setItem('allUsersData',JSON.stringify(data));
  }catch(e){}
}

});
function renderHistory(){
  const h=getHistory();
  const el=document.getElementById('historyContent');
  if(h.length===0){el.innerHTML='<div class="glossary-empty">まだ履歴がありません。クイズに挑戦しましょう！</div>';return;}
  const rows=h.slice().reverse().map(r=>{
    const d=new Date(r.date);
    const ds=d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
    const gn=r.genre===-1?'全ジャンル':(GENRES[r.genre]?GENRES[r.genre].icon+' '+GENRES[r.genre].name:'不明');
    const color=r.pct>=70?'var(--correct)':r.pct>=50?'var(--accent)':'var(--wrong)';
    return '<div class="glossary-item" style="padding:14px 18px;display:flex;justify-content:space-between;align-items:center;"><div><strong>'+ds+'</strong><br><span style="font-size:13px;color:var(--text-muted);">'+gn+'</span></div><div style="text-align:right;"><span style="font-size:20px;font-weight:900;color:'+color+';font-family:Oswald;">'+r.score+'/'+r.total+'</span><br><span style="font-size:12px;color:var(--text-muted);">'+r.pct+'%</span></div></div>';
  });
  el.innerHTML=rows.join('');
}
