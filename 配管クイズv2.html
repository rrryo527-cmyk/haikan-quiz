<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配管工事 知識クイズ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Oswald:wght@600;700&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --accent: #f0a500;
    --accent2: #e05c00;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --correct: #2ea043;
    --correct-bg: #0d2818;
    --wrong: #da3633;
    --wrong-bg: #2d1117;
    --pipe: #4a90a4;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  /* 背景パイプ装飾 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      linear-gradient(90deg, transparent 49.5%, #1a2530 49.5%, #1a2530 50.5%, transparent 50.5%),
      linear-gradient(0deg, transparent 49.5%, #1a2530 49.5%, #1a2530 50.5%, transparent 50.5%);
    background-size: 80px 80px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 720px;
    position: relative;
    z-index: 1;
  }

  /* ヘッダー */
  .header {
    text-align: center;
    padding: 32px 0 24px;
  }

  .header-label {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .header h1 {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: var(--text);
    line-height: 1.2;
  }

  .header h1 span {
    color: var(--accent);
  }

  /* スタート画面 */
  #startScreen {
    text-align: center;
    padding: 40px 0;
  }

  .start-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px;
    margin-bottom: 24px;
  }

  .start-card h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 16px;
    color: var(--accent);
  }

  .start-card p {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1.8;
    margin-bottom: 8px;
  }

  .tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin: 20px 0;
  }

  .tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .tag.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  .count-selector {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin: 24px 0;
    flex-wrap: wrap;
  }

  .count-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
  }

  .count-btn:hover, .count-btn.selected {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(240,165,0,0.08);
  }

  /* ボタン */
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    font-weight: 700;
    font-size: 16px;
    padding: 14px 48px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(240,165,0,0.3);
  }

  .btn-secondary {
    background: transparent;
    color: var(--text-muted);
    font-size: 14px;
    padding: 10px 24px;
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
    margin-top: 12px;
  }

  .btn-secondary:hover {
    border-color: var(--text-muted);
    color: var(--text);
  }

  /* クイズ画面 */
  #quizScreen { display: none; }

  .progress-bar-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .progress-info {
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .progress-info strong {
    color: var(--accent);
    font-size: 18px;
  }

  .bar-bg {
    flex: 1;
    height: 8px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .score-display {
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .score-display strong {
    color: var(--correct);
  }

  /* 問題カード */
  .question-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 16px;
  }

  .q-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .q-category {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 500;
  }

  .cat-water { background: rgba(78,160,220,0.15); color: #4ea0dc; border: 1px solid rgba(78,160,220,0.3); }
  .cat-law { background: rgba(200,100,200,0.15); color: #c864c8; border: 1px solid rgba(200,100,200,0.3); }
  .cat-tool { background: rgba(80,200,120,0.15); color: #50c878; border: 1px solid rgba(80,200,120,0.3); }

  .q-difficulty {
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
  }

  .difficulty-star { color: var(--accent); }

  .question-text {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.7;
    color: var(--text);
  }

  /* 選択肢 */
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }

  .option-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 12px;
    line-height: 1.5;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(240,165,0,0.06);
  }

  .option-label {
    width: 26px;
    height: 26px;
    min-width: 26px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Oswald', sans-serif;
  }

  .option-btn.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: #3fb950;
  }

  .option-btn.correct .option-label {
    background: var(--correct);
    border-color: var(--correct);
    color: #fff;
  }

  .option-btn.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
    color: #f85149;
  }

  .option-btn.wrong .option-label {
    background: var(--wrong);
    border-color: var(--wrong);
    color: #fff;
  }

  .option-btn:disabled { cursor: default; }

  /* 解説 */
  .explanation {
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 14px 18px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text-muted);
    margin-bottom: 16px;
    display: none;
  }

  .explanation.show { display: block; }
  .explanation strong { color: var(--text); }

  /* ナビゲーション */
  .nav-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    font-weight: 700;
    font-size: 15px;
    padding: 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
    display: none;
  }

  .nav-btn.show { display: block; }
  .nav-btn:hover { opacity: 0.9; }

  /* 結果画面 */
  #resultScreen {
    display: none;
    text-align: center;
    padding: 40px 0;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px;
    margin-bottom: 24px;
  }

  .result-score {
    font-size: 72px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    margin: 16px 0 8px;
    font-family: 'Oswald', sans-serif;
  }

  .result-total {
    font-size: 16px;
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  .result-rank {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 24px;
  }

  .result-breakdown {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 24px 0;
  }

  .breakdown-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 8px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .breakdown-item .val {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    display: block;
    margin-bottom: 4px;
    font-family: 'Oswald', sans-serif;
  }

  /* 固定ボトムバー */
  @media (max-width: 600px) {
    .header h1 { font-size: 22px; }
    .result-breakdown { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-label">建築設備 トレーニング</div>
    <h1>配管工事<span>知識クイズ</span></h1>
  </div>

  <!-- スタート画面 -->
  <div id="startScreen">
    <div class="start-card">
      <h2>🔧 クイズについて</h2>
      <div class="tags">
        <span class="tag active">💧 給排水配管の基礎知識</span>
        <span class="tag active">📋 建築設備の法規・資格</span>
        <span class="tag active">🔨 工具・材料・施工方法</span>
      </div>
      <p>全250問超の問題からランダムに出題します。<br>出題数を選んでスタートしてください。</p>
      <div class="count-selector">
        <button class="count-btn selected" data-count="10">10問</button>
        <button class="count-btn" data-count="20">20問</button>
        <button class="count-btn" data-count="30">30問</button>
        <button class="count-btn" data-count="50">50問</button>
        <button class="count-btn" data-count="200">全問</button>
      </div>
      <button class="btn-primary" id="startBtn">クイズを始める</button>
    </div>
  </div>

  <!-- クイズ画面 -->
  <div id="quizScreen">
    <div class="progress-bar-wrap">
      <div class="progress-info"><strong id="qNum">1</strong> / <span id="qTotal">10</span></div>
      <div class="bar-bg"><div class="bar-fill" id="progressBar" style="width:0%"></div></div>
      <div class="score-display">正解 <strong id="scoreCount">0</strong></div>
    </div>
    <div class="question-card">
      <div class="q-meta">
        <span class="q-category" id="qCategory">給排水</span>
        <span class="q-difficulty" id="qDifficulty">★☆☆</span>
      </div>
      <div class="question-text" id="questionText">問題テキスト</div>
    </div>
    <div class="options" id="optionsContainer"></div>
    <div class="explanation" id="explanation"></div>
    <button class="nav-btn" id="nextBtn">次の問題へ →</button>
  </div>

  <!-- 結果画面 -->
  <div id="resultScreen">
    <div class="result-card">
      <div class="header-label">結果発表</div>
      <div class="result-score" id="finalScore">0</div>
      <div class="result-total" id="finalTotal">/ 10問中</div>
      <div class="result-rank" id="finalRank">🎯 合格！</div>
      <div class="result-breakdown">
        <div class="breakdown-item"><span class="val" id="catScore1">-</span>給排水配管</div>
        <div class="breakdown-item"><span class="val" id="catScore2">-</span>法規・資格</div>
        <div class="breakdown-item"><span class="val" id="catScore3">-</span>工具・施工</div>
      </div>
    </div>
    <button class="btn-primary" id="retryBtn">もう一度挑戦する</button><br>
    <button class="btn-secondary" id="backBtn">出題数を変える</button>
  </div>
</div>

<script>
// ============================================================
// 問題データ（200問）
// categories: 0=給排水, 1=法規・資格, 2=工具・施工
// difficulty: 1=初級, 2=中級, 3=上級
// ============================================================
const ALL_QUESTIONS = [
// ============ 給排水配管の基礎知識（約70問）============
{q:"給水管に最もよく使用される管の種類はどれか？",o:["硬質塩化ビニル管（VU管）","水道用硬質塩化ビニルライニング鋼管","排水用硬質塩化ビニル管","鋳鉄管"],a:1,cat:0,d:1,ex:"給水管には錆びにくく耐久性のある水道用硬質塩化ビニルライニング鋼管（SGP-VL）が広く用いられています。"},
{q:"排水管の勾配として適切なものはどれか？（管径100mm）",o:["1/10以上","1/100以上","1/500以上","1/1000以上"],a:1,cat:0,d:1,ex:"管径100mmの場合、排水管の最小勾配は1/100とされています。管径が大きくなると最小勾配は緩くなります。"},
{q:"給水方式のうち、高層建物で最もよく採用されるものはどれか？",o:["直結直圧式","直結増圧式","高置水槽式","ポンプ直送式"],a:3,cat:0,d:2,ex:"高層建物ではポンプ直送方式が広く採用されます。水を一旦受水槽に貯め、加圧給水ポンプで各階に直接給水します。"},
{q:"受水槽の有効容量の目安として正しいものはどれか？",o:["1日の使用水量の1/4","1日の使用水量の1/2","1日の使用水量の2倍","1日の使用水量の4倍"],a:1,cat:0,d:2,ex:"受水槽の有効容量は、一般的に1日の使用水量の約1/2を目安に設計します。"},
{q:"排水トラップの封水深として正しいものはどれか？",o:["3cm以上5cm未満","5cm以上10cm以下","10cm以上15cm以下","15cm以上20cm以下"],a:1,cat:0,d:1,ex:"排水トラップの封水深は5cm以上10cm以下が適切です。これにより下水臭気の逆流を防ぎます。"},
{q:"水道水の残留塩素の基準値として正しいものはどれか？",o:["0.01mg/L以上","0.1mg/L以上","1.0mg/L以上","10mg/L以上"],a:1,cat:0,d:2,ex:"水道法により、給水栓末端での遊離残留塩素は0.1mg/L以上であることが義務付けられています。"},
{q:"通気管を設ける主な目的はどれか？",o:["給水圧力を維持するため","排水管内の臭気を排出するため","トラップ封水の保護と排水の流れを円滑にするため","排水管内の水温を下げるため"],a:2,cat:0,d:1,ex:"通気管はトラップ封水の破封を防ぎ、排水管内の空気圧力変動を緩和して排水をスムーズにする目的で設けます。"},
{q:"硬質塩化ビニル管（VU管とVP管）の違いとして正しいものはどれか？",o:["VU管の方が肉厚が厚い","VP管の方が肉厚が厚い","両者の肉厚は同じ","VU管は給水専用である"],a:1,cat:0,d:2,ex:"VP管（一般用）はVU管（薄肉）より肉厚が厚く、高圧に耐えられます。VU管は主に排水管に使用されます。"},
{q:"給湯温度の衛生的観点から適切な貯湯温度はどれか？",o:["40℃以上","50℃以上","60℃以上","70℃以上"],a:2,cat:0,d:2,ex:"レジオネラ属菌の繁殖防止のため、貯湯タンクは60℃以上に保持する必要があります。"},
{q:"クロスコネクションとは何か？",o:["給水管と排水管を誤って交差させること","飲料水系統と非飲料水系統が接続されること","2本の配管を並列に接続すること","分岐配管の一種"],a:1,cat:0,d:2,ex:"クロスコネクションは飲料水系統と非飲料水系統（雑用水・工業用水等）が誤って接続された状態で、水質汚染の原因となります。"},
{q:"ウォーターハンマー（水撃作用）が発生しやすい状況はどれか？",o:["管内流速が遅い場合","弁を急激に閉鎖した場合","管径が大きい場合","水温が高い場合"],a:1,cat:0,d:1,ex:"ウォーターハンマーは弁の急閉や急開時に管内の流速が急変することで発生します。防止にはスローリリース弁やウォーターハンマー防止器を使用します。"},
{q:"逆止弁（チェック弁）の主な用途はどれか？",o:["流量を調節する","流体の逆流を防ぐ","圧力を一定に保つ","流体の温度を調節する"],a:1,cat:0,d:1,ex:"逆止弁（チェック弁）は流体が一方向にのみ流れるようにし、逆流を防ぐ弁です。給水ポンプや給湯器の配管に多く使用されます。"},
{q:"排水管のスケール（水垢）が最も付きやすい条件はどれか？",o:["水温が低く、流速が速い","水温が高く、炭酸カルシウム濃度が高い","水温が低く、pH値が低い","水量が多く、流速が遅い"],a:1,cat:0,d:3,ex:"スケールは水温が高いほど炭酸カルシウムが析出しやすくなります。給湯管や温水配管で特に注意が必要です。"},
{q:"ポンプの吸込揚程が大きくなりすぎた場合に起こる現象はどれか？",o:["ウォーターハンマー","キャビテーション","サージング","エアロック"],a:1,cat:0,d:3,ex:"キャビテーションはポンプ入口の圧力が低下し液体が沸騰する現象で、騒音・振動・浸食を引き起こします。"},
{q:"排水立て管の管径決定に用いる単位はどれか？",o:["m³/h","器具排水負荷単位（DFU）","Pa","L/min"],a:1,cat:0,d:2,ex:"器具排水負荷単位（DFU：Drainage Fixture Unit）は排水設備設計で各器具の排水負荷を数値化したものです。"},
{q:"給水管の埋設深さとして最低限必要なものはどれか（一般地域）？",o:["0.1m","0.3m","0.6m","1.0m"],a:1,cat:0,d:2,ex:"一般地域での給水管埋設深さは0.3m以上が目安です。凍結のおそれがある地域では凍結深度以下とする必要があります。"},
{q:"フランジ接合に使用するガスケット（パッキン）の選定で最も重要なことはどれか？",o:["コストが安いこと","流体の種類・温度・圧力に対応していること","カラーが配管に合っていること","入手しやすいこと"],a:1,cat:0,d:2,ex:"ガスケットは流体の種類（水・油・薬品等）、温度、圧力に適した材質を選定する必要があります。"},
{q:"給水管の流速の上限として一般的に推奨される値はどれか？",o:["0.5m/s","2m/s","5m/s","10m/s"],a:1,cat:0,d:2,ex:"給水管内の流速は一般に2m/s以下が推奨されます。これを超えると騒音やウォーターハンマーが発生しやすくなります。"},
{q:"排水トラップの種類のうち、洗面器や浴槽に最もよく使用されるものはどれか？",o:["Pトラップ","Sトラップ","ドラムトラップ","グリーストラップ"],a:0,cat:0,d:1,ex:"Pトラップは壁排水に対応した一般的なトラップです。洗面器・浴槽等に広く使用されます。"},
{q:"最も一般的なねじ接合に使用するシール材はどれか？",o:["生麻とシール剤（液体シール）","ゴムパッキン","ハンダ","接着剤"],a:0,cat:0,d:1,ex:"ねじ接合では生麻（または麻糸）とシール剤を組み合わせてシールするか、液体シール（シールテープ＋シール剤）を用います。"},
{q:"排水立て管に設けるオフセットとは何か？",o:["立て管の途中に設ける水平管部分","立て管の最下部に設ける曲管","立て管の最上部に設ける通気弁","立て管の途中に設ける掃除口"],a:0,cat:0,d:3,ex:"オフセットとは排水立て管の途中で建物構造上の都合等により管が水平方向に偏移する部分です。"),
{q:"給水設備で「バキュームブレーカー」を設ける目的はどれか？",o:["水圧を一定に保つ","逆サイホン作用による逆流を防ぐ","流量を調節する","水撃を防ぐ"],a:1,cat:0,d:2,ex:"バキュームブレーカーは負圧が生じた場合に自動的に大気を取り入れ、逆サイホン作用による逆流（汚染水の逆流）を防ぐ器具です。"},
{q:"雨水排水管と汚水排水管を分けて配管する方式を何というか？",o:["単式排水","合流式排水","分流式排水","複流式排水"],a:2,cat:0,d:1,ex:"分流式は汚水（生活排水）と雨水を別々の系統で排水する方式です。下水道への負担軽減や処理効率の向上が目的です。"},
{q:"水道メーターは通常、誰の管理とされるか？",o:["建物所有者","入居者（使用者）","水道事業者（市区町村等）","指定給水装置工事事業者"],a:2,cat:0,d:1,ex:"水道メーターは水道事業者の所有物であり、維持管理も水道事業者が行います。"},
{q:"給水圧力が過大になった場合の問題点として正しいものはどれか？",o:["トラップの封水が切れる","水栓金具の損傷・漏水・騒音が発生する","配管が凍結しやすくなる","水質が悪化する"],a:1,cat:0,d:2,ex:"給水圧力が高すぎると水栓金具に負担がかかり、損傷や漏水、騒音（ハンマー）の原因になります。減圧弁の設置が有効です。"},
{q:"ステンレス管の接合方法として最もよく使用されるものはどれか？",o:["接着接合","ねじ接合","プレス（メカニカル）接合","溶接接合"],a:2,cat:0,d:2,ex:"ステンレス管は主にプレス（メカニカル）接合が使用されます。専用工具でワンタッチで接合できるため施工性が高いです。"},
{q:"排水管の清掃・検査のために設ける「掃除口（SO）」は、どのような場所に設けるのが原則か？",o:["排水管の最上流端のみ","排水管の最下流端のみ","管の延長が一定以上の場合や方向が変わる箇所など","排水立て管の最上部のみ"],a:2,cat:0,d:2,ex:"掃除口は排水管の屈曲部、合流部、管径変化箇所および一定延長ごとに設置し、管内清掃や詰まり解消ができるようにします。"},
{q:"水道水に含まれる塩素の主な目的はどれか？",o:["水の味を良くする","配管の腐食を防ぐ","殺菌・消毒を行う","水圧を安定させる"],a:2,cat:0,d:1,ex:"水道水への塩素注入は細菌・ウイルスを不活化するためです。残留塩素が一定以上あることで配給過程での再汚染を防ぎます。"},
{q:"ボールタップが使用される主な場所はどれか？",o:["洗面台の排水部","トイレ・受水槽の給水部","シャワーの混合部","洗濯機の排水部"],a:1,cat:0,d:1,ex:"ボールタップは水位が上がるとボールが浮上して弁が閉まり給水を止める自動弁です。受水槽やトイレのロータンクに使用されます。"},
{q:"銅管の接合方法として最もよく使用されるものはどれか？",o:["接着接合","フランジ接合","ろう付け（はんだ付け）接合","融着接合"],a:2,cat:0,d:1,ex:"銅管はろう付け（ロウ付け）接合が基本です。フラックスを塗布後、カプラーを差し込み、トーチで加熱してろう材を流し込みます。"},
{q:"排水ポンプが必要となる場所はどれか？",o:["建物の最上階","本管より高い位置","公共下水道より低い位置（地下排水）","建物の外側"],a:2,cat:0,d:1,ex:"公共下水道の本管より低い位置（地下室等）からの排水は自然流下できないため、排水ポンプで圧送する必要があります。"},
{q:"給湯設備における「膨張管」の役割はどれか？",o:["圧力を高める","水温上昇による体積膨張を逃がす","給湯量を増やす","配管を保護する"],a:1,cat:0,d:2,ex:"給湯時に水は体積膨張します。膨張管（膨張タンク）はこの膨張分を吸収し、配管や機器の過圧破損を防ぎます。"},
{q:"水道管の「水圧試験」で一般的に用いる試験圧力はどれか？",o:["使用最高圧力の0.5倍","使用最高圧力の1.5倍","使用最高圧力の3倍","使用最高圧力の10倍"],a:1,cat:0,d:2,ex:"水圧試験は使用最高圧力の1.5倍（JWWA等の規格による）で実施し、漏水・変形がないことを確認します。"},
{q:"給排水設備で使用される「フレキシブルジョイント」の主な目的はどれか？",o:["流量を調節する","地震・振動・膨張収縮を吸収する","流体の逆流を防ぐ","圧力を一定に保つ"],a:1,cat:0,d:2,ex:"フレキシブルジョイントは地震時の変位、機器の振動、温度変化による配管の伸縮を吸収するために使用されます。"},
{q:"架橋ポリエチレン管（XL管）の特徴として正しいものはどれか？",o:["耐熱性が低く給湯には使えない","曲げ加工が容易で耐熱・耐久性に優れる","金属管と同様に溶接接合が必要","屋外露出では紫外線劣化が少ない"],a:1,cat:0,d:2,ex:"架橋ポリエチレン管はフレキシブルで曲げ加工が容易なほか、高い耐熱・耐圧性を持ち給水・給湯両方に使用できます。"},
{q:"グリーストラップを設置する目的はどれか？",o:["雨水を貯留する","厨房排水中の油脂・残渣を除去する","排水の臭気を遮断する","排水圧力を調整する"],a:1,cat:0,d:1,ex:"グリーストラップ（阻集器）は飲食店などの厨房排水から油脂や残渣を分離・収集し、排水管の詰まりや下水道への影響を防ぎます。"},
{q:"排水管の「インバート」とは何か？",o:["管内壁の最低部","管の外径","管の厚み","管の継ぎ手形状"],a:0,cat:0,d:2,ex:"インバートとは管内壁の最も低い部分（底部）のことです。排水桝のインバートは流入・流出管の高さを正確に合わせる重要な部分です。"},
{q:"給水栓（水道の蛇口）の取付けねじの規格として一般的なものはどれか？",o:["Rねじ（テーパーねじ）","Mねじ（メートルねじ）","UNCねじ（ユニファイ並目）","Gねじ（平行管用ねじ）"],a:0,cat:0,d:2,ex:"給水栓等の配管接続には水道用のRねじ（テーパー管用ねじ、PT）が使用されます。"},
{q:"水道水の水質基準において「硬度」とは何の量で表されるか？",o:["カルシウムとマグネシウムの量（炭酸カルシウム換算）","鉄とマンガンの量","塩素と塩素化合物の量","有機物の量"],a:0,cat:0,d:2,ex:"硬度はカルシウムとマグネシウムの合計量を炭酸カルシウム（mg/L）に換算した値です。硬水はスケールが付着しやすくなります。"},
{q:"管径を途中で変更する際に使用する継手はどれか？",o:["エルボ","チーズ（チー）","レジューサー（異径継手）","ユニオン"],a:2,cat:0,d:1,ex:"管径を変えるにはレジューサー（異径継手）を使用します。径が小さくなる方向に取り付けます。"},
{q:"水道法に規定される「指定給水装置工事事業者」の指定を行うのは誰か？",o:["国土交通省","都道府県知事","市区町村の水道事業者","厚生労働省"],a:2,cat:0,d:2,ex:"給水装置工事事業者の指定は、各地域の水道事業者（市区町村等）が行います。"},
{q:"塩ビ管の接着接合で使用する接着剤は何系か？",o:["エポキシ系","シアノアクリレート（瞬間接着）系","THF（テトラヒドロフラン）溶剤系","ウレタン系"],a:2,cat:0,d:2,ex:"塩ビ管の接着接合はTHF（テトラヒドロフラン）を主成分とする塩ビ専用接着剤を使用します。管と継手を溶かして接合します。"},
{q:"排水管の「満流」と「半満流」の違いとして正しいものはどれか？",o:["満流の方が流速は遅くなる","半満流（約8割）の流れが最も流速・流量が大きくなる","満流の方が気泡が入りやすい","半満流は管内が詰まった状態を指す"],a:1,cat:0,d:3,ex:"開水路理論により、円形管での最大流速は満流時ではなく、水深が管径の約81%の半満流時に得られます。"},
{q:"受水槽の点検口（マンホール）の大きさとして適切なものはどれか？",o:["直径15cm以上","直径30cm以上","直径60cm以上","直径90cm以上"],a:2,cat:0,d:2,ex:"受水槽の点検・清掃のために、マンホールは内径60cm以上のものを設置する必要があります。"},
{q:"建物内の排水横枝管と排水立て管の接続で、乱流を防いで正常な流下を確保するために用いる継手はどれか？",o:["45°エルボ","Y継手","特殊継手（大曲がり等）","ソケット"],a:2,cat:0,d:3,ex:"排水立て管への接続には、旋回流（らせん流）を利用し管内圧力変動を緩和する特殊継手が使用されることがあります。"},
{q:"建物の水道引込管（給水管）の止水栓（仕切弁）は一般的に誰の管理か？",o:["個人（建物所有者）","水道事業者","地方自治体（道路管理者）","指定工事事業者"],a:1,cat:0,d:1,ex:"引込管・止水栓は一般的に水道事業者の管理となります。メーターよりも下流の給水装置は建物所有者の管理です。"},
{q:"ポリブデン管の主な特徴はどれか？",o:["硬くて曲げられない","柔軟性があり給湯・床暖房に使われる","紫外線に強く屋外露出でも問題ない","金属管と同じ方法で接合できる"],a:1,cat:0,d:2,ex:"ポリブデン管は柔軟性と耐熱性に優れ、給湯配管や床暖房パネル配管に適しています。"},
{q:"建物の受水槽に「水位計」を設ける主な目的はどれか？",o:["水質を確認するため","水槽内の水位を把握し、適切な給水制御を行うため","水槽内の圧力を管理するため","水槽の清掃時期を知るため"],a:1,cat:0,d:1,ex:"水位計は受水槽内の水位を常時監視し、ボールタップや給水ポンプの制御信号として使用します。"},
{q:"排水ポンプの選定で最も重要な要素はどれか？",o:["ポンプの色","揚程と排水量（流量）","ポンプのメーカー","モーターの回転数のみ"],a:1,cat:0,d:2,ex:"排水ポンプは必要な揚程（排水する高さ）と流量（排水量）に適したものを選定します。"},
{q:"給水管の「サドル分水栓」を使用する目的はどれか？",o:["給水管の端部を塞ぐ","既設の給水管から新規に分岐するとき","2本の管を接続するとき","管の曲がりを作るとき"],a:1,cat:0,d:2,ex:"サドル分水栓は既設の給水管（主管）を断水せずに穿孔し、新たな分岐を設けるために使用します。"},
{q:"建物排水の「最終桝」の役割はどれか？",o:["排水の最上流に設ける始点の桝","建物敷地内の排水を取りまとめ公共下水道に接続する最終点の桝","汚泥を沈殿させる桝","油を分離する桝"],a:1,cat:0,d:1,ex:"最終桝（公共桝）は建物内の汚水・雑排水を集めて公共下水道本管に接続する最後の排水桝です。"},
{q:"水道管の「赤水」が発生する主な原因はどれか？",o:["水道水に含まれる塩素が多すぎる","鋼管内部の腐食（錆）","水圧が高すぎる","pH値が高い"],a:1,cat:0,d:1,ex:"赤水は鋼管内部の錆（酸化鉄）が流出することで発生します。内面ライニング管や樹脂管の採用で防止できます。"},
{q:"給水管と排水管を一本に混用することを何というか？",o:["分流配管","クロスコネクション","合流配管","逆接続"],a:1,cat:0,d:2,ex:"クロスコネクションは飲料水系統と汚染のおそれがある系統が接続された状態。給排水管の混用は最も危険なクロスコネクションです。"},
{q:"受水槽の「オーバーフロー管」は何のために設けるか？",o:["ポンプの吸込み用","水槽が満水になった場合に余剰水を排出するため","水槽内を清掃するため","水質を検査するため"],a:1,cat:0,d:1,ex:"オーバーフロー管は受水槽が満水になった時に自動的に排水し、水槽の破損や溢水を防ぎます。"},
{q:"管の膨張・収縮を吸収するために設けるものはどれか？",o:["ストレーナー","伸縮継手（エキスパンションジョイント）","逆止弁","ボール弁"],a:1,cat:0,d:2,ex:"伸縮継手は温度変化による配管の伸縮を吸収し、配管ストレスや接合部の破損を防ぎます。"},
{q:"「ライニング鋼管」のライニング（内面被覆）の主な目的はどれか？",o:["断熱のため","内面の腐食（赤水）を防ぐため","外面を保護するため","管に色をつけるため"],a:1,cat:0,d:1,ex:"ライニング鋼管は内面に樹脂をライニング（コーティング）することで、錆の発生と赤水を防ぎます。"},
{q:"ガス管の色（識別色）として正しいものはどれか？",o:["青","白","黄（橙）","緑"],a:2,cat:0,d:1,ex:"ガス管の識別色は黄色（またはオレンジ色）です。配管の識別は工業規格（JIS）により定められています。"},
{q:"下水道に直接排水することが禁止されているものはどれか？",o:["一般家庭の風呂排水","飲食店の厨房排水（グリーストラップ経由なし）","洗面所排水","雨水（合流式下水道除く）"],a:1,cat:0,d:2,ex:"厨房の油脂分を多く含む排水をグリーストラップ未処理のまま下水道に流すことは禁止されています。"},
{q:"給水装置において「逆流防止（バックフロー防止）」が特に必要な機器はどれか？",o:["単純な給水栓","水洗トイレのボールタップ","医療機器への給水配管","一般家庭の洗面台"],a:2,cat:0,d:2,ex:"医療用機器、薬品を使う機器、プールなどへの給水は汚染水が逆流する危険性が高く、確実な逆流防止措置が必要です。"},
{q:"耐震継手を採用する目的はどれか？",o:["配管コストを削減するため","地震時の管の伸縮・たわみ・離脱を防ぐため","施工を早くするため","水質を改善するため"],a:1,cat:0,d:2,ex:"耐震継手は地震時の地盤変動に追従して伸縮・屈曲でき、継手の離脱・漏水を防ぐために用いられます。"},
{q:"「FL」「GL」「SL」の略号の意味として正しい組み合わせはどれか？",o:["FL=基礎面、GL=地盤面、SL=スラブ面","FL=床面、GL=地盤面、SL=スラブ面","FL=床面、GL=ガラス面、SL=スラブ面","FL=天井面、GL=地盤面、SL=スラブ面"],a:1,cat:0,d:2,ex:"FL（Floor Level）=床面、GL（Ground Level）=地盤面、SL（Slab Level）=スラブ面です。配管の高さ基準として使用します。"},

// ============ 建築設備の法規・資格（約65問）============
{q:"管工事施工管理技士の資格を所轄する省庁はどれか？",o:["厚生労働省","国土交通省","経済産業省","環境省"],a:1,cat:1,d:1,ex:"管工事施工管理技士は建設業法に基づく国家資格で、国土交通省が所轄しています。"},
{q:"建設業法における「特定建設業」と「一般建設業」の主な違いはどれか？",o:["従業員数の違い","下請け契約金額の上限の違い","工事種別の違い","施工地域の違い"],a:1,cat:1,d:2,ex:"特定建設業は下請け契約の合計額が4,500万円以上（建築一式は7,000万円以上）となる場合に必要な許可です。"},
{q:"給水装置工事主任技術者の資格を取得するために必要なものはどれか？",o:["年齢が25歳以上であること","給水装置工事の実務経験3年以上＋試験合格","一級管工事施工管理技士の資格","学歴は関係なく試験合格のみ"],a:1,cat:1,d:2,ex:"給水装置工事主任技術者は、実務経験3年以上を有する者が試験に合格することで取得できます。"},
{q:"建築基準法における「確認申請」が必要な工事はどれか？",o:["既存建物の設備のみの軽微な変更","床面積が一定以上の新築・増改築工事","外壁の塗り替え","屋内配管の交換"],a:1,cat:1,d:1,ex:"確認申請は新築・増改築など、一定規模以上の建築工事に必要な手続きです。軽微な修繕等は不要です。"},
{q:"消防法に基づく危険物の取扱いについて、第四類危険物（引火性液体）を扱う施設での配管の材質として原則とされるものはどれか？",o:["樹脂製（塩ビ管）","鋼管または同等以上の強度・耐食性を持つ管","銅管","アルミ管"],a:1,cat:1,d:3,ex:"危険物施設の配管は鋼管またはステンレス管等、強度・耐食性・耐圧性が確認された材質が求められます。"},
{q:"労働安全衛生法に基づき、一定規模以上の工事現場に選任が義務付けられる者はどれか？",o:["管工事施工管理技士","安全衛生責任者（または統括安全衛生責任者）","給水装置工事主任技術者","一級建築士"],a:1,cat:1,d:2,ex:"特定元方事業者等は統括安全衛生責任者を選任し、下請け混在の現場での安全衛生を管理する義務があります。"},
{q:"水道法に規定する「給水装置」に含まれないものはどれか？",o:["給水管","給水栓","水道メーター","公道内の水道本管"],a:3,cat:1,d:2,ex:"給水装置は需要者の敷地内にある給水管・止水栓・水道メーター・給水栓等です。配水管（本管）は給水装置に含まれません。"},
{q:"消防法に基づく消防設備の点検が義務付けられる建物はどれか？",o:["延べ床面積100m²未満の一般住宅","延べ床面積1,000m²以上の特定防火対象物","全ての建物","木造の建物のみ"],a:1,cat:1,d:2,ex:"特定防火対象物（不特定多数の人が利用する建物）や一定規模以上の建物は消防設備点検が義務付けられています。"},
{q:"建築基準法施行令において、給排水管が防火区画を貫通する場合に求められる措置はどれか？",o:["区画を貫通する部分の管の塗装","防火区画貫通部を防火材料で措置（防火処理）","管の径を小さくすること","貫通させてはならない"],a:1,cat:1,d:2,ex:"配管の防火区画貫通部は、隙間を不燃材料等で埋め、ファイヤーダンパー（FD）や防火処置を施す必要があります。"},
{q:"建設業許可の有効期間はどれか？",o:["1年","3年","5年","10年"],a:2,cat:1,d:1,ex:"建設業許可の有効期間は5年です。引き続き営業するには有効期間満了前に更新申請を行う必要があります。"},
{q:"下水道法において、建物から公共下水道に接続するまでの排水施設（排水設備）の設置義務者はどれか？",o:["地方自治体","公共下水道の管理者","土地の所有者または占有者","指定工事業者"],a:2,cat:1,d:2,ex:"排水設備（建物内の排水管・桝等）は土地の所有者または占有者が設置・管理する義務があります。"},
{q:"建築設備士の資格について正しいものはどれか？",o:["建築設備士は工事監理業務を単独で行える","建築設備士は建築士に建築設備に関する意見を述べることができる","建築設備士の資格は5年ごとに更新が必要","建築設備士の資格取得には実務経験は不要"],a:1,cat:1,d:2,ex:"建築設備士は設備設計・計画の専門家として建築士に助言や意見を述べる立場です。工事監理は建築士の業務です。"},
{q:"管工事業の建設業許可を受けるために必要な専任技術者の資格として該当しないものはどれか？",o:["1級管工事施工管理技士","技術士（機械・衛生工学部門）","2級管工事施工管理技士（一般のみ）","電気工事士"],a:3,cat:1,d:2,ex:"電気工事士は電気工事業の許可に必要な資格であり、管工事業の専任技術者資格には該当しません。"},
{q:"建築物の用途変更や大規模な改修を行う際に重要な確認事項はどれか？",o:["近隣住民への挨拶","建築基準法への適合性確認（確認申請の要否等）","天気予報の確認","工事保険の加入の有無"],a:1,cat:1,d:2,ex:"用途変更や大規模改修では建築基準法に適合しているかを確認し、必要に応じて確認申請等の手続きを行います。"},
{q:"特定建設業許可を必要とする下請け発注額の基準（建築工事以外）はどれか？",o:["1,000万円以上","4,500万円以上","7,000万円以上","1億円以上"],a:1,cat:1,d:2,ex:"管工事等の建築工事以外は、下請け発注合計額が4,500万円以上の場合に特定建設業許可が必要です（2023年改正）。"},
{q:"「浄化槽法」の目的として正しいものはどれか？",o:["工業排水の浄化を促進するため","し尿・生活雑排水の適正処理により、生活環境の保全と公衆衛生の向上を図るため","工場の廃液処理を規制するため","雨水の有効利用を促進するため"],a:1,cat:1,d:1,ex:"浄化槽法はし尿及び生活雑排水を浄化槽で適正に処理し、公衆衛生向上と生活環境の保全を目的としています。"},
{q:"電気工事士法において、「一般用電気工作物」の工事に従事できる最低限の資格はどれか？",o:["第一種電気工事士","第二種電気工事士","電気主任技術者","なくても良い"],a:1,cat:1,d:1,ex:"一般住宅等の一般用電気工作物の工事には第二種電気工事士以上の資格が必要です。"},
{q:"建設工事で発生する廃棄物の処理について定めた法律はどれか？",o:["建設業法","廃棄物の処理及び清掃に関する法律（廃棄物処理法）","資源有効利用促進法","水道法"],a:1,cat:1,d:1,ex:"工事廃棄物は廃棄物処理法（廃掃法）に基づき適正処理が義務付けられています。特別管理廃棄物は厳格に管理されます。"},
{q:"建設リサイクル法（建設工事に係る資材の再資源化等に関する法律）で分別解体・再資源化が義務付けられる工事の一つとして正しいものはどれか？",o:["延べ床面積20m²以上の建築物解体工事","延べ床面積80m²以上の建築物解体工事","全ての工事","請負代金500万円以上の工事のみ"],a:1,cat:1,d:2,ex:"建設リサイクル法では延べ床面積80m²以上の建築物解体工事等で分別解体・再資源化が義務付けられています。"},
{q:"高圧ガス保安法の規制を受けるガスとして当てはまるものはどれか？",o:["都市ガス（一般家庭用）","LPG（液化石油ガス）ボンベ内のガス","水蒸気","窒素（通常の大気圧状態）"],a:1,cat:1,d:2,ex:"LPGや酸素・アセチレン等の高圧ガスは高圧ガス保安法の規制を受けます。"},
{q:"労働基準法において、18歳未満の年少者が就けない業務として正しいものはどれか？",o:["デスクワーク","土砂崩壊のおそれのある場所での業務や坑内業務","一般事務","軽作業"],a:1,cat:1,d:2,ex:"坑内労働や危険・有害業務は労働基準法により18歳未満の年少者の就業が禁止されています。"},
{q:"建設業における「主任技術者」と「監理技術者」の違いとして正しいものはどれか？",o:["主任技術者は特定建設業の現場に必要","監理技術者は特定建設業者が一定規模以上の工事に配置する","主任技術者は一般建設業のみに必要","両者は同じ資格要件が必要"],a:1,cat:1,d:2,ex:"主任技術者は全現場に必要。監理技術者は特定建設業者が発注者から直接請け負った大規模工事現場に配置します。"},
{q:"水道法第3条において「給水装置」の定義に含まれるものはどれか？",o:["公道内の水道管（配水管）","需要者が設置した給水管と給水用具","水源地の施設","浄水場の設備"],a:1,cat:1,d:2,ex:"給水装置は配水管への取付口から需要者の各給水用具（水栓等）までの設備を指します。"},
{q:"建築基準法における「耐火構造」の壁を配管が貫通する場合の処置として正しいものはどれか？",o:["処置不要","配管と壁との隙間をモルタル等の不燃材料で埋め、防火措置を施す","配管を鋼管にすれば処置不要","配管径を壁厚の1/3以下にすれば処置不要"],a:1,cat:1,d:2,ex:"耐火構造の壁貫通部は、隙間を不燃材料で充填し、配管の種類に応じてFD等の防火措置が必要です。"},
{q:"電気設備の「漏電遮断器（ELCB）」の設置義務に関する法律はどれか？",o:["建設業法","電気設備に関する技術基準を定める省令（電技省令）","労働安全衛生法","水道法"],a:1,cat:1,d:2,ex:"漏電遮断器の設置は電技省令（電気設備に関する技術基準）等で規定されています。工事現場では労安法でも求められます。"},
{q:"「公共工事の品質確保の促進に関する法律（品確法）」の主な目的はどれか？",o:["工事価格の上昇を防ぐ","価格だけでなく技術力等を含む総合的な入札・発注により公共工事の品質を確保する","下請保護","建設業者の倒産を防ぐ"],a:1,cat:1,d:2,ex:"品確法は発注者が技術提案・実績等を評価する総合評価方式を推進し、公共工事の品質確保を目指すものです。"},
{q:"消防法に基づく「屋内消火栓設備」の設置が義務付けられる建物の規模の目安はどれか？",o:["延べ面積100m²以上","延べ面積700m²以上（用途による）","全ての建物","木造建物のみ"],a:1,cat:1,d:2,ex:"屋内消火栓の設置基準は用途・構造・延べ面積により異なりますが、一般的に700m²または延べ面積1400m²が目安となります（用途によって異なります）。"},
{q:"「建築士法」における「設計」と「工事監理」の定義として正しいものはどれか？",o:["設計と工事監理は同じ業務","設計は建築物の図面作成、工事監理はその設計と工事が合致しているか確認する業務","工事監理は施工を直接行う業務","設計は工事の安全管理のみを行う業務"],a:1,cat:1,d:2,ex:"設計は建築物の図面等作成業務、工事監理は設計図書と施工が一致しているか確認する業務で、両者は明確に区別されます。"},
{q:"労働安全衛生法における「特別教育」が必要な業務として正しいものはどれか？",o:["事務作業","フォークリフトの運転・研削砥石の取扱い・低圧電気取扱い等の危険業務","一般的な清掃業務","全ての業務"],a:1,cat:1,d:2,ex:"特別教育は危険・有害業務に従事する前に受講が義務付けられた安全衛生教育です。フォークリフトや電気関係等が対象です。"},
{q:"「建設工事標準下請契約約款」を定めている機関はどれか？",o:["国土交通省","建設業振興基金","中央建設業審議会（中建審）","日本建設業連合会"],a:2,cat:1,d:3,ex:"中央建設業審議会（中建審）は建設工事の標準請負契約約款（民間工事・下請工事等）を作成・勧告しています。"},
{q:"浄化槽の清掃を行うことができる者はどれか？",o:["誰でも可","浄化槽管理者（所有者等）のみ","市町村長の許可を受けた者","水道業者のみ"],a:2,cat:1,d:2,ex:"浄化槽の清掃（汚泥の引き出し等）は浄化槽法により市町村長の許可を受けた業者のみが実施できます。"},
{q:"消防設備士の資格において「甲種」と「乙種」の違いはどれか？",o:["甲種は設置・整備・点検ができ、乙種は整備・点検のみできる","甲種は消防本部が発行し、乙種は都道府県が発行する","甲種は特定施設のみ、乙種は一般施設のみ","資格の種類に違いはない"],a:0,cat:1,d:2,ex:"甲種消防設備士は消防設備の設置工事・整備・点検ができます。乙種は整備・点検のみで設置工事はできません。"},
{q:"建設業法における「下請け代金の支払期限」として規定されているものはどれか？",o:["工事完成後30日以内","工事代金受領後できる限り速やかに（最長1ヶ月以内）","特に規定なし","決算後60日以内"],a:1,cat:1,d:3,ex:"元請は下請け代金を受領したら、下請けへの支払いは受領後最長1ヶ月以内が建設業法で定められています。"},
{q:"「管工事施工管理技術検定」の受験資格（1級・第一次検定）として正しいものはどれか？",o:["実務経験なしで受験可","19歳以上","年齢・学歴・実務経験の要件を満たす者","管工事に従事した全ての者"],a:2,cat:1,d:2,ex:"1級管工事施工管理技術検定（第一次検定）は所定の年齢・学歴・実務経験要件を満たした者が受験できます。"},
{q:"「特定化学物質障害予防規則（特化則）」の規制対象として代表的なものはどれか？",o:["一般的な建築材料","石綿（アスベスト）・クロム化合物等の有害化学物質","普通の水","都市ガス"],a:1,cat:1,d:2,ex:"特化則は石綿・六価クロム・塩素等の特定化学物質を取り扱う業務での健康障害防止を目的とした規則です。"},
{q:"石綿（アスベスト）含有建材の解体・改修工事において必要な届出先はどれか？",o:["市区町村の水道課","労働基準監督署（または都道府県等）","消防署","建設業協会"],a:1,cat:1,d:2,ex:"石綿を含む建材の解体等工事は、石綿障害予防規則に基づき労働基準監督署長（または大気汚染防止法による都道府県知事）への届出が必要です。"},
{q:"「建設業退職金共済制度（建退共）」について正しいものはどれか？",o:["大手ゼネコンだけが加入できる制度","建設業に従事する労働者の退職金の確保を目的とした制度","任意加入で公共工事に無関係","国内工事に限らず海外工事も対象"],a:1,cat:1,d:2,ex:"建退共は中小建設業者の労働者を対象とした退職金制度で、公共工事では加入が条件とされることが多いです。"},
{q:"ガス事業法において、一般家庭へのガス供給に使用される「ガス用ポリエチレン管（PE管）」の設置工事ができる資格はどれか？",o:["ガス主任技術者","PE管施工士","ガス機器設置スペシャリスト","特に資格は不要"],a:1,cat:1,d:3,ex:"ガス用ポリエチレン管の施工はガス事業者が認定するPE管施工士の資格を有する者が実施します。"},
{q:"「公共建築工事標準仕様書」は誰が作成・公表しているか？",o:["日本建設業連合会","建設業振興基金","国土交通省大臣官房官庁営繕部","日本工業規格（JIS）"],a:2,cat:1,d:2,ex:"公共建築工事標準仕様書（建築・電気設備・機械設備編）は国土交通省大臣官房官庁営繕部が作成しています。"},
{q:"建物の「確認済証」と「検査済証」の違いとして正しいものはどれか？",o:["両者は同じもの","確認済証は着工前、検査済証は工事完了検査後に交付される","確認済証は完了後、検査済証は着工前","どちらも施工中に交付される"],a:1,cat:1,d:1,ex:"確認済証は着工前の建築確認後、検査済証は工事完了後の完了検査合格時に交付されます。"},
{q:"工事現場の「安全管理」において「ヒヤリハット」とは何か？",o:["重大な事故が起きたこと","事故には至らなかったが、ヒヤリとした・ハッとした危険な体験","安全標識の一種","安全パトロールの手法"],a:1,cat:1,d:1,ex:"ヒヤリハットは事故未遂事例のことで、1件の重大事故の背後に29の軽微事故、300のヒヤリハットがあるとするハインリッヒの法則が有名です。"},
{q:"「産業廃棄物管理票（マニフェスト）」の主な目的はどれか？",o:["工事の工程管理","産業廃棄物の処理状況を確認し不法投棄を防ぐ","建設資材の品質管理","下請業者の管理"],a:1,cat:1,d:1,ex:"マニフェスト（産廃管理票）は産業廃棄物が適正に運搬・処分されたかを排出事業者が確認するための書類です。"},
{q:"「建設工事現場における安全衛生推進者」の選任が義務付けられる常時使用労働者数はどれか？",o:["5人以上10人未満","10人以上50人未満","50人以上100人未満","100人以上"],a:1,cat:1,d:3,ex:"常時10人以上50人未満の事業所は安全衛生推進者の選任が義務付けられています（50人以上は安全管理者等）。"},
{q:"「簡易専用水道」の管理基準について定めた法律はどれか？",o:["建築基準法","水道法","下水道法","消防法"],a:1,cat:1,d:2,ex:"簡易専用水道（受水槽容量10m³超の貯水槽水道）は水道法に基づき定期検査・管理基準が定められています。"},
{q:"「小規模貯水槽水道（受水槽の有効容量10m³以下）」の管理は主にどの法律で規定されるか？",o:["建築基準法","各自治体の条例等","水道法","消防法"],a:1,cat:1,d:2,ex:"10m³以下の小規模貯水槽水道は水道法の適用外ですが、各都道府県・市区町村の条例等で管理基準が定められています。"},
{q:"「労働安全衛生法」における「クレーン等安全規則」で、クレーンを使用する際に必要な資格はどれか？",o:["特に資格は不要","クレーン・デリック運転士免許（または特別教育修了）","管工事施工管理技士","建設機械施工技術検定合格"],a:1,cat:1,d:2,ex:"クレーン運転には吊り上げ荷重等に応じてクレーン・デリック運転士免許または特別教育の修了が必要です。"},
{q:"「建設業法」における「許可の種類」として正しいものはどれか？",o:["国土交通大臣許可と都道府県知事許可","国許可と市区町村許可","一般許可と特別許可","営業許可と工事許可"],a:0,cat:1,d:2,ex:"建設業許可は2以上の都道府県に営業所がある場合は国土交通大臣許可、1都道府県内のみは知事許可となります。"},
{q:"「道路法」における道路占用許可が必要となる場合はどれか？",o:["建物内の配管工事","公道の地下に給排水管を埋設する場合","私有地内での工事","建物屋上への機器設置"],a:1,cat:1,d:2,ex:"公道（国道・都道府県道・市町村道）の地下に配管を埋設する場合は道路管理者の道路占用許可が必要です。"},
{q:"「騒音規制法」に基づく規制について正しいものはどれか？",o:["建設工事の騒音は全て規制外","特定建設作業（くい打ち機・圧縮機等の使用）は市区町村長への届出が必要","全ての工事で24時間作業が禁止","住宅地以外では規制なし"],a:1,cat:1,d:2,ex:"くい打ち機・削岩機・空気圧縮機等を使用する特定建設作業は騒音規制法により届出と規制基準遵守が必要です。"},
{q:"「廃棄物の処理及び清掃に関する法律」における「特別管理産業廃棄物」の例として正しいものはどれか？",o:["コンクリート廃材","廃石綿・廃PCB・廃油（引火性）等の有害廃棄物","一般廃棄物","剪定廃材"],a:1,cat:1,d:2,ex:"特別管理産業廃棄物は廃PCB・廃石綿・感染性廃棄物・廃油（引火性）等、特に有害性の高い廃棄物です。"},
{q:"「建築基準法」における「設備設計一級建築士」の業務として正しいものはどれか？",o:["全ての建築物の構造設計","一定規模以上の建築物の設備設計および設備設計の確認","一般住宅の建築確認申請","解体工事の設計"],a:1,cat:1,d:2,ex:"設備設計一級建築士は、延べ面積2,000m²超の建築物の設備設計や他の一級建築士が行った設備設計の確認業務を行います。"},
{q:"建設業許可を受けずに請け負うことができる工事（軽微な工事）の金額として正しいものはどれか？",o:["建築一式工事：請負金額500万円未満、その他工事：200万円未満","建築一式工事：請負金額1,500万円未満または延べ面積150m²未満の木造住宅、その他工事：500万円未満","全ての工事で300万円未満","金額に関係なく許可が必要"],a:1,cat:1,d:2,ex:"軽微な工事の基準：建築一式は1,500万円未満または延べ面積150m²未満の木造住宅、それ以外は500万円未満です。"},
{q:"「給水装置工事主任技術者試験」を実施する機関はどれか？",o:["国土交通省","日本水道協会","公益財団法人 給水工事技術振興財団","各都道府県水道局"],a:2,cat:1,d:2,ex:"給水装置工事主任技術者試験は公益財団法人給水工事技術振興財団（給技財団）が実施しています。"},
{q:"「消防法」第17条で定められている消防用設備等の設置・維持の義務者はどれか？",o:["消防署","設計者","防火対象物の関係者（所有者・管理者・占有者）","施工業者"],a:2,cat:1,d:2,ex:"消防用設備の設置・維持の義務は防火対象物の関係者（所有者・管理者・占有者）に課せられています。"},

// ============ 工具・材料・施工方法（約65問）============
{q:"塩ビ管のカットに最も適した工具はどれか？",o:["ガスバーナー","塩ビカッター（パイプカッター）またはノコギリ","電気ドリル","グラインダー"],a:1,cat:2,d:1,ex:"塩ビ管の切断には専用の塩ビカッターやノコギリ（金属ノコ）が使用されます。バリが出た場合はリーマーで仕上げます。"},
{q:"鋼管のねじ切りに使用する工具はどれか？",o:["パイプベンダー","チェーントング","リードバイス（ダイヘッド）付きねじ切り機","ハンドルクランプ"],a:2,cat:2,d:1,ex:"鋼管のねじ切りにはリードバイス（ダイヘッド）付きの電動ねじ切り機または手動ねじ切り機を使用します。"},
{q:"配管の「フランジ接合」を締め付ける際の正しいボルト締め方法はどれか？",o:["一か所ずつ順番に締める","対角方向（クロス）に均等に締める","外側から内側に向かって締める","内側から外側に向かって締める"],a:1,cat:2,d:1,ex:"フランジのボルトは対角（クロス）に交互に締めることでフランジ面の歪みを防ぎ、均等な面圧が得られます。"},
{q:"銅管のろう付けで使用する「フラックス」の目的はどれか？",o:["ろう材を硬化させる","酸化膜の除去と溶融ろう材の濡れ性向上","管を着色する","管の強度を高める"],a:1,cat:2,d:2,ex:"フラックスは加熱時の酸化を防ぎ、ろう材の流れをよくする（濡れ性向上）ために塗布します。"},
{q:"配管支持金物「Uバンド」の主な用途はどれか？",o:["管端を塞ぐ","配管を壁・天井・床などの構造体に固定支持する","管を接続する","管内を清掃する"],a:1,cat:2,d:1,ex:"UバンドはU字型の支持金物で、配管を挟み込んでアンカーボルトや吊りボルト等で構造体に固定します。"},
{q:"「リーマー」の用途はどれか？",o:["管のねじ切り","管の切断端面のバリ取り・面取り","管の曲げ加工","管の穿孔"],a:1,cat:2,d:1,ex:"リーマーは配管の切断面に生じたバリを除去し、端面を滑らかに整えるために使用します。"},
{q:"ステンレス管のプレス接合に使用する専用工具はどれか？",o:["チェーントング","電動油圧プレス工具","手動ねじ切り機","パイプベンダー"],a:1,cat:2,d:2,ex:"ステンレス管のプレス接合は電動油圧プレス工具（プレス機）でOリングが封入されたフィッティングを管に押し圧して接合します。"},
{q:"配管施工後の「気密試験」で使用する主な媒体はどれか？",o:["水","窒素ガスまたは空気（乾燥空気）","蒸気","油"],a:1,cat:2,d:2,ex:"気密試験には窒素ガスや乾燥空気を使用します。漏れ確認には発泡液（石鹸液等）を塗布します。"},
{q:"ポリエチレン管（PE管）の接合方法として使用されるものはどれか？",o:["ろう付け接合","電気融着（EF）接合または熱融着（バット）接合","接着接合","ねじ接合"],a:1,cat:2,d:2,ex:"PE管の接合はEFカプラー（電熱コイル内蔵継手）を使った電気融着接合や、バットフュージョン（熱融着）が用いられます。"},
{q:"「モンキーレンチ」と「スパナ」の違いとして正しいものはどれか？",o:["両者は全く同じ工具","モンキーレンチは開口幅を調整可能、スパナは固定サイズ","スパナの方がサイズ調整できる","モンキーレンチはねじのみに使う"],a:1,cat:2,d:1,ex:"モンキーレンチは口幅を無段階に調整できる汎用工具、スパナはナットサイズに合わせた固定幅の工具です。"},
{q:"配管工事で「トーチランプ（ガストーチ）」を使用する主な目的はどれか？",o:["配管の塗装","銅管のろう付けや凍結配管の解凍","プラスチック管の接着","配管の切断"],a:1,cat:2,d:1,ex:"トーチランプはプロパン・ブタン等のガスを燃焼させて高温炎を発生させる工具で、銅管のろう付けや凍結解凍に使います。"},
{q:"「インサート」を使用する目的はどれか？",o:["管内の流量を調節する","コンクリートへのアンカー設置（吊りボルト等の埋め込み固定具）","配管の向きを変える","管の端部を保護する"],a:1,cat:2,d:1,ex:"インサートはコンクリート打設前に型枠に設置し、配管の吊りボルト等を取り付けるための埋め込み金物です。"},
{q:"「チーズ（T字継手）」の主な用途はどれか？",o:["管の曲げ","管の分岐","管の延長（直線接続）","管の端部封止"],a:1,cat:2,d:1,ex:"チーズ（T継手）は直管からT字に分岐するための継手です。同径・異径があります。"},
{q:"「シールテープ（テフロンテープ）」はどのように使用するか？",o:["管の外面全体に巻く","ねじ山に沿ってねじを進める方向に巻く","継手の外側に巻く","接着剤として使う"],a:1,cat:2,d:1,ex:"シールテープはテーパーねじのシール材で、ねじ山の進行方向（ねじ込む方向）に2〜3回巻き付けます。逆に巻くと外れやすくなります。"},
{q:"「パイプベンダー」を使用する目的はどれか？",o:["管のねじ切り","管の曲げ加工","管の切断","管の穿孔"],a:1,cat:2,d:1,ex:"パイプベンダーは配管を任意の角度に曲げるための工具です。銅管・鉄管・鋼管等の曲げに使用します。"},
{q:"塩ビ管の接着剤を塗布した後、差し込んで保持すべき時間（養生時間）の目安として正しいものはどれか？",o:["約10秒","約30〜60秒","約5分","塗布後すぐに離してよい"],a:1,cat:2,d:2,ex:"塩ビ管の接着接合後は、接着剤が安定するまで30〜60秒程度保持することが推奨されます。その後も養生時間が必要です。"},
{q:"鋼管（白管・黒管）のねじ接合に使用する「ねじ込み継手」の材質として一般的なものはどれか？",o:["プラスチック製","ステンレス鋼製","可鍛鋳鉄（マレアブル）製または鋳鉄製","銅合金製"],a:2,cat:2,d:2,ex:"鋼管のねじ込み継手は可鍛鋳鉄（マレアブル）製が一般的です。高圧用や防食用にはステンレス製も使用されます。"},
{q:"配管の「勾配」を確認するために使用する工具はどれか？",o:["スケール（メジャー）","水平器（レベル・勾配器）","トルクレンチ","パイプカッター"],a:1,cat:2,d:1,ex:"排水管等の勾配確認には水平器（レベル）または専用の勾配器（クリノメーター等）を使用します。"},
{q:"「ストレーナー（Yストレーナー）」の役割はどれか？",o:["流量を調節する","流体中の異物（ゴミ・サビ）を捕捉する","逆流を防ぐ","圧力を調節する"],a:1,cat:2,d:1,ex:"Yストレーナーは配管内を流れる流体中の異物を金網（メッシュ）で捕捉し、機器や弁を保護します。定期的な清掃が必要です。"},
{q:"「ハンマードリル（振動ドリル）」の主な用途はどれか？",o:["木材へのネジ止め","コンクリート・石材への穿孔","金属板の切断","溶接"],a:1,cat:2,d:1,ex:"ハンマードリルは回転+打撃の組み合わせでコンクリートや石材に効率よく穴をあける工具です。アンカー取付等に使用します。"},
{q:"配管工事で使用する「レシプロソー（セーバーソー）」の用途はどれか？",o:["配管の曲げ加工","既存管の切断・解体","配管のねじ切り","管の溶接"],a:1,cat:2,d:1,ex:"レシプロソーは往復刃で金属・樹脂・木材等を切断できる電動工具で、狭い場所での既存管の切断・解体に特に有効です。"},
{q:"「ファイヤーダンパー（FD）」を配管貫通部ではなくダクト貫通部に設置する主な理由はどれか？",o:["空調ダクトが防火区画を貫通する場合に火災時のダクト経路での延焼を防ぐため","ダクト内の風量を調節するため","ダクトの振動を防ぐため","ダクトを保温するため"],a:0,cat:2,d:2,ex:"FD（ファイヤーダンパー）は防火区画貫通ダクトに設置し、火災時にダクト内の火炎・煙の伝播を遮断する機器です。"},
{q:"「トルクレンチ」を使用する目的はどれか？",o:["管のねじ切り","ボルト・ナットを規定トルクで締め付ける","管の切断","管の曲げ"],a:1,cat:2,d:1,ex:"トルクレンチは締め付けトルク（回転力）を管理する工具で、フランジボルトや機器取付ボルトを規定値で締め付けます。"},
{q:"配管の保温材として最も広く使用されるものはどれか？",o:["木材","グラスウール・ロックウール・発泡ポリエチレン等","新聞紙","コンクリート"],a:1,cat:2,d:1,ex:"配管保温にはグラスウール・ロックウール（高温用）、発泡ポリエチレン・ポリスチレンフォーム（中低温用）が広く使われます。"},
{q:"「クランプ式超音波流量計」の特徴はどれか？",o:["管を切断して取り付ける必要がある","管の外面から非接触で流量を計測できる","液体にのみ使用できる","精度が低い"],a:1,cat:2,d:3,ex:"クランプ式超音波流量計は管外壁にセンサーを取り付けるだけで管を切断せずに流量を計測できます。断水不要で既設管への取付が容易です。"},
{q:"「ねじ込み接合」において「チョイ戻し（バックテーパー）」とはどういう意味か？",o:["ねじを完全に締め込んだ後、少し緩める","ねじを初めから緩く接合する方法","ねじを逆方向に切る","ねじ山の形状の一種"],a:0,cat:2,d:3,ex:"ねじ込み接合でフランジや継手の向きを調整するために一旦強く締め、少し緩めて位置を決める方法がチョイ戻しです。漏れのリスクが伴います。"},
{q:"「グラインダー（ディスクグラインダー）」を配管工事で使用する主な目的はどれか？",o:["配管の塗装","鋼管等の切断・研磨・バリ取り","配管の曲げ","管のねじ切り"],a:1,cat:2,d:1,ex:"グラインダーは鋼管・鉄管等の切断、溶接後のスパッタ除去、バリ取りなど、金属加工に幅広く使用します。"},
{q:"「フレキシブル管（可撓管）」を機器と配管の接続部に使用する理由はどれか？",o:["コストが安いから","機器の振動・地震変位・熱膨張を吸収して配管への応力を低減するため","施工が難しいから","見た目がよいから"],a:1,cat:2,d:2,ex:"フレキシブル管はポンプ・コンプレッサー等の機器が発生する振動を吸収し、配管へのストレスや騒音伝搬を防ぎます。"},
{q:"配管の「アイソレーション」とは何か？",o:["配管を壁に固定すること","弁等を閉止して配管系統を切り離し、安全に作業できる状態にすること","配管に保温材を巻くこと","配管の漏れ試験のこと"],a:1,cat:2,d:3,ex:"アイソレーション（系統切り離し）は弁閉止・ロックアウト・タグアウト等の安全手順により系統を切り離し、誤操作による事故を防ぎます。"},
{q:"「電動チェーンブロック」を配管工事で使用する場面はどれか？",o:["配管のねじ切り","重い機器・配管の吊り上げ・移動","管の切断","配管の曲げ"],a:1,cat:2,d:1,ex:"電動チェーンブロックは電動でチェーンを巻き上げる揚重機で、重い機器や長い配管の吊り上げ・位置決めに使用します。"},
{q:"「ポリエチレンライニング鋼管（SGP-PL）」に継手を接続する際の注意事項はどれか？",o:["一般の鋼管用ねじ込み継手がそのまま使用できる","専用の管端防食継手（管端コア付き）を使用しないと管端部が腐食する","ろう付けが必要","接着接合が必要"],a:1,cat:2,d:2,ex:"SGP-PLはライニング端部が露出しないよう管端防食コア（継手インサート）入りの専用継手を使用します。コアなし継手では管端が腐食します。"},
{q:"「ガス溶接」で使用するアセチレンと酸素の混合比について正しいものはどれか？",o:["アセチレン：酸素＝1：1が標準（中性炎）","アセチレンのみで溶接できる","酸素のみで溶接できる","比率は常に一定である必要はない"],a:0,cat:2,d:3,ex:"アセチレン（燃料）と酸素を約1:1で混合すると中性炎が得られ、標準的な溶接・ろう付けに使用します。"},
{q:"「レベル（水平器）」の種類として正しくないものはどれか？",o:["気泡式水平器","レーザー墨出し器","デジタル水平器","電動インパクト"],a:3,cat:2,d:1,ex:"電動インパクトはねじ締め工具であり、水平・レベル確認には使用しません。気泡式・レーザー・デジタル水平器が正解です。"},
{q:"「TIG溶接」の特徴として正しいものはどれか？",o:["スパッタが多い","不活性ガス（アルゴン等）で溶融池を保護し、精密で美しいビードが得られる","電源不要で使える","主に厚板鉄骨に使用される"],a:1,cat:2,d:3,ex:"TIG溶接はタングステン電極と不活性ガスを使用した精密な溶接法で、ステンレス管・チタン管等の溶接に多用されます。"},
{q:"「圧力計」を配管系統に設置する主な目的はどれか？",o:["流速を測定する","系統内の圧力を確認・管理する","流量を測定する","水温を確認する"],a:1,cat:2,d:1,ex:"圧力計は配管系統の圧力を表示し、異常な圧力上昇や低下を検知するために使用します。"},
{q:"「ファイバースコープ（内視鏡カメラ）」を配管工事で使用する場面はどれか？",o:["配管の保温","配管内部の詰まりや損傷の確認・調査","配管の切断","配管のねじ切り"],a:1,cat:2,d:2,ex:"ファイバースコープ（配管内視鏡カメラ）は配管を開口せずに内部状態（腐食・詰まり・異物等）を映像で確認するために使用します。"},
{q:"配管の「ろう付け」後に行う「フラックスの洗浄」の目的はどれか？",o:["管の塗装のため","残留フラックスが腐食を引き起こすため","管の保温のため","強度を高めるため"],a:1,cat:2,d:2,ex:"フラックスは残留すると腐食（フラックス腐食）を引き起こすため、ろう付け後は温水等でよく洗浄する必要があります。"},
{q:"「防振継手（防振管継手）」を使用する目的はどれか？",o:["管の腐食を防ぐ","ポンプ等の振動・騒音が配管を通じて建物に伝わるのを防ぐ","管の凍結を防ぐ","水質を改善する"],a:1,cat:2,d:2,ex:"防振継手はゴム等の弾性体を内蔵し、機械の振動・騒音が配管を通して建物躯体や他の部屋に伝わるのを防ぎます。"},
{q:"「チャンネル支持架台（Cチャンネル）」を使用する配管支持の方法はどれか？",o:["配管を壁に直接溶接する","Cチャンネル鋼材でフレームを組み、複数の配管を一体的に支持する","配管をロープで吊る","配管を釘で固定する"],a:1,cat:2,d:2,ex:"Cチャンネル（リップ溝形鋼）を使ったラック（架台）は複数の配管をまとめて整然と支持できる合理的な配管支持方法です。"},
{q:"「発泡ウレタン（スプレーフォーム）」を配管工事で使用する場合の目的はどれか？",o:["配管の接合","貫通孔の充填（気密・防音・保温）または管の保温","配管の塗装","腐食防止コーティング"],a:1,cat:2,d:2,ex:"発泡ウレタンは貫通孔や隙間の充填（気密・防音・防虫）や、配管の保温・断熱にも使用されます。"},
{q:"「ポリエチレン管（HDPE管）」の特徴として正しいものはどれか？",o:["曲げることができない","耐薬品性・耐腐食性に優れ、可撓性がある","ろう付けで接合できる","高温では使用できない（50℃以上）"],a:1,cat:2,d:2,ex:"HDPE管は耐薬品性・耐食性に優れ、適度な柔軟性があります。地中埋設・水道・農業用水等で広く使用されます。"},
{q:"「ドレン弁（排水弁）」を配管系統の低部に設ける目的はどれか？",o:["圧力を調整する","系統内の水（ドレン）を排出する","逆流を防ぐ","流量を調節する"],a:1,cat:2,d:1,ex:"ドレン弁は配管系統内の滞留水・凝縮水を排出するために配管の最低部に設けます。冬季凍結防止のための水抜きにも使用します。"},
{q:"「ボール弁」の特徴として正しいものはどれか？",o:["流量の微調整が得意","1/4回転（90度）で全開・全閉が可能で、開閉が素早い","逆止弁として使用できる","常に一定の流量を保持する"],a:1,cat:2,d:1,ex:"ボール弁はボールを1/4回転させるだけで全開・全閉でき、操作が素早く確実です。圧力損失が少なく広く使われます。"},
{q:"「ゲート弁（仕切弁）」の特徴として正しいものはどれか？",o:["1/4回転で開閉できる","全開時の圧力損失が小さいが開閉に時間がかかる","逆止機能がある","スプリングで自動閉止する"],a:1,cat:2,d:2,ex:"ゲート弁は板（ゲート）を上下させて流路を開閉します。全開時は流体の抵抗が小さいが、多回転が必要で開閉に時間がかかります。"},
{q:"「グローブ弁（玉形弁）」の特徴として正しいものはどれか？",o:["全開時の圧力損失が非常に小さい","流量調節に適しており、精密な制御ができる","1/4回転で全開・全閉できる","逆流防止機能がある"],a:1,cat:2,d:2,ex:"グローブ弁（玉形弁）はバルブ内部で流体の流れ方向が変化するため圧力損失は大きいですが、スピンドル式で微細な流量調節が可能です。"},
{q:"「バタフライ弁」が大口径配管に多く使用される理由はどれか？",o:["コストが高いため","軽量・コンパクトで、大口径でも操作が容易なため","精密な流量制御ができるため","耐圧性が最も高いため"],a:1,cat:2,d:2,ex:"バタフライ弁は円板（ディスク）を回転させる弁で、大口径でも弁体が軽く薄いため、全体が軽量・コンパクトで操作しやすいです。"},
{q:"施工後の「通水試験（漏水試験）」において確認すること以外のものはどれか？",o:["継手部の漏水","支持金物の取り付け状態","管の色の変化","弁の開閉操作確認"],a:2,cat:2,d:2,ex:"通水試験では継手・弁・機器接続部の漏水確認、支持状態の確認、弁の操作確認等を行います。管の色は通水試験では確認しません。"},
{q:"「保温（断熱）施工」を配管に施す主な目的はどれか？",o:["配管の強度を高める","熱損失防止・結露防止・凍結防止","配管の識別のため","腐食防止"],a:1,cat:2,d:1,ex:"配管保温の目的は熱の損失防止（省エネ）、低温管の結露防止、寒冷地での凍結防止の3つが主です。"},
{q:"「電食（電気腐食）」が発生しやすい状況はどれか？",o:["全ての配管で等しく発生する","異種金属配管が接触（電位差がある）する場合や迷走電流が流れる場合","配管内の水温が高い場合","配管径が大きい場合"],a:1,cat:2,d:3,ex:"電食は電位差のある異種金属接触部（ガルバニック腐食）や迷走電流（電鉄等）の影響を受ける配管で発生します。絶縁継手で防止できます。"},
{q:"「ガス配管施工」において、継手接続後に漏れ確認で使用するものはどれか？",o:["水","石鹸水（発泡液）","火","塩素ガス"],a:1,cat:2,d:1,ex:"ガス配管の漏れ確認は石鹸水（または専用発泡液）を継手周辺に塗り、泡立ちがないことを確認します。絶対に火は使いません。"},
{q:"「硬質銅管（K・L・Mタイプ）」の違いとして正しいものはどれか？",o:["外径が異なる","肉厚が異なる（Kが最も厚く、Mが最も薄い）","材質が異なる","接合方法が異なる"],a:1,cat:2,d:3,ex:"銅管はK（最厚）・L・M（最薄）で肉厚が異なります。Kは高圧・医療用、Lは一般給水・給湯、Mは低圧系統に使用されます。"},
{q:"「配管識別」のためにテープや塗装を使用する。水道配管（給水）の識別色はどれか？",o:["青（水色）","赤","緑","黒"],a:0,cat:2,d:1,ex:"給水管（水）の識別色は青（水色）です。JIS Z 9102に基づく配管識別では流体の種類によって色が定められています。"},
{q:"「ライニング鋼管の切断」で使用する工具として最も適切なものはどれか？",o:["ガス切断（酸素アセチレン）","鋸（メタルソー等）またはパイプカッター","グラインダーで高速切断","レーザー切断"],a:1,cat:2,d:2,ex:"ライニング鋼管の切断には内面ライニングを傷めないよう、鋸（帯鋸・メタルソー等）やスクリュー式パイプカッターが推奨されます。高熱を伴うガス・グラインダー切断は不適切です。"},
{q:"「スリーブ」を壁・床・天井に設ける目的はどれか？",o:["構造を補強するため","配管を貫通させるための孔（保護管）として設けるため","断熱のため","壁の仕上げのため"],a:1,cat:2,d:1,ex:"スリーブは配管が壁・床・天井を貫通する箇所に先行して埋め込む保護管（鋼管・塩ビ管等）で、配管の取り替えや交換を容易にします。"},
{q:"「電動インパクトドライバー」と「ドリルドライバー」の主な違いはどれか？",o:["電動インパクトは穿孔専用","電動インパクトは打撃力（回転+衝撃）でネジをより強力に締め付けられる","ドリルドライバーの方が強力","両者は全く同じ"],a:1,cat:2,d:1,ex:"電動インパクトドライバーは回転に加えて打撃（インパクト）機構があり、長ビスや固いネジをより強力に締め付けられます。ドリルドライバーは回転のみです。"},

// ============ Wordまとめ＋URLより追加（約50問）============
// --- 塩ビ管（VU/VP/HIVP/HT）施工・継手 ---
{q:"VU管の埋設施工時、管の周囲に砕石や尖った石が当たらないよう「均し砂」を敷く主な理由はどれか？",o:["管が重くなるから","VU管は肉薄で傷つきやすく破損リスクが高いから","砂の方が安いから","石を再利用するため"],a:1,cat:2,d:2,ex:"VU管はVP管より肉薄なため、尖った石や砕石が直接接触すると破損しやすい。均し砂を敷いて管を保護することが重要です。"},
{q:"塩ビ管（VU・VP）の接着接合時、継手側に塗る接着剤の量についての正しい説明はどれか？",o:["継手側には塗らなくてよい","継手側はパイプ側より薄く塗る","継手側をパイプ側より厚く塗る","両面同量でなければならない"],a:1,cat:2,d:2,ex:"塩ビ接着剤を継手側に多く塗りすぎると、挿入時に溶けた塩ビが外へはみ出しにくくなります。継手側は薄め、パイプ側は少し多めが基本です。"},
{q:"塩ビ管を継手に差し込む際、「回しながら挿入する」理由として正しいものはどれか？",o:["より深く挿入するため","接着剤の塗りムラをなくすため","管が抜けにくくなるから","継手を固定するため"],a:1,cat:2,d:2,ex:"回しながら挿入することで接着剤の塗り斑（ムラ）がなくなり、均一な接合面が得られます。"},
{q:"塩ビ管の埋設時、「管の文字（口径表示）を上向きに埋める」理由はどれか？",o:["見た目がよいから","将来管が破損した時に地面を少し掘れば口径が確認できるから","規格で決められているから","文字が消えにくいから"],a:1,cat:2,d:2,ex:"管の口径を表示する文字を上向きに向けると、将来の補修時に管を全て掘り出さなくても口径が確認できます。"},
{q:"VP管・HIVP管の施工で「クロスコネクション」が最も危険とされる理由はどれか？",o:["配管が複雑になるから","異なる水源が接続されると水質汚染・健康被害につながるから","工事費が高くなるから","管が破損しやすいから"],a:1,cat:2,d:2,ex:"クロスコネクションは市水道・井戸・雑用水など異なる水源の配管を誤接続することで、深刻な水質汚染を引き起こします。バルブや逆止弁を付けても根本的な解決にはなりません。"},
{q:"HT管（耐熱塩ビ管）の施工で最も注意すべき点はどれか？",o:["接着剤が不要","熱による伸縮が非常に大きく、直線配管での拘束は厳禁","重量が重い","接着時間が短い"],a:1,cat:2,d:2,ex:"HT管は熱伸縮が非常に大きく、直線配管で両端を固定（拘束）すると管が曲がったり破損する恐れがあります。露出配管では「逃げ」となるルート取りが必要です。"},
{q:"HT管のエンビカッターでの切断時に特に注意すべきことはどれか？",o:["必ずゆっくり切ること","勢いよく切ると割れることがある","必ずグラインダーを使うこと","水に濡らしてから切ること"],a:1,cat:2,d:2,ex:"HT管は他の塩ビ管と異なり硬く脆い性質があり、エンビカッターで勢いよく切ると割れることがあります。丁寧に慎重な切断が必要です。"},
{q:"塩ビ管の接着後、力を抜いても「管と継手が動かなければ接合完了」といえる理由はどれか？",o:["接着剤が乾いたから","継手のテーパーとパイプの弾性で固定されているから","ビスで固定したから","溶接されたから"],a:1,cat:2,d:3,ex:"塩ビのTS継手（テーパー受口継手）は継手受口がテーパー形状になっており、パイプの弾性と相まって接着後の抜けを防いでいます。"},
{q:"塩ビ接着剤の「ソルベントクラック」とはどのような現象か？",o:["接着剤が固まらない現象","溶剤の存在・応力・低温の3要因が重なり、塩ビにひび割れが生じる現象","接着剤が管の色を変える現象","接着剤が剥がれる現象"],a:1,cat:2,d:3,ex:"ソルベントクラックは溶剤（接着剤）・残留応力・低温の条件が重なった時に発生する亀裂現象です。接着剤の塗りすぎや低温下での施工で起こりやすくなります。"},
{q:"塩ビ管（TS接合）の差し込み量の目安として正しいものはどれか？",o:["管端が継手の奥に当たるまでのみ","軽く挿入して止まる位置（ゼロポイント）＋受口長さの1/3","全挿入量の半分","管径mm数と同じcmの長さ"],a:1,cat:2,d:3,ex:"差し込み量の目安はゼロポイント（軽く止まる位置）プラス受口長さの1/3です。差し込み量をマーキングしておくと施工不良を防げます。"},

// --- 銅管施工 ---
{q:"銅管のろう付けで「フラックスを塗る」正しい手順はどれか？",o:["加熱した後にフラックスを塗る","管と継手をペーパーで研磨・清掃してからフラックスを塗る","フラックスなしでも施工できる","継手にだけ塗ればよい"],a:1,cat:2,d:2,ex:"銅管ろう付けは、まず管と継手の接合面をペーパー等で研磨・脱脂し、酸化膜を除去してからフラックスを均一に塗布します。加熱前の清掃が品質の鍵です。"},
{q:"銅管ろう付け後に「フラックスの洗浄」が必要な理由として正しいものはどれか？",o:["見た目をきれいにするため","残留フラックスが腐食（フラックス腐食）を引き起こすため","管を冷やすため","錆止めのため"],a:1,cat:2,d:2,ex:"ろう付け後にフラックスが残留すると、配管内部や外面でフラックス腐食（孔食）を引き起こします。施工後は温水等でしっかり洗浄することが必要です。"},
{q:"銅管と鋼管・ステンレス管以外の異種金属（例：亜鉛メッキ鋼管）を直接接続する場合に発生するリスクはどれか？",o:["管が詰まる","電食（ガルバニック腐食）が発生する","水圧が上がる","水温が上がる"],a:1,cat:2,d:2,ex:"銅と亜鉛メッキ鋼管など電位差のある異種金属が接触すると電食（ガルバニック腐食）が発生します。絶縁継手で防止します。なお銅とステンレスは電位差が近く、直接接続しても問題は少ないとされています。"},
{q:"銅管の地中埋設時、通水試験後に行う「防食テープ巻き」の目的はどれか？",o:["管の補強","銅の露出部分を土壌腐食・電食から保護するため","管の識別のため","保温のため"],a:1,cat:2,d:2,ex:"地中では土壌中の電位差や水分による腐食が進行しやすいため、銅が剥き出しになっている部分は防食テープで保護します。"},
{q:"銅管継手の「ソルジャージョイント」の特徴として正しいものはどれか？",o:["電気融着で接合する","片方がハンダ接合でもう片方が袋ナットになっており、器具接続によく使われる","ねじ込み専用継手","フランジ接合用継手"],a:1,cat:2,d:3,ex:"ソルジャージョイントは一端がろう付け接合、他端が袋ナットになっており、給水栓など器具との接続部によく使用されます。"},

// --- ポリ管（架橋ポリ・PE・PP・HPPE）---
{q:"架橋ポリエチレン管（架橋ポリ）のワンタッチ式継手で最も重要な施工ポイントはどれか？",o:["接着剤を均一に塗ること","管の切断面を直角にして差し込み量を正確に管理すること","フランジを均等締めすること","高温で加熱してから接合すること"],a:1,cat:2,d:2,ex:"架橋ポリのワンタッチ継手は切断面が斜めだったりバリが残っていると漏水の原因になります。専用カッターで直角切断し、差し込み量を正確に管理することが最重要です。"},
{q:"ポリ管（PE・PP・HPPE）の用途の違いとして正しいものはどれか？",o:["全て同じ用途で使える","PE=一般給水、PP=耐熱性向上、HPPE=高圧対応と圧力条件が異なる","PE=給湯専用、PP=排水専用","口径の違いのみ"],a:1,cat:2,d:2,ex:"PE（一般給水）、PP（耐熱性向上・給湯対応）、HPPE（高圧配管対応）はそれぞれ圧力・温度条件が異なります。加圧給水や井戸ポンプ使用時は耐圧に余裕のある管種を選定します。"},
{q:"架橋ポリエチレン管の曲げ配管を行う際の注意事項はどれか？",o:["自由に曲げてよい","メーカーが定める最小曲げ半径を守る必要がある","加熱してから曲げなければならない","曲げ配管は禁止されている"],a:1,cat:2,d:2,ex:"架橋ポリは柔軟性があり曲げ配管が可能ですが、製品ごとの最小曲げ半径を下回ると管が折れたり内径が変形して流量が低下します。"},
{q:"ポリエチレン管（HDPE管）のEF（電気融着）接合で使用する「コントローラー」の役割はどれか？",o:["管の切断","EFカプラーの電熱コイルに規定の電流・電圧・時間を管理して通電し融着を完成させる","管の曲げ加工","施工図面の管理"],a:1,cat:2,d:3,ex:"EF接合では専用コントローラーがEFカプラーのバーコードを読み取り、最適な通電条件（電流・電圧・時間）を自動で管理します。通電不足・過多は接合不良になります。"},

// --- ステンレス管（SUS）---
{q:"ステンレス管のねじ接合でシール材（シールテープ・シール剤）の巻き過ぎが問題になる理由はどれか？",o:["シール材がもったいないから","過度な巻き過ぎが継手の割れ（クラック）を誘発する場合があるから","水質に影響するから","漏水しやすくなるから"],a:1,cat:2,d:2,ex:"ステンレス管のねじ接合でシール材を巻き過ぎると、ねじ込み時に継手（特に樹脂系継手）に過大な圧力がかかり割れる恐れがあります。適正量を守ることが重要です。"},
{q:"ステンレス管が一般家庭の給水・給湯管よりも食品工場・医療施設等に多く使われる主な理由はどれか？",o:["施工が簡単だから","衛生性が高く腐食しにくいが、一般住宅には高価すぎるため","塩ビ管より安いから","曲げ加工が容易だから"],a:1,cat:2,d:2,ex:"ステンレス管は赤水が出ず衛生性が極めて高いですが、材料費・施工費ともに高いため、一般住宅より衛生基準の厳しい食品工場・医療施設等での採用が多いです。"},
{q:"ステンレス管のねじ切り加工を行う際の注意点はどれか？",o:["鋼管と同じチューザー（ダイス）を使用できる","材質が硬いためステンレス専用チューザーに交換する必要がある","ねじ切り不要","ハンドツールは使えない"],a:1,cat:2,d:2,ex:"ステンレスは硬度が高く、鋼管用チューザーでは磨耗が激しく正確なねじが切れません。ステンレス専用チューザーへの交換が必要です。"},

// --- ダクタイル鋳鉄管（DIP）---
{q:"ダクタイル鋳鉄管（DIP）のメカニカル継手接合で品質に最も影響するポイントはどれか？",o:["ボルトの色","パッキンの挿入状態（清掃・均一な噛み込み確認）","管の外観の綺麗さ","施工時間"],a:1,cat:2,d:2,ex:"DIPのメカニカル継手はパッキンが均一に噛み込んでいないと漏水します。接合前に継手と管端を清掃し、パッキンの砂噛みや不均一な挿入がないか慎重に確認が必要です。"},
{q:"ダクタイル鋳鉄管（DIP）の施工で「2名以上で作業を行う」主な理由はどれか？",o:["法律で決まっているから","管が非常に重いため安全管理上2名以上が必要","継手の種類が多いから","検査が必要だから"],a:1,cat:2,d:1,ex:"DIPは高強度で重量が大きいため、1名での取り回しは危険です。安全管理の観点から2名以上で作業を行うことが基本とされています。"},

// --- バルブ ---
{q:"ボールバルブを「急激に開閉する」場合に注意すべきことはどれか？",o:["特に問題なし","ウォーターハンマーが発生しやすく、管や機器に悪影響を与える","流量が変わらない","バルブが変形する"],a:1,cat:2,d:2,ex:"ボールバルブは1/4回転で全開・全閉できる反面、急操作によりウォーターハンマーが発生しやすいです。過度な急開閉は避けるべきです。"},
{q:"チェック弁（逆止弁）の設置方向について正しいものはどれか？",o:["どの方向でも設置できる","スイング式・リフト式等の種類により設置方向（水平・垂直等）を厳守する必要がある","縦向きのみ設置できる","水平のみ設置できる"],a:1,cat:2,d:2,ex:"チェック弁はスイング式（水平推奨）やリフト式（垂直推奨）など種類によって設置できる方向が異なります。誤方向の設置は逆止機能が働かない原因になります。"},
{q:"ストレーナー（Yストレーナー）はバルブとセットで設置されることが多い。その主な目的はどれか？",o:["流量を増やすため","ストレーナー清掃・交換時にバルブで流体を止めて作業できるようにするため","圧力を下げるため","管の腐食を防ぐため"],a:1,cat:2,d:2,ex:"ストレーナーは定期的な清掃が必要なため、上流側にバルブを設けて流体を止めた状態で安全に清掃・交換できる構成にします。"},
{q:"電動弁（モーター弁）が主に使用される場所はどれか？",o:["一般住宅の水栓","空調機・熱交換器周りの自動制御配管","道路の消火栓","受水槽のオーバーフロー管"],a:1,cat:2,d:2,ex:"電動弁は自動制御システムに組み込まれ、空調機・熱交換器・温水システム等で流量・温度を自動調節するために使用されます。"},
{q:"バタフライバルブの特徴として正しいものはどれか？",o:["小口径専用で大口径には使えない","弁体（ディスク）が軽量・薄型で大口径でも操作しやすく、過度な急開閉は要注意","流量調整には全く向かない","圧力損失が最も小さいバルブ"],a:1,cat:2,d:2,ex:"バタフライバルブは円板状ディスクを回転させる弁で、大口径でも軽量・コンパクト。空調・冷却水の大口径管に多用されますが、急開閉によるウォーターハンマーには注意が必要です。"},
{q:"バルブの「止水栓」と「バルブ（仕切弁等）」の違いとして正しいものはどれか？",o:["全く同じ機能","止水栓は故障・メンテナンス時に流量を止める・調整する目的で器具近傍に設置され、バルブは主に系統の制御・開閉に使用される","止水栓は大口径のみ使用","バルブは給湯専用"],a:1,cat:2,d:2,ex:"止水栓は水栓金具などの器具直近に設けて器具単体の止水・流量調整を行います。バルブは配管系統全体の制御・開閉に使用します。"},

// --- 鉄管（白ガス・黒ガス）・消耗品 ---
{q:"白ガス管（給水用鋼管）のねじ接合で「ねじ込み過ぎ」が問題になる理由はどれか？",o:["施工時間がかかるから","継手割れを引き起こす原因になるから","シール材が無駄になるから","管が伸びるから"],a:1,cat:2,d:2,ex:"鋼管のねじ込み過ぎは継手に過大な力がかかり、継手（特に鋳鉄製）のクラック・割れの原因になります。適正な回転角で締め付けることが重要です。"},
{q:"ボイド管を給排水配管に流用することが禁止される理由はどれか？",o:["入手が難しいから","ボイド管は型枠形成用の紙製・樹脂製の管であり、水圧に耐えられず破損・漏水の危険があるから","高価すぎるから","管径が合わないから"],a:1,cat:2,d:2,ex:"ボイド管はコンクリート型枠のスリーブ形成用であり、耐水圧性を持ちません。配管に流用すると内圧で破損・漏水が発生する非常に危険な施工ミスとなります。"},
{q:"シールテープ（テフロンテープ）の巻き方向として正しいものはどれか？",o:["どの方向でもよい","ねじ山に沿ってねじを進める（締め込む）方向に巻く","ねじを緩める方向に巻く","縦方向に巻く"],a:1,cat:2,d:1,ex:"シールテープはねじを締め込む（回す）方向と同じ向きに巻きます。逆方向に巻くとねじ込み時にテープが解けて外れてしまいます。"},
{q:"ヘルメシール等の「シール剤（ねじシール用）」が金属ねじ接合に適している主な理由はどれか？",o:["乾燥が速いから","耐圧性が高く、給水幹線等の高圧部位にも対応できるから","塗りやすいから","安価だから"],a:1,cat:2,d:2,ex:"液体シール剤（ヘルメシール等）はシールテープより耐圧性が高く、給水本管や受水槽周りなど高圧・重要部位のねじ接合に有効です。"},
{q:"配管用パッキン類の交換について正しい説明はどれか？",o:["パッキンは繰り返し使用できる","老朽化したパッキンは硬化・変形し漏水しやすいため、必ず新品に交換する","パッキンは水で洗えば再利用できる","メーカー指定品でなくてよい"],a:1,cat:2,d:1,ex:"パッキンは経年劣化で硬化・変形すると弾性を失い漏水します。点検・修理時には必ず新品に交換することが原則です。"},
{q:"塩ビ接着剤の「適正量」についての説明として正しいものはどれか？",o:["多く塗るほど接合強度が上がる","塗りすぎはソルベントクラックの原因になり、少なすぎは接合不良になる","片面だけに塗ればよい","乾いてから塗り直せばよい"],a:1,cat:2,d:2,ex:"塩ビ接着剤は溶剤系で塗りすぎるとソルベントクラックを引き起こし、少なすぎると接合不良になります。適正量を両面に手早く均一に塗布することが重要です。"},

// --- 継手総まとめ・施工全般 ---
{q:"「インクリーザー（IN）」の継手の用途はどれか？",o:["管を曲げる","管の口径を変更する（異径接続）","管を分岐する","管の端部を塞ぐ"],a:1,cat:2,d:1,ex:"インクリーザー（IN、異径継手）は径の異なる管を接続するための継手です。S（ソケット型）・L（エルボ型）・T（チーズ型）があります。"},
{q:"「バルブソケット（VS）」の特徴はどれか？",o:["両端がTS接合","片方がTS接合でもう片方がねじ接合になっている異種管接合継手","両端がねじ接合","フランジ接合用の継手"],a:1,cat:2,d:2,ex:"バルブソケット（VS）は塩ビ管側をTS接合、異種管（金属管や機器）側をねじ接合で接続するための異種管接合継手です。"},
{q:"「メーターユニオン（シモク）」の用途はどれか？",o:["流量を計測する","塩ビ管を水道メーター器またはメーターユニットに直接接続するための継手","逆流を防ぐ","圧力を調整する"],a:1,cat:2,d:2,ex:"メーターユニオン（シモク）は塩ビ管をメーター器や計量ユニットに接続するための専用継手で、袋ナットとパッキンの使用が必須です。"},
{q:"「床出しソケット（床出しS）」を使用する場面はどれか？",o:["床下配管の途中","器具の水道管接続口を床や壁から出した場合に、床・壁に直接固定できる羽付きのソケット","天井配管の固定","排水管の終端処理"],a:1,cat:2,d:2,ex:"床出しソケットは固定用の羽（フランジ）が付いており、給水管接続口を床や壁から出す際に直接固定できます。洗面台・便器周りでよく使用されます。"},
{q:"配管施工の「全体を見る」という考え方で最も重要なことはどれか？",o:["できるだけ多くの継手を使う","敷地や建物に対して平行・垂直を意識し、真上から見て解りやすく綺麗に配管する","管を最短距離で引く","勾配は無視してよい"],a:1,cat:2,d:2,ex:"「全体を見る」とは建物・敷地に対して平行・垂直を基本とし、後から他の職人や施主が見てもわかりやすく、整然とした配管を心がけることです。"},
{q:"配管施工後の「通水試験（圧力試験）」の最大の目的はどれか？",o:["管の色を確認する","接合部の漏水・抜け・施工不良がないかを確認し品質を担保する","配管の勾配を確認する","管の保温状態を確認する"],a:1,cat:2,d:1,ex:"通水試験・圧力試験は施工完了後の最重要チェックです。漏水箇所の早期発見・是正により、将来の大きなトラブルを未然に防ぎます。"},
{q:"ライニング鋼管（SGP-VL等）の継手接合で「管端防食コア（インサート）なし」の継手を使用すると起きる問題はどれか？",o:["施工が難しくなる","ライニングが途切れた管端部から腐食（赤水）が発生する","流量が下がる","継手が合わない"],a:1,cat:2,d:2,ex:"ライニング鋼管は内面の樹脂コーティングが切断端部で途切れています。管端防食コアがない継手を使うと露出した鋼部分から腐食が進み、赤水の原因になります。"},
{q:"「サドル分水栓」を用いた工事（穿孔作業）の手順として正しいものはどれか？",o:["穿孔後にサドルを取り付ける","サドル取付→サドル漏れ確認→止水栓が開いていることを確認→穿孔→穿孔完了を感触で確認の順で行う","断水してから穿孔する","穿孔機のスピードは最大速度で行う"],a:1,cat:2,d:3,ex:"サドル分水栓での穿孔は、サドル取付→漏れ確認→止水栓開確認→穿孔（刃の下げはゆっくり・回転は速く）→完了確認の順で行います。埋設位置の記録写真も重要です。"},
{q:"配管の「勾配確認」を埋設中も怠らない理由はどれか？",o:["勾配は見た目だけの問題","管が見えている間に修正できるが、埋めてしまうと後から修正が大変だから","勾配はポンプで補える","勾配は施工後に確認すればよい"],a:1,cat:2,d:2,ex:"排水管は適切な勾配が排水性能の生命線です。埋設中は管が見えているうちに随時勾配確認し、不適切なら即修正します。埋め戻し後の修正は大変な手間となります。"},
{q:"「道路下の配管工事（引込工事等）は1人で行わない」理由として最も適切なものはどれか？",o:["法律で禁止されているから","作業量が多く安全管理上、最低でも2〜3名が必要なため","使用する機械の操作に資格が必要なため","費用が安くなるから"],a:1,cat:2,d:1,ex:"道路下工事は交通誘導・安全管理・掘削・配管と多岐にわたる作業が同時進行します。1人では安全管理と施工を同時にこなすことができないため、複数名での作業が必須です。"},
{q:"「埋設配管の深度と不動構造物からの距離を記録・写真撮影する」理由はどれか？",o:["写真を記念に残すため","次回の周辺工事の際に配管の位置が把握でき、施工事故を防ぐため","費用請求のための証拠","管理会社への報告義務"],a:1,cat:2,d:2,ex:"埋設配管の位置記録は、将来の他工事で誤って配管を破損する「施工事故」を防ぐために非常に重要です。深度と不動構造物（建物基礎等）からの距離を記録します。"},
];

// ============================================================
// アプリロジック
// ============================================================
let questions = [];
let currentIdx = 0;
let score = 0;
let answered = false;
let selectedCount = 10;
let catStats = [{c:0,t:0},{c:0,t:0},{c:0,t:0}];

const catNames = ['給排水','法規・資格','工具・施工'];
const catClasses = ['cat-water','cat-law','cat-tool'];
const optLabels = ['A','B','C','D'];

function shuffle(arr) {
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function startQuiz(count) {
  questions = shuffle(ALL_QUESTIONS).slice(0, count);
  currentIdx = 0;
  score = 0;
  catStats = [{c:0,t:0},{c:0,t:0},{c:0,t:0}];
  document.getElementById('startScreen').style.display='none';
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('quizScreen').style.display='block';
  document.getElementById('qTotal').textContent = questions.length;
  showQuestion();
}

function showQuestion() {
  const q = questions[currentIdx];
  answered = false;
  document.getElementById('qNum').textContent = currentIdx+1;
  const pct = (currentIdx/questions.length)*100;
  document.getElementById('progressBar').style.width = pct+'%';
  document.getElementById('scoreCount').textContent = score;

  const catEl = document.getElementById('qCategory');
  catEl.textContent = catNames[q.cat];
  catEl.className = 'q-category ' + catClasses[q.cat];

  const stars = '★'.repeat(q.d) + '☆'.repeat(3-q.d);
  document.getElementById('qDifficulty').textContent = stars;
  document.getElementById('questionText').textContent = q.q;

  const opts = document.getElementById('optionsContainer');
  opts.innerHTML = '';
  const shuffledOpts = q.o.map((text,i)=>({text,origIdx:i}));
  // オプションはシャッフルしない（答えとの対応を保持）
  shuffledOpts.forEach((opt,i)=>{
    const btn = document.createElement('button');
    btn.className='option-btn';
    btn.innerHTML=`<span class="option-label">${optLabels[i]}</span><span>${opt.text}</span>`;
    btn.addEventListener('click',()=>selectAnswer(i, opt.origIdx, q));
    opts.appendChild(btn);
  });

  document.getElementById('explanation').className='explanation';
  document.getElementById('explanation').innerHTML='';
  document.getElementById('nextBtn').className='nav-btn';
}

function selectAnswer(clickedIdx, origIdx, q) {
  if(answered) return;
  answered = true;
  const btns = document.querySelectorAll('.option-btn');
  const correct = (origIdx === q.a);
  catStats[q.cat].t++;
  if(correct){
    score++;
    catStats[q.cat].c++;
    btns[clickedIdx].classList.add('correct');
  } else {
    btns[clickedIdx].classList.add('wrong');
    // 正解を表示
    btns.forEach((b,i)=>{
      const origI = q.o.indexOf(q.o[i]); // 同一順なので
      if(i===q.a) b.classList.add('correct');
    });
    // 正解のボタンに正解マークを付ける
    btns[q.a].classList.add('correct');
  }
  btns.forEach(b=>b.disabled=true);
  const expEl = document.getElementById('explanation');
  expEl.innerHTML=`<strong>📌 解説：</strong>${q.ex}`;
  expEl.classList.add('show');
  document.getElementById('nextBtn').classList.add('show');
  document.getElementById('scoreCount').textContent = score;
}

document.getElementById('nextBtn').addEventListener('click',()=>{
  currentIdx++;
  if(currentIdx>=questions.length){
    showResult();
  } else {
    showQuestion();
  }
});

function showResult(){
  document.getElementById('quizScreen').style.display='none';
  document.getElementById('resultScreen').style.display='block';
  const total = questions.length;
  const pct = Math.round(score/total*100);
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalTotal').textContent = `/ ${total}問中正解`;
  let rank='';
  if(pct>=90)rank='🏆 最優秀！素晴らしい実力です！';
  else if(pct>=70)rank='🎯 合格レベル！さらに上を目指しましょう！';
  else if(pct>=50)rank='📖 もう少し！復習して再挑戦を！';
  else rank='💪 基礎からしっかり学習しましょう！';
  document.getElementById('finalRank').textContent = rank;

  const s1=catStats[0],s2=catStats[1],s3=catStats[2];
  document.getElementById('catScore1').textContent = s1.t?`${s1.c}/${s1.t}`:'-';
  document.getElementById('catScore2').textContent = s2.t?`${s2.c}/${s2.t}`:'-';
  document.getElementById('catScore3').textContent = s3.t?`${s3.c}/${s3.t}`:'-';
}

// 出題数セレクター
document.querySelectorAll('.count-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.count-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedCount = parseInt(btn.dataset.count);
  });
});

document.getElementById('startBtn').addEventListener('click',()=>{
  startQuiz(selectedCount);
});

document.getElementById('retryBtn').addEventListener('click',()=>{
  startQuiz(selectedCount);
});

document.getElementById('backBtn').addEventListener('click',()=>{
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('startScreen').style.display='block';
});
</script>
