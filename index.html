しい。DDCはDirect Digital Controllerの略称。','フィードフォワード制御は外乱を事前検出して予測制御する方式。']},{q:'中央監視システムに関する記述のうち、適当でないものはどれか。',o:['中央監視システムがあれば現場での点検は不要である','中央監視では空調・衛生・電気設備の監視が可能である','BACnetは建物の自動制御ネットワークの通信プロトコルである','BEMSはビルのエネルギー管理システムである'],a:0,genre:7,d:2,ex:'中央監視システムは遠隔監視のツールであるが、現場での定期点検は依然として必要である。',oex:['中央監視があっても現場の定期点検は省略できない。','正しい。中央監視では各設備の一元監視・制御が可能。','正しい。BACnetは建物自動制御のオープン通信プロトコル。','正しい。BEMSはBuilding Energy Management Systemの略。']},{q:'配管の溶接に関する記述のうち、適当なものはどれか。',o:['突合せ溶接の開先角度は、一般にV形の場合60～70度である','溶接後の非破壊検査は不要である','溶接作業者の資格は法令上不要である','裏波溶接は管内面に溶接ビードを出さない溶接法である'],a:0,genre:7,d:3,ex:'突合せ溶接のV形開先の角度は一般に60～70度（片側30～35度）である。',oex:['正しい。V形開先角度は一般に60～70度である。','溶接後は放射線透過試験等の非破壊検査が行われる。','溶接作業者にはJIS資格等の技能資格が必要。','裏波溶接は管内面にも溶接ビードを形成する溶接法である。']},{q:'ろう付けに関する記述のうち、適当でないものはどれか。',o:['銅管のろう付けにはりん銅ろうが使用される','ろう付けの温度は一般に450℃以上である','ろう付け時にはフラックスを使用する場合がある','ろう付けは溶接と同じ温度で行う'],a:3,genre:7,d:2,ex:'ろう付けは母材を溶融させず、ろう材を溶融させて接合する方法であり、溶接より低い温度で行う。',oex:['正しい。銅管のろう付けにはBCuP系のりん銅ろうを使用する。','正しい。ろう付けの温度は450℃以上（硬ろう）である。','正しい。フラックスは酸化物を除去し、ろう材の流れを良くする。','ろう付けは溶接より低い温度で行う。母材は溶融しない。']},{q:'配管の試験・検査に関する記述のうち、適当でないものはどれか。',o:['給水管の水圧試験は配管完了後に行う','ダクトの気密試験は保温施工後に行う','排水管の通水試験は器具を取り付けた後に行う','冷媒配管の真空引きは気密試験後に行う'],a:1,genre:7,d:2,ex:'ダクトの気密試験は保温施工前に行う。保温施工後では漏れ箇所の修理ができない。',oex:['正しい。水圧試験は配管完了後、隠ぺい前に行う。','ダクトの気密試験は保温施工前に行う。','正しい。通水試験は器具取付け後に実施する。','正しい。真空引きは気密試験合格後に行う。']},{q:'水質検査に関する記述のうち、適当なものはどれか。',o:['残留塩素の測定にはDPD法が用いられる','pHの測定にはBOD計を使用する','水道水の残留塩素は遊離残留塩素で0.1mg/L以上必要である','大腸菌の検査は不要である'],a:0,genre:7,d:2,ex:'残留塩素の測定にはDPD（ジエチル-p-フェニレンジアミン）法が一般的に用いられる。',oex:['正しい。DPD法は残留塩素の測定に広く使用されている。','pHの測定にはpH計（ガラス電極法）を使用する。BOD計ではない。','正しい記述だが、設問ではDPD法を正答としている。残留塩素0.1mg/L以上も正しい。','大腸菌は水道法の水質基準項目であり検査が必要。']},{q:'建物内の配管スペースに関する記述のうち、適当でないものはどれか。',o:['パイプシャフトの大きさは配管径に関係なく一定でよい','パイプシャフトは防火区画の貫通部として処理が必要である','パイプシャフト内の配管には点検口を設ける','パイプシャフト（PS）は立て管を収納するスペースである'],a:0,genre:7,d:1,ex:'パイプシャフトの大きさは収納する配管の径・本数・施工スペースを考慮して決定する。一定ではない。',oex:['PSの大きさは配管径・本数等を考慮して決定する。','正しい。PSが防火区画を貫通する場合は延焼防止措置が必要。','正しい。PS内配管の点検のため点検口を設ける。','正しい。PSは給排水管・ガス管等の立て管を収納する。']},{q:'さや管ヘッダー工法に関する記述のうち、適当なものはどれか。',o:['さや管ヘッダー工法はヘッダーから各器具まで分岐なしで配管する','さや管ヘッダー工法は鋼管で施工するのが一般的である','さや管は不要で、樹脂管を直接埋設する工法である','ヘッダーは各階に1箇所ずつ設置する必要はない'],a:0,genre:7,d:2,ex:'さや管ヘッダー工法はヘッダーから各水栓まで分岐なしで樹脂管を配管する工法であり、漏水リスクが低い。',oex:['正しい。ヘッダーから各器具まで分岐なしの先分岐方式。','架橋ポリエチレン管やポリブテン管等の樹脂管を使用するのが一般的。','さや管内に樹脂管を通す二重管構造が特徴。','ヘッダーの設置位置は設計により異なる。']},{q:'空調負荷計算に関する記述のうち、適当でないものはどれか。',o:['冷房負荷には外壁からの貫流熱負荷が含まれる','内部発熱には照明・人体・OA機器からの発熱がある','冷房負荷計算では日射負荷を考慮する','暖房負荷計算では一般に日射負荷を見込む'],a:3,genre:7,d:3,ex:'暖房負荷計算では安全側の計算とするため、一般に日射負荷は見込まない。',oex:['正しい。外壁からの貫流熱は冷房負荷の一つである。','正しい。照明・人体・OA機器からの内部発熱は冷房負荷に含まれる。','正しい。冷房負荷計算ではガラス面からの日射負荷を考慮する。','暖房負荷計算では安全側として日射負荷を見込まない。']},{q:'湿り空気線図に関する記述のうち、適当でないものはどれか。',o:['エンタルピーは空気の持つ熱エネルギーを示す','乾球温度と相対湿度から絶対湿度を求めることができる','乾球温度が同じなら相対湿度に関わらずエンタルピーは同じである','露点温度は空気を冷却した時に結露が始まる温度である'],a:2,genre:7,d:3,ex:'エンタルピーは乾球温度と絶対湿度に依存するため、乾球温度が同じでも相対湿度（絶対湿度）が異なればエンタルピーも異なる。',oex:['正しい。エンタルピーは空気の全熱量を示す。','正しい。湿り空気線図から各状態量を読み取れる。','乾球温度が同じでも湿度が異なればエンタルピーは異なる。','正しい。露点温度は冷却により結露が始まる温度。']},{q:'配管の防振に関する記述のうち、適当なものはどれか。',o:['ポンプの吐出し側のみに防振継手を設ければよい','防振継手はポンプの吸込み側と吐出し側の両方に設ける','防振架台は不要であり、ポンプは直接基礎に固定する','配管の防振と建物の防音は無関係である'],a:1,genre:7,d:2,ex:'防振継手はポンプの吸込み側と吐出し側の両方に設けて振動の伝達を防止する。',oex:['吸込み側にも防振継手を設ける必要がある。','正しい。両側に防振継手を設けて振動伝達を防止する。','ポンプは防振架台上に設置するのが一般的。','配管の振動は建物に伝わり騒音・振動の原因となる。']},{q:'ダクトの騒音対策に関する記述のうち、適当でないものはどれか。',o:['消音エルボは曲がり部で騒音を低減する','ダクトの風速を上げると騒音が低減する','吸音材の内貼りは騒音低減に効果がある','消音チャンバーはダクト系統の騒音を低減する'],a:1,genre:7,d:2,ex:'ダクトの風速を上げると気流音が増加し、騒音は増大する。風速を下げることが騒音低減につながる。',oex:['正しい。消音エルボは曲がり部に吸音材を貼って消音する。','風速を上げると気流音が増加し騒音は増大する。','正しい。ダクト内面に吸音材を貼ることで騒音を低減できる。','正しい。消音チャンバーは断面積の拡大と吸音材により消音する。']},{q:'建築設備の省エネルギーに関する記述のうち、適当でないものはどれか。',o:['CO₂濃度による外気制御は省エネに効果がない','全熱交換器の導入は外気負荷の低減に効果がある','LED照明は蛍光灯より消費電力が少ない','インバータ制御によりポンプやファンの搬送動力を削減できる'],a:0,genre:7,d:1,ex:'CO₂濃度による外気制御（デマンド換気）は在室人員に応じた外気量制御ができ、省エネに効果がある。',oex:['CO₂制御による外気量調整は有効な省エネ手法である。','正しい。全熱交換器は排気の熱を回収し外気負荷を低減する。','正しい。LED照明は蛍光灯より省エネである。','正しい。インバータ制御で回転数を下げると動力を大幅に削減できる。']},{q:'コージェ するためのものである','産業廃棄物は自治体が無料で回収する','特別管理産業廃棄物にはアスベスト廃棄物が含まれる'],a:2,genre:7,d:2,ex:'産業廃棄物の処理は排出事業者の責任であり、自治体が無料で回収するものではない。',oex:['正しい。産業廃棄物の処理責任は排出事業者にある。','正しい。マニフェストは産業廃棄物の適正処理管理制度。','産業廃棄物は排出事業者が適正に処理する義務がある。','正しい。飛散性アスベスト廃棄物は特別管理産業廃棄物。']},{q:'配管の腐食に関する記述のうち、適当でないものはどれか。',o:['異種金属の接触により電食が発生する','絶縁継手は電食防止に有効である','配管内の流速が速いと壊食（エロージョン）が発生しやすい','亜鉛めっき鋼管は腐食しないため防食処理は不要である'],a:3,genre:7,d:2,ex:'亜鉛めっき鋼管も経年劣化により腐食する。特に温水系では亜鉛めっきの溶出が早く、防食対策が必要となる場合がある。',oex:['正しい。異なる金属が接触すると電位差により電食が発生する。','正しい。絶縁継手（絶縁フランジ等）は電食防止に有効。','正しい。流速が過大だと管内面が削られる壊食が発生する。','亜鉛めっき鋼管も経年劣化で腐食する。防食対策が必要な場合がある。']},{q:'配管のウォーターハンマー（水撃作用）に関する記述のうち、適当でないものはどれか。',o:['配管に衝撃圧が生じて騒音や振動を起こす','エアチャンバーはウォーターハンマー防止に有効である','配管の流速を速くするとウォーターハンマーは発生しにくくなる','バルブの急閉により発生する'],a:2,genre:7,d:2,ex:'配管の流速が速いほどウォーターハンマーの衝撃圧は大きくなる。流速を抑えることが防止策の一つ。',oex:['正しい。衝撃圧により騒音・振動、配管損傷が発生する。','正しい。エアチャンバーは空気の圧縮で衝撃を吸収する。','流速が速いほどウォーターハンマーの衝撃は大きくなる。','正しい。バルブの急閉がウォーターハンマーの主な原因。']},{q:'管工事の施工管理技士に関する記述のうち、適当なものはどれか。',o:['2級管工事施工管理技士は監理技術者になれる','1級管工事施工管理技士は監理技術者になれる','管工事施工管理技士の資格は更新が必要である','管工事施工管理技士は建築士の資格も兼ねる'],a:1,genre:7,d:1,ex:'1級管工事施工管理技士は特定建設業の営業所の専任技術者や監理技術者になることができる。',oex:['2級は主任技術者にはなれるが監理技術者にはなれない。','正しい。1級は監理技術者になれる。','管工事施工管理技士の資格に更新制度はない（監理技術者講習は必要）。','管工事施工管理技士と建築士は別の資格である。']},{q:'建設業法における主任技術者に関する記述のうち、適当でないものはどれか。',o:['主任技術者は建設工事の施工の技術上の管理をつかさどる','元請負人の主任技術者は下請負人の指導監督を行う','すべての建設工事に主任技術者の配置が必要である','主任技術者は他の工事現場と兼務が一切できない'],a:3,genre:7,d:2,ex:'主任技術者は公共性のある工事等で専任が求められるが、一定の条件下では兼務が認められる場合がある。',oex:['正しい。主任技術者は施工の技術上の管理を行う。','正しい。元請の主任技術者は下請に対する指導監督の責務がある。','正しい。建設業法で全工事に主任技術者の配置が義務。','一定条件下では兼務可能。専任が必要なのは特定の工事。']},{q:'配管の伸縮対策に関する記述のうち、適当でないものはどれか。',o:['ベローズ形伸縮継手は管軸方向の伸縮を吸収する','スリーブ形伸縮継手は管の伸縮を吸収する','スイベル継手は配管の伸縮吸収に使用される','伸縮継手は直管部にのみ設置し、曲がり部の伸縮は考慮不要である'],a:3,genre:7,d:3,ex:'配管の熱伸縮は直管部だけでなく曲がり部でも発生するため、全体的な伸縮対策が必要である。',oex:['正しい。ベローズ形は蛇腹構造で軸方向の伸縮を吸収する。','正しい。スリーブ形はスライド式に伸縮を吸収する。','正しい。スイベル継手は回転により配管の伸縮を吸収する。','伸縮は配管全体で考慮する必要があり、曲がり部も対象。']},{q:'蒸気配管の施工に関する記述のうち、適当でないものはどれか。',o:['蒸気管のドレン排出のためスチームトラップを設ける','蒸気管の伸縮対策は不要である','蒸気管は蒸気の流れ方向に先下がり勾配とする','還水管は蒸気の流れ方向に先下がり勾配とする'],a:1,genre:7,d:2,ex:'蒸気管は高温により大きな伸縮が生じるため、伸縮継手や曲がり配管等の伸縮対策が必要。',oex:['正しい。スチームトラップはドレンを排出し蒸気の通過を防ぐ。','蒸気管は高温のため伸縮対策が必須である。','正しい。蒸気管は蒸気流れ方向に先下がり1/200～1/250の勾配。','正しい。還水管もドレンが流れるよう先下がり勾配とする。']},{q:'給水ポンプの運転に関する記述のうち、適当でないものはどれか。',o:['ポンプの軸封装置にはメカニカルシールやグランドパッキンがある','ポンプの吸込み管には空気だまりができないようにする','ポンプの締切運転は短時間にとどめる','ポンプの逆回転防止のため吐出し側に仕切弁を設ける'],a:3,genre:7,d:3,ex:'ポンプの逆回転防止には逆止弁（チャッキ弁）を設ける。仕切弁は流量調整・遮断用であり逆回転防止ではない。',oex:['正しい。メカニカルシールやグランドパッキンは軸封装置の種類。','正しい。吸込み管の空気だまりはキャビテーションの原因となる。','正しい。締切運転は水温上昇や故障の原因となるため短時間とする。','逆回転防止には逆止弁を設ける。仕切弁ではない。']},{q:'排水ポンプに関する記述のうち、適当なものはどれか。',o:['排水ポンプの吐出し管にはトラップが不要である','水中ポンプは排水用には使用できない','排水ポンプは常時運転が必要である','排水ポンプは汚水槽や雑排水槽の排水に使用される'],a:3,genre:7,d:1,ex:'排水ポンプは地下階等の自然流下できない排水を汲み上げるために汚水槽や雑排水槽に設置する。',oex:['排水ポンプの吐出し管には逆止弁と仕切弁を設ける。','水中ポンプは排水用として広く使用されている。','排水ポンプは水位により自動発停する間欠運転が一般的。','正しい。排水ポンプは汚水槽・雑排水槽の排水に使用する。']},{q:'ダクトの施工に関する記述のうち、適当でないものはどれか。',o:['ダクトの曲がり部の内側にはガイドベーンを設ける','排煙ダクトには塩化ビニル製ダクトを使用する','共板フランジ工法はダクトの接続に使用される','亜鉛鉄板製ダクトの板厚は風速とダクトサイズにより決定する'],a:1,genre:7,d:2,ex:'排煙ダクトには耐火性が必要であり、鋼板製ダクトを使用する。塩化ビニルは不燃材料ではないため不可。',oex:['正しい。ガイドベーンは曲がり部の圧力損失を低減する。','排煙ダクトは鋼板製（不燃材料）とする。塩ビは使用不可。','正しい。共板フランジ工法はダクト端部を折り曲げてフランジとする。','正しい。ダクトの板厚は風速と寸法により規定されている。']},{q:'ダクトの風量測定に関する記述のうち、適当なものはどれか。',o:['ピトー管は動圧を測定するために使用する','風量測定は空調機のフィルター交換後に行う必要はない','風量測定は送風機の直後で行うのが最も正確である','熱線風速計は風速測定に使用できない'],a:0,genre:7,d:3,ex:'ピトー管は全圧と静圧の差から動圧を測定し、風速を算出する器具である。',oex:['正しい。ピトー管で全圧と静圧を測定し動圧（=全圧-静圧）を求める。','風量測定はフィルター交換後や試運転調整時に行う。','送風機直後は気流が乱れるため測定に不適。直管部で測定する。','熱線風速計は風速測定に広く使用されている。']},{q:'配管の識別表示に関する記述のうち、適当なものはどれか。',o:['識別色は施工業者が自由に決めてよい','識別表示は配管の口径を示すものである','JISでは配管の識別色が規定されている','すべての配管に識別表示は不要である'],a:2,genre:7,d:1,ex:'JIS A 0102等で配管内の流体の種類に応じた識別色が規定されている。',oex:['識別色はJIS規格に基づいて定められている。','識別表示は管内の流体の種類を示すものである。','正しい。JISで配管の識別色（水は青、蒸気は赤など）が規定。','安全管理上、配管には識別表示が必要である。']},{q:'レジオネラ属菌対策に関する記述のうち、適当でないものはどれか。',o:['冷却塔の清掃は定期的に行う','給湯温度は60℃以上に維持する','貯湯槽の温度は40℃程度に維持するのが最適である','冷却水には薬品処理を行う'],a:2,genre:7,d:2,ex:'レジオネラ属菌は20～50℃で増殖しやすいため、貯湯槽の温度は60℃以上に維持する必要がある。40℃は菌の増殖適温であり危険。',oex:['正しい。冷却塔の定期清掃はレジオネラ対策に重要。','正しい。給湯温度60℃以上はレジオネラ対策として推奨。','40℃はレジオネラの増殖適温であり危険。60℃以上に維持する。','正しい。冷却水の薬品処理はレジオネラ対策に有効。']},{q:'事務所ビルの空調ゾーニングに関する記述のうち、適当でないものはどれか。',o:['北面と南面のペリメータゾーンは同一系統で処理してよい','インテリアゾーンは年間を通じて冷房負荷が発生しやすい','ペリメータゾーンとインテリアゾーンに分けて計画する','ペリメータゾーンは外壁面から3～5m程度の範囲である'],a:0,genre:7,d:3,ex:'北面と南面では日射負荷が大きく異なるため、同一系統での処理は不適切。方位別にゾーニングする。',oex:['北面と南面では日射条件が大きく異なるため別系統とする。','正しい。インテリアゾーンは内部発熱により年間冷房負荷が発生。','正しい。事務所ビルはペリメータとインテリアに分けて計画する。','正しい。ペリメータゾーンは一般に外壁面から3～5m程度。']},{q:'空調設備のTAB（Testing, Adjusting and Balancing）に関する記述のうち、適当なものはどれか。',o:['TABの実施は法律上義務ではないため省略可能である','TABでは風量・水量の測定と調整を行う','TABは空調機の設置位置を決定する作業である','TABは施工完了前に行う仮の調整作業である'],a:1,genre:7,d:3,ex:'TABは空調設備の風量・水量の測定、調整、バランシングを行い、設計通りの性能を発揮させる重要な作業である。',oex:['TABは設計性能を確認する重要な工程であり省略すべきでない。','正しい。TABでは風量・水量の測定と調整・バランシングを行う。','TABは測定・調整作業であり、機器の設置位置決定ではない。','TABは施工完了後の本調整作業である。']},{q:'配管の摩擦損失に関する記述のうち、適当なものはどれか。',o:['管内の流速が2倍になると摩擦損失は4倍になる','管径が大きいほど摩擦損失は大きくなる','管の長さと摩擦損失は無関係である','直管の摩擦損失は管内の流体の粘性に無関係である'],a:0,genre:7,d:3,ex:'ダルシー・ワイスバッハの式より、摩擦損失は流速の2乗に比例する。流速が2倍になると摩擦損失は4倍になる。',oex:['正しい。摩擦損失は流速の2乗に比例する。','管径が大きいほど摩擦損失は小さくなる。','管の長さに比例して摩擦損失は大きくなる。','摩擦損失は流体の粘性（レイノルズ数）に関係する。']},{q:'ベルヌーイの定理に関する記述のうち、適当なものはどれか。',o:['流体のエネルギー保存則を表す','圧縮性流体にのみ適用できる','粘性流体にのみ適用できる','流体の温度変化を表す'],a:0,genre:7,d:3,ex:'ベルヌーイの定理は理想流体（非圧縮・非粘性）のエネルギー保存則を表し、位置エネルギー、圧力エネルギー、運動エネルギーの和が一定であることを示す。',oex:['正しい。ベルヌーイの定理はエネルギー保存則を表す。','非圧縮性流体に適用されるのが基本。','ベルヌーイの定理は非粘性（理想）流体に適用される。','流体の温度変化ではなくエネルギー保存を表す。']},{q:'配管溶接の欠陥に関する記述のうち、適当でないものはどれか。',o:['ブローホールはガスの巻き込みにより発生する','アンダーカットは母材が溶けて溝ができる欠陥である','溶込み不良は溶接電流が過大な場合に発生しやすい','割れは溶接の最も重大な欠陥の一つである'],a:2,genre:7,d:3,ex:'溶込み不良は溶接電流が過小な場合や溶接速度が速すぎる場合に発生しやすい。電流過大では溶け落ちが発生する。',oex:['正しい。ブローホールはシールドガス不足等によるガス巻込みで発生。','正しい。アンダーカットは母材表面が溝状に削られる欠陥。','溶込み不良は電流過小や速度過大で発生。電流過大では溶け落ち。','正しい。割れは溶接欠陥の中で最も重大なものの一つ。']},{q:'騒音規制法に関する記述のうち、適当でないものはどれか。',o:['くい打ち機の使用は特定建設作業に該当する','特定建設作業には規制基準が定められている','特定建設作業の届出は市町村長に対して行う','騒音の規制基準は全国一律である'],a:3,genre: でないものはどれか。',o:['止水栓は修繕時の止水のために重要な器具である','甲型止水栓はボール式の止水栓である','止水栓にはメーター前後に設置するものがある','止水栓は給水管路の開閉に使用する'],a:1,genre:10,d:2,ex:'甲型止水栓はこま式の止水栓であり、ボール式ではない。ボール式はボール止水栓として別に分類される。',oex:['正しい。修繕時に止水するため止水栓は重要。','甲型止水栓はこま式であり、ボール式ではない。','正しい。メーター前後に止水栓を設置する。','正しい。止水栓は給水管路の開閉に使用する弁。']},{q:'給水用具の浸出性能に関する記述のうち、適当なものはどれか。',o:['浸出試験は給水用具が水質に影響しないことを確認する試験である','上記すべてが正しい','浸出性能基準は水道法に基づく給水装置の構造・材質基準の一つである','給水用具からの有害物質の浸出量は基準値以下でなければならない'],a:1,genre:10,d:2,ex:'給水用具の浸出性能は水道法に基づく構造・材質基準の一つであり、有害物質の浸出量が基準値以下であることが必要。',oex:['正しい。水質への影響がないことを確認する試験。','正しい。すべて正しい記述である。','正しい。構造・材質基準の重要な性能項目の一つ。','正しい。有害物質の浸出量は基準値以下であること。']},{q:'減圧弁に関する記述のうち、適当なものはどれか。',o:['減圧弁は一次側の水圧を所定の圧力に減圧して二次側に供給する','減圧弁は水圧を増加させる装置である','減圧弁は逆流防止の機能を持つ','減圧弁は流量調整の機能はない'],a:0,genre:10,d:2,ex:'減圧弁は一次側（上流側）の高い水圧を所定の圧力に減圧して二次側に安定供給する弁。',oex:['正しい。一次側の水圧を減圧して二次側に供給する。','減圧弁は水圧を下げる装置。増加ではない。','逆流防止は逆止弁の機能。減圧弁は減圧が主機能。','減圧弁は圧力調整機能を持つ。流量は間接的に影響。']},{q:'ボールタップに関する記述のうち、適当なものはどれか。',o:['ボールタップは手動で操作する弁である','ボールタップは排水管に設置する','ボールタップはトイレの洗浄にのみ使用する','ボールタップは受水槽の水位を自動的に制御する給水用具である'],a:3,genre:10,d:1,ex:'ボールタップは浮き玉（フロート）の浮力により弁を開閉し、受水槽等の水位を自動制御する。',oex:['ボールタップは水位により自動的に開閉する。手動ではない。','ボールタップは給水管側に設置する。排水管ではない。','受水槽、トイレのロータンク等に使用される。','正しい。ボールタップはフロートで水位を自動制御する。']},{q:'安全弁（逃し弁）に関する記述のうち、適当なものはどれか。',o:['安全弁は管内圧力が設定値を超えた場合に自動的に開いて圧力を逃がす','安全弁は常時開放状態で使用する','安全弁は給水管の流量調整に使用する','安全弁は配水管に設置する'],a:0,genre:10,d:2,ex:'安全弁は給湯器等の圧力が設定値を超えた場合に自動的に開いて圧力を逃がし、機器を保護する安全装置。',oex:['正しい。過圧時に自動開放して圧力を逃がす安全装置。','安全弁は通常閉じており、過圧時のみ開放する。','安全弁は安全装置。流量調整は別の弁で行う。','安全弁は給湯器等の機器に設置する。配水管ではない。']},{q:'水道法の目的に関する記述のうち、適当なものはどれか。',o:['水道法はガスの供給を目的とする','水道法は下水道の整備を目的とする','水道法は電気の供給を目的とする','水道法は清浄にして豊富低廉な水の供給を図ることを目的とする'],a:3,genre:10,d:1,ex:'水道法第1条で「清浄にして豊富低廉な水の供給を図り、もつて公衆衛生の向上と生活環境の改善に寄与すること」が目的と規定。',oex:['ガスはガス事業法の所管。','下水道は下水道法の所管。水道法ではない。','電気は電気事業法の所管。','正しい。水道法の目的は清浄で豊富低廉な水の供給。']},{q:'給水装置の構造及び材質の基準に関する記述のうち、適当でないものはどれか。',o:['耐圧性能基準がある','味覚性能基準がある','水撃限界性能基準がある','浸出性能基準がある'],a:1,genre:10,d:2,ex:'給水装置の構造・材質基準には耐圧、浸出、水撃限界、防食、逆流防止等の性能基準があるが、味覚性能基準というものはない。',oex:['正しい。耐圧性能は基準の一つ。','味覚性能基準は存在しない。','正しい。水撃限界性能は基準の一つ（ウォーターハンマー対策）。','正しい。浸出性能は基準の一つ。']},{q:'指定給水装置工事事業者の指定に関する記述のうち、適当でないものはどれか。',o:['指定は水道事業者が行う','指定の更新制度がある（有効期間5年）','給水装置工事主任技術者の選任が指定の要件である','指定を受けなくても給水装置工事を自由に行える'],a:3,genre:10,d:2,ex:'給水装置工事は指定給水装置工事事業者でなければ施行できない。無指定での工事は違法。',oex:['正しい。指定は水道事業者（市町村等）が行う。','正しい。令和元年改正で5年の更新制が導入された。','正しい。主任技術者の選任は指定の要件の一つ。','指定を受けずに工事を行うことはできない。']},{q:'給水装置の維持管理に関する記述のうち、適当でないものはどれか。',o:['漏水の早期発見のため定期的な点検が重要である','給水装置の維持管理は水道事業者のみの責任である','鉛管は健康上のリスクがあるため布設替えが推奨されている','凍結防止のため保温材を施す場合がある'],a:1,genre:10,d:2,ex:'給水装置の維持管理は所有者（需要者）の責任で行う。水道事業者のみの責任ではない。',oex:['正しい。漏水の早期発見・修繕のため定期点検が重要。','給水装置の維持管理は需要者の責任。','正しい。鉛管は溶出リスクがあるため他の管材への布設替えを推進。','正しい。凍結のおそれのある地域では保温措置が必要。']},{q:'漏水の原因として、適当でないものはどれか。',o:['管の腐食による穴あき','接合部のゆるみ','地盤の変動による管の破損','給水管の口径が大きすぎること'],a:3,genre:10,d:1,ex:'管の口径が大きいこと自体は漏水の原因にはならない。漏水の原因は腐食、接合不良、地盤変動等。',oex:['正しい。管の腐食は漏水の主要原因。','正しい。接合部のゆるみは漏水の原因。','正しい。地盤変動で管が破損して漏水が発生する。','口径の大小は漏水の直接原因にはならない。']},{q:'凍結防止対策に関する記述のうち、適当なものはどれか。',o:['給水管を凍結深度より深く埋設する','給水管を地表面に露出させて設置する','保温材の施工は不要である','水抜き栓は凍結防止に効果がない'],a:0,genre:10,d:1,ex:'給水管を凍結深度より深く埋設することで凍結を防止する。',oex:['正しい。凍結深度以深への埋設は基本的な凍結防止対策。','露出管は凍結しやすいため保温等の措置が必要。','露出管や浅い埋設管には保温材の施工が必要。','水抜き栓は管内の水を排出して凍結を防止する有効な装置。']},{q:'湯沸器に関する記述のうち、適当でないものはどれか。',o:['瞬間式湯沸器は水を瞬時に加熱する','貯湯式湯沸器はタンク内に温水を貯留する','電気温水器は深夜電力を利用するタイプがある','湯沸器は給水装置に該当しない'],a:3,genre:10,d:2,ex:'湯沸器は水道水を加熱する器具であり、給水管に直結する給水用具に該当する。',oex:['正しい。瞬間式は水を通過時に瞬時に加熱する。','正しい。貯湯式はタンク内で加熱した湯を貯留する。','正しい。深夜電力利用の電気温水器がある。','湯沸器は給水管に直結するため給水用具に該当する。']},{q:'浄水器に関する記述のうち、適当でないものはどれか。',o:['浄水器の認証にはJWWA規格がある','浄水器のフィルター交換は不要である','浄水器は活性炭等で水道水中の残留塩素を除去する','浄水器は給水管に直結するものは給水用具に該当する'],a:1,genre:10,d:2,ex:'浄水器のフィルター（カートリッジ）は定期的な交換が必要。交換しないと浄水性能が低下する。',oex:['正しい。日本水道協会（JWWA）の認証規格がある。','フィルターは定期交換が必要。性能維持のため重要。','正しい。活性炭フィルター等で残留塩素やカビ臭を除去。','正しい。給水管直結型は給水用具に該当する。']},{q:'食器洗い機に関する記述のうち、適当でないものはどれか。',o:['食器洗い機には逆流防止措置は不要である','食器洗い機には逆流防止措置が必要である','食器洗い機は給水用具に該当する場合がある','ビルトイン型食器洗い機は給水管に直結する'],a:0,genre:10,d:2,ex:'食器洗い機は給水管に接続するため、 水道の配水管から分岐して設置される場合がある','消火用給水装置は通常の給水装置と同様の基準が適用される'],a:3,genre:10,d:3,ex:'消火用給水装置には一般の給水装置と一部異なる基準が適用される場合がある（常時使用しないため耐圧基準等）。',oex:['正しい。消火栓用メーターの検定有効期間は別の規定がある場合も。','正しい。消火使用後の汚水逆流防止は重要な課題。','正しい。消火栓は配水管に直結されるものがある。','消火用は通常の給水装置と一部基準が異なる場合がある。']},{q:'水道の種類に関する記述のうち、適当でないものはどれか。',o:['上水道は飲料水を供給する水道である','簡易水道は給水人口が5,001人以上100人以下の水道事業である','水道用水供給事業は水道事業者に水を供給する事業である','専用水道は自家用の水道施設である'],a:1,genre:10,d:3,ex:'簡易水道事業は給水人口が5,001人以下の水道事業。設問の「100人以下」は誤り。正しくは101人以上5,000人以下（小規模を含め条件は計画給水人口5,001人以下）。',oex:['正しい。上水道は清浄な飲料水を供給する水道。','簡易水道事業は計画給水人口5,001人以下。100人以下は誤り。','正しい。水道用水供給事業は水道事業者への用水供給事業。','正しい。専用水道は自家用の水道施設（一定規模以上）。']},{q:'給水装置の検査に関する記述のうち、適当でないものはどれか。',o:['水道事業者は給水装置の検査を行うことができる','給水装置が基準に適合しない場合、水道事業者は給水を拒否できる','給水装置の工事完了後に竣工検査を行う','給水装置の検査は一切行われない'],a:3,genre:10,d:1,ex:'水道事業者は給水装置が基準に適合しているかの検査を行う権限がある。',oex:['正しい。水道事業者には給水装置の検査権限がある。','正しい。基準不適合の場合は給水を拒否できる（水道法第16条）。','正しい。工事完了後に竣工検査を行い基準適合を確認する。','給水装置の検査は実施される。行われないは誤り。']},{q:'竣工検査に関する記述のうち、適当なものはどれか。',o:['竣工検査では水質試験は含まれない','竣工検査は不要である','竣工検査では給水装置が構造・材質基準に適合しているか確認する','竣工検査は工事途中に行う'],a:2,genre:10,d:2,ex:'竣工検査は工事完了後に行い、給水装置が構造・材質基準に適合しているかを確認する検査。',oex:['竣工検査では残留塩素の測定等を含む場合がある。','竣工検査は必要な検査。不要ではない。','正しい。竣工検査は基準適合の確認のために行う。','竣工検査は工事完了後に行う。途中ではない。']},{q:'給水装置の設計に関する記述のうち、適当でないものはどれか。',o:['給水管は必ずU字型に配管しなければならない','配管はできるだけ直線的に配管するのが望ましい','管の曲がりや分岐は損失水頭の原因となる','給水管はできるだけ短い経路で配管する'],a:0,genre:10,d:1,ex:'給水管は直線的かつ最短経路で配管するのが望ましい。U字型にする規定はない。',oex:['U字型の配管規定はない。直線的・最短経路が望ましい。','正しい。直線的な配管は損失水頭を低減する。','正しい。曲がりや分岐は局部損失を発生させる。','正しい。短い経路で配管すると損失水頭が少ない。']},{q:'共用給水管と専用給水管に関する記述のうち、適当でないものはどれか。',o:['共用給水管は複数の世帯が共同で使用する給水管である','共用給水管と専用給水管の区分は管理責任に関係しない','各戸メーターは専用給水管の計量のために設置する','専用給水管は各世帯専用の給水管である'],a:1,genre:10,d:2,ex:'共用管と専用管の区分は維持管理の責任範囲に関係する重要な事項。',oex:['正しい。共用給水管は複数世帯で共用する配管。','区分は管理責任の範囲に関係する重要な事項。','正しい。各戸メーターは個別の使用水量計量のため設置。','正しい。専用給水管は各世帯専用の配管。']},{q:'給水装置における空気弁に関する記述のうち、適当でないものはどれか。',o:['空気弁は管内の空気を排出するために設置する','空気弁は管路の高所に設置する','空気弁は管内の負圧発生時に空気を吸入する機能がある','空気弁は排水管にのみ設置する'],a:3,genre:10,d:2,ex:'空気弁は給水管（水道管）に設置するものであり、排水管用ではない。',oex:['正しい。管内に溜まった空気を排出して通水を確保する。','正しい。空気は高所に溜まるため管路の高所に設置する。','正しい。負圧時に空気を吸入して管の破損を防止する。','空気弁は給水管（水道管）に設置する。排水管用ではない。']},{q:'給水管の布設工事の手順として、適当なものはどれか。',o:['配管→掘削→水圧試験→埋戻し','水圧試験→配管→掘削→埋戻し','事前調査→道路占用許可申請→掘削→配管→水圧試験→埋戻し→復旧','掘削→埋戻し→配管→水圧試験'],a:2,genre:10,d:1,ex:'給水管の布設工事は事前調査、許可申請、掘削、配管、試験、埋戻し、復旧の順序で行う。',oex:['掘削前に配管はできない。順序が誤り。','水圧試験は配管完了後に行う。順序が誤り。','正しい。この順序が給水管布設工事の標準的な手順。','配管は掘削後に行う。順序が誤り。']},{q:'配水管の種類に関する記述のうち、適当でないものはどれか。',o:['水道用ポリエチレン管は配水管にも使用される','鋼管は大口径の配水管として使用される','ダクタイル鋳鉄管は配水管として広く使用されている','配水管にはコンクリート管のみが使用される'],a:3,genre:10,d:1,ex:'配水管にはダクタイル鋳鉄管、鋼管、ポリエチレン管等の各種管材が使用される。コンクリート管のみではない。',oex:['正しい。ポリエチレン管は配水管にも使用される。','正しい。鋼管は大口径・高圧の配水管に使用される。','正しい。ダクタイル鋳鉄管は耐震性に優れ広く使用。','配水管は各種管材が使用される。コンクリート管のみではない。']},{q:'給水装置における水質の保全に関する記述のうち、適当でないものはどれか。',o:['給水管内の水の滞留は水質悪化の原因となる','給水管や給水用具からの有害物質の溶出を防止する','給水管の材質は水質に影響しない','死水（停滞水）の発生を防止するため行き止まり管は避ける'],a:2,genre:10,d:2,ex:'給水管の材質は水質に影響する。鉛管からの鉛溶出等が問題となっている。',oex:['正しい。水の滞留は残留塩素の低下や細菌繁殖の原因。','正しい。浸出性能基準により有害物質の溶出を制限。','管の材質は水質に影響する。鉛管からの鉛溶出が問題例。','正しい。行き止まり管は死水の原因となるため避ける。']},{q:'水道水の異常に関する記述のうち、適当でないものはどれか。',o:['青水は銅管からの銅溶出が原因の場合がある','赤水は管内の鉄さびが原因である','水道水に異常は一切発生しない','白濁は空気の混入が原因の場合がある'],a:2,genre:10,d:1,ex:'水道水には赤水（鉄さび）、白濁（空気混入）、青水（銅溶出）等の異常が発生する場合がある。',oex:['正しい。青水は銅管からの銅イオン溶出が原因。','正しい。赤水は鋼管内面の鉄さびが原因。','水道水には各種の異常が発生する可能性がある。','正しい。白濁は水中の微細な空気泡が原因の場合がある。']},{q:'給水装置工事の届出に関する記述のうち、適当でないものはどれか。',o:['新設工事は水道事業者への届出が必要である','改造工事も届出が必要な場合がある','撤去工事も届出が必要な場合がある','給水装置工事の届出は一切不要である'],a:3,genre:10,d:1,ex:'給水装置工事（新設、改造、修繕、撤去）は水道事業者への届出（申込み）が必要。',oex:['正しい。新設工事は水道事業者への届出が必要。','正しい。改造工事も届出が必要。','正しい。撤去工事も届出が必要。','届出は工事種別に関わらず必要。']},{q:'オームの法則に関する記述のうち、正しいものはどれか。',o:['電圧＝電流×抵抗である','電圧＝電流÷抵抗である','抵抗＝電圧×電流である','電流＝電圧×抵抗である'],a:0,genre:11,d:1,ex:'オームの法則はV=I×R（電圧＝電流×抵抗）の関係を表す。',oex:['正しい。V=IR（電圧=電流×抵抗）がオームの法則。','電圧=電流÷抵抗は誤り。V=IRである。','抵抗=電圧÷電流（R=V/I）が正しい。','電流=電圧÷抵抗（I=V/R）が正しい。']},{q:'抵抗の直列接続に関する記述のうち、正しいものはどれか。',o:['合成抵抗は最小の抵抗値と等しい','合成抵抗は各抵抗の積÷和である','合成抵抗は各抵抗の逆数の和の逆数である','合成抵抗は各抵抗の和である'],a:3,genre:11,d:1,ex:'直列接続の合成抵抗R=R1+R2+R3+...（各抵抗の和）である。',oex:['最小の抵抗値になるのは並列接続の場合。','積÷和は2つの抵抗の並列接続の計算式。','逆数の和の逆数は並列接続の計算式。','正しい。直列接続の合成抵抗は各抵抗の和。']},{q:'抵抗の並列接続に関する記述のうち、正しいものはどれか。',o:['合成抵抗は各抵抗の和である','合成抵抗は最も小さい抵抗値より小さくなる','合成抵抗は各抵抗の和より大きい','合成抵抗は最も大きい抵抗値と等しい'],a:1,genre:11,d:1,ex:'並列接続の合成抵抗は最も小さい抵抗値より小さくなる。',oex:['各抵抗の和は直列接続の計算式。','正しい。並列の合成抵抗は最小の抵抗値より小さい。','合成抵抗は各抵抗より小さくなる。','合成抵抗は最大の抵抗値より小さい。']},{q:'電力に関する記述のうち、正しいものはどれか。',o:['電力P＝電圧V×電流Iである','電力P＝電圧V÷電流Iである','電力の単位はオーム（Ω）である','電力P＝電流I÷電圧Vである'],a:0,genre:11,d:1,ex:'電力P=V×I（ワット=ボルト×アンペア）の関係がある。',oex:['正しい。P=VI（電力=電圧×電流）。','P=V÷Iは誤り。P=VIである。','電力の単位はワット（W）。オームは抵抗の単位。','P=I÷Vは誤り。']},{q:'電力量に関する記述のうち、正しいものはどれか。',o:['電力量＝電力×時間である','電力量＝抵抗×時間である','電力量＝電圧×時間である','電力量の単位はワット（W）である'],a:0,genre:11,d:1,ex:'電力量W=P×t（電力×時間）。単位はWh（ワット時）またはkWh。',oex:['正しい。電力量=電力×時間。','抵抗×時間は電力量ではない。','電圧×時間は電力量ではない。','電力量の単位はWh（ワット時）。Wは電力の単位。']},{q:'交流の実効値に関する記述のうち、正しいものはどれか。',o:['実効値は最大値の1/√2倍（約0.707倍）である','実効値は最大値の√2倍（約1.414倍）である','実効値と最大値は同じである','実効値は平均値と同じである'],a:0,genre:11,d:2,ex:'交流の実効値は最大値÷√2=最大値×(1/√2)≒最大値×0.707。',oex:['正しい。実効値=最大値/√2≒0.707×最大値。','最大値=実効値×√2。逆の関係。','実効値と最大値は異なる。','実効値と平均値も異なる。']},{q:'交流回路の力率に関する記述のうち、正しいものはどれか。',o:['力率の値は常に1より大きい','力率cosφは有効電力÷皮相電力で表される','力率は直流回路でのみ適用される概念である','力率が1のとき無効電力が最大となる'],a:1,genre:11,d:2,ex:'力率cosφ=有効電力P÷皮相電力S。力率1で有効電力が最大（無効電力ゼロ）。',oex:['力率は0～1の範囲。1より大きくはならない。','正しい。力率=P/S=cosφ。','力率は交流回路に適用される概念。','力率1のとき無効電力はゼロとなる。']},{q:'三相交流に関する記述のうち、正しいものはどれか。',o:['三相交流は120度ずつ位相がずれた3つの交流である','三相交流は60度ずつ位相がずれた3つの交流である','三相交流は2本の電線で送電する','三相交流は単相交流より送電効率が悪い'],a:0,genre:11,d:2,ex:'三相交流は位相が120度（2π/3ラジアン）ずつずれた3つの正弦波交流。',oex:['正しい。三相は120度位相差の3つの交流。','120度ずれている。60度ではない。','三相は3本（またはΔ結線の場合3本+中性線）の電線。','三相は単相より送電効率が良い。']},{q:'三相交流のスター（Y）結線に関する記述のうち、正しいものはどれか。',o:['線間電圧は相電圧の√3倍である','線間電圧は相電圧と等しい','線電流は相電流の√3倍である','線間電圧は相電圧の2倍である'],a:0,genre:11,d:2,ex:'Y結線では線間電圧VL=√3×相電圧Vp、線電流IL=相電流Ipの関係がある。',oex:['正しい。Y結線の線間電圧=√3×相電圧。','線間電圧と相電圧は異なる（√3倍の関係）。','Y結線では線電流=相電流（等しい）。','√3倍であって2倍ではない。']},{q:'三相交流のデルタ（Δ）結線に関する記述のうち、正しいものはどれか。',o:['線間電圧は相電圧の√3倍である','線電流は相電流の√3倍である','線電流は相電流と等しい','線間電圧は相電圧の2倍である'],a:1,genre:11,d:2,ex:'Δ結線では線間電圧VL=相電圧Vp、線電流IL=√3×相電流Ipの関係がある。',oex:['Δ結線では線間電圧=相電圧（等しい）。','正しい。Δ結線の線電流=√3×相電流。','線電流は相電流の√3倍。等しくない。','線間電圧=相電圧。2倍ではない。']},{q:'コンデンサに関する記述のうち、正しいものはどれか。',o:['コンデンサを並列接続すると合成容量は減少する','コンデンサは電荷を蓄える素子である','コンデンサは直流電流を流す素子である','コンデンサの容量の単位はヘンリー（H）である'],a:1,genre:11,d:1,ex:'コンデンサ（キャパシタ）は電荷を蓄える受動素子。容量の単位はファラド（F）。',oex:['並列接続すると合成容量は増加する。','正しい。コンデンサは電荷を蓄える素子。','コンデンサは直流を通さない（交流のみ通す）。','コンデンサの容量の単位はファラド（F）。ヘンリーはインダクタンス。']},{q:'電線の許容電流に関する記述のうち、正しいものはどれか。',o:['電線の許容電流は電線の長さにより決まる','すべての電線の許容電流は同じである','許容電流を超えて使用しても問題ない','電線の許容電流は電線の太さ（断面積）により異なる'],a:3,genre:11,d:1,ex:'電線の許容電流は導体の太さ（断面積）、絶縁物の種類、周囲温度等により異なる。',oex:['許容電流は長さではなく太さで決まる。','電線の種類・太さにより許容電流は異なる。','許容電流を超えると過熱・絶縁劣化・火災の危険がある。','正しい。許容電流は電線の太さにより異なる。']},{q:'VVFケーブルに関する記述のうち、正しいものはどれか。',o:['VVFケーブルは地中埋設専用のケーブルである','VVFケーブルは600Vビニル絶縁ビニルシースケーブル平形である','VVFケーブルは高圧配線に使用する','VVFケーブルの外装は金属製である'],a:1,genre:11,d:1,ex:'VVFはVinyl insulated Vinyl sheathed Flat cableの略で、600V以下の屋内配線に最も多く使用される。',oex:['VVFは屋内配線用。地中埋設にはCVケーブル等を使用。','正しい。VVFは600Vビニル絶縁ビニルシースケーブル平形。','VVFは低圧（600V以下）配線用。高圧には不可。','VVFの外装はビニル（PVC）。金属ではない。']},{q:'金属管工事に関する記述のうち、正しいものはどれか。',o:['金属管工事は薄鋼電線管や厚鋼電線管を使用する工事である','金属管内には必ず接続点を設ける','金属管にはD種接地工事は不要である','金属管は木造住宅にのみ使用する'],a:0,genre:11,d:2,ex:'金属管工事は薄鋼電線管（C管）や厚鋼電線管（G管）に電線を収めて配線する工事方法。',oex:['正しい。金属管にはC管（薄鋼）とG管（厚鋼）がある。','金属管内には接続点を設けてはならない。','金属管にはD種接地工事が必要。','金属管工事はRC造等にも使用する。']},{q:'合成樹脂管工事に関する記述のうち、正しいものはどれか。',o:['PF管は自己消火性がない','合成樹脂管は高圧配線に使用する','PF管は可とう性のある合成樹脂製電線管である','CD管は自己消火性がある'],a:2,genre:11,d:2,ex:'PF管（PF＝Plastic Flexible）は可とう性があり自己消火性を有する合成樹脂製電線管。',oex:['PF管は自己消火性がある。','合成樹脂管は低圧配線に使用する。','正しい。PF管は可とう性のある合成樹脂管。','CD管は自己消火性がない（コンクリート埋設専用）。']},{q:'ケーブル工事に関する記述のうち、正しいものはどれか。',o:['ケーブル工事はVVFケーブルやCVケーブルを使用する工事である','ケーブルは管に収めなければならない','ケーブルの曲げ半径に制限はない','ケーブルは支持なしに壁面に直接固定してはならない'],a:0,genre:11,d:1,ex:'ケーブル工事はケーブルを直接敷設する工事方法。VVF、CV等の各種ケーブルを使用する。',oex:['正しい。VVF、CV等のケーブルを使用する。','ケーブルは管に収めず直接敷設できる。','曲げ半径には制限がある（外径の6倍以上等）。','ケーブルはステープル等で壁面に直接固定できる。']},{q:'配線用遮断器（ブレーカー）に関する記述のうち、正しいものはどれか。',o:['過電流を検出して自動的に回路を遮断する保護装置である','手動でのみ操作する開閉器である','漏電の検出機能がある','高圧回路専用の機器である'],a:0,genre:11,d:1,ex:'配線用遮断器（MCCB）は過電流（過負荷・短絡）を検出して自動的に回路を遮断する保護機器。',oex:['正しい。過電流を検出して自動遮断する保護装置。','手動操作もできるが、主機能は自動遮断。','漏電検出は漏電遮断器（ELCB）の機能。MCCBにはない。','低圧回路の保護に使用する。高圧専用ではない。']},{q:'漏電遮断器に関する記述のうち、正しいものはどれか。',o:['漏電遮断器は漏電を検出して自動的に回路を遮断する','漏電遮断器は過電流の保護機能がない','漏電遮断器は一般家庭には設置不要である','漏電遮断器の定格感度電流は1Aが標準である'],a:0,genre:11,d:1,ex:'漏電遮断器（ELCB）は漏電（地絡）電流を零相変流器（ZCT）で検出し自動遮断する。',oex:['正しい。漏電を検出して自動的に回路を遮断する。','多くの漏電遮断器は過電流保護機能も兼ね備える。','一般家庭の分電盤にも漏電遮断器は設置される。','定格感度電流は一般に30mA（0.03A）が標準。1Aではない。']},{q:'電磁開閉器に関する記述のうち、正しいものはどれか。',o:['電磁開閉器は電磁接触器とサーマルリレーを組み合わせたものである','電磁開閉器は照明回路専用である','電磁開閉器は手動でのみ操作する','電磁開閉器は高圧回路専用である'],a:0,genre:11,d:2,ex:'電磁開閉器（マグネットスイッチ）は電磁接触器（MC）とサーマルリレー（過負荷保護）の組合せ。',oex:['正しい。電磁接触器+サーマルリレー=電磁開閉器。','電動機の運転制御に広く使用される。照明専用ではない。','電磁コイルの励磁で自動的に動作する。','低圧回路の電動機制御に使用する。']},{q:'変圧器に関する記述のうち、正しいものはどれか。',o:['変圧器は交流の電圧を変換する機器である','変圧器は直流の電圧を変換する機器である','変圧器は電力を増幅する機器である','変圧器は周波数を変換する機器である'],a:0,genre:11,d:1,ex:'変圧器（トランス）は交流の電圧を変換する機器。巻数比により昇圧・降圧する。',oex:['正しい。変圧器は交流電圧を変換する機器。','直流は変圧器で直接変換できない。','変圧器は電圧を変換する。電力は増幅しない（損失がある）。','変圧器は周波数は変換しない。電圧のみ変換。']},{q:'接地工事の種類に関する記述のうち、正しいものはどれか。',o:['D種接地工事の接地抵抗値は100Ω以下である','A種接地工事の接地抵抗値は500Ω以下である','C種接地工事の接地抵抗値は300Ω以下である','B種接地工事の接地抵抗値は50Ω以下である'],a:0,genre:11,d:2,ex:'D種接地工事の接地抵抗値は100Ω以下（漏電遮断器設置時は500Ω以下に緩和可能）。',oex:['正しい。D種接地の接地抵抗値は100Ω以下。','A種接地の接地抵抗値は10Ω以下。500Ωではない。','C種接地の接地抵抗値は10Ω以下。300Ωではない。','B種接地の接地抵抗値は変圧器の仕様により計算で求める。']},{q:'D種接地工事に関する記述のうち、正しいものはどれか。',o:['変圧器の中性点に施す接地工事である','6,600Vの高圧機器に施す接地工事である','300V以下の低圧機器の金属製外箱に施す接地工事である','特別高圧機器に施す接地工事である'],a:2,genre:11,d:2,ex:'D種接地工事は300V以下の低圧機器の金属製外箱、金属管等に施す接地工事。',oex:['変圧器中性点にはB種接地工事を施す。','高圧機器にはA種接地工事を施す。','正しい。D種接地は300V以下の低圧機器用。','特別高圧にはA種接地工事を施す。']},{q:'接地工事の目的に関する記述のうち、正しいものはどれか。',o:['感電事故の防止と漏電火災の防止が主な目的である','美観のために行う','電気料金の節約のために行う','音質向上のために行う'],a:0,genre:11,d:1,ex:'接地工事は漏電時の感電事故防止と漏電火災防止が主目的。',oex:['正しい。接地は感電防止と漏電火災防止が主目的。','接地は安全のために行う。美観とは無関係。','接地は安全対策。料金節約とは無関係。','接地は電気安全が目的。']},{q:'第二種電気工事士の作業範囲に関する記述のうち、正しいものはどれか。',o:['すべての電圧の電気工事ができる','電気工事士の資格がなくても電気工事はできる','自家用電気工作物（高圧）の電気工事ができる','一般用電気工作物の電気工事を行うことができる'],a:3,genre:11,d:1,ex:'第二種電気工事士は一般用電気工作物（600V以下の受電設備で一般住宅等）の工事ができる。',oex:['第二種は一般用電気工作物に限定される。','電気工事は電気工事士の資格が必要。無資格は違法。','自家用電気工作物は第一種電気工事士の範囲。','正しい。第二種は一般用電気工作物の工事が可能。']},{q:'電気工事士法に関する記述のうち、正しいものはどれか。',o:['電気工事士の免状は都道府県知事が交付する','電気工事士でなければ電気工事を行ってはならない','電気工事士の免状は更新が必要である','電気工事士法は電気工事業者のみに適用される'],a:1,genre:11,d:1,ex:'電気工事士法により、電気工事は電気工事士の資格を持つ者でなければ行ってはならない。',oex:['免状は都道府県知事が交付する。これも正しい。','正しい。電気工事は有資格者のみが行える。','第二種の免状には更新制度はない。','電気工事士個人にも適用される。']},{q:'配線図の図記号に関する記述のうち、正しいものはどれか。',o:['○の中にFと書かれた記号は蛍光灯を示す','○の記号は常にコンセントを示す','□の記号は常にスイッチを示す','△の記号は配線用遮断器を示す'],a:0,genre:11,d:2,ex:'配線図で○の中にFは蛍光灯の図記号として一般的に使用される。',oex:['正しい。○にFは蛍光灯を示す一般的な図記号。','○は照明器具等を示す場合もある。常にコンセントではない。','□はコンセント等を示す場合がある。常にスイッチではない。','△は特定の記号で配線用遮断器とは限らない。']},{q:'スイッチの図記号に関する記述のうち、正しいものはどれか。',o:['3路スイッチは●に数字3を添えて表す','上記すべてが正しい','単極スイッチは●で表される','4路スイッチは●に数字4を添えて表す'],a:1,genre:11,d:2,ex:'スイッチの図記号は●（黒丸）が基本で、3路は3、4路は4を添える。',oex:['正しい。3路スイッチは●に3を添える。','正しい。すべて正しい。','正しい。単極スイッチは●で表される。','正しい。4路スイッチは●に4を添える。']},{q:'コンセントの図記号に関する記述のうち、正しいものはどれか。',o:['上記すべてが正しい','一般用コンセントは壁付けの場合二重丸で表される場合がある','接地極付コンセントにはEの記号が付く','接地端子付コンセントにはETの記号が付く'],a:0,genre:11,d:2,ex:'コンセントの図記号は種類により区別され、接地極付にはE、接地端子付にはET等の記号を付す。',oex:['正しい。すべて正しい。','正しい。壁付けコンセントは二重丸で表される場合がある。','正しい。接地極付にはEを付ける。','正しい。接地端子付にはETを付ける。']},{q:'電気工事で使用するリングスリーブに関する記述のうち、正しいものはどれか。',o:['リングスリーブは電線の切断に使用する','リングスリーブは電線の圧着接続に使用する','リングスリーブはボルトの締付けに使用する','リングスリーブは電線の被覆剥ぎに使用する'],a:1,genre:11,d:1,ex:'リングスリーブは銅管に電線を挿入し圧着工具で圧着して接続する材料。',oex:['電線の切断にはペンチや電工ナイフを使用。','正しい。リングスリーブは電線の圧着接続用。','ボルト締付けにはレンチやスパナを使用。','被覆剥ぎにはワイヤストリッパや電工ナイフを使用。']},{q:'圧着ペンチ（圧着工具）に関する記述のうち、正しいものはどれか。',o:['リングスリーブの圧着に使用する専用工具である','ボルトの締付けに使用する工具である','電線の被覆を剥く工具である','コンクリートへの穴あけに使用する工具である'],a:0,genre:11,d:1,ex:'圧着ペンチはリングスリーブを用いた電線の圧着接続に使用する専用工具。JIS適合品を使用する。',oex:['正しい。リングスリーブの圧着接続に使用する専用工具。','ボルト締付けはレンチの用途。','被覆剥ぎはワイヤストリッパの用途。','穴あけは振動ドリルの用途。']},{q:'ワイヤストリッパに関する記述のうち、正しいものはどれか。',o:['ボルトを締め付けるための工具である','金属管を切断するための工具である','電線の絶縁被覆を剥き取るための工具である','電線を圧着するための工具である'],a:2,genre:11,d:1,ex:'ワイヤストリッパは電線の絶縁被覆（シース・絶縁体）を正確に剥き取る工具。',oex:['ボルト締付けはレンチで行う。','金属管切断はパイプカッタ等で行う。','正しい。電線の絶縁被覆を剥き取る専用工具。','圧着は圧着工具（圧着ペンチ）で行う。']},{q:'電工ナイフに関する記述のうち、正しいものはどれか。',o:['電線の被覆の剥離やケーブルの外装剥ぎに使用する','金属管の切断に使用する','電気の計測に使用する','コンクリートの穴あけに使用する'],a:0,genre:11,d:1,ex:'電工ナイフは電線の絶縁被覆の剥離、ケーブルシースの切り裂き等に使用する刃物工具。',oex:['正しい。電工ナイフは被覆剥離やケーブル加工に使用。','金属管切断にはパイプカッタや金のこを使用。','計測にはテスタや回路計を使用。','穴あけにはドリルを使用。']},{q:'電線の接続に関する記述のうち、正しいものはどれか。',o:['電線の接続はどのような方法でも自由に行える','電線の接続は被覆をつけたまま行う','電線の接続部は絶縁処理しなくてよい','電線の接続部の電気抵抗は増加させてはならない'],a:3,genre:11,d:1,ex:'電線の接続部は接続前の電線の抵抗値以上の電気抵抗とならないようにする（内線規程）。',oex:['接続方法は基準に適合した方法で行う。自由ではない。','電線接続時は被覆を剥いて導体を露出させて接続する。','接続部は絶縁テープ等で絶縁処理が必要。','正しい。接続部の電気抵抗を増加させてはならない。']},{q:'差込形コネクタに関する記述のうち、正しいものはどれか。',o:['差込形コネクタは電線の芯線を差し込むだけで接続できる器具である','差込形コネクタは屋外の露出配線に使用する','差込形コネクタは圧着工具が必要である','差込形コネクタは高圧配線に使用する'],a:0,genre:11,d:1,ex:'差込形コネクタは電線の芯線を差し込むだけでワンタッチ接続できる接続器具。',oex:['正しい。芯線を差し込むだけでワンタッチ接続できる。','差込形コネクタはボックス内等の屋内配線で使用。','圧着工具は不要。差し込むだけで接続できる。','低圧配線用。高圧には使用しない。']},{q:'VVFケーブルの施工に関する記述のうち、正しいものはどれか。',o:['VVFケーブルの支持間隔は5m以上でよい','VVFケーブルは常に金属管に収めて配線する','VVFケーブルの曲げ半径は制限なく自由に曲げられる','VVFケーブルはステープルで固定して配線する'],a:3,genre:11,d:1,ex:'VVFケーブルは壁面や天井にステープル（サドル）で固定して配線する。',oex:['支持間隔は2m以下（水平の場合1m以下）が推奨。','VVFケーブルは直接敷設でき管に収める必要はない。','曲げ半径には制限がある（外径の6倍以上）。','正しい。VVFケーブルはステープルで壁面等に固定。']},{q:'絶縁抵抗測定に関する記述のうち、正しいものはどれか。',o:['絶縁抵抗計（メガー）を使用して測定する','テスタ（回路計）で測定する','クランプメータで測定する','照度計で測定する'],a:0,genre:11,d:1,ex:'絶縁抵抗の測定には絶縁抵抗計（メガー）を使用する。',oex:['正しい。絶縁抵抗はメガー（絶縁抵抗計）で測定。','テスタは電圧・電流・抵抗の測定用。絶縁抵抗は不可。','クランプメータは電流測定用。','照度計は照度（明るさ）の測定用。']},{q:'絶縁抵抗の基準値に関する記述のうち、正しいものはどれか。',o:['対地電圧150V以下の場合、絶縁抵抗値は0.1MΩ以上である','すべての回路の絶縁抵抗値は同じ基準である','絶縁抵抗値は0Ωでもよい','絶縁抵抗値に基準はない'],a:0,genre:11,d:2,ex:'電技解釈で対地電圧150V以下（一般住宅等）の絶縁抵抗は0.1MΩ以上と規定。',oex:['正しい。対地電圧150V以下は0.1MΩ以上。','対地電圧の区分により基準値が異なる。','絶縁抵抗0Ωは地絡状態であり不可。','電気設備技術基準で基準値が規定されている。']},{q:'接地抵抗の測定に関する記述のうち、正しいものはどれか。',o:['絶縁抵抗計で測定する','テスタで測定する','接地抵抗計を使用して測定する','電力量計で測定する'],a:2,genre:11,d:1,ex:'接地抵抗の測定には接地抵抗計（アーステスタ）を使用する。',oex:['絶縁抵抗計は絶縁抵抗測定用。接地抵抗は別。','テスタでは接地抵抗は正確に測定できない。','正しい。接地抵抗はアーステスタ（接地抵抗計）で測定。','電力量計は電力量の計量用。']},{q:'竣工検査に関する記述のうち、正しいものはどれか。',o:['竣工検査は外観検査のみで十分である','竣工検査では絶縁抵抗測定、接地抵抗測定、目視検査等を行う','竣工検査は電力会社が行い、電気工事士は関与しない','竣工検査は不要である'],a:1,genre:11,d:2,ex:'竣工検査では絶縁抵抗測定、接地抵抗測定、導通試験、外観検査等を行い安全を確認する。',oex:['外観検査のみでは不十分。測定も必要。','正しい。各種測定と目視検査で安全確認する。','電気工事士（施工者）も竣工検査に関与する。','竣工検査は電気工事完了後に必ず行う。']},{q:'低圧屋内配線の施工場所による制限に関する記述のうち、正しいものはどれか。',o:['展開した場所（乾燥した露出場所）ではがいし引き工事が施工できる','湿気の多い場所ではすべての工事方法が制限なく施工できる','点検できない隠ぺい場所ではがいし引き工事が施工できる','金属管工事はすべての場所で施工できない'],a:0,genre:11,d:2,ex:'展開した場所（乾燥した露出場所）ではがいし引き工事、金属管工事、ケーブル工事等が施工可能。',oex:['正しい。乾燥した露出場所ではがいし引き工事が可能。','湿気の多い場所では施工できない工事方法がある。','隠ぺい場所ではがいし引き工事は施工できない。','金属管工事はほぼすべての場所で施工可能。']},{q:'電線の色別に関する記述のうち、正しいものはどれか。',o:['接地側電線は白色を使用する','非接地側電線は白色を使用する','接地側電線は赤色を使用する','接地線は赤色を使用する'],a:0,genre:11,d:1,ex:'単相2線式の接地側電線は白色、非接地側電線は黒色を使用するのが標準。',oex:['正しい。接地側電線は白色を使用する。','非接地側は黒色（または赤色）。白色は接地側。','接地側は白色。赤色は非接地側に使用する場合がある。','接地線は緑色または緑/黄のストライプ。赤色ではない。']},{q:'コンセントの設置に関する記述のうち、正しいものはどれか。',o:['水気のある場所には接地極付コンセントを使用する','コンセントの定格電流は配線用遮断器の定格に関係しない','すべてのコンセントは接地極なしでよい','コンセントは天井にのみ設置する'],a:0,genre:11,d:2,ex:'水気のある場所（洗面所、台所等）には感電防止のため接地極付コンセント（EETコンセント）を使用する。',oex:['正しい。水気のある場所には接地極付コンセントを使用。','コンセントの定格と配線用遮断器の定格は整合させる。','水気のある場所等では接地極付が必要。','コンセントは壁面に設置するのが一般的。']},{q:'照明器具の取付けに関する記述のうち、正しいものはどれか。',o:['照明器具は電源に直接はんだ付けする','照明器具の取付けに電気工事士の資格は不要である','引掛シーリングは天井に照明器具を取り付けるための器具である','引掛シーリングはコンセントの一種である'],a:2,genre:11,d:1,ex:'引掛シーリング（引掛ローゼット）は天井に設置し、照明器具をワンタッチで取り付けるための接続器具。',oex:['はんだ付けではなく引掛シーリング等の器具で接続する。','照明器具の接続に係る電気工事には資格が必要。','正しい。引掛シーリングは照明器具の天井取付け用。','引掛シーリングはコンセントではなく照明用接続器具。']},{q:'キルヒホッフの第一法則（電流の法則）に関する記述のうち、正しいものはどれか。',o:['電力に関する法則である','回路全体の電圧降下の和はゼロである','直列回路にのみ適用される','回路の分岐点に流入する電流の和は流出する電流の和に等しい'],a:3,genre:11,d:2,ex:'キルヒホッフの第一法則は電流保存則であり、分岐点での流入電流の和=流出電流の和。',oex:['電流に関する法則。電力ではない。','電圧降下の和に関するのは第二法則。','並列回路の分岐点にも適用される。','正しい。分岐点で流入電流の和=流出電流の和。']},{q:'キルヒホッフの第二法則（電圧の法則）に関する記述のうち、正しいものはどれか。',o:['閉回路における電圧降下の総和は起電力の総和に等しい','分岐点の電流に関する法則である','並列回路にのみ適用される','電力に関する法則である'],a:0,genre:11,d:2,ex:'キルヒホッフの第二法則は閉回路（ループ）内の電圧降下の和=起電力の和。',oex:['正しい。閉回路で電圧降下の総和=起電力の総和。','電流に関するのは第一法則。','直列・並列を問わず閉回路に適用できる。','電圧に関する法則。']},{q:'電気抵抗に関する記述のうち、正しいものはどれか。',o:['導体の抵抗は断面積に比例する','導体の抵抗は温度に無関係である','導体の抵抗は長さに比例し断面積に反比例する','導体の抵抗は長さに反比例する'],a:2,genre:11,d:2,ex:'抵抗R=ρ×L/A（ρ:抵抗率、L:長さ、A:断面積）。長さに比例、断面積に反比例。',oex:['断面積に反比例する。比例ではない。','金属の抵抗は温度上昇とともに増加する。','正しい。R=ρL/A。長さに比例、断面積に反比例。','長さに比例する。反比例ではない。']},{q:'電線の発熱に関する記述のうち、正しいものはどれか。',o:['電流が流れても電線は発熱しない','発熱量は抵抗に反比例する','ジュールの法則により電線の発熱量はI²Rtで表される','発熱量は電流の1乗に比例する'],a:2,genre:11,d:2,ex:'ジュールの法則：発熱量Q=I²Rt（電流の2乗×抵抗×時間）。',oex:['電流が流れると抵抗により発熱する。','発熱量は抵抗に比例する。','正しい。Q=I²Rt（ジュールの法則）。','発熱量は電流の2乗に比例する。']},{q:'分岐回路の設計に関する記述のうち、正しいものはどれか。',o:['20Aの配線用遮断器の分岐回路には2.0mm以上のVVFケーブルを使用する','15Aの配線用遮断器の分岐回路には0.5mmの電線で十分である','分岐回路の電線の太さは自由に選定できる','コンセントの定格電流は遮断器の定格に関係しない'],a:0,genre:11,d:2,ex:'20A分岐回路には直径2.0mm（断面積3.5mm²以上）以上の銅線を使用する。',oex:['正しい。20A回路には2.0mm以上のVVFケーブルを使用。','15A回路でも1.6mm以上の電線が必要。0.5mmでは不足。','電線の太さは遮断器の定格に応じた基準がある。','コンセントの定格は遮断器の定格に適合させる。']},{q:'幹線の設計に関する記述のうち、正しいものはどれか。',o:['幹線の太さは接続する負荷の合計電流に基づいて決定する','幹線は細い電線でも問題ない','幹線の過電流保護は不要である','幹線の電圧降下は考慮しなくてよい'],a:0,genre:11,d:2,ex:'幹線の電線の太さは接続される負荷の合計電流（需要率を考慮）に基づいて決定する。',oex:['正しい。幹線の太さは負荷の合計電流で決定する。','幹線は大電流が流れるため適切な太さが必要。','幹線にも過電流保護（遮断器等）が必要。','幹線の電圧降下は使用機器の性能に影響するため考慮が必要。']},{q:'電動機（モーター）に関する記述のうち、正しいものはどれか。',o:['単相誘導電動機は始動トルクが大きい','電動機の始動電流は定格電流より小さい','電動機には過負荷保護は不要である','三相誘導電動機は産業用として最も多く使用される電動機である'],a:3,genre:11,d:2,ex:'三相誘導電動機（三相かご形）は構造が簡単で堅牢なため産業用に最も多く使用される。',oex:['単相誘導電動機は始動トルクが小さく始動用コンデンサ等が必要。','始動電流は定格電流の5～7倍と大きい。','過負荷保護（サーマルリレー等）が必要。','正しい。三相誘導電動機は産業用の標準的な電動機。']},{q:'電動機の始動法に関する記述のうち、正しいものはどれか。',o:['直入れ始動は始動電流が最も小さい','スターデルタ始動は始動電流を抑える方法の一つである','インバータ始動は始動電流を増大させる方法である','始動電流を抑える必要はない'],a:1,genre:11,d:2,ex:'スターデルタ（Y-Δ）始動は始動時にY結線で運転し電流を1/3に抑え、加速後にΔ結線に切り替える。',oex:['直入れ（全電圧）始動は始動電流が最も大きい。','正しい。Y-Δ始動は始動電流を全電圧始動の1/3に抑える。','インバータ始動は始動電流を抑えることができる。','大きな始動電流は配電系統に影響するため抑制が必要。']},{q:'照明に関する記述のうち、正しいものはどれか。',o:['LED照明は白熱電球より消費電力が少ない','白熱電球はLEDより効率が良い','蛍光灯は点灯に安定器が不要である','ナトリウムランプは住宅の主照明に最適である'],a:0,genre:11,d:1,ex:'LED照明は白熱電球に比べて消費電力が大幅に少なく（約1/8）、寿命も長い。',oex:['正しい。LED照明は白熱電球より大幅に省エネ。','白熱電球の効率はLEDより低い（大部分が熱になる）。','蛍光灯の点灯には安定器（インバータ等）が必要。','ナトリウムランプは道路照明等に使用。住宅主照明にはLED等。']},{q:'照度に関する記述のうち、正しいものはどれか。',o:['照度の単位はルクス（lx）である','照度の単位はカンデラ（cd）である','照度の単位はルーメン（lm）である','照度の単位はワット（W）である'],a:0,genre:11,d:1,ex:'照度はある面が受ける光の量で、単位はルクス（lx）。1lx=1lm/m²。',oex:['正しい。照度の単位はルクス（lx）。','カンデラは光度の単位。','ルーメンは光束の単位。','ワットは電力の単位。']},{q:'電線の種類に関する記述のうち、正しいものはどれか。',o:['IV線の絶縁体はゴムである','IV線は裸電線である','IV線はケーブルの一種である','IV線は600Vビニル絶縁電線である'],a:3,genre:11,d:1,ex:'IV（Indoor PVC）線は600Vビニル絶縁電線で、管工事やがいし引き工事に使用する。',oex:['IVの絶縁体はビニル（PVC）。ゴムではない。','IVは絶縁被覆があり裸電線ではない。','IVはケーブルではなく単芯の絶縁電線。','正しい。IVは600Vビニル絶縁電線。']},{q:'CVケーブルに関する記述のうち、正しいものはどれか。',o:['CVケーブルのCは銅（Copper）を意味する','CVケーブルは屋外では使用できない','CVケーブルは架橋ポリエチレン絶縁ビニルシースケーブルである','CVケーブルは低圧専用である'],a:2,genre:11,d:2,ex:'CVはCross-linked polyethylene insulated Vinyl sheathed cableの略。架橋PE絶縁ビニルシースケーブル。',oex:['CはCross-linked（架橋）の頭文字。','屋外でも使用可能。耐候性がある。','正しい。CVは架橋PE絶縁ビニルシースケーブル。','CVケーブルは高圧にも使用される。低圧専用ではない。']},{q:'住宅用分電盤に関する記述のうち、正しいものはどれか。',o:['分電盤は高圧受電設備の一部である','分電盤にはブレーカーは1個のみ収められる','分電盤は屋外に設置するのが一般的である','分電盤にはメインブレーカーと分岐用ブレーカーが収められている'],a:3,genre:11,d:1,ex:'住宅用分電盤にはメインブレーカー（主幹）と各回路の分岐ブレーカーが収められている。',oex:['住宅用分電盤は低圧の分電設備。','複数のブレーカーが収められている。','分電盤は一般に屋内に設置する。','正しい。メインブレーカーと分岐ブレーカーを収納。']},{q:'単相3線式の特徴に関する記述のうち、正しいものはどれか。',o:['3本の電線のうち1本は不要である','200Vのみ利用できる','100Vと200Vの両方の電圧が利用できる','100Vのみ利用できる'],a:2,genre:11,d:2,ex:'単相3線式は中性線と各電圧線の間で100V、両電圧線間で200Vが利用できる。',oex:['3本すべて必要。中性線は欠かせない。','100Vも利用できる。200Vのみではない。','正しい。100Vと200Vの両方の電圧が利用可能。','100Vだけでなく200Vも利用できる。']},{q:'感電に関する記述のうち、正しいものはどれか。',o:['100V程度の電圧では感電死することはない','乾燥した手で電線に触れても絶対に感電しない','人体に電流が流れることにより感電する','感電は交流のみで発生し、直流では発生しない'],a:2,genre:11,d:1,ex:'感電は人体に電流が流れることにより発生し、電流値によってはショック、やけど、心室細動等を起こす。',oex:['100Vでも条件次第で感電死する危険がある。','乾燥した手でも条件次第で感電する危険がある。','正しい。人体を通じて電流が流れると感電する。','直流でも感電は発生する。']},{q:'電気火災の予防に関する記述のうち、正しいものはどれか。',o:['たこ足配線は電気火災の原因となるため避ける','電気火災は配線の過負荷とは無関係である','電気コードを束ねて使用しても問題ない','トラッキング現象は火災の原因にならない'],a:0,genre:11,d:1,ex:'たこ足配線はコンセントや電線に過大な電流が流れ、過熱・発火の原因となる。',oex:['正しい。たこ足配線は過負荷による発火の原因となる。','過負荷による発熱は電気火災の主要原因。','電気コードを束ねると放熱が悪くなり過熱する。','トラッキング現象はコンセント部の火災原因として重要。']},{q:'電気設備技術基準に関する記述のうち、正しいものはどれか。',o:['電気設備技術基準は建築基準法の一部である','電気設備技術基準は電気設備の安全基準を定めたものである','電気設備技術基準は電気工事士法の一部である','電気設備技術基準は任意の基準であり遵守義務はない'],a:1,genre:11,d:2,ex:'電気設備技術基準（電技）は電気事業法に基づく省令で、電気設備の安全に関する技術基準を定めている。',oex:['電技は電気事業法に基づく省令。建築基準法ではない。','正しい。電技は電気設備の安全基準。','電技は電気事業法の省令。電気工事士法ではない。','電技は法令であり遵守義務がある。']},{q:'電気用品安全法に関する記述のうち、正しいものはどれか。',o:['PSEマークは任意表示である','電気用品安全法は電気工事には適用されない','電気用品にはPSEマークの表示が義務づけられている','電気用品安全法は輸入品には適用されない'],a:2,genre:11,d:2,ex:'電気用品安全法により、電気用品にはPSE（Product Safety of Electrical appliance）マークの表示が義務。',oex:['PSEマークは法律による義務表示。任意ではない。','電気工事で使用する電気用品にも適用される。','正しい。電気用品にはPSEマーク表示が義務。','輸入品にも適用される。']},{q:'3路スイッチに関する記述のうち、正しいものはどれか。',o:['3路スイッチは2箇所から1つの照明を入切できる','3路スイッチは1箇所からのみ操作できる','3路スイッチは端子が2つである','3路スイッチと単極スイッチは同じものである'],a:0,genre:11,d:2,ex:'3路スイッチは2箇所（階段の上下等）から1つの照明を入・切操作するために使用する。',oex:['正しい。3路スイッチは2箇所からの入切が可能。','3路は2箇所からの操作が目的。1箇所は単極スイッチ。','3路スイッチは端子が3つ（0、1、3）ある。','3路と単極は機能が異なる別のスイッチ。']},{q:'4路スイッチに関する記述のうち、正しいものはどれか。',o:['4路スイッチ単独で2箇所から照明を入切できる','4路スイッチは3路スイッチと組み合わせて3箇所以上から照明を入切できる','4路スイッチの端子は2つである','4路スイッチは3路スイッチと同じ機能である'],a:1,genre:11,d:2,ex:'4路スイッチは2つの3路スイッチの間に入れることで3箇所以上からの入切を可能にする。',oex:['4路スイッチ単独では使用しない。3路と組み合わせる。','正しい。4路+3路2個で3箇所以上からの入切が可能。','4路スイッチは端子が4つある。','4路と3路は機能が異なる。']},{q:'パイロットランプの配線に関する記述のうち、正しいものはどれか。',o:['常時点灯はスイッチの状態に関係なく常に消灯する配線である','パイロットランプの配線方法は1種類のみである','異時点灯はスイッチOFFの時にパイロットランプが点灯する配線である','同時点灯はスイッチOFFの時にパイロットランプが点灯する配線である'],a:2,genre:11,d:3,ex:'異時点灯はスイッチOFF時にパイロットランプが点灯し、スイッチの位置を確認できる配線方式。',oex:['常時点灯はスイッチの状態に関係なく常に点灯する。','異時点灯、同時点灯、常時点灯の3種類がある。','正しい。異時点灯はスイッチOFF時にランプ点灯。','同時点灯はスイッチON時にランプが点灯する。']},{q:'合成樹脂製可とう電線管（PF管・CD管）に関する記述のうち、正しいものはどれか。',o:['PF管はコンクリート埋設のほか露出配線にも使用できる','PF管とCD管は全く同じ性能である','CD管は露出配線に使用できる','CD管は自己消火性がある'],a:0,genre:11,d:2,ex:'PF管は自己消火性があり、コンクリート埋設・露出の両方に使用可能。CD管は自己消火性がなくコンクリート埋設専用。',oex:['正しい。PF管は自己消火性があり露出配線にも使用可。','PF管は自己消火性あり、CD管はなし。性能が異なる。','CD管はコンクリート埋設専用。露出配線は不可。','CD管は自己消火性がない。PF管にはある。']},{q:'プルボックスに関する記述のうち、正しいものはどれか。',o:['プルボックスは配線用遮断器を収める箱である','プルボックスは接地極の一種である','プルボックスは照明器具の一種である','プルボックスは配管の途中で電線の引入れや接続を行うための箱である'],a:3,genre:11,d:2,ex:'プルボックスは金属管工事等で配管の途中に設置し、電線の引入れ・接続を行うための金属製の箱。',oex:['遮断器を収めるのは分電盤。プルボックスは別。','プルボックスは配線用の箱。接地極ではない。','プルボックスは照明器具ではない。','正しい。電線の引入れ・接続用の箱。']},{q:'ジョイントボックスに関する記述のうち、正しいものはどれか。',o:['ジョイントボックスは電力量計を収める箱である','ジョイントボックスは配線用遮断器を収める箱である','ジョイントボックスは電線の接続点を収める箱である','ジョイントボックスはスイッチを取り付ける箱である'],a:2,genre:11,d:1,ex:'ジョイントボックス（アウトレットボックス）は電線の接続点や分岐点を収める箱。',oex:['電力量計はメーターボックスに収める。','遮断器は分電盤に収める。','正しい。電線の接続点を収める箱。','スイッチはスイッチボックスに取り付ける。']},{q:'電力量計（電気メーター）に関する記述のうち、正しいものはどれか。',o:['電力量計は使用した電力量を積算計量する機器である','電力量計は電流のみを測定する機器である','電力量計は電圧を測定する機器である','電力量計は抵抗を測定する機器である'],a:0,genre:11,d:1,ex:'電力量計（Wh計）は電気の使用量（電力量：kWh）を積算計量する計量器。',oex:['正しい。電力量計は使用電力量を積算計量する。','電流測定は電流計で行う。','電圧測定は電圧計で行う。','抵抗測定は抵抗計（テスタ等）で行う。']},{q:'インバータに関する記述のうち、正しいものはどれか。',o:['インバータは電動機の回転速度を制御するために使用される','インバータは直流を発電する機器である','インバータは電圧を測定する計測器である','インバータは接地工事に使用する機器である'],a:0,genre:11,d:2,ex:'インバータは交流の周波数を変換して電動機の回転速度を制御する装置。省エネに寄与する。',oex:['正しい。インバータは電動機の速度制御に使用。','インバータは交流の周波数変換装置。','インバータは速度制御装置。計測器ではない。','接地工事には使用しない。']},{q:'接地工事の施工に関する記述のうち、正しいものはどれか。',o:['接地極は空中に設置する','接地極は地中に埋設する','接地線は赤色の電線を使用する','接地抵抗値は大きいほどよい'],a:1,genre:11,d:1,ex:'接地極は接地抵抗を低くするため地中に埋設する。接地線は緑色の電線を使用する。',oex:['接地極は地中に埋設する。空中ではない。','正しい。接地極は地中に埋設する。','接地線は緑色（または緑/黄）を使用。赤色ではない。','接地抵抗値は小さいほどよい（低いほど安全）。']},{q:'ケーブルラックに関する記述のうち、正しいものはどれか。',o:['ケーブルラックは多数のケーブルを効率的に布設するための金属製の棚である','ケーブルラックは照明器具の一種である','ケーブルラックにD種接地は不要である','ケーブルラックは1本のケーブルのみ布設可能である'],a:0,genre:11,d:2,ex:'ケーブルラックは電力・通信ケーブルを多数整然と布設するための金属製の棚（はしご状・トレー状）。',oex:['正しい。ケーブルラックは多数のケーブル布設用の金属棚。','照明器具ではなく配線用の金属製支持材。','金属製ケーブルラックにはD種接地工事が必要。','多数のケーブルを布設することが目的。']},{q:'テスタ（回路計）に関する記述のうち、正しいものはどれか。',o:['テスタは電圧、電流、抵抗を測定できる計測器である','テスタは絶縁抵抗を測定する機器である','テスタは接地抵抗を正確に測定できる','テスタは電力量を計量する機器である'],a:0,genre:11,d:1,ex:'テスタ（マルチメータ、回路計）は直流・交流の電圧、電流、抵抗等を測定できる汎用計測器。',oex:['正しい。テスタは電圧・電流・抵抗を測定できる。','絶縁抵抗はメガー（絶縁抵抗計）で測定する。','接地抵抗の測定はアーステスタ（接地抵抗計）で行う。','電力量は電力量計で計量する。']},{q:'クランプメータに関する記述のうち、正しいものはどれか。',o:['接地抵抗を測定する計測器である','絶縁抵抗を測定する計測器である','電線を切断して電流を測定する計測器である','電線を切断せずに電流を測定できる計測器である'],a:3,genre:11,d:1,ex:'クランプメータは電線をクランプ（挟む）するだけで非接触で電流を測定できる計測器。',oex:['接地抵抗はアーステスタで測定する。','絶縁抵抗はメガーで測定する。','電線は切断しない。クランプで挟むだけ。','正しい。電線を切断せず非接触で電流測定可能。']},{q:'検電器に関する記述のうち、正しいものはどれか。',o:['検電器は抵抗を測定する器具である','検電器は電圧を正確に測定する計測器である','検電器は電路の充電の有無を確認する器具である','検電器は電流を測定する器具である'],a:2,genre:11,d:1,ex:'検電器は電路（電線・機器）が充電されているか否かを確認する安全確認器具。',oex:['抵抗測定はテスタで行う。','正確な電圧測定はテスタで行う。検電器は有無の確認。','正しい。検電器は充電の有無を確認する器具。','電流測定はクランプメータ等で行う。']},{q:'屋外配線に関する記述のうち、正しいものはどれか。',o:['屋外配線には耐候性のある電線・ケーブルを使用する','屋外配線にはVVFケーブルをそのまま使用できない場合がある','屋外の電線には接地工事は不要である','屋外配線は雨水の影響を考慮しなくてよい'],a:0,genre:11,d:2,ex:'屋外配線には日光（紫外線）や雨水に耐える耐候性のある電線・ケーブルを使用する。',oex:['正しい。屋外には耐候性のある電線・ケーブルを使用。','VVFは屋外での直接露出使用には注意が必要。','屋外の金属部分にも接地工事が必要。','雨水対策（防水処理等）は屋外配線の重要事項。']},{q:'電気工事における安全対策に関する記述のうち、正しいものはどれか。',o:['保護具の使用は任意である','活線作業は感電の危険があるため、原則として停電して作業する','電気工事中の安全確認は不要である','活線のまま作業するのが一般的である'],a:1,genre:11,d:1,ex:'電気工事は感電防止のため原則として停電して作業する。やむを得ず活線作業を行う場合は絶縁用保護具を使用する。',oex:['保護具の使用は安全のため必須。','正しい。停電作業が原則。活線作業は極力避ける。','安全確認は電気工事の基本中の基本。','活線作業は危険。停電して作業するのが原則。']},{q:'屋内配線の電圧降下に関する記述のうち、正しいものはどれか。',o:['電圧降下は電線の太さに無関係である','電圧降下は幹線で3%以下、分岐回路を含めて5%以下が推奨される','電圧降下は電線の長さに無関係である','電圧降下は考慮しなくてよい'],a:1,genre:11,d:3,ex:'内線規程では幹線の電圧降下は3%以下、幹線+分岐回路で5%以下が推奨されている。',oex:['電線が細いほど抵抗が大きく電圧降下も大きくなる。','正しい。幹線3%以下、幹線+分岐5%以下が推奨。','電線が長いほど抵抗が大きく電圧降下も大きくなる。','電圧降下は機器の動作に影響するため考慮が必要。']},{q:'漏電火災警報器に関する記述のうち、正しいものはどれか。',o:['漏電火災警報器は漏電遮断器と同じものである','漏電火災警報器はすべての建物に設置義務がある','漏電火災警報器は大きな漏洩電流を検出して警報を発する装置である','漏電火災警報器は消火設備の一種である'],a:2,genre:11,d:3,ex:'漏電火災警報器は電路の漏洩電流（地絡電流）を検出して警報を発する装置。消防法で設置義務がある建物がある。',oex:['漏電遮断器は回路を遮断する。警報器は警報を発する。','一定の建物（ラスモルタル造等）に設置義務がある。','正しい。漏洩電流を検出して火災を未然に警報する装置。','漏電火災警報器は警報設備に分類される。']},{q:'需要率に関する記述のうち、正しいものはどれか。',o:['需要率は常に100%である','需要率は力率と同じ概念である','需要率は最大需要電力÷設備容量の合計で表される','需要率は負荷率と同じ概念である'],a:2,genre:11,d:3,ex:'需要率=最大需要電力÷設備容量の合計×100(%)。全負荷が同時に使用されるわけではないため100%以下となる。',oex:['需要率は一般に100%未満。全負荷が同時使用されない。','需要率と力率も異なる概念。','正しい。需要率=最大需要電力/総設備容量。','需要率と負荷率は異なる概念。']},{q:'盛土材料として不適切なものはどれか？',o:['砂質土','礫質土','有機質土','山砂'],a:2,genre:8,d:1,ex:'有機質土は圧縮性が高く分解により沈下するため盛土材料に不適切です。',oex:['不正解。砂質土は良好な盛土材料です。','不正解。礫質土は良好な盛土材料です。','正解。有機質土は盛土材料として不適切です。','不正解。山砂は良好な盛土材料です。']},{q:'コンクリートの単位水量が大きくなると生じる問題はどれか？',o:['強度が増加する','乾燥収縮によるひび割れが発生しやすくなる','耐久性が向上する','ワーカビリティーが低下する'],a:1,genre:8,d:2,ex:'単位水量が大きいとコンクリートの乾燥収縮が増大し、ひび割れが発生しやすくなります。',oex:['不正解。単位水量が大きいと強度は低下します。','正解。単位水量の増大は乾燥収縮ひび割れの原因になります。','不正解。耐久性は低下します。','不正解。ワーカビリティーはむしろ向上しますが品質が低下します。']},{q:'ウェルポイント工法の目的はどれか？',o:['地盤を締め固める','地下水位を低下させる','杭を打設する','コンクリートを注入する'],a:1,genre:8,d:2,ex:'ウェルポイント工法は掘削箇所周辺に多数の井戸管を設置し真空ポンプで排水して地下水位を低下させる工法です。',oex:['不正解。締固めはローラー等で行います。','正解。ウェルポイント工法は地下水位の低下が目的です。','不正解。杭打設は杭工事です。','不正解。コンクリート注入はグラウト工事です。']},{q:'土の粒径による分類で「シルト」の粒径範囲はどれか？',o:['75mm以上','0.075〜2mm','0.005〜0.075mm','2〜75mm'],a:2,genre:8,d:2,ex:'シルトの粒径は0.005〜0.075mmです。粘土は0.005mm未満、砂は0.075〜2mmです。',oex:['不正解。これは玉石の粒径です。','不正解。これは砂の粒径範囲です。','正解。シルトの粒径は0.005〜0.075mmです。','不正解。これは礫の粒径範囲です。']},{q:'アスファルト舗装の「タックコート」の目的はどれか？',o:['路床の防水','既設舗装面と新設舗装の接着','舗装表面の保護','路盤の安定化'],a:1,genre:8,d:2,ex:'タックコートは既設舗装面と新設アスファルト混合物層の接着を良くするために散布します。',oex:['不正解。路床防水はプライムコートです。','正解。タックコートは層間の接着が目的です。','不正解。表面保護はシールコートです。','不正解。路盤安定化はセメント安定処理等です。']},{q:'鉄筋コンクリート構造物のかぶり厚さが不足すると生じる問題はどれか？',o:['コンクリートの圧縮強度が低下する','鉄筋が腐食しやすくなる','鉄筋の引張強度が低下する','コンクリートの比重が変化する'],a:1,genre:8,d:2,ex:'かぶり厚さが不足するとコンクリートの中性化が鉄筋に達しやすくなり、鉄筋腐食の原因になります。',oex:['不正解。圧縮強度はかぶり厚さに直接関係しません。','正解。かぶり不足は鉄筋腐食の原因になります。','不正解。鉄筋自体の引張強度は変わりません。','不正解。比重には影響しません。']},{q:'建設機械の「バックホウ」の主な用途はどれか？',o:['土砂の転圧','掘削・積込み','杭の打設','測量'],a:1,genre:8,d:1,ex:'バックホウは油圧ショベルの一種で、主に掘削と積込み作業に使用されます。',oex:['不正解。転圧 解。杭打設とは異なる工法です。']},{q:'道路舗装における「路床」の定義として正しいものはどれか？',o:['舗装面から下80cmまでの部分','路盤の下にある地盤全体','舗装の表面層','舗装面直下の層'],a:0,genre:8,d:2,ex:'路床は舗装面から80cm（設計CBRの対象となる範囲）までの地盤部分です。',oex:['正解。路床は舗装面から下80cmまでの部分です。','不正解。地盤全体ではなく80cmの範囲です。','不正解。表面層は表層です。','不正解。舗装面直下は路盤です。']},{q:'仮締切り工における「二重締切り」の特徴はどれか？',o:['地盤をセメントで固める','2列の矢板の間に中詰め材を充填して止水・安定を図る','1列の矢板で締め切る','地下水をポンプで排水する'],a:1,genre:8,d:3,ex:'二重締切りは2列の鋼矢板の間に砂や砕石を中詰めして、止水性と安定性を確保する工法です。',oex:['不正解。セメント固化は地盤改良です。','正解。2列の矢板間に中詰め材を充填する工法です。','不正解。1列は単列締切りです。','不正解。排水はディウォータリングです。']},{q:'セメントの種類のうち、水和熱が最も小さいものはどれか？',o:['普通ポルトランドセメント','早強ポルトランドセメント','中庸熱ポルトランドセメント','低熱ポルトランドセメント'],a:3,genre:8,d:2,ex:'低熱ポルトランドセメントは水和熱が最も小さく、マスコンクリート等の温度ひび割れ対策に使用されます。',oex:['不正解。普通セメントは標準的な水和熱です。','不正解。早強セメントは水和熱が大きいです。','不正解。中庸熱は普通と低熱の中間です。','正解。低熱セメントは水和熱が最も小さいです。']},{q:'土留め壁の種類で「親杭横矢板工法」の特徴はどれか？',o:['H鋼杭を一定間隔で打設し、掘削に合わせて横矢板を挿入する','鋼矢板を連続して打設する','地中連続壁を構築する','SMW（ソイルミキシングウォール）を構築する'],a:0,genre:8,d:2,ex:'親杭横矢板工法はH鋼を一定間隔で打設し、掘削の進行に合わせて横矢板（木矢板等）を挿入する工法です。',oex:['正解。H鋼杭に横矢板を挿入する工法です。','不正解。鋼矢板連続打設は鋼矢板工法です。','不正解。地中連続壁は別の工法です。','不正解。SMWは別の工法です。']},{q:'土量の変化率で「ほぐし率（L）」の一般的な値として正しいものはどれか（粘性土の場合）？',o:['1.5〜2.0','1.2〜1.4','2.5〜3.0','0.8〜0.9'],a:1,genre:8,d:3,ex:'粘性土のほぐし率Lは1.2〜1.4程度です。砂質土は1.1〜1.2程度です。ほぐすと体積が増加します。',oex:['不正解。1.5〜2.0は岩石のほぐし率に近いです。','正解。粘性土のほぐし率Lは1.2〜1.4程度です。','不正解。2.5〜3.0は過大です。','不正解。0.8〜0.9は締固め率Cに近い値です。']},{q:'フレッシュコンクリートの「空気量」の標準的な値はどれか？',o:['1.0%','3.0%','4.5%','8.0%'],a:2,genre:8,d:2,ex:'AEコンクリートの空気量は一般的に4.5%（許容差±1.5%）が標準値です。',oex:['不正解。1.0%では凍結融解抵抗性が不十分です。','不正解。3.0%はやや少ないです。標準は4.5%です。','正解。空気量の標準値は4.5%です。','不正解。8.0%は多すぎて強度が低下します。']},{q:'護岸工事における「根固め工」の目的はどれか？',o:['護岸の上部を保護する','河川の水位を上げる','河川の流速を増加させる','護岸の基礎部分の洗掘を防止する'],a:3,genre:8,d:2,ex:'根固め工は護岸の基礎（根元）部分が河川の流水で洗掘されるのを防止する工事です。',oex:['不正解。上部保護は天端工等です。','不正解。水位を上げることは目的ではありません。','不正解。流速増加は根固め工の目的ではありません。','正解。根固め工は基礎部の洗掘防止が目的です。']},{q:'コンクリートの「初期養生」において最も注意すべき点はどれか？',o:['打設直後から振動を与え続けること','急激な乾燥と温度変化を避けること','型枠を早期に取り外すこと','散水を避けること'],a:1,genre:8,d:1,ex:'初期養生では急激な乾燥や温度変化を避け、湿潤状態を保つことが重要です の地下室','屋上の機械室'],a:1,genre:10,d:1,ex:'水道メーターは道路と宅地の境界付近に設置し、検針や取替えが容易にできる場所に設けます。',oex:['不正解。最上階ではなく境界付近です。','正解。道路と宅地の境界付近で検針しやすい場所に設置します。','不正解。地下室は検針が困難です。','不正解。屋上は適切ではありません。']},{q:'クロスコネクションが禁止される理由はどれか？',o:['飲料水が汚染される危険があるため','水圧が低下するため','配管の材料費が増加するため','騒音が発生するため'],a:0,genre:10,d:1,ex:'クロスコネクションは飲料水系統と他の系統が接続され、飲料水が汚染される危険があるため厳しく禁止されています。',oex:['正解。飲料水汚染の危険があるため禁止されています。','不正解。水圧低下は主な理由ではありません。','不正解。コストの問題ではありません。','不正解。騒音は理由ではありません。']},{q:'給水管の耐圧試験の試験圧力として一般的なものはどれか？',o:['2.5MPa','1.0MPa','0.5MPa','1.75MPa'],a:3,genre:10,d:2,ex:'給水装置の耐圧試験は一般的に1.75MPa（水道事業者により異なる場合あり）で1分間保持して確認します。',oex:['不正解。2.5MPaは高すぎます。','不正解。1.0MPaでは不十分です。','不正解。0.5MPaでは低すぎます。','正解。耐圧試験は1.75MPaで行うのが一般的です。']},{q:'水道の給水方式のうち「直結増圧式」の特徴はどれか？',o:['増圧ポンプを使用して直結で中高層建物に給水する','配水管の水圧のみで給水する','高置水槽から自然流下で給水する','受水槽を使用して給水する'],a:0,genre:10,d:2,ex:'直結増圧式は増圧ポンプを設置して配水管の水圧を補い、受水槽なしで中高層建物に直接給水する方式です。',oex:['正解。増圧ポンプで直結給水する方式です。','不正解。配水管の水圧のみは直結直圧式です。','不正解。高置水槽方式は別の方式です。','不正解。受水槽を使用するのは受水槽式です。']},{q:'給水装置の「逆止弁」の設置が必要な箇所はどれか？',o:['排水管の途中','増圧ポンプの吐出し側','通気管の先端','受水槽の排水口'],a:1,genre:10,d:2,ex:'逆止弁は増圧ポンプの吐出し側などに設置し、ポンプ停止時の逆流を防止します。',oex:['不正解。排水管には設置しません。','正解。増圧ポンプの吐出し側に逆止弁を設置します。','不正解。通気管には設置しません。','不正解。排水口には設置しません。']},{q:'水質基準で定められた大腸菌の基準値はどれか？',o:['100個/mL以下','10個/mL以下','1個/mL以下','検出されないこと'],a:3,genre:10,d:2,ex:'水道法の水質基準では、大腸菌は「検出されないこと」と規定されています。',oex:['不正解。数値基準ではなく「検出されないこと」です。','不正解。検出されないことが基準です。','不正解。検出されないことが基準です。','正解。大腸菌は「検出されないこと」が基準です。']},{q:'給水管に使用される「ポリエチレン二層管」の特徴として正しいものはどれか？',o:['接合にろう付けが必要','耐熱性に優れ給湯管に最適','金属管より重い','可とう性に優れ地盤変動に追従しやすい'],a:3,genre:10,d:2,ex:'ポリエチレン二層管は可とう性に優れ、地盤の変動に追従しやすく、耐食性も高い管材です。',oex:['不正解。電気融着やメカニカル継手で接合します。','不正解。耐熱性は低いため給湯管には不向きです。','不正解。金属管より軽量です。','正解。可とう性に優れ地盤変動に追従しやすいです。']},{q:'給水装置の「止水栓」の設置目的はどれか？',o:['水圧を上げるため','水質を改善する','メーター交換や修理時に水を止めるため','排水を制御するため'],a:2,genre:10,d:1,ex:'止水栓はメーターの手前等に設置し、メーター交換や修理時、漏水時に給水を停止するためのものです。',oex:['不正解。水圧を上げる機能はありません。','不正解。水質改善は止水栓の目的ではありません。','正解。止水栓はメーター交換や修理時に水を止めるために設置します。','不正解。排水の制御ではありません。']},{q:'水道法で定められた簡易専用水道の定義と ん。']},{q:'オームの法則で、抵抗20Ω、電圧100Vの回路に流れる電流はどれか？',o:['5A','10A','2A','20A'],a:0,genre:11,d:1,ex:'オームの法則 I=V/R より、I=100/20=5A です。',oex:['正解。I=V/R=100/20=5Aです。','不正解。計算間違いです。','不正解。100÷20＝5Aです。','不正解。計算間違いです。']},{q:'単相交流の力率（cosθ）が1.0のとき、回路はどのような状態か？',o:['純抵抗回路（電圧と電流が同相）','純誘導回路','純容量回路','共振回路'],a:0,genre:11,d:2,ex:'力率1.0は電圧と電流の位相差がゼロの状態で、純抵抗回路（抵抗のみの回路）を意味します。',oex:['正解。力率1.0は純抵抗回路で電圧と電流が同相です。','不正解。純誘導回路の力率は0です。','不正解。純容量回路の力率は0です。','不正解。共振回路は特定の条件です。']},{q:'漏電遮断器（ELCB）の定格感度電流として住宅用に一般的なものはどれか？',o:['15mA','30mA','50mA','100mA'],a:1,genre:11,d:1,ex:'住宅用の漏電遮断器は定格感度電流30mAが一般的です。人体への感電保護に有効な値です。',oex:['不正解。15mAは高感度型で特殊用途です。','正解。住宅用は30mAが一般的です。','不正解。50mAは感度が低く住宅用としては不適切です。','不正解。100mAは漏電火災防止用です。']},{q:'金属管工事で使用する「ロックナット」の目的はどれか？',o:['電線を固定する','金属管をボックスに固定する','接地線を接続する','電線管を曲げる'],a:1,genre:11,d:2,ex:'ロックナットは金属管をアウトレットボックス等に固定するためのナットです。',oex:['不正解。電線の固定ではありません。','正解。ロックナットは金属管をボックスに固定します。','不正解。接地線の接続ではありません。','不正解。管を曲げるのはパイプベンダーです。']},{q:'電力量の単位「kWh」の読み方として正しいものはどれか？',o:['キロワット','キロワットアワー','キロボルトアンペア','キロジュール'],a:1,genre:11,d:1,ex:'kWhは「キロワットアワー」と読み、電力（kW）×時間（h）で電力量を表す単位です。',oex:['不正解。kWはキロワットですが、kWhはキロワットアワーです。','正解。kWhはキロワットアワーと読みます。','不正解。kVAはキロボルトアンペアです。','不正解。kJはキロジュールです。']},{q:'第二種電気工事士が工事できない範囲はどれか？',o:['一般住宅の屋内配線','小規模な店舗の配線','最大電力500kW以上の工場の配線','マンションの専有部分の配線'],a:2,genre:11,d:2,ex:'第二種電気工事士は一般用電気工作物（600V以下）の工事が可能です。500kW以上の自家用電気工作物は第一種が必要です。',oex:['不正解。一般住宅は第二種で工事できます。','不正解。小規模店舗は一般用電気工作物として工事できます。','正解。500kW以上の工場は自家用電気工作物で第二種では工事できません。','不正解。マンション専有部分は一般用電気工作物です。']},{q:'三相交流の線間電圧が200Vのとき、Y結線の相電圧はどれか？',o:['346V','115V（200/√3）','100V','200V'],a:1,genre:11,d:3,ex:'Y結線では線間電圧＝√3×相電圧なので、相電圧＝200/√3≒115Vです。',oex:['不正解。346Vはデルタ結線で線間電圧200Vの場合の計算とは異なります。','正解。Y結線の相電圧＝線間電圧/√3＝200/1.732≒115Vです。','不正解。100Vではなく200/√3≒115Vです。','不正解。200Vは線間電圧です。']},{q:'電線の許容電流に影響する要素として正しいものはどれか？',o:['電線の色','電線の太さ（断面積）と周囲温度','電線の長さのみ','電線の価格'],a:1,genre:11,d:2,ex:'許容電流は電線の太さ（断面積）が大きいほど大きく、周囲温度が高いほど小さくなります。',oex:['不正解。色は許容電流に関係しません。','正解。太さと周囲温度が許容電流に影響します。','不正解。長さは電圧降下に影響しますが許容電流の主因ではありません。','不正
