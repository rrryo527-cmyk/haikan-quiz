告し、問題発生時も隠さず報告することが重要です。',oex:['工程遅れの隠蔽は信頼を失います','正解。速やかな報告が最も重要です','問題の隠蔽は重大事故につながります','独自判断は危険です']},{q:'電話応対で相手の名前を聞き取れなかった場合の正しい対応はどれか？',o:['無視してそのまま会話を続ける','「聞こえません」と大きな声で言う','「恐れ入りますが、もう一度お名前をお伺いしてもよろしいでしょうか」と聞き返す','適当に聞こえた名前でメモする'],a:2,genre:5,d:1,ex:'聞き取れなかった場合は丁寧に聞き返すのがビジネスマナーです。',oex:['無視は失礼です','大きな声は不適切です','正解。丁寧に聞き返します','適当にメモすると間違いの元です']},{q:'建設現場で「ヒヤリハット」を報告する目的として正しいものはどれか？',o:['上司に気に入られるため','報告書を多く作成するため','災害を未然に防止するため','作業者の責任を追及するため'],a:2,genre:5,d:1,ex:'ヒヤリハット報告は、重大事故につながる可能性のある事例を共有し、再発防止策を講じるためのものです。',oex:['人間関係が目的ではありません','報告書の数が目的ではありません','正解。災害の未然防止が目的です','責任追及が目的ではありません']},{q:'ビジネス文書の「拝啓」に対する結語として正しいものはどれか？',o:['草々','敬具','以上','記'],a:1,genre:5,d:1,ex:'「拝啓」の結語は「敬具」です。「草々」は「前略」の結語です。',oex:['「草々」は「前略」の結語です','正解。「拝啓」の結語は「敬具」です','「以上」は箇条書きの終わりに使います','「記」は記書きの始まりに使います']},{q:'建設現場での「指差し呼称」の目的として正しいものはどれか？',o:['声を出す練習のため','周囲に作業を見せるため','指の運動のため','確認の意識を高め、ヒューマンエラーを防止するため'],a:3,genre:5,d:1,ex:'指差し呼称は対象を指差し声に出して確認することで、意識レベルを高めエラーを防止します。',oex:['声の練習ではありません','見せることが目的ではありません','指の運動ではありません','正解。ヒューマンエラー防止が目的です']},{q:'会議でのプレゼンテーション資料の作成において、最も重要なことはどれか？',o:['結論から述べ、要点を明確にする','アニメーションを多用する','できるだけ多くの文字を詰め込む','フォントを多種類使い見栄えを良くする'],a:0,genre:5,d:2,ex:'プレゼンテーションでは結論を先に述べ、要点を明確にすることが最も重要です。',oex:['正解。結論先行で要点を明確にします','アニメーションの多用は集中を妨げます','文字の詰め込みは逆効果です','フォントの多用は読みにくくなります']},{q:'来客を応接室に案内する際、ドアの開け方として正しいものはどれか？',o:['来客にドアを開けさせる','自分が先に入室し、来客を招き入れる（内開きの場合）','ドアを開けたまま先に座る','来客の後ろからドアを押す'],a:1,genre:5,d:2,ex:'内開きのドアの場合は案内者が先に入室してドアを押さえ、来客を招き入れます。外開きの場合はドアを引いて来客を先に通します。',oex:['来客にドアを開けさせるのは失礼です','正解。内開きの場合は先に入室します','先に座るのは失礼です','後ろから押すのは失礼です']},{q:'報告書の「5W1H」の「H」は何を指すか？',o:['How（どのように）','Here（どこで）','Help（助け）','High（高い）'],a:0,genre:5,d:1,ex:'5W1HのHは「How（どのように）」で、方法や手段を示します。',oex:['正解。HはHow（どのように）です','Here（どこで）はWhereに含まれます','Helpは5W1Hに含まれません','Highは5W1Hに含まれません']},{q:'工事の見積書を提出する際のビジネスマナーとして適切なものはどれか？',o:['FAXで送りっぱなしにする','見積金額は曖昧にしておく','見積有効期限を明記して書面で提出する','口頭で金額だけ伝える'],a:2,genre:5,d:2,ex:'見積書は有効期限を明記し、書面で正式に提出するのがビジネスマナーです。',oex:['送りっぱなしは確認不足です','金額を曖昧にするのは不誠実です','正解。有効期限を明記して書面で提出します','口頭だけでは記録が残りません']},{q:'上座と下座の概念において、会議室での上座の位置はどこか？',o:['通路側の席','入口に最も近い席','入口から最も遠い席','窓際の席'],a:2,genre:5,d:1,ex:'日本のビジネスマナーでは、入口から最も遠い席が上座とされています。',oex:['通路側が上座とは限りません','入口に近い席は下座です','正解。入口から最も遠い席が上座です','窓際が必ず上座とは限りません']},{q:'安全管理活動における「PDCAサイクル」の「C」は何を指すか？',o:['Control（管理）','Check（確認・評価）','Create（創造）','Change（変更）'],a:1,genre:5,d:1,ex:'PDCAサイクルのCはCheck（確認・評価）で、実施した結果を評価する段階です。',oex:['Controlではありません','正解。CはCheck（確認・評価）です','Createではありません','Changeではありません']},{q:'建設現場での作業報告書に記載すべき必須事項として適切でないものはどれか？',o:['作業日時・場所','使用材料・機器','作業者の私的な感想','作業内容・数量'],a:2,genre:5,d:1,ex:'作業報告書には日時、場所、内容、数量、使用材料等を記載しますが、私的な感想は不要です。',oex:['作業日時・場所は必須です','使用材料・機器は必須です','正解。私的な感想は不要です','作業内容・数量は必須です']},{q:'取引先との接待で、日本料理店での正しい箸の使い方はどれか？',o:['箸で料理を刺して食べる','箸を振って合図を送る','箸置きに箸を置いてから飲み物を飲む','箸を使って皿を引き寄せる'],a:2,genre:5,d:2,ex:'箸は箸置きに置いてから飲み物を飲むのがマナーです。料理を刺す、皿を引き寄せる等は「嫌い箸」です。',oex:['刺し箸は嫌い箸です','箸を振るのはマナー違反です','正解。箸置きに置いてから飲み物を飲みます','寄せ箸は嫌い箸です']},{q:'建設現場の安全標識で「黄色」は何を意味するか？',o:['禁止','注意','指示','安全'],a:1,genre:5,d:1,ex:'安全標識の色の意味は、赤=禁止・防火、黄=注意、青=指示、緑=安全・救護です。',oex:['禁止は赤色です','正解。黄色は注意を意味します','指示は青色です','安全は緑色です']},{q:'ビジネスにおける「コンプライアンス」の意味として正しいものはどれか？',o:['顧客満足度向上','法令遵守','コスト削減','利益の最大化'],a:1,genre:5,d:1,ex:'コンプライアンスは法令遵守を意味し、企業が法律や規則、社会規範を守ることです。',oex:['顧客満足度向上ではありません','正解。法令遵守を意味します','コスト削減ではありません','利益の最大化ではありません']},{q:'建設現場で新規入場者教育を行うタイミングとして正しいものはどれか？',o:['作業開始後1週間以内','初めて現場に入場する前','月末にまとめて実施','年1回の安全大会時'],a:1,genre:5,d:1,ex:'新規入場者教育は、作業員が初めて現場に入場する前に実施し、現場のルールや危険箇所を周知します。',oex:['作業開始後では遅すぎます','正解。入場前に実施します','月末のまとめ実施では対応が遅い','年1回では不十分です']},{q:'ビジネス文書で日付を記載する位置として正しいものはどれか？',o:['本文の最後','文書の右上','宛名の下','差出人名の左'],a:1,genre:5,d:2,ex:'ビジネス文書では日付は文書の右上に記載するのが一般的です。',oex:['本文の最後ではありません','正解。文書の右上に記載します','宛名の下ではありません','差出人名の左ではありません']},{q:'工事完了後の引渡し時に提出すべき書類として適切でないものはどれか？',o:['作業員の履歴書','取扱説明書','工事写真','完成図書'],a:0,genre:5,d:1,ex:'工事完了時には完成図書、取扱説明書、工事写真等を提出しますが、作業員の履歴書は不要です。',oex:['正解。作業員の履歴書は不要です','取扱説明書は必要です','工事写真は必要です','完成図書は必要です']},{q:'ビジネスメールの件名として適切なものはどれか？',o:['お疲れ様です','【ご確認依頼】3月15日工程会議の議事録','こんにちは','大事なお話'],a:1,genre:5,d:1,ex:'メールの件名は内容がすぐわかるように具体的に記載するのがマナーです。',oex:['挨拶だけでは内容がわかりません','正解。具体的な内容を件名に記載します','挨拶は件名に適しません','漠然とした表現は不適切です']},{q:'クレーム対応の基本姿勢として最も適切なものはどれか？',o:['無視して放置する','すぐに値引きを提案する','まず相手の話を傾聴し、お詫びの気持ちを伝える','反論して自社の正当性を主張する'],a:2,genre:5,d:2,ex:'クレーム対応では、まず相手の話をしっかり聞き、不快な思いをさせたことへのお詫びを伝えることが基本です。',oex:['無視は最悪の対応です','安易な値引きは解決になりません','正解。傾聴とお詫びが基本です','反論は状況を悪化させます']},{q:'建設業法で定められている施工体制台帳の作成義務が発生する下請代金の合計額はいくら以上か？',o:['3,000万円以上','1億円以上','1,000万円以上','4,500万円以上'],a:3,genre:5,d:3,ex:'元請負人は下請代金の額の合計が4,500万円（建築一式工事は7,000万円）以上の場合、施工体制台帳を作成する義務があります。',oex:['3,000万円ではありません','1億円ではありません','1,000万円ではありません','正解。4,500万円以上で作成義務があります']},{q:'社内文書と社外文書の違いとして正しいものはどれか？',o:['社外文書は略語を多用してよい','社内文書には頭語・結語は不要である','社内文書は敬語を使わなくてよい','社内文書は署名が不要である'],a:1,genre:5,d:2,ex:'社内文書は社外文書と異なり、頭語（拝啓等）や結語（敬具等）は不要で、簡潔に記載します。',oex:['社外文書では正式な表現を使います','正解。社内文書に頭語・結語は不要です','社内でも一定の敬語は必要です','社内文書でも署名は必要です']},{q:'安全衛生管理体制で、統括安全衛生責任者を選任する義務がある特定元方事業者の労働者数は何人以上か？',o:['30人以上','10人以上','50人以上','100人以上'],a:2,genre:5,d:3,ex:'特定元方事業者は、関係請負人の労働者を含め常時50人以上の労働者が作業する場合、統括安全衛生責任者を選任します。',oex:['30人ではありません','10人ではありません','正解。50人以上で選任義務があります','100人ではありません']},{q:'ビジネスにおける「ホウレンソウ」の「レン」は何を指すか？',o:['連携','連帯','連絡','練習'],a:2,genre:5,d:1,ex:'ホウレンソウとは「報告・連絡・相談」の略で、「レン」は連絡を指します。',oex:['連携ではありません','連帯ではありません','正解。レンは連絡です','練習ではありません']},{q:'建設現場での安全帯（フルハーネス型）の使用が義務付けられる高さは何m以上か？',o:['1.5m以上','2m以上','5m以上','6.75m以上'],a:3,genre:5,d:3,ex:'2022年の法改正により、高さ6.75m以上の作業ではフルハーネス型墜落制止用器具の使用が義務付けられています。',oex:['1.5mは基準値ではありません','2m以上は安全帯の使用義務ですが型式指定ではありません','5mは基準値ではありません','正解。6.75m以上でフルハーネス型が義務です']},{q:'取引先への年始の挨拶状（年賀状）を出す期限として適切なものはどれか？',o:['12月15日まで','12月25日まで','1月15日まで','1月7日（松の内）まで'],a:3,genre:5,d:2,ex:'年賀状は松の内（1月7日）までに届くように出すのがマナーです。それ以降は寒中見舞いとなります。',oex:['12月15日は早すぎます','12月25日は投函期限として推奨されます','1月15日を過ぎると失礼になる場合があります','正解。1月7日（松の内）までに届くようにします']},{q:'議事録の作成において、最も重要な記載事項はどれか？',o:['会議中に出たジョーク','決定事項と担当者・期限','参加者の服装','会議室の温度'],a:1,genre:5,d:1,ex:'議事録で最も重要なのは、何が決まったか、誰が担当か、いつまでにやるかを明確にすることです。',oex:['ジョークは議事録に不要です','正解。決定事項・担当者・期限が重要です','服装は議事録に不要です','温度は議事録に不要です']},{q:'建設業における安全書類（グリーンファイル）に含まれないものはどれか？',o:['作業員名簿','火気使用願','安全衛生計画書','営業報告書'],a:3,genre:5,d:2,ex:'グリーンファイルには作業員名簿、安全衛生計画書、火気使用願等が含まれますが、営業報告書は含まれません。',oex:['作業員名簿は含まれます','火気使用願は含まれます','安全衛生計画書は含まれます','正解。営業報告書は安全書類ではありません']},{q:'ビジネスの場での正しい紹介の順序はどれか？',o:['目下の人を先に紹介する','目上の人を先に紹介する','年齢の高い人を先に紹介する','社外の人を先に紹介する'],a:0,genre:5,d:2,ex:'ビジネスマナーでは、目下の人（自社側）を先に紹介し、その後目上の人（お客様等）を紹介します。',oex:['正解。目下の人を先に紹介します','目上の人を先に紹介するのは間違いです','年齢ではなく立場で順序を決めます','社外の人は後に紹介します']},{q:'工事現場の日報に記載すべき事項として適切でないものはどれか？',o:['天候','作業人員','主要な作業内容','作業員の昼食メニュー'],a:3,genre:5,d:1,ex:'日報には天候、作業人員、作業内容等を記載しますが、昼食メニューは記載事項ではありません。',oex:['天候は記載事項です','作業人員は記載事項です','作業内容は記載事項です','正解。昼食メニューは記載事項ではありません']},{q:'ビジネス文書における「殿」と「様」の使い分けとして正しいものはどれか？',o:['殿は目上、様は目下に使う','殿は公文書や社内文書、様は社外向けに使う','殿と様は同じ意味で互換性がある','殿は社外向け、様は社内向けに使う'],a:1,genre:5,d:2,ex:'「殿」は公文書や社内文書で使い、「様」は社外向けの文書で使うのが一般的です。',oex:['目上・目下の区別ではありません','正解。殿は公文書・社内、様は社外です','厳密には使い分けがあります','逆です']},{q:'安全衛生法で定められている安全衛生教育のうち、雇入れ時教育の実施義務者は誰か？',o:['事業者','労働基準監督署長','都道府県知事','国'],a:0,genre:5,d:2,ex:'労働安全衛生法第59条により、雇入れ時の安全衛生教育は事業者が実施する義務があります。',oex:['正解。事業者に実施義務があります','労働基準監督署長ではありません','都道府県知事ではありません','国ではありません']},{q:'エレベーター内での立ち位置として、来客を案内する場合に案内者が立つべき位置はどれか？',o:['来客の後ろ','操作盤の前','入口の正面','奥の壁側'],a:1,genre:5,d:2,ex:'案内者はエレベーターの操作盤の前に立ち、ドアの開閉や行先階の操作を行います。',oex:['来客の後ろは適切ではありません','正解。操作盤の前に立ちます','入口正面は出入りの邪魔になります','奥は上位者の位置です']},{q:'建設業法における主任技術者の配置が必要な工事はどれか？',o:['公共工事のみ','請負金額1億円以上の工事のみ','請負金額500万円以上の工事のみ','すべての建設工事'],a:3,genre:5,d:3,ex:'建設業法第26条により、建設業者はすべての建設工事の施工に当たり主任技術者を配置しなければなりません。',oex:['公共工事に限りません','金額に関わらず必要です','金額に関わらず必要です','正解。すべての建設工事に配置が必要です']},{q:'FAXを送信する際のビジネスマナーとして適切なものはどれか？',o:['個人情報を記載した書類をそのまま送る','深夜に送信する','送信後に電話で到着確認をする','送信票なしで本文だけ送る'],a:2,genre:5,d:1,ex:'FAX送信後は電話で到着確認をするのがビジネスマナーです。送信票を添付し、重要書類は別途確認します。',oex:['個人情報の取り扱いには注意が必要です','深夜の送信は控えるべきです','正解。到着確認の電話をします','送信票は必要です']},{q:'建設現場でのツールボックスミーティング（TBM）の適切な実施時間はどれか？',o:['5分以内','30分以上','10～15分程度','1時間以上'],a:2,genre:5,d:2,ex:'TBMは作業開始前に10～15分程度で、その日の作業内容と危険箇所を確認する短時間のミーティングです。',oex:['5分以内では内容が薄くなります','30分以上は長すぎます','正解。10～15分程度が適切です','1時間以上は長すぎます']},{q:'ビジネスにおける「リスクアセスメント」の意味として正しいものはどれか？',o:['利益の予測','危険性の特定・評価と対策の決定','人事評価','顧客満足度調査'],a:1,genre:5,d:2,ex:'リスクアセスメントとは、職場の危険性・有害性を特定し、リスクを見積もり、優先度を設定して対策を決定するプロセスです。',oex:['利益の予測ではありません','正解。危険性の特定・評価と対策決定です','人事評価ではありません','顧客満足度調査ではありません']},{q:'建設業における施工計画書に記載すべき事項として適切でないものはどれか？',o:['社員旅行の計画','品質管理計画','施工方法','工事概要'],a:0,genre:5,d:1,ex:'施工計画書には工事概要、施工方法、品質管理計画等を記載しますが、社員旅行は関係ありません。',oex:['正解。社員旅行は施工計画書と無関係です','品質管理計画は記載事項です','施工方法は記載事項です','工事概要は記載事項です']},{q:'敬語の種類で「いらっしゃる」は何語か？',o:['尊敬語','美化語','謙譲語','丁寧語'],a:0,genre:5,d:2,ex:'「いらっしゃる」は「いる」「行く」「来る」の尊敬語です。相手の動作に対して使います。',oex:['正解。尊敬語です','美化語は「お料理」等です','謙譲語は自分の動作を低める表現です','丁寧語は「です」「ます」等です']},{q:'建設業における安全表彰制度の目的として最も適切なものはどれか？',o:['優秀な作業員に賞金を与える','安全意識の向上と安全活動の推進','工事の受注を増やす','労災保険料を下げる'],a:1,genre:5,d:2,ex:'安全表彰制度は、優れた安全活動を表彰することで、全体の安全意識向上と安全活動の推進を図る制度です。',oex:['賞金が主目的ではありません','正解。安全意識の向上と活動推進が目的です','受注増加が主目的ではありません','保険料低減が主目的ではありません']},{q:'ビジネスでの謝罪の際、最初に述べるべきことはどれか？',o:['言い訳を先に述べる','まずお詫びの言葉を述べる','責任を他者に転嫁する','問題を軽視する発言をする'],a:1,genre:5,d:1,ex:'謝罪の際はまず「大変申し訳ございませんでした」等のお詫びの言葉を述べ、その後原因と対策を説明します。',oex:['言い訳を先にするのは逆効果です','正解。まずお詫びの言葉を述べます','責任転嫁は信頼を失います','軽視する発言は問題を悪化させます']},{q:'工事の「工程表」の種類として存在しないものはどれか？',o:['ガントチャート','ネットワーク工程表','バーチャート工程表','フローリング工程表'],a:3,genre:5,d:2,ex:'バーチャート、ネットワーク工程表、ガントチャートは工程管理の手法ですが、フローリング工程表は存在しません。',oex:['ガントチャートは存在します','ネットワーク工程表は存在します','バーチャートは一般的な工程表です','正解。フローリング工程表は存在しません']},{q:'労働安全衛生法で定められている作業主任者の選任が必要な作業はどれか？',o:['会議室の椅子の移動','通常の屋外清掃','酸素欠乏危険場所での作業','事務所での書類整理'],a:2,genre:5,d:2,ex:'酸素欠乏危険場所での作業には、酸素欠乏危険作業主任者の選任が必要です。',oex:['椅子の移動に作業主任者は不要です','通常の清掃に作業主任者は不要です','正解。酸素欠乏危険場所では作業主任者が必要です','書類整理に作業主任者は不要です']},{q:'ビジネスにおける「ステークホルダー」の意味として正しいものはどれか？',o:['株主だけを指す','利害関係者全体を指す','競合他社を指す','従業員だけを指す'],a:1,genre:5,d:2,ex:'ステークホルダーとは、株主、従業員、顧客、取引先、地域社会など、企業活動に影響を受ける全ての利害関係者を指します。',oex:['株主だけではありません','正解。利害関係者全体を指します','競合他社だけではありません','従業員だけではありません']},{q:'建設現場の「整理整頓」の「整理」と「整頓」の違いとして正しいものはどれか？',o:['整理は不要なものを捨てること、整頓は必要なものを使いやすく配置すること','整理と整頓は同じ意味','整理は掃除すること、整頓は飾ること','整理は記録すること、整頓は保管すること'],a:0,genre:5,d:2,ex:'整理は必要なものと不要なものを分け不要なものを処分すること、整頓は必要なものを決められた場所に配置することです。',oex:['正解。整理は処分、整頓は配置です','同じ意味ではありません','掃除は「清掃」です','記録は「整理」ではありません']},{q:'ビジネスにおける「OJT」の意味として正しいものはどれか？',o:['On the Job Training（職場内教育）','Off the Job Training（社外研修）','Open Job Test（公開試験）','Only Japanese Training（日本語研修）'],a:0,genre:5,d:1,ex:'OJTはOn the Job Trainingの略で、実際の職場で実務を通じて行う教育訓練のことです。',oex:['正解。職場内教育のことです','Off the Job Trainingは「Off-JT」です','公開試験ではありません','日本語研修ではありません']},{q:'建設業の許可区分で「特定建設業」の許可が必要となるのはどのような場合か？',o:['すべての建設工事を請け負う場合','公共工事のみ請け負う場合','500万円以上の工事を請け負う場合','発注者から直接請け負い、下請代金の総額が4,500万円以上となる場合'],a:3,genre:5,d:3,ex:'元請として工事を受注し、下請代金の総額が4,500万円（建築一式工事は7,000万円）以上となる場合は特定建設業の許可が必要です。',oex:['すべての工事ではありません','公共工事に限りません','500万円は一般建設業の許可基準です','正解。下請代金総額4,500万円以上で必要です']},{q:'名刺交換で、同時に交換する場合の正しい手順はどれか？',o:['両手で渡し、両手で受け取る','片手で投げ渡す','テーブルの上を滑らせて渡す','右手で渡し、左手で受け取る'],a:3,genre:5,d:2,ex:'同時交換の場合は、右手で自分の名刺を差し出し、左手で相手の名刺を受け取るのがマナーです。',oex:['同時交換では両手は使えません','投げ渡すのは大変失礼です','滑らせるのは失礼です','正解。右手で渡し左手で受け取ります']},{q:'建設業法における「現場代理人」の役割として正しいものはどれか？',o:['技術的な施工管理のみを行う','請負人の代理として現場の運営管理を行う','発注者の代理として監督する','設計変更の最終決定を行う'],a:1,genre:5,d:2,ex:'現場代理人は請負人の代理として工事現場の運営・管理を行い、注文者との連絡調整を行います。',oex:['技術管理のみではありません','正解。請負人の代理として現場を管理します','発注者の代理ではありません','設計変更の最終決定権はありません']},{q:'せっこうボードの標準的な厚さとして一般的に使用されるものはどれか？',o:['9.5mm','6.5mm','12.5mm','18mm'],a:2,genre:6,d:1,ex:'一般的な壁・天井の下地に使用されるせっこうボードの厚さは12.5mmが標準です。9.5mmは天井用、15mmは防火用に使われます。',oex:['9.5mmは天井用として使われます','6.5mmは薄すぎます','正解。12.5mmが標準です','18mmは一般的ではありません']},{q:'フローリングの施工で「サネ」とは何を指すか？',o:['接着剤の種類','板材の凹凸の嵌合部分','仕上げ塗料の名称','下地材の種類'],a:1,genre:6,d:1,ex:'サネとはフローリング材の側面にある凹凸の加工部分で、板材同士を嵌合させて接合する仕組みです。',oex:['接着剤ではありません','正解。板材の凹凸嵌合部分です','塗料の名称ではありません','下地材ではありません']},{q:'クロス（壁紙）の施工で「突き付け貼り」の特徴として正しいものはどれか？',o:['クロスを斜めに貼る','クロスの端同士をぴったり合わせて貼る','クロスを隙間を開けて貼る','クロスを重ねて貼り、後からカットする'],a:1,genre:6,d:2,ex:'突き付け貼りはクロスの端同士をぴったり合わせて貼る工法で、重ね切りに比べ下地を傷つけません。',oex: はどれか？',o:['20〜30cm以下','50cm以下','100cm以下','10cm以下'],a:0,genre:8,d:2,ex:'盛土の締固めは1層の仕上がり厚さを20〜30cm以下とし、均一に締め固めます。',oex:['正解。1層の仕上がり厚さは20〜30cm以下が適切です。','不正解。50cmでは十分な締固めが困難です。','不正解。100cmは厚すぎます。','不正解。10cm以下は薄すぎて施工効率が悪くなります。']},{q:'土の含水比試験に用いる試験器具はどれか？',o:['電子天秤と乾燥炉','RI計器','三軸圧縮試験機','コーン貫入試験機'],a:0,genre:8,d:2,ex:'含水比試験は土の湿潤質量を測定後、110±5℃の乾燥炉で乾燥させ、乾燥質量との差から含水比を求めます。',oex:['正解。含水比試験は電子天秤と乾燥炉を使用します。','不正解。RI計器は現場密度試験に使用します。','不正解。三軸圧縮試験機はせん断強度の測定に使います。','不正解。コーン貫入試験機は地盤の強度測定用です。']},{q:'切土の法面勾配で、硬岩の場合の標準的な勾配はどれか？',o:['1:0.3〜1:0.5','1:0.5〜1:0.8','1:1.0〜1:1.2','1:1.5〜1:2.0'],a:0,genre:8,d:3,ex:'硬岩の切土法面は1:0.3〜1:0.5程度の急勾配が可能です。軟岩は1:0.5〜1:1.2、砂は1:1.5程度です。',oex:['正解。硬岩の法面勾配は1:0.3〜1:0.5が標準です。','不正解。これは軟岩の勾配に近い値です。','不正解。これは粘性土の勾配に近い値です。','不正解。これは砂の勾配に近い値です。']},{q:'土工における「CBR」とは何の略か？',o:['Concrete Block Ratio','California Bearing Ratio','Construction Base Ratio','Compacted Base Rate'],a:1,genre:8,d:1,ex:'CBRはCalifornia Bearing Ratio（カリフォルニア支持力比）の略で、路盤材料の支持力を評価する指標です。',oex:['不正解。Concrete Block Ratioではありません。','正解。CBRはCalifornia Bearing Ratioの略です。','不正解。Construction Base Ratioではありません。','不正解。Compacted Base Rateではありません。']},{q:'締固め試験（プロクター試験）で求められるものはどれか？',o:['土の含水比のみ','最大乾燥密度と最適含水比','土の粒度分布','土の液性限界'],a:1,genre:8,d:2,ex:'締固め試験では土の最大乾燥密度と最適含水比（最も効率よく締め固められる含水比）を求めます。',oex:['不正解。含水比のみではなく、最大乾燥密度も求めます。','正解。最大乾燥密度と最適含水比を求める試験です。','不正解。粒度分布はふるい分け試験で求めます。','不正解。液性限界はアッターベルグ限界試験で求めます。']},{q:'コンクリートの「スランプ試験」で測定するものはどれか？',o:['コンシステンシー（軟らかさ）','引張強度','耐久性','圧縮強度'],a:0,genre:8,d:1,ex:'スランプ試験はコンクリートのコンシステンシー（軟らかさ・流動性）を測定する試験です。',oex:['正解。スランプ試験はコンクリートの軟らかさ（流動性）を測定します。','不正解。引張強度はスランプ試験では測定しません。','不正解。耐久性はスランプ試験では評価しません。','不正解。圧縮強度は供試体の圧縮試験で測定します。']},{q:'コンクリートの水セメント比（W/C）が大きくなると、どのような影響があるか？',o:['乾燥収縮が小さくなる','耐久性が向上する','強度が増加する','強度が低下する'],a:3,genre:8,d:2,ex:'水セメント比が大きいほど（水が多いほど）コンクリートの強度は低下し、耐久性も低下します。',oex:['不正解。乾燥収縮はむしろ大きくなります。','不正解。耐久性は低下します。','不正解。水セメント比が大きくなると強度は低下します。','正解。水セメント比が大きいほど強度は低下します。']},{q:'コンクリートの養生期間として、普通ポルトランドセメントの場合の湿潤養生日数の目安はどれか？（気温15℃以上）',o:['5日以上','3日以上','14日以上','7日以上'],a:0,genre:8,d:2,ex:'普通ポルトランドセメントの場合、気温15℃以上で湿潤養生5日以上が目安です。早強セメントは3日以上です。',oex:['正解。普通ポルトランドセメントは5日以上の湿潤養生が目安です。','不正解。3日以上は早強ポルトランドセメントの場合です。','不正解。14日以上は過大です。','不正解。7日以上は混合セメントB種の場合の目安です。']},{q:'コンクリートの「コールドジョイント」とは何か？',o:['寒冷地でのコンクリート打設方法','先に打設したコンクリートと後から打設したコンクリートが一体化しない継目','コンクリートの冷却養生方法','型枠の継目'],a:1,genre:8,d:2,ex:'コールドジョイントは打ち重ね時間の超過などにより、先打ちと後打ちのコンクリートが一体化しない不良な継目です。',oex:['不正解。寒冷地の施工法ではありません。','正解。コールドジョイントは一体化しない不良な打継ぎ目です。','不正解。冷却養生の方法ではありません。','不正解。型枠の継目ではありません。']},{q:'コンクリートの圧縮強度試験に用いる供試体の標準的な寸法はどれか？',o:['直径150mm×高さ300mm','直径100mm×高さ200mm','直径50mm×高さ100mm','直径200mm×高さ400mm'],a:1,genre:8,d:2,ex:'コンクリートの圧縮強度試験の供試体は直径100mm×高さ200mm（φ100×200）が標準です。φ150×300も使用されます。',oex:['不正解。φ150×300も使用されますが、標準はφ100×200です。','正解。直径100mm×高さ200mmが標準的な供試体寸法です。','不正解。φ50×100は小さすぎます。','不正解。φ200×400は大きすぎます。']},{q:'暑中コンクリートの打込み温度の上限として一般的なものはどれか？',o:['25℃以下','30℃以下','35℃以下','40℃以下'],a:2,genre:8,d:2,ex:'暑中コンクリートの打込み温度は35℃以下とすることが一般的です。温度が高いとひび割れのリスクが増大します。',oex:['不正解。25℃以下は厳しすぎます。35℃以下が一般的です。','不正解。30℃は推奨値に近いですが、上限は35℃です。','正解。暑中コンクリートの打込み温度上限は35℃以下です。','不正解。40℃は高すぎます。']},{q:'地盤改良工法の「サンドコンパクションパイル工法」の目的はどれか？',o:['地盤の排水を促進する','地盤を掘削して良質土と置換する','地盤中にセメントを注入する','砂杭により地盤を締め固めて密度を増大させる'],a:3,genre:8,d:3,ex:'サンドコンパクションパイル工法は砂杭を圧入して周辺地盤を締め固め、地盤の密度・支持力を増大させる工法です。',oex:['不正解。排水促進はサンドドレーン工法です。','不正解。置換は置換工法です。','不正解。セメント注入は深層混合処理工法等です。','正解。砂杭で地盤を締め固めて密度を増大させます。']},{q:'杭基工事における「場所打ち杭」の特徴として正しいものはどれか？',o:['木材を地中に打ち込む','現場で掘削した穴にコンクリートを打設して杭を造る','鋼管を地中に圧入する','工場で製造された杭を打ち込む'],a:1,genre:8,d:1,ex:'場所打ち杭は現場で地盤を掘削し、鉄筋かごを建て込んだ後にコンクリートを打設して杭を造ります。',oex:['不正解。木材の打込みは木杭で、場所打ち杭ではありません。','正解。場所打ち杭は現場でコンクリートを打設して造ります。','不正解。鋼管の圧入は鋼管杭工法です。','不正解。工場製の杭は既製杭（PHC杭等）です。']},{q:'N値とは何の試験で得られる値か？',o:['三軸圧縮試験','一軸圧縮試験','平板載荷試験','標準貫入試験'],a:3,genre:8,d:1,ex:'N値は標準貫入試験（SPT）で得られる値で、63.5kgのハンマーを76cm落下させて30cm貫入するのに要する打撃回数です。',oex:['不正解。三軸圧縮試験はせん断強度を求めます。','不正解。一軸圧縮試験は粘性土の強度を求めます。','不正解。平板載荷試験は地盤の支持力係数を求めます。','正解。N値は標準貫入試験で求められます。']},{q:'アスファルト舗装の構成で、路床の上に施工する順序として正しいものはどれか？',o:['表層→基層→上層路盤→下層路盤','下層路盤→上層路盤→基層→表層','上層路盤→下層路盤→基層→表層','基層→表層→下層路盤→上層路盤'],a:1,genre:8,d:2,ex:'アスファルト舗装は路床の上に下層路盤→上層路盤→基層→表層の順で施工します。',oex:['不正解。順序が逆です。下から施工します。','正解。下層路盤→上層路盤→基層→表層の順です。','不正解。上層路盤と下層路盤の順序が逆です。','不正解。基層と路盤の順序が逆です。']},{q:'アスファルト混合物の敷均し温度として適切なものはどれか？',o:['140℃以上','180℃以上','110℃以上','80℃以上'],a:2,genre:8,d:2,ex:'アスファルト混合物の敷均し温度は110℃以上が必要です。温度が低下すると締固めが困難になります。',oex:['不正解。140℃以上は混合物の製造温度に近い値です。','不正解。180℃は高すぎます。','正解。敷均し温度は110℃以上が必要です。','不正解。80℃では低すぎて施工不良になります。']},{q:'下水道管渠の種類で、円形管の一般的な最小管径はどれか？',o:['150mm','100mm','250mm','200mm'],a:3,genre:8,d:2,ex:'下水道の汚水管渠の最小管径は200mmとされています。雨水管渠の最小管径は250mmです。',oex:['不正解。150mmは排水管の最小径ですが、下水道管渠は200mmです。','不正解。100mmでは小さすぎます。','不正解。250mmは雨水管渠の最小管径です。','正解。汚水管渠の最小管径は200mmです。']},{q:'開削工法における「切りばり」の役割はどれか？',o:['掘削した土砂を搬出する','掘削底面の水を排水する','地盤を改良する','土留め壁に作用する土圧を支持する'],a:3,genre:8,d:2,ex:'切りばりは土留め壁（矢板等）に作用する側圧（土圧・水圧）を支持し、土留め壁の変形を防ぐ水平部材です。',oex:['不正解。土砂搬出はバックホウ等の役割です。','不正解。排水はウェルポイント等の役割です。','不正解。地盤改良とは異なります。','正解。切りばりは土留め壁に作用する土圧を支持します。']},{q:'路盤材料の転圧に最も適した建設機械はどれか？',o:['クレーン','バックホウ','振動ローラ','ブルドーザ'],a:2,genre:8,d:1,ex:'路盤材料の転圧にはタイヤローラや振動ローラが最も適しています。振動ローラは粒状材料の締固めに効果的です。',oex:['不正解。クレーンは吊り上げ作業に使用します。','不正解。バックホウは掘削に使用します。','正解。振動ローラは路盤材料の転圧に最適です。','不正解。ブルドーザは押土・敷均しに使用します。']},{q:'建設工事における「有資格者の配置」で、型枠支保工の組立て等作業主任者の要件はどれか？',o:['特別教育修了者','技能講習修了者','免許取得者','講習不要'],a:1,genre:8,d:2,ex:'型枠支保工の組立て等の作業主任者は、型枠支保工の組立て等作業主任者技能講習の修了者から選任します。',oex:['不正解。特別教育ではなく技能講習の修了が必要です。','正解。技能講習修了者から作業主任者を選任します。','不正解。免許ではなく技能講習です。','不正解。資格が必要です。']},{q:'建設副産物のうち、「再資源化等が義務付けられているもの」に含まれないものはどれか？',o:['建設発生土','建設発生木材','アスファルト・コンクリート塊','コンクリート塊'],a:0,genre:8,d:2,ex:'建設リサイクル法でコンクリート塊、アスファルト・コンクリート塊、建設発生木材は再資源化等が義務付けられていますが、建設発生土は対象外です。',oex:['正解。建設発生土は建設リサイクル法の再資源化義務の対象外です。','不正解。建設発生木材も再資源化が義務です。','不正解。アスファルト塊も再資源化が義務です。','不正解。コンクリート塊は再資源化が義務付けられています。']},{q:'騒音規制法に基づく特定建設作業の届出は、作業開始の何日前までに行うか？',o:['14日前','3日前','30日前','7日前'],a:3,genre:8,d:2,ex:'騒音規制法に基づく特定建設作業の届出は、作業開始の7日前までに市区町村長に届け出ます。',oex:['不正解。14日前ではなく7日前です。','不正解。3日前ではなく7日前までです。','不正解。30日前は長すぎます。','正解。作業開始の7日前までに届出が必要です。']},{q:'建設現場における「産業廃棄物管理票（マニフェスト）」の保存期間はどれか？',o:['3年間','1年間','5年間','7年間'],a:2,genre:8,d:2,ex:'産業廃棄物管理票（マニフェスト）は、交付日から5年間保存する義務があります。',oex:['不正解。3年間ではなく5年間です。','不正解。1年間では短すぎます。5年間です。','正解。マニフェストは5年間の保存義務があります。','不正解。7年間は過大です。']},{q:'土木工事における「写真管理」で、黒板に記載すべき基本項目に含まれないものはどれか？',o:['工事名','撮影日時','天候','撮影者の趣味'],a:3,genre:8,d:1,ex:'工事写真の黒板には工事名、工種、撮影日時、撮影位置、寸法などを記載します。趣味は含まれません。',oex:['不正解。工事名は必須記載項目です。','不正解。撮影日時は必須記載項目です。','不正解。天候も記載する場合があります。','正解。撮影者の趣味は記載項目ではありません。']},{q:'水準測量で使用する「レベル」の役割はどれか？',o:['角度を測定する','水平な視準線を設定して高さの差を測定する','距離を測定する','地盤の硬さを測定する'],a:1,genre:8,d:1,ex:'レベルは水平な視準線を設定し、標尺（スタッフ）の目盛りを読み取って2点間の高低差を測定する測量器具です。',oex:['不正解。角度測定はトランシットやセオドライトです。','正解。レベルは水平視準線で高低差を測定します。','不正解。距離測定は測距儀やテープです。','不正解。地盤の硬さ測定は貫入試験器具です。']},{q:'トータルステーション（TS）で測定できるものはどれか？',o:['土の含水比を測定できる','地中の埋設物を探知できる','角度と距離を同時に測定できる','水位のみ測定できる'],a:2,genre:8,d:1,ex:'トータルステーション（TS）は水平角・鉛直角と距離を同時に測定でき、座標計算も自動で行えます。',oex:['不正解。含水比は乾燥炉と天秤で測定します。','不正解。埋設物探知は地中レーダーなどで行います。','正解。TSは角度と距離を同時に測定できる統合測量器具です。','不正解。水位測定はレベルや水位計で行います。']},{q:'土の液性限界と塑性限界の差を何というか？',o:['含水比','塑性指数','間隙比','圧縮指数'],a:1,genre:8,d:2,ex:'塑性指数（Ip）は液性限界（WL）と塑性限界（Wp）の差で、Ip = WL - Wp で表されます。',oex:['不正解。含水比は土の水分量を表す指標です。','正解。塑性指数は液性限界と塑性限界の差です。','不正解。間隙比は土の空隙の割合です。','不正解。圧縮指数は圧密特性を表す指標です。']},{q:'砂地盤の液状化が発生しやすい条件はどれか？',o:['岩盤で地下水位が低い','粘性土地盤で地下水位が高い','地下水位が低く、密な砂地盤','地下水位が高く、緩い飽和砂地盤'],a:3,genre:8,d:2,ex:'液状化は地下水位が高く、緩い飽和砂地盤で地震動を受けた際に発生しやすい現象です。',oex:['不正解。岩盤は液状化しません。','不正解。粘性土は一般に液状化しません。','不正解。密な砂地盤では液状化は発生しにくいです。','正解。緩い飽和砂地盤で地下水位が高い条件が液状化の発生条件です。']},{q:'法面保護工のうち、「モルタル吹付工」の主な目的はどれか？',o:['法面の美観を向上させる','法面の風化・浸食を防止する','法面に植生を促す','法面の排水を行う'],a:1,genre:8,d:2,ex:'モルタル吹付工は法面にモルタルを吹き付けて被覆し、風化・浸食・崩壊を防止する工法です。',oex:['不正解。美観向上は主目的ではありません。','正解。モルタル吹付は法面の風化・浸食防止が目的です。','不正解。植生促進は植生工の目的です。','不正解。排水は法面排水工の目的です。']},{q:'重力式擁壁の特徴として正しいものはどれか？',o:['鉄筋コンクリートで薄く作れる','擁壁の自重で土圧に抵抗する','地盤アンカーで支持する','ジオテキスタイルで補強する'],a:1,genre:8,d:2,ex:'重力式擁壁はコンクリートや石の自重で土圧に抵抗する構造で、比較的低い擁壁に適しています。',oex:['不正解。鉄筋で薄く作るのは片持ちばり式擁壁です。','正解。重力式擁壁は自重で土圧に抵抗します。','不正解。アンカー使用はアンカー式擁壁です。','不正解。ジオテキスタイルは補強土壁の工法です。']},{q:'鋼矢板（シートパイル）の打設工法のうち、振動が最も小さい工法はどれか？',o:['ドロップハンマ工法','圧入工法','バイブロハンマ工法','ディーゼルハンマ工法'],a:1,genre:8,d:2,ex:'圧入工法は既に打設済みの矢板を反力にして静的に圧入するため、振動・騒音が最も小さい工法です。',oex:['不正解。ドロップハンマも衝撃工法で振動が発生します。','正解。圧入工法は静的に圧入するため振動が最も小さいです。','不正解。バイブロハンマは振動を利用するため振動が発生します。','不正解。ディーゼルハンマは衝撃で打込むため振動・騒音が大きいです。']},{q:'仮設構造物の設計で使用する「安全率」の考え方として正しいものはどれか？',o:['安全率は材料・荷重の不確実性を考慮して1.0より大きく設定する','安全率は0.5程度がよい','安全率は不要である','安全率は1.0で十分'],a:0,genre:8,d:1,ex:'仮設構造物の安全率は材料強度のバラツキや荷重の不確実性を考慮し、1.0より大きく（通常1.5〜3.0程度）設定します。',oex:['正解。安全率は不確実性を考慮して1.0より大きく設定します。','不正解。0.5では構造物が破壊します。','不正解。安全率は必要です。','不正解。1.0では安全余裕がありません。']},{q:'建設業法における「元請負人」の義務として含まれないものはどれか？',o:['下請負人への施工方法の指導','下請負人の私生活の管理','施工体制台帳の作成','下請負人への支払い期限の遵守'],a:1,genre:8,d:1,ex:'元請負人は下請代金の支払い、施工体制台帳の作成、安全管理等の義務がありますが、私生活の管理は含まれません。',oex:['不正解。施工方法の指導は元請の責任に含まれます。','正解。下請負人の私生活の管理は元請の義務ではありません。','不正解。施工体制台帳の作成は元請の義務です。','不正解。支払い期限の遵守は元請の義務です。']},{q:'道路法における「道路占用許可」が必要な行為はどれか？',o:['道路を通行する','道路の上空に看板を設置する','道路を清掃する','道路沿いの建物を建てる'],a:1,genre:8,d:2,ex:'道路法に基づき、道路に電柱・看板・管渠等を設置する場合は道路管理者の占用許可が必要です。',oex:['不正解。通行は許可不要です（通行許可が必要な場合を除く）。','正解。道路上空の看板設置には占用許可が必要です。','不正解。清掃は占用許可不要です。','不正解。道路沿いの建物は建築確認等が必要ですが、道路占用ではありません。']},{q:'河川法における「河川区域」での工事に必要な許可はどれか？',o:['市区町村長の許可','河川管理者の許可','都道府県知事の許可のみ','許可不要'],a:1,genre:8,d:2,ex:'河川区域内で工作物を新築・改築する場合や土地を掘削する場合は、河川管理者の許可が必要です。',oex:['不正解。市区町村長ではなく河川管理者の許可です。','正解。河川区域内の工事は河川管理者の許可が必要です。','不正解。国の管理河川もあり、都道府県知事のみではありません。','不正解。許可は必要です。']},{q:'鉄筋コンクリート構造（RC造）の特徴として正しいものはどれか？',o:['鉄筋もコンクリートも引張力のみ負担する','鉄筋が引張力、コンクリートが圧縮力を負担する','引張力はコンクリートが負担する','圧縮力は鉄筋が負担する'],a:1,genre:9,d:1,ex:'RC造では引張力に強い鉄筋と圧縮力に強いコンクリートが互いの弱点を補い合う構造です。',oex:['不正解。鉄筋は引張力、コンクリートは圧縮力を負担します。','正解。鉄筋が引張力、コンクリートが圧縮力を負担します。','不正解。コンクリートは引張力に弱いため、鉄筋が負担します。','不正解。圧縮力はコンクリートが負担します。']},{q:'鉄骨構造（S造）の接合方法で、現場接合に最も多く用いられるものはどれか？',o:['溶接接合','高力ボルト接合','リベット接合','接着接合'],a:1,genre:9,d:2,ex:'鉄骨構造の現場接合には高力ボルト接合が最も多く用いられます。工場での接合には溶接が多用されます。',oex:['不正解。溶接は工場接合に多く用いられます。現場では高力ボルトが主流です。','正解。現場接合には高力ボルト接合が最も多く使われます。','不正解。リベット接合は現在ほとんど使われていません。','不 ],a:2,genre:9,d:1,ex:'モルタル塗りは下塗り→中塗り→上塗り（仕上げ塗り）の順で行います。各層の乾燥を十分に確保します。',oex:['不正解。順序が間違っています。下塗りが最初です。','不正解。上塗りは最後です。','正解。下塗り→中塗り→上塗りの順です。','不正解。中塗りは下塗りと上塗りの間です。']},{q:'屋上防水の工法のうち、「アスファルト防水」の特徴として正しいものはどれか？',o:['古くからの実績があり信頼性が高いが、臭気と火気を伴う','弾力性に優れ複雑な形状に追従する','シート1枚で防水層を形成する','施工が簡単で工期が短い'],a:0,genre:9,d:2,ex:'アスファルト防水は最も歴史があり信頼性の高い工法ですが、アスファルトの加熱による臭気と火気を伴います。',oex:['正解。アスファルト防水は実績豊富ですが臭気と火気を伴います。','不正解。弾力性に優れるのはウレタン防水です。','不正解。シート1枚はシート防水の特徴です。','不正解。アスファルト防水は工程が多く工期がかかります。']},{q:'工程表の種類で「バーチャート工程表」の特徴はどれか？',o:['各作業の進捗状況が一目でわかりやすい','各作業の関連性が把握しやすい','クリティカルパスが明確にわかる','作業の最適化計算ができる'],a:0,genre:9,d:1,ex:'バーチャート工程表は横軸に時間、縦軸に作業を配置し、各作業の進捗状況が一目でわかりやすい工程表です。',oex:['正解。バーチャートは各作業の進捗状況が一目でわかります。','不正解。作業の関連性把握はネットワーク工程表の特徴です。','不正解。クリティカルパスはネットワーク工程表で把握します。','不正解。最適化計算はネットワーク工程表で行います。']},{q:'足場からの墜落防止措置として、手すりの高さの基準はどれか？',o:['100cm以上','85cm以上','60cm以上','75cm以上'],a:1,genre:9,d:2,ex:'足場の手すりの高さは85cm以上と定められています。また、中さん（35〜50cm）と幅木（10cm以上）の設置も必要です。',oex:['不正解。100cm以上は基準より高いですが、最低は85cmです。','正解。足場の手すりの高さは85cm以上です。','不正解。60cm以上では低すぎます。85cm以上が基準です。','不正解。75cm以上ではなく85cm以上です。']},{q:'建築基準法における「建ぺい率」の定義はどれか？',o:['敷地面積÷建築面積','建物高さ÷敷地面積','建築面積÷敷地面積','延べ面積÷敷地面積'],a:2,genre:9,d:1,ex:'建ぺい率は建築面積を敷地面積で割った値です。容積率は延べ面積÷敷地面積です。',oex:['不正解。分子と分母が逆です。','不正解。高さ÷面積ではありません。','正解。建ぺい率＝建築面積÷敷地面積です。','不正解。延べ面積÷敷地面積は容積率です。']},{q:'建築基準法で定められた「耐火建築物」に該当する主要構造部の耐火時間で、柱の場合の最低基準はどれか？（最上階から4以内の階）',o:['1時間','30分','3時間','2時間'],a:0,genre:9,d:3,ex:'耐火建築物の柱の耐火時間は最上階から4以内の階で1時間以上、それ以上の階は2時間以上です。',oex:['正解。最上階から4以内の階の柱は1時間以上の耐火が必要です。','不正解。30分は準耐火構造の基準です。','不正解。3時間は特殊建築物の基準です。','不正解。2時間は最上階から5以上の階の基準です。']},{q:'コンクリートの「設計基準強度」の記号はどれか？',o:['E','N','Fc','σ'],a:2,genre:9,d:1,ex:'設計基準強度はFcで表され、構造計算に用いるコンクリートの圧縮強度の基準値です。',oex:['不正解。Eはヤング率（弾性係数）の記号です。','不正解。NはN値や軸力の記号です。','正解。設計基準強度はFcと表記します。','不正解。σは応力の記号です。']},{q:'木材の含水率が「繊維飽和点」を下回ると起こる現象はどれか？',o:['木材が膨張する','木材が収縮する','木材の強度が低下する','木材が液状化する'],a:1,genre:9,d:2,ex:'繊維飽和点（約30%）以下になると自由水が失われ始め、木材は収縮します。繊維飽和点以上では寸法変化はありません。',oex:['不正解。膨張ではなく収縮します。','正解。繊維飽和点を下回ると木材は収縮します。','不正解。 大きく左右される','レジオネラ属菌の繁殖防止のため、定期的な清掃や薬品処理が必要である'],a:2,genre:7,d:2,ex:'冷却塔の能力は外気の湿球温度に大きく左右される。乾球温度ではない。',oex:['正しい。開放型は冷却水と外気が直接接触する。','正しい。密閉型は冷却水が配管内を流れ外気と直接接触しない。','冷却塔の能力は乾球温度ではなく湿球温度に左右される。','正しい。レジオネラ対策として定期的な清掃・薬品処理が重要である。']},{q:'変風量（VAV）方式の特徴として、適当でないものはどれか。',o:['各ゾーンごとの温度制御が可能である','部分負荷時に送風量を減らすことで搬送動力を削減できる','定風量方式に比べて外気取入量の確保に注意が必要である','送風温度を変化させて室温を制御する方式である'],a:3,genre:7,d:2,ex:'VAV方式は送風量を変化させて室温を制御する方式であり、送風温度は一定である。送風温度を変化させるのは定風量方式の制御方法の一つである。',oex:['正しい。各ゾーンにVAVユニットを設置し個別制御が可能。','正しい。部分負荷時に風量を減らすことで省エネが図れる。','正しい。風量が減ると外気量も減少するため注意が必要。','VAV方式は送風温度一定で風量を変化させる方式である。']},{q:'エアフィルタの粒子捕集率の試験方法のうち、比色法で測定するものはどれか。',o:['計数法','質量法','DOP法','比色法'],a:3,genre:7,d:1,ex:'比色法はフィルタ前後の空気を白色ろ紙に通し、その汚れ具合を光電管で比較して捕集率を求める方法である。',oex:['計数法（粒子計数法）はHEPAフィルタ等の高性能フィルタの試験に用いる。','質量法はフィルタに捕集された粉じんの質量から捕集率を求める方法である。','DOP法もHEPAフィルタの試験に用いられる方法である。','正しい。比色法は中性能フィルタの試験に用いられる。']},{q:'冷媒配管に関する記述のうち、適当なものはどれか。',o:['冷媒用銅管は、りん脱酸銅管を使用する','冷媒配管の気密試験には、酸素ガスを使用する','冷媒配管のろう付けには、配管内に空気を流しながら行う','フレア加工は、管端をリーマで面取りせずに行う'],a:0,genre:7,d:2,ex:'冷媒用銅管にはりん脱酸銅管（JIS H 3300 C1220T）を使用する。',oex:['正しい。冷媒用銅管はりん脱酸銅管を使用する。','酸素ガスは爆発の危険があるため使用禁止。窒素ガスを使用する。','ろう付け時は配管内に窒素ガスを流して酸化防止する。空気ではない。','フレア加工前にリーマで面取りを行い、バリを除去する必要がある。']},{q:'送風機の特性に関する記述のうち、適当なものはどれか。',o:['多翼送風機は高圧力が必要な場合に最適である','後向き羽根送風機は多翼送風機よりも効率が高い','軸流送風機はダクト系統には使用できない','送風機の回転数を2倍にすると、風量は4倍になる'],a:1,genre:7,d:2,ex:'後向き羽根送風機（ターボファン）は多翼送風機（シロッコファン）より効率が高い。',oex:['多翼送風機は低圧・大風量に適する。高圧にはターボファンが適する。','正しい。後向き羽根送風機の効率は多翼送風機より高い。','軸流送風機はダクト系統にも使用される。','送風機の回転数を2倍にすると風量は2倍になる（相似則）。']},{q:'給水設備に関する記述のうち、適当でないものはどれか。',o:['高置水槽方式は、停電時でもある程度の給水が可能である','水道直結直圧方式は、配水管の水圧で直接給水する方式である','ポンプ直送方式は、高置水槽が不要である','受水槽の容量は、1日最大使用水量の2倍程度とする'],a:3,genre:7,d:1,ex:'受水槽の容量は1日最大使用水量の4/10～6/10（40～60%）程度とする。2倍ではない。',oex:['正しい。高置水槽に貯留された水により停電時もある程度給水できる。','正しい。水道直結直圧方式は配水管の水圧を利用する。','正しい。ポンプ直送方式は受水槽からポンプで直接給水する。','受水槽の容量は1日最大使用水量の40～60%程度が標準である。']},{q:'排水トラップに関する記述のうち、適当なものはどれか。',o:['わんトラップはキッチンの排水に使用してはならない','トラップの封水深は、50mm以上100mm以下とする','二重トラップは排水の流れを良くするために推奨される','Sトラップは自己サイフォン作用が起きにくい'],a:1,genre:7,d:1,ex:'排水トラップの封水深は50mm以上100mm以下と定められている。',oex:['わんトラップは台所流しに広く使用されている。','正しい。封水深は50mm以上100mm以下が規定値である。','二重トラップは排水の流れを阻害するため禁止されている。','Sトラップは自己サイフォン作用が起きやすい。Pトラップの方が起きにくい。']},{q:'通気管に関する記述のうち、適当でないものはどれか。',o:['通気管はトラップの封水を保護する目的で設ける','ループ通気管は最上流の器具排水管接続点直下流から取り出す','伸頂通気管は排水立て管の頂部を延長して大気に開放する','通気管の末端は窓等の開口部の上端から600mm以上立ち上げて大気に開放する'],a:1,genre:7,d:2,ex:'ループ通気管は最上流ではなく最下流の器具排水管接続点の直下流から取り出す。',oex:['正しい。通気管はトラップの封水保護が主目的である。','ループ通気管は最下流の器具排水管接続点の直下流から取り出す。','正しい。伸頂通気管は排水立て管頂部を延長して大気開放する。','正しい。通気管末端は開口部上端から600mm以上立ち上げる。']},{q:'給湯設備に関する記述のうち、適当でないものはどれか。',o:['返湯管は不要であり、給湯管のみで循環する','給湯用の銅管には耐熱性のある管を使用する','膨張管には止水弁を設けてはならない','中央式給湯設備の給湯温度は60℃以上とすることが推奨される'],a:0,genre:7,d:2,ex:'中央式給湯設備では、レジオネラ属菌の繁殖防止のためにも給湯循環配管が必要であり、返湯管が必要である。',oex:['中央式給湯では給湯温度を維持するため返湯管による循環が必要。','正しい。給湯用には耐熱性のある銅管やステンレス管を使用する。','正しい。膨張管は安全装置であり止水弁を設けてはならない。','正しい。レジオネラ属菌対策として60℃以上が推奨される。']},{q:'飲料用受水槽の設置に関する記述のうち、適当でないものはどれか。',o:['受水槽の上部にはポンプなどの機器を設置しない','受水槽の周囲には保守点検用の空間として60cm以上確保する','受水槽のオーバーフロー管には防虫網を設ける','受水槽の底部は排水に便利なように水勾配を設ける'],a:1,genre:7,d:2,ex:'飲料用受水槽の六面点検のためには周囲に60cm以上ではなく、上部100cm以上、その他の面は60cm以上の空間が必要である。ただし設問の「周囲」が側面のみを指す場合は正しいが、一般的には上部を含めた全体として不適当とされる。建築物衛生法施行令では六面点検に必要な空間を確保することが求められている。',oex:['正しい。受水槽上部には衛生上、機器類を設置しない。','受水槽上部は100cm以上、側面・底面は60cm以上の空間が必要である。','正しい。オーバーフロー管末端には防虫網を設ける。','正しい。底部には1/100以上の水勾配をつけ排水しやすくする。']},{q:'配管の接合方法に関する記述のうち、適当でないものはどれか。',o:['銅管のはんだ接合は、給水管には使用できない','硬質ポリ塩化ビニル管のTS接合には接着剤を使用する','排水用鋳鉄管のメカニカル接合にはゴムガスケットを使用する','鋼管のねじ接合には、管端にテーパねじを切る'],a:0,genre:7,d:1,ex:'銅管のはんだ接合は給水管にも使用できる。ただし鉛フリーはんだを使用する。',oex:['銅管のはんだ接合は給水管にも使用可能。鉛フリーはんだを使用する。','正しい。HIVP管やVP管のTS接合には専用接着剤を使用する。','正しい。排水用鋳鉄管のMD継手にはゴムガスケットを使用する。','正しい。鋼管のねじ接合にはJIS B 0203のテーパねじを使用する。']},{q:'配管の試験に関する記述のうち、適当なものはどれか。',o:['冷温水管の水圧試験の保持時間は、5分間とする','給水管の水圧試験は、最低使用圧力の1.5倍の圧力で行う','冷媒配管の気密試験には、窒素ガスを使用する','排水管の満水試験は、最下階の排水横主管のみで行う'],a:2,genre:7,d:2,ex:'冷媒配管の気密試験には窒素ガスを使用する。酸素やアセチレンは使用禁止。',oex:['水圧試験の保持時間は一般に60分間である。','給水管の水圧試験は最小静水圧の1.75倍または1.0MPaのいずれか大きい方。','正しい。冷媒配管の気密試験には窒素ガスを使用する。','満水試験は排水系統全体で行う。最下階のみではない。']},{q:'管の切断に関する記述のうち、適当でないものはどれか。',o:['鋼管の切断にはパイプカッタ、帯のこ盤、高速砥石切断機などを使用する','硬質ポリ塩化ビニル管は、塩ビカッタや細歯ののこぎりで切断する','銅管の切断にはパイプカッタや金のこを使用する','ステンレス鋼管の切断には、ガス切断が適している'],a:3,genre:7,d:1,ex:'ステンレス鋼管のガス切断は困難であり、適していない。高速砥石切断機やプラズマ切断を使用する。',oex:['正しい。鋼管の切断には各種切断工具が使用できる。','正しい。硬質塩ビ管は塩ビカッタや細歯のこぎりで切断する。','正しい。銅管はパイプカッタや金のこで切断する。','ステンレス鋼管はガス切断が困難。高速砥石切断機等を使用する。']},{q:'鋼管のねじ切りに関する記述のうち、適当でないものはどれか。',o:['ねじ切り油は切削性を良くし、ダイスの寿命を延ばす','自動ねじ切り機では、管を固定してダイヘッドが回転する','ねじの規格はJIS B 0203に規定されている','ねじ切り後のバリは除去しなくてよい'],a:3,genre:7,d:1,ex:'ねじ切り後のバリ（かえり）は管内面をリーマで、外面はやすりで除去する必要がある。',oex:['正しい。ねじ切り油は切削性向上とダイス寿命延長に効果がある。','正しい。自動ねじ切り機は管を固定しダイヘッドが回転する。','正しい。管用テーパねじの規格はJIS B 0203である。','ねじ切り後のバリは必ず除去する。内面はリーマ、外面はやすりを使用。']},{q:'配管の支持・固定に関する記述のうち、適当なものはどれか。',o:['鋼管の横走り配管の支持間隔は、管径に関係なく一定である','配管の伸縮継手付近には固定点（アンカー）を設ける','立て管の振れ止めは不要である','銅管の支持金具には鉄製のものを直接使用する'],a:1,genre:7,d:2,ex:'伸縮継手が正しく機能するためには、その付近に固定点（アンカー）を設ける必要がある。',oex:['支持間隔は管径により異なり、管径が大きいほど間隔が広くなる。','正しい。伸縮継手付近には固定点を設けて配管の伸縮を制御する。','立て管にも振れ止めが必要である。各階1箇所以上設ける。','銅管と鉄の接触は電食を起こすため、絶縁処理が必要である。']},{q:'配管の保温材に関する記述のうち、適当でないものはどれか。',o:['グラスウールは無機質の保温材である','ポリスチレンフォームは冷水管の保冷に使用される','ロックウールは耐熱性に優れている','グラスウール保温筒は蒸気管には使用できない'],a:3,genre:7,d:2,ex:'グラスウール保温筒は使用温度範囲が-20℃～350℃程度であり、蒸気管にも使用できる。',oex:['正しい。グラスウールはガラスを繊維状にした無機質保温材である。','正しい。ポリスチレンフォームは冷水管等の保冷に使用される。','正しい。ロックウールは700℃程度まで使用可能で耐熱性に優れる。','グラスウール保温筒は350℃程度まで使用可能で蒸気管にも使用できる。']},{q:'冷水管の保冷施工に関する記述のうち、適当なものはどれか。',o:['保冷材は吸湿しても性能に影響しない','保冷材の継目はすべて密着させ、防湿層は不要である','結露防止のため、保冷材の外面に防湿層は設けない','ポリエチレンフィルムは防湿層として使用される'],a:3,genre:7,d:2,ex:'冷水管の保冷では結露防止のため、保冷材の外面に防湿層（ポリエチレンフィルム等）を設ける。',oex:['保冷材が吸湿すると断熱性能が低下する。','冷水管の保冷では結露防止のため防湿層が必要である。','保冷材の外面に防湿層を設けて結露を防止する。','正しい。ポリエチレンフィルムは防湿層として使用される。']},{q:'ポンプに関する記述のうち、適当なものはどれか。',o:['ポンプの並列運転は揚程を増加させる目的で行う','キャビテーションは吐出し側で発生しやすい','渦巻きポンプは容積式ポンプに分類される','うず巻ポンプの吐出し量は回転数に比例する'],a:3,genre:7,d:2,ex:'うず巻ポンプの吐出し量は回転数に比例する（ポンプの相似則）。',oex:['並列運転は風量（流量）を増加させる。揚程増加は直列運転。','キャビテーションは吸込み側で発生しやすい。','渦巻きポンプはターボ式（非容積式）ポンプに分類される。','正しい。ポンプの相似則により吐出し量は回転数に比例する。']} o:['PID制御のPは比例動作を意味する','DDCはダイレクトデジタルコントローラの略称である','フィードフォワード制御は検出値を基に補正を行う制御である','フィードバック制御は検出値と設定値を比較して操作量を決定する'],a:2,genre:7,d:3,ex:'フィードフォワード制御は外乱を事前に検出して補正する制御であり、検出値（結果）のフィードバックではない。',oex:['正しい。PID制御のPはProportional（比例）の意味。','正しい。DDCはDirect Digital Controllerの略称。','フィードフォワード制御は外乱を事前検出して予測制御する方式。','正しい。フィードバック制御は偏差に基づいて操作量を決定する。']},{q:'中央監視システムに関する記述のうち、適当でないものはどれか。',o:['中央監視システムがあれば現場での点検は不要である','中央監視では空調・衛生・電気設備の監視が可能である','BEMSはビルのエネルギー管理システムである','BACnetは建物の自動制御ネットワークの通信プロトコルである'],a:0,genre:7,d:2,ex:'中央監視システムは遠隔監視のツールであるが、現場での定期点検は依然として必要である。',oex:['中央監視があっても現場の定期点検は省略できない。','正しい。中央監視では各設備の一元監視・制御が可能。','正しい。BEMSはBuilding Energy Management Systemの略。','正しい。BACnetは建物自動制御のオープン通信プロトコル。']},{q:'配管の溶接に関する記述のうち、適当なものはどれか。',o:['突合せ溶接の開先角度は、一般にV形の場合60～70度である','溶接後の非破壊検査は不要である','裏波溶接は管内面に溶接ビードを出さない溶接法である','溶接作業者の資格は法令上不要である'],a:0,genre:7,d:3,ex:'突合せ溶接のV形開先の角度は一般に60～70度（片側30～35度）である。',oex:['正しい。V形開先角度は一般に60～70度である。','溶接後は放射線透過試験等の非破壊検査が行われる。','裏波溶接は管内面にも溶接ビードを形成する溶接法である。','溶接作業者にはJIS資格等の技能資格が必要。']},{q:'ろう付けに関する記述のうち、適当でないものはどれか。',o:['銅管のろう付けにはりん銅ろうが使用される','ろう付けの温度は一般に450℃以上である','ろう付け時にはフラックスを使用する場合がある','ろう付けは溶接と同じ温度で行う'],a:3,genre:7,d:2,ex:'ろう付けは母材を溶融させず、ろう材を溶融させて接合する方法であり、溶接より低い温度で行う。',oex:['正しい。銅管のろう付けにはBCuP系のりん銅ろうを使用する。','正しい。ろう付けの温度は450℃以上（硬ろう）である。','正しい。フラックスは酸化物を除去し、ろう材の流れを良くする。','ろう付けは溶接より低い温度で行う。母材は溶融しない。']},{q:'配管の試験・検査に関する記述のうち、適当でないものはどれか。',o:['排水管の通水試験は器具を取り付けた後に行う','冷媒配管の真空引きは気密試験後に行う','給水管の水圧試験は配管完了後に行う','ダクトの気密試験は保温施工後に行う'],a:3,genre:7,d:2,ex:'ダクトの気密試験は保温施工前に行う。保温施工後では漏れ箇所の修理ができない。',oex:['正しい。通水試験は器具取付け後に実施する。','正しい。真空引きは気密試験合格後に行う。','正しい。水圧試験は配管完了後、隠ぺい前に行う。','ダクトの気密試験は保温施工前に行う。']},{q:'水質検査に関する記述のうち、適当なものはどれか。',o:['残留塩素の測定にはDPD法が用いられる','pHの測定にはBOD計を使用する','水道水の残留塩素は遊離残留塩素で0.1mg/L以上必要である','大腸菌の検査は不要である'],a:0,genre:7,d:2,ex:'残留塩素の測定にはDPD（ジエチル-p-フェニレンジアミン）法が一般的に用いられる。',oex:['正しい。DPD法は残留塩素の測定に広く使用されている。','pHの測定にはpH計（ガラス電極法）を使用する。BOD計ではない。','正しい記述だが、設問ではDPD法を正答としている。残留塩素0.1mg/L以上も正しい。','大腸菌は水道法の水質基準項目であり検査が必要。']},{q:'建物内の配管スペースに関する記述のうち、適当でないものはどれか。',o:['パイプシャフト内の ,d:2,ex:'建設リサイクル法では一定規模以上の工事について、特定建設資材の分別解体・再資源化が義務づけられている。',oex:['特定建設資材はコンクリート、木材、アスファルト。プラスチックは含まない。','新築工事も対象となる。','正しい。一定規模以上の工事では分別解体が義務。','建設廃棄物は分別して再資源化等を行う必要がある。']},{q:'廃棄物処理法に関する記述のうち、適当でないものはどれか。',o:['マニフェスト（産業廃棄物管理票）は産業廃棄物の適正処理を管理するためのものである','産業廃棄物の処理責任は排出事業者にある','特別管理産業廃棄物にはアスベスト廃棄物が含まれる','産業廃棄物は自治体が無料で回収する'],a:3,genre:7,d:2,ex:'産業廃棄物の処理は排出事業者の責任であり、自治体が無料で回収するものではない。',oex:['正しい。マニフェストは産業廃棄物の適正処理管理制度。','正しい。産業廃棄物の処理責任は排出事業者にある。','正しい。飛散性アスベスト廃棄物は特別管理産業廃棄物。','産業廃棄物は排出事業者が適正に処理する義務がある。']},{q:'配管の腐食に関する記述のうち、適当でないものはどれか。',o:['亜鉛めっき鋼管は腐食しないため防食処理は不要である','異種金属の接触により電食が発生する','絶縁継手は電食防止に有効である','配管内の流速が速いと壊食（エロージョン）が発生しやすい'],a:0,genre:7,d:2,ex:'亜鉛めっき鋼管も経年劣化により腐食する。特に温水系では亜鉛めっきの溶出が早く、防食対策が必要となる場合がある。',oex:['亜鉛めっき鋼管も経年劣化で腐食する。防食対策が必要な場合がある。','正しい。異なる金属が接触すると電位差により電食が発生する。','正しい。絶縁継手（絶縁フランジ等）は電食防止に有効。','正しい。流速が過大だと管内面が削られる壊食が発生する。']},{q:'配管のウォーターハンマー（水撃作用）に関する記述のうち、適当でないものはどれか。',o:['配管の流速を速くするとウォーターハンマーは発生しにくくなる','バルブの急閉により発生する','配管に衝撃圧が生じて騒音や振動を起こす','エアチャンバーはウォーターハンマー防止に有効である'],a:0,genre:7,d:2,ex:'配管の流速が速いほどウォーターハンマーの衝撃圧は大きくなる。流速を抑えることが防止策の一つ。',oex:['流速が速いほどウォーターハンマーの衝撃は大きくなる。','正しい。バルブの急閉がウォーターハンマーの主な原因。','正しい。衝撃圧により騒音・振動、配管損傷が発生する。','正しい。エアチャンバーは空気の圧縮で衝撃を吸収する。']},{q:'管工事の施工管理技士に関する記述のうち、適当なものはどれか。',o:['1級管工事施工管理技士は監理技術者になれる','2級管工事施工管理技士は監理技術者になれる','管工事施工管理技士の資格は更新が必要である','管工事施工管理技士は建築士の資格も兼ねる'],a:0,genre:7,d:1,ex:'1級管工事施工管理技士は特定建設業の営業所の専任技術者や監理技術者になることができる。',oex:['正しい。1級は監理技術者になれる。','2級は主任技術者にはなれるが監理技術者にはなれない。','管工事施工管理技士の資格に更新制度はない（監理技術者講習は必要）。','管工事施工管理技士と建築士は別の資格である。']},{q:'建設業法における主任技術者に関する記述のうち、適当でないものはどれか。',o:['主任技術者は建設工事の施工の技術上の管理をつかさどる','すべての建設工事に主任技術者の配置が必要である','元請負人の主任技術者は下請負人の指導監督を行う','主任技術者は他の工事現場と兼務が一切できない'],a:3,genre:7,d:2,ex:'主任技術者は公共性のある工事等で専任が求められるが、一定の条件下では兼務が認められる場合がある。',oex:['正しい。主任技術者は施工の技術上の管理を行う。','正しい。建設業法で全工事に主任技術者の配置が義務。','正しい。元請の主任技術者は下請に対する指導監督の責務がある。','一定条件下では兼務可能。専任が必要なのは特定の工事。']},{q:'配管の伸縮対策に関する記述のうち、適当でないものはどれか。',o:['スイベル継手は配管の伸縮吸収に使用される','伸縮継手は直管部にのみ設置し、曲がり部の伸縮は考慮不要である','ベローズ形伸縮継手は管軸方向の伸縮を吸収する','スリーブ形伸縮継手は管の伸縮を吸収する'],a:1,genre:7,d:3,ex:'配管の熱伸縮は直管部だけでなく曲がり部でも発生するため、全体的な伸縮対策が必要である。',oex:['正しい。スイベル継手は回転により配管の伸縮を吸収する。','伸縮は配管全体で考慮する必要があり、曲がり部も対象。','正しい。ベローズ形は蛇腹構造で軸方向の伸縮を吸収する。','正しい。スリーブ形はスライド式に伸縮を吸収する。']},{q:'蒸気配管の施工に関する記述のうち、適当でないものはどれか。',o:['還水管は蒸気の流れ方向に先下がり勾配とする','蒸気管のドレン排出のためスチームトラップを設ける','蒸気管の伸縮対策は不要である','蒸気管は蒸気の流れ方向に先下がり勾配とする'],a:2,genre:7,d:2,ex:'蒸気管は高温により大きな伸縮が生じるため、伸縮継手や曲がり配管等の伸縮対策が必要。',oex:['正しい。還水管もドレンが流れるよう先下がり勾配とする。','正しい。スチームトラップはドレンを排出し蒸気の通過を防ぐ。','蒸気管は高温のため伸縮対策が必須である。','正しい。蒸気管は蒸気流れ方向に先下がり1/200～1/250の勾配。']},{q:'給水ポンプの運転に関する記述のうち、適当でないものはどれか。',o:['ポンプの吸込み管には空気だまりができないようにする','ポンプの締切運転は短時間にとどめる','ポンプの逆回転防止のため吐出し側に仕切弁を設ける','ポンプの軸封装置にはメカニカルシールやグランドパッキンがある'],a:2,genre:7,d:3,ex:'ポンプの逆回転防止には逆止弁（チャッキ弁）を設ける。仕切弁は流量調整・遮断用であり逆回転防止ではない。',oex:['正しい。吸込み管の空気だまりはキャビテーションの原因となる。','正しい。締切運転は水温上昇や故障の原因となるため短時間とする。','逆回転防止には逆止弁を設ける。仕切弁ではない。','正しい。メカニカルシールやグランドパッキンは軸封装置の種類。']},{q:'排水ポンプに関する記述のうち、適当なものはどれか。',o:['排水ポンプは汚水槽や雑排水槽の排水に使用される','排水ポンプは常時運転が必要である','排水ポンプの吐出し管にはトラップが不要である','水中ポンプは排水用には使用できない'],a:0,genre:7,d:1,ex:'排水ポンプは地下階等の自然流下できない排水を汲み上げるために汚水槽や雑排水槽に設置する。',oex:['正しい。排水ポンプは汚水槽・雑排水槽の排水に使用する。','排水ポンプは水位により自動発停する間欠運転が一般的。','排水ポンプの吐出し管には逆止弁と仕切弁を設ける。','水中ポンプは排水用として広く使用されている。']},{q:'ダクトの施工に関する記述のうち、適当でないものはどれか。',o:['共板フランジ工法はダクトの接続に使用される','亜鉛鉄板製ダクトの板厚は風速とダクトサイズにより決定する','排煙ダクトには塩化ビニル製ダクトを使用する','ダクトの曲がり部の内側にはガイドベーンを設ける'],a:2,genre:7,d:2,ex:'排煙ダクトには耐火性が必要であり、鋼板製ダクトを使用する。塩化ビニルは不燃材料ではないため不可。',oex:['正しい。共板フランジ工法はダクト端部を折り曲げてフランジとする。','正しい。ダクトの板厚は風速と寸法により規定されている。','排煙ダクトは鋼板製（不燃材料）とする。塩ビは使用不可。','正しい。ガイドベーンは曲がり部の圧力損失を低減する。']},{q:'ダクトの風量測定に関する記述のうち、適当なものはどれか。',o:['風量測定は送風機の直後で行うのが最も正確である','ピトー管は動圧を測定するために使用する','熱線風速計は風速測定に使用できない','風量測定は空調機のフィルター交換後に行う必要はない'],a:1,genre:7,d:3,ex:'ピトー管は全圧と静圧の差から動圧を測定し、風速を算出する器具である。',oex:['送風機直後は気流が乱れるため測定に不適。直管部で測定する。','正しい。ピトー管で全圧と静圧を測定し動圧（=全圧-静圧）を求める。','熱線風速計は風速測定に広く使用されている。','風量測定はフィルター交換後や試運転調整時に行う。']},{q:'配管の識別表示に関する記述のうち、適当なものはどれか。',o:['すべての配管に識別表示は不要である','識別色は施工業者が自由に決めてよい','JISでは配管の識別色が規定されている','識別表示は配管の口径を示すものである'],a:2,genre:7,d:1,ex:'JIS A 0102等で配管内の流体の種類に応じた識別色が規定されている。',oex:['安全管理上、配管には識別表示が必要である。','識別色はJIS規格に基づいて定められている。','正しい。JISで配管の識別色（水は青、蒸気は赤など）が規定。','識別表示は管内の流体の種類を示すものである。']},{q:'レジオネラ属菌対策に関する記述のうち、適当でないものはどれか。',o:['冷却水には薬品処理を行う','給湯温度は60℃以上に維持する','貯湯槽の温度は40℃程度に維持するのが最適である','冷却塔の清掃は定期的に行う'],a:2,genre:7,d:2,ex:'レジオネラ属菌は20～50℃で増殖しやすいため、貯湯槽の温度は60℃以上に維持する必要がある。40℃は菌の増殖適温であり危険。',oex:['正しい。冷却水の薬品処理はレジオネラ対策に有効。','正しい。給湯温度60℃以上はレジオネラ対策として推奨。','40℃はレジオネラの増殖適温であり危険。60℃以上に維持する。','正しい。冷却塔の定期清掃はレジオネラ対策に重要。']},{q:'事務所ビルの空調ゾーニングに関する記述のうち、適当でないものはどれか。',o:['インテリアゾーンは年間を通じて冷房負荷が発生しやすい','ペリメータゾーンは外壁面から3～5m程度の範囲である','北面と南面のペリメータゾーンは同一系統で処理してよい','ペリメータゾーンとインテリアゾーンに分けて計画する'],a:2,genre:7,d:3,ex:'北面と南面では日射負荷が大きく異なるため、同一系統での処理は不適切。方位別にゾーニングする。',oex:['正しい。インテリアゾーンは内部発熱により年間冷房負荷が発生。','正しい。ペリメータゾーンは一般に外壁面から3～5m程度。','北面と南面では日射条件が大きく異なるため別系統とする。','正しい。事務所ビルはペリメータとインテリアに分けて計画する。']},{q:'空調設備のTAB（Testing, Adjusting and Balancing）に関する記述のうち、適当なものはどれか。',o:['TABの実施は法律上義務ではないため省略可能である','TABでは風量・水量の測定と調整を行う','TABは空調機の設置位置を決定する作業である','TABは施工完了前に行う仮の調整作業である'],a:1,genre:7,d:3,ex:'TABは空調設備の風量・水量の測定、調整、バランシングを行い、設計通りの性能を発揮させる重要な作業である。',oex:['TABは設計性能を確認する重要な工程であり省略すべきでない。','正しい。TABでは風量・水量の測定と調整・バランシングを行う。','TABは測定・調整作業であり、機器の設置位置決定ではない。','TABは施工完了後の本調整作業である。']},{q:'配管の摩擦損失に関する記述のうち、適当なものはどれか。',o:['管内の流速が2倍になると摩擦損失は4倍になる','管径が大きいほど摩擦損失は大きくなる','管の長さと摩擦損失は無関係である','直管の摩擦損失は管内の流体の粘性に無関係である'],a:0,genre:7,d:3,ex:'ダルシー・ワイスバッハの式より、摩擦損失は流速の2乗に比例する。流速が2倍になると摩擦損失は4倍になる。',oex:['正しい。摩擦損失は流速の2乗に比例する。','管径が大きいほど摩擦損失は小さくなる。','管の長さに比例して摩擦損失は大きくなる。','摩擦損失は流体の粘性（レイノルズ数）に関係する。']},{q:'ベルヌーイの定理に関する記述のうち、適当なものはどれか。',o:['流体の温度変化を表す','圧縮性流体にのみ適用できる','粘性流体にのみ適用できる','流体のエネルギー保存則を表す'],a:3,genre:7,d:3,ex:'ベルヌーイの定理は理想流体（非圧縮・非粘性）のエネルギー保存則を表し、位置エネルギー、圧力エネルギー、運動エネルギーの和が一定であることを示す。',oex:['流体の温度変化ではなくエネルギー保存を表す。','非圧縮性流体に適用されるのが基本。','ベルヌーイの定理は非粘性（理想）流体に適用される。','正しい。ベルヌーイの定理はエネルギー保存則を表す。']},{q:'配管溶接の欠陥に関する記述のうち、適当でないものはどれか。',o:['溶込み不良は溶接電流が過大な場合に発生しやすい','アンダーカットは母材が溶けて溝ができる欠陥である','ブローホールはガスの巻き込みにより発生する','割れは溶接の最も重大な欠陥の一つである'],a:0,genre:7,d:3,ex:'溶込み不良は溶接電流が過小な場合や溶接速度が速すぎる場合に発生しやすい。電流過大では溶け落ちが発生する。',oe 。','玉掛け作業には玉掛け技能講習等の資格が必要。','正しい。つり荷の下への立入りは禁止されている。','正しい。定格荷重を超える吊り上げは禁止。']},{q:'配管の埋設に関する記述のうち、適当でないものはどれか。',o:['給水管の埋設深さは凍結深度より深くする','排水管の埋設は自然流下勾配を確保する','埋設管の埋戻しには良質土を使用する','ガス管と給水管は接触させて埋設する'],a:3,genre:7,d:1,ex:'ガス管と給水管は相互に30cm以上離して埋設する。接触させてはならない。',oex:['正しい。凍結による管の破損を防ぐため凍結深度以深に埋設。','正しい。排水管は自然流下のため適切な勾配を確保する。','正しい。埋戻しには配管を損傷しない良質土を使用する。','ガス管と給水管は30cm以上離して埋設する。']},{q:'空調機のコイルに関する記述のうち、適当でないものはどれか。',o:['冷却コイルは空気を冷却・除湿する','加熱コイルは空気を加熱する','冷却コイルの列数が多いほど冷却能力が大きい','冷却コイルの通過風速は5m/s以上が推奨される'],a:3,genre:7,d:3,ex:'冷却コイルの通過風速は一般に2.0～3.0m/s程度が推奨される。5m/s以上では水滴の飛散や圧力損失の増大が生じる。',oex:['正しい。冷却コイルで空気を冷却し、露点以下では除湿も行う。','正しい。加熱コイルには温水や蒸気を通して空気を加熱する。','正しい。列数が多いほど伝熱面積が増え冷却能力が大きくなる。','通過風速は2.0～3.0m/s程度が推奨。5m/s以上は過大。']},{q:'給水器具に関する記述のうち、適当でないものはどれか。',o:['ボールタップは受水槽の水位制御に使用される','フラッシュバルブは大便器の洗浄に使用される','安全弁は配管内の圧力を上昇させるために使用される','減圧弁は配管内の圧力を一定に保つために使用される'],a:2,genre:7,d:1,ex:'安全弁は配管や機器内の圧力が設定値を超えた場合に自動的に開いて圧力を逃がす安全装置である。圧力を上昇させるものではない。',oex:['正しい。ボールタップは水位により自動的に給水を制御する。','正しい。フラッシュバルブは大便器の洗浄用。','安全弁は過大な圧力を逃がす安全装置。圧力上昇用ではない。','正しい。減圧弁は2次側の圧力を設定値に保つ。']},{q:'設備のメンテナンスに関する記述のうち、適当でないものはどれか。',o:['予防保全は費用がかからないため常に最適である','事後保全は故障してから修理する保全方式である','状態監視保全は設備の状態を監視して劣化を検知する','予防保全は故障を未然に防ぐための計画的な保全である'],a:0,genre:7,d:2,ex:'予防保全には定期的な点検・部品交換等の費用がかかる。設備の重要度に応じて予防保全と事後保全を使い分けるのが効率的。',oex:['予防保全にも費用がかかり、常に最適とは限らない。','正しい。事後保全は故障後に修理する方式。','正しい。状態監視保全は振動・温度等の監視で劣化を検知。','正しい。予防保全は計画的な点検・整備で故障を防ぐ。']},{q:'配管のフラッシングに関する記述のうち、適当なものはどれか。',o:['フラッシングは不要な作業である','フラッシングは冷媒配管のみに行う','フラッシングは配管接続前に行う','フラッシングは配管内の異物を洗い流す作業である'],a:3,genre:7,d:1,ex:'フラッシングは配管内のスケール、溶接スラグ、切粉等の異物を水で洗い流す作業であり、配管完了後に行う。',oex:['フラッシングは機器保護のため重要な作業である。','給水管、冷温水管等にも行う。冷媒配管のみではない。','フラッシングは配管接続・完了後に行う。','正しい。フラッシングは管内の異物洗浄作業である。']},{q:'配管の勾配測定に使用する工具として、適当なものはどれか。',o:['パイプバイス','トルクレンチ','パイプカッタ','水準器（レベル）'],a:3,genre:7,d:1,ex:'水準器（レベル）は配管の勾配や水平を測定するために使用する工具である。',oex:['パイプバイスは管を固定するための工具。','トルクレンチはボルトの締付けトルク管理に使用する。','パイプカッタは管の切断に使用する工具。','正しい。水準器は勾配・水平の測定に使用する。']},{q:'スリーブ工事に関する記述のうち、適当でないものはどれか。',o:['スリーブは配管が壁・床を貫通する部分に設ける','ス 型は給水用具に該当する。','フィルターは定期交換が必要。性能維持のため重要。','正しい。日本水道協会（JWWA）の認証規格がある。','正しい。活性炭フィルター等で残留塩素やカビ臭を除去。']},{q:'食器洗い機に関する記述のうち、適当でないものはどれか。',o:['食器洗い機には逆流防止措置が必要である','食器洗い機には逆流防止措置は不要である','ビルトイン型食器洗い機は給水管に直結する','食器洗い機は給水用具に該当する場合がある'],a:1,genre:10,d:2,ex:'食器洗い機は給水管に接続するため、逆流防止措置（逆止弁等）が必要。',oex:['正しい。食器洗い機には逆流防止措置が必要。','逆流防止措置は必要。不要ではない。','正しい。ビルトイン型は給水管に直接接続する。','正しい。給水管に直結するものは給水用具に該当。']},{q:'硬質ポリ塩化ビニル管のTS接合に関する記述のうち、適当でないものはどれか。',o:['接着剤は受口内面と挿し口外面の両方に塗布する','管端面と受口内面を清掃してから接着剤を塗布する','接合後は一定時間保持して接着剤を硬化させる','接着剤を塗布せずに管を差し込むだけでよい'],a:3,genre:10,d:1,ex:'TS接合は専用接着剤を塗布して管を差し込み接合する。接着剤なしでは漏水する。',oex:['正しい。受口内面と挿し口外面の両方に接着剤を塗布する。','正しい。接合面の清掃は接着力確保のため重要。','正しい。接着剤硬化のため所定時間管を保持する。','接着剤の塗布は必須。塗布しないと接合不良となる。']},{q:'ポリエチレン管の接合に関する記述のうち、適当でないものはどれか。',o:['メカニカル接合は金属継手で管を締め付けて接合する','EF（電気融着）接合は電熱線で管と継手を融着させる','バット融着接合は管端面を加熱溶融して圧着する','ポリエチレン管はねじ接合で接合する'],a:3,genre:10,d:2,ex:'ポリエチレン管はねじ接合ではなく、メカニカル接合、EF接合、バット融着接合等で接合する。',oex:['正しい。メカニカル接合は金属継手でナットを締付けて接合。','正しい。EF接合は内蔵電熱線で加熱融着する。','正しい。バット融着は管端面同士を加熱溶融して圧着する。','ポリエチレン管にねじ接合は使用しない。']},{q:'給水管の分岐に関する記述のうち、適当でないものはどれか。',o:['分岐は配水管の管頂部付近から取り出すのが原則である','分岐の口径は配水管の口径より小さいものとする','他の給水管の分岐位置から30cm以上離す','分岐は配水管の異形管部分から行うのが望ましい'],a:3,genre:10,d:2,ex:'分岐は配水管の直管部で行い、異形管（曲管、T字管等）からの分岐は避ける。',oex:['正しい。管頂部付近から取り出して異物混入を防止。','正しい。分岐管の口径は配水管より小さくする。','正しい。他の分岐から30cm以上の間隔をとる。','異形管部分からの分岐は避けて直管部から行う。']},{q:'給水管の曲げ加工に関する記述のうち、適当でないものはどれか。',o:['硬質塩ビ管は加熱して曲げ加工する場合がある','鋼管は曲げ加工ができない','ポリエチレン管は可とう性があり曲げ配管ができる','銅管はベンダーを使用して曲げ加工できる'],a:1,genre:10,d:2,ex:'鋼管もパイプベンダー等で曲げ加工が可能。ただし小口径管に限られる。',oex:['正しい。塩ビ管は加熱軟化させて曲げる場合がある。','鋼管も小口径であればベンダーで曲げ加工できる。','正しい。PE管は可とう性があり緩やかな曲げが可能。','正しい。銅管はチューブベンダーで曲げ加工する。']},{q:'給水管の防食に関する記述のうち、適当でないものはどれか。',o:['金属管は腐食しないため防食対策は不要である','防食テープは管外面の腐食防止に使用する','電食（電気腐食）は迷走電流により発生する','異種金属の接触による電食を防止するため絶縁接合を行う'],a:0,genre:10,d:2,ex:'金属管は土壌の腐食性、迷走電流、異種金属接触等により腐食する。防食対策は必要。',oex:['金属管は腐食するため適切な防食対策が必要。','正しい。防食テープは埋設管の外面腐食を防止する。','正しい。迷走電流（電車の漏えい電流等）で電食が発生。','正しい。異種金属接触では絶縁継手等で電食を防止する。']},{q:'管の腐食に関する記述のうち、適当でないものはどれか。',o:['腐食は金属が化学的・電気化学的に侵食される現象である','土壌の種類により腐食性が異なる','pHが低い（酸性の）土壌は腐食性が高い','すべての管材は腐食しない'],a:3,genre:10,d:1,ex:'金属管は環境条件により腐食する。ただし樹脂管等は金属腐食は生じない。',oex:['正しい。腐食は金属の酸化等による侵食現象。','正しい。土壌の比抵抗等により腐食性が異なる。','正しい。酸性土壌は金属腐食を促進する。','金属管は腐食する。すべての管材が腐食しないとは言えない。']},{q:'水道法における簡易専用水道に関する記述のうち、適当なものはどれか。',o:['簡易専用水道の管理は法律上の義務はない','受水槽の有効容量が10m³を超える水道は簡易専用水道に該当する','簡易専用水道の検査は不要である','簡易専用水道は水道法の適用を受けない'],a:1,genre:10,d:2,ex:'簡易専用水道は水道事業の水のみを水源とし、受水槽の有効容量が10m³を超える水道。',oex:['法律で管理基準の遵守が義務づけられている。','正しい。受水槽有効容量10m³超で簡易専用水道に該当。','登録検査機関による定期検査が義務。','水道法第34条の2等の適用を受ける。']},{q:'水道法における罰則に関する記述のうち、適当なものはどれか。',o:['無届けの給水装置工事に罰則はない','水道法には罰則規定がない','クロスコネクションを行っても罰則はない','給水装置の基準不適合工事には罰則がある場合がある'],a:3,genre:10,d:2,ex:'水道法には給水装置の基準違反等に対する罰則規定がある。',oex:['無届けの工事も法令違反となる場合がある。','水道法には罰則規定がある。','クロスコネクションは水道法違反であり罰則の対象。','正しい。基準不適合の工事等には罰則が適用される場合がある。']},{q:'給水装置の水撃限界性能に関する記述のうち、適当でないものはどれか。',o:['水撃防止器具（エアチャンバー等）は対策の一つである','水撃作用（ウォーターハンマー）を防止するための基準である','水撃作用は給水装置に何の影響も与えない','水栓等の急閉止による衝撃圧を制限する'],a:2,genre:10,d:2,ex:'水撃作用は配管の振動・騒音、接合部の漏水、給水用具の破損等の原因となる。',oex:['正しい。エアチャンバーは水撃防止の代表的な器具。','正しい。水撃限界性能は水撃防止のための基準。','水撃作用は配管・器具に損傷を与える有害な現象。','正しい。急閉止による衝撃圧（水撃圧）を基準値以下に制限。']},{q:'給水装置の凍結防止に関する記述のうち、適当でないものはどれか。',o:['水抜き栓（不凍水栓柱）は凍結防止に有効である','保温材の施工は露出管の凍結防止に有効である','凍結防止対策は暖地では一切不要である','凍結深度以深に埋設することで凍結を防止する'],a:2,genre:10,d:2,ex:'暖地でも異常低温による凍結は起こりうるため、露出管等には一定の対策が必要な場合がある。',oex:['正しい。水抜き栓は管内の水を排出して凍結を防止する。','正しい。保温材で管を覆い放熱を防いで凍結を防止する。','暖地でも異常低温時には凍結する可能性がある。','正しい。凍結深度以深への埋設は基本的な対策。']},{q:'給水管の管径選定に関する記述のうち、適当なものはどれか。',o:['管径は同時使用水量、摩擦損失水頭、有効水圧を考慮して決定する','管径は常に最小口径で設計する','管径の決定に水圧は無関係である','管径は見た目で適当に決める'],a:0,genre:10,d:2,ex:'管径は同時使用水量を流すために必要な口径を、損失水頭や有効水圧を考慮して計算により決定する。',oex:['正しい。管径は各種条件を考慮して計算で決定する。','最小口径では水量不足となる場合がある。適切な口径を選定。','水圧は管径決定の重要な要素。','管径は計算により合理的に決定する。']},{q:'給水管路の損失水頭に関する記述のうち、適当でないものはどれか。',o:['損失水頭は管径が小さいほど大きくなる','直管の摩擦損失水頭は管長に比例する','損失水頭は流量に関係しない','局部損失水頭は弁、曲がり、分岐等で発生する'],a:2,genre:10,d:3,ex:'損失水頭は流量（流速）に関係する。流量が多いほど損失水頭は大きくなる。',oex:['正しい。管径が小さいと同じ流量でも流速が増し損失が大きくなる。','正しい。摩擦損失は管長に比例する。','損失水頭は流量（流速）に大きく関係する。','正しい。弁、曲がり部等で局部損失が発生する。']},{q:'道路下の給水管工事に関する記述のうち、適当でないものはどれか。',o:['道路の掘削には道路管理者の許可が必要である','道路上の工事は無届けで自由に行える','交通規制が必要な場合は所轄警察署の許可を受ける','掘削後の埋戻し・復旧は道路管理者の基準に従う'],a:1,genre:10,d:1,ex:'道路上の工事には道路管理者の許可（道路占用許可・道路使用許可等）が必要。',oex:['正しい。道路の掘削には道路法に基づく許可が必要。','道路工事には各種許可が必要。無届けは違法。','正しい。交通規制には所轄警察署の道路使用許可が必要。','正しい。埋戻し・復旧は道路管理者の基準に従う。']},{q:'給水管の通水試験に関する記述のうち、適当なものはどれか。',o:['通水試験は給水装置の機能を確認するために行う','通水試験は不要である','通水試験では水の出具合のみ確認する','通水試験は水圧試験の代わりになる'],a:0,genre:10,d:2,ex:'通水試験は水圧試験後に実施し、水栓からの出水状態、メーターの作動、漏水の有無等を確認する。',oex:['正しい。通水試験は給水装置の機能確認のために行う。','通水試験は竣工検査の重要項目。','出水状態のほか、メーター作動確認や漏水確認も行う。','通水試験と水圧試験は別の試験であり、代替にはならない。']},{q:'給水管と排水管の離隔に関する記述のうち、適当なものはどれか。',o:['給水管は排水管の上方に布設するのが原則である','給水管は排水管の下方に布設するのが原則である','給水管と排水管は接触させて布設してよい','給水管と排水管の離隔は考慮不要である'],a:0,genre:10,d:2,ex:'給水管は汚水による汚染防止のため、排水管より上方に布設するのが原則。',oex:['正しい。給水管は排水管の上方に布設する。','下方では排水管破損時に汚染リスクがある。上方が原則。','離隔を確保し接触しないように布設する。','給水管と排水管の離隔は水質保全のため重要。']},{q:'給水管の直管距離と給水用具の設置に関する記述のうち、適当でないものはどれか。',o:['量水器の前後には直管部を設ける','逆止弁の設置位置は水の流れ方向を考慮する','止水栓は修繕時に止水できる位置に設置する','給水用具の設置位置は任意でよく、基準はない'],a:3,genre:10,d:2,ex:'給水用具の設置位置は技術基準や水道事業者の規定に基づいて設置する。任意ではない。',oex:['正しい。量水器の正確な計量のため直管部を確保する。','正しい。逆止弁は水の流れ方向を確認して正しく設置する。','正しい。止水栓は修繕時に容易に操作できる位置に設置。','給水用具の設置には技術基準がある。任意ではない。']},{q:'散水栓に関する記述のうち、適当でないものはどれか。',o:['散水栓は庭の水やり等の屋外用水栓である','地中に設置する散水栓ボックス型がある','散水栓には凍結防止のため不凍水栓柱型がある','散水栓には逆流防止措置は不要である'],a:3,genre:10,d:2,ex:'散水栓にもホースの水没等による逆流防止のため、逆止弁やバキュームブレーカー等の措置が必要。',oex:['正しい。散水栓は屋外の散水・水やり用水栓。','正しい。散水栓ボックスは地中に埋設して設置する。','正しい。不凍水栓柱は寒冷地での凍結防止対策。','散水栓にも逆流防止措置が必要。']},{q:'電気温水器に関する記述のうち、適当でないものはどれか。',o:['電気温水器は電気ヒーターで水を加熱する','貯湯式電気温水器にはタンクがある','電気温水器には安全弁（逃し弁）が設けられている','電気温水器は給水管に接続しないため給水装置ではない'],a:3,genre:10,d:2,ex:'電気温水器は給水管に直結して水道水を加熱するため、給水装置（給水用具）に該当する。',oex:['正しい。電気ヒーターで水を加熱する。','正しい。貯湯式はタンク内に湯を貯留する。','正しい。加熱による膨張圧を逃がすため安全弁を設ける。','給水管に直結するため給水装置（給水用具）に該当する。']},{q:'受水槽以下の装置に関する記述のうち、適当なものはどれか。',o:['受水槽以下の装置は水道法上の給水装置には該当しない','受水槽以下の装置は水道事業者が管理する','受水槽以下の装置も水道法上の給水装置に該当する','受水槽以下の装置には水質基準は適用されない'],a:0,genre:10,d:2,ex:'受水槽以下の装置は水道法上の給水装置には該当せず、建築物の設備として管理される。',oex:['正しい。受水槽以降は給水装置ではない。','受水槽以下は設備所有者が管理する。水道事業者ではない。','受水槽以降は給水装置の定義に含まれない。','受水槽が10m³超の場合は簡易専用水道として管理基準がある。']},{q:'消火用の給水装置に関する記述のうち、適当でないものはどれか。',o:['消火栓は水道の配水管から分岐して設置される場合がある','消火用の水道メーターは検定対象外となる場合がある','消火用給水装置は通常の給水装置と同様の基準が適用される','消火用と通常使用を兼用する場合は逆流防止が特に重要である'],a:2,genre:10,d:3,ex:'消火用給水装置には一般の給水装置と一部異なる基準が適用される場合がある（常時使用しないため耐圧基準等）。',oex:['正しい。消火栓は配水管に直結されるものがある。','正しい。消火栓用メーターの検定有効期間は別の規定がある場合も。','消火用は通常の給水装置と一部基準が異なる場合がある。','正しい。消火使用後の汚水逆流防止は重要な課題。']},{q:'水道の種類に関する記述のうち、適当でないものはどれか。',o:['上水道は飲料水を供給する水道である','簡易水道は給水人口が5,001人以上100人以下の水道事業である','専用水道は自家用の水道施設である','水道用水供給事業は水道事業者に水を供給する事業である'],a:1,genre:10,d:3,ex:'簡易水道事業は給水人口が5,001人以下の水道事業。設問の「100人以下」は誤り。正しくは101人以上5,000人以下（小規模を含め条件は計画給水人口5,001人以下）。',oex:['正しい。上水道は清浄な飲料水を供給する水道。','簡易水道事業は計画給水人口5,001人以下。100人以下は誤り。','正しい。専用水道は自家用の水道施設（一定規模以上）。','正しい。水道用水供給事業は水道事業者への用水供給事業。']},{q:'給水装置の検査に関する記述のうち、適当でないものはどれか。',o:['給水装置の工事完了後に竣工検査を行う','水道事業者は給水装置の検査を行うことができる','給水装置の検査は一切行われない','給水装置が基準に適合しない場合、水道事業者は給水を拒否できる'],a:2,genre:10,d:1,ex:'水道事業者は給水装置が基準に適合しているかの検査を行う権限がある。',oex:['正しい。工事完了後に竣工検査を行い基準適合を確認する。','正しい。水道事業者には給水装置の検査権限がある。','給水装置の検査は実施される。行われないは誤り。','正しい。基準不適合の場合は給水を拒否できる（水道法第16条）。']},{q:'竣工検査に関する記述のうち、適当なものはどれか。',o:['竣工検査では給水装置が構造・材質基準に適合しているか確認する','竣工検査は工事途中に行う','竣工検査では水質試験は含まれない','竣工検査は不要である'],a:0,genre:10,d:2,ex:'竣工検査は工事完了後に行い、給水装置が構造・材質基準に適合しているかを確認する検査。',oex:['正しい。竣工検査は基準適合の確認のために行う。','竣工検査は工事完了後に行う。途中ではない。','竣工検査では残留塩素の測定等を含む場合がある。','竣工検査は必要な検査。不要ではない。']},{q:'給水装置の設計に関する記述のうち、適当でないものはどれか。',o:['管の曲がりや分岐は損失水頭の原因となる','給水管は必ずU字型に配管しなければならない','配管はできるだけ直線的に配管するのが望ましい','給水管はできるだけ短い経路で配管する'],a:1,genre:10,d:1,ex:'給水管は直線的かつ最短経路で配管するのが望ましい。U字型にする規定はない。',oex:['正しい。曲がりや分岐は局部損失を発生させる。','U字型の配管規定はない。直線的・最短経路が望ましい。','正しい。直線的な配管は損失水頭を低減する。','正しい。短い経路で配管すると損失水頭が少ない。']},{q:'共用給水管と専用給水管に関する記述のうち、適当でないものはどれか。',o:['専用給水管は各世帯専用の給水管である','共用給水管と専用給水管の区分は管理責任に関係しない','共用給水管は複数の世帯が共同で使用する給水管である','各戸メーターは専用給水管の計量のために設置する'],a:1,genre:10,d:2,ex:'共用管と専用管の区分は維持管理の責任範囲に関係する重要な事項。',oex:['正しい。専用給水管は各世帯専用の配管。','区分は管理責任の範囲に関係する重要な事項。','正しい。共用給水管は複数世帯で共用する配管。','正しい。各戸メーターは個別の使用水量計量のため設置。']},{q:'給水装置における空気弁に関する記述のうち、適当でないものはどれか。',o:['空気弁は管内の空気を排出するために設置する','空気弁は管内の負圧発生時に空気を吸入する機能がある','空気弁は管路の高所に設置する','空気弁は排水管にのみ設置する'],a:3,genre:10,d:2,ex:'空気弁は給水管（水道管）に設置するものであり、排水管用ではない。',oex:['正しい。管内に溜まった空気を排出して通水を確保する。','正しい。負圧時に空気を吸入して管の破損を防止する。','正しい。空気は高所に溜まるため管路の高所に設置する。','空気弁は給水管（水道管）に設置する。排水管用ではない。']},{q:'給水管の布設工事の手順として、適当なものはどれか。',o:['事前調査→道路占用許可申請→掘削→配管→水圧試験→埋戻し→復旧','配管→掘削→水圧試験→埋戻し','掘削→埋戻し→配管→水圧試験','水圧試験→配管→掘削→埋戻し'],a:0,genre:10,d:1,ex:'給水管の布設工事は事前調査、許可申請、掘削、配管、試験、埋戻し、復旧の順序で行う。',oex:['正しい。この順序が給水管布設工事の標準的な手順。','掘削前に配管はできない。順序が誤り。','配管は掘削後に行う。順序が誤り。','水圧試験は配管完了後に行う。順序が誤り。']},{q:'配水管の種類に関する記述のうち、適当でないものはどれか。',o:['水道用ポリエチレン管は配水管にも使用される','鋼管は大口径の配水管として使用される','ダクタイル鋳鉄管は配水管として広く使用されている','配水管にはコンクリート管のみが使用される'],a:3,genre:10,d:1,ex:'配水管にはダクタイル鋳鉄管、鋼管、ポリエチレン管等の各種管材が使用される。コンクリート管のみではない。',oex:['正しい。ポリエチレン管は配水管にも使用される。','正しい。鋼管は大口径・高圧の配水管に使用される。','正しい。ダクタイル鋳鉄管は耐震性に優れ広く使用。','配水管は各種管材が使用される。コンクリート管のみではない。']},{q:'給水装置における水質の保全に関する記述のうち、適当でないものはどれか。',o:['給水管の材質は水質に影響しない','死水（停滞水）の発生を防止するため行き止まり管は避ける','給水管内の水の滞留は水質悪化の原因となる','給水管や給水用具からの有害物質の溶出を防止する'],a:0,genre:10,d:2,ex:'給水管の材質は水質に影響する。鉛管からの鉛溶出等が問題となっている。',oex:['管の材質は水質に影響する。鉛管からの鉛溶出が問題例。','正しい。行き止まり管は死水の原因となるため避ける。','正しい。水の滞留は残留塩素の低下や細菌繁殖の原因。','正しい。浸出性能基準により有害物質の溶出を制限。']},{q:'水道水の異常に関する記述のうち、適当でないものはどれか。',o:['青水は銅管からの銅溶出が原因の場合がある','赤水は管内の鉄さびが原因である','水道水に異常は一切発生しない','白濁は空気の混入が原因の場合がある'],a:2,genre:10,d:1,ex:'水道水には赤水（鉄さび）、白濁（空気混入）、青水（銅溶出）等の異常が発生する場合がある。',oex:['正しい。青水は銅管からの銅イオン溶出が原因。','正しい。赤水は鋼管内面の鉄さびが原因。','水道水には各種の異常が発生する可能性がある。','正しい。白濁は水中の微細な空気泡が原因の場合がある。']},{q:'給水装置工事の届出に関する記述のうち、適当でないものはどれか。',o:['改造工事も届出が必要な場合がある','給水装置工事の届出は一切不要である','新設工事は水道事業者への届出が必要である','撤去工事も届出が必要な場合がある'],a:1,genre:10,d:1,ex:'給水装置工事（新設、改造、修繕、撤去）は水道事業者への届出（申込み）が必要。',oex:['正しい。改造工事も届出が必要。','届出は工事種別に関わらず必要。','正しい。新設工事は水道事業者への届出が必要。','正しい。撤去工事も届出が必要。']},{q:'オームの法則に関する記述のうち、正しいものはどれか。',o:['電圧＝電流×抵抗である','電圧＝電流÷抵抗である','抵抗＝電圧×電流である','電流＝電圧×抵抗である'],a:0,genre:11,d:1,ex:'オームの法則はV=I×R（電圧＝電流×抵抗）の関係を表す。',oex:['正しい。V=IR（電圧=電流×抵抗）がオームの法則。','電圧=電流÷抵抗は誤り。V=IRである。','抵抗=電圧÷電流（R=V/I）が正しい。','電流=電圧÷抵抗（I=V/R）が正しい。']},{q:'抵抗の直列接続に関する記述のうち、正しいものはどれか。',o:['合成抵抗は最小の抵抗値と等しい','合成抵抗は各抵抗の逆数の和の逆数である','合成抵抗は各抵抗の積÷和である','合成抵抗は各抵抗の和である'],a:3,genre:11,d:1,ex:'直列接続の合成抵抗R=R1+R2+R3+...（各抵抗の和）である。',oex:['最小の抵抗値になるのは並列接続の場合。','逆数の和の逆数は並列接続の計算式。','積÷和は2つの抵抗の並列接続の計算式。','正しい。直列接続の合成抵抗は各抵抗の和。']},{q:'抵抗の並列接続に関する記述のうち、正しいものはどれか。',o:['合成抵抗は各抵抗の和である','合成抵抗は各抵抗の和より大きい','合成抵抗は最も大きい抵抗値と等しい','合成抵抗は最も小さい抵抗値より小さくなる'],a:3,genre:11,d:1,ex:'並列接続の合成抵抗は最も小さい抵抗値より小さくなる。',oex:['各抵抗の和は直列接続の計算式。','合成抵抗は各抵抗より小さくなる。','合成抵抗は最大の抵抗値より小さい。','正しい。並列の合成抵抗は最小の抵抗値より小さい。']},{q:'電力に関する記述のうち、正しいものはどれか。',o:['電力P＝電圧V×電流Iである','電力P＝電圧V÷電流Iである','電力の単位はオーム（Ω）である','電力P＝電流I÷電圧Vである'],a:0,genre:11,d:1,ex:'電力P=V×I（ワット=ボルト×アンペア）の関係がある。',oex:['正しい。P=VI（電力=電圧×電流）。','P=V÷Iは誤り。P=VIである。','電力の単位はワット（W）。オームは抵抗の単位。','P=I÷Vは誤り。']},{q:'電力量に関する記述のうち、正しいものはどれか。',o:['電力量＝電力×時間である','電力量の単位はワット（W）である','電力量＝電圧×時間である','電力量＝抵抗×時間である'],a:0,genre:11,d:1,ex:'電力量W=P×t（電力×時間）。単位はWh（ワット時）またはkWh。',oex:['正しい。電力量=電力×時間。','電力量の単位はWh（ワット時）。Wは電力の単位。','電圧×時間は電力量ではない。','抵抗×時間は電力量ではない。']},{q:'交流の実効値に関する記述のうち、正しいものはどれか。',o:['実効値は最大値の1/√2倍（約0.707倍）である','実効値は平均値と同じである','実効値と最大値は同じである','実効値は最大値の√2倍（約1.414倍）である'],a:0,genre:11,d:2,ex:'交流の実効値は最大値÷√2=最大値×(1/√2)≒最大値×0.707。',oex:['正しい。実効値=最大値/√2≒0.707×最大値。','実効値と平均値も異なる。','実効値と最大値は異なる。','最大値=実効値×√2。逆の関係。']},{q:'交流回路の力率に関する記述のうち、正しいものはどれか。',o:['力率が1のとき無効電力が最大となる','力率cosφは有効電力÷皮相電力で表される','力率の値は常に1より大きい','力率は直流回路でのみ適用される概念である'],a:1,genre:11,d:2,ex:'力率cosφ=有効電力P÷皮相電力S。力率1で有効電力が最大（無効電力ゼロ）。',oex:['力率1のとき無効電力はゼロとなる。','正しい。力率=P/S=cosφ。','力率は0～1の範囲。1より大きくはならない。','力率は交流回路に適用される概念。']},{q:'三相交流に関する記述のうち、正しいものはどれか。',o:['三相交流は60度ずつ位相がずれた3つの交流である','三相交流は2本の電線で送電する','三相交流は単相交流より送電効率が悪い','三相交流は120度ずつ位相がずれた3つの交流である'],a:3,genre:11,d:2,ex:'三相交流は位相が120度（2π/3ラジアン）ずつずれた3つの正弦波交流。',oex:['120度ずれている。60度ではない。','三相は3本（またはΔ結線の場合3本+中性線）の電線。','三相は単相より送電効率が良い。','正しい。三相は120度位相差の3つの交流。']},{q:'三相交流のスター（Y）結線に関する記述のうち、正しいものはどれか。',o:['線間電圧は相電圧の√3倍である','線間電圧は相電圧と等しい','線電流は相電流の√3倍である','線間電圧は相電圧の2倍である'],a:0,genre:11,d:2,ex:'Y結線では線間電圧VL=√3×相電圧Vp、線電流IL=相電流Ipの関係がある。',oex:['正しい。Y結線の線間電圧=√3×相電圧。','線間電圧と相電圧は異なる（√3倍の関係）。','Y結線では線電流=相電流（等しい）。','√3倍であって2倍ではない。']},{q:'三相交流のデルタ（Δ）結線に関する記述のうち、正しいものはどれか。',o:['線電流は相電流と等しい','線間電圧は相電圧の2倍である','線電流は相電流の√3倍である','線間電圧は相電圧の√3倍である'],a:2,genre:11,d:2,ex:'Δ結線では線間電圧VL=相電圧Vp、線電流IL=√3×相電流Ipの関係がある。',oex:['線電流は相電流の√3倍。等しくない。','線間電圧=相電圧。2倍ではない。','正しい。Δ結線の線電流=√3×相電流。','Δ結線では線間電圧=相電圧（等しい）。']},{q:'コンデンサに関する記述のうち、正しいものはどれか。',o:['コンデンサは電荷を蓄える素子である','コンデンサは直流電流を流す素子である','コンデンサの容量の単位はヘンリー（H）である','コンデンサを並列接続すると合成容量は減少する'],a:0,genre:11,d:1,ex:'コンデンサ（キャパシタ）は電荷を蓄える受動素子。容量の単位はファラド（F）。',oex:['正しい。コンデンサは電荷を蓄える素子。','コンデンサは直流を通さない（交流のみ通す）。','コンデンサの容量の単位はファラド（F）。ヘンリーはインダクタンス。','並列接続すると合成容量は増加する。']},{q:'電線の許容電流に関する記述のうち、正しいものはどれか。',o:['許容電流を超えて使用しても問題ない','電線の許容電流は電線の太さ（断面積）により異なる','電線の許容電流は電線の長さにより決まる','すべての電線の許容電流は同じである'],a:1,genre:11,d:1,ex:'電線の許容電流は導体の太さ（断面積）、絶縁物の種類、周囲温度等により異なる。',oex:['許容電流を超えると過熱・絶縁劣化・火災の危険がある。','正しい。許容電流は電線の太さにより異なる。','許容電流は長さではなく太さで決まる。','電線の種類・太さにより許容電流は異なる。']},{q:'VVFケーブルに関する記述のうち、正しいものはどれか。',o:['VVFケーブルは600Vビニル絶縁ビニルシースケーブル平形である','VVFケーブルは高圧配線に使用する','VVFケーブルの外装は金属製である','VVFケーブルは地中埋設専用のケーブルである'],a:0,genre:11,d:1,ex:'VVFはVinyl insulated Vinyl sheathed Flat cableの略で、600V以下の屋内配線に最も多く使用される。',oex:['正しい。VVFは600Vビニル絶縁ビニルシースケーブル平形。','VVFは低圧（600V以下）配線用。高圧には不可。','VVFの外装はビニル（PVC）。金属ではない。','VVFは屋内配線用。地中埋設にはCVケーブル等を使用。']},{q:'金属管工事に関する記述のうち、正しいものはどれか。',o:['金属管内には必ず接続点を設ける','金属管にはD種接地工事は不要である','金属管は木造住宅にのみ使用する','金属管工事は薄鋼電線管や厚鋼電線管を使用する工事である'],a:3,genre:11,d:2,ex:'金属管工事は薄鋼電線管（C管）や厚鋼電線管（G管）に電線を収めて配線する工事方法。',oex:['金属管内には接続点を設けてはならない。','金属管にはD種接地工事が必要。','金属管工事はRC造等にも使用する。','正しい。金属管にはC管（薄鋼）とG管（厚鋼）がある。']},{q:'合成樹脂管工事に関する記述のうち、正しいものはどれか。',o:['PF管は可とう性のある合成樹脂製電線管である','PF管は自己消火性がない','CD管は自己消火性がある','合成樹脂管は高圧配線に使用する'],a:0,genre:11,d:2,ex:'PF管（PF＝Plastic Flexible）は可とう性があり自己消火性を有する合成樹脂製電線管。',oex:['正しい。PF管は可とう性のある合成樹脂管。','PF管は自己消火性がある。','CD管は自己消火性がない（コンクリート埋設専用）。','合成樹脂管は低圧配線に使用する。']},{q:'ケーブル工事に関する記述のうち、正しいものはどれか。',o:['ケーブルは支持なしに壁面に直接固定してはならない','ケーブル工事はVVFケーブルやCVケーブルを使用する工事である','ケーブルは管に収めなければならない','ケーブルの曲げ半径に制限はない'],a:1,genre:11,d:1,ex:'ケーブル工事はケーブルを直接敷設する工事方法。VVF、CV等の各種ケーブルを使用する。',oex:['ケーブルはステープル等で壁面に直接固定できる。','正しい。VVF、CV等のケーブルを使用する。','ケーブルは管に収めず直接敷設できる。','曲げ半径には制限がある（外径の6倍以上等）。']},{q:'配線用遮断器（ブレーカー）に関する記述のうち、正しいものはどれか。',o:['漏電の検出機能がある','手動でのみ操作する開閉器である','過電流を検出して自動的に回路を遮断する保護装置である','高圧回路専用の機器である'],a:2,genre:11,d:1,ex:'配線用遮断器（MCCB）は過電流（過負荷・短絡）を検出して自動的に回路を遮断する保護機器。',oex:['漏電検出は漏電遮断器（ELCB）の機能。MCCBにはない。','手動操作もできるが、主機能は自動遮断。','正しい。過電流を検出して自動遮断する保護装置。','低圧回路の保護に使用する。高圧専用ではない。']},{q:'漏電遮断器に関する記述のうち、正しいものはどれか。',o:['漏電遮断器の定格感度電流は1Aが標準である','漏電遮断器は一般家庭には設置不要である','漏電遮断器は漏電を検出して自動的に回路を遮断する','漏電遮断器は過電流の保護機能がない'],a:2,genre:11,d:1,ex:'漏電遮断器（ELCB）は漏電（地絡）電流を零相変流器（ZCT）で検出し自動遮断する。',oex:['定格感度電流は一般に30mA（0.03A）が標準。1Aではない。','一般家庭の分電盤にも漏電遮断器は設置される。','正しい。漏電を検出して自動的に回路を遮断する。','多くの漏電遮断器は過電流保護機能も兼ね備える。']},{q:'電磁開閉器に関する記述のうち、正しいものはどれか。',o:['電磁開閉器は電磁接触器とサーマルリレーを組み合わせたものである','電磁開閉器は照明回路専用である','電磁開閉器は手動でのみ操作する','電磁開閉器は高圧回路専用である'],a:0,genre:11,d:2,ex:'電磁開閉器（マグネットスイッチ）は電磁接触器（MC）とサーマルリレー（過負荷保護）の組合せ。',oex:['正しい。電磁接触器+サーマルリレー=電磁開閉器。','電動機の運転制御に広く使用される。照明専用ではない。','電磁コイルの励磁で自動的に動作する。','低圧回路の電動機制御に使用する。']},{q:'変圧器に関する記述のうち、正しいものはどれか。',o:['変圧器は電力を増幅する機器である','変圧器は交流の電圧を変換する機器である','変圧器は周波数を変換する機器である','変圧器は直流の電圧を変換する機器である'],a:1,genre:11,d:1,ex:'変圧器（トランス）は交流の電圧を変換する機器。巻数比により昇圧・降圧する。',oex:['変圧器は電圧を変換する。電力は増幅しない（損失がある）。','正しい。変圧器は交流電圧を変換する機器。','変圧器は周波数は変換しない。電圧のみ変換。','直流は変圧器で直接変換できない。']},{q:'接地工事の種類に関する記述のうち、正しいものはどれか。',o:['B種接地工事の接地抵抗値は50Ω以下である','D種接地工事の接地抵抗値は100Ω以下である','A種接地工事の接地抵抗値は500Ω以下である','C種接地工事の接地抵抗値は300Ω以下である'],a:1,genre:11,d:2,ex:'D種接地工事の接地抵抗値は100Ω以下（漏電遮断器設置時は500Ω以下に緩和可能）。',oex:['B種接地の接地抵抗値は変圧器の仕様により計算で求める。','正しい。D種接地の接地抵抗値は100Ω以下。','A種接地の接地抵抗値は10Ω以下。500Ωではない。','C種接地の接地抵抗値は10Ω以下。300Ωではない。']},{q:'D種接地工事に関する記述のうち、正しいものはどれか。',o:['変圧器の中性点に施す接地工事である','特別高圧機器に施す接地工事である','300V以下の低圧機器の金属製外箱に施す接地工事である','6,600Vの高圧機器に施す接地工事である'],a:2,genre:11,d:2,ex:'D種接地工事は300V以下の低圧機器の金属製外箱、金属管等に施す接地工事。',oex:['変圧器中性点にはB種接地工事を施す。','特別高圧にはA種接地工事を施す。','正しい。D種接地は300V以下の低圧機器用。','高圧機器にはA種接地工事を施す。']},{q:'接地工事の目的に関する記述のうち、正しいものはどれか。',o:['美観のために行う','感電事故の防止と漏電火災の防止が主な目的である','電気料金の節約のために行う','音質向上のために行う'],a:1,genre:11,d:1,ex:'接地工事は漏電時の感電事故防止と漏電火災防止が主目的。',oex:['接地は安全のために行う。美観とは無関係。','正しい。接地は感電防止と漏電火災防止が主目的。','接地は安全対策。料金節約とは無関係。','接地は電気安全が目的。']},{q:'第二種電気工事士の作業範囲に関する記述のうち、正しいものはどれか。',o:['一般用電気工作物の電気工事を行うことができる','自家用電気工作物（高圧）の電気工事ができる','すべての電圧の電気工事ができる','電気工事士の資格がなくても電気工事はできる'],a:0,genre:11,d:1,ex:'第二種電気工事士は一般用電気工作物（600V以下の受電設備で一般住宅等）の工事ができる。',oex:['正しい。第二種は一般用電気工作物の工事が可能。','自家用電気工作物は第一種電気工事士の範囲。','第二種は一般用電気工作物に限定される。','電気工事は電気工事士の資格が必要。無資格は違法。']},{q:'電気工事士法に関する記述のうち、正しいものはどれか。',o:['電気工事士法は電気工事業者のみに適用される','電気工事士の免状は都道府県知事が交付する','電気工事士の免状は更新が必要である','電気工事士でなければ電気工事を行ってはならない'],a:3,genre:11,d:1,ex:'電気工事士法により、電気工事は電気工事士の資格を持つ者でなければ行ってはならない。',oex:['電気工事士個人にも適用される。','免状は都道府県知事が交付する。これも正しい。','第二種の免状には更新制度はない。','正しい。電気工事は有資格者のみが行える。']},{q:'配線図の図記号に関する記述のうち、正しいものはどれか。',o:['○の中にFと書かれた記号は蛍光灯を示す','△の記号は配線用遮断器を示す','□の記号は常にスイッチを示す','○の記号は常にコンセントを示す'],a:0,genre:11,d:2,ex:'配線図で○の中にFは蛍光灯の図記号として一般的に使用される。',oex:['正しい。○にFは蛍光灯を示す一般的な図記号。','△は特定の記号で配線用遮断器とは限らない。','□はコンセント等を示す場合がある。常にスイッチではない。','○は照明器具等を示す場合もある。常にコンセントではない。']},{q:'スイッチの図記号に関する記述のうち、正しいものはどれか。',o:['単極スイッチは●で表される','3路スイッチは●に数字3を添えて表す','4路スイッチは●に数字4を添えて表す','上記すべてが正しい'],a:3,genre:11,d:2,ex:'スイッチの図記号は●（黒丸）が基本で、3路は3、4路は4を添える。',oex:['正しい。単極スイッチは●で表される。','正しい。3路スイッチは●に3を添える。','正しい。4路スイッチは●に4を添える。','正しい。すべて正しい。']},{q:'コンセントの図記号に関する記述のうち、正しいものはどれか。',o:['一般用コンセントは壁付けの場合二重丸で表される場合がある','接地極付コンセントにはEの記号が付く','接地端子付コンセントにはETの記号が付く','上記すべてが正しい'],a:3,genre:11,d:2,ex:'コンセントの図記号は種類により区別され、接地極付にはE、接地端子付にはET等の記号を付す。',oex:['正しい。壁付けコンセントは二重丸で表される場合がある。','正しい。接地極付にはEを付ける。','正しい。接地端子付にはETを付ける。','正しい。すべて正しい。']},{q:'電気工事で使用するリングスリーブに関する記述のうち、正しいものはどれか。',o:['リングスリーブは電線の切断に使用する','リングスリーブはボルトの締付けに使用する','リングスリーブは電線の圧着接続に使用する','リングスリーブは電線の被覆剥ぎに使用する'],a:2,genre:11,d:1,ex:'リングスリーブは銅管に電線を挿入し圧着工具で圧着して接続する材料。',oex:['電線の切断にはペンチや電工ナイフを使用。','ボルト締付けにはレンチやスパナを使用。','正しい。リングスリーブは電線の圧着接続用。','被覆剥ぎにはワイヤストリッパや電工ナイフを使用。']},{q:'圧着ペンチ（圧着工具）に関する記述のうち、正しいものはどれか。',o:['リングスリーブの圧着に使用する専用工具である','ボルトの締付けに使用する工具である','電線の被覆を剥く工具である','コンクリートへの穴あけに使用する工具である'],a:0,genre:11,d:1,ex:'圧着ペンチはリングスリーブを用いた電線の圧着接続に使用する専用工具。JIS適合品を使用する。',oex:['正しい。リングスリーブの圧着接続に使用する専用工具。','ボルト締付けはレンチの用途。','被覆剥ぎはワイヤストリッパの用途。','穴あけは振動ドリルの用途。']},{q:'ワイヤストリッパに関する記述のうち、正しいものはどれか。',o:['電線の絶縁被覆を剥き取るための工具である','電線を圧着するための工具である','金属管を切断するための工具である','ボルトを締め付けるための工具である'],a:0,genre:11,d:1,ex:'ワイヤストリッパは電線の絶縁被覆（シース・絶縁体）を正確に剥き取る工具。',oex:['正しい。電線の絶縁被覆を剥き取る専用工具。','圧着は圧着工具（圧着ペンチ）で行う。','金属管切断はパイプカッタ等で行う。','ボルト締付けはレンチで行う。']},{q:'電工ナイフに関する記述のうち、正しいものはどれか。',o:['電気の計測に使用する','コンクリートの穴あけに使用する','電線の被覆の剥離やケーブルの外装剥ぎに使用する','金属管の切断に使用する'],a:2,genre:11,d:1,ex:'電工ナイフは電線の絶縁被覆の剥離、ケーブルシースの切り裂き等に使用する刃物工具。',oex:['計測にはテスタや回路計を使用。','穴あけにはドリルを使用。','正しい。電工ナイフは被覆剥離やケーブル加工に使用。','金属管切断にはパイプカッタや金のこを使用。']},{q:'電線の接続に関する記述のうち、正しいものはどれか。',o:['電線の接続部の電気抵抗は増加させてはならない','電線の接続は被覆をつけたまま行う','電線の接続部は絶縁処理しなくてよい','電線の接続はどのような方法でも自由に行える'],a:0,genre:11,d:1,ex:'電線の接続部は接続前の電線の抵抗値以上の電気抵抗とならないようにする（内線規程）。',oex:['正しい。接続部の電気抵抗を増加させてはならない。','電線接続時は被覆を剥いて導体を露出させて接続する。','接続部は絶縁テープ等で絶縁処理が必要。','接続方法は基準に適合した方法で行う。自由ではない。']},{q:'差込形コネクタに関する記述のうち、正しいものはどれか。',o:['差込形コネクタは電線の芯線を差し込むだけで接続できる器具である','差込形コネクタは屋外の露出配線に使用する','差込形コネクタは圧着工具が必要である','差込形コネクタは高圧配線に使用する'],a:0,genre:11,d:1,ex:'差込形コネクタは電線の芯線を差し込むだけでワンタッチ接続できる接続器具。',oex:['正しい。芯線を差し込むだけでワンタッチ接続できる。','差込形コネクタはボックス内等の屋内配線で使用。','圧着工具は不要。差し込むだけで接続できる。','低圧配線用。高圧には使用しない。']},{q:'VVFケーブルの施工に関する記述のうち、正しいものはどれか。',o:['VVFケーブルの曲げ半径は制限なく自由に曲げられる','VVFケーブルの支持間隔は5m以上でよい','VVFケーブルはステープルで固定して配線する','VVFケーブルは常に金属管に収めて配線する'],a:2,genre:11,d:1,ex:'VVFケーブルは壁面や天井にステープル（サドル）で固定して配線する。',oex:['曲げ半径には制限がある（外径の6倍以上）。','支持間隔は2m以下（水平の場合1m以下）が推奨。','正しい。VVFケーブルはステープルで壁面等に固定。','VVFケーブルは直接敷設でき管に収める必要はない。']},{q:'絶縁抵抗測定に関する記述のうち、正しいものはどれか。',o:['テスタ（回路計）で測定する','照度計で測定する','絶縁抵抗計（メガー）を使用して測定する','クランプメータで測定する'],a:2,genre:11,d:1,ex:'絶縁抵抗の測定には絶縁抵抗計（メガー）を使用する。',oex:['テスタは電圧・電流・抵抗の測定用。絶縁抵抗は不可。','照度計は照度（明るさ）の測定用。','正しい。絶縁抵抗はメガー（絶縁抵抗計）で測定。','クランプメータは電流測定用。']},{q:'絶縁抵抗の基準値に関する記述のうち、正しいものはどれか。',o:['絶縁抵抗値は0Ωでもよい','絶縁抵抗値に基準はない','すべての回路の絶縁抵抗値は同じ基準である','対地電圧150V以下の場合、絶縁抵抗値は0.1MΩ以上である'],a:3,genre:11,d:2,ex:'電技解釈で対地電圧150V以下（一般住宅等）の絶縁抵抗は0.1MΩ以上と規定。',oex:['絶縁抵抗0Ωは地絡状態であり不可。','電気設備技術基準で基準値が規定されている。','対地電圧の区分により基準値が異なる。','正しい。対地電圧150V以下は0.1MΩ以上。']},{q:'接地抵抗の測定に関する記述のうち、正しいものはどれか。',o:['絶縁抵抗計で測定する','電力量計で測定する','接地抵抗計を使用して測定する','テスタで測定する'],a:2,genre:11,d:1,ex:'接地抵抗の測定には接地抵抗計（アーステスタ）を使用する。',oex:['絶縁抵抗計は絶縁抵抗測定用。接地抵抗は別。','電力量計は電力量の計量用。','正しい。接地抵抗はアーステスタ（接地抵抗計）で測定。','テスタでは接地抵抗は正確に測定できない。']},{q:'竣工検査に関する記述のうち、正しいものはどれか。',o:['竣工検査は外観検査のみで十分である','竣工検査は不要である','竣工検査では絶縁抵抗測定、接地抵抗測定、目視検査等を行う','竣工検査は電力会社が行い、電気工事士は関与しない'],a:2,genre:11,d:2,ex:'竣工検査では絶縁抵抗測定、接地抵抗測定、導通試験、外観検査等を行い安全を確認する。',oex:['外観検査のみでは不十分。測定も必要。','竣工検査は電気工事完了後に必ず行う。','正しい。各種測定と目視検査で安全確認する。','電気工事士（施工者）も竣工検査に関与する。']},{q:'低圧屋内配線の施工場所による制限に関する記述のうち、正しいものはどれか。',o:['展開した場所（乾燥した露出場所）ではがいし引き工事が施工できる','湿気の多い場所ではすべての工事方法が制限なく施工できる','点検できない隠ぺい場所ではがいし引き工事が施工できる','金属管工事はすべての場所で施工できない'],a:0,genre:11,d:2,ex:'展開した場所（乾燥した露出場所）ではがいし引き工事、金属管工事、ケーブル工事等が施工可能。',oex:['正しい。乾燥した露出場所ではがいし引き工事が可能。','湿気の多い場所では施工できない工事方法がある。','隠ぺい場所ではがいし引き工事は施工できない。','金属管工事はほぼすべての場所で施工可能。']},{q:'電線の色別に関する記述のうち、正しいものはどれか。',o:['接地線は赤色を使用する','接地側電線は赤色を使用する','非接地側電線は白色を使用する','接地側電線は白色を使用する'],a:3,genre:11,d:1,ex:'単相2線式の接地側電線は白色、非接地側電線は黒色を使用するのが標準。',oex:['接地線は緑色または緑/黄のストライプ。赤色ではない。','接地側は白色。赤色は非接地側に使用する場合がある。','非接地側は黒色（または赤色）。白色は接地側。','正しい。接地側電線は白色を使用する。']},{q:'コンセントの設置に関する記述のうち、正しいものはどれか。',o:['コンセントの定格電流は配線用遮断器の定格に関係しない','水気のある場所には接地極付コンセントを使用する','コンセントは天井にのみ設置する','すべてのコンセントは接地極なしでよい'],a:1,genre:11,d:2,ex:'水気のある場所（洗面所、台所等）には感電防止のため接地極付コンセント（EETコンセント）を使用する。',oex:['コンセントの定格と配線用遮断器の定格は整合させる。','正しい。水気のある場所には接地極付コンセントを使用。','コンセントは壁面に設置するのが一般的。','水気のある場所等では接地極付が必要。']},{q:'照明器具の取付けに関する記述のうち、正しいものはどれか。',o:['引掛シーリングはコンセントの一種である','引掛シーリングは天井に照明器具を取り付けるための器具である','照明器具の取付けに電気工事士の資格は不要である','照明器具は電源に直接はんだ付けする'],a:1,genre:11,d:1,ex:'引掛シーリング（引掛ローゼット）は天井に設置し、照明器具をワンタッチで取り付けるための接続器具。',oex:['引掛シーリングはコンセントではなく照明用接続器具。','正しい。引掛シーリングは照明器具の天井取付け用。','照明器具の接続に係る電気工事には資格が必要。','はんだ付けではなく引掛シーリング等の器具で接続する。']},{q:'キルヒホッフの第一法則（電流の法則）に関する記述のうち、正しいものはどれか。',o:['回路の分岐点に流入する電流の和は流出する電流の和に等しい','回路全体の電圧降下の和はゼロである','直列回路にのみ適用される','電力に関する法則である'],a:0,genre:11,d:2,ex:'キルヒホッフの第一法則は電流保存則であり、分岐点での流入電流の和=流出電流の和。',oex:['正しい。分岐点で流入電流の和=流出電流の和。','電圧降下の和に関するのは第二法則。','並列回路の分岐点にも適用される。','電流に関する法則。電力ではない。']},{q:'キルヒホッフの第二法則（電圧の法則）に関する記述のうち、正しいものはどれか。',o:['閉回路における電圧降下の総和は起電力の総和に等しい','分岐点の電流に関する法則である','並列回路にのみ適用される','電力に関する法則である'],a:0,genre:11,d:2,ex:'キルヒホッフの第二法則は閉回路（ループ）内の電圧降下の和=起電力の和。',oex:['正しい。閉回路で電圧降下の総和=起電力の総和。','電流に関するのは第一法則。','直列・並列を問わず閉回路に適用できる。','電圧に関する法則。']},{q:'電気抵抗に関する記述のうち、正しいものはどれか。',o:['導体の抵抗は温度に無関係である','導体の抵抗は断面積に比例する','導体の抵抗は長さに比例し断面積に反比例する','導体の抵抗は長さに反比例する'],a:2,genre:11,d:2,ex:'抵抗R=ρ×L/A（ρ:抵抗率、L:長さ、A:断面積）。長さに比例、断面積に反比例。',oex:['金属の抵抗は温度上昇とともに増加する。','断面積に反比例する。比例ではない。','正しい。R=ρL/A。長さに比例、断面積に反比例。','長さに比例する。反比例ではない。']},{q:'電線の発熱に関する記述のうち、正しいものはどれか。',o:['ジュールの法則により電線の発熱量はI²Rtで表される','電流が流れても電線は発熱しない','発熱量は電流の1乗に比例する','発熱量は抵抗に反比例する'],a:0,genre:11,d:2,ex:'ジュールの法則：発熱量Q=I²Rt（電流の2乗×抵抗×時間）。',oex:['正しい。Q=I²Rt（ジュールの法則）。','電流が流れると抵抗により発熱する。','発熱量は電流の2乗に比例する。','発熱量は抵抗に比例する。']},{q:'分岐回路の設計に関する記述のうち、正しいものはどれか。',o:['20Aの配線用遮断器の分岐回路には2.0mm以上のVVFケーブルを使用する','15Aの配線用遮断器の分岐回路には0.5mmの電線で十分である','分岐回路の電線の太さは自由に選定できる','コンセントの定格電流は遮断器の定格に関係しない'],a:0,genre:11,d:2,ex:'20A分岐回路には直径2.0mm（断面積3.5mm²以上）以上の銅線を使用する。',oex:['正しい。20A回路には2.0mm以上のVVFケーブルを使用。','15A回路でも1.6mm以上の電線が必要。0.5mmでは不足。','電線の太さは遮断器の定格に応じた基準がある。','コンセントの定格は遮断器の定格に適合させる。']},{q:'幹線の設計に関する記述のうち、正しいものはどれか。',o:['幹線は細い電線でも問題ない','幹線の過電流保護は不要である','幹線の電圧降下は考慮しなくてよい','幹線の太さは接続する負荷の合計電流に基づいて決定する'],a:3,genre:11,d:2,ex:'幹線の電線の太さは接続される負荷の合計電流（需要率を考慮）に基づいて決定する。',oex:['幹線は大電流が流れるため適切な太さが必要。','幹線にも過電流保護（遮断器等）が必要。','幹線の電圧降下は使用機器の性能に影響するため考慮が必要。','正しい。幹線の太さは負荷の合計電流で決定する。']},{q:'電動機（モーター）に関する記述のうち、正しいものはどれか。',o:['三相誘導電動機は産業用として最も多く使用される電動機である','単相誘導電動機は始動トルクが大きい','電動機の始動電流は定格電流より小さい','電動機には過負荷保護は不要である'],a:0,genre:11,d:2,ex:'三相誘導電動機（三相かご形）は構造が簡単で堅牢なため産業用に最も多く使用される。',oex:['正しい。三相誘導電動機は産業用の標準的な電動機。','単相誘導電動機は始動トルクが小さく始動用コンデンサ等が必要。','始動電流は定格電流の5～7倍と大きい。','過負荷保護（サーマルリレー等）が必要。']},{q:'電動機の始動法に関する記述のうち、正しいものはどれか。',o:['スターデルタ始動は始動電流を抑える方法の一つである','直入れ始動は始動電流が最も小さい','インバータ始動は始動電流を増大させる方法である','始動電流を抑える必要はない'],a:0,genre:11,d:2,ex:'スターデルタ（Y-Δ）始動は始動時にY結線で運転し電流を1/3に抑え、加速後にΔ結線に切り替える。',oex:['正しい。Y-Δ始動は始動電流を全電圧始動の1/3に抑える。','直入れ（全電圧）始動は始動電流が最も大きい。','インバータ始動は始動電流を抑えることができる。','大きな始動電流は配電系統に影響するため抑制が必要。']},{q:'照明に関する記述のうち、正しいものはどれか。',o:['蛍光灯は点灯に安定器が不要である','白熱電球はLEDより効率が良い','LED照明は白熱電球より消費電力が少ない','ナトリウムランプは住宅の主照明に最適である'],a:2,genre:11,d:1,ex:'LED照明は白熱電球に比べて消費電力が大幅に少なく（約1/8）、寿命も長い。',oex:['蛍光灯の点灯には安定器（インバータ等）が必要。','白熱電球の効率はLEDより低い（大部分が熱になる）。','正しい。LED照明は白熱電球より大幅に省エネ。','ナトリウムランプは道路照明等に使用。住宅主照明にはLED等。']},{q:'照度に関する記述のうち、正しいものはどれか。',o:['照度の単位はルクス（lx）である','照度の単位はカンデラ（cd）である','照度の単位はルーメン（lm）である','照度の単位はワット（W）である'],a:0,genre:11,d:1,ex:'照度はある面が受ける光の量で、単位はルクス（lx）。1lx=1lm/m²。',oex:['正しい。照度の単位はルクス（lx）。','カンデラは光度の単位。','ルーメンは光束の単位。','ワットは電力の単位。']},{q:'電線の種類に関する記述のうち、正しいものはどれか。',o:['IV線はケーブルの一種である','IV線は裸電線である','IV線の絶縁体はゴムである','IV線は600Vビニル絶縁電線である'],a:3,genre:11,d:1,ex:'IV（Indoor PVC）線は600Vビニル絶縁電線で、管工事やがいし引き工事に使用する。',oex:['IVはケーブルではなく単芯の絶縁電線。','IVは絶縁被覆があり裸電線ではない。','IVの絶縁体はビニル（PVC）。ゴムではない。','正しい。IVは600Vビニル絶縁電線。']},{q:'CVケーブルに関する記述のうち、正しいものはどれか。',o:['CVケーブルは架橋ポリエチレン絶縁ビニルシースケーブルである','CVケーブルは低圧専用である','CVケーブルのCは銅（Copper）を意味する','CVケーブルは屋外では使用できない'],a:0,genre:11,d:2,ex:'CVはCross-linked polyethylene insulated Vinyl sheathed cableの略。架橋PE絶縁ビニルシースケーブル。',oex:['正しい。CVは架橋PE絶縁ビニルシースケーブル。','CVケーブルは高圧にも使用される。低圧専用ではない。','CはCross-linked（架橋）の頭文字。','屋外でも使用可能。耐候性がある。']},{q:'住宅用分電盤に関する記述のうち、正しいものはどれか。',o:['分電盤にはブレーカーは1個のみ収められる','分電盤は屋外に設置するのが一般的である','分電盤にはメインブレーカーと分岐用ブレーカーが収められている','分電盤は高圧受電設備の一部である'],a:2,genre:11,d:1,ex:'住宅用分電盤にはメインブレーカー（主幹）と各回路の分岐ブレーカーが収められている。',oex:['複数のブレーカーが収められている。','分電盤は一般に屋内に設置する。','正しい。メインブレーカーと分岐ブレーカーを収納。','住宅用分電盤は低圧の分電設備。']},{q:'単相3線式の特徴に関する記述のうち、正しいものはどれか。',o:['100Vと200Vの両方の電圧が利用できる','100Vのみ利用できる','200Vのみ利用できる','3本の電線のうち1本は不要である'],a:0,genre:11,d:2,ex:'単相3線式は中性線と各電圧線の間で100V、両電圧線間で200Vが利用できる。',oex:['正しい。100Vと200Vの両方の電圧が利用可能。','100Vだけでなく200Vも利用できる。','100Vも利用できる。200Vのみではない。','3本すべて必要。中性線は欠かせない。']},{q:'感電に関する記述のうち、正しいものはどれか。',o:['人体に電流が流れることにより感電する','乾燥した手で電線に触れても絶対に感電しない','100V程度の電圧では感電死することはない','感電は交流のみで発生し、直流では発生しない'],a:0,genre:11,d:1,ex:'感電は人体に電流が流れることにより発生し、電流値によってはショック、やけど、心室細動等を起こす。',oex:['正しい。人体を通じて電流が流れると感電する。','乾燥した手でも条件次第で感電する危険がある。','100Vでも条件次第で感電死する危険がある。','直流でも感電は発生する。']},{q:'電気火災の予防に関する記述のうち、正しいものはどれか。',o:['電気コードを束ねて使用しても問題ない','トラッキング現象は火災の原因にならない','たこ足配線は電気火災の原因となるため避ける','電気火災は配線の過負荷とは無関係である'],a:2,genre:11,d:1,ex:'たこ足配線はコンセントや電線に過大な電流が流れ、過熱・発火の原因となる。',oex:['電気コードを束ねると放熱が悪くなり過熱する。','トラッキング現象はコンセント部の火災原因として重要。','正しい。たこ足配線は過負荷による発火の原因となる。','過負荷による発熱は電気火災の主要原因。']},{q:'電気設備技術基準に関する記述のうち、正しいものはどれか。',o:['電気設備技術基準は建築基準法の一部である','電気設備技術基準は電気工事士法の一部である','電気設備技術基準は任意の基準であり遵守義務はない','電気設備技術基準は電気設備の安全基準を定めたものである'],a:3,genre:11,d:2,ex:'電気設備技術基準（電技）は電気事業法に基づく省令で、電気設備の安全に関する技術基準を定めている。',oex:['電技は電気事業法に基づく省令。建築基準法ではない。','電技は電気事業法の省令。電気工事士法ではない。','電技は法令であり遵守義務がある。','正しい。電技は電気設備の安全基準。']},{q:'電気用品安全法に関する記述のうち、正しいものはどれか。',o:['電気用品にはPSEマークの表示が義務づけられている','電気用品安全法は電気工事には適用されない','PSEマークは任意表示である','電気用品安全法は輸入品には適用されない'],a:0,genre:11,d:2,ex:'電気用品安全法により、電気用品にはPSE（Product Safety of Electrical appliance）マークの表示が義務。',oex:['正しい。電気用品にはPSEマーク表示が義務。','電気工事で使用する電気用品にも適用される。','PSEマークは法律による義務表示。任意ではない。','輸入品にも適用される。']},{q:'3路スイッチに関する記述のうち、正しいものはどれか。',o:['3路スイッチは2箇所から1つの照明を入切できる','3路スイッチは1箇所からのみ操作できる','3路スイッチは端子が2つである','3路スイッチと単極スイッチは同じものである'],a:0,genre:11,d:2,ex:'3路スイッチは2箇所（階段の上下等）から1つの照明を入・切操作するために使用する。',oex:['正しい。3路スイッチは2箇所からの入切が可能。','3路は2箇所からの操作が目的。1箇所は単極スイッチ。','3路スイッチは端子が3つ（0、1、3）ある。','3路と単極は機能が異なる別のスイッチ。']},{q:'4路スイッチに関する記述のうち、正しいものはどれか。',o:['4路スイッチは3路スイッチと組み合わせて3箇所以上から照明を入切できる','4路スイッチ単独で2箇所から照明を入切できる','4路スイッチの端子は2つである','4路スイッチは3路スイッチと同じ機能である'],a:0,genre:11,d:2,ex:'4路スイッチは2つの3路スイッチの間に入れることで3箇所以上からの入切を可能にする。',oex:['正しい。4路+3路2個で3箇所以上からの入切が可能。','4路スイッチ単独では使用しない。3路と組み合わせる。','4路スイッチは端子が4つある。','4路と3路は機能が異なる。']},{q:'パイロットランプの配線に関する記述のうち、正しいものはどれか。',o:['常時点灯はスイッチの状態に関係なく常に消灯する配線である','異時点灯はスイッチOFFの時にパイロットランプが点灯する配線である','パイロットランプの配線方法は1種類のみである','同時点灯はスイッチOFFの時にパイロットランプが点灯する配線である'],a:1,genre:11,d:3,ex:'異時点灯はスイッチOFF時にパイロットランプが点灯し、スイッチの位置を確認できる配線方式。',oex:['常時点灯はスイッチの状態に関係なく常に点灯する。','正しい。異時点灯はスイッチOFF時にランプ点灯。','異時点灯、同時点灯、常時点灯の3種類がある。','同時点灯はスイッチON時にランプが点灯する。']},{q:'合成樹脂製可とう電線管（PF管・CD管）に関する記述のうち、正しいものはどれか。',o:['PF管はコンクリート埋設のほか露出配線にも使用できる','CD管は露出配線に使用できる','PF管とCD管は全く同じ性能である','CD管は自己消火性がある'],a:0,genre:11,d:2,ex:'PF管は自己消火性があり、コンクリート埋設・露出の両方に使用可能。CD管は自己消火性がなくコンクリート埋設専用。',oex:['正しい。PF管は自己消火性があり露出配線にも使用可。','CD管はコンクリート埋設専用。露出配線は不可。','PF管は自己消火性あり、CD管はなし。性能が異なる。','CD管は自己消火性がない。PF管にはある。']},{q:'プルボックスに関する記述のうち、正しいものはどれか。',o:['プルボックスは配管の途中で電線の引入れや接続を行うための箱である','プルボックスは照明器具の一種である','プルボックスは配線用遮断器を収める箱である','プルボックスは接地極の一種である'],a:0,genre:11,d:2,ex:'プルボックスは金属管工事等で配管の途中に設置し、電線の引入れ・接続を行うための金属製の箱。',oex:['正しい。電線の引入れ・接続用の箱。','プルボックスは照明器具ではない。','遮断器を収めるのは分電盤。プルボックスは別。','プルボックスは配線用の箱。接地極ではない。']},{q:'ジョイントボックスに関する記述のうち、正しいものはどれか。',o:['ジョイントボックスは電線の接続点を収める箱である','ジョイントボックスは電力量計を収める箱である','ジョイントボックスはスイッチを取り付ける箱である','ジョイントボックスは配線用遮断器を収める箱である'],a:0,genre:11,d:1,ex:'ジョイントボックス（アウトレットボックス）は電線の接続点や分岐点を収める箱。',oex:['正しい。電線の接続点を収める箱。','電力量計はメーターボックスに収める。','スイッチはスイッチボックスに取り付ける。','遮断器は分電盤に収める。']},{q:'電力量計（電気メーター）に関する記述のうち、正しいものはどれか。',o:['電力量計は使用した電力量を積算計量する機器である','電力量計は電流のみを測定する機器である','電力量計は電圧を測定する機器である','電力量計は抵抗を測定する機器である'],a:0,genre:11,d:1,ex:'電力量計（Wh計）は電気の使用量（電力量：kWh）を積算計量する計量器。',oex:['正しい。電力量計は使用電力量を積算計量する。','電流測定は電流計で行う。','電圧測定は電圧計で行う。','抵抗測定は抵抗計（テスタ等）で行う。']},{q:'インバータに関する記述のうち、正しいものはどれか。',o:['インバータは接地工事に使用する機器である','インバータは直流を発電する機器である','インバータは電動機の回転速度を制御するために使用される','インバータは電圧を測定する計測器である'],a:2,genre:11,d:2,ex:'インバータは交流の周波数を変換して電動機の回転速度を制御する装置。省エネに寄与する。',oex:['接地工事には使用しない。','インバータは交流の周波数変換装置。','正しい。インバータは電動機の速度制御に使用。','インバータは速度制御装置。計測器ではない。']},{q:'接地工事の施工に関する記述のうち、正しいものはどれか。',o:['接地極は空中に設置する','接地抵抗値は大きいほどよい','接地極は地中に埋設する','接地線は赤色の電線を使用する'],a:2,genre:11,d:1,ex:'接地極は接地抵抗を低くするため地中に埋設する。接地線は緑色の電線を使用する。',oex:['接地極は地中に埋設する。空中ではない。','接地抵抗値は小さいほどよい（低いほど安全）。','正しい。接地極は地中に埋設する。','接地線は緑色（または緑/黄）を使用。赤色ではない。']},{q:'ケーブルラックに関する記述のうち、正しいものはどれか。',o:['ケーブルラックは多数のケーブルを効率的に布設するための金属製の棚である','ケーブルラックは照明器具の一種である','ケーブルラックにD種接地は不要である','ケーブルラックは1本のケーブルのみ布設可能である'],a:0,genre:11,d:2,ex:'ケーブルラックは電力・通信ケーブルを多数整然と布設するための金属製の棚（はしご状・トレー状）。',oex:['正しい。ケーブルラックは多数のケーブル布設用の金属棚。','照明器具ではなく配線用の金属製支持材。','金属製ケーブルラックにはD種接地工事が必要。','多数のケーブルを布設することが目的。']},{q:'テスタ（回路計）に関する記述のうち、正しいものはどれか。',o:['テスタは電圧、電流、抵抗を測定できる計測器である','テスタは接地抵抗を正確に測定できる','テスタは絶縁抵抗を測定する機器である','テスタは電力量を計量する機器である'],a:0,genre:11,d:1,ex:'テスタ（マルチメータ、回路計）は直流・交流の電圧、電流、抵抗等を測定できる汎用計測器。',oex:['正しい。テスタは電圧・電流・抵抗を測定できる。','接地抵抗の測定はアーステスタ（接地抵抗計）で行う。','絶縁抵抗はメガー（絶縁抵抗計）で測定する。','電力量は電力量計で計量する。']},{q:'クランプメータに関する記述のうち、正しいものはどれか。',o:['電線を切断せずに電流を測定できる計測器である','電線を切断して電流を測定する計測器である','絶縁抵抗を測定する計測器である','接地抵抗を測定する計測器である'],a:0,genre:11,d:1,ex:'クランプメータは電線をクランプ（挟む）するだけで非接触で電流を測定できる計測器。',oex:['正しい。電線を切断せず非接触で電流測定可能。','電線は切断しない。クランプで挟むだけ。','絶縁抵抗はメガーで測定する。','接地抵抗はアーステスタで測定する。']},{q:'検電器に関する記述のうち、正しいものはどれか。',o:['検電器は電路の充電の有無を確認する器具である','検電器は電圧を正確に測定する計測器である','検電器は抵抗を測定する器具である','検電器は電流を測定する器具である'],a:0,genre:11,d:1,ex:'検電器は電路（電線・機器）が充電されているか否かを確認する安全確認器具。',oex:['正しい。検電器は充電の有無を確認する器具。','正確な電圧測定はテスタで行う。検電器は有無の確認。','抵抗測定はテスタで行う。','電流測定はクランプメータ等で行う。']},{q:'屋外配線に関する記述のうち、正しいものはどれか。',o:['屋外配線には耐候性のある電線・ケーブルを使用する','屋外配線にはVVFケーブルをそのまま使用できない場合がある','屋外の電線には接地工事は不要である','屋外配線は雨水の影響を考慮しなくてよい'],a:0,genre:11,d:2,ex:'屋外配線には日光（紫外線）や雨水に耐える耐候性のある電線・ケーブルを使用する。',oex:['正しい。屋外には耐候性のある電線・ケーブルを使用。','VVFは屋外での直接露出使用には注意が必要。','屋外の金属部分にも接地工事が必要。','雨水対策（防水処理等）は屋外配線の重要事項。']},{q:'電気工事における安全対策に関する記述のうち、正しいものはどれか。',o:['活線作業は感電の危険があるため、原則として停電して作業する','保護具の使用は任意である','活線のまま作業するのが一般的である','電気工事中の安全確認は不要である'],a:0,genre:11,d:1,ex:'電気工事は感電防止のため原則として停電して作業する。やむを得ず活線作業を行う場合は絶縁用保護具を使用する。',oex:['正しい。停電作業が原則。活線作業は極力避ける。','保護具の使用は安全のため必須。','活線作業は危険。停電して作業するのが原則。','安全確認は電気工事の基本中の基本。']},{q:'屋内配線の電圧降下に関する記述のうち、正しいものはどれか。',o:['電圧降下は幹線で3%以下、分岐回路を含めて5%以下が推奨される','電圧降下は考慮しなくてよい','電圧降下は電線の太さに無関係である','電圧降下は電線の長さに無関係である'],a:0,genre:11,d:3,ex:'内線規程では幹線の電圧降下は3%以下、幹線+分岐回路で5%以下が推奨されている。',oex:['正しい。幹線3%以下、幹線+分岐5%以下が推奨。','電圧降下は機器の動作に影響するため考慮が必要。','電線が細いほど抵抗が大きく電圧降下も大きくなる。','電線が長いほど抵抗が大きく電圧降下も大きくなる。']},{q:'漏電火災警報器に関する記述のうち、正しいものはどれか。',o:['漏電火災警報器は漏電遮断器と同じものである','漏電火災警報器は消火設備の一種である','漏電火災警報器は大きな漏洩電流を検出して警報を発する装置である','漏電火災警報器はすべての建物に設置義務がある'],a:2,genre:11,d:3,ex:'漏電火災警報器は電路の漏洩電流（地絡電流）を検出して警報を発する装置。消防法で設置義務がある建物がある。',oex:['漏電遮断器は回路を遮断する。警報器は警報を発する。','漏電火災警報器は警報設備に分類される。','正しい。漏洩電流を検出して火災を未然に警報する装置。','一定の建物（ラスモルタル造等）に設置義務がある。']},{q:'需要率に関する記述のうち、正しいものはどれか。',o:['需要率は常に100%である','需要率は力率と同じ概念である','需要率は最大需要電力÷設備容量の合計で表される','需要率は負荷率と同じ概念である'],a:2,genre:11,d:3,ex:'需要率=最大需要電力÷設備容量の合計×100(%)。全負荷が同時に使用されるわけではないため100%以下となる。',oex:['需要率は一般に100%未満。全負荷が同時使用されない。','需要率と力率も異なる概念。','正しい。需要率=最大需要電力/総設備容量。','需要率と負荷率は異なる概念。']},{q:'冷凍機の冷媒として使用されるR410Aの特徴として、適当なものはどれか。',o:['オゾン破壊係数（ODP）がゼロである','単一冷媒であるため補充充填が容易である','R22と同じ圧力で運転できる','可燃性があるため取り扱いに注意が必要である'],a:0,genre:7,d:2,ex:'R410Aはオゾン破壊係数（ODP）がゼロのHFC冷媒である。R32とR125の擬似共沸混合冷媒であり、R22より高い圧力で運転する。',oex:['正しい。R410AはHFC冷媒でありODPはゼロである。','R410Aは擬似共沸混合冷媒であり、単一冷媒ではない。','R410AはR22より約1.6倍高い圧力で運転する。','R410Aは不燃性である（微燃性のR32とは異なる）。']},{q:'ダクトの施工に関する記述のうち、適当でないものはどれか。',o:['フレキシブルダクトの長さは、できるだけ長くとることが望ましい','スパイラルダクトの接続には、差込み継手を使用する','長方形ダクトのアスペクト比は、原則として4以下とする','ダクトの吊り間隔は、横走りダクトでは3,640mm以下とする'],a:0,genre:7,d:2,ex:'フレキシブルダクトは圧力損失が大きいため、できるだけ短くすることが望ましい。',oex:['フレキシブルダクトは圧力損失が大きいため、できるだけ短くする。','正しい。スパイラルダクトは差込み継手やフランジ継手で接続する。','正しい。アスペクト比が大きくなると圧力損失が増加するため4以下とする。','正しい。横走りダクトの吊り間隔は3,640mm以下が標準である。']},{q:'空気調和方式のうち、全空気方式に該当するものはどれか。',o:['ファンコイルユニット方式','パッケージ型空調機方式','単一ダクト方式','放射冷暖房方式'],a:2,genre:7,d:1,ex:'単一ダクト方式は空調機で処理した空気をダクトで各室に送る全空気方式である。',oex:['ファンコイルユニット方式は水方式または空気-水方式に分類される。','パッケージ型空調機方式は冷媒方式に分類される。','正しい。単一ダクト方式は全空気方式の代表的な方式である。','放射冷暖房方式は放射方式に分類される。']},{q:'冷却塔に関する記述のうち、適当でないものはどれか。',o:['開放型冷却塔は、冷却水が外気と直接接触して蒸発冷却する','密閉型冷却塔は、冷却水が外気と直接接触しない','レジオネラ属菌の繁殖防止のため、定期的な清掃や薬品処理が必要である','冷却塔の能力は、外気の乾球温度に大きく左右される'],a:3,genre:7,d:2,ex:'冷却塔の能力は外気の湿球温度に大きく左右される。乾球温度ではない。',oex:['正しい。開放型は冷却水と外気が直接接触する。','正しい。密閉型は冷却水が配管内を流れ外気と直接接触しない。','正しい。レジオネラ対策として定期的な清掃・薬品処理が重要である。','冷却塔の能力は乾球温度ではなく湿球温度に左右される。']},{q:'変風量（VAV）方式の特徴として、適当でないものはどれか。',o:['送風温度を変化させて室温を制御する方式である','定風量方式に比べて外気取入量の確保に注意が必要である','各ゾーンごとの温度制御が可能である','部分負荷時に送風量を減らすことで搬送動力を削減できる'],a:0,genre:7,d:2,ex:'VAV方式は送風量を変化させて室温を制御する方式であり、送風温度は一定である。送風温度を変化させるのは定風量方式の制御方法の一つである。',oex:['VAV方式は送風温度一定で風量を変化させる方式である。','正しい。風量が減ると外気量も減少するため注意が必要。','正しい。各ゾーンにVAVユニットを設置し個別制御が可能。','正しい。部分負荷時に風量を減らすことで省エネが図れる。']},{q:'エアフィルタの粒子捕集率の試験方法のうち、比色法で測定するものはどれか。',o:['質量法','比色法','計数法','DOP法'],a:1,genre:7,d:1,ex:'比色法はフィルタ前後の空気を白色ろ紙に通し、その汚れ具合を光電管で比較して捕集率を求める方法である。',oex:['質量法はフィルタに捕集された粉じんの質量から捕集率を求める方法である。','正しい。比色法は中性能フィルタの試験に用いられる。','計数法（粒子計数法）はHEPAフィルタ等の高性能フィルタの試験に用いる。','DOP法もHEPAフィルタの試験に用いられる方法である。']},{q:'冷媒配管に関する記述のうち、適当なものはどれか。',o:['フレア加工は、管端をリーマで面取りせずに行う','冷媒配管のろう付けには、配管内に空気を流しながら行う','冷媒配管の気密試験には、酸素ガスを使用する','冷媒用銅管は、りん脱酸銅管を使用する'],a:3,genre:7,d:2,ex:'冷媒用銅管にはりん脱酸銅管（JIS H 3300 C1220T）を使用する。',oex:['フレア加工前にリーマで面取りを行い、バリを除去する必要がある。','ろう付け時は配管内に窒素ガスを流して酸化防止する。空気ではない。','酸素ガスは爆発の危険があるため使用禁止。窒素ガスを使用する。','正しい。冷媒用銅管はりん脱酸銅管を使用する。']},{q:'送風機の特性に関する記述のうち、適当なものはどれか。',o:['後向き羽根送風機は多翼送風機よりも効率が高い','多翼送風機は高圧力が必要な場合に最適である','送風機の回転数を2倍にすると、風量は4倍になる','軸流送風機はダクト系統には使用できない'],a:0,genre:7,d:2,ex:'後向き羽根送風機（ターボファン）は多翼送風機（シロッコファン）より効率が高い。',oex:['正しい。後向き羽根送風機の効率は多翼送風機より高い。','多翼送風機は低圧・大風量に適する。高圧にはターボファンが適する。','送風機の回転数を2倍にすると風量は2倍になる（相似則）。','軸流送風機はダクト系統にも使用される。']},{q:'給水設備に関する記述のうち、適当でないものはどれか。',o:['水道直結直圧方式は、配水管の水圧で直接給水する方式である','受水槽の容量は、1日最大使用水量の2倍程度とする','高置水槽方式は、停電時でもある程度の給水が可能である','ポンプ直送方式は、高置水槽が不要である'],a:1,genre:7,d:1,ex:'受水槽の容量は1日最大使用水量の4/10～6/10（40～60%）程度とする。2倍ではない。',oex:['正しい。水道直結直圧方式は配水管の水圧を利用する。','受水槽の容量は1日最大使用水量の40～60%程度が標準である。','正しい。高置水槽に貯留された水により停電時もある程度給水できる。','正しい。ポンプ直送方式は受水槽からポンプで直接給水する。']},{q:'排水トラップに関する記述のうち、適当なものはどれか。',o:['Sトラップは自己サイフォン作用が起きにくい','わんトラップはキッチンの排水に使用してはならない','二重トラップは排水の流れを良くするために推奨される','トラップの封水深は、50mm以上100mm以下とする'],a:3,genre:7,d:1,ex:'排水トラップの封水深は50mm以上100mm以下と定められている。',oex:['Sトラップは自己サイフォン作用が起きやすい。Pトラップの方が起きにくい。','わんトラップは台所流しに広く使用されている。','二重トラップは排水の流れを阻害するため禁止されている。','正しい。封水深は50mm以上100mm以下が規定値である。']},{q:'通気管に関する記述のうち、適当でないものはどれか。',o:['伸頂通気管は排水立て管の頂部を延長して大気に開放する','ループ通気管は最上流の器具排水管接続点直下流から取り出す','通気管はトラップの封水を保護する目的で設ける','通気管の末端は窓等の開口部の上端から600mm以上立ち上げて大気に開放する'],a:1,genre:7,d:2,ex:'ループ通気管は最上流ではなく最下流の器具排水管接続点の直下流から取り出す。',oex:['正しい。伸頂通気管は排水立て管頂部を延長して大気開放する。','ループ通気管は最下流の器具排水管接続点の直下流から取り出す。','正しい。通気管はトラップの封水保護が主目的である。','正しい。通気管末端は開口部上端から600mm以上立ち上げる。']},{q:'給湯設備に関する記述のうち、適当でないものはどれか。',o:['返湯管は不要であり、給湯管のみで循環する','膨張管には止水弁を設けてはならない','中央式給湯設備の給湯温度は60℃以上とすることが推奨される','給湯用の銅管には耐熱性のある管を使用する'],a:0,genre:7,d:2,ex:'中央式給湯設備では、レジオネラ属菌の繁殖防止のためにも給湯循環配管が必要であり、返湯管が必要である。',oex:['中央式給湯では給湯温度を維持するため返湯管による循環が必要。','正しい。膨張管は安全装置であり止水弁を設けてはならない。','正しい。レジオネラ属菌対策として60℃以上が推奨される。','正しい。給湯用には耐熱性のある銅管やステンレス管を使用する。']},{q:'飲料用受水槽の設置に関する記述のうち、適当でないものはどれか。',o:['受水槽の周囲には保守点検用の空間として60cm以上確保する','受水槽の上部にはポンプなどの機器を設置しない','受水槽のオーバーフロー管には防虫網を設ける','受水槽の底部は排水に便利なように水勾配を設ける'],a:0,genre:7,d:2,ex:'飲料用受水槽の六面点検のためには周囲に60cm以上ではなく、上部100cm以上、その他の面は60cm以上の空間が必要である。ただし設問の「周囲」が側面のみを指す場合は正しいが、一般的には上部を含めた全体として不適当とされる。建築物衛生法施行令では六面点検に必要な空間を確保することが求められている。',oex:['受水槽上部は100cm以上、側面・底面は60cm以上の空間が必要である。','正しい。受水槽上部には衛生上、機器類を設置しない。','正しい。オーバーフロー管末端には防虫網を設ける。','正しい。底部には1/100以上の水勾配をつけ排水しやすくする。']},{q:'配管の接合方法に関する記述のうち、適当でないものはどれか。',o:['鋼管のねじ接合には、管端にテーパねじを切る','銅管のはんだ接合は、給水管には使用できない','硬質ポリ塩化ビニル管のTS接合には接着剤を使用する','排水用鋳鉄管のメカニカル接合にはゴムガスケットを使用する'],a:1,genre:7,d:1,ex:'銅管のはんだ接合は給水管にも使用できる。ただし鉛フリーはんだを使用する。',oex:['正しい。鋼管のねじ接合にはJIS B 0203のテーパねじを使用する。','銅管のはんだ接合は給水管にも使用可能。鉛フリーはんだを使用する。','正しい。HIVP管やVP管のTS接合には専用接着剤を使用する。','正しい。排水用鋳鉄管のMD継手にはゴムガスケットを使用する。']},{q:'配管の試験に関する記述のうち、適当なものはどれか。',o:['冷媒配管の気密試験には、窒素ガスを使用する','冷温水管の水圧試験の保持時間は、5分間とする','給水管の水圧試験は、最低使用圧力の1.5倍の圧力で行う','排水管の満水試験は、最下階の排水横主管のみで行う'],a:0,genre:7,d:2,ex:'冷媒配管の気密試験には窒素ガスを使用する。酸素やアセチレンは使用禁止。',oex:['正しい。冷媒配管の気密試験には窒素ガスを使用する。','水圧試験の保持時間は一般に60分間である。','給水管の水圧試験は最小静水圧の1.75倍または1.0MPaのいずれか大きい方。','満水試験は排水系統全体で行う。最下階のみではない。']},{q:'管の切断に関する記述のうち、適当でないものはどれか。',o:['硬質ポリ塩化ビニル管は、塩ビカッタや細歯ののこぎりで切断する','鋼管の切断にはパイプカッタ、帯のこ盤、高速砥石切断機などを使用する','ステンレス鋼管の切断には、ガス切断が適している','銅管の切断にはパイプカッタや金のこを使用する'],a:2,genre:7,d:1,ex:'ステンレス鋼管のガス切断は困難であり、適していない。高速砥石切断機やプラズマ切断を使用する。',oex:['正しい。硬質塩ビ管は塩ビカッタや細歯のこぎりで切断する。','正しい。鋼管の切断には各種切断工具が使用できる。','ステンレス鋼管はガス切断が困難。高速砥石切断機等を使用する。','正しい。銅管はパイプカッタや金のこで切断する。']},{q:'鋼管のねじ切りに関する記述のうち、適当でないものはどれか。',o:['ねじ切り油は切削性を良くし、ダイスの寿命を延ばす','ねじ切り後のバリは除去しなくてよい','ねじの規格はJIS B 0203に規定されている','自動ねじ切り機では、管を固定してダイヘッドが回転する'],a:1,genre:7,d:1,ex:'ねじ切り後のバリ（かえり）は管内面をリーマで、外面はやすりで除去する必要がある。',oex:['正しい。ねじ切り油は切削性向上とダイス寿命延長に効果がある。','ねじ切り後のバリは必ず除去する。内面はリーマ、外面はやすりを使用。','正しい。管用テーパねじの規格はJIS B 0203である。','正しい。自動ねじ切り機は管を固定しダイヘッドが回転する。']},{q:'配管の支持・固定に関する記述のうち、適当なものはどれか。',o:['配管の伸縮継手付近には固定点（アンカー）を設ける','鋼管の横走り配管の支持間隔は、管径に関係なく一定である','銅管の支持金具には鉄製のものを直接使用する','立て管の振れ止めは不要である'],a:0,genre:7,d:2,ex:'伸縮継手が正しく機能するためには、その付近に固定点（アンカー）を設ける必要がある。',oex:['正しい。伸縮継手付近には固定点を設けて配管の伸縮を制御する。','支持間隔は管径により異なり、管径が大きいほど間隔が広くなる。','銅管と鉄の接触は電食を起こすため、絶縁処理が必要である。','立て管にも振れ止めが必要である。各階1箇所以上設ける。']},{q:'配管の保温材に関する記述のうち、適当でないものはどれか。',o:['ポリスチレンフォームは冷水管の保冷に使用される','グラスウール保温筒は蒸気管には使用できない','グラスウールは無機質の保温材である','ロックウールは耐熱性に優れている'],a:1,genre:7,d:2,ex:'グラスウール保温筒は使用温度範囲が-20℃～350℃程度であり、蒸気管にも使用できる。',oex:['正しい。ポリスチレンフォームは冷水管等の保冷に使用される。','グラスウール保温筒は350℃程度まで使用可能で蒸気管にも使用できる。','正しい。グラスウールはガラスを繊維状にした無機質保温材である。','正しい。ロックウールは700℃程度まで使用可能で耐熱性に優れる。']},{q:'冷水管の保冷施工に関する記述のうち、適当なものはどれか。',o:['保冷材の継目はすべて密着させ、防湿層は不要である','保冷材は吸湿しても性能に影響しない','ポリエチレンフィルムは防湿層として使用される','結露防止のため、保冷材の外面に防湿層は設けない'],a:2,genre:7,d:2,ex:'冷水管の保冷では結露防止のため、保冷材の外面に防湿層（ポリエチレンフィルム等）を設ける。',oex:['冷水管の保冷では結露防止のため防湿層が必要である。','保冷材が吸湿すると断熱性能が低下する。','正しい。ポリエチレンフィルムは防湿層として使用される。','保冷材の外面に防湿層を設けて結露を防止する。']},{q:'ポンプに関する記述のうち、適当なものはどれか。',o:['渦巻きポンプは容積式ポンプに分類される','うず巻ポンプの吐出し量は回転数に比例する','キャビテーションは吐出し側で発生しやすい','ポンプの並列運転は揚程を増加させる目的で行う'],a:1,genre:7,d:2,ex:'うず巻ポンプの吐出し量は回転数に比例する（ポンプの相似則）。',oex:['渦巻きポンプはターボ式（非容積式）ポンプに分類される。','正しい。ポンプの相似則により吐出し量は回転数に比例する。','キャビテーションは吸込み側で発生しやすい。','並列運転は風量（流量）を増加させる。揚程増加は直列運転。']},{q:'ボイラに関する記述のうち、適当でないものはどれか。',o:['炉筒煙管ボイラは、大容量に適している','鋳鉄製ボイラは、蒸気ボイラとして使用できない','水管ボイラは、高圧大容量に適している','真空式温水発生機は、大気圧以下で運転する'],a:0,genre:7,d:2,ex:'炉筒煙管ボイラは小～中容量に適しており、大容量には水管ボイラが適している。',oex:['炉筒煙管ボイラは小～中容量向けであり大容量には不向き。','正しい。鋳鉄製ボイラは構造上蒸気ボイラには使用できず、温水用。','正しい。水管ボイラは
