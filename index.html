。高圧用ではありません。','不正解。大口径の略ではありません。','正解。HIはHigh Impact（耐衝撃性）の略です。']},{q:'水道メーターの検定有効期間はどれか？',o:['10年','5年','8年','15年'],a:2,genre:10,d:2,ex:'計量法により、水道メーターの検定有効期間は8年と定められています。',oex:['不正解。10年ではなく8年です。','不正解。5年ではなく8年です。','正解。水道メーターの検定有効期間は8年です。','不正解。15年ではなく8年です。']},{q:'給水装置の「吐水口空間」の確保が不要な場合はどれか？',o:['大便器','バキュームブレーカが設置されている場合','浴槽','洗面器'],a:1,genre:10,d:3,ex:'バキュームブレーカが設置されている場合は、逆サイホン作用による逆流防止が確保されるため吐水口空間は不要です。',oex:['不正解。大便器は洗浄弁に逆流防止弁が内蔵されています。','正解。バキュームブレーカ設置時は吐水口空間は不要です。','不正解。浴槽は吐水口空間の確保が必要です。','不正解。洗面器は吐水口空間の確保が必要です。']},{q:'受水槽式給水方式のデメリットはどれか？',o:['受水槽の設置スペースが必要で衛生管理も必要','直結給水より工事が簡単','断水時に給水できない','水圧が安定しない'],a:0,genre:10,d:1,ex:'受水槽式は設置スペースが必要で、定期清掃・水質管理等の衛生管理が必要というデメリットがあります。',oex:['正解。スペースと衛生管理が必要なことがデメリットです。','不正解。工事は直結給水より複雑です。','不正解。受水槽があるため断水時にも一定量給水可能です。','不正解。水圧はポンプで安定させられます。']},{q:'配水管からの分岐で「不断水工法」とは何か？',o:['仮設配管で迂回させる工法','水を止めずに分岐工事を行う工法','水を完全に止めてから工事する工法','夜間のみ工事する工法'],a:1,genre:10,d:2,ex:'不断水工法は配水管の水を止めずに（断水せずに）サドル付分水栓等を使用して分岐工事を行う工法です。',oex:['不正解。仮設配管は別の方法です。','正解。不断水工法は断水せずに分岐工事を行います。','不正解。水を止めるのは断水工法です。','不正解。時間帯は関係ありません。']},{q:'水道水に含まれるトリハロメタンの主な生成原因はどれか？',o:['地下水中の鉱物成分','塩素消毒と有機物の反応','配管からの金属溶出','受水槽内の藻類の繁殖'],a:1,genre:10,d:3,ex:'トリハロメタンは水中の有機物（フミン質等）と塩素消毒剤が反応して生成される消毒副生成物です。',oex:['不正解。鉱物成分は直接の原因ではありません。','正解。塩素消毒と有機物の反応でトリハロメタンが生成されます。','不正解。金属溶出とは関係ありません。','不正解。藻類は有機物の一部ですが、主因は塩素と有機物の反応です。']},{q:'給水管の口径決定で考慮すべき要素として含まれないものはどれか？',o:['同時使用率','建物の外壁の色','管の摩擦損失','水栓の数と種類'],a:1,genre:10,d:1,ex:'給水管の口径は同時使用率、摩擦損失、水栓の数・種類、給水圧力等を考慮して決定します。外壁の色は無関係です。',oex:['不正解。同時使用率は口径決定の重要な要素です。','正解。外壁の色は口径決定に無関係です。','不正解。管の摩擦損失は考慮します。','不正解。水栓の数と種類は考慮します。']},{q:'給水装置の「水撃防止器」の設置が推奨される箇所はどれか？',o:['通気管の先端','洗濯機用水栓やレバー式水栓の近く','排水管の途中','受水槽の底部'],a:1,genre:10,d:2,ex:'水撃防止器は急閉止する水栓（洗濯機用、レバー式等）の近くに設置し、水撃（ウォーターハンマー）を緩和します。',oex:['不正解。通気管には設置しません。','正解。急閉止水栓の近くに設置します。','不正解。排水管には設置しません。','不正解。受水槽底部ではありません。']},{q:'水道事業者が給水契約を拒否できる正当な理由に含まれないものはどれか？',o:['申込者の職業が気に入らない場合','配水管未整備地域の場合','給水施設の能力が不足する場合','申込者の住所が分からない場合'],a:0,genre:10,d:1,ex:'水道法第15条により、正当な理由なく給水を拒否できません。職業を理由にした拒否は差別であり認められません。',oex:['正解。申込者の職業は給水拒否の正当な理由にはなりません。','不正解。配水管未整備は正当な理由になり得ます。','不正解。施設能力不足は正当な理由になり得ます。','不正解。住所不明は事務手続き上の問題です。']},{q:'給水装置に使用する「逆止弁」の種類に含まれないものはどれか？',o:['ウエハー式逆止弁','リフト式逆止弁','ゲート式逆止弁','スイング式逆止弁'],a:2,genre:10,d:2,ex:'逆止弁にはスイング式、リフト式、ウエハー式、ばね式等がありますが「ゲート式逆止弁」は存在しません。ゲート弁は仕切弁です。',oex:['不正解。ウエハー式は逆止弁の種類です。','不正解。リフト式は逆止弁の種類です。','正解。ゲート式逆止弁は存在しません。ゲート弁は仕切弁です。','不正解。スイング式は逆止弁の種類です。']},{q:'電気回路で「直列接続」した2つの抵抗の合成抵抗はどうなるか？',o:['各抵抗の差','各抵抗の積','各抵抗の和','各抵抗の逆数の和の逆数'],a:2,genre:11,d:1,ex:'直列接続の合成抵抗は各抵抗の和になります。R=R1+R2+...です。',oex:['不正解。差は合成抵抗の計算に使いません。','不正解。積は合成抵抗の計算に使いません。','正解。直列接続の合成抵抗は各抵抗の和です。','不正解。逆数の和の逆数は並列接続の場合です。']},{q:'コンセントの極性で「接地側」を示す端子の色はどれか？',o:['緑色','黒色','赤色','白色（W表示）'],a:3,genre:11,d:1,ex:'コンセントの接地側端子は白色またはW表示されています。非接地側は黒色です。',oex:['不正解。緑色は接地線の色です。','不正解。黒色は非接地側です。','不正解。赤色ではありません。','正解。接地側は白色（W表示）です。']},{q:'「三路スイッチ」の用途はどれか？',o:['3段階の明るさ調整','2箇所から1つの照明をON/OFFできる','3相電源の切替え','3つの照明を同時に制御する'],a:1,genre:11,d:2,ex:'三路スイッチは2箇所（例：階段の上と下）から同じ照明をON/OFFするためのスイッチです。',oex:['不正解。明るさ調整は調光スイッチです。','正解。三路スイッチは2箇所から1つの照明を制御します。','不正解。3相電源の切替えではありません。','不正解。3つの照明を同時制御するものではありません。']},{q:'VVFケーブルの被覆色で、接地線として使用するものはどれか？',o:['緑色','黒色','白色','赤色'],a:0,genre:11,d:1,ex:'接地線は緑色（または緑/黄のストライプ）の被覆色を使用します。',oex:['正解。緑色が接地線の被覆色です。','不正解。黒色は非接地側の電圧線です。','不正解。白色は接地側の中性線です。','不正解。赤色は電圧線（3芯の場合）です。']},{q:'電気工事で使用する「ケーブルストリッパー」と「ワイヤーストリッパー」の違いはどれか？',o:['ケーブルストリッパーは外装（シース）を剥ぎ、ワイヤーストリッパーは心線被覆を剥ぐ','違いはない','ケーブルストリッパーの方が小さい','同じ工具の別名'],a:0,genre:11,d:2,ex:'ケーブルストリッパーはVVFケーブル等の外装（シース）を剥ぐ工具、ワイヤーストリッパーは心線の絶縁被覆を剥ぐ工具です。',oex:['正解。ケーブルストリッパーは外装、ワイヤーストリッパーは心線被覆を剥ぎます。','不正解。用途が異なります。','不正解。大きさの違いではありません。','不正解。異なる工具です。']},{q:'200V回路の電線の色別として正しいものはどれか？',o:['黒と白','黄と青','赤と白','赤と黒'],a:3,genre:11,d:2,ex:'単相200V回路の電線は赤と黒（どちらも電圧線）を使用します。100V回路は黒（非接地側）と白（接地側）です。',oex:['不正解。黒と白は100V回路の色別です。','不正解。黄と青は使用しません。','不正解。赤と白は200V回路の色別ではありません。','正解。200V回路は赤と黒を使用します。']},{q:'差込形コネクタの使用条件として正しいものはどれか？',o:['1.6mmと2.0mmのVVF電線に使用でき、より線には使用不可','すべての太さの電線に使用できる','屋外でのみ使用できる','より線専用である'],a:0,genre:11,d:2,ex:'差込形コネクタはVVF1.6mmとVVF2.0mmの単線に使用でき、より線（撚り線）には使用できません。',oex:['正解。1.6mmと2.0mmの単線に使用でき、より線には使えません。','不正解。使用できる電線の太さに制限があります。','不正解。屋内でも使用できます。','不正解。より線ではなく単線用です。']},{q:'接地工事の種類で「B種接地工事」が必要な箇所はどれか？',o:['100V機器の外箱','変圧器の二次側（低圧側）の中性点','300V以下の機器の鉄台','300V超の機器の外箱'],a:1,genre:11,d:3,ex:'B種接地工事は変圧器の高圧側と低圧側の混触事故を防ぐため、変圧器の二次側（低圧側）中性点に施します。',oex:['不正解。100V機器の外箱はD種接地です。','正解。B種は変圧器の二次側中性点に施す接地工事です。','不正解。300V以下の鉄台はD種です。','不正解。300V超の外箱はC種です。']},{q:'電気工事で「ジョイントボックス」を設置する目的はどれか？',o:['電線の接続点を保護し点検可能にするため','電力量を計量するため','電線管を曲げるため','電線を固定するため'],a:0,genre:11,d:1,ex:'ジョイントボックスは電線の接続点をボックス内に収め、接続部を保護し将来の点検を可能にするためのものです。',oex:['正解。ジョイントボックスは接続点の保護と点検可能化が目的です。','不正解。計量は電力量計です。','不正解。電線管を曲げるのはベンドです。','不正解。固定はサドル等です。']},{q:'単相3線式200V回路で使用するコンセントの形状はどれか？',o:['接地極付250Vコンセント','3極（3P）コンセント','2極（2P）コンセント','2極接地極付（2P+E）コンセント'],a:0,genre:11,d:2,ex:'単相200V回路には接地極付250Vコンセント（定格250V）を使用します。100V用の125Vコンセントは使えません。',oex:['正解。200V回路には接地極付250Vコンセントを使用します。','不正解。3極コンセントは三相動力用です。','不正解。2極コンセントは100V用です。','不正解。2P+Eは100V用の接地極付きです。']},{q:'低圧屋内配線で「金属管工事」が施工できない場所はどれか？',o:['乾燥した場所','すべての場所で施工可能','湿気の多い場所','コンクリート内の隠蔽配管'],a:1,genre:11,d:2,ex:'金属管工事はほぼすべての場所で施工可能な汎用的な工事方法です。展開場所の制限が少ないのが特徴です。',oex:['不正解。乾燥した場所でも施工できます。','正解。金属管工事はほぼすべての場所で施工可能です。','不正解。湿気の多い場所でも防湿処理をして施工できます。','不正解。コンクリート内でも施工できます。']},{q:'「メガー」（絶縁抵抗計）の使用上の注意事項として正しいものはどれか？',o:['電流値を測定する器具である','測定前に回路を停電させてから測定する','回路に電圧が加わった状態で測定する','接地抵抗を測定する器具である'],a:1,genre:11,d:2,ex:'メガー（絶縁抵抗計）は回路を停電させてから使用します。通電中に使用すると機器や計器が損傷する恐れがあります。',oex:['不正解。電流測定はクランプメーター等です。','正解。絶縁抵抗測定は停電してから行います。','不正解。通電中の測定は危険です。必ず停電させます。','不正解。接地抵抗測定は接地抵抗計です。']},{q:'電気工事における「電線の色別」で、三相3線式の各相を示す色として正しいものはどれか？',o:['赤・黄・緑','黒・茶・灰','赤・白・青','赤・白・黒'],a:2,genre:11,d:2,ex:'三相3線式の電線色別は赤（R相）・白（S相）・青（T相）が標準です。',oex:['不正解。この色分けは使用されません。','不正解。この色分けは日本では使用されません。','正解。三相3線式は赤・白・青です。','不正解。赤・白・黒は単相3線式です。']},{q:'電気工事における「電線管の太さ」の呼び方で、E19の「19」は何を表すか？',o:['管の厚さ19mm','外径19mm','重量19kg','内径19mm'],a:3,genre:11,d:2,ex:'E19のEはねじなし電線管を示し、19は内径が約19mmであることを表します。',oex:['不正解。厚さではありません。','不正解。外径ではなく内径です。','不正解。重量ではありません。','正解。19は内径約19mmを表します。']},{q:'電力P、電圧V、電流Iの関係で正しい式はどれか？（直流回路の場合）',o:['P=V+I','P=V×I','P=I/V','P=V/I'],a:1,genre:11,d:1,ex:'直流回路の電力はP=V×I（電圧×電流）で求められます。単位はW（ワット）です。',oex:['不正解。V+Iは電力の計算ではありません。','正解。P=V×Iで電力を求めます。','不正解。I/Vは抵抗の逆数（コンダクタンス）です。','不正解。V/Iは抵抗R（オームの法則）です。']},{q:'「クランプメーター」で測定できるものはどれか？',o:['接地抵抗を測定できる','絶縁抵抗を測定できる','電線を切断せずに電流を測定できる','電圧のみ測定できる'],a:2,genre:11,d:1,ex:'クランプメーターは電線を挟むだけで（切断せずに）電流を測定できる計測器です。',oex:['不正解。接地抵抗は接地抵抗計で測定します。','不正解。絶縁抵抗はメガーで測定します。','正解。クランプメーターは電線を切断せずに電流を測定できます。','不正解。電流の測定が主目的です（電圧測定機能付もあります）。']},{q:'ケーブル工事の施工で、VVFケーブルの曲げ半径の最小値はどれか？',o:['ケーブル外径の10倍以上','制限なし','ケーブル外径の6倍以上','ケーブル外径の3倍以上'],a:2,genre:11,d:2,ex:'VVFケーブルの曲げ半径は仕上がり外径の6倍以上とする必要があります。',oex:['不正解。10倍は高圧ケーブルの基準に近い値です。','不正解。曲げ半径には制限があります。','正解。VVFケーブルの曲げ半径は外径の6倍以上です。','不正解。3倍は小さすぎます。6倍以上が基準です。']},{q:'電気の「交流」と「直流」の違いとして正しいものはどれか？',o:['交流は低い電圧で直流は高い電圧','交流と直流に違いはない','交流は電流の向きと大きさが周期的に変化し、直流は一方向に流れる','交流は常に一定で直流は変化する'],a:2,genre:11,d:1,ex:'交流（AC）は電流の向きと大きさが周期的に変化する電流で、直流（DC）は常に一定方向に流れる電流です。',oex:['不正解。電圧の高低とは関係ありません。','不正解。明確な違いがあります。','正解。交流は周期的に変化し、直流は一方向に流れます。','不正解。逆です。']},{q:'電気工事士法で「軽微な工事」として第二種電気工事士の資格が不要な作業はどれか？',o:['配線の新設','ブレーカーの交換','コンセントの増設','電球やヒューズの交換'],a:3,genre:11,d:2,ex:'電球やヒューズの交換は「軽微な工事」として電気工事士の資格がなくても行えます。',oex:['不正解。配線の新設には資格が必要です。','不正解。ブレーカーの交換には資格が必要です。','不正解。コンセントの増設には資格が必要です。','正解。電球やヒューズの交換は資格不要の軽微な工事です。']},{q:'鉄筋コンクリート構造の「あばら筋（スターラップ）」の役割はどれか？',o:['柱の軸力を負担する','梁のせん断力に抵抗し、主筋を拘束する','床スラブの荷重を支える','基礎を安定させる'],a:1,genre:9,d:2,ex:'あばら筋は梁の主筋を囲むように配置し、せん断力に抵抗するとともに主筋の座屈を防止します。',oex:['不正解。柱の軸力負担は柱主筋の役割です。','正解。あばら筋は梁のせん断補強と主筋の拘束が役割です。','不正解。床荷重は梁が支えます。','不正解。基礎安定は別の構造要素です。']},{q:'コンクリートの「レイタンス」とは何か？',o:['コンクリートの養生材','コンクリートの強度試験器具','コンクリートの表面に浮き出る脆弱な薄い層','コンクリートの着色剤'],a:2,genre:9,d:2,ex:'レイタンスはブリーディング水とともに浮き上がったセメントや骨材の微粒子による脆弱な層で、打継ぎ前に除去が必要です。',oex:['不正解。養生材ではありません。','不正解。試験器具ではありません。','正解。レイタンスは表面に浮き出る脆弱な層です。','不正解。着色剤ではありません。']},{q:'鉄骨工事における「ダイアフラム」の役割はどれか？',o:['鉄骨の防錆処理','柱と梁の接合部で応力を伝達するための板','鉄骨を運搬する金具','溶接の予熱装置'],a:1,genre:9,d:3,ex:'ダイアフラムは柱梁接合部に設置する鋼板で、梁フランジからの応力を柱に確実に伝達する重要な部材です。',oex:['不正解。防錆処理は塗装です。','正解。ダイアフラムは柱梁接合部の応力伝達板です。','不正解。運搬金具ではありません。','不正解。予熱装置ではありません。']},{q:'防水工事で「プライマー」を塗布する目的はどれか？',o:['防水層の色を変える','下地と防水材の接着性を向上させる','防水層の厚さを増す','防水層の柔軟性を高める'],a:1,genre:9,d:1,ex:'プライマーは防水工事の最初に下地に塗布し、防水材と下地の接着性を向上させるための下塗り材です。',oex:['不正解。色を変える目的ではありません。','正解。プライマーは下地と防水材の接着性向上が目的です。','不正解。厚さ増加は目的ではありません。','不正解。柔軟性は防水材自体の性質です。']},{q:'建築工事の「地業工事」に含まれないものはどれか？',o:['捨てコンクリート','外壁塗装','割ぐり石地業','砂利地業'],a:1,genre:9,d:1,ex:'地業工事は基礎の下の地盤を整備する工事で、割ぐり石、砂利、捨てコンクリート等が含まれます。外壁塗装は仕上げ工事です。',oex:['不正解。捨てコンクリートは地業工事です。','正解。外壁塗装は仕上げ工事であり地業には含まれません。','不正解。割ぐり石地業は地業工事です。','不正解。砂利地業は地業工事です。']},{q:'型枠工事で「フォームタイ」の役割はどれか？',o:['コンクリートを流し込む管','せき板を外側から締め付けて固定する金具','型枠のスペーサー','コンクリートの養生シート'],a:1,genre:9,d:2,ex:'フォームタイはセパレータとともに使用し、せき板（型枠面材）を外側から締め付けて所定の間隔で固定する金具です。',oex:['不正解。コンクリートを流し込むのはシュートやポンプ管です。','正解。フォームタイはせき板を締め付けて固定する金具です。','不正解。スペーサーは鉄筋のかぶり確保用です。','不正解。養生シートとは異なります。']},{q:'鉄筋の「機械式継手」のメリットはどれか？',o:['資格が不要である','鉄筋の径に制限がない','最も安価な継手方法である','天候に左右されにくく品質が安定しやすい'],a:3,genre:9,d:2,ex:'機械式継手はカプラー等で鉄筋を接合する方法で、天候に左右されにくく品質が安定しやすいのがメリットです。',oex:['不正解。施工には技能者の資格が必要です。','不正解。径の範囲に制限があります。','不正解。重ね継手より高価な場合が多いです。','正解。天候に左右されにくく品質が安定しやすいです。']},{q:'「ALC版」の厚さで、外壁用として一般的なものはどれか？',o:['50mm','75mm','100mm','150mm'],a:2,genre:9,d:2,ex:'ALC外壁パネルの厚さは100mmまたは125mmが一般的です。間仕切壁用は75mm程度です。',oex:['不正解。50mmは薄すぎます。','不正解。75mmは間仕切壁用です。','正解。外壁用ALCは100mmが一般的です。','不正解。150mmは特殊用途向けです。']},{q:'コンクリートの「打継ぎ面」の処理方法として正しいものはどれか？',o:['油を塗ってから打設する','打継ぎ面を乾燥させてから打設する','何もせずにそのまま次のコンクリートを打設する','レイタンスを除去し、十分に散水湿潤してから打設する'],a:3,genre:9,d:2,ex:'打継ぎ面はレイタンスや脆弱部を除去し、十分に散水して湿潤させてから新しいコンクリートを打設します。',oex:['不正解。油を塗ると接着不良になります。','不正解。乾燥は接着不良の原因です。','不正解。何もしないと一体化不良になります。','正解。レイタンス除去と散水湿潤が必要です。']},{q:'鉄骨の「超音波探傷試験」の目的はどれか？',o:['鉄骨の色を検査する','溶接部の内部欠陥を検出する','鉄骨の重量を測定する','鉄骨の温度を測定する'],a:1,genre:9,d:2,ex:'超音波探傷試験（UT）は溶接部に超音波を当て、内部の欠陥（割れ、融合不良等）を検出する非破壊検査です。',oex:['不正解。色の検査ではありません。','正解。溶接部の内部欠陥を検出する非破壊検査です。','不正解。重量測定ではありません。','不正解。温度測定ではありません。']},{q:'RC造の「スラブ」とは何か？',o:['鉄筋コンクリートの床板','柱の部分','壁の部分','梁の部分'],a:0,genre:9,d:1,ex:'スラブは鉄筋コンクリート造の床板（床版）のことで、上部の荷重を梁に伝達する面状の構造体です。',oex:['正解。スラブは鉄筋コンクリートの床板です。','不正解。柱はコラムです。','不正解。壁はウォールです。','不正解。梁はビームです。']},{q:'シーリング工事の「3面接着」が避けるべき理由はどれか？',o:['施工が簡単すぎるため','色の選択が限られるため','材料費が増加するため','シーリング材の伸縮が拘束され破断しやすくなるため'],a:3,genre:9,d:3,ex:'3面接着はシーリング材の底面も接着されるため、目地の動きに追従できず早期に破断します。2面接着が原則です。',oex:['不正解。施工の難易度は理由ではありません。','不正解。色とは無関係です。','不正解。材料費は主な理由ではありません。','正解。3面接着は伸縮が拘束され破断しやすくなります。']},{q:'木造建築における「通し柱」と「管柱」の違いはどれか？',o:['通し柱は1階のみ、管柱は2階のみ','通し柱は土台から軒桁まで1本で通す柱、管柱は各階ごとの柱','通し柱は太く管柱は細い（径の違いのみ）','両者に違いはない'],a:1,genre:9,d:2,ex:'通し柱は1階の土台から2階の軒桁（小屋梁）まで1本で通す柱で、管柱は各階ごとに配置される柱です。',oex:['不正解。どちらも各階に存在します。','正解。通し柱は全階通し、管柱は各階ごとの柱です。','不正解。径の違いだけではなく構造が異なります。','不正解。明確な違いがあります。']},{q:'外壁の「複層仕上塗材（吹付けタイル）」の仕上げパターンで「ゆず肌」とはどれか？',o:['平滑な仕上げ','柚子の皮のような細かな凹凸模様','大きな凹凸模様','縞模様'],a:1,genre:9,d:1,ex:'ゆず肌は柚子の皮のように細かく均一な凹凸のテクスチャで、吹付けタイルの代表的な仕上げパターンです。',oex:['不正解。平滑ではなく凹凸のある仕上げです。','正解。ゆず肌は柚子の皮のような細かな凹凸模様です。','不正解。大きな凹凸はヘッドカット等の模様です。','不正解。縞模様ではありません。']},{q:'鉄筋の「フープ筋」はどの部材に使用される帯筋か？',o:['梁','柱','床スラブ','基礎'],a:1,genre:9,d:2,ex:'フープ筋は柱に使用される帯筋で、柱主筋を囲むように配置してせん断補強と主筋の座屈防止を行います。梁の帯筋はスターラップです。',oex:['不正解。梁の帯筋はスターラップ（あばら筋）です。','正解。フープ筋は柱に使用される帯筋です。','不正解。床スラブには配力筋が使われます。','不正解。基礎にはベース筋等が使われます。']},{q:'建築物の「不燃材料」として認められないものはどれか？',o:['コンクリート','ガラス','木材（無処理）','アルミニウム'],a:2,genre:9,d:1,ex:'不燃材料にはコンクリート、ガラス、金属板、石材等があります。無処理の木材は可燃材料で不燃材料には該当しません。',oex:['不正解。コンクリートは不燃材料です。','不正解。ガラスは不燃材料です。','正解。無処理の木材は可燃材料で不燃材料ではありません。','不正解。アルミニウムは不燃材料です。']},{q:'給水管の「水圧試験」で加圧後の保持時間として一般的なものはどれか？',o:['1分間','30秒','10分間','5分間'],a:0,genre:10,d:2,ex:'給水装置の水圧試験では、所定の圧力（1.75MPa等）まで加圧し、1分間保持して圧力低下がないことを確認します。',oex:['正解。1分間の保持が一般的です。','不正解。30秒では短すぎます。1分間が一般的です。','不正解。10分間は長すぎます。','不正解。5分間は長すぎます。']},{q:'給水管の「サドル付分水栓」による分岐で使用する穿孔機の名称はどれか？',o:['ボール盤','ドリルプレス','穿孔機（せんこうき）','グラインダー'],a:2,genre:10,d:1,ex:'サドル付分水栓からの分岐工事では、専用の穿孔機で配水管に穴を開けます。',oex:['不正解。ボール盤は工場用機械です。','不正解。ドリルプレスではありません。','正解。穿孔機（せんこうき）で配水管に穴を開けます。','不正解。グラインダーは切断・研磨用です。']},{q:'給水管の「管種記号」で「SGP-VB」が示す管はどれか？',o:['硬質塩化ビニルライニング鋼管','ポリエチレン粉体ライニング鋼管','耐熱性硬質塩化ビニルライニング鋼管','ステンレス鋼管'],a:0,genre:10,d:3,ex:'SGP-VBは配管用炭素鋼鋼管に硬質塩化ビニルをライニングした管で、給水・給湯配管に使用されます。',oex:['正解。SGP-VBは硬質塩化ビニルライニング鋼管です。','不正解。ポリエチレン粉体ライニングはSGP-PAです。','不正解。耐熱性ライニングはSGP-HVAです。','不正解。ステンレス鋼管はSUSです。']},{q:'配水管から給水管を分岐する際の最大口径の制限として一般的なものはどれか？',o:['配水管の口径と同径まで','配水管の口径の1/2まで','配水管の口径より2口径以上小さい径','制限なし'],a:2,genre:10,d:3,ex:'分岐する給水管の口径は配水管の口径より2口径（2サイズ）以上小さい径とするのが一般的です。',oex:['不正解。同径での分岐は認められません。','不正解。1/2以下の制限は一般的ではありません。','正解。配水管より2口径以上小さい径が一般的な制限です。','不正解。口径制限はあります。']},{q:'「水道用硬質塩化ビニル管（VP管）」の接合方法はどれか？',o:['TS接合（接着接合）','ねじ込み接合','フランジ接合','溶接接合'],a:0,genre:10,d:1,ex:'VP管はTS接合（Tapered Socket：テーパー受口の接着接合）で接合します。接着剤を塗布して差し込みます。',oex:['正解。VP管はTS接合（接着接合）で接合します。','不正解。ねじ込みは鋼管の接合です。','不正解。フランジ接合は大口径管に使います。','不正解。VP管に溶接は使いません。']},{q:'給水装置における「バキュームブレーカ」の設置目的はどれか？',o:['水質を浄化するため','流量を調整するため','水圧を上げるため','逆サイホン作用による逆流を防止するため'],a:3,genre:10,d:2,ex:'バキュームブレーカは管内が負圧になった際に空気を吸入し、逆サイホン作用による逆流を防止する装置です。',oex:['不正解。浄化装置ではありません。','不正解。流量調整装置ではありません。','不正解。水圧を上げる装置ではありません。','正解。逆サイホン作用による逆流防止が目的です。']},{q:'水道の「配水管」と「給水管」の管理区分の境界はどれか？',o:['配水管からの分岐部（分水栓）','水道メーターの位置','受水槽','建物の入口'],a:0,genre:10,d:2,ex:'配水管から分岐する箇所（分水栓）が水道事業者の管理する配水管と需要者の管理する給水装置の境界です。',oex:['正解。分岐部（分水栓）が管理区分の境界です。','不正解。メーターは給水装置内にあり境界ではありません。','不正解。受水槽は別の管理区分です。','不正解。建物入口は管理境界ではありません。']},{q:'給水管の管種選定で「耐震性」に最も優れるものはどれか？',o:['ポリエチレン管','銅管','硬質塩化ビニル管（VP）','鋳鉄管'],a:0,genre:10,d:2,ex:'ポリエチレン管は可とう性に優れ地盤変動に追従しやすいため、耐震性に最も優れた管種です。',oex:['正解。ポリエチレン管は可とう性があり耐震性に優れます。','不正解。銅管は柔軟ですがポリエチレンほどではありません。','不正解。VP管は剛性が高く地震で折れやすいです。','不正解。鋳鉄管は重く剛性が高いです。']},{q:'給水装置の「ストレーナー」の役途はどれか？',o:['水圧を調整する','管内の異物やゴミを除去する','水温を調節する','管の振動を防止する'],a:1,genre:10,d:1,ex:'ストレーナーは網目状のフィルターで、管内を流れる水中の異物やゴミを捕集・除去する装置です。',oex:['不正解。水圧調整は減圧弁の役割です。','正解。ストレーナーは異物やゴミの除去が目的です。','不正解。水温調節はストレーナーの機能ではありません。','不正解。振動防止は防振継手の役割です。']},{q:'受水槽の「オーバーフロー管」の排水先として適切なものはどれか？',o:['汚水管に直結する','間接排水とする（排水口空間を設ける）','雨水管に直結する','そのまま地面に流す'],a:1,genre:10,d:2,ex:'オーバーフロー管は逆流防止のため間接排水（排水口空間を設けて排水）とします。汚水管への直結は禁止です。',oex:['不正解。汚水管への直結は逆流の危険があり禁止です。','正解。オーバーフロー管は間接排水とします。','不正解。雨水管への直結も不適切です。','不正解。地面への放流は適切ではありません。']},{q:'給水管の「電食（電気腐食）」が発生する原因はどれか？',o:['水温が高すぎるため','異種金属が接触し電位差による腐食電流が流れるため','水圧が高すぎるため','管径が小さすぎるため'],a:1,genre:10,d:3,ex:'電食は異種金属（銅管と鋼管等）が接触した際に電位差で腐食電流が流れ、卑な金属が腐食する現象です。',oex:['不正解。水温は電食の直接原因ではありません。','正解。異種金属接触による電位差が電食の原因です。','不正解。水圧は電食とは無関係です。','不正解。管径は電食とは無関係です。']},{q:'水道法で定める「水道の布設工事」に該当しないものはどれか？',o:['配水管の新設','浄水場の建設','給水管の修繕','取水施設の新設'],a:2,genre:10,d:2,ex:'水道の布設工事は水道施設（取水・浄水・配水等）の新設・増設です。給水管の修繕は給水装置工事であり布設工事ではありません。',oex:['不正解。配水管の新設は布設工事です。','不正解。浄水場の建設は布設工事です。','正解。給水管の修繕は給水装置工事であり布設工事ではありません。','不正解。取水施設の新設は布設工事です。']},{q:'「ウォーターハンマー」（水撃作用）の発生原因として最も一般的なものはどれか？',o:['地震による管の振動','管の材質不良','弁や水栓の急閉止','管径が大きすぎる'],a:2,genre:10,d:1,ex:'ウォーターハンマーは弁や水栓を急に閉じた時に管内の水の運動エネルギーが圧力波となり衝撃音を発生する現象です。',oex:['不正解。地震は直接の原因ではありません。','不正解。材質不良は原因ではありません。','正解。弁や水栓の急閉止がウォーターハンマーの主な原因です。','不正解。管径は直接の原因ではありません。']},{q:'配線用遮断器（MCCB）の「過電流引き外し」方式で一般的なものはどれか？',o:['手動引き外し','熱動-電磁式','重力式','水圧式'],a:1,genre:11,d:2,ex:'配線用遮断器は小電流の過負荷には熱動（バイメタル）、短絡電流には電磁（ソレノイド）で引き外す熱動-電磁式が一般的です。',oex:['不正解。手動は人が操作する方式で自動保護ではありません。','正解。熱動-電磁式が一般的な過電流引き外し方式です。','不正解。重力式は遮断器には使いません。','不正解。水圧式は遮断器には使いません。']},{q:'「単相3線式」配電方式の利点として正しいものはどれか？',o:['配線が最も簡単','100Vと200Vの両方を取り出せ、電力損失が少ない','三相の動力機器が使える','電圧が安定しない'],a:1,genre:11,d:2,ex:'単相3線式は中性線を基準に100Vと200Vを同時に使用でき、単相2線式と比べ電力損失が少ないのが利点です。',oex:['不正解。配線は単相2線式より複雑です。','正解。100V/200Vが使え電力損失も少ないです。','不正解。三相動力は三相3線式です。','不正解。むしろ電圧は安定します。']},{q:'電気工事の「がいし引き工事」が施工できる場所の制限はどれか？',o:['すべての場所で施工可能','展開した場所（見える場所）のみ施工可能','湿気の多い場所のみ施工可能','地下室のみ施工可能'],a:1,genre:11,d:2,ex:'がいし引き工事は電線が露出するため、展開した場所（点検できる見える場所）でのみ施工が認められます。',oex:['不正解。すべての場所ではなく展開した場所のみです。','正解。がいし引き工事は展開した場所でのみ施工可能です。','不正解。湿気の多い場所に限定されません。','不正解。地下室に限定されません。']},{q:'低圧の電路で「対地電圧」が150Vを超える場合の絶縁抵抗値の基準はどれか？（300V以下）',o:['0.1MΩ以上','0.2MΩ以上','0.4MΩ以上','1.0MΩ以上'],a:1,genre:11,d:3,ex:'300V以下で対地電圧150V超の電路（単相3線式200V回路等）の絶縁抵抗は0.2MΩ以上が必要です。',oex:['不正解。0.1MΩは対地電圧150V以下の基準です。','正解。対地電圧150V超300V以下は0.2MΩ以上です。','不正解。0.4MΩは300V超の基準です。','不正解。1.0MΩは基準より厳しい値です。']},{q:'電気の「力率」を改善するために使用される機器はどれか？',o:['変圧器','進相コンデンサ','遮断器','電力量計'],a:1,genre:11,d:2,ex:'進相コンデンサは遅れ力率の回路に設置し、無効電力を補償して力率を改善する機器です。',oex:['不正解。変圧器は電圧を変換する機器です。','正解。進相コンデンサは力率改善に使用します。','不正解。遮断器は過電流保護用です。','不正解。電力量計は電力量の計量器です。']},{q:'電線の接続方法で「圧着接続」と「ねじ止め接続」の違いはどれか？',o:['圧着は仮接続、ねじ止めは本接続','圧着はリングスリーブ等で永久接続、ねじ止めは端子台等で接続','圧着は屋外専用','ねじ止めは禁止されている'],a:1,genre:11,d:1,ex:'圧着接続はリングスリーブや圧着端子で電線を永久的に接続し、ねじ止め接続は端子台やブレーカー等での接続方法です。',oex:['不正解。圧着は永久接続であり仮接続ではありません。','正解。圧着はリングスリーブ等、ねじ止めは端子台等での接続です。','不正解。圧着は屋内でも使用します。','不正解。ねじ止めは正規の接続方法です。']},{q:'「IV線」の特徴として正しいものはどれか？',o:['ビニル絶縁電線で、管内配線に使用される単線','シースで覆われたケーブル','裸電線の一種','光ファイバーケーブル'],a:0,genre:11,d:1,ex:'IV線（600Vビニル絶縁電線）はビニル被覆の単線で、主に金属管や合成樹脂管内の配線に使用されます。',oex:['正解。IV線はビニル絶縁電線で管内配線に使います。','不正解。シース（外装）はないので、ケーブルではなく電線です。','不正解。裸電線ではなくビニル絶縁されています。','不正解。光ファイバーではありません。']},{q:'「検電器」の使用目的はどれか？',o:['電線の太さを測定する','電路の充電の有無を確認する','電力量を計量する','絶縁抵抗を測定する'],a:1,genre:11,d:1,ex:'検電器は電路に電圧がかかっているか（充電しているか）を確認するための器具で、作業前の安全確認に使用します。',oex:['不正解。電線の太さ測定はノギスやマイクロメーターです。','正解。検電器は電路の充電有無を確認します。','不正解。電力量計量は電力量計です。','不正解。絶縁抵抗測定はメガーです。']},{q:'電気設備技術基準で「低圧」の定義として正しいものはどれか？',o:['直流600V以下、交流300V以下','直流750V以下、交流600V以下','直流1000V以下、交流750V以下','直流600V以下、交流600V以下'],a:1,genre:11,d:2,ex:'電気設備技術基準では低圧は直流750V以下、交流600V以下と定義されています。',oex:['不正解。直流600V以下ではなく750V以下です。','正解。低圧は直流750V以下、交流600V以下です。','不正解。直流1000V以下は高圧の上限に近い値です。','不正解。直流は750V以下です。']},{q:'三相誘導電動機（モーター）の回転方向を逆転させる方法はどれか？',o:['電源電圧を変える','3本の電源線のうち2本を入れ替える','負荷を軽くする','冷却ファンを逆にする'],a:1,genre:11,d:2,ex:'三相誘導電動機の回転方向を逆転させるには、3本の電源線のうち任意の2本を入れ替えます。',oex:['不正解。電圧を変えても回転方向は変わりません。','正解。電源線の2本を入れ替えると逆転します。','不正解。負荷は回転方向に影響しません。','不正解。冷却ファンでは回転方向は変わりません。']},{q:'「PF管」と「CD管」の違いとして正しいものはどれか？',o:['PF管は自己消火性があり、CD管はない','CD管は自己消火性があり、PF管はない','両者は同じもの','PF管は金属製、CD管は樹脂製'],a:0,genre:11,d:2,ex:'PF管は自己消火性がある合成樹脂管で、CD管（オレンジ色）は自己消火性がなくコンクリート埋設専用です。',oex:['正解。PF管は自己消火性あり、CD管はなし（コンクリート埋設専用）です。','不正解。逆です。PF管が自己消火性ありです。','不正解。異なる管です。','不正解。どちらも合成樹脂製です。']},{q:'住宅の分電盤に設置される「主幹漏電遮断器」の一般的な定格電流はどれか？',o:['15A','30A','50A〜60A','100A'],a:2,genre:11,d:2,ex:'住宅の分電盤の主幹漏電遮断器は、契約容量に応じて50A〜60Aが一般的です。',oex:['不正解。15Aは分岐回路のブレーカーです。','不正解。30Aは小規模住宅の場合です。一般的には50〜60Aです。','正解。住宅の主幹は50A〜60Aが一般的です。','不正解。100Aは大きな住宅や業務用です。']},{q:'コンクリートの練混ぜから打込み終了までの時間制限（外気温25℃以上の場合）はどれか？',o:['60分以内','120分以内','90分以内','180分以内'],a:2,genre:9,d:2,ex:'外気温25℃以上ではコンクリートの練混ぜから打込み終了まで90分以内です。25℃未満は120分以内です。',oex:['不正解。60分は厳しすぎます。90分以内です。','不正解。120分は25℃未満の場合です。','正解。25℃以上は90分以内です。','不正解。180分は長すぎます。']},{q:'高力ボルトの「1次締め」「マーキング」「本締め」の正しい施工順序はどれか？',o:['本締め→マーキング→1次締め','1次締め→マーキング→本締め','マーキング→1次締め→本締め','1次締め→本締め→マーキング'],a:1,genre:9,d:2,ex:'高力ボルトは1次締め→マーキング→本締めの順で施工します。マーキングで本締めの回転量を確認します。',oex:['不正解。本締めは最後です。','正解。1次締め→マーキング→本締めの順です。','不正解。1次締めの後にマーキングします。','不正解。マーキングは本締め前に行います。']},{q:'鉄筋の「あき」の最小値として正しいものはどれか？',o:['鉄筋径の1.0倍以上','鉄筋径の2.0倍以上','鉄筋径の1.5倍以上かつ粗骨材最大寸法の1.25倍以上かつ25mm以上','10mm以上'],a:2,genre:9,d:3,ex:'鉄筋のあきは鉄筋径の1.5倍、粗骨材最大寸法の1.25倍、25mmのうち最大値以上必要です。',oex:['不正解。1.0倍では不足です。','不正解。2.0倍は基準ではありません。','正解。1.5倍・1.25倍・25mmの最大値以上が必要です。','不正解。10mmでは不十分です。']},{q:'防水工事における「立上り防水」の高さの最低基準はどれか？',o:['100mm以上','500mm以上','300mm以上','200mm以上'],a:2,genre:9,d:2,ex:'屋上防水の立上り部は防水面から300mm以上の高さまで防水層を施工します。',oex:['不正解。100mmでは低すぎます。','不正解。500mmは基準より高いですが、最低は300mmです。','正解。立上り防水は300mm以上の高さが必要です。','不正解。200mmでは不十分です。300mm以上必要です。']},{q:'コンクリートの「スランプフロー」試験はどのような場合に用いるか？',o:['コンクリートの温度を測定する場合','高流動コンクリートの流動性を測定する場合','普通コンクリートの試験','硬化コンクリートの強度を測定する場合'],a:1,genre:9,d:2,ex:'スランプフロー試験は高流動コンクリートなどスランプ21cm以上の軟らかいコンクリートの流動性を測定します。',oex:['不正解。温度測定は温度計です。','正解。高流動コンクリートの流動性測定に使います。','不正解。普通コンクリートはスランプ試験です。','不正解。硬化後の強度は圧縮試験です。']},{q:'コンクリートの打込みにおける「バイブレータ」の挿入間隔として適切なものはどれか？',o:['10cm以下','50cm以下','30cm以下','100cm以下'],a:1,genre:9,d:2,ex:'内部振動機（バイブレータ）の挿入間隔は50cm以下とし、下層に10cm程度挿入して均一に締め固めます。',oex:['不正解。10cmは狭すぎます。50cm以下が基準です。','正解。バイブレータの挿入間隔は50cm以下です。','不正解。30cmは推奨の範囲内ですが基準は50cm以下です。','不正解。100cmでは間隔が広すぎます。']},{q:'鉄骨工事における「開先加工」の方法で最も精度が高いものはどれか？',o:['機械加工（フライス盤等）','ガス切断','レーザー切断','グラインダー仕上げ'],a:0,genre:9,d:3,ex:'開先加工は機械加工（フライス盤やベベルマシン等）が最も精度が高く、溶接品質に直結する重要な工程です。',oex:['正解。機械加工が最も精度の高い開先加工方法です。','不正解。ガス切断は精度が低いです。','不正解。レーザーは薄板向きです。','不正解。グラインダーは仕上げ用で精度は機械加工に劣ります。']},{q:'建築基準法で「準耐火建築物」に要求される主要構造部の準耐火性能の時間はどれか？',o:['30分','15分','45分（または1時間）','2時間'],a:2,genre:9,d:3,ex:'準耐火建築物の主要構造部は45分準耐火構造（ロ準耐1号）または1時間準耐火構造（イ準耐）が求められます。',oex:['不正解。30分は準耐火の基準ではありません。','不正解。15分は防火構造の基準です。','正解。45分または1時間の準耐火性能が必要です。','不正解。2時間は耐火建築物の基準です。']},{q:'鉄筋工事における「結束線」の役割はどれか？',o:['電気配線を固定する線','鉄筋を切断するための線','コンクリートのひび割れを防止する線','鉄筋同士の交差部を固定するための焼きなまし鉄線'],a:3,genre:9,d:1,ex:'結束線（番線）は焼きなまし鉄線（#21程度）で、鉄筋の交差部をハッカーで結束して固定するために使用します。',oex:['不正解。電気配線の固定ではありません。','不正解。切断はカッターで行います。','不正解。ひび割れ防止は鉄筋自体の役割です。','正解。結束線は鉄筋の交差部を固定する焼きなまし鉄線です。']},{q:'建築工事で「根伐り」とも呼ばれる工事はどれか？',o:['地盤改良工事','根切り（掘削）工事','基礎配筋工事','杭工事'],a:1,genre:9,d:1,ex:'根伐り（ねぎり）は根切りとも呼ばれ、建物の基礎を施工するために地面を掘削する工事です。',oex:['不正解。地盤改良は別の工事です。','正解。根伐り＝根切り（掘削）工事です。','不正解。基礎配筋は掘削後の工程です。','不正解。杭工事は別の工事です。']},{q:'外壁タイル張りの「引張接着強度試験」の合格基準値はどれか？',o:['0.2N/mm²以上','0.6N/mm²以上','0.4N/mm²以上','1.0N/mm²以上'],a:2,genre:9,d:3,ex:'外壁タイル張りの引張接着強度は0.4N/mm²以上が合格基準です。それ未満は剥落の危険があります。',oex:['不正解。0.2N/mm²では強度不足です。','不正解。0.6N/mm²は基準より大きいです。','正解。引張接着強度は0.4N/mm²以上が基準です。','不正解。1.0N/mm²は過大な基準です。']},{q:'コンクリートの「フレッシュコンクリート」とはどの状態のコンクリートか？',o:['解体したコンクリート','1週間養生後のコンクリート','硬化したコンクリート','まだ固まっていない（練混ぜ直後の）コンクリート'],a:3,genre:9,d:1,ex:'フレッシュコンクリートは練混ぜ直後のまだ固まっていない（硬化前の）コンクリートのことです。',oex:['不正解。解体したのはコンクリート塊です。','不正解。養生後は硬化コンクリートです。','不正解。硬化コンクリートは硬化後の状態です。','正解。フレッシュコンクリートはまだ固まっていない状態です。']},{q:'給水管の埋設位置を示す「埋設表示テープ」の色として一般的なものはどれか？',o:['青色','黄色','緑色','赤色'],a:0,genre:10,d:1,ex:'給水管（水道管）の埋設表示テープは青色が一般的です。ガスは黄色、電気は赤色です。',oex:['正解。水道管の埋設表示テープは青色です。','不正解。黄色はガス管の表示色です。','不正解。緑色は一般的ではありません。','不正解。赤色は電気ケーブルの表示色です。']},{q:'水道水の「残留塩素」が検出されなくなる原因として最も可能性が高いものはどれか？',o:['受水槽の滞留時間が長すぎる、または管末部で消費された','メーターが故障している','水道管の材質が変わった','水道水の温度が低い'],a:0,genre:10,d:2,ex:'残留塩素は時間経過や有機物との反応で消費されます。受水槽での滞留が長い場合や管末部では検出されないことがあります。',oex:['正解。滞留時間や管末での消費が原因です。','不正解。メーター故障は無関係です。','不正解。管材質は残留塩素の直接原因ではありません。','不正解。温度低下は残留塩素の消失原因ではありません。']},{q:'「サヤ管ヘッダー工法」の特徴として正しいものはどれか？',o:['接合箇所が多くなる','従来工法より配管量が少ない','ヘッダーから各器具にそれぞれ1本ずつ配管し、将来の管の更新が容易','配管がすべて鋼管である'],a:2,genre:10,d:2,ex:'サヤ管ヘッダー工法はヘッダーから各器具に1本ずつ配管するため接合箇所が少なく、サヤ管内の管更新が容易です。',oex:['不正解。接合箇所はヘッダー部のみで少ないです。','不正解。配管量はむしろ多くなります。','正解。ヘッダーから個別配管し、管の更新が容易です。','不正解。樹脂管（架橋ポリエチレン等）を使用します。']},{q:'給水装置の「逆流」が発生する原因として正しいものはどれか？',o:['水圧が高すぎる場合','水温が高い場合','断水等により給水管内が負圧になる場合（逆サイホン作用）','管径が大きすぎる場合'],a:2,genre:10,d:2,ex:'逆流は断水・大量使用等で管内が負圧になった際に、逆サイホン作用で汚水が管内に吸引される現象です。',oex:['不正解。水圧が高い場合は逆流しません。','不正解。水温は逆流とは無関係です。','正解。管内の負圧による逆サイホン作用が逆流の原因です。','不正解。管径は逆流の直接原因ではありません。']},{q:'水道法で定められた「水道技術管理者」の設置が義務付けられるのはどのような事業者か？',o:['飲食店のみ','給水装置工事事業者のみ','水道事業者および水道用水供給事業者','すべての建設業者'],a:2,genre:10,d:2,ex:'水道技術管理者は水道事業者と水道用水供給事業者に設置が義務付けられている技術的な責任者です。',oex:['不正解。飲食店に限りません。','不正解。給水装置工事事業者ではなく水道事業者です。','正解。水道事業者と水道用水供給事業者に設置義務があります。','不正解。すべての建設業者ではありません。']},{q:'架橋ポリエチレン管の接合に使用される「電気融着（EF）継手」の特徴はどれか？',o:['ろう付けで接合する','継手内部のヒーター線に通電して管と継手を融着する','接着剤で接合する','ボルトで締め付ける'],a:1,genre:10,d:3,ex:'EF継手は内部に埋め込まれたヒーター線（電熱線）に通電し、管と継手の樹脂を溶かして一体化する融着工法です。',oex:['不正解。ろう付けは銅管の接合です。','正解。EF継手はヒーター線への通電で融着します。','不正解。接着剤は塩ビ管のTS接合です。','不正解。ボルト締めはメカニカル継手です。']},{q:'給水装置の「性能基準」で求められる7項目に含まれないものはどれか？',o:['水撃限界性能','美観性能','浸出性能','耐圧性能'],a:1,genre:10,d:3,ex:'給水装置の性能基準は耐圧・浸出・水撃限界・逆流防止・耐久・耐寒・負圧破壊の7項目で、「美観」は含まれません。',oex:['不正解。水撃限界性能は7項目に含まれます。','正解。美観性能は性能基準の7項目には含まれません。','不正解。浸出性能は7項目に含まれます。','不正解。耐圧性能は7項目に含まれます。']},{q:'水道の「浄水処理」で使用される「凝集剤」の主な種類はどれか？',o:['次亜塩素酸ナトリウム','フッ化ナトリウム','活性炭','ポリ塩化アルミニウム（PAC）'],a:3,genre:10,d:2,ex:'凝集剤にはポリ塩化アルミニウム（PAC）や硫酸アルミニウムが使用され、濁りの原因物質を凝集させて除去します。',oex:['不正解。次亜塩素酸ナトリウムは消毒剤です。','不正解。フッ化ナトリウムは水道には使用しません。','不正解。活性炭は吸着処理に使用します。','正解。PAC（ポリ塩化アルミニウム）が代表的な凝集剤です。']},{q:'配水管の「洗管作業」の目的はどれか？',o:['管の材質を変更する','管の口径を変更する','管内に堆積した錆やスケールを除去して水質を改善する','管を延長する'],a:2,genre:10,d:1,ex:'洗管作業は配水管内に堆積した錆、マンガン、スケール等を除去し、水質（濁り・赤水等）を改善する作業です。',oex:['不正解。材質変更は管更新工事です。','不正解。口径変更は洗管の目的ではありません。','正解。洗管は管内の堆積物除去と水質改善が目的です。','不正解。管延長は布設工事です。']},{q:'給水管の「防食」対策として、ポリエチレンスリーブを使用する目的はどれか？',o:['管の色を変える','埋設管を土壌腐食から保護する','管の強度を上げる','管の断熱性を高める'],a:1,genre:10,d:2,ex:'ポリエチレンスリーブは埋設されたダクタイル鋳鉄管等を土壌からの腐食（マクロセル腐食等）から保護するために被覆します。',oex:['不正解。色変更は目的ではありません。','正解。ポリエチレンスリーブは土壌腐食から管を保護します。','不正解。強度向上は目的ではありません。','不正解。断熱が目的ではありません。']},{q:'水道水の「pH値」の基準範囲はどれか？',o:['5.8〜8.6','7.0〜8.0','5.0〜7.0','8.0〜10.0'],a:0,genre:10,d:2,ex:'水道水のpH値は5.8以上8.6以下と水質基準で定められています。',oex:['正解。pH値は5.8〜8.6が基準範囲です。','不正解。7.0〜8.0は範囲が狭すぎます。','不正解。5.0〜7.0は酸性寄りすぎます。','不正解。8.0〜10.0はアルカリ性すぎます。']},{q:'直結給水方式の「直結直圧式」が適用できる建物の階数として一般的な上限はどれか？',o:['10階建て以上','1階建てのみ','5〜6階建て','2〜3階建て'],a:3,genre:10,d:2,ex:'直結直圧式は配水管の水圧のみで給水するため、一般的に2〜3階建て程度が上限です（水圧により異なります）。',oex:['不正解。10階以上は受水槽式が一般的です。','不正解。1階のみではありません。','不正解。5〜6階は直結増圧式の範囲です。','正解。直結直圧式は一般的に2〜3階建てが上限です。']},{q:'電気回路の「短絡（ショート）」とは何か？',o:['電圧が低下した状態','電源の正極と負極が極めて低い抵抗で直接つながる状態','回路が開放された状態','電気が流れない状態'],a:1,genre:11,d:1,ex:'短絡は電源の正極と負極（または相間）が極めて低い抵抗で直接つながり、大電流が流れる危険な状態です。',oex:['不正解。電圧低下は短絡の結果ですが定義ではありません。','正解。短絡は低抵抗で直接つながり大電流が流れる状態です。','不正解。開放は断線です。','不正解。電気が流れないのは断線（開放）です。']},{q:'「四路スイッチ」はどのような場合に使用されるか？',o:['4系統の回路を切り替える場合','3箇所以上から1つの照明をON/OFFする場合','4つの照明を制御する場合','非常用照明の制御'],a:1,genre:11,d:2,ex:'四路スイッチは三路スイッチ2個の間に挿入し、3箇所以上から同じ照明をON/OFFする場合に使用します。',oex:['不正解。4系統の切替えではありません。','正解。3箇所以上からの照明ON/OFF制御に使用します。','不正解。4つの照明制御ではありません。','不正解。非常用照明専用ではありません。']},{q:'電気工事で「ボックスコネクタ」を使用する目的はどれか？',o:['接地線を接続する','電線を分岐する','金属管やPF管をボックスに接続する','電線を圧着する'],a:2,genre:11,d:1,ex:'ボックスコネクタは金属管やPF管をアウトレットボックスに接続するための部品です。',oex:['不正解。接地線接続は接地端子で行います。','不正解。分岐はジョイントボックス内で行います。','正解。ボックスコネクタは管をボックスに接続する部品です。','不正解。圧着は圧着ペンチとリングスリーブで行います。']},{q:'電気配線の「接地側電線」に使用できない色はどれか？',o:['白色','灰色','緑色','赤色'],a:3,genre:11,d:2,ex:'接地側電線には白色または灰色を使用します。赤色は非接地側の電圧線（200V回路等）に使用する色です。',oex:['不正解。白色は接地側に使用できます。','不正解。灰色は接地側に使用できます。','不正解。緑色は接地線に使用しますが、接地側とは異なります。','正解。赤色は電圧線の色で、接地側には使用できません。']},{q:'住宅の分電盤で「専用回路」が必要な機器はどれか？',o:['エアコン・IHクッキングヒーター等の大容量機器','扇風機','テレビ','照明器具'],a:0,genre:11,d:2,ex:'エアコン、IHクッキングヒーター、電子レンジ等の消費電力が大きい機器は専用回路（ブレーカー1つに1機器）が必要です。',oex:['正解。大容量機器には専用回路が必要です。','不正解。扇風機は一般回路で対応できます。','不正解。テレビは一般回路で対応できます。','不正解。照明は一般回路で対応できます。']},{q:'「接地抵抗計」で測定する際に必要な補助接地極の本数はどれか？',o:['2本','3本','1本','0本（補助極不要）'],a:0,genre:11,d:2,ex:'接地抵抗の測定には被測定接地極のほかに補助接地極を2本（電圧極Pと電流極C）使用します。',oex:['正解。補助接地極は2本（P極とC極）必要です。','不正解。3本は多すぎます。','不正解。1本では不足です。2本必要です。','不正解。補助極は必要です。']},{q:'「EM-EEF/F」ケーブルの「EM」が意味するものはどれか？',o:['電磁シールド（Electro Magnetic）','特殊金属（Extra Metal）','耐熱性（Extra Melting）','エコマテリアル（環境配慮型・ノンハロゲン）'],a:3,genre:11,d:2,ex:'EMはEco Material（エコマテリアル）の略で、燃焼時にハロゲンガスを発生しない環境配慮型のケーブルです。',oex:['不正解。電磁シールドではありません。','不正解。特殊金属ではありません。','不正解。耐熱性ではありません。','正解。EMはEco Material（エコマテリアル・環境配慮型）です。']},{q:'100V 15Aのコンセントの定格容量は何Wか？',o:['100W','1000W','1500W','500W'],a:2,genre:11,d:1,ex:'P=V×I=100V×15A=1500Wです。コンセント1個あたり1500Wまで使用できます。',oex:['不正解。100V×15A=1500Wです。','不正解。1500Wが正しいです。','正解。100V×15A=1500Wです。','不正解。1500Wが正しいです。']},{q:'電気工事における「活線作業」とは何か？',o:['高所で行う作業','屋外で行う作業','電源を切ってから行う作業','通電したまま行う電気作業'],a:3,genre:11,d:1,ex:'活線作業は電源を切らず通電状態のまま行う作業で、感電の危険性が高く特に注意が必要です。',oex:['不正解。高所作業とは関係ありません。','不正解。屋外作業とは関係ありません。','不正解。電源を切って行うのは停電作業です。','正解。活線作業は通電したまま行う作業です。']},{q:'「二種金属製可とう電線管」（プリカチューブ）の施工場所の制限はどれか？',o:['すべての場所で施工可能','屋外のみ','地中埋設専用','乾燥した展開した場所または点検できる隠蔽場所'],a:3,genre:11,d:3,ex:'二種金属製可とう電線管は乾燥した展開した場所または点検できる隠蔽場所で使用できます。湿気の多い場所は不可です。',oex:['不正解。施工場所に制限があります。','不正解。屋外専用ではありません。','不正解。地中埋設専用ではありません。','正解。乾燥した展開場所または点検可能な隠蔽場所です。']},{q:'電線に流れる電流が2倍になると、電線の発熱量は何倍になるか？',o:['2倍','4倍','3倍','8倍'],a:1,genre:11,d:2,ex:'ジュールの法則（Q=I²Rt）により、発熱量は電流の2乗に比例します。電流2倍なら発熱量は2²=4倍です。',oex:['不正解。2倍ではなく4倍です。','正解。発熱量は電流の2乗に比例するため4倍になります。','不正解。3倍ではなく4倍です。','不正解。8倍ではなく4倍です。']},{q:'「電気用品安全法」に基づく「PSEマーク」の意味はどれか？',o:['電気用品の安全基準適合を示す','電力消費量の等級を示す','リサイクル可能であることを示す','メーカーの保証を示す'],a:0,genre:11,d:1,ex:'PSEマーク（Product Safety Electrical appliance and materials）は電気用品安全法の基準に適合していることを示します。',oex:['正解。PSEマークは電気用品の安全基準適合を示します。','不正解。消費量の等級は省エネラベルです。','不正解。リサイクルはリサイクルマークです。','不正解。メーカー保証ではなく法令による安全認証です。']},{q:'鉄筋コンクリート造の柱の「帯筋比」の最小値として一般的なものはどれか？',o:['0.1%','0.2%','0.3%','0.5%'],a:1,genre:9,d:3,ex:'RC造の柱の帯筋比（帯筋の断面積比）は0.2%以上が建築基準法施行令で規定されています。',oex:['不正解。0.1%では不足です。0.2%以上が基準です。','正解。帯筋比は0.2%以上です。','不正解。0.3%は基準より大きいです。','不正解。0.5%は過大です。']},{q:'コンクリートの「エフロレッセンス（白華現象）」の原因はどれか？',o:['コンクリートの強度不足','塗装の劣化','鉄筋の腐食','コンクリート中の水酸化カルシウムが水に溶け出し、表面で炭酸カルシウムとして析出する現象'],a:3,genre:9,d:2,ex:'エフロレッセンスはコンクリート中のCa(OH)₂が水とともに表面に移動し、空気中のCO₂と反応してCaCO₃として白く析出する現象です。',oex:['不正解。強度不足が原因ではありません。','不正解。塗装劣化ではありません。','不正解。鉄筋腐食とは別の現象です。','正解。水酸化カルシウムの溶出と炭酸カルシウムの析出が原因です。']},{q:'鉄骨造の柱脚で「根巻き柱脚」の特徴はどれか？',o:['柱脚を鉄筋コンクリートで根巻きして固定度を高める','柱脚をボルトだけで固定する','柱脚を地中深くに埋め込む','柱脚に免震装置を設置する'],a:0,genre:9,d:2,ex:'根巻き柱脚は鉄骨柱の下部をRC壁で包み込み（根巻き）、露出柱脚より固定度を高める方式です。',oex:['正解。根巻き柱脚はRCで柱脚を包んで固定度を高めます。','不正解。ボルトだけは露出柱脚です。','不正解。深く埋め込むのは埋込み柱脚です。','不正解。免震装置とは別です。']},{q:'屋上防水の「保護層」として使用されるものはどれか？',o:['アスファルトルーフィング','押えコンクリートまたは断熱材','プライマー','シーリング材'],a:1,genre:9,d:2,ex:'屋上防水の保護層は防水層の上に設ける層で、押えコンクリート（厚さ80mm程度）や断熱材で防水層を保護します。',oex:['不正解。ルーフィングは防水層の材料です。','正解。押えコンクリートや断熱材が保護層として使われます。','不正解。プライマーは下塗り材です。','不正解。シーリング材は目地充填材です。']},{q:'建築基準法における「特殊建築物」に該当するものはどれか？',o:['一般住宅','事務所ビル','劇場・ホテル・病院・共同住宅等','すべての建築物'],a:2,genre:9,d:2,ex:'特殊建築物は不特定多数が利用する建物で、劇場、映画館、ホテル、病院、共同住宅、学校、百貨店等が該当します。',oex:['不正解。一般住宅（戸建て）は特殊建築物ではありません。','不正解。事務所ビルは特殊建築物ではありません。','正解。劇場・ホテル・病院・共同住宅等が特殊建築物です。','不正解。すべてではなく特定の用途のものが該当します。']},{q:'鉄筋の「SD345」の「345」が意味するものはどれか？',o:['鉄筋の直径345mm','降伏点の下限値345N/mm²','鉄筋の長さ345cm','鉄筋の重量345g/m'],a:1,genre:9,d:2,ex:'SD345のSDはSteel Deformed（異形鉄筋）、345は降伏点の下限値345N/mm²を示します。',oex:['不正解。直径ではありません。','正解。345は降伏点の下限値345N/mm²です。','不正解。長さではありません。','不正解。重量ではありません。']},{q:'コンクリート打設時の「コンクリートポンプ車」の圧送管の先端に取り付ける「フレキシブルホース」の長さの制限はどれか？',o:['1m以下','3m以下','5m以下','制限なし'],a:2,genre:9,d:3,ex:'コンクリートポンプ車のフレキシブルホース（先端ホース）の長さは5m以下とすることが推奨されています。',oex:['不正解。1mでは短すぎます。','不正解。3mではありません。5m以下です。','正解。フレキシブルホースの長さは5m以下です。','不正解。制限があります。']},{q:'建築基準法の「斜線制限」に含まれないものはどれか？',o:['南側斜線制限','隣地斜線制限','道路斜線制限','北側斜線制限'],a:0,genre:9,d:2,ex:'斜線制限には道路斜線、隣地斜線、北側斜線の3種類があります。「南側斜線制限」は存在しません。',oex:['正解。南側斜線制限は存在しません。','不正解。隣地斜線制限は斜線制限の一つです。','不正解。道路斜線制限は斜線制限の一つです。','不正解。北側斜線制限は斜線制限の一つです。']},{q:'鉄骨の「耐火被覆」の種類に含まれないものはどれか？',o:['吹付けロックウール','耐火板（けい酸カルシウム板等）','巻付け耐火被覆','アクリル塗装'],a:3,genre:9,d:2,ex:'耐火被覆には吹付け工法、成形板貼り、巻付け工法等があります。アクリル塗装は耐火被覆ではありません。',oex:['不正解。吹付けロックウールは耐火被覆の代表的工法です。','不正解。耐火板は耐火被覆に含まれます。','不正解。巻付け耐火被覆は耐火被覆の一種です。','正解。アクリル塗装は耐火被覆ではありません。']},{q:'「PC工法（プレキャストコンクリート工法）」の利点はどれか？',o:['現場でのコンクリート打設が増える','工場製作のため品質が安定し、現場工期が短縮できる','必ずコストが安くなる','小規模建物にのみ適用可能'],a:1,genre:9,d:1,ex:'PC工法は工場で部材を製作するため品質管理が容易で品質が安定し、現場ではクレーンで組み立てるため工期短縮が可能です。',oex:['不正解。現場打設はむしろ減少します。','正解。品質安定と工期短縮がPC工法の利点です。','不正解。必ず安くなるとは限りません。','不正解。大規模建物にも適用されます。']},{q:'コンクリートの「ひび割れ」を防止するための対策として最も有効なものはどれか？',o:['単位水量を増やす','単位水量を減らし、適切な養生を行う','打設温度を上げる','型枠を早く外す'],a:1,genre:9,d:2,ex:'ひび割れ防止には単位水量を減らして乾燥収縮を抑え、十分な湿潤養生を行うことが最も有効です。',oex:['不正解。単位水量を増やすと乾燥収縮が大きくなりひび割れリスクが増大します。','正解。単位水量の低減と適切な養生がひび割れ防止に有効です。','不正解。温度上昇はひび割れリスクを増大させます。','不正解。早期脱型は乾燥収縮ひび割れの原因になります。']},{q:'足場工事における「壁つなぎ」の役割はどれか？',o:['足場の高さを上げる','足場を建物に固定して倒壊を防止する','足場の水平精度を確認する','作業員の安全帯を取り付ける'],a:1,genre:9,d:1,ex:'壁つなぎは足場を建物の躯体に固定し、風荷重等による足場の倒壊や変形を防止する重要な部材です。',oex:['不正解。高さの変更は足場の段数です。','正解。壁つなぎは足場を建物に固定して倒壊を防ぎます。','不正解。水平確認は水準器です。','不正解。安全帯は親綱に取り付けます。']},{q:'給水装置工事主任技術者試験の受験資格として必要な実務経験年数はどれか？',o:['1年以上','3年以上','5年以上','経験不問'],a:1,genre:10,d:1,ex:'給水装置工事主任技術者試験は給水装置工事に関して3年以上の実務経験が必要です。',oex:['不正解。1年では不足です。3年以上です。','正解。3年以上の実務経験が必要です。','不正解。5年ではなく3年以上です。','不正解。実務経験が必要です。']},{q:'水道用ダクタイル鋳鉄管の接合方法で最も一般的なものはどれか？',o:['TS接合','メカニカル接合','ねじ込み接合','接着接合'],a:1,genre:10,d:2,ex:'ダクタイル鋳鉄管の接合は主にメカニカル接合（K形、T形等）が使用されます。大口径ではフランジ接合も使われます。',oex:['不正解。TS接合は塩ビ管の接合です。','正解。ダクタイル鋳鉄管はメカニカル接合が一般的です。','不正解。ねじ込みは鋼管用です。','不正解。接着は塩ビ管用です。']},{q:'給水管の「水質汚染」を防止するために、給水管と汚水管を並行埋設する場合の最小離隔距離はどれか？',o:['50cm以上','30cm以上','100cm以上','10cm以上'],a:1,genre:10,d:2,ex:'給水管と汚水管を並行埋設する場合は30cm以上の離隔距離を確保し、給水管を上方に配置します。',oex:['不正解。50cmは基準より大きいです。','正解。30cm以上の離隔距離が必要です。','不正解。100cmは過大です。','不正解。10cmでは不十分です。30cm以上が必要です。']},{q:'「量水器（水道メーター）」の種類で、一般家庭用として最も多く使用されるものはどれか？',o:['電磁式メーター','超音波式メーター','接線流羽根車式（単箱型）メーター','タービン式メーター'],a:2,genre:10,d:2,ex:'一般家庭では口径13〜25mmの接線流羽根車式（単箱型）メーターが最も多く使用されています。',oex:['不正解。電磁式は大口径や工業用です。','不正解。超音波式は特殊用途です。','正解。接線流羽根車式が家庭用として最も一般的です。','不正解。タービン式は大口径用です。']},{q:'給水装置の「直結加圧形ポンプユニット」に必要な安全装置はどれか？',o:['冷却装置','加熱装置','逆流防止装置と圧力タンク','発電装置'],a:2,genre:10,d:2,ex:'直結加圧形ポンプユニットには逆流防止装置（逆止弁）と圧力タンク（停電時も一定時間給水継続）が必要です。',oex:['不正解。冷却装置は不要です。','不正解。加熱装置は不要です。','正解。逆流防止装置と圧力タンクが必要です。','不正解。発電装置は必須ではありません。']},{q:'水道法における「水道事業」の定義で、給水人口の下限はどれか？',o:['50人','100人','101人','500人'],a:2,genre:10,d:2,ex:'水道法第3条で水道事業は「一般の需要に応じて水道により水を供給する事業」で、計画給水人口101人以上が対象です。',oex:['不正解。50人ではなく101人以上です。','不正解。100人ではなく101人以上です。100人以下は簡易水道です。','正解。計画給水人口101人以上が水道事業の定義です。','不正解。500人は簡易水道の上限に近い値です。']},{q:'給水管を他の埋設管と交差させる場合の離隔距離の基準はどれか？',o:['接触しても良い','10cm以上','30cm以上','50cm以上'],a:2,genre:10,d:2,ex:'給水管を他の埋設管（ガス管・下水管等）と交差させる場合は30cm以上の離隔距離を確保します。',oex:['不正解。接触は避けなければなりません。','不正解。10cmでは不十分です。','正解。交差時の離隔距離は30cm以上です。','不正解。50cmは基準より大きいです。']},{q:'水道法で「簡易水道事業」の対象となる計画給水人口の範囲はどれか？',o:['100人以下','101人以上5,000人以下','5,001人以上','10,000人以上'],a:1,genre:10,d:3,ex:'簡易水道事業は計画給水人口が101人以上5,000人以下の水道事業です。5,001人以上は上水道事業です。',oex:['不正解。100人以下は水道事業に該当しません。','正解。簡易水道は101人以上5,000人以下です。','不正解。5,001人以上は上水道事業です。','不正解。10,000人の基準はありません。']},{q:'給水管の施工で「管の切断面」の処理として正しいものはどれか？',o:['切りっぱなしでよい','面取り（バリ取り）を行い、切粉を除去する','接着剤を塗る','加熱して溶かす'],a:1,genre:10,d:1,ex:'管の切断面はバリ（鋭利な突起）を面取り器やリーマーで除去し、切粉も完全に除去します。バリは通水障害やパッキン損傷の原因になります。',oex:['不正解。バリが残ると問題が生じます。面取りが必要です。','正解。面取り（バリ取り）と切粉除去が必要です。','不正解。接着剤を塗るのはTS接合時のみです。','不正解。加熱は一般的な処理ではありません。']},{q:'給水装置の「耐寒性能」が求められる理由はどれか？',o:['美観を保つため','凍結による管の破損を防止するため','水圧を安定させるため','水質を維持するため'],a:1,genre:10,d:1,ex:'寒冷地では管内の水が凍結膨張して管が破損するため、給水装置には耐寒性能が求められます。',oex:['不正解。美観は耐寒性能の理由ではありません。','正解。凍結による管の破損防止が耐寒性能の目的です。','不正解。水圧安定は直接の理由ではありません。','不正解。水質維持は直接の理由ではありません。']},{q:'「給水装置の構造及び材質の基準」で規定されている浸出性能の試験項目に含まれるものはどれか？',o:['耐圧性','味・臭気・色度・濁度・有機物等','引張強度','電気抵抗'],a:1,genre:10,d:3,ex:'浸出性能は給水装置から水中に溶出する物質の量を規制する基準で、味・臭気・色度・濁度・有機物等について試験します。',oex:['不正解。耐圧性は別の性能基準です。','正解。浸出性能は味・臭気・色度・濁度・有機物等を試験します。','不正解。引張強度は材料試験です。','不正解。電気抵抗は浸出性能とは無関係です。']},{q:'「漏電」が発生する主な原因はどれか？',o:['電線が太すぎる','電線の絶縁体が劣化して電流が漏れる','電圧が低すぎる','コンセントの数が多すぎる'],a:1,genre:11,d:1,ex:'漏電は電線やケーブルの絶縁体が劣化・損傷して電流が正規の回路外に漏れる現象です。',oex:['不正解。電線の太さは漏電の原因ではありません。','正解。絶縁体の劣化が漏電の主な原因です。','不正解。電圧が低いことは漏電の原因ではありません。','不正解。コンセント数は漏電とは無関係です。']},{q:'電気工事で使用される「ウォーターポンププライヤー」の用途はどれか？',o:['接地棒を打ち込む','パイプやナットをつかんで回す','電線を切断する','電圧を測定する'],a:1,genre:11,d:1,ex:'ウォーターポンププライヤーは開口幅を調整でき、パイプやナット、大きな部品をつかんで回すための工具です。',oex:['不正解。接地棒の打込みには別の工具を使います。','正解。パイプやナットをつかんで回す工具です。','不正解。切断はニッパーやケーブルカッターです。','不正解。電圧測定はテスターです。']},{q:'電気工事における「VVRケーブル」の「R」は何を意味するか？',o:['Rigid（硬い）','Resistance（抵抗）','Round（丸形）','Reinforced（強化）'],a:2,genre:11,d:2,ex:'VVRはビニル絶縁ビニルシースケーブル丸形（Round type）で、VVFの平形に対して断面が丸い形状です。',oex:['不正解。Rigidではありません。','不正解。Resistanceではありません。','正解。RはRound（丸形）を意味します。','不正解。Reinforcedではありません。']},{q:'電気工事で「電線管のねじ切り」に使用する工具はどれか？',o:['パイプレンチ','リーマー','ダイス（パイプねじ切り器）','プライヤー'],a:2,genre:11,d:2,ex:'金属電線管のねじ切りにはダイス（パイプねじ切り器）を使用し、管の端部にねじ山を切ります。',oex:['不正解。パイプレンチは管をつかんで回す工具です。','不正解。リーマーは管内面のバリ取りに使います。','正解。ダイス（パイプねじ切り器）でねじを切ります。','不正解。プライヤーはつかむ工具です。']},{q:'電気設備の「過負荷」とはどのような状態か？',o:['電線が断線した状態','電圧が高すぎる状態','定格電流を超える電流が継続して流れる状態','接地抵抗が低すぎる状態'],a:2,genre:11,d:1,ex:'過負荷は電気設備に定格電流を超える電流が継続して流れる状態で、電線や機器の過熱・損傷の原因になります。',oex:['不正解。断線は開放です。','不正解。電圧が高い状態は過電圧です。','正解。過負荷は定格超過の電流が継続して流れる状態です。','不正解。接地抵抗が低いことは問題ではありません。']},{q:'「単相2線式」配電方式で、200Vを取り出すことは可能か？',o:['100Vと200Vの両方が取り出せる','100Vのみ取り出せる','200Vのみ取り出せる','300Vも取り出せる'],a:1,genre:11,d:1,ex:'単相2線式は100Vのみです。200Vを取り出すには単相3線式が必要です。',oex:['不正解。単相2線式では200Vは取り出せません。','正解。単相2線式は100Vのみ取り出せます。','不正解。200Vのみではなく、100Vのみです。','不正解。300Vは取り出せません。']},{q:'「回路計（テスター）」で測定できるものとして正しいものはどれか？',o:['接地抵抗','照度','漏電電流','電圧・電流・抵抗'],a:3,genre:11,d:1,ex:'回路計（テスター）は電圧（V）・電流（A）・抵抗（Ω）を測定できる汎用計測器です。',oex:['不正解。接地抵抗は専用の接地抵抗計で測定します。','不正解。照度は照度計で測定します。','不正解。漏電電流はクランプメーターで測定します。','正解。テスターは電圧・電流・抵抗を測定できます。']},{q:'屋内配線の「ケーブル工事」で、VVFケーブルを造営材に固定する間隔の最大値はどれか？',o:['0.5m以下','1.0m以下','2.0m以下','3.0m以下'],a:2,genre:11,d:2,ex:'VVFケーブルの造営材への固定間隔（サドル等での支持間隔）は2.0m以下と定められています。',oex:['不正解。0.5mは短すぎます。2.0m以下が基準です。','不正解。1.0mは基準より短いです。','正解。ケーブルの固定間隔は2.0m以下です。','不正解。3.0mでは間隔が広すぎます。']},{q:'「LED照明器具」の特徴として正しいものはどれか？',o:['調光ができない','長寿命で消費電力が少なく、発熱も少ない','消費電力が白熱電球より多い','紫外線を多く出す'],a:1,genre:11,d:1,ex:'LED照明は白熱電球や蛍光灯と比較して長寿命（40,000〜50,000時間）、低消費電力、低発熱が特徴です。',oex:['不正解。調光対応のLED照明もあります。','正解。LED照明は長寿命・低消費電力・低発熱が特徴です。','不正解。消費電力は白熱電球より大幅に少ないです。','不正解。LEDは紫外線をほとんど出しません。']},{q:'電気工事における「アウトレットボックス」の主な用途はどれか？',o:['電線管を曲げる','電線の接続点を収納し、コンセントやスイッチを取り付ける','電力量を計測する','変圧器を格納する'],a:1,genre:11,d:1,ex:'アウトレットボックスは電線の接続やコンセント・スイッチの取付け箇所に設置する金属製の箱です。',oex:['不正解。管を曲げるのはベンドやベンダーです。','正解。アウトレットボックスは電線接続とスイッチ等の取付けに使います。','不正解。電力量計測は電力量計です。','不正解。変圧器格納は変電設備です。']},{q:'リングスリーブの圧着マーク「○（まる）」は、どの組み合わせの接続に使用するか？',o:['1.6mm×2本','1.6mm×3〜4本','2.0mm×2本','2.0mm×3本以上'],a:0,genre:11,d:2,ex:'リングスリーブの圧着マーク「○」は1.6mm×2本の接続に使用します。「小」は1.6mm×3〜4本、「中」は2.0mmを含む場合等です。',oex:['正解。「○」は1.6mm×2本の接続に使用します。','不正解。1.6mm×3〜4本は「小」マークです。','不正解。2.0mm×2本は「小」マークです。','不正解。2.0mm×3本以上は「中」マークです。']},{q:'コンクリートの「促進養生」の方法として正しいものはどれか？',o:['自然乾燥','蒸気養生やオートクレーブ養生','冷水養生','風乾養生'],a:1,genre:9,d:2,ex:'促進養生は蒸気やオートクレーブ（高温高圧蒸気）で硬化を促進する方法で、PCa製品の製造に使用されます。',oex:['不正解。自然乾燥は促進養生ではありません。','正解。蒸気養生やオートクレーブ養生が促進養生です。','不正解。冷水養生は促進養生ではありません。','不正解。風乾は促進養生ではありません。']},{q:'鉄骨工事の「現場溶接」で最も多く使用される溶接方法はどれか？',o:['ガス溶接','被覆アーク溶接','半自動アーク溶接（CO₂溶接）','スポット溶接'],a:2,genre:9,d:2,ex:'鉄骨の現場溶接では半自動アーク溶接（CO₂ガスシールドアーク溶接）が最も多く使用されています。',oex:['不正解。ガス溶接は鉄骨工事ではほぼ使いません。','不正解。被覆アークは補修等に使われますが主流ではありません。','正解。半自動アーク溶接（CO₂溶接）が現場溶接の主流です。','不正解。スポット溶接は薄板用です。']},{q:'「グラウト」とは何か？',o:['コンクリートの骨材','セメント系の充填材で隙間や空洞を埋めるために注入するもの','防水シートの接着剤','鉄筋の被覆材'],a:1,genre:9,d:1,ex:'グラウトはセメントペーストやモルタルを水で練ったもので、柱脚のベースプレート下や空洞の充填に使用します。',oex:['不正解。骨材ではありません。','正解。グラウトはセメント系充填材で隙間を埋めるものです。','不正解。防水シート接着剤ではありません。','不正解。鉄筋被覆材ではありません。']},{q:'建築基準法における「構造耐力上主要な部分」に含まれないものはどれか？',o:['基礎','間仕切壁（非耐力壁）','梁','柱'],a:1,genre:9,d:2,ex:'構造耐力上主要な部分は柱、梁、壁（耐力壁）、床版、屋根版、基礎等です。非耐力の間仕切壁は含まれません。',oex:['不正解。基礎は構造耐力上主要な部分です。','正解。非耐力の間仕切壁は含まれません。','不正解。梁は構造耐力上主要な部分です。','不正解。柱は構造耐力上主要な部分です。']},{q:'防水工事の「通気緩衝工法」の特徴はどれか？',o:['防水層を下地に全面接着する','通気層を設けて下地の水分を排出し、防水層のふくれを防止する','防水層の上に植栽する','シートを釘で固定する'],a:1,genre:9,d:3,ex:'通気緩衝工法は防水層と下地の間に通気緩衝シートを敷き、脱気筒から水蒸気を排出してふくれを防止する工法 色です。2芯は黒・白です。',oex:['正解。3芯ケーブルは黒・白・赤です。','不正解。青ではなく赤です。','不正解。赤・白・青ではなく黒・白・赤です。','不正解。緑ではなく赤です。']},{q:'電気工事における「分岐回路」の過電流遮断器の定格電流が20Aの場合、使用できるコンセントの定格はどれか？',o:['15Aのみ','20Aのみ','15Aまたは20A','30A'],a:2,genre:11,d:2,ex:'20A分岐回路では15Aおよび20Aの定格のコンセントを使用できます。',oex:['不正解。15Aだけでなく20Aも使用できます。','不正解。20Aだけでなく15Aも使用できます。','正解。20A分岐回路では15Aまたは20Aが使用できます。','不正解。30Aのコンセントは20A回路には使えません。']},{q:'「インバーター」の機能として正しいものはどれか？',o:['直流を交流に変換する','交流の電圧のみを変換する','電力を蓄える','電気を計量する'],a:0,genre:11,d:2,ex:'インバーターは直流を交流に変換する装置です。モーターの回転数制御では交流→直流→交流の変換を行います。',oex:['正解。インバーターは直流を交流に変換します。','不正解。電圧変換は変圧器です。','不正解。蓄電は蓄電池です。','不正解。計量は電力量計です。']},{q:'照明の「ルクス（lx）」と「ルーメン（lm）」の違いはどれか？',o:['同じ単位である','どちらも消費電力の単位','ルクスの方がルーメンより常に大きい','ルクスは照度（面に届く明るさ）、ルーメンは光束（光の総量）'],a:3,genre:11,d:2,ex:'ルーメン（lm）は光源から出る光の総量（光束）、ルクス（lx）は面に届く明るさ（照度）で、1lx＝1lm/m²です。',oex:['不正解。異なる単位です。','不正解。消費電力はワット（W）です。','不正解。常に大きいとは限りません。','正解。ルクスは照度、ルーメンは光束です。']},{q:'給水管の「ライニング鋼管」で内面に施されるライニングの種類に含まれないものはどれか？',o:['ポリエチレン粉体','アスファルト','エポキシ樹脂','硬質塩化ビニル'],a:1,genre:10,d:2,ex:'給水用ライニング鋼管には硬質塩化ビニル、ポリエチレン粉体、エポキシ樹脂のライニングがありますが、アスファルトライニングは給水管には使用しません。',oex:['不正解。ポリエチレン粉体ライニング（SGP-PA等）は一般的です。','正解。アスファルトライニングは給水管には使用しません。','不正解。エポキシ樹脂ライニングは給水管に使用されます。','不正解。硬質塩化ビニルライニング（SGP-VB等）は一般的です。']},{q:'給水装置の「水撃限界性能」の試験で適用される流速の上限はどれか？',o:['1.0m/s','1.5m/s','2.0m/s','3.0m/s'],a:2,genre:10,d:3,ex:'水撃限界性能は流速2.0m/s以下で水撃作用により上昇する圧力が1.5MPa以下であることが基準です。',oex:['不正解。1.0m/sではなく2.0m/sです。','不正解。1.5m/sではありません。','正解。流速2.0m/s以下が試験条件です。','不正解。3.0m/sではありません。']},{q:'「配水管」の布設で「不断水分岐」が可能な分水栓の種類はどれか？',o:['フランジ付短管','伸縮継手','仕切弁','サドル付分水栓'],a:3,genre:10,d:1,ex:'サドル付分水栓は配水管を断水させずに（不断水で）分岐工事ができる分水栓です。',oex:['不正解。フランジ付短管は分岐用ではありません。','不正解。伸縮継手は管の伸縮吸収用です。','不正解。仕切弁は開閉弁であり分岐用ではありません。','正解。サドル付分水栓で不断水分岐が可能です。']},{q:'給水管の材質で「銅管」の特徴として正しいものはどれか？',o:['可とう性が高く曲げが容易','非常に安価で軽い','耐食性に優れ、はんだ付けやろう付けで接合する','接着剤で接合する'],a:2,genre:10,d:2,ex:'銅管は耐食性に優れ、給湯管に多く使用されます。接合ははんだ付け（軟ろう）やろう付け（硬ろう）で行います。',oex:['不正解。銅管は硬く、曲げには専用工具が必要です。','不正解。銅管は比較的高価で重いです。','正解。銅管は耐食性に優れ、はんだ・ろう付けで接合します。','不正解。接着剤は塩ビ管の接合方法です。']},{q:' 10,d:1,ex:'減圧弁は配水管の水圧が高すぎる場合に適切な圧力まで減圧し、給水用具の破損やウォーターハンマーを防止します。',oex:['不正解。水圧を上げるのは加圧ポンプです。','正解。高い水圧を減圧して給水用具を保護します。','不正解。水量増加は目的ではありません。','不正解。水質改善は目的ではありません。']},{q:'給水装置の「クロスコネクション」として禁止されている接続例はどれか？',o:['水道メーター前後の接続','給水管と井戸水配管の直接接続','配水管から受水槽への接続','給水管同士の接続'],a:1,genre:10,d:2,ex:'クロスコネクションは飲料水系統と非飲料水系統（井戸水・雑用水等）の直接接続で、水道法で禁止されています。',oex:['不正解。メーター前後の接続は正常です。','正解。給水管と井戸水配管の直接接続はクロスコネクションです。','不正解。配水管から受水槽への接続は正規の給水方式です。','不正解。給水管同士の接続は正常です。']},{q:'「逆流防止」のための「吐水口空間」の確保が特に重要な器具はどれか？',o:['洗面器への給水','浴槽への給水（吐水口が水没する可能性がある場合）','トイレの手洗い','台所の蛇口'],a:1,genre:10,d:2,ex:'浴槽は水位が上昇して吐水口が水没する可能性があるため、吐水口空間の確保が特に重要です。',oex:['不正解。洗面器も重要ですが浴槽ほどのリスクはありません。','正解。浴槽は水没リスクが高く吐水口空間が特に重要です。','不正解。手洗いは水没リスクが低いです。','不正解。台所蛇口は通常水没しません。']},{q:'水道法で定められた「給水の緊急停止」が認められる条件はどれか？',o:['工事の都合','水質が水道水の基準に適合しないおそれがある場合','利用者の要望','料金未納の場合'],a:1,genre:10,d:2,ex:'水道法第23条により、水質が基準に適合しないおそれがある場合、水道事業者は直ちに給水を停止し利用者に周知しなければなりません。',oex:['不正解。工事の都合だけでは緊急停止は認められません。','正解。水質基準不適合のおそれがある場合に緊急停止が認められます。','不正解。利用者要望は緊急停止の条件ではありません。','不正解。料金未納は別の手続きです。']},{q:'給水管の「防護工」が必要な箇所はどれか？',o:['室内の配管すべて','車両荷重がかかる箇所や露出配管部','地中の直線区間','受水槽内の配管'],a:1,genre:10,d:1,ex:'車両荷重がかかる道路横断部や外部に露出する配管部は、さや管やコンクリート防護等の防護工が必要です。',oex:['不正解。室内すべてではなく特定の箇所です。','正解。車両荷重箇所や露出配管部に防護工が必要です。','不正解。地中直線区間は通常不要です。','不正解。受水槽内は別の基準です。']},{q:'給水装置工事における「竣工図」に記載すべき事項はどれか？',o:['配管経路、管種、口径、延長、給水用具の位置等','施工業者の会社概要','工事費用の明細','近隣住民の連絡先'],a:0,genre:10,d:1,ex:'竣工図には配管経路、管種、口径、延長、分岐位置、メーター位置、給水用具の位置等を記載します。',oex:['正解。配管経路、管種、口径等を記載します。','不正解。会社概要は竣工図に不要です。','不正解。工事費用は竣工図の記載事項ではありません。','不正解。近隣連絡先は竣工図に不要です。']},{q:'給水管の「異形管防護」とは何か？',o:['管の外観を整える工事','曲管やT字管等の異形管部に作用するスラスト力に対抗するためのコンクリートブロック等の設置','管の色を変える塗装','管の断熱処理'],a:1,genre:10,d:3,ex:'異形管（曲管・T字管等）には水圧による不平均力（スラスト力）が作用するため、コンクリートブロック等で防護します。',oex:['不正解。外観を整える工事ではありません。','正解。スラスト力に対抗するためのコンクリートブロック設置です。','不正解。塗装ではありません。','不正解。断熱処理ではありません。']},{q:'「ステンレス鋼管」の耐食性が高い理由はどれか？',o:['表面に塗装がされているため','表面に不動態被膜（酸化クロムの薄膜）が形成されるため','管壁が非常に厚いため','樹脂でコーティングされているため'],a:1,genre:10,d:2,ex:'ステンレス鋼管はクロムを11%以上含み、表面に不動態被膜（酸化クロムの薄膜）が形成されて腐食を防ぎます。',oex:['不正解。塗装ではなく自然に生成される被膜です。','正解。不動態被膜（酸化クロム）が耐食性の理由です。','不正解。管壁の厚さではなく化学的な被膜です。','不正解。樹脂コーティングではありません。']},{q:'水道法で定められた「専用水道」の定義として正しいものはどれか？',o:['農業用水を利用した水道','自家用の水源を持ち、100人超に給水する水道または1日最大給水量が20m³超の水道','工場専用の水道','水道事業から水を受ける一般の水道'],a:1,genre:10,d:3,ex:'専用水道は自家用水源を持ち居住者100人超に供給するもの、または1日最大給水量20m³超のものです。',oex:['不正解。農業用水は水道ではありません。','正解。100人超給水または1日20m³超が専用水道です。','不正解。工場専用に限りません。','不正解。水道事業からの受水は簡易専用水道等です。']},{q:'給水管の「さや管」の材質として一般的に使用されるものはどれか？',o:['波付硬質合成樹脂管（CD管・FEP管等）','銅管','鋳鉄管','鉛管'],a:0,genre:10,d:2,ex:'さや管には波付硬質合成樹脂管（CD管やFEP管等）が使用され、中に給水管（架橋PE管等）を通します。',oex:['正解。波付硬質合成樹脂管がさや管に使用されます。','不正解。銅管はさや管ではなく給水管です。','不正解。鋳鉄管はさや管に使いません。','不正解。鉛管は使用禁止です。']},{q:'給水管の「管径の選定」で考慮する「同時使用率」とは何か？',o:['設置された給水用具のうち同時に使用される割合','管の耐用年数','管の価格比率','管の施工速度'],a:0,genre:10,d:2,ex:'同時使用率は建物内の全給水用具のうち同時に使用される割合で、管径の算定に使用する重要な係数です。',oex:['正解。同時に使用される給水用具の割合です。','不正解。耐用年数ではありません。','不正解。価格比率ではありません。','不正解。施工速度ではありません。']},{q:'「給水装置工事記録」の保存期間として水道法施行規則で定められているものはどれか？',o:['1年間','3年間','5年間','保存期間の定めはないが適切に保存すべき'],a:3,genre:10,d:3,ex:'水道法施行規則では給水装置工事記録の具体的な保存期間は定められていませんが、適切に保存することが求められます。',oex:['不正解。1年間の規定はありません。','不正解。3年間の規定はありません。','不正解。5年間の規定はありません。','正解。具体的な保存期間の定めはありませんが適切な保存が必要です。']},{q:'「水道GLP（水道水質検査優良試験所規範）」の目的はどれか？',o:['水道料金を適正化する','水質検査の信頼性を確保するための品質管理システム','水道管の製造品質を管理する','水道施設の設計基準'],a:1,genre:10,d:3,ex:'水道GLPは水質検査機関の検査精度と信頼性を確保するための品質管理の仕組み（Good Laboratory Practice）です。',oex:['不正解。料金適正化ではありません。','正解。水質検査の信頼性確保のための品質管理システムです。','不正解。管の製造品質ではありません。','不正解。設計基準ではありません。']},{q:'給水管の「管内流速」が速すぎると発生する問題はどれか？',o:['水温が上がる','騒音・振動やウォーターハンマーが発生しやすくなる','水質が改善する','管が伸びる'],a:1,genre:10,d:1,ex:'管内流速が速すぎると管内の騒音・振動が発生し、弁類の急閉止時にウォーターハンマーも発生しやすくなります。',oex:['不正解。水温上昇は流速の主な問題ではありません。','正解。騒音・振動やウォーターハンマーが発生しやすくなります。','不正解。水質は改善しません。','不正解。管が伸びることはありません。']},{q:'「給水装置の定義」で、受水槽以降の配管は給水装置に含まれるか？',o:['含まれない','建物の規模による','水道事業者の判断による','含まれる'],a:0,genre:10,d:1,ex:'水道法上、給水装置は配水管の分岐から水道メーターを経て受水槽の入口（ボールタップ）までです。受水槽以降は含まれません。',oex:['正解。受水槽以降の配管は給水装置に含まれません。','不正解。建物規模に関わらず含まれません。','不正解。法律で明確に定められています。','不正解。受水槽以降は給水装置に含まれません。']},{q:'給水管の「電気防食」の方法として「外部電源法」の原理はどれか？',o:['管の材質を変更する','管の表面に塗装する','管に直流電流を強制的に流して腐食を防止する','管を樹脂で被覆する'],a:2,genre:10,d:3,ex:'外部電源法は外部から直流電流を管に流し込み、管が陽極にならないようにして電気化学的に腐食を防止する方法です。',oex:['不正解。材質変更は防食法ではなく設計変更です。','不正解。塗装は物理的防食法です。','正解。外部電源法は直流電流を流して腐食を防止します。','不正解。樹脂被覆は物理的防食法です。']},{q:'水道の「浄水方法」のうち「急速ろ過法」と「緩速ろ過法」の違いとして正しいものはどれか？',o:['急速ろ過の方が水質が良い','急速ろ過は凝集剤を使用し高速でろ過、緩速ろ過は生物膜で低速ろ過','両者に違いはない','緩速ろ過の方が処理速度が速い'],a:1,genre:10,d:2,ex:'急速ろ過法は凝集沈殿後に高速でろ過する方法、緩速ろ過法は砂層表面の生物膜で低速にろ過する方法です。',oex:['不正解。一概にどちらが良いとは言えません。','正解。急速は凝集剤使用・高速、緩速は生物膜・低速です。','不正解。大きな違いがあります。','不正解。緩速の方が処理速度は遅いです。']},{q:'給水装置の「逆流防止」に関して、「背圧」による逆流と「逆サイホン作用」による逆流の違いはどれか？',o:['背圧は下流側の圧力が上流側より高い場合、逆サイホンは管内が負圧になる場合に発生する','逆サイホンは高層建物でのみ発生する','違いはない','背圧は夜間のみ発生する'],a:0,genre:10,d:3,ex:'背圧による逆流は下流の圧力が上流より高くなった場合に、逆サイホンは断水等で管内が負圧になった場合に発生します。',oex:['正解。背圧は圧力差、逆サイホンは負圧が原因です。','不正解。逆サイホンは建物の高さに限りません。','不正解。発生メカニズムが異なります。','不正解。背圧は時間帯に関係しません。']},{q:'給水管の「テストポンプ」は何に使用する機器か？',o:['管の接合','管内の清掃','管の切断','水圧試験で管内に水を加圧する'],a:3,genre:10,d:1,ex:'テストポンプは給水装置の水圧試験（耐圧試験）で管内に水を加圧するための手動または電動のポンプです。',oex:['不正解。接合工具ではありません。','不正解。清掃用ではありません。','不正解。切断工具ではありません。','正解。テストポンプは水圧試験の加圧に使用します。']},{q:'給水管に「空気弁」を設置する目的はどれか？',o:['水を加圧する','水質を検査する','管を支持する','管内の空気を排出して通水を円滑にする'],a:3,genre:10,d:2,ex:'空気弁は管内に溜まった空気を自動的に排出し、通水障害や水撃を防止します。管路の凸部に設置します。',oex:['不正解。加圧はポンプの役割です。','不正解。水質検査は別の機器です。','不正解。管の支持はサドル等です。','正解。空気弁は管内の空気排出と通水円滑化が目的です。']},{q:'「配水管」の種類で、日本で最も多く使用されている管材はどれか？',o:['ポリエチレン管','塩化ビニル管','鋼管','ダクタイル鋳鉄管'],a:3,genre:10,d:1,ex:'日本の配水管にはダクタイル鋳鉄管が最も多く使用されています。強度・耐久性に優れ、大口径に対応できます。',oex:['不正解。ポリエチレン管は給水管に多く使われます。','不正解。塩ビ管は給水管に多く使われますが配水管では少ないです。','不正解。鋼管は一部で使用されますが最多ではありません。','正解。ダクタイル鋳鉄管が日本の配水管で最も多いです。']},{q:'給水装置における「二重逆止弁」の設置が求められる場所はどれか？',o:['化学薬品を扱う施設など汚染リスクが高い場所','受水槽の排水管','一般住宅の給水管','消火栓の配管'],a:0,genre:10,d:2,ex:'化学薬品工場・病院・実験施設等の汚染リスクが高い場所では、逆流防止のために二重逆止弁や減圧式逆流防止器が設置されます。',oex:['正解。汚染リスクが高い場所に二重逆止弁が求められます。','不正解。受水槽排水管には設置しません。','不正解。一般住宅は通常の逆止弁で対応します。','不正解。消火栓は別の基準です。']},{q:'「水道用架橋ポリエチレン管」の「架橋」とは何か？',o:['ポリエチレン分子を化学的に結合させて耐熱性・強度を向上させること','2本の管を並列にすること','管を橋の下に通すこと','管を交差させること'],a:0,genre:10,d:2,ex:'架橋はポリエチレンの分子鎖同士を化学的に結合（クロスリンク）させる処理で、耐熱性・耐圧性・耐久性が向上します。',oex:['正解。分子を化学的に結合させて性能を向上させることです。','不正解。並列にすることではありません。','不正解。橋の下を通すことではありません。','不正解。管の交差ではありません。']},{q:'給水管工事で「管の曲げ加工」が可能な管種はどれか？',o:['銅管','硬質塩化ビニル管（VP管）','ダクタイル鋳鉄管','ステンレス鋼管'],a:0,genre:10,d:2,ex:'銅管は柔軟性があり、パイプベンダー等で曲げ加工が可能です。VP管は硬くて曲げられず、エルボ等の継手で方向を変えます。',oex:['正解。銅管はパイプベンダーで曲げ加工が可能です。','不正解。VP管は硬質で曲げ加工できません。','不正解。ダクタイル鋳鉄管は曲げ加工できません。','不正解。ステンレス管は通常曲げ加工しません。']},{q:'水道法における「水道施設」に含まれないものはどれか？',o:['浄水施設','配水施設','取水施設','給水装置'],a:3,genre:10,d:2,ex:'水道施設は取水施設・貯水施設・導水施設・浄水施設・送水施設・配水施設です。給水装置は水道施設には含まれません。',oex:['不正解。浄水施設は水道施設です。','不正解。配水施設は水道施設です。','不正解。取水施設は水道施設です。','正解。給水装置は水道施設ではなく需要者側の設備です。']},{q:'給水装置の「分岐工事」で、配水管に穿孔する際に必ず守るべきことはどれか？',o:['管の真上に穿孔する','配水管の管体に損傷を与えないよう慎重に施工し、穿孔後は通水確認を行う','断水は不要','穿孔径は自由に決めてよい'],a:1,genre:10,d:1,ex:'穿孔工事では配水管に損傷を与えないよう慎重に施工し、穿孔後は切粉を除去して通水確認を行います。',oex:['不正解。真上ではなく管の上部側面に穿孔します。','正解。損傷防止と通水確認が必須です。','不正解。不断水工法でも手順を守る必要があります。','不正解。穿孔径は分岐管径に応じて決まります。']},{q:'給水管の「露出配管」と「埋設配管」で共通して必要な施工上の注意はどれか？',o:['水圧試験を実施し漏水がないことを確認する','支持金具は不要','保温工事は不要','管の色は自由に選べる'],a:0,genre:10,d:1,ex:'露出・埋設いずれの配管も、施工後に水圧試験を実施して漏水がないことを確認することが必須です。',oex:['正解。水圧試験による漏水確認はどちらにも必須です。','不正解。露出配管は支持金具で固定が必要です。','不正解。露出配管では凍結防止の保温が必要な場合があります。','不正解。管の色は管種により決まっています。']}];

function getHint(q){if(q.h)return q.h;const f=q.ex.split('。')[0];let h=f;const ct=q.o[q.a];if(ct&&h.includes(ct))h=h.replace(ct,'○○○');if(h.length>50)h=h.substring(0,50)+'…';else h+='。';return h;}

function startQuiz(genre,count){let pool=genre===-1?[...ALL_QUESTIONS]:ALL_QUESTIONS.filter(q=>q.genre===genre);if(selectedDiff>0)pool=pool.filter(q=>q.d===selectedDiff);if(pool.length===0){alert('該当する問題がありません。条件を変更してください。');return;}questions=shuffle(pool).slice(0,count);currentIdx=0;score=0;genreStats={};GENRES.forEach((_,i)=>{genreStats[i]={c:0,t:0};});document.getElementById('startScreen').style.display='none';document.getElementById('resultScreen').style.display='none';document.getElementById('quizScreen').style.display='block';document.getElementById('qTotal').textContent=questions.length;window.scrollTo(0,0);showQuestion();}

function showQuestion(){const q=questions[currentIdx];answered=false;document.getElementById('qNum').textContent=currentIdx+1;document.getElementById('progressBar').style.width=(currentIdx/questions.length*100)+'%';document.getElementById('scoreCount').textContent=score;const ge=document.getElementById('qGenre');ge.textContent=GENRES[q.genre].icon+' '+GENRES[q.genre].name;ge.className='genre-badge '+GENRES[q.genre].cls;document.getElementById('qDifficulty').textContent='★'.repeat(q.d)+'☆'.repeat(3-q.d);document.getElementById('questionText').textContent=q.q;const ia=document.getElementById('questionImage'),ie=document.getElementById('questionImg');if(q.img){ie.src=q.img;ie.onerror=function(){ia.className='question-image';};ia.className='question-image show';}else{ie.src='';ia.className='question-image';}document.getElementById('resultBadge').className='result-badge';document.getElementById('resultBadge').textContent='';const hb=document.getElementById('hintBtn'),ht=document.getElementById('hintText');hb.disabled=false;hb.textContent='💡 ヒントを見る';ht.className='hint-text';ht.innerHTML='';document.querySelectorAll('.option-explanation').forEach(el=>el.remove());const opts=document.getElementById('optionsContainer');opts.innerHTML='';q.o.forEach((text,i)=>{const btn=document.createElement('button');btn.className='option-btn';btn.innerHTML=`<span class="option-label">${optLabels[i]}</span><span>${text}</span>`;btn.addEventListener('click',()=>selectAnswer(i,q));opts.appendChild(btn);});document.getElementById('explanation').className='explanation';document.getElementById('explanation').innerHTML='';document.getElementById('nextBtn').className='nav-btn';}

let wrongQuestions=[];
function selectAnswer(ci,q){if(answered)return;answered=true;const btns=document.querySelectorAll('.option-btn');const ok=(ci===q.a);if(genreStats[q.genre])genreStats[q.genre].t++;const badge=document.getElementById('resultBadge');if(ok){score++;if(genreStats[q.genre])genreStats[q.genre].c++;btns[ci].classList.add('correct');badge.textContent='⭕ 正解！';badge.className='result-badge correct show';}else{btns[ci].classList.add('wrong');btns[q.a].classList.add('correct');badge.textContent='❌ 不正解';badge.className='result-badge wrong show';wrongQuestions.push({q:q.q,correct:q.o[q.a],chosen:q.o[ci],ex:q.ex,genre:q.genre});}btns.forEach(b=>b.disabled=true);if(q.oex&&q.oex.length===q.o.length){const oc=document.getElementById('optionsContainer');oc.querySelectorAll('.option-btn').forEach((btn,i)=>{const d=document.createElement('div');d.className='option-explanation show '+(i===q.a?'correct-exp':'wrong-exp');d.textContent=(i===q.a?'✓ ':'✗ ')+q.oex[i];btn.after(d);});}const expEl=document.getElementById('explanation');expEl.innerHTML='<strong>📌 解説：</strong>'+q.ex;expEl.classList.add('show');document.getElementById('nextBtn').classList.add('show');document.getElementById('scoreCount').textContent=score;}

document.getElementById('hintBtn').addEventListener('click',()=>{const q=questions[currentIdx];const ht=document.getElementById('hintText'),hb=document.getElementById('hintBtn');ht.innerHTML='💡 '+getHint(q);ht.classList.add('show');hb.disabled=true;hb.textContent='ヒント表示済み';});
document.getElementById('nextBtn').addEventListener('click',()=>{currentIdx++;if(currentIdx>=questions.length)showResult();else{showQuestion();window.scrollTo(0,0);}});
document.getElementById('quitBtn').addEventListener('click',()=>{if(confirm('トップに戻りますか？（進捗はリセットされます）')){document.getElementById('quizScreen').style.display='none';document.getElementById('startScreen').style.display='block';window.scrollTo(0,0);}});
document.getElementById('stopBtn').addEventListener('click',()=>{if(confirm('ここまでの結果を表示しますか？')){questions=questions.slice(0,currentIdx+(answered?1:0));showResult();}});

function showResult(){document.getElementById('quizScreen').style.display='none';document.getElementById('resultScreen').style.display='block';window.scrollTo(0,0);
// 間違えた問題を保存
saveWrongQuestions();
const total=questions.length;const pct=Math.round(score/total*100);document.getElementById('finalScore').textContent=score;document.getElementById('finalTotal').textContent=`/ ${total}問中正解`;let rank='';if(pct>=90)rank='🏆 最優秀！素晴らしい実力です！';else if(pct>=70)rank='🎯 合格レベル！さらに上を目指しましょう！';else if(pct>=50)rank='📖 もう少し！復習して再挑戦を！';else rank='💪 基礎からしっかり学習しましょう！';document.getElementById('finalRank').textContent=rank;const bd=document.getElementById('resultBreakdown');bd.innerHTML='';GENRES.forEach((g,i)=>{const s=genreStats[i];if(s&&s.t>0){const div=document.createElement('div');div.className='breakdown-item';div.innerHTML=`<span class="val">${s.c}/${s.t}</span>${g.icon} ${g.name}`;bd.appendChild(div);}});saveHistory(total,score,pct);}
function saveHistory(total,score,pct){try{const h=JSON.parse(localStorage.getItem('quizHistory')||'[]');h.push({date:new Date().toISOString(),genre:selectedGenre,total,score,pct});if(h.length>100)h.splice(0,h.length-100);localStorage.setItem('quizHistory',JSON.stringify(h));}catch(e){}}
function getHistory(){try{return JSON.parse(localStorage.getItem('quizHistory')||'[]');}catch(e){return [];}}

document.querySelectorAll('.genre-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.genre-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedGenre=parseInt(btn.dataset.genre);});});
document.querySelectorAll('.count-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('.count-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedCount=parseInt(btn.dataset.count);});});
document.querySelectorAll('#diffSelector .count-btn').forEach(btn=>{btn.addEventListener('click',()=>{document.querySelectorAll('#diffSelector .count-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');selectedDiff=parseInt(btn.dataset.diff);});});
document.getElementById('startBtn').addEventListener('click',()=>{
  const name=document.getElementById('userNameInput').value.trim();
  if(!name){alert('フルネームを漢字で入力してください。');return;}
  const kanjiRegex=/^[\u4E00-\u9FFF\u3400-\u4DBF]+$/u;
  if(!kanjiRegex.test(name)){alert('フルネームを漢字で入力してください。（例：荒木稜）');return;}
  localStorage.setItem('userName',name);
  wrongQuestions=[];startQuiz(selectedGenre,selectedCount);
});
document.getElementById('retryBtn').addEventListener('click',()=>{startQuiz(selectedGenre,selectedCount);});
document.getElementById('backBtn').addEventListener('click',()=>{document.getElementById('resultScreen').style.display='none';document.getElementById('startScreen').style.display='block';window.scrollTo(0,0);});
updateGenreCounts();

const GLOSSARY = [{"term":"VU管","cat":"管種","desc":"薄肉の硬質塩化ビニル管。主に排水・通気管に使用。VP管より肉薄で安価だが耐圧性は低い。"},{"term":"VP管","cat":"管種","desc":"一般用の硬質塩化ビニル管。VU管より肉厚が厚く、給水管・排水管に広く使用される。"},{"term":"HIVP管","cat":"管種","desc":"耐衝撃性硬質塩化ビニル管。VP管に耐衝撃性を持たせた管で、給水管に使用。色は暗い青灰色。"},{"term":"HT管","cat":"管種","desc":"耐熱性硬質塩化ビニル管。90℃程度の高温排水に対応。熱伸縮が非常に大きいため固定方法に注意が必要。色は茶色。"},{"term":"架橋ポリエチレン管","cat":"管種","desc":"ポリエチレンを架橋処理した樹脂管。柔軟で曲げ配管が可能。給水・給湯の両方に使用でき、耐熱・耐圧性に優れる。"},{"term":"ポリブデン管","cat":"管種","desc":"柔軟性と耐熱性に優れた樹脂管。給湯配管や床暖房パネル配管に適している。架橋ポリより柔らかい。"},{"term":"銅管","cat":"管種","desc":"熱伝導性・耐食性に優れた金属管。給湯管に多く使用。ろう付け（はんだ付け）で接合する。K/L/Mの3種類で肉厚が異なる。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/77/Rorskararemedror.jpg/330px-Rorskararemedror.jpg"},{"term":"ステンレス管","cat":"管種","desc":"SUS304/316等のステンレス鋼管。赤水が出ず衛生性が高い。プレス接合が主流。食品工場・医療施設で多用。"},{"term":"ライニング鋼管","cat":"管種","desc":"鋼管の内面に塩ビ等の樹脂をコーティングした管。錆や赤水を防ぐ。SGP-VL、SGP-PL等の種類がある。"},{"term":"ダクタイル鋳鉄管（DIP）","cat":"管種","desc":"球状黒鉛鋳鉄管。高強度で水道本管に使用。メカニカル継手で接合。非常に重いため2名以上で作業。"},{"term":"HDPE管","cat":"管種","desc":"高密度ポリエチレン管。耐薬品性・耐食性に優れ可撓性がある。EF（電気融着）接合で接合。地中埋設に多用。"},{"term":"耐火二層管","cat":"管種","desc":"塩ビ管の外側を繊維モルタルで被覆した管。防火区画貫通部に使用でき、排水管として広く使われる。"},{"term":"ボール弁","cat":"バルブ","desc":"球体の弁体を90度回転させて開閉する弁。1/4回転で全開・全閉が可能で操作が素早い。圧力損失が少ない。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/5/58/Ball.PNG/330px-Ball.PNG"},{"term":"ゲート弁（仕切弁）","cat":"バルブ","desc":"板状の弁体を上下させて開閉する弁。全開時の圧力損失が小さいが、多回転が必要で開閉に時間がかかる。"},{"term":"グローブ弁（玉形弁）","cat":"バルブ","desc":"弁体がディスク状で流量の微調整に優れた弁。圧力損失は大きいが精密な制御が可能。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Carbon_steel_globe_valve.jpg/330px-Carbon_steel_globe_valve.jpg"},{"term":"バタフライ弁","cat":"バルブ","desc":"円板を回転させる弁。大口径でも軽量・コンパクト。空調・冷却水の大口径管に多用される。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d5/Yagisawa_power_station_inlet_valve.jpg/330px-Yagisawa_power_station_inlet_valve.jpg"},{"term":"逆止弁（チェック弁）","cat":"バルブ","desc":"流体の逆流を防止する弁。スイング式・リフト式等がある。設置方向に注意が必要。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/2/25/Inconel-Tilting_disc_check_valve--The-Alloy-Valve-Stockist.JPG/330px-Inconel-Tilting_disc_check_valve--The-Alloy-Valve-Stockist.JPG"},{"term":"減圧弁","cat":"バルブ","desc":"上流側の高い圧力を下流側で一定の低い圧力に調整する弁。給水圧力が高い場合に使用。"},{"term":"ボールタップ","cat":"バルブ","desc":"浮き球の上下により弁を開閉し、水位を自動制御する装置。受水槽やトイレのロータンクに使用。"},{"term":"定水位弁","cat":"バルブ","desc":"ボールタップの信号により大口径の弁を開閉し、受水槽の水位を一定に制御する装置。大型受水槽用。"},{"term":"エルボ","cat":"継手","desc":"配管の方向を変えるL字型の継手。45°と90°がある。"},{"term":"チーズ（T字継手）","cat":"継手","desc":"直管からT字に分岐するための継手。同径チーズと異径チーズがある。"},{"term":"レジューサー","cat":"継手","desc":"管径を変更する異径継手。同心と偏心がある。"},{"term":"ユニオン","cat":"継手","desc":"配管の途中で容易に脱着できる継手。機器接続部やメンテナンス箇所に使用。"},{"term":"フランジ","cat":"継手","desc":"ボルトで締結する継手。対角方向に均等に締め付ける。大口径管や機器接続に使用。"},{"term":"バルブソケット（VS）","cat":"継手","desc":"片方がTS接合（塩ビ）、もう片方がねじ接合の異種管接合継手。"},{"term":"インクリーザー（IN）","cat":"継手","desc":"管の口径を変更する継手。レジューサーと同義で使われることもある。"},{"term":"パイプカッター","cat":"工具","desc":"管を切断するための工具。回転させながら徐々に切り込みを入れる。塩ビカッターは刃で直接切断する。"},{"term":"パイプレンチ","cat":"工具","desc":"管やねじ込み継手を回すための工具。歯がかみ合い管を挟んで回す。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b1/Ridgid_10%22_pipe_wrench.jpg/330px-Ridgid_10%22_pipe_wrench.jpg"},{"term":"モンキーレンチ","cat":"工具","desc":"口幅を無段階に調整できる汎用レンチ。スパナは固定幅。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/Coes_monkey_wrench.jpg/330px-Coes_monkey_wrench.jpg"},{"term":"トルクレンチ","cat":"工具","desc":"締め付けトルクを管理する工具。フランジボルト等を規定値で締め付ける。"},{"term":"水平器（レベル）","cat":"工具","desc":"配管の勾配や水平を確認するための工具。気泡式・レーザー・デジタル式がある。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/ba/DetalleNivelDeBurbuja.jpg/330px-DetalleNivelDeBurbuja.jpg"},{"term":"ねじ切り機","cat":"工具","desc":"鋼管にねじを切るための機械。電動式と手動式がある。リードバイス付きダイヘッドで切削。"},{"term":"トーチランプ","cat":"工具","desc":"ガスの炎で加熱する工具。銅管のろう付けや凍結管の解凍に使用。プロパン/ブタンガス。"},{"term":"リーマー","cat":"工具","desc":"管の切断面のバリ（かえり）を除去し面取りをする工具。"},{"term":"ハンマードリル","cat":"工具","desc":"回転+打撃でコンクリートに穴をあける工具。アンカー取付等に使用。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/b8/Hammer_drill-1.jpg/330px-Hammer_drill-1.jpg"},{"term":"Pトラップ","cat":"排水","desc":"壁排水に対応したP字型のトラップ。洗面器・浴槽等に広く使用される。"},{"term":"Sトラップ","cat":"排水","desc":"床排水に対応したS字型のトラップ。自己サイホンによる破封が起きやすい。"},{"term":"グリーストラップ","cat":"排水","desc":"厨房排水から油脂・残渣を分離する阻集器。バスケット→仕切り板→トラップの3槽構造。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/1/18/Grease_trap_for_greywater_%285293658840%29.jpg/330px-Grease_trap_for_greywater_%285293658840%29.jpg"},{"term":"インバート桝","cat":"排水","desc":"排水桝の底部に半円形の溝（水路）を設けた桝。排水をスムーズに流す構造。"},{"term":"掃除口（CO）","cat":"排水","desc":"排水管の清掃・点検用の開口部。管の屈曲部や30m以内ごとに設置。"},{"term":"通気管","cat":"排水","desc":"トラップの封水保護と排水の円滑化のために設ける管。管内の気圧変動を緩和する。"},{"term":"排水トラップ","cat":"排水","desc":"封水（5～10cm）により下水臭気の逆流を防ぐ装置。各衛生器具に設置。"},{"term":"消火器（ABC粉末）","cat":"消防","desc":"リン酸アンモニウムを主成分とする最も一般的な消火器。普通火災(A)・油火災(B)・電気火災(C)に対応。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Wheeled_fire_extinguisher.jpg/330px-Wheeled_fire_extinguisher.jpg"},{"term":"屋内消火栓","cat":"消防","desc":"建物内に設置する消火設備。1号（130L/min、2名操作）と2号（60L/min、1名操作）がある。"},{"term":"スプリンクラーヘッド","cat":"消防","desc":"火災時の熱で自動的に開放し放水する装置。72℃（無色）、96℃（黄）、139℃（赤）等の温度区分がある。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/7/76/Fire_sprinkler_roof_mount_side_view.jpg/330px-Fire_sprinkler_roof_mount_side_view.jpg"},{"term":"差動式スポット型感知器","cat":"消防","desc":"周囲温度の急激な上昇を感知して作動する熱感知器。居室・事務室等に設置。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/8/8b/Residential_heat_detector.jpg/330px-Residential_heat_detector.jpg"},{"term":"定温式スポット型感知器","cat":"消防","desc":"一定温度に達すると作動する感知器。厨房・ボイラー室等の常時高温の場所に適する。"},{"term":"光電式スポット型感知器","cat":"消防","desc":"煙による光の散乱を検知する煙感知器。階段・廊下等に設置。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Smoke_detector.JPG/330px-Smoke_detector.JPG"},{"term":"誘導灯","cat":"消防","desc":"避難経路を示す照明設備。避難口誘導灯・通路誘導灯・階段通路誘導灯がある。非常電源20分以上。"},{"term":"連結送水管","cat":"消防","desc":"消防隊が消防ポンプ車から送水し上階で放水するための設備。送水口65mm。"},{"term":"緩降機","cat":"消防","desc":"ロープを使って一定速度（0.5～1.5m/s）で降下する避難器具。"},{"term":"受水槽","cat":"貯水槽","desc":"水道本管から供給された水を一時的に貯留するタンク。有効容量は1日使用水量の約1/2が目安。"},{"term":"高置水槽","cat":"貯水槽","desc":"建物の屋上等に設置し重力で給水する水槽。有効容量は1日使用水量の約1/10。"},{"term":"簡易専用水道","cat":"貯水槽","desc":"受水槽の有効容量が10m³を超える水道設備。年1回の清掃と登録検査機関による検査が義務。"},{"term":"FRP製受水槽","cat":"貯水槽","desc":"繊維強化プラスチック製のパネル型受水槽。軽量・耐食性に優れるが紫外線に弱い。"},{"term":"次亜塩素酸ナトリウム","cat":"貯水槽","desc":"貯水槽の消毒に使用する薬品。有効塩素濃度50～100mg/Lで30分以上接触させる。"},{"term":"残留塩素","cat":"貯水槽","desc":"水道水中に残留する塩素。遊離残留塩素0.1mg/L以上が基準。殺菌効果の指標。"},{"term":"電極棒","cat":"貯水槽","desc":"受水槽の水位を電気的に検知するセンサー。ポンプ発停や満水・減水警報を制御。"},{"term":"消火栓ポンプ","cat":"消防","desc":"消火栓やスプリンクラーに水を供給する加圧送水ポンプ。消火栓箱内の起動ボタンで起動する。"},{"term":"アラーム弁（流水検知装置）","cat":"消防","desc":"スプリンクラー配管内の水流動を検知して警報を発する装置。SPヘッド開放時に作動する。"},{"term":"P型受信機","cat":"消防","desc":"火災報知設備の受信機。共通信号方式で警戒区域単位の火災表示を行う。1級〜3級がある。"},{"term":"R型受信機","cat":"消防","desc":"火災報知設備の受信機。各感知器にアドレスを割り当て、個別識別で火災場所を特定できる高機能型。"},{"term":"発信機","cat":"消防","desc":"火災を発見した人が手動で火災信号を送るための押しボタン装置。床面から0.8〜1.5mに設置。"},{"term":"防火管理者","cat":"消防","desc":"建物の防火管理業務を行う責任者。消防計画の作成・届出、避難訓練の実施等を担当。甲種・乙種の2種類。"},{"term":"甲種消防設備士","cat":"消防","desc":"消防設備の設置工事・整備・点検ができる資格。類別（1〜5類）ごとに対象設備が異なる。"},{"term":"乙種消防設備士","cat":"消防","desc":"消防設備の整備・点検ができる資格（設置工事は不可）。6類（消火器）、7類（漏電火災警報器）は乙種のみ。"},{"term":"防火対象物","cat":"消防","desc":"消防法の規制対象となる建築物等の総称。特定防火対象物（不特定多数利用）と非特定に区分される。"},{"term":"予作動式スプリンクラー","cat":"消防","desc":"感知器の信号で予作動弁を開放し、さらにヘッドが熱で開放して放水する二重条件方式。誤放水防止に優れる。"},{"term":"泡消火設備","cat":"消防","desc":"泡で油面を覆い酸素を遮断して消火する設備。駐車場・航空機格納庫・危険物施設等に設置。"},{"term":"非常コンセント","cat":"消防","desc":"火災時に消防隊が照明器具や排煙機等の電源として使用する設備。階段室等に設置。"},{"term":"防排煙設備","cat":"消防","desc":"防煙壁で煙の拡散を防ぎ、排煙設備で煙を排出して避難経路を確保する設備。"},{"term":"連結散水設備","cat":"消防","desc":"地下街・地下駐車場等に設置。消防隊が送水口から送水し、天井の散水ヘッドから放水する設備。"},{"term":"ハロゲン化物消火設備","cat":"消防","desc":"ハロゲン化物ガスで消火する設備。電気設備に安全で汚損が少ない。環境負荷（オゾン層）の問題あり。"},{"term":"蓄圧式消火器","cat":"消防","desc":"常時ガスで内部加圧されている消火器。圧力ゲージ（指示圧力計）で圧力を常時確認可能。"},{"term":"加圧式消火器","cat":"消防","desc":"使用時にレバーで内部のガスボンベを破封して加圧する消火器。圧力ゲージはない。"},{"term":"強化液消火器","cat":"消防","desc":"炭酸カリウム等のアルカリ金属塩水溶液を放射する消火器。冷却・浸透効果に優れ再燃防止に有効。"},{"term":"末端試験弁","cat":"消防","desc":"SP配管の最末端に設置し、最も水圧が低い条件での放水圧力・放水量を確認するための試験弁。"},{"term":"排水横枝管","cat":"排水","desc":"各衛生器具のトラップから排水立て管に接続するまでの水平方向の排水管。"},{"term":"排水横主管","cat":"排水","desc":"排水立て管の最下部から建物外の最終桝までを結ぶ横走りの排水管。"},{"term":"排水立て管","cat":"排水","desc":"建物内を垂直に通る排水の幹線管。各階の排水横枝管が接続される。"},{"term":"最終桝（公共桝）","cat":"排水","desc":"建物敷地内の排水を取りまとめ公共下水道本管に接続する最後の排水桝。"},{"term":"封水","cat":"排水","desc":"排水トラップ内に溜まった水。5〜10cmの深さで下水臭気の逆流を防ぐ。蒸発や破封に注意。"},{"term":"破封","cat":"排水","desc":"トラップの封水が失われる現象。自己サイホン・誘導サイホン・蒸発等が原因。下水臭の逆流を招く。"},{"term":"DFU（器具排水負荷単位）","cat":"排水","desc":"各衛生器具の排水負荷を数値化した単位。排水管の管径決定に使用。洗面器=1、大便器=4等。"},{"term":"ノーハブ継手","cat":"排水","desc":"ハブ（受口）がない鋳鉄管をゴムカップリングとステンレスバンドで接合する継手。施工が容易。"},{"term":"木根侵入","cat":"排水","desc":"地中の排水管の接合部や亀裂から樹木の根が侵入し、管内で成長して閉塞させる現象。"},{"term":"逆噴射ノズル","cat":"排水","desc":"後方に水を噴射する高圧洗浄ノズル。推進力でホースが自走しながら管壁を洗浄する。"},{"term":"貫通ノズル","cat":"排水","desc":"前方に強力な水流を集中させ、詰まりの貫通・除去に特化した高圧洗浄ノズル。"},{"term":"ドレンクリーナー","cat":"排水","desc":"回転するワイヤーで排水管の詰まりを物理的に除去する工具。スネークとも呼ばれる。"},{"term":"CIPP工法","cat":"排水","desc":"Cured-In-Place Pipe。樹脂含浸ライナーを管内に反転挿入し現場硬化させる管更生工法。"},{"term":"管内コーティング工法","cat":"排水","desc":"既設排水管の内面にエポキシ樹脂を塗布して管を再生する更生工法。管を撤去せず施工可能。"},{"term":"超音波肉厚測定","cat":"排水","desc":"管壁に超音波を当てて残存肉厚を非破壊で測定する方法。腐食による減肉の程度を診断。"},{"term":"尿石","cat":"排水","desc":"尿中のカルシウムが排水管やトイレ内に堆積した硬い付着物。酸性洗浄剤で除去。"},{"term":"脂肪酸カルシウム","cat":"排水","desc":"油脂と水中のカルシウムが反応して生成される石鹸状の硬い付着物。除去が困難。"},{"term":"管閉塞率","cat":"排水","desc":"排水管断面のうち付着物で塞がれている割合。カメラ調査等で確認し清掃の必要性を判断。"},{"term":"マニフェスト","cat":"排水","desc":"産業廃棄物管理票。排水管清掃の汚泥処理で運搬・処分の流れを追跡し不法投棄を防止。"},{"term":"BOD","cat":"排水","desc":"生物化学的酸素要求量。微生物が有機物を分解する際に消費する酸素量。排水の汚染度指標。"},{"term":"SS","cat":"排水","desc":"浮遊物質量（Suspended Solids）。排水中に浮遊する微細な固形物の量。水質汚濁の指標。"},{"term":"オーバーフロー管","cat":"貯水槽","desc":"受水槽が満水時に余剰水を排出する管。先端には防虫網を設置。間接排水とする。"},{"term":"水抜き管","cat":"貯水槽","desc":"受水槽底部に設け、清掃時に槽内の水を完全に排出するための管。底部最低部に設置。"},{"term":"吐水口空間","cat":"貯水槽","desc":"給水管の吐水口と受水槽のオーバーフロー水面との間に確保する垂直距離。逆サイホン防止用。"},{"term":"防虫網","cat":"貯水槽","desc":"通気管・オーバーフロー管の先端に設置する16メッシュ以上の網。虫・小動物の侵入防止。"},{"term":"6面点検","cat":"貯水槽","desc":"受水槽の上下左右前後6面全てに点検空間を確保すること。上部100cm以上、側面・底部60cm以上。"},{"term":"DPD試薬","cat":"貯水槽","desc":"残留塩素の測定に使用する試薬。遊離残留塩素と反応してピンク色に発色する。比色で濃度測定。"},{"term":"クリプトスポリジウム","cat":"貯水槽","desc":"塩素消毒に強い耐性を持つ原虫。感染すると激しい下痢を引き起こす。紫外線処理や膜ろ過が有効。"},{"term":"トリハロメタン","cat":"貯水槽","desc":"塩素消毒の副生成物（クロロホルム等）。水質基準は総トリハロメタン0.1mg/L以下。"},{"term":"レジオネラ属菌","cat":"貯水槽","desc":"20〜45℃で繁殖する細菌。感染すると重篤な肺炎を引き起こす。貯湯温度60℃以上で防止。"},{"term":"酸素欠乏症","cat":"貯水槽","desc":"密閉空間で酸素濃度が18%未満になると発症。貯水槽や排水槽の作業で注意。死亡事故の原因。"},{"term":"緊急遮断弁","cat":"貯水槽","desc":"地震感知器と連動し、地震時に自動的に給水管を遮断して受水槽の水を確保する弁。"},{"term":"ポンプ直送方式","cat":"貯水槽","desc":"受水槽から加圧ポンプで各階に直接給水する方式。高置水槽が不要で省スペース。"},{"term":"直結増圧方式","cat":"貯水槽","desc":"水道本管から増圧ポンプで直接給水する方式。受水槽が不要になり水質向上・省スペース。"},{"term":"インバーター制御","cat":"貯水槽","desc":"ポンプの回転数を需要に応じて可変制御する方式。省エネ・低騒音・安定水圧を実現。"},{"term":"レシプロソー","cat":"工具","desc":"往復刃で金属・樹脂・木材を切断する電動工具。狭い場所での既存管の切断・解体に有効。"},{"term":"グラインダー","cat":"工具","desc":"鋼管等の切断・研磨・バリ取りに使用する回転砥石式の電動工具。ディスクグラインダーとも。"},{"term":"電動インパクトドライバー","cat":"工具","desc":"回転に打撃（インパクト）機構を加えた電動工具。長ビスや固いネジの強力な締付に使用。"},{"term":"パイプベンダー","cat":"工具","desc":"配管を任意の角度に曲げるための工具。銅管・鉄管等の曲げ加工に使用。"},{"term":"インサート","cat":"工具","desc":"コンクリート打設前に型枠に設置し、配管の吊りボルト等を取り付けるための埋め込み金物。"},{"term":"ストレーナー（Yストレーナー）","cat":"工具","desc":"流体中の異物（ゴミ・サビ）を金網で捕捉する装置。機器や弁を保護。定期清掃が必要。"},{"term":"HT管（耐熱塩ビ管）","cat":"管種","desc":"耐熱性硬質塩化ビニル管。90℃程度の高温排水に対応。熱伸縮が大きく固定方法に注意。色は茶色。"},{"term":"鋳鉄管","cat":"排水","desc":"遮音性・耐火性に優れた金属管。排水立て管等に使用。重量があり2名以上で作業。ノーハブ継手で接合。"},{"term":"絶縁抵抗","cat":"点検","desc":"配線の絶縁状態を示す値。MΩ（メグオーム）で測定。1MΩ以上が正常の目安。低下は漏電リスク。"},{"term":"メガー","cat":"点検","desc":"絶縁抵抗計。500V/1000Vの直流電圧を印加して配線の絶縁抵抗を測定する計測器。","img":"https://upload.wikimedia.org/wikipedia/commons/thumb/b/bd/M1101M.jpg/330px-M1101M.jpg"},{"term":"クランプメーター","cat":"点検","desc":"配線を挟むだけで電流を非接触に測定できる計測器。ポンプの電流値測定に使用。"},{"term":"マグネットSSC","cat":"点検","desc":"電磁接触器。電磁石の力で接点を開閉しモーターを制御する装置。接点の摩耗・焼損を点検。"},{"term":"グランドパッキン","cat":"点検","desc":"ポンプ軸封部の密封材。軸とケーシングの隙間を塞ぐ。毎分数滴の漏水は冷却潤滑のため正常。"},{"term":"メカニカルシール","cat":"点検","desc":"精密加工された摺動面でポンプ軸を密封する方式。グランドパッキンより漏水が少なくメンテナンス性に優れる。"},{"term":"カップリング","cat":"点検","desc":"ポンプ軸とモーター軸を接続する部品。摩耗するとガタつき・振動・異音が発生。定期的な点検が必要。"},{"term":"フート弁","cat":"点検","desc":"ポンプ吸込管の最下部に設置する逆止弁。ポンプ停止時の落水を防ぎ呼水状態を保持する。"},{"term":"圧力スイッチ","cat":"点検","desc":"配管内の圧力変動を検知してポンプの起動・停止を制御するスイッチ。起動圧力と停止圧力を設定。"},{"term":"逆流防止器","cat":"点検","desc":"飲料水の逆流汚染を防ぐ装置。第一逆止弁・第二逆止弁・逃し弁で構成。差圧をkPaで測定。"},{"term":"圧力タンク","cat":"点検","desc":"密閉タンク内の空気圧で給水圧力を維持する装置。封入圧（空気圧）をMPaで管理。"},{"term":"判定マーク","cat":"点検","desc":"点検報告書の判定表記。○＝異常なし、△＝経過観察、×＝要改善、／＝該当なしが標準。"},{"term":"全揚程","cat":"点検","desc":"ポンプが水を押し上げる能力。実揚程＋配管摩擦損失の合計値（m）。ポンプ選定の重要仕様。"},{"term":"湧水ポンプ","cat":"点検","desc":"地下に湧き出す地下水を排水ピットから汲み上げて排出するポンプ。"},{"term":"汚水ポンプ","cat":"点検","desc":"トイレ等のし尿を含む汚水を排出する専用ポンプ。固形物対応の構造（ノンクロッグ等）。"},{"term":"雑排水ポンプ","cat":"点検","desc":"厨房・浴室・洗面等のし尿を含まない生活排水を排出するポンプ。"},{"term":"二重式逆流防止器","cat":"点検","desc":"第一・第二逆止弁による二重の逆流防止構造。点検報告書では逆止弁の差圧を記載。"},{"term":"封入圧","cat":"点検","desc":"圧力タンク内の空気圧力（MPa）。低下すると給水圧力が不安定になるため定期的に確認・補充。"},{"term":"スランプ","cat":"コンクリート","desc":"フレッシュコンクリートの軟らかさを示す指標。スランプコーンを引き抜いた後のコンクリートの沈下量（cm）で測定。"},{"term":"水セメント比（W/C）","cat":"コンクリート","desc":"コンクリート中の水とセメントの質量比。小さいほど強度が高く耐久性に優れるが、施工性は低下する。"},{"term":"養生","cat":"コンクリート","desc":"コンクリート打設後に適切な温度・湿度を保ち硬化を促進する作業。湿潤養生が基本で普通セメントは5日以上。"},{"term":"ブリーディング","cat":"コンクリート","desc":"コンクリート打設後に固体材料が沈降し、水が表面に浮き上がる現象。過大だと品質低下の原因。"},{"term":"コールドジョイント","cat":"コンクリート","desc":"先打ちと後打ちのコンクリートが一体化しない不良な継目。打ち重ね時間の超過が原因。"},{"term":"レイタンス","cat":"コンクリート","desc":"ブリーディング水とともに浮き上がったセメント微粒子による脆弱な層。打継ぎ前に除去が必要。"},{"term":"AE剤","cat":"コンクリート","desc":"微細な空気泡をコンクリート中に連行する混和剤。凍結融解抵抗性とワーカビリティーが向上する。"},{"term":"かぶり厚さ","cat":"コンクリート","desc":"鉄筋を覆うコンクリートの厚さ。鉄筋を腐食や火災から保護し構造物の耐久性を確保する重要な要素。"},{"term":"N値","cat":"土木","desc":"標準貫入試験で得られる地盤の硬さの指標。63.5kgのハンマーを76cm落下させ30cm貫入に要する打撃回数。"},{"term":"CBR","cat":"土木","desc":"California Bearing Ratio。路盤材料の支持力を評価する指標。舗装設計に使用。"},{"term":"法面（のりめん）","cat":"土木","desc":"切土や盛土で生じる傾斜面。勾配は地質により異なり、硬岩は急勾配、砂は緩勾配が標準。"},{"term":"ウェルポイント工法","cat":"土木","desc":"掘削周辺に井戸管を設置し真空ポンプで排水して地下水位を低下させる工法。"},{"term":"高力ボルト","cat":"鉄骨","desc":"鉄骨の現場接合に最も多く用いられる接合方法。締付け力で摩擦力を利用して応力を伝達する。"},{"term":"ダイアフラム","cat":"鉄骨","desc":"柱梁接合部に設置する鋼板。梁フランジからの応力を柱に確実に伝達する重要な部材。"},{"term":"耐火被覆","cat":"鉄骨","desc":"鉄骨が火災時に強度低下するのを防ぐ被覆。約500℃で強度半減するため必須。吹付け・巻付け等。"},{"term":"サドル付分水栓","cat":"給水装置","desc":"配水管を断水させずに分岐工事ができる分水栓。管の上部側面に取付け、穿孔機で穴を開ける。"},{"term":"バキュームブレーカ","cat":"給水装置","desc":"管内が負圧になった際に空気を吸入し、逆サイホン作用による逆流を防止する装置。"},{"term":"直結増圧式","cat":"給水装置","desc":"増圧ポンプを使用して配水管から直結で中高層建物に給水する方式。受水槽が不要。"},{"term":"オームの法則","cat":"電気","desc":"V=IR。電圧＝電流×抵抗。電気回路の基本法則。"},{"term":"漏電遮断器（ELCB）","cat":"電気","desc":"漏電を検出して回路を遮断する装置。住宅用は30mA・0.1秒以内動作が一般的。"},{"term":"接地工事","cat":"電気","desc":"漏電時の感電防止のため機器を大地に接続する工事。A種(10Ω)・C種(10Ω)・D種(100Ω)がある。"},{"term":"リングスリーブ","cat":"電気","desc":"電線同士を圧着接続する金属製の筒。圧着マーク（○・小・中）で接続を識別。"},{"term":"VVFケーブル","cat":"電気","desc":"ビニル絶縁ビニルシースケーブル平形。住宅の屋内配線に最も多く使用。2芯(黒白)と3芯(黒白赤)。"},{"term":"三路スイッチ","cat":"電気","desc":"2箇所から1つの照明をON/OFFするスイッチ。階段の上下等に設置。"},{"term":"力率（cosθ）","cat":"電気","desc":"交流回路で有効電力と皮相電力の比。1.0に近いほど効率良い。進相コンデンサで改善。"},{"term":"石膏ボード","cat":"内装","desc":"壁・天井の下地材。壁用12.5mm、天井用9.5mmが標準。耐火性に優れる。"},{"term":"LGS（軽量鉄骨）","cat":"内装","desc":"壁・天井下地の軽量形鋼。ランナーとスタッドで構成。壁スタッド間隔は455mm。"},{"term":"グラスウール","cat":"内装","desc":"ガラス繊維の断熱材。住宅用は16K（16kg/m³）が一般的。使用温度上限約350℃。"},{"term":"ウレタン防水","cat":"内装","desc":"液状ウレタン樹脂で防水層を形成。塗膜厚3mm標準。複雑な形状に追従し継目がない。"},{"term":"野縁（のぶち）","cat":"内装","desc":"天井下地材。天井板やボードを留め付ける部材。吊りボルト→野縁受け→野縁の順。"},{"term":"全熱交換器","cat":"空調","desc":"排気の熱を給気に回収し換気の空調負荷を低減する省エネ装置。温度と湿度の両方を回収。"},{"term":"インバータ制御","cat":"空調","desc":"モーター回転数を周波数で制御する省エネ技術。風量の3乗に比例して動力変化。"},{"term":"COP","cat":"空調","desc":"成績係数。冷凍能力÷圧縮機動力。値が大きいほど効率良い。"},{"term":"ハインリッヒの法則","cat":"安全","desc":"1:29:300の法則。1件の重大事故の背後に29件の軽微事故、300件のヒヤリハット。"},{"term":"KY活動","cat":"安全","desc":"危険予知活動。作業前に危険を予測し対策を立てる。TBMで実施。"},{"term":"WBGT","cat":"安全","desc":"暑さ指数。31℃以上は危険レベル。熱中症予防の指標。"},{"term":"フルハーネス","cat":"安全","desc":"高さ2m以上で使用義務の墜落制止用器具。全身型で胴ベルト型より安全。"}];

// 用語辞典ロジック
const glossaryCats = [...new Set(GLOSSARY.map(g=>g.cat))];
let activeGlossaryCat = null;

function renderGlossaryCats(){
  const el = document.getElementById('glossaryCats');
  el.innerHTML = '<button class="glossary-cat-btn active" data-cat="">すべて</button>' +
    glossaryCats.map(c=>'<button class="glossary-cat-btn" data-cat="'+c+'">'+c+'</button>').join('');
  el.querySelectorAll('.glossary-cat-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      el.querySelectorAll('.glossary-cat-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      activeGlossaryCat = btn.dataset.cat || null;
      renderGlossaryList();
    });
  });
}

function renderGlossaryList(){
  const search = document.getElementById('glossarySearch').value.toLowerCase();
  let items = GLOSSARY.filter(g=>{
    if(activeGlossaryCat && g.cat !== activeGlossaryCat) return false;
    if(search && !g.term.toLowerCase().includes(search) && !g.desc.toLowerCase().includes(search)) return false;
    return true;
  });
  const el = document.getElementById('glossaryList');
  if(items.length === 0){ el.innerHTML='<div class="glossary-empty">該当する用語がありません</div>'; return; }
  el.innerHTML = items.map((g,i)=>{
    const imgHtml=g.img?'<img class="glossary-item-img" src="'+g.img+'" alt="'+g.term+'" onerror="this.style.display=\'none\'">':'';
    return '<div class="glossary-item"><div class="glossary-item-header" data-idx="'+i+'"><span>'+g.term+'<span class="glossary-item-tag genre-badge" style="font-size:10px;padding:2px 8px;">'+g.cat+'</span></span><span class="arrow">▶</span></div><div class="glossary-item-body">'+g.desc+imgHtml+'</div></div>';
  }).join('');
  el.querySelectorAll('.glossary-item-header').forEach(h=>{
    h.addEventListener('click',()=>{
      const body = h.nextElementSibling;
      const arrow = h.querySelector('.arrow');
      body.classList.toggle('show');
      arrow.classList.toggle('open');
    });
  });
}

document.getElementById('glossaryBtn').addEventListener('click',()=>{
  document.getElementById('startScreen').style.display='none';
  document.getElementById('glossaryScreen').style.display='block';
  renderGlossaryCats();
  renderGlossaryList();
});

document.getElementById('glossaryBack').addEventListener('click',()=>{
  document.getElementById('glossaryScreen').style.display='none';
  document.getElementById('startScreen').style.display='block';
});

document.getElementById('glossarySearch').addEventListener('input',()=>{ renderGlossaryList(); });

function renderManual(){
  const cats = MANUAL_DATA.map(m=>m.cat);
  const catsEl = document.getElementById('manualCats');
  let activeCat = null;
  catsEl.innerHTML = '<button class="glossary-cat-btn active" data-cat="">すべて</button>' +
    cats.map(c=>'<button class="glossary-cat-btn" data-cat="'+c+'">'+c+'</button>').join('');
  catsEl.querySelectorAll('.glossary-cat-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      catsEl.querySelectorAll('.glossary-cat-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      activeCat = btn.dataset.cat || null;
      renderManualItems(activeCat);
    });
  });
  renderManualItems(null);
}

function renderManualItems(cat){
  const el = document.getElementById('manualContent');
  let items = [];
  MANUAL_DATA.forEach(m=>{
    if(cat && m.cat !== cat) return;
    m.items.forEach(item=>items.push({...item,cat:m.cat}));
  });
  el.innerHTML = items.map(item=>
    '<div class="glossary-item"><div class="glossary-item-header"><span>'+item.title+'<span class="glossary-item-tag genre-badge" style="font-size:10px;padding:2px 8px;">'+item.cat+'</span></span><span class="arrow">▶</span></div><div class="glossary-item-body"><pre style="white-space:pre-wrap;font-family:inherit;margin:0;">'+item.content+'</pre></div></div>'
  ).join('');
  el.querySelectorAll('.glossary-item-header').forEach(h=>{
    h.addEventListener('click',()=>{
      const body = h.nextElementSibling;
      const arrow = h.querySelector('.arrow');
      body.classList.toggle('show');
      arrow.classList.toggle('open');
    });
  });
}

// 管理者ログイン
document.getElementById('adminBtn').addEventListener('click',()=>{
  const now=Date.now();
  if(now<_lockoutUntil){
    const remaining=Math.ceil((_lockoutUntil-now)/1000);
    alert('セキュリティロック中です。'+remaining+'秒後に再試行してください。');
    return;
  }
  const id=prompt('管理者IDを入力してください:');
  if(!id)return;
  const pw=prompt('パスワードを入力してください:');
  if(id===_AH.id&&pw===_AH.p){
    _loginAttempts=0;
    document.getElementById('startScreen').style.display='none';
    document.getElementById('adminScreen').style.display='block';
    window.scrollTo(0,0);
    renderAdminDashboard();
  }else{
    _loginAttempts++;
    if(_loginAttempts>=MAX_LOGIN_ATTEMPTS){
      _lockoutUntil=Date.now()+LOCKOUT_DURATION;
      _loginAttempts=0;
      alert('ログイン試行回数が上限に達しました。5分間ロックされます。');
    }else{
      alert('IDまたはパスワードが正しくありません。(残り試行回数: '+(MAX_LOGIN_ATTEMPTS-_loginAttempts)+')');
    }
  }
});

function renderAdminDashboard(){
  const data=JSON.parse(localStorage.getItem('allUsersData')||'{}');
  const el=document.getElementById('adminContent');
  const users=Object.keys(data);
  if(users.length===0){
    el.innerHTML='<div class="glossary-empty">まだユーザーデータがありません。</div>';
    return;
  }
  let html='<div class="start-card" style="text-align:left;">';
  html+='<h3 style="color:var(--accent);margin-bottom:16px;">👥 ユーザー一覧 ('+users.length+'名)</h3>';
  users.forEach(user=>{
    const records=data[user];
    const totalAttempts=records.length;
    const avgPct=Math.round(records.reduce((s,r)=>s+r.pct,0)/totalAttempts);
    const totalQ=records.reduce((s,r)=>s+r.total,0);
    const totalCorrect=records.reduce((s,r)=>s+r.score,0);
    const lastDate=new Date(records[records.length-1].date);
    const dateStr=lastDate.getFullYear()+'/'+(lastDate.getMonth()+1)+'/'+lastDate.getDate();
    const color=avgPct>=70?'var(--correct)':avgPct>=50?'var(--accent)':'var(--wrong)';
    html+='<div class="glossary-item" style="margin-bottom:8px;padding:14px 18px;">';
    html+='<div style="display:flex;justify-content:space-between;align-items:center;">';
    html+='<div><strong style="font-size:16px;">'+user+'</strong><br>';
    html+='<span style="font-size:12px;color:var(--text-muted);">挑戦回数: '+totalAttempts+'回 | 総問題数: '+totalQ+'問 | 最終: '+dateStr+'</span></div>';
    html+='<div style="text-align:right;"><span style="font-size:24px;font-weight:900;color:'+color+';font-family:Oswald;">'+avgPct+'%</span><br>';
    html+='<span style="font-size:12px;color:var(--text-muted);">平均正答率</span></div></div>';
    // 詳細
    html+='<details style="margin-top:8px;"><summary style="cursor:pointer;font-size:13px;color:var(--accent);">詳細を見る</summary>';
    html+='<div style="margin-top:8px;font-size:12px;">';
    records.slice().reverse().slice(0,20).forEach(r=>{
      const d=new Date(r.date);
      const ds=d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
      const gn=r.genre===-1?'全ジャンル':(GENRES[r.genre]?GENRES[r.genre].name:'不明');
      html+='<div style="padding:4px 0;border-bottom:1px solid var(--border);">'+ds+' | '+gn+' | '+r.score+'/'+r.total+' ('+r.pct+'%)';
      if(r.wrong&&r.wrong.length>0)html+=' | 不正解: '+r.wrong.length+'問';
      html+='</div>';
    });
    html+='</div></details></div>';
  });
  html+='</div>';
  el.innerHTML=html;
}

function renderHistory(){
  const h=getHistory();
  const el=document.getElementById('historyContent');
  if(h.length===0){el.innerHTML='<div class="glossary-empty">まだ履歴がありません。クイズに挑戦しましょう！</div>';return;}
  const rows=h.slice().reverse().map(r=>{
    const d=new Date(r.date);
    const ds=d.getFullYear()+'/'+(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours()+':'+String(d.getMinutes()).padStart(2,'0');
    const gn=r.genre===-1?'全ジャンル':(GENRES[r.genre]?GENRES[r.genre].icon+' '+GENRES[r.genre].name:'不明');
    const color=r.pct>=70?'var(--correct)':r.pct>=50?'var(--accent)':'var(--wrong)';
    return '<div class="glossary-item" style="padding:14px 18px;display:flex;justify-content:space-between;align-items:center;"><div><strong>'+ds+'</strong><br><span style="font-size:13px;color:var(--text-muted);">'+gn+'</span></div><div style="text-align:right;"><span style="font-size:20px;font-weight:900;color:'+color+';font-family:Oswald;">'+r.score+'/'+r.total+'</span><br><span style="font-size:12px;color:var(--text-muted);">'+r.pct+'%</span></div></div>';
  });
  el.innerHTML=rows.join('');
}

// ============================================================
// Security: Anti-tampering & abuse prevention
// ============================================================
(function(){
  // Integrity check for localStorage data
  function checkDataIntegrity(){
    try{
      const data=localStorage.getItem('allUsersData');
      if(data){
        const parsed=JSON.parse(data);
        for(const user in parsed){
          if(!Array.isArray(parsed[user])){
            console.warn('Data integrity check failed');
            return false;
          }
          for(const record of parsed[user]){
            if(typeof record.pct!=='number'||record.pct<0||record.pct>100){
              console.warn('Suspicious data detected for user: '+user);
              return false;
            }
          }
        }
      }
    }catch(e){return false;}
    return true;
  }

  // Rate limit quiz attempts (prevent automated abuse)
  let quizStartCount=0;
  const quizStartTimes=[];
  const origStartQuiz=window.startQuiz||startQuiz;

  // Prevent right-click context menu on quiz (anti-cheat)
  document.addEventListener('contextmenu',function(e){
    if(document.getElementById('quizScreen').style.display!=='none'){
      e.preventDefault();
    }
  });

  // Detect suspicious rapid answering
  let lastAnswerTime=0;
  const origSelectAnswer=selectAnswer;

  // Periodic integrity check
  setInterval(function(){
    if(!checkDataIntegrity()){
      console.warn('Data integrity violation detected');
    }
  },60000);

  // Honeypot: hidden admin endpoint that logs suspicious access
  window.__admin_bypass=function(){
    console.warn('Honeypot triggered: unauthorized access attempt detected');
    const attempts=JSON.parse(localStorage.getItem('_secLog')||'[]');
    attempts.push({time:new Date().toISOString(),type:'honeypot'});
    localStorage.setItem('_secLog',JSON.stringify(attempts));
  };
})();
