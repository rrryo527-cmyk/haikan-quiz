ge_tank.jpg'},{q:'受水槽の「水質基準」で「臭気」の基準はどれか？',o:['無臭であること','塩素臭がすること','異常でないこと','何も基準がない'],a:2,genre:2,d:1,ex:'水道水質基準では臭気は「異常でないこと」とされています。カビ臭、金属臭等の異臭がないことを確認します。',oex:['不正解。塩素臭は正常範囲','不正解。塩素臭は正常','正解。異常でないことが基準です','不正解。基準がある'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「水質基準」で「味」の基準はどれか？',o:['甘いこと','基準なし','無味であること','異常でないこと'],a:3,genre:2,d:1,ex:'水道水質基準では味は「異常でないこと」とされています。金属味、苦味等の異味がないことを確認します。',oex:['不正解。甘さの基準ではない','不正解。基準がある','不正解。完全無味ではなく異常でないこと','正解。異常でないことが基準です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽清掃後の「完了確認」で管理者に報告すべき内容はどれか？',o:['清掃にかかった時間のみ','使用した水の量','作業者の人数','清掃結果・水質検査結果・異常の有無・次回清掃の推奨時期'],a:3,genre:2,d:1,ex:'完了報告では清掃の結果、水質検査結果（残留塩素等）、異常の有無、改善提案、次回清掃推奨時期等を報告します。',oex:['不正解。時間だけでは不十分','不正解。水量は主要報告事項でない','不正解。人数は主要報告事項でない','正解。結果・水質・異常・次回推奨を報告します']},{q:'受水槽の「点検記録」に記載すべき項目はどれか？',o:['天気のみ','建物の家賃','点検日時・点検者・点検項目・結果・残留塩素値・異常の有無','近隣の情報'],a:2,genre:4,d:1,ex:'点検記録には日時、点検者名、各点検項目の確認結果、残留塩素測定値、異常の有無と対応を記録します。',oex:['不正解。天気だけでは不十分','不正解。家賃は無関係','正解。日時・点検者・結果・塩素値等を記録します','不正解。近隣情報は無関係'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「定水位弁」が故障した場合に起こる問題はどれか？',o:['給水が止まらず越流する、または給水が止まり減水・断水する','特になし','水温が上がる','管が詰まる'],a:0,genre:2,d:2,ex:'定水位弁の故障は給水が止まらない（越流）か給水が止まる（減水・断水）かの重大トラブルに直結します。',oex:['正解。越流または減水・断水が発生します','不正解。重大な問題が発生する','不正解。水温とは別問題','不正解。管の詰まりとは別問題'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「清掃時の安全装備」として必要なものはどれか？',o:['保護帽・安全帯・ゴム長靴・保護手袋・酸素濃度計','スーツ','サングラス','名札のみ'],a:0,genre:2,d:1,ex:'貯水槽清掃では保護帽（ヘルメット）、安全帯、ゴム長靴、保護手袋、酸素濃度計等の安全装備が必要です。',oex:['正解。保護帽・安全帯・長靴・手袋・酸素計が必要','不正解。スーツは作業着でない','不正解。サングラスだけでは不十分','不正解。名札だけでは不十分'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「応急給水」の方法として適切なものはどれか？',o:['給水車・仮設タンク・近隣施設からの融通等で対応','何もしない','自販機で水を買う','雨水を利用する'],a:0,genre:2,d:2,ex:'受水槽の清掃・修理で断水する場合は、給水車、仮設タンク、近隣施設からの融通等で応急的に給水を確保します。',oex:['正解。給水車・仮設タンク等で応急給水します','不正解。対応が必要','不正解。自販機は大量供給に不向き','不正解。雨水は飲料に不適'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「水質検査で基準値超過」が判明した場合の対応はどれか？',o:['直ちに給水停止・原因調査・水道事業者と保健所に報告・改善措置','次回検査まで様子を見る','検査をやり直す','管理者に報告のみ'],a:0,genre:2,d:2,ex:'基準値超過は直ちに給水停止し、原因を調査します。水道事業者・保健所への報告と改善措置（清掃・消毒等）を行います。',oex:['正解。給水停止→原因調査→報告→改善が必要です','不正解。様子見は健康被害リスク','不正解。再検査前に給水停止が必要','不正解。報告だけでは不十分'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「次亜塩素酸ナトリウム」の保管上の注意はどれか？',o:['直射日光を避け冷暗所で保管し、有効期限を管理する','水に混ぜて保管','高温で保管','密封しない'],a:0,genre:2,d:2,ex:'次亜塩素酸ナトリウムは光・熱・時間経過で有効塩素が低下するため、冷暗所保管と有効期限管理が必要です。',oex:['正解。冷暗所保管と有効期限管理が必要です','不正解。原液のまま保管する','不正解。高温は有効塩素の低下を促進','不正解。密封して保管する'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「複合型給水方式」とはどれか？',o:['低層階は直結直圧、高層階はポンプ直送等、複数の方式を組み合わせる方式','受水槽を2つ使う方式','1つの方式のみ','ポンプを3台使う方式'],a:0,genre:2,d:3,ex:'複合型は建物の階数や用途に応じて、低層階は直結直圧方式、高層階はポンプ直送方式等を組み合わせる方式です。',oex:['正解。複数の給水方式を組み合わせます','不正解。水槽の数ではなく方式の組合せ','不正解。1つの方式ではない','不正解。ポンプの台数ではない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「残留塩素の測定頻度」として建築物衛生法が求めるものはどれか？',o:['毎日','月1回','年1回','7日以内ごとに1回'],a:3,genre:2,d:2,ex:'建築物衛生法では特定建築物の飲料水の遊離残留塩素を7日以内ごとに1回測定することが求められています。',oex:['不正解。毎日は法的義務ではないが推奨','不正解。月1回では不足','不正解。年1回では不足','正解。7日以内ごとに1回が基準です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「槽内面の劣化判定」で確認するポイントはどれか？',o:['FRPのガラス繊維露出・変色・亀裂・膨張・コケの付着','水槽のメーカー','水槽の色のみ','水槽の大きさ'],a:0,genre:2,d:2,ex:'FRP製受水槽の劣化判定では、ガラス繊維の露出（毛羽立ち）、変色、亀裂、ブリスター（膨張）、コケの付着等を確認します。',oex:['正解。繊維露出・変色・亀裂等を確認します','不正解。メーカーは劣化判定でない','不正解。色だけでは判定不十分','不正解。大きさは劣化判定でない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「有効容量が10m³以下」の場合の法的扱いはどれか？',o:['水道法の適用外だが自治体条例で管理基準あり','消防法の適用','水道法の簡易専用水道に該当','管理不要'],a:0,genre:2,d:2,ex:'有効容量10m³以下は水道法上の簡易専用水道には該当しませんが、各自治体の条例等で管理基準が定められています。',oex:['正解。水道法適用外だが条例で管理基準あり','不正解。消防法は別分野','不正解。10m³超が簡易専用水道','不正解。管理は必要'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「排泥弁」の目的はどれか？',o:['給水する','受水槽底部に沈殿した砂泥やスケールを排出する','水圧を上げる','水質を検査する'],a:1,genre:2,d:2,ex:'排泥弁は受水槽の底部最低部に設け、清掃時や日常管理で底部に沈殿した砂泥やスケールを排出するための弁です。',oex:['不正解。給水弁ではない','正解。底部の沈殿物を排出する弁です','不正解。水圧調整ではない','不正解。検査器具ではない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「逆サイホン防止」のために必要な措置はどれか？',o:['管を太くする','管を塗装する','吐水口空間の確保・バキュームブレーカーの設置','管を短くする'],a:2,genre:2,d:2,ex:'逆サイホン作用による逆流を防止するため、吐水口空間の確保やバキュームブレーカーの設置が必要です。',oex:['不正解。管径は逆流防止と無関係','不正解。塗装は逆流防止でない','正解。吐水口空間とバキュームブレーカーが有効','不正解。管長は逆流防止と無関係'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「給水管の仕切弁」を設ける目的はどれか？',o:['清掃・修理時に受水槽への給水を停止するため','水質を改善する','水温を調整する','排水するため'],a:0,genre:2,d:1,ex:'仕切弁は受水槽の清掃・修理・緊急時に給水を停止するために設置します。受水槽の手前と後（揚水管側）に設けます。',oex:['正解。清掃・修理時の給水停止のためです','不正解。水質改善ではない','不正解。水温調整ではない','不正解。排水弁は別'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9d/Gate_valve.JPG/330px-Gate_valve.JPG'},{q:'受水槽の「揚水管」に設ける弁類はどれか？',o:['ストレーナーのみ','消火弁','仕切弁・逆止弁・フレキシブルジョイント等','排水弁のみ'],a:2,genre:4,d:2,ex:'揚水管には仕切弁（メンテナンス用）、逆止弁（逆流防止）、フレキシブルジョイント（振動吸収）等を設けます。',oex:['不正解。ストレーナーだけでは不十分','不正解。消火弁は別系統','正解。仕切弁・逆止弁・可撓継手等を設けます','不正解。排水弁だけではない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「加圧給水ポンプユニット」の特徴はどれか？',o:['手動操作のみ','排水専用','ポンプ・制御盤・圧力タ ビ管等を使用','正解。白ガス管は給水用途']},{q:'黒ガス管の主な用途はどれか？',o:['排水','ガス・空調','給湯','給水'],a:1,genre:0,d:1,ex:'黒ガス管（素管・めっきなし）はガス配管や空調配管に使用されます。給水には白ガス管を使用します。',oex:['不正解。排水は塩ビ管等の用途','正解。黒ガス管はガス・空調用途','不正解。給湯は銅管やHT管等の用途','不正解。給水は白ガス管の用途']},{q:'ボイド管を配管に流用してはいけない理由はどれか？',o:['見た目が悪い','施工が難しい','コストが高い','破損・漏水の危険が高い'],a:3,genre:0,d:1,ex:'ボイド管はコンクリートの型枠形成用（スリーブ用）であり、耐圧性がなく配管用途に流用すると破損・漏水の危険があります。',oex:['不正解。見た目の問題ではない','不正確。施工性の問題ではなく耐久性の問題','不正解。コストの問題ではない','正解。耐圧性がなく破損・漏水の危険がある']},{q:'鋼管のねじ込み接合で、ねじ込み過ぎた場合に起こる問題はどれか？',o:['電食が発生する','配管が伸びる','漏水が完全に止まる','継手割れ'],a:3,genre:0,d:2,ex:'ねじ込み過ぎは継手に過大な応力がかかり、継手割れの原因となります。適正角度管理が必要です。',oex:['不正解。電食はねじ込み量と無関係','不正解。配管は伸びない','不正解。過度な締め付けは問題を起こす','正解。ねじ込み過ぎは継手割れの原因']},{q:'鋼管のねじ込み接合で、ねじ込みが浅い場合に起こる問題はどれか？',o:['漏水','継手割れ','電食','騒音'],a:0,genre:0,d:1,ex:'ねじ込みが浅いとシール性が不足し、漏水の原因となります。適正なねじ込み深さの管理が重要です。',oex:['正解。浅いねじ込みはシール不足で漏水','不正解。継手割れはねじ込み過ぎの問題','不正解。電食はねじ込み深さと無関係','不正解。騒音はねじ込み深さと無関係']},{q:'シール剤（ヘルメシール等）の特徴として正しいものはどれか？',o:['金属ねじ専用で耐圧が高く給水幹線に有効','塩ビ管にも使用可能','耐圧は低い','排水管専用'],a:0,genre:0,d:2,ex:'ヘルメシール等のシール剤は金属ねじ配管専用で、シールテープより耐圧が高く、給水幹線などの重要な接合部で使用されます。',oex:['正解。金属ねじ専用で高耐圧','不正解。塩ビ管は接着式であり使用しない','不正解。耐圧は高い','不正解。給水幹線にも使用する']},{q:'塩ビ接着剤の特徴として正しいものはどれか？',o:['溶着型接着剤で塗布量が適正でないと不良を招く','金属管にも使用可能','乾燥不要','ゴム系接着剤である'],a:0,genre:0,d:2,ex:'塩ビ接着剤は塩ビ管専用の溶着型で、管と継手の表面を溶かして一体化させます。塗布量が多すぎても少なすぎても接合不良の原因になります。',oex:['正解。溶着型で塗布量管理が重要','不正解。塩ビ管専用','不正解。養生（乾燥）時間が必要','不正解。溶着型であり、ゴム系ではない']},{q:'配管工事でパッキン類の交換が必要な理由はどれか？',o:['老朽化で硬化・変形し漏水しやすくなるため','色が変わるため','費用が安いため','法律で毎年交換が義務づけられているため'],a:0,genre:0,d:1,ex:'パッキン類はゴム・樹脂製のため経年で硬化・変形し、シール性が低下して漏水の原因になります。改修工事等では必ず新品に交換します。',oex:['正解。硬化・変形で漏水しやすくなるため','不正解。色の変化は交換理由ではない','不正解。費用は交換理由ではない','不正解。毎年義務ではなく状態に応じて交換']},{q:'建設現場の朝礼で最初に行うべきことはどれか。',o:['ラジオ体操','作業指示の伝達','KY活動の実施','参加者の点呼・体調確認'],a:3,genre:5,d:1,ex:'朝礼ではまず全員の出欠を確認し、体調不良者がいないか確認することが安全管理の基本です。',oex:['ラジオ体操は体調確認の後に行います','作業指示は点呼の後に行います','KY活動は朝礼の中で行いますが最初ではありません','正解。点呼と体調確認が最優先です']},{q:'KY活動（危険予知活動）の基本4ラウンド法で最初に行うステップはどれか。',o:['危険のポイントを絞り込む','どんな危険が潜んでいるか現状を把握する','目標を設定する','対策 ぎる']},{q:'水道法における「水道技術管理者」の職務に含まれないものはどれか。',o:['水道事業の料金設定','給水装置工事の施工管理','水質検査に関する業務','水道施設の管理に関する技術上の業務'],a:0,genre:10,d:3,ex:'水道技術管理者は施設管理・水質検査・給水装置の検査等の技術的業務を行いますが、料金設定は経営的業務です。',oex:['正解（含まれない）。料金設定は経営業務','正しい。施工管理','正しい。水質検査業務','正しい。技術的管理業務']},{q:'「クロスコネクション」が禁止されている理由はどれか。',o:['見た目が悪いため','配管が複雑になるため','工事費が高くなるため','飲料水が非飲料水で汚染される危険があるため'],a:3,genre:10,d:1,ex:'クロスコネクションは飲料水系統と非飲料水系統が接続されることで、深刻な水質汚染を引き起こす危険があります。',oex:['見た目は関係ない','複雑さは主な理由ではない','コストは主な理由ではない','正解。水質汚染の危険が主な理由']},{q:'給水装置の「耐寒性能基準」が適用される地域はどれか。',o:['沖縄県のみ','凍結のおそれがある場所に設置される給水装置','全国一律','赤道付近のみ'],a:1,genre:10,d:2,ex:'耐寒性能基準は凍結のおそれがある場所に設置される給水装置に適用されます。',oex:['地域限定ではない','正解。凍結のおそれがある場所','全国一律ではない','赤道付近は関係ない']},{q:'「配水管」と「給水管」の分岐点はどこか。',o:['蛇口の位置','配水管のサドル付分水栓取付位置','水道メーターの位置','受水槽の位置'],a:1,genre:10,d:2,ex:'給水管は配水管からサドル付分水栓等で分岐した地点から始まります。',oex:['蛇口は末端','正解。サドル付分水栓の取付位置が分岐点','メーターは分岐点より下流','受水槽は給水装置ではない']},{q:'給水装置の「逆流防止」のために用いる「逆止弁」の設置方向で重要なことはどれか。',o:['逆向きに設置する','横向きに設置する','どの方向でも良い','水の流れ方向に合わせて正しい向きに設置する'],a:3,genre:10,d:1,ex:'逆止弁は水の流れ方向を確認し、正しい向き（矢印方向）に設置しないと機能しません。',oex:['逆向きでは機能しない','設置方向は製品による','方向は重要','正解。流れ方向に合わせて設置']},{q:'水道法で「指定給水装置工事事業者」の指定の有効期間はどれか。',o:['3年','5年','1年','10年'],a:1,genre:10,d:2,ex:'指定給水装置工事事業者の指定の有効期間は5年で、更新が必要です（2019年法改正）。',oex:['3年ではない','正解。5年で更新が必要','1年ではない','10年ではない']},{q:'給水装置の「水撃限界性能基準」で試験水圧はどれか。',o:['0.5MPa','1.0MPa','1.5MPa','2.0MPa'],a:2,genre:10,d:3,ex:'水撃限界性能試験は1.5MPaの静水圧を1分間加えて確認します。',oex:['0.5MPaは基準ではない','1.0MPaは基準ではない','正解。1.5MPaが水撃限界試験の基準','2.0MPaは基準ではない']},{q:'「ポリエチレン二層管」の接合に使用される継手はどれか。',o:['ろう付け継手','メカニカル継手（金属継手）','溶着継手','フランジ継手'],a:1,genre:10,d:2,ex:'ポリエチレン二層管にはメカニカル式の金属継手（インサート式等）を使用します。',oex:['ろう付けは銅管用','正解。メカニカル継手を使用','溶着はHDPE管等で使用','フランジは大口径用']},{q:'給水管の「管径の決定」に必要な要素として不要なものはどれか。',o:['給水用具の所要水量','同時使用率','給水管の色','配管の長さと摩擦損失'],a:2,genre:10,d:2,ex:'管径決定には同時使用率、所要水量、配管長さ・摩擦損失が必要ですが、管の色は関係ありません。',oex:['所要水量は必要','同時使用率は必要','正解（不要）。色は管径に無関係','摩擦損失は必要']},{q:'「電気工事士法」で第二種電気工事士免状の交付を行うのは誰か。',o:['市町村長','経済産業大臣','都道府県知事','電力会社'],a:2,genre:11,d:2,ex:'第二種電気工事士免状は都道府県知事が交付します。第一種は経済産業大臣です。',oex:['市町村長ではない','経済産業大臣は第一種','正解。都道府県知事が交付','電力会社ではない']},{q:'「電気用品安全法」で規制される電気用品に表示されるマークはどれか。',o:['JISマーク','PSEマーク','CEマーク','ULマーク'],a:1,genre:11,d:2,ex:'電気用品安全法で規制される製品にはPSE（Product Safety Electrical）マークが表示されます。',oex:['JISは工業規格','正解。PSEマーク','CEは欧州規格','ULは米国規格']},{q:'低圧電路で使用電圧300V以下（対地電圧150V超300V以下）の絶縁抵抗値はどれか。',o:['0.1MΩ以上','0.2MΩ以上','0.4MΩ以上','1.0MΩ以上'],a:1,genre:11,d:2,ex:'対地電圧150V超300V以下の場合、絶縁抵抗値は0.2MΩ以上です。',oex:['0.1MΩは対地150V以下の基準','正解。0.2MΩ以上','0.4MΩは300V超の基準','1.0MΩは基準ではない']},{q:'「幹線」の太さを決める要素として正しいものはどれか。',o:['配線の色','電動機の定格電流と他の負荷電流の合計','配管の材質','スイッチの個数'],a:1,genre:11,d:2,ex:'幹線の太さは接続される電動機の定格電流と他の負荷電流の合計から許容電流を決定します。',oex:['色は関係ない','正解。電動機と他の負荷電流の合計','配管材質は別の要素','スイッチの数は直接関係ない']},{q:'「差込形コネクタ」の使用方法として正しいものはどれか。',o:['圧着してから差し込む','ハンダ付けしてから差し込む','電線の絶縁被覆を規定の長さだけ剥いて差し込む','電線の被覆を剥かずに差し込む'],a:2,genre:11,d:1,ex:'差込形コネクタは絶縁被覆を規定の長さ（ストリップゲージ）だけ剥いて芯線を差し込みます。',oex:['圧着は不要','ハンダ付けは不要','正解。規定長さだけ剥いて差し込む','被覆を剥く必要がある']},{q:'「C種接地工事」の接地抵抗値の上限はどれか。',o:['10Ω以下','10Ω以下（漏電遮断器設置時500Ω以下）','100Ω以下','500Ω以下'],a:0,genre:11,d:3,ex:'C種接地は10Ω以下です。漏電遮断器設置時は500Ω以下に緩和されます。',oex:['正解。C種接地は10Ω以下','この表現はD種に近い','100ΩはD種接地','500Ωは緩和値']},{q:'「200V回路」に使用するコンセントの色はどれか。',o:['配線器具の色に規定はない','白色','赤色','緑色'],a:1,genre:11,d:2,ex:'200V回路のコンセントやプラグは感電防止のため白色ではなく、識別のための色が推奨されます。ただし法的な色の規定は限定的です。',oex:['色の規定は一部ある','正解に近い。200V用は識別しやすい色','不正解','不正解']},{q:'配線図で「WP」が付いたコンセントの意味はどれか。',o:['防爆型','防雨型（ウェザープルーフ）','医用','接地極付き'],a:1,genre:11,d:1,ex:'WP（Weather Proof）は防雨型を意味し、屋外で使用するコンセント等に表示されます。',oex:['防爆型はEXP','正解。WPは防雨型','医用はH（Hospital）','接地極付きはE']},{q:'「ノーヒューズブレーカー（NFB）」の機能はどれか。',o:['電力量を計量する','電圧を変換する','過電流を検出して回路を自動的に遮断する','漏電を検出する'],a:2,genre:11,d:1,ex:'NFBは過電流（短絡・過負荷）を検出して回路を自動遮断する配線用遮断器です。',oex:['計量は電力量計','電圧変換は変圧器','正解。過電流で自動遮断','漏電検出は漏電遮断器']},{q:'電気工事で使用する「圧着端子」の選定で重要な要素はどれか。',o:['端子の色だけ','電線の太さ（サイズ）と端子のサイズの適合','端子の製造国','端子の長さのみ'],a:1,genre:11,d:2,ex:'圧着端子は電線サイズに適合したものを使用し、適切な圧着工具で正しく圧着することが重要です。',oex:['色だけでは不十分','正解。電線サイズと端子サイズの適合','製造国は関係ない','長さだけでは不十分']},{q:'「三路スイッチ」の用途はどれか。',o:['3つの回路を切り替える','3つの照明を同時にON/OFFする','3相電源を制御する','2箇所から1つの照明をON/OFFする'],a:3,genre:11,d:2,ex:'三路スイッチは階段の上下など2箇所から同一の照明器具をON/OFFするために使用します。',oex:['回路切替ではない','3つの照明同時制御ではない','三相制御ではない','正解。2箇所からのON/OFF']},{q:'「分電盤」に設置される機器として正しいものはどれか。',o:['発電機','変圧器','主幹ブレーカーと分岐ブレーカー','蓄電池'],a:2,genre:11,d:1,ex:'分電盤には主幹ブレーカー（漏電遮断器等）と各回路の分岐ブレーカー（配線用遮断器）が設置されます。',oex:['発電機は分電盤の外','変圧器はキュービクル内','正解。主幹と分岐ブレーカー','蓄電池は分電盤の外']},{q:'「IV電線」の耐熱温度はどれか。',o:['60℃','45℃','90℃','75℃'],a:0,genre:11,d:2,ex:'IV（600Vビニル絶縁電線）の最高許容温度は60℃です。',oex:['正解。IV電線は60℃','45℃は低すぎる','90℃は架橋ポリエチレン','75℃はポリエチレン絶縁']},{q:'電気工事における「接地線」の最小太さ（D種接地の場合）はどれか。',o:['直径2.6mm','直径2.0mm','直径1.6mm','直径0.8mm'],a:2,genre:11,d:2,ex:'D種接地工事の接地線は直径1.6mm以上の軟銅線を使用します。',oex:['2.6mmは太い方','2.0mmは太い方','正解。1.6mm以上','0.8mmは細すぎる']},{q:'「電気設備技術基準」で低圧とされる電圧の範囲はどれか。',o:['7000V以下','1000V以下','直流750V以下・交流600V以下','50V以下'],a:2,genre:11,d:2,ex:'低圧は直流750V以下、交流600V以下と定められています。これを超えると高圧・特別高圧です。',oex:['7000V以下は高圧','1000Vは基準ではない','正解。直流750V以下・交流600V以下','50V以下は特別低圧']},{q:'貯水槽の水質検査において、一般細菌の基準値として正しいものはどれか？',o:['1mLの検水で形成される集落数が100以下','1mLの検水で形成される集落数が300以下','1mLの検水で形成される集落数が50以下','1mLの検水で形成される集落数が500以下'],a:0,genre:2,d:2,ex:'水道法の水質基準では、一般細菌は1mLの検水で形成される集落数が100以下と定められています。',oex:['正解。水道法の水質基準において、一般細菌は1mLの検水で100個以下と規定されています。','不正解。300以下ではなく100以下が正しい基準値です。','不正解。50以下は厳しすぎる基準で、正しくは100以下です。','不正解。500以下は緩すぎる基準で、正しくは100以下です。']},{q:'消火ポンプの性能試験において、定格吐出量の150%で吐出圧力が定格の何%以上必要か？',o:['65%以上','50%以上','75%以上','80%以上'],a:0,genre:4,d:3,ex:'消火ポンプの性能試験では、定格吐出量の150%運転時に吐出圧力が定格の65%以上であることが求められます。',oex:['正解。消防法施行規則に基づく基準です。','不正解。50%以上では低すぎます。正しくは65%以上です。','不正解。75%以上は厳しすぎます。正しくは65%以上です。','不正解。80%以上は厳しすぎます。正しくは65%以上です。']},{q:'非常用発電機の負荷試験は、何年に1回以上実施する必要があるか？',o:['5年に1回','1年に1回','3年に1回','2年に1回'],a:1,genre:4,d:2,ex:'消防法により、非常用発電機は年1回の総合点検で負荷試験または内部観察等を実施する必要があります。',oex:['不正解。5年に1回では長すぎます。','正解。消防法による年1回の総合点検が義務付けられています。','不正解。3年に1回ではなく、年1回の総合点検が必要です。','不正解。2年に1回ではなく年1回です。']},{q:'受水槽の6面点検において、天井（上部）に確保すべき空間はどれか？',o:['80cm以上','100cm以上','120cm以上','60cm以上'],a:1,genre:4,d:2,ex:'建築物衛生法により、受水槽の上部は100cm以上、側面と底部は60cm以上の点検空間が必要です。',oex:['不正解。80cm以上ではなく100cm以上が正しい基準です。','正解。上部は100cm以上の点検空間が必要です。','不正解。120cm以上は過大で、正しくは100cm以上です。','不正解。60cm以上は側面・底部の基準です。上部は100cm以上です。']},{q:'エレベーターの定期検査報告は、特定行政庁に何年ごとに報告が必要か？',o:['2年ごと','毎年','3年ごと','5年ごと'],a:1,genre:4,d:1,ex:'建築基準法第12条により、エレベーターの定期検査報告は毎年行う必要があります。',oex:['不正解。2年ごとではなく毎年です。','正解。建築基準法第12条に基づき毎年報告が必要です。','不正解。3年ごとではなく毎年です。','不正解。5年ごとではなく毎年です。']},{q:'防火ダンパーの作動温度として一般的なものはどれか？',o:['100℃','80℃','72℃','120℃'],a:2,genre:4,d:2,ex:'一般的な防火ダンパー（FD）の温度ヒューズは72℃で溶断し、ダンパーが閉鎖します。厨房排気用は120℃です。',oex:['不正解。100℃は一般的ではなく、72℃が標準です。','不正解。80℃ではなく72℃が標準です。','正解。一般的な防火ダンパーの温度ヒューズは72℃です。','不正解。120℃は厨房排気用防火ダンパーの設定温度です。']},{q:'給水ポンプの吸込み側に設置するフート弁の主な役割はどれか？',o:['ポンプ停止時の逆流を防ぎ呼び水を保持する','異物の侵入を防ぐ','水撃（ウォーターハンマー）を防止する','流量を調整する'],a:0,genre:4,d:2,ex:'フート弁はポンプの吸込管先端に設置し、ポンプ停止時の水の逆流を防ぎ、呼び水を保持する役割があります。',oex:['正解。フート弁はポンプ停止時の逆流を防ぎ、呼び水を保持します。','不正解。異物侵入防止はストレーナーの主な役割です。','不正解。水撃防止は防振継手やエアチャンバーの役割です。','不正解。流量調整はバルブの役割です。']},{q:'空調設備のフィルターの差圧が初期値の何倍になったら交換が目安か？',o:['5倍','4倍','3倍','2倍'],a:3,genre:4,d:2,ex:'空調フィルターは初期差圧の2倍に達したら交換が推奨されます。それ以上では送風量低下や空調能力不足につながります。',oex:['不正解。5倍では送風量が大幅に低下します。','不正解。4倍では交換が遅すぎます。','不正解。3倍では交換時期が遅すぎます。2倍が目安です。','正解。初期差圧の2倍が交換の目安です。']},{q:'消防用設備の総合点検は何年に1回実施するか？',o:['半年に1回','2年に1回','3年に1回','1年に1回'],a:3,genre:4,d:1,ex:'消防法により、消防用設備の点検は機器点検が半年に1回、総合点検が1年に1回実施する必要があります。',oex:['不正解。半年に1回は機器点検の頻度です。','不正解。2年に1回ではなく1年に1回です。','不正解。3年に1回ではなく1年に1回です。','正解。総合点検は1年に1回実施します。']},{q:'排煙設備の排煙口の操作部は、床面からどの高さに設置するか？',o:['1.0m以上1.2m以下','0.5m以上1.0m以下','1.5m以上2.0m以下','0.8m以上1.5m以下'],a:3,genre:4,d:3,ex:'排煙口の手動開放装置は、床面から0.8m以上1.5m以下の位置に設置する必要があります。',oex:['不正解。範囲が狭すぎます。正しくは0.8m以上1.5m以下です。','不正解。0.5m以上は低すぎます。正しくは0.8m以上1.5m以下です。','不正解。1.5m以上は高すぎます。正しくは0.8m以上1.5m以下です。','正解。建築基準法施行令により0.8m以上1.5m以下と規定されています。']},{q:'飲料用受水槽のマンホールの内径として、建築物衛生法で定められた最小値はどれか？',o:['60cm以上','50cm以上','70cm以上','40cm以上'],a:0,genre:4,d:2,ex:'建築物衛生法により、飲料用受水槽のマンホールは直径60cm以上で、かつ防水密閉型であることが求められます。',oex:['正解。マンホールは内径60cm以上と規定されています。','不正解。50cm以上ではなく60cm以上です。','不正解。70cm以上は必要以上に大きい基準です。','不正解。40cm以上ではなく60cm以上です。']},{q:'自家用電気工作物の保安規程に基づく年次点検は、通常どの周期で実施するか？',o:['半年に1回','2年に1回','1年に1回','3年に1回'],a:2,genre:4,d:2,ex:'自家用電気工作物の年次点検（停電点検）は、通常1年に1回実施します。月次点検は毎月行います。',oex:['不正解。半年に1回は月次点検より多すぎます。年次点検は1年に1回です。','不正解。2年に1回では少なすぎます。1年に1回です。','正解。年次点検は1年に1回実施します。','不正解。3年に1回では少なすぎます。']},{q:'冷却塔（クーリングタワー）のレジオネラ属菌対策として、薬剤処理の基準値はどれか？',o:['遊離残留塩素1.0mg/L以上','遊離残留塩素0.1mg/L以上','遊離残留塩素0.5mg/L以上','遊離残留塩素0.01mg/L以上'],a:0,genre:4,d:3,ex:'冷却塔のレジオネラ属菌対策では、遊離残留塩素を1.0mg/L以上に維持することが推奨されています。',oex:['正解。冷却塔のレジオネラ対策では1.0mg/L以上が推奨されています。','不正解。0.1mg/L以上は飲料水の基準で、冷却塔には不十分です。','不正解。0.5mg/L以上は飲料水の基準に近いですが、冷却塔では1.0mg/L以上が推奨されます。','不正解。0.01mg/L以上は極めて低すぎます。']},{q:'スプリンクラーヘッドの標準型の作動温度区分で、使用場所が一般の場合の表示色はどれか？',o:['黄色','白色（無色）','赤色','青色'],a:1,genre:4,d:3,ex:'スプリンクラーヘッドの一般的な作動温度（72℃前後）の表示色は白色（無色）です。高温用は色分けされています。',oex:['不正解。黄色は79～107℃の中温用です。','正解。一般の使用場所（72℃前後）は白色（無色）表示です。','不正解。赤色は57℃の低温用です。','不正解。青色は141～182℃の超高温用です。']},{q:'ガス漏れ検知器の検知方式で、都市ガス用に最も一般的に使用されるものはどれか？',o:['接触燃焼式','電気化学式','赤外線式','半導体式'],a:3,genre:4,d:2,ex:'都市ガス（メタン）の検知には半導体式が最も一般的に使用されています。LPガスも半導体式が多く使われます。',oex:['不正解。接触燃焼式は工業用で主に使用されます。家庭用・業務用では半導体式が一般的です。','不正解。電気化学式はCO検知器に使用されます。','不正解。赤外線式は特殊用途（冷媒ガス等）で使用されます。','正解。半導体式は都市ガス用として最も広く普及しています。']},{q:'蓄電池設備の点検において、電解液の比重が正常値を下回る場合に考えられる原因はどれか？',o:['過充電状態','放電過多または充電不足','電解液温度の低下','電解液の補水不足'],a:1,genre:4,d:3,ex:'蓄電池の電解液の比重が低い場合は、放電過多や充電不足が原因として考えられます。充電により比重は回復します。',oex:['不正解。過充電状態では比重は高くなります。','正解。放電過多や充電不足により電解液の比重は低下します。','不正解。温度低下は比重に影響しますが、主因は充電状態です。','不正解。補水不足では比重は高くなります。']},{q:'消火器の耐用年数（設計標準使用期限）は一般的に何年か？',o:['8年','15年','5年','10年'],a:3,genre:4,d:1,ex:'消火器の設計標準使用期限は一般的に10年とされています。製造年から10年を超えたものは交換を検討します。',oex:['不正解。8年ではなく10年が標準です。','不正解。15年は長すぎます。10年が標準です。','不正解。5年では短すぎます。設計標準使用期限は10年です。','正解。消火器の設計標準使用期限は10年です。']},{q:'排水ポンプの絶縁抵抗測定において、500V絶縁抵抗計で測定した場合の判定基準はどれか？',o:['0.1MΩ以上','0.5MΩ以上','1MΩ以上','5MΩ以上'],a:2,genre:4,d:3,ex:'低圧電気機器の絶縁抵抗は、電気設備技術基準により対地電圧が300V以下の場合0.1MΩ以上、300V超で0.2MΩ以上ですが、モーターの管理基準として1MΩ以上が一般的です。',oex:['不正解。0.1MΩ以上は法定最低基準ですが、モーターの管理値としては低すぎます。','不正解。0.5MΩ以上は法定基準は満たしますが、管理値としては1MΩ以上が一般的です。','正解。排水ポンプの絶縁抵抗は管理基準として1MΩ以上が一般的です。','不正解。5MΩ以上は理想的ですが、管理基準は通常1MΩ以上です。']},{q:'空調機のVベルトの張り具合の点検方法として正しいものはどれか？',o:['ベルトを指で押して15〜20mm程度たわむこと','ベルトを引っ張って伸びが3%以下であること','ベルトを指で押して5mm程度たわむこと','ベルト表面の温度が60℃以下であること'],a:0,genre:4,d:2,ex:'Vベルトの張り具合は、スパン中央部を指で押して15〜20mm程度（ベルト厚さの1.5〜2倍程度）たわむのが適正です。',oex:['正解。スパン中央部で15〜20mm程度のたわみが適正です。','不正解。伸び率ではなく、たわみ量で確認します。','不正解。5mmでは張りが強すぎます。15〜20mmが適正です。','不正解。温度ではなく、たわみ量で張り具合を確認します。']},{q:'建築物の定期報告制度において、特定建築物の報告周期はどれか？',o:['毎年','2年ごと','3年ごと','5年ごと'],a:2,genre:4,d:2,ex:'建築基準法第12条に基づく特定建築物の定期報告は3年ごと（一部自治体により異なる場合あり）です。',oex:['不正解。毎年はエレベーターの定期検査報告です。','不正解。2年ごとではなく3年ごとです。','正解。特定建築物の定期報告は3年ごとです。','不正解。5年ごとは長すぎます。']},{q:'自動火災報知設備の感知器のうち、差動式スポット型感知器が作動する条件はどれか？',o:['一定温度以上に達したとき','周囲温度の急激な上昇を感知したとき','煙の濃度が一定以上になったとき','炎の赤外線を感知したとき'],a:1,genre:4,d:2,ex:'差動式スポット型感知器は、室内の温度が急激に上昇したとき（差動）に作動します。一定温度で作動するのは定温式です。',oex:['不正解。一定温度以上で作動するのは定温式スポット型です。','正解。差動式は温度の急激な上昇を感知して作動します。','不正解。煙を感知するのは煙感知器です。','不正解。炎の赤外線を感知するのは炎感知器です。']},{q:'給水設備の逆流防止装置として、減圧式逆流防止器の点検周期はどれか？',o:['2年に1回','3年に1回','半年に1回','1年に1回'],a:3,genre:4,d:2,ex:'減圧式逆流防止器は年1回の点検・テストが推奨されています。逆止弁と中間室の排水弁の作動確認を行います。',oex:['不正解。2年に1回では長すぎます。','不正解。3年に1回では長すぎます。','不正解。半年に1回は頻度が高すぎます。年1回が推奨されます。','正解。減圧式逆流防止器は年1回の点検が推奨されています。']},{q:'ボイラーの安全弁が作動する設定圧力は、最高使用圧力の何倍以下か？',o:['1.05倍以下','1.2倍以下','1.1倍以下','1.0倍以下'],a:3,genre:4,d:3,ex:'ボイラーの安全弁は最高使用圧力以下で作動するよう設定されます。これにより過圧を防止します。',oex:['不正解。1.05倍以下は許容範囲ですが、基本は最高使用圧力以下です。','不正解。1.2倍以下では過圧の危険があります。','不正解。1.1倍以下では過圧になる可能性があります。','正解。安全弁は最高使用圧力（1.0倍）以下で作動するよう設定します。']},{q:'非常用照明装置の点灯持続時間として、建築基準法で定められた基準はどれか？',o:['20分以上','30分以上','45分以上','60分以上'],a:1,genre:4,d:2,ex:'建築基準法施行令第126条の5により、非常用照明装置は30分以上点灯を持続できなければなりません。',oex:['不正解。20分以上では不足です。30分以上が基準です。','正解。非常用照明装置は30分以上の点灯持続が必要です。','不正解。45分以上は基準より長いですが、法定基準は30分以上です。','不正解。60分以上は基準より長いです。']},{q:'膨張タンクの点検で確認すべき項目として最も重要なものはどれか？',o:['タンクの接続配管の口径','タンク表面の塗装状態','タンクの設置位置の水平度','タンク内のエア圧力が適正か'],a:3,genre:4,d:2,ex:'密閉式膨張タンクはダイヤフラム内のエア圧力が適正であることが最も重要です。圧力不足は機能低下の原因となります。',oex:['不正解。口径は設計時の確認事項です。','不正解。塗装状態も確認事項ですが、機能面ではエア圧力が最重要です。','不正解。水平度は設置時に確認しますが、定期点検ではエア圧力が優先です。','正解。エア圧力の適正維持が膨張タンクの機能にとって最も重要です。']},{q:'消防設備の点検結果報告書の保存期間はどれか？',o:['1年間','2年間','3年間','5年間'],a:2,genre:4,d:2,ex:'消防設備の点検結果報告書は、消防法により3年間の保存が義務付けられています。',oex:['不正解。1年間では短すぎます。3年間の保存が必要です。','不正解。2年間ではなく3年間です。','正解。点検結果報告書は3年間の保存が義務付けられています。','不正解。5年間は必要以上に長い期間です。法定は3年間です。']},{q:'水道直結給水方式において、3階直結給水が可能な配水管の最低水圧はどれか？',o:['0.25MPa','0.30MPa','0.20MPa','0.15MPa'],a:0,genre:4,d:3,ex:'3階直結給水を行う場合、配水管の水圧が0.25MPa以上であることが一般的な条件です（自治体により異なる場合あり）。',oex:['正解。3階直結給水には一般的に0.25MPa以上の水圧が必要です。','不正解。0.30MPaは十分な水圧ですが、最低条件は0.25MPa程度です。','不正解。0.20MPaでも3階への直結給水は困難な場合があります。','不正解。0.15MPaでは水圧不足で3階への給水が困難です。']},{q:'中央監視盤の警報で、「ポンプ過負荷」が表示された場合の最初の確認事項はどれか？',o:['ポンプの水温を確認する','ポンプの電流値を確認する','受水槽の水位を確認する','配管の圧力を確認する'],a:1,genre:4,d:2,ex:'ポンプ過負荷警報が出た場合、まず電流値を確認し、定格電流を超えていないかを調べます。',oex:['不正解。水温は過負荷とは直接関係が薄いです。','正解。過負荷の場合、まず電流値を確認するのが基本です。','不正解。水位確認も重要ですが、過負荷は電流値の確認が最優先です。','不正解。配管圧力も関連しますが、過負荷警報には電流値の確認が先です。']},{q:'排水槽（汚水槽・雑排水槽）の清掃頻度として、建築物衛生法で定められた基準はどれか？',o:['6ヶ月に1回以上','1年に1回以上','2年に1回以上','3ヶ月に1回以上'],a:0,genre:4,d:2,ex:'建築物衛生法により、排水槽は6ヶ月以内ごとに1回清掃を実施することが義務付けられています。',oex:['正解。排水槽は6ヶ月に1回以上の清掃が義務付けられています。','不正解。1年に1回では不十分です。6ヶ月に1回以上です。','不正解。2年に1回では頻度が低すぎます。','不正解。3ヶ月に1回は頻度が高すぎます。法定は6ヶ月に1回以上です。']},{q:'配管の防露（結露防止）工事において、冷水管の保温材の厚さとして一般的なものはどれか？',o:['10mm','20mm','30mm','40mm'],a:1,genre:4,d:2,ex:'冷水管の防露保温は、一般的に保温材厚さ20mm以上が必要です。温水管は熱損失防止のため25〜40mm程度です。',oex:['不正解。10mmでは結露防止に不十分です。20mm以上が一般的です。','正解。冷水管の防露保温は20mm以上が一般的です。','不正解。30mmでも良いですが、冷水管では20mmが標準的です。','不正解。40mmは温水管や蒸気管の保温に近い厚さです。']},{q:'建築設備の法定耐用年数において、給排水設備の耐用年数として正しいものはどれか？',o:['25年','10年','15年','20年'],a:2,genre:4,d:2,ex:'減価償却資産の耐用年数等に関する省令により、建築物の給排水設備の法定耐用年数は15年と定められています。',oex:['不正解。25年は長すぎます。設備の法定耐用年数は15年です。','不正解。10年は短すぎます。法定耐用年数は15年です。','正解。給排水設備の法定耐用年数は15年です。','不正解。20年は建築物本体に近い耐用年数です。設備は15年です。']},{q:'自動ドアの点検において、閉じ力の安全基準として正しいものはどれか？',o:['200N以下','250N以下','100N以下','150N以下'],a:3,genre:4,d:3,ex:'自動ドアの閉じ力は、JIS A 4722により150N以下と定められています。これを超えると挟まれ事故のリスクがあります。',oex:['不正解。200N以下は緩すぎます。150N以下が基準です。','不正解。250N以下は危険です。150N以下が安全基準です。','不正解。100N以下は厳しすぎる基準です。JIS基準は150N以下です。','正解。自動ドアの閉じ力はJIS基準で150N以下と規定されています。']},{q:'誘導灯の非常電源の容量として、建築基準法で定められた最低持続時間はどれか？',o:['20分以上','30分以上','60分以上','10分以上'],a:0,genre:4,d:2,ex:'消防法により、誘導灯の非常電源は20分以上の持続時間が必要です（大規模建築物は60分以上）。',oex:['正解。誘導灯の非常電源は20分以上の持続時間が必要です。','不正解。30分以上は非常用照明装置の基準です。誘導灯は20分以上です。','不正解。60分以上は大規模建築物の特例基準です。一般は20分以上です。','不正解。10分以上では不十分です。20分以上が最低基準です。']},{q:'ファンコイルユニットの4管式と2管式の違いとして正しいものはどれか？',o:['4管式は冷温水を同時に使用でき、各室の冷暖房を独立制御できる','4管式は2管式より消費電力が少ない','2管式は冷温水を同時に使用できる','4管式は2管式より機器が小さい'],a:0,genre:4,d:3,ex:'4管式FCUは冷水と温水の配管を別々に持つため、各室で冷房・暖房を独立して制御できます。2管式は冷温水切替式です。',oex:['正解。4管式は冷水と温水を独立して供給でき、各室の冷暖房を個別制御できます。','不正解。消費電力は方式の違いで大きく変わりません。','不正解。2管式は冷温水の切替式で、同時使用はできません。','不正解。4管式は配管が多いため機器は2管式より大きくなります。']},{q:'避雷針の保護角度（保護範囲）として、JIS規格で定められた一般的な角度はどれか？',o:['45度','60度','30度','90度'],a:1,genre:4,d:3,ex:'避雷針の保護角度は、JIS A 4201（旧規格）で60度以内とされています。新JIS（IEC 62305準拠）では回転球体法を使用。',oex:['不正解。45度は保護範囲が狭すぎます。60度が一般的です。','不正解。60度は保護範囲の最大角度ではなく、一般的な保護角です。','不正解。30度は非常に厳しい基準です。','不正解。90度では保護範囲が広すぎて実効性がありません。']},{q:'排水管の通気方式のうち、ループ通気方式の特徴として正しいものはどれか？',o:['排水横枝管の最上流の器具排水管接続部付近から通気管を立ち上げ、通気立て管に接続する方式','最上階の器具排水管の下流側から通気管を立ち上げる方式','排水立て管の頂部を延長して大気に開放する方式','各器具トラップごとに通気管を設ける方式'],a:0,genre:4,d:3,ex:'ループ通気方式は、排水横枝管の最上流の器具排水管接続部付近から通気管を立ち上げ、通気立て管に接続する方式です。',oex:['正解。ループ通気は排水横枝管の最上流から通気管を立ち上げる方式です。','不正解。これは結合通気に近い説明です。','不正解。排水立て管の延長は伸頂通気方式です。','不正解。各器具ごとの通気管は各個通気方式です。']},{q:'ヒートポンプエアコンの暖房時のCOP（成績係数）として一般的な値はどれか？',o:['1.5〜2.0','2.0〜3.0','7.0〜10.0','3.0〜6.0'],a:3,genre:4,d:2,ex:'近年のヒートポンプエアコンの暖房時COPは3.0〜6.0程度です。COPが高いほどエネルギー効率が良いことを示します。',oex:['不正解。1.5〜2.0は古い機種のレベルです。近年は3.0〜6.0程度です。','不正解。2.0〜3.0はやや低い値です。近年の機種は3.0〜6.0程度です。','不正解。7.0〜10.0は現実的には達成困難な値です。','正解。近年のヒートポンプエアコンのCOPは3.0〜6.0程度です。']},{q:'配管のウォーターハンマー（水撃）防止対策として、最も効果的なものはどれか？',o:['バルブの開閉速度を速くする','配管径を小さくする','エアチャンバーまたはショックアブソーバーを設置する','配管の勾配を大きくする'],a:2,genre:4,d:2,ex:'ウォーターハンマー防止にはエアチャンバーやショックアブソーバーの設置が最も効果的です。バルブのゆっくりした開閉も有効です。',oex:['不正解。バルブの開閉速度を速くすると水撃が発生しやすくなります。','不正解。配管径を小さくすると流速が上がり、水撃が悪化します。','正解。エアチャンバーやショックアブソーバーが最も効果的な対策です。','不正解。勾配は排水管の話で、水撃防止とは直接関係ありません。']},{q:'建物の給水量の算定において、事務所ビルの1人1日当たりの使用水量の目安はどれか？',o:['30〜50L','60〜100L','300〜400L','150〜250L'],a:1,genre:4,d:2,ex:'事務所ビルの1人1日当たりの使用水量は、空調用水を含めず60〜100L程度が目安です。',oex:['不正解。30〜50Lは少なすぎます。事務所ビルでは60〜100L程度です。','正解。事務所ビルの1人1日当たりの使用水量は60〜100L程度です。','不正解。300〜400Lは過大です。','不正解。150〜250Lはホテルや病院の使用水量に近い値です。']},{q:'ポンプのキャビテーションが発生する主な原因はどれか？',o:['吐出側の圧力が高すぎる','吸込み側の圧力が低下して飽和蒸気圧以下になる','ポンプの回転数が低すぎる','配管内の空気が多すぎる'],a:1,genre:4,d:3,ex:'キャビテーションは吸込み側の圧力が飽和蒸気圧以下に低下し、水が気化して気泡が発生・崩壊する現象です。',oex:['不正解。吐出側の圧力が高いことはキャビテーションの直接原因ではありません。','正解。吸込み側の圧力低下が飽和蒸気圧以下になるとキャビテーションが発生します。','不正解。回転数が低いとキャビテーションは発生しにくくなります。','不正解。空気の混入はエアロックの原因ですが、キャビテーションとは異なります。']},{q:'電気設備の接地工事において、C種接地工事の接地抵抗値の基準はどれか？',o:['10Ω以下','100Ω以下','50Ω以下','500Ω以下'],a:0,genre:4,d:3,ex:'C種接地工事（300V超の低圧電路）の接地抵抗値は10Ω以下です。ただし、0.5秒以内に遮断する装置がある場合は500Ω以下。',oex:['正解。C種接地工事の接地抵抗値は10Ω以下です。','不正解。100Ωは条件付きD種接地工事の値です。C種は10Ω以下です。','不正解。50Ω以下はC種の基準ではありません。10Ω以下です。','不正解。500ΩはD種接地工事の基準、またはC種の緩和条件時の値です。']},{q:'ビル管理における中央監視装置で、「BA」とは何の略称か？',o:['Building Automation','Building Administration','Base Architecture','Business Application'],a:0,genre:4,d:1,ex:'BAはBuilding Automation（ビルオートメーション）の略で、空調・電気・防災等の設備を中央で統合管理するシステムです。',oex:['正解。BAはBuilding Automation（ビルオートメーション）の略称です。','不正解。Building Administrationではありません。','不正解。Base Architectureではありません。','不正解。Business Applicationではありません。']},{q:'真空式温水発生機と無圧式温水発生機の違いとして正しいものはどれか？',o:['真空式は缶体内を大気圧以上で運転する','真空式は缶体内を真空（大気圧以下）で運転し、ボイラーに該当しない','無圧式はボイラーに該当する','真空式は無圧式より危険性が高い'],a:1,genre:4,d:3,ex:'真空式温水発生機は缶体内を真空（大気圧以下）で運転するため、労働安全衛生法上のボイラーに該当しません。',oex:['不正解。真空式は大気圧以下で運転します。大気圧以上ではありません。','正解。真空式は大気圧以下で運転し、ボイラーに該当しません。','不正解。無圧式もボイラーに該当しません。','不正解。真空式は大気圧以下で運転するため、安全性が高いです。']},{q:'排水管の高圧洗浄に使用する圧力として一般的なものはどれか？',o:['1〜3MPa','5〜15MPa','20〜30MPa','50〜100MPa'],a:1,genre:4,d:2,ex:'排水管の高圧洗浄は一般的に5〜15MPa程度の圧力で行います。配管の材質や状態に応じて圧力を調整します。',oex:['不正解。1〜3MPaでは圧力が低すぎて、十分な洗浄効果が得られません。','正解。排水管の高圧洗浄は5〜15MPa程度で行うのが一般的です。','不正解。20〜30MPaは圧力が高すぎて、配管を損傷する恐れがあります。','不正解。50〜100MPaは工業用の超高圧洗浄で、排水管には使用しません。']},{q:'現場での作業開始前に行う「KY活動」のKYとは何の略か？',o:['管理要領','危険予知','規約要件','危機予防'],a:1,genre:5,d:1,ex:'KY活動は「危険予知」の略で、作業前に危険を予測し対策を立てる活動です。',oex:['不正解。管理要領ではありません。','正解。KYは「危険予知」（Kiken Yochi）の頭文字です。','不正解。規約要件ではありません。','不正解。危機予防ではなく危険予知です。']},{q:'建設現場での「4S運動」に含まれないものはどれか？',o:['品質','清潔','整理','整頓'],a:0,genre:5,d:1,ex:'4S運動は「整理・整頓・清掃・清潔」の4つです。品質は含まれません（5Sでは「躾」が加わります）。',oex:['正解。品質は4Sには含まれません。4Sは整理・整頓・清掃・清潔です。','不正解。清潔は4Sに含まれます。','不正解。整理は4Sに含まれます。','不正解。整頓は4Sに含まれます。']},{q:'作業中に怪我をした場合、最初に行うべきことはどれか？',o:['作業を続行して後で報告する','現場監督に直ちに報告する','自分で応急処置をして作業を続ける','同僚に代わりに作業を頼む'],a:1,genre:5,d:1,ex:'作業中の怪我は、軽微なものでも直ちに現場監督に報告することが重要です。報告の遅れは労災認定に影響します。',oex:['不正解。怪我をしたまま作業を続行するのは危険です。直ちに報告します。','正解。怪我をしたらまず現場監督に直ちに報告します。','不正解。自己判断での応急処置だけでは不十分です。報告が最優先です。','不正解。同僚に頼む前に、まず報告が必要です。']},{q:'電話応対で「折り返し電話します」と言って電話を切った場合、何分以内に折り返すのがマナーか？',o:['60分以内','30分以内','翌日まで','10分以内'],a:3,genre:5,d:2,ex:'「折り返し電話します」と言った場合は、原則10分以内に折り返すのがビジネスマナーです。遅れる場合は再度連絡します。',oex:['不正解。60分以内は長すぎます。','不正解。30分以内では遅すぎます。10分以内が目安です。','不正解。翌日まで放置するのはNGです。','正解。折り返し電話は10分以内が原則です。']},{q:'お客様の自宅に上がる際のマナーとして正しいものはどれか？',o:['靴は前向きに脱いでそのまま上がる','靴は前向きに脱ぎ、上がってからひざまずいて向きを変えて揃える','靴は後ろ向きに脱いで揃えてから上がる','靴は脱がずにそのまま上がる'],a:1,genre:5,d:2,ex:'正式なマナーでは、玄関で前向きに靴を脱いで上がり、上がってからひざまずいて靴の向きを変えて揃えます。',oex:['不正解。脱いだまま放置するのはマナー違反です。向きを変えて揃えます。','正解。前向きに脱いで上がり、振り返って靴を揃えるのが正しいマナーです。','不正解。後ろ向きに脱ぐのは、お客様にお尻を向けることになり失礼です。','不正解。靴を脱がないのは論外です。']},{q:'建設現場で「ヒヤリハット報告」を行う目的として最も適切なものはどれか？',o:['事故が起きる前に危険要因を把握し予防するため','上司への成果報告のため','報告者を処罰するため','報告書の数を増やすため'],a:0,genre:5,d:1,ex:'ヒヤリハット報告は、事故に至らなかった危険な出来事を共有し、類似事故の予防に活かすことが目的です。',oex:['正解。ヒヤリハットを共有して危険要因を把握し、事故を予防します。','不正解。成果報告ではなく、安全管理の一環です。','不正解。処罰が目的ではなく、安全対策の改善が目的です。','不正解。数を増やすことが目的ではありません。']},{q:'安全帯（フルハーネス）の使用が義務付けられる高さの基準はどれか？',o:['2m以上','3m以上','5m以上','1.5m以上'],a:0,genre:5,d:2,ex:'労働安全衛生規則により、高さ2m以上の作業では墜落制止用器具（フルハーネス型）の使用が義務付けられています。',oex:['正解。高さ2m以上の作業でフルハーネスの使用が義務化されています。','不正解。3m以上ではなく2m以上が基準です。','不正解。5m以上ではなく2m以上です。','不正解。1.5m以上ではなく2m以上が正しい基準です。']},{q:'作業報告書に記載すべき基本項目として、含まれないものはどれか？',o:['作業日時と場所','作業内容と結果','作業者の体調','使用した材料と数量'],a:2,genre:5,d:1,ex:'作業報告書には作業日時・場所・内容・結果・使用材料等を記載します。作業者の体調は通常含まれません。',oex:['不正解。作業日時と場所は基本記載項目です。','不正解。作業内容と結果は基本記載項目です。','正解。作業者の体調は通常、作業報告書の記載項目ではありません。','不正解。使用した材料と数量は基本記載項目です。']},{q:'お客様への挨拶として、建設業界で最も一般的な朝の挨拶はどれか？',o:['おはようございます','ご苦労様です','お疲れ様です','いらっしゃいませ'],a:0,genre:5,d:1,ex:'朝の挨拶は「おはようございます」が基本です。「ご苦労様」は目上の人が目下に使う言葉なので注意が必要です。',oex:['正解。朝の挨拶は「おはようございます」が基本です。','不正解。「ご苦労様です」は目上から目下への言葉で、お客様には使いません。','不正解。「お疲れ様です」は朝の挨拶としては不適切です。','不正解。「いらっしゃいませ」は販売業の挨拶です。']},{q:'現場でのクレーム対応で最初に行うべきことはどれか？',o:['原因を説明する','対応できないと伝える','すぐに上司に連絡する','まず謝罪し、お客様の話を最後まで聞く'],a:3,genre:5,d:2,ex:'クレーム対応ではまず謝罪し、お客様の話を最後まで聞くことが重要です。途中で反論や言い訳をしてはいけません。',oex:['不正解。原因説明は話を聞いた後に行います。','不正解。対応できないと突き返すのはNGです。','不正解。上司への連絡も必要ですが、まずは謝罪と傾聴が最優先です。','正解。まず謝罪し、お客様の話を最後まで聞くのが基本です。']},{q:'保護具（PPE）の点検タイミングとして正しいものはどれか？',o:['月1回の定期点検のみ','破損に気づいた時のみ','年1回の定期点検のみ','使用前に毎回点検する'],a:3,genre:5,d:1,ex:'保護具は使用前に毎回点検し、異常がないことを確認してから使用します。',oex:['不正解。月1回の定期点検だけでは不十分です。使用前に毎回確認します。','不正解。破損に気づいた時だけでは手遅れになる場合があります。','不正解。年1回では頻度が少なすぎます。','正解。保護具は使用前に毎回点検するのが基本です。']},{q:'PDCA サイクルの「C」は何を意味するか？',o:['Control（管理）','Check（評価・確認）','Change（変更）','Create（創造）'],a:1,genre:5,d:1,ex:'PDCAサイクルはPlan（計画）→Do（実行）→Check（評価・確認）→Act（改善）の4段階です。',oex:['不正解。ControlではなくCheck（評価・確認）です。','正解。CはCheck（評価・確認）を意味します。','不正解。ChangeではなくCheckです。','不正解。CreateではなくCheckです。']},{q:'労働安全衛生法における「安全衛生責任者」を選任すべき事業場の常時使用労働者数はどれか？',o:['30人以上','100人以上','10人以上','50人以上'],a:3,genre:5,d:3,ex:'常時50人以上の労働者を使用する事業場では、安全衛生責任者を選任する義務があります。',oex:['不正解。30人以上ではなく50人以上です。','不正解。100人以上ではなく50人以上です。','不正解。10人以上ではなく50人以上が基準です。10人以上は安全衛生推進者です。','正解。常時50人以上の労働者を使用する事業場が対象です。']},{q:'「報連相」の「相」は何を表すか？',o:['相談','相違報告','相手への配慮','相互確認'],a:0,genre:5,d:1,ex:'報連相は「報告・連絡・相談」の略で、ビジネスコミュニケーションの基本です。',oex:['正解。「相」は相談を表します。','不正解。相違報告ではありません。','不正解。相手への配慮ではなく相談です。','不正解。相互確認ではなく相談です。']},{q:'高所作業車を使用するために必要な資格として正しいものはどれか？（作業床の高さ10m以上）',o:['特別教育','技能講習','運転免許','資格不要'],a:1,genre:5,d:2,ex:'作業床の高さが10m以上の高所作業車は技能講習の修了が必要です。10m未満は特別教育で操作できます。',oex:['不正解。特別教育は10m未満の高所作業車用です。10m以上は技能講習が必要です。','正解。10m以上の高所作業車には技能講習の修了が必要です。','不正解。運転免許ではなく技能講習が必要です。','不正解。資格不要ではありません。技能講習が必要です。']},{q:'新規入場者教育で説明すべき項目に含まれないものはどれか？',o:['作業員の家族構成','使用する保護具の種類','緊急連絡先と避難経路','現場のルールと安全注意事項'],a:0,genre:5,d:1,ex:'新規入場者教育では現場ルール、安全事項、緊急連絡先、避難経路、保護具などを説明します。家族構成は含まれません。',oex:['正解。作業員の家族構成は新規入場者教育の説明項目ではありません。','不正解。使用する保護具の種類は説明すべき項目です。','不正解。緊急連絡先と避難経路は必須説明項目です。','不正解。現場ルールと安全注意事項は新規入場者教育の基本項目です。']},{q:'酸素欠乏危険場所での作業に必要な測定項目として正しいものはどれか？',o:['二酸化炭素濃度のみ','温度と湿度','酸素濃度のみ','酸素濃度と硫化水素濃度'],a:3,genre:5,d:2,ex:'酸素欠乏危険場所では、酸素濃度（18%以上）と硫化水素濃度（10ppm以下）の測定が義務付けられています。',oex:['不正解。二酸化炭素濃度だけでは不十分です。','不正解。温度と湿度は酸欠対策の測定項目ではありません。','不正解。酸素濃度だけでなく、硫化水素濃度の測定も必要です。','正解。酸素濃度と硫化水素濃度の両方を測定する必要があります。']},{q:'作業現場での「5W1H」のうち、「When」が表すものはどれか？',o:['なぜ','いつ','どこで','誰が'],a:1,genre:5,d:1,ex:'5W1HはWho（誰が）、What（何を）、When（いつ）、Where（どこで）、Why（なぜ）、How（どのように）です。',oex:['不正解。「なぜ」はWhyです。','正解。WhenはW「いつ」を表します。','不正解。「どこで」はWhereです。','不正解。「誰が」はWhoです。']},{q:'建設業における「安全朝礼」で行うべき内容に含まれないものはどれか？',o:['体操（ラジオ体操等）','作業員の趣味の紹介','危険予知活動（KY活動）','当日の作業内容の確認'],a:1,genre:5,d:1,ex:'安全朝礼では作業内容の確認、KY活動、体操、安全注意事項の周知などを行います。趣味の紹介は含まれません。',oex:['不正解。体操は安全朝礼で行う項目です。','正解。作業員の趣味の紹介は安全朝礼の内容ではありません。','不正解。KY活動は安全朝礼の重要な項目です。','不正解。当日の作業内容の確認は安全朝礼の基本です。']},{q:'建設現場における「一人KY」の意味として正しいものはどれか？',o:['管理者が一人で全体のリスクを評価すること','作業者個人が自分の作業の危険を予知すること','一人で現場を巡回すること','一人で作業を完遂すること'],a:1,genre:5,d:2,ex:'「一人KY」とは、作業者個人が自分の担当する作業について危険を予知し、対策を考える活動です。',oex:['不正解。管理者のリスク評価ではなく、作業者個人の活動です。','正解。一人KYは作業者個人が自分の作業の危険を予知する活動です。','不正解。巡回ではなく、個人での危険予知活動です。','不正解。一人で作業することではありません。']},{q:'名刺交換のマナーとして正しいものはどれか？',o:['テーブル越しに交換する','ポケットから直接取り出して渡す','相手の名刺を片手で受け取る','名刺入れの上に載せて両手で差し出す'],a:3,genre:5,d:2,ex:'名刺交換では名刺入れの上に名刺を載せ、両手で差し出すのがマナーです。受け取る時も両手で受け取ります。',oex:['不正解。テーブル越しの交換は避けるべきです。','不正解。ポケットから直接取り出すのは失礼です。名刺入れを使います。','不正解。片手での受け取りは失礼です。両手で受け取ります。','正解。名刺入れの上に載せて両手で差し出すのが正しいマナーです。']},{q:'労働災害が発生した場合、事業者が労働基準監督署に報告する義務があるのはどの場合か？',o:['死亡または休業4日以上の災害','すべての労働災害','休業1日以上の災害','入院を伴う災害のみ'],a:0,genre:5,d:2,ex:'労働安全衛生規則により、死亡または休業4日以上の労働災害は遅滞なく労働基準監督署に報告する義務があります。',oex:['正解。死亡または休業4日以上の災害は労基署への報告が義務です。','不正解。軽微な災害は四半期ごとの報告（様式第24号）で対応します。','不正解。休業1日以上すべてではなく、4日以上が個別報告の基準です。','不正解。入院の有無ではなく、休業日数が基準です。']},{q:'現場での整理整頓において、「赤札作戦」とは何か？',o:['清掃済みの場所に赤い札をつける活動','危険箇所に赤い標識をつける活動','優先作業に赤い印をつける活動','不要品に赤い札をつけて処分を促す活動'],a:3,genre:5,d:2,ex:'赤札作戦は5S活動の一環で、不要品に赤い札をつけて判別しやすくし、処分を促進する活動です。',oex:['不正解。清掃済みの確認ではなく、不要品の識別に使います。','不正解。危険箇所の標識は別の安全活動です。','不正解。優先作業の印ではありません。','正解。赤札作戦は不要品に赤い札をつけて処分を促す5S活動の一つです。']},{q:'品質管理の「QC7つ道具」に含まれないものはどれか？',o:['パレート図','特性要因図','ガントチャート','管理図'],a:2,genre:5,d:2,ex:'QC7つ道具は特性要因図・パレート図・ヒストグラム・散布図・チェックシート・管理図・層別（グラフ）です。ガントチャートは含まれません。',oex:['不正解。パレート図はQC7つ道具に含まれます。','不正解。特性要因図はQC7つ道具に含まれます。','正解。ガントチャートは工程管理のツールで、QC7つ道具には含まれません。','不正解。管理図はQC7つ道具に含まれます。']},{q:'石綿（アスベスト）含有建材の除去作業に必要な届出先はどれか？',o:['市区町村役場','消防署','労働基準監督署','都道府県知事'],a:2,genre:5,d:2,ex:'石綿含有建材の除去作業は、労働安全衛生法に基づき作業開始14日前までに労働基準監督署に届出が必要です。',oex:['不正解。市区町村ではなく労働基準監督署です（大気汚染防止法では都道府県等にも届出）。','不正解。消防署は関係ありません。','正解。石綿除去作業は労働基準監督署に届出が必要です。','不正解。直接の届出先は労働基準監督署です。']},{q:'建設業で使用される「TBM」の意味として正しいものはどれか？',o:['Time Based Maintenance','Total Business Management','Technical Building Method','Tool Box Meeting（ツールボックスミーティング）'],a:3,genre:5,d:1,ex:'TBMはTool Box Meeting（ツールボックスミーティング）の略で、作業前に少人数で行う安全ミーティングです。',oex:['不正解。Time Based Maintenanceではありません。','不正解。Total Business Managementではありません。','不正解。Technical Building Methodではありません。','正解。TBMはTool Box Meeting（ツールボックスミーティング）の略です。']},{q:'粉塵作業において使用すべき呼吸用保護具の種類として最も適切なものはどれか？',o:['ガーゼマスク','防塵マスク（DS2以上）','フェイスシールドのみ','一般的な不織布マスク'],a:1,genre:5,d:2,ex:'粉塵作業では国家検定に合格した防塵マスク（DS2以上）の使用が求められます。一般マスクでは粉塵を十分に捕集できません。',oex:['不正解。ガーゼマスクは粉塵捕集には適していません。','正解。粉塵作業では検定合格品の防塵マスク（DS2以上）を使用します。','不正解。フェイスシールドだけでは呼吸器を保護できません。','不正解。不織布マスクでは粉塵の捕集効率が不十分です。']},{q:'建設現場での「指差呼称」の効果として正しいものはどれか？',o:['ヒューマンエラーが約1/6に減少する','作業速度が向上する','報告書の記載が簡素化される','作業コストが削減される'],a:0,genre:5,d:2,ex:'指差呼称（指差し確認）により、ヒューマンエラーの発生率は何もしない場合と比べて約1/6に減少するとされています。',oex:['正解。指差呼称によりヒューマンエラーが約1/6に減少します。','不正解。作業速度の向上ではなく、エラー防止が主な効果です。','不正解。報告書とは関係ありません。','不正解。コスト削減は直接的な効果ではありません。']},{q:'建設業法で定められた主任技術者の配置が必要な工事の要件はどれか？',o:['下請金額が4,500万円以上の工事','公共工事のみ','元請金額が1億円以上の工事','すべての建設工事'],a:3,genre:5,d:2,ex:'建設業法により、すべての建設工事には主任技術者の配置が必要です。一定金額以上の下請工事には監理技術者が必要です。',oex:['不正解。4,500万円以上は監理技術者が必要な下請金額の基準です。','不正解。公共工事に限らず、すべての建設工事が対象です。','不正解。元請金額に関わらず、すべての工事で主任技術者が必要です。','正解。すべての建設工事に主任技術者の配置が義務付けられています。']},{q:'熱中症予防対策として、WBGT（暑さ指数）が何度以上になると「危険」レベルとなるか？',o:['25℃以上','28℃以上','31℃以上','35℃以上'],a:2,genre:5,d:2,ex:'WBGT 31℃以上は「危険」レベルで、すべての生活活動においてが中止または厳重警戒が必要です。',oex:['不正解。25℃以上は「注意」レベルです。','不正解。28℃以上は「厳重警戒」レベルです。','正解。WBGT 31℃以上が「危険」レベルです。','不正解。35℃は気温の基準であり、WBGTの基準ではありません。']},{q:'感電事故防止のため、漏電遮断器の動作時間として規定されているものはどれか？',o:['1秒以内','5秒以内','0.1秒以内','3秒以内'],a:2,genre:5,d:2,ex:'漏電遮断器（30mA感度）は0.1秒以内に動作することが求められています。これにより感電事故を防止します。',oex:['不正解。1秒以内では感電事故を防げない場合があります。','不正解。5秒以内は長すぎます。','正解。漏電遮断器は0.1秒以内に動作する必要があります。','不正解。3秒以内は長すぎます。0.1秒以内が基準です。']},{q:'石膏ボードの一般的な厚さとして、壁に使用されるものはどれか？',o:['9.5mm','12.5mm','15mm','21mm'],a:1,genre:6,d:1,ex:'壁に使用される石膏ボードの標準的な厚さは12.5mmです。天井には9.5mmが多く使用されます。',oex:['不正解。9.5mmは天井用として一般的です。壁には12.5mmが使われます。','正解。壁用の石膏ボードは12.5mmが標準です。','不正解。15mmは耐火性能が求められる場合に使用されますが、一般的ではありません。','不正解。21mmは特殊用途で、壁の標準は12.5mmです。']},{q:'フローリングの施工で、壁との間に設けるクリアランス（隙間）として適切な寸法はどれか？',o:['1〜2mm','20mm以上','10〜15mm','3〜5mm'],a:3,genre:6,d:2,ex:'フローリングは温度・湿度変化で伸縮するため、壁との間に3〜5mm程度のクリアランスを設けます。',oex:['不正解。1〜2mmでは伸縮に対応できず、突き上げの原因になります。','不正解。20mm以上は過大です。','不正解。10〜15mmでは隙間が大きすぎます。巾木で隠せる範囲を超えます。','正解。壁との間に3〜5mm程度のクリアランスを設けます。']},{q:'壁紙（クロス）の施工で、パテ処理を行う目的として正しいものはどれか？',o:['防カビ効果を高めるため','壁紙の色味を均一にするため','壁紙の接着力を高めるため','下地の凹凸をなくして平滑にするため'],a:3,genre:6,d:1,ex:'パテ処理はビス穴や継ぎ目などの下地の凹凸をなくし、壁紙の仕上がりを平滑にするために行います。',oex:['不正解。防カビはパテの主目的ではありません。','不正解。色味の統一はパテの目的ではありません。','不正解。接着力を高めるのはシーラーや糊の役割です。','正解。パテ処理は下地の凹凸をなくして平滑な仕上がりを実現します。']},{q:'軽量鉄骨（LGS）下地のスタッドの標準的な間隔はどれか？',o:['200mm','303mm','455mm','600mm'],a:2,genre:6,d:2,ex:'LGS壁下地のスタッド間隔は、石膏ボード張りの場合一般的に455mmピッチ（@455）で配置します。',oex:['不正解。200mmは密すぎます。標準は455mmです。','不正解。303mmは木造壁の間柱間隔に近い値です。LGSでは455mmが一般的です。','正解。LGSのスタッド間隔は455mmが標準です。','不正解。600mmは天井下地の野縁受けの間隔に近い値です。壁スタッドは455mmです。']},{q:'塗装工事において、下塗り・中塗り・上塗りの工程で、各工程間の乾燥時間として一般的なものはどれか？',o:['30分〜1時間','2〜4時間以上','12〜24時間','3〜7日'],a:1,genre:6,d:2,ex:'水性塗料の場合、各塗り重ねの工程間乾燥時間は一般的に2〜4時間以上（気温20℃時）です。',oex:['不正解。30分〜1時間では乾燥不足で、塗膜不良の原因になります。','正解。各工程間の乾燥時間は一般的に2〜4時間以上です。','不正解。12〜24時間は油性塗料やウレタン塗料の乾燥時間に近い値です。','不正解。3〜7日は長すぎます。特殊な塗料を除き、通常は数時間です。']},{q:'天井の施工で使用される「野縁」の読み方として正しいものはどれか？',o:['のぶち','のえん','やぶち','やえん'],a:0,genre:6,d:1,ex:'「野縁」は「のぶち」と読みます。天井を構成する下地材で、天井板やボードを留め付ける部材です。',oex:['正解。「野縁」は「のぶち」と読みます。','不正解。「のえん」ではなく「のぶち」です。','不正解。「やぶち」ではなく「のぶち」です。','不正解。「やえん」ではなく「のぶち」です。']},{q:'防水工事のうち、ウレタン防水の標準的な塗膜厚さはどれか？',o:['1mm','2mm','3mm','5mm'],a:2,genre:6,d:2,ex:'ウレタン防水の標準的な仕上がり塗膜厚さは3mm（密着工法）です。通気緩衝工法の場合も3mm程度です。',oex:['不正解。1mmでは防水層が薄すぎて十分な防水性能が得られません。','不正解。2mmでは標準より薄く、耐久性に問題があります。','正解。ウレタン防水の標準塗膜厚さは3mmです。','不正解。5mmは厚すぎて、乾燥不良やクラックの原因になります。']},{q:'クロス施工における「ジョイント処理」で、突き合わせ工法の特徴として正しいものはどれか？',o:['壁紙の端同士を突き合わせて貼る','壁紙の端を折り返して貼る','壁紙同士を重ねて貼る','壁紙の間に隙間を開けて貼る'],a:0,genre:6,d:1,ex:'突き合わせ工法は壁紙の端同士を隙間なく突き合わせて貼る方法です。重ね切り工法より高い技術が必要です。',oex:['正解。突き合わせ工法は端同士を突き合わせて貼ります。','不正解。折り返しは突き合わせ工法ではありません。','不正解。重ねて貼るのは重ね切り工法です。','不正解。隙間を開けるのは施工不良です。']},{q:'断熱材のグラスウールの密度で、住宅用として一般的なものはどれか？',o:['32K','48K','10K','16K'],a:3,genre:6,d:2,ex:'住宅用グラスウールとして最も一般的なのは16K（16kg/m³）です。高性能品として24K、32Kなどもあります。',oex:['不正解。32Kは高密度品で、特殊用途に使われます。','不正解。48Kはさらに高密度で、一般住宅には過剰です。','不正解。10Kは密度が低く、断熱性能が不十分です。','正解。16K（16kg/m³）が住宅用として最も一般的です。']},{q:'長尺塩ビシートの施工で、溶接棒を使って接合する工法名はどれか？',o:['圧着工法','熱溶接工法','接着工法','突き合わせ工法'],a:1,genre:6,d:2,ex:'長尺塩ビシートの継ぎ目は、溶接棒を熱風で溶かして接合する「熱溶接工法」で処理します。',oex:['不正解。圧着工法は別の工法です。','正解。溶接棒を使う工法は熱溶接工法です。','不正解。接着工法は糊で貼る工法で、溶接棒は使いません。','不正解。突き合わせは溶接を使わない工法です。']},{q:'石膏ボードのビス留め間隔として、壁の場合の標準的なピッチはどれか？',o:['200mm以下','150mm以下','100mm以下','300mm以下'],a:0,genre:6,d:2,ex:'石膏ボードの壁施工では、ビスのピッチは周辺部で200mm以下、中間部で300mm以下が標準です。',oex:['正解。壁の周辺部でのビスピッチは200mm以下が標準です。','不正解。150mm以下は耐火構造の場合の基準に近いですが、一般的には200mm以下です。','不正解。100mm以下は密すぎます。周辺部でも200mm以下が標準です。','不正解。300mm以下は中間部のピッチです。周辺部は200mm以下です。']},{q:'タイル張りの「圧着張り工法」の特徴として正しいものはどれか？',o:['タイル裏面に接着剤を塗ってから張る工法','タイルをあらかじめユニット化して張る工法','下地にモルタルを塗りタイルを圧着する工法','乾式工法でタイルを金具で固定する工法'],a:2,genre:6,d:2,ex:'圧着張り工法は下地にモルタルを塗り、モルタルが乾かないうちにタイルを押し付けて張る工法です。',oex:['不正解。タイル裏面に接着剤を塗るのは接着剤張り工法です。','不正解。ユニット化して張るのはユニットタイル工法です。','正解。圧着張りは下地モルタルにタイルを圧着する工法です。','不正解。金具固定は乾式工法で、圧着張りとは異なります。']},{q:'内装工事で使用される「見切り材」の役割として正しいものはどれか？',o:['防音効果を高める','断熱性能を向上させる','異なる仕上げ材の境目を美しく納める','構造体を補強する'],a:2,genre:6,d:1,ex:'見切り材は異なる仕上げ材（フローリングとタイルなど）の境目や端部を美しく納めるための部材です。',oex:['不正解。防音は見切り材の目的ではありません。','不正解。断熱は見切り材の目的ではありません。','正解。見切り材は異なる仕上げ材の境目を美しく納める部材です。','不正解。構造補強は見切り材の役割ではありません。']},{q:'クッションフロア（CF）の施工で使用する接着剤の種類として一般的なものはどれか？',o:['エポキシ系接着剤','アクリル系エマルション型接着剤','シリコーン系接着剤','ゴム系溶剤型接着剤'],a:1,genre:6,d:2,ex:'クッションフロアの施工には、一般的にアクリル系エマルション型接着剤が使用されます。水性で取り扱いやすいのが特徴です。',oex:['不正解。エポキシ系はCFには過剰で、硬すぎます。','正解。アクリル系エマルション型接着剤がCF施工の標準です。','不正解。シリコーン系はCFの接着には適していません。','不正解。ゴム系溶剤型は長尺シート等に使われますが、CFにはアクリル系が一般的です。']},{q:'天井の施工方法のうち、「直貼り天井」の特徴として正しいものはどれか？',o:['天井高を自由に変えられる','野縁を使って吊り天井にする','天井裏に十分な空間を確保できる','躯体（スラブ）に直接仕上げ材を張り付ける'],a:3,genre:6,d:2,ex:'直貼り天井は躯体（コンクリートスラブなど）に直接仕上げ材を張り付ける工法で、天井高を確保できるメリットがあります。',oex:['不正解。天井高の調整は吊り天井の方が自由度が高いです。','不正解。野縁を使うのは吊り天井の工法です。','不正解。直貼りは天井裏空間が少ないのがデメリットです。','正解。直貼り天井は躯体に直接仕上げ材を張ります。']},{q:'壁のクロス施工で、下地にシーラーを塗る目的として正しいものはどれか？',o:['下地にテクスチャを付ける','クロスの防火性能を高める','下地の色を隠す','下地の強化と糊の接着力を向上させる'],a:3,genre:6,d:2,ex:'シーラーは下地の粉落ちを防止し、糊の吸い込みを均一にして接着力を向上させるために塗ります。',oex:['不正解。テクスチャ付与はシーラーの目的ではありません。','不正解。防火性能はシーラーの目的ではありません。','不正解。色を隠すのはシーラーの主目的ではありません。','正解。シーラーは下地強化と接着力向上のために塗ります。']},{q:'カーペットの施工方法のうち、「グリッパー工法」の特徴として正しいものはどれか？',o:['カーペットを接着剤で全面固定する','壁際にグリッパーを取り付け、カーペットを引っ掛けて固定する','カーペットタイルを敷き並べる','両面テープで固定する'],a:1,genre:6,d:2,ex:'グリッパー工法は壁際にグリッパー（ピン付きの金物）を取り付け、カーペットを引っ張ってピンに引っ掛けて固定します。',oex:['不正解。接着剤での全面固定は全面接着工法です。','正解。グリッパー工法は壁際のピン付き金物にカーペットを引っ掛けて固定します。','不正解。タイルの敷き並べはタイルカーペット工法です。','不正解。両面テープ固定はグリッパー工法ではありません。']},{q:'内装工事における「墨出し」作業の目的はどれか？',o:['壁や間仕切りの位置・高さの基準線を床や壁に記す','配管の保護塗装を行う','塗装の下塗りを行う','コンクリートのひび割れを補修する'],a:0,genre:6,d:1,ex:'墨出しは、壁・間仕切り・設備機器などの位置や高さの基準となる線を床面や壁面に記す作業です。',oex:['正解。墨出しは基準線を記す作業で、内装工事の第一歩です。','不正解。保護塗装は墨出しとは異なる作業です。','不正解。塗装の下塗りは墨出しではありません。','不正解。ひび割れ補修は墨出しではありません。']},{q:'木質フローリングの含水率として、施工時に適切な範囲はどれか？',o:['5%以下','8〜13%','18〜22%','25%以上'],a:1,genre:6,d:3,ex:'木質フローリングの含水率は8〜13%程度が適正です。含水率が高すぎると施工後に収縮して隙間が生じます。',oex:['不正解。5%以下は過乾燥で、施工後に膨張する恐れがあります。','正解。8〜13%が木質フローリングの適正含水率です。','不正解。18〜22%は高すぎて、施工後に収縮・変形の原因になります。','不正解。25%以上は完全に高すぎます。']},{q:'軽量鉄骨（LGS）下地で使用される「ランナー」の役割はどれか？',o:['壁の上下に取り付けてスタッドを受ける部材','防火区画を形成する部材','配管を固定する部材','天井を吊るための部材'],a:0,genre:6,d:1,ex:'ランナーは壁の上下（床と天井）に取り付け、スタッド（縦材）の上下端を受ける溝型の部材です。',oex:['正解。ランナーは上下に取り付けてスタッドを受けるレール状の部材です。','不正解。防火区画形成は下地構成全体の機能であり、ランナー単体の役割ではありません。','不正解。配管固定はランナーの役割ではありません。','不正解。天井を吊るのはハンガーや吊りボルトです。']},{q:'吹付けタイルの施工において、主材の吹付け回数として一般的なものはどれか？',o:['1回','2回','3回','4回'],a:1,genre:6,d:2,ex:'吹付けタイルは下塗り→主材（2回吹き）→上塗りの工程で施工するのが一般的です。主材は2回吹付けが標準です。',oex:['不正解。1回では塗膜が薄く、十分なテクスチャが得られません。','正解。主材の吹付けは2回が標準です。','不正解。3回は過剰です。標準は2回です。','不正解。4回は過剰です。']},{q:'内装工事で使用される「スパッタシート」の用途はどれか？',o:['溶接・溶断時の火花から周囲を保護する不燃シート','床の養生に使う防水シート','天井の防音に使う吸音シート','壁面の防湿に使うシート'],a:0,genre:6,d:1,ex:'スパッタシートは溶接・溶断作業時に発生する火花（スパッタ）から周囲の内装材等を保護する不燃性のシートです。',oex:['正解。スパッタシートは溶接火花から周囲を保護する不燃シートです。','不正解。床養生の防水シートとは異なります。','不正解。吸音シートではありません。','不正解。防湿シートではありません。']},{q:'石膏ボードの種類のうち、水回りに使用される耐水性のボードはどれか？',o:['普通石膏ボード（GB-R）','シージング石膏ボード（GB-S）','強化石膏ボード（GB-F）','化粧石膏ボード（GB-D）'],a:1,genre:6,d:2,ex:'シージング石膏ボード（GB-S）は芯材・原紙に防水処理が施された耐水性のボードで、水回りに使用されます。',oex:['不正解。普通石膏ボード（GB-R）は一般用で、耐水性はありません。','正解。シージング石膏ボード（GB-S）が耐水性のボードです。','不正解。強化石膏ボード（GB-F）は耐火性に優れますが、耐水ではありません。','不正解。化粧石膏ボード（GB-D）は表面に化粧処理がされたものです。']},{q:'OAフロア（フリーアクセスフロア）の一般的な床高さとして多いものはどれか？',o:['30〜50mm','50〜100mm','100〜150mm','200〜300mm'],a:1,genre:6,d:2,ex:'OAフロアの一般的な床高さは50〜100mm程度です。配線量や用途に応じて高さを選択します。',oex:['不正解。30〜50mmでは配線スペースが不足する場合があります。','正解。OAフロアは50〜100mm程度が一般的です。','不正解。100〜150mmは大規模なサーバールーム等で使用される高さです。','不正解。200〜300mmは特殊用途（大量配線）向けです。']},{q:'防音工事で使用される「遮音等級」の記号はどれか？',o:['T値','D値','R値','L値'],a:1,genre:6,d:2,ex:'遮音等級は「D値」（Dr値）で表され、数値が大きいほど遮音性能が高いことを示します。床衝撃音はL値です。',oex:['不正解。T値は遮音等級ではありません。','正解。遮音等級はD値（Dr値）で表されます。','不正解。R値は遮音等級ではありません（透過損失にRが使われることはあります）。','不正解。L値は床衝撃音の等級（小さいほど良い）です。']},{q:'消防法における消火器の設置義務に関して、延べ面積何m²以上の防火対象物に設置が必要か？',o:['100m²以上','150m²以上','200m²以上','300m²以上'],a:1,genre:4,d:2,ex:'消防法施行令により、延べ面積150m²以上の防火対象物には消火器の設置が義務付けられています。',oex:['不正解。100m²ではありません','正解。150m²以上で設置義務があります','不正解。200m²は基準値ではありません','不正解。300m²は基準値ではありません']},{q:'非常用照明装置の点灯時間は最低何分以上必要か？',o:['20分以上','30分以上','45分以上','60分以上'],a:1,genre:4,d:1,ex:'建築基準法施行令により、非常用照明装置は30分以上点灯できることが必要です。',oex:['不正解。20分では不足です','正解。30分以上が必要です','不正解。45分は基準値ではありません','不正解。60分は必須ではありません']},{q:'自動火災報知設備の感知器の作動試験に使用する器具はどれか？',o:['加煙試験器','クランプメーター','マノメーター','テスター'],a:0,genre:4,d:2,ex:'煙感知器の作動試験には加煙試験器を使用し、煙を発生させて感知器の動作を確認します。',oex:['正解。加煙試験器で煙感知器を試験します','クランプメーターは電流計測器です','マノメーターは圧力計です','テスターは電気計測器です']},{q:'屋内消火栓設備の放水圧力の上限値はいくらか？',o:['0.5MPa','0.6MPa','0.7MPa','0.8MPa'],a:2,genre:4,d:3,ex:'屋内消火栓設備の放水圧力は0.7MPaを超えないようにする必要があります。',oex:['不正解。0.5MPaは下限に近い値です','不正解。0.6MPaは基準値ではありません','正解。放水圧力は0.7MPa以下とします','不正解。0.8MPaは基準を超えています']},{q:'防火ダンパーの作動温度は通常何℃に設定されているか？',o:['120℃','100℃','60℃','72℃'],a:3,genre:4,d:2,ex:'一般的な防火ダンパーの温度ヒューズは72℃で溶断し、ダンパーが閉鎖します。',oex:['不正解。120℃は厨房用です','不正解。厨房用ダンパーは120℃ですが一般は72℃','不正解。60℃では低すぎます','正解。72℃が標準的な作動温度です']},{q:'スプリンクラーヘッドの標準型の放水量は毎分何リットル以上か？',o:['80L/分','100L/分','120L/分','60L/分'],a:0,genre:4,d:2,ex:'標準型スプリンクラーヘッドの放水量は毎分80リットル以上と定められています。',oex:['正解。標準型は80L/分以上です','不正解。100Lは基準値ではありません','不正解。120Lは基準値ではありません','不正解。60Lでは不足です']},{q:'連結送水管の放水口の設置間隔として正しいものはどれか？',o:['水平距離25m以内','各階に1個以上','水平距離50m以内','各階の面積100m²ごとに1個'],a:2,genre:4,d:3,ex:'連結送水管の放水口は、階の各部分からホース接続口までの水平距離が50m以下になるように設置します。',oex:['不正解。25mは屋内消火栓の基準です','各階に1個以上は設置しますが間隔基準ではありません','正解。水平距離50m以内に設置します','面積基準ではなく距離基準です']},{q:'ガス漏れ警報器の検知部の設置高さとして、都市ガス（空気より軽い）の場合正しいものはどれか？',o:['床面から30cm以内','天井面から30cm以内','床面から150cm','壁面の中央部'],a:1,genre:4,d:2,ex:'都市ガス（空気より軽い）の場合、ガス漏れ警報器は天井面から30cm以内に設置します。',oex:['不正解。床面付近はLP 0℃以上','55℃以上','70℃以上'],a:2,genre:4,d:3,ex:'レジオネラ菌対策として、中央式給湯設備の返湯温度は55℃以上を維持することが推奨されます。',oex:['30℃ではレジオネラ菌が繁殖します','40℃ではレジオネラ菌の繁殖域です','正解。55℃以上でレジオネラ菌を抑制します','70℃は給湯温度としては高すぎます']},{q:'ファンコイルユニットの点検項目に含まれないものはどれか？',o:['フィルターの汚れ','ドレンパンの排水状態','冷温水コイルの目詰まり','ユニットの塗装色'],a:3,genre:4,d:1,ex:'ファンコイルユニットの点検ではフィルター、ドレンパン、コイルの状態を確認しますが、塗装色は点検項目ではありません。',oex:['フィルターの汚れは確認必須です','ドレンパンの排水状態は確認必須です','コイルの目詰まりは確認必須です','正解。塗装色は点検項目ではありません']},{q:'防火管理者の業務に含まれないものはどれか？',o:['消防計画の作成','消火・通報・避難訓練の実施','消防用設備等の点検・整備','建物の構造設計の変更'],a:3,genre:4,d:1,ex:'防火管理者は消防計画の作成、訓練の実施、設備の点検整備等を行いますが、構造設計の変更は建築士の業務です。',oex:['消防計画の作成は防火管理者の業務です','訓練の実施は防火管理者の業務です','点検・整備は防火管理者の業務です','正解。構造設計の変更は防火管理者の業務ではありません']},{q:'ガス漏れ火災警報設備の検知区域の面積基準はどれか？',o:['300m²以下','600m²以下','1000m²以下','1500m²以下'],a:1,genre:4,d:3,ex:'ガス漏れ火災警報設備の検知区域は600m²以下ごとに区画します。',oex:['300m²は基準値ではありません','正解。600m²以下が基準です','1000m²は基準を超えています','1500m²は基準を超えています']},{q:'受水槽のオーバーフロー管の管端に設置するものはどれか？',o:['ストレーナー','減圧弁','防虫網','逆止弁'],a:2,genre:4,d:1,ex:'オーバーフロー管の管端には害虫の侵入を防ぐため防虫網を設置します。',oex:['ストレーナーではありません','減圧弁ではありません','正解。防虫網を設置します','逆止弁ではありません']},{q:'空調機のVベルトの張り具合を確認する方法はどれか？',o:['ベルトの中央をたわませ沈み量を確認する','ベルトの色で判断する','ベルトの温度で判断する','ベルトを引っ張って伸び率を測る'],a:0,genre:4,d:2,ex:'Vベルトの張り具合は、ベルトスパンの中央を指で押し、たわみ量（沈み量）で確認します。',oex:['正解。中央のたわみ量で確認します','色では張り具合は判断できません','温度では張り具合は判断できません','伸び率での確認は適切ではありません']},{q:'消防法における危険物施設の定期点検の記録保存期間は何年か？',o:['5年','3年','1年','10年'],a:1,genre:4,d:3,ex:'危険物施設の定期点検記録は3年間保存する必要があります。',oex:['5年ではありません','正解。3年間の保存が必要です','1年では短すぎます','10年ではありません']},{q:'名刺交換の際、相手の名刺を受け取ったときの正しい対応はどれか？',o:['名刺にメモを書き込む','名刺入れの上に置き、打ち合わせ中はテーブルに置く','すぐにポケットにしまう','名刺を折り曲げて財布に入れる'],a:1,genre:5,d:1,ex:'受け取った名刺は名刺入れの上に置き、打ち合わせ中はテーブルの上に相手の着席位置に合わせて並べます。',oex:['名刺にメモを書くのは相手の前では失礼です','正解。名刺入れの上に置きます','すぐにしまうのは失礼です','折り曲げるのは失礼です']},{q:'建設現場での安全朝礼において、KY活動の「K」と「Y」はそれぞれ何を指すか？',o:['管理・要領','危険・予知','計画・予算','基準・用途'],a:1,genre:5,d:1,ex:'KY活動とは「危険予知」活動のことで、作業前に潜在的な危険を予測し対策を立てる活動です。',oex:['管理・要領ではありません','正解。K=危険、Y=予知です','計画・予算ではありません','基準・用途ではありません']},{q:'ビジネスメールで「CC」に入れる人の役割として正しいものはどれか？',o:['メールの最終承認者','情報共有として内容を知っておくべき人','返信の義務がある人','メールの転送先'],a:1,genre:5,d:1,ex:'CC（カーボンコピー）は直接の対応は不要だが、情報として知っておくべき人に入れます。',oex:['最終承認者はTOに入れるべきです','正解。情報共有のためにCCに入れます','返信義務があるのは「TO」の人です','転送先とは別の概念です']},{q:'建設業における元請・下請関係で、下請業者が守るべきマナーとして最も重要なものはどれか？',o:['元請の指示を無視して独自判断で作業する','作業完了の報告を元請に速やかに行う','問題が発生しても自分で解決し報告しない','工程の遅れは隠して対応する'],a:1,genre:5,d:1,ex:'下請業者は作業の進捗や完了を元請に速やかに報告し、問題発生時も隠さず報告することが重要です。',oex:['独自判断は危険です','正解。速やかな報告が最も重要です','問題の隠蔽は重大事故につながります','工程遅れの隠蔽は信頼を失います']},{q:'電話応対で相手の名前を聞き取れなかった場合の正しい対応はどれか？',o:['無視してそのまま会話を続ける','「聞こえません」と大きな声で言う','「恐れ入りますが、もう一度お名前をお伺いしてもよろしいでしょうか」と聞き返す','適当に聞こえた名前でメモする'],a:2,genre:5,d:1,ex:'聞き取れなかった場合は丁寧に聞き返すのがビジネスマナーです。',oex:['無視は失礼です','大きな声は不適切です','正解。丁寧に聞き返します','適当にメモすると間違いの元です']},{q:'建設現場で「ヒヤリハット」を報告する目的として正しいものはどれか？',o:['作業者の責任を追及するため','上司に気に入られるため','報告書を多く作成するため','災害を未然に防止するため'],a:3,genre:5,d:1,ex:'ヒヤリハット報告は、重大事故につながる可能性のある事例を共有し、再発防止策を講じるためのものです。',oex:['責任追及が目的ではありません','人間関係が目的ではありません','報告書の数が目的ではありません','正解。災害の未然防止が目的です']},{q:'ビジネス文書の「拝啓」に対する結語として正しいものはどれか？',o:['草々','敬具','以上','記'],a:1,genre:5,d:1,ex:'「拝啓」の結語は「敬具」です。「草々」は「前略」の結語です。',oex:['「草々」は「前略」の結語です','正解。「拝啓」の結語は「敬具」です','「以上」は箇条書きの終わりに使います','「記」は記書きの始まりに使います']},{q:'建設現場での「指差し呼称」の目的として正しいものはどれか？',o:['周囲に作業を見せるため','確認の意識を高め、ヒューマンエラーを防止するため','声を出す練習のため','指の運動のため'],a:1,genre:5,d:1,ex:'指差し呼称は対象を指差し声に出して確認することで、意識レベルを高めエラーを防止します。',oex:['見せることが目的ではありません','正解。ヒューマンエラー防止が目的です','声の練習ではありません','指の運動ではありません']},{q:'会議でのプレゼンテーション資料の作成において、最も重要なことはどれか？',o:['できるだけ多くの文字を詰め込む','アニメーションを多用する','結論から述べ、要点を明確にする','フォントを多種類使い見栄えを良くする'],a:2,genre:5,d:2,ex:'プレゼンテーションでは結論を先に述べ、要点を明確にすることが最も重要です。',oex:['文字の詰め込みは逆効果です','アニメーションの多用は集中を妨げます','正解。結論先行で要点を明確にします','フォントの多用は読みにくくなります']},{q:'来客を応接室に案内する際、ドアの開け方として正しいものはどれか？',o:['来客の後ろからドアを押す','ドアを開けたまま先に座る','来客にドアを開けさせる','自分が先に入室し、来客を招き入れる（内開きの場合）'],a:3,genre:5,d:2,ex:'内開きのドアの場合は案内者が先に入室してドアを押さえ、来客を招き入れます。外開きの場合はドアを引いて来客を先に通します。',oex:['後ろから押すのは失礼です','先に座るのは失礼です','来客にドアを開けさせるのは失礼です','正解。内開きの場合は先に入室します']},{q:'報告書の「5W1H」の「H」は何を指すか？',o:['How（どのように）','Here（どこで）','Help（助け）','High（高い）'],a:0,genre:5,d:1,ex:'5W1HのHは「How（どのように）」で、方法や手段を示します。',oex:['正解。HはHow（どのように）です','Here（どこで）はWhereに含まれます','Helpは5W1Hに含まれません','Highは5W1Hに含まれません']},{q:'工事の見積書を提出する際のビジネスマナーとして適切なものはどれか？',o:['見積金額は曖昧にしておく','見積有効期限を明記して書面で提出する','FAXで送りっぱなしにする','口頭で金額だけ伝える'],a:1,genre:5,d:2,ex:'見積書は有効期限を明記し、書面で正式に提出するのがビジネスマナーです。',oex:['金額を曖昧にするのは不誠実です','正解。有効期限を明記して書面で提出します','送りっぱなしは確認不足です','口頭だけでは記録が残りません']},{q:'上座と下座の概念において、会議室での上座の位置はどこか？',o:['窓際の席','通路側の席','入口から最も遠い席','入口に最も近い席'],a:2,genre:5,d:1,ex:'日本のビジネスマナーでは、入口から最も遠い席が上座とされています。',oex:['窓際が必ず上座とは限りません','通路側が上座とは限りません','正解。入口から最も遠い席が上座です','入口に近い席は下座です']},{q:'安全管理活動における「PDCAサイクル」の「C」は何を指すか？',o:['Control（管理）','Check（確認・評価）','Create（創造）','Change（変更）'],a:1,genre:5,d:1,ex:'PDCAサイクルのCはCheck（確認・評価）で、実施した結果を評価する段階です。',oex:['Controlではありません','正解。CはCheck（確認・評価）です','Createではありません','Changeではありません']},{q:'建設現場での作業報告書に記載すべき必須事項として適切でないものはどれか？',o:['使用材料・機器','作業内容・数量','作業者の私的な感想','作業日時・場所'],a:2,genre:5,d:1,ex:'作業報告書には日時、場所、内容、数量、使用材料等を記載しますが、私的な感想は不要です。',oex:['使用材料・機器は必須です','作業内容・数量は必須です','正解。私的な感想は不要です','作業日時・場所は必須です']},{q:'取引先との接待で、日本料理店での正しい箸の使い方はどれか？',o:['箸を使って皿を引き寄せる','箸置きに箸を置いてから飲み物を飲む','箸を振って合図を送る','箸で料理を刺して食べる'],a:1,genre:5,d:2,ex:'箸は箸置きに置いてから飲み物を飲むのがマナーです。料理を刺す、皿を引き寄せる等は「嫌い箸」です。',oex:['寄せ箸は嫌い箸です','正解。箸置きに置いてから飲み物を飲みます','箸を振るのはマナー違反です','刺し箸は嫌い箸です']},{q:'建設現場の安全標識で「黄色」は何を意味するか？',o:['禁止','注意','指示','安全'],a:1,genre:5,d:1,ex:'安全標識の色の意味は、赤=禁止・防火、黄=注意、青=指示、緑=安全・救護です。',oex:['禁止は赤色です','正解。黄色は注意を意味します','指示は青色です','安全は緑色です']},{q:'ビジネスにおける「コンプライアンス」の意味として正しいものはどれか？',o:['利益の最大化','法令遵守','コスト削減','顧客満足度向上'],a:1,genre:5,d:1,ex:'コンプライアンスは法令遵守を意味し、企業が法律や規則、社会規範を守ることです。',oex:['利益の最大化ではありません','正解。法令遵守を意味します','コスト削減ではありません','顧客満足度向上ではありません']},{q:'建設現場で新規入場者教育を行うタイミングとして正しいものはどれか？',o:['作業開始後1週間以内','初めて現場に入場する前','月末にまとめて実施','年1回の安全大会時'],a:1,genre:5,d:1,ex:'新規入場者教育は、作業員が初めて現場に入場する前に実施し、現場のルールや危険箇所を周知します。',oex:['作業開始後では遅すぎます','正解。入場前に実施します','月末のまとめ実施では対応が遅い','年1回では不十分です']},{q:'ビジネス文書で日付を記載する位置として正しいものはどれか？',o:['文書の右上','差出人名の左','本文の最後','宛名の下'],a:0,genre:5,d:2,ex:'ビジネス文書では日付は文書の右上に記載するのが一般的です。',oex:['正解。文書の右上に記載します','差出人名の左ではありません','本文の最後ではありません','宛名の下ではありません']},{q:'工事完了後の引渡し時に提出すべき書類として適切でないものはどれか？',o:['作業員の履歴書','取扱説明書','工事写真','完成図書'],a:0,genre:5,d:1,ex:'工事完了時には完成図書、取扱説明書、工事写真等を提出しますが、作業員の履歴書は不要です。',oex:['正解。作業員の履歴書は不要です','取扱説明書は必要です','工事写真は必要です','完成図書は必要です']},{q:'ビジネスメールの件名として適切なものはどれか？',o:['大事なお話','こんにちは','【ご確認依頼】3月15日工程会議の議事録','お疲れ様です'],a:2,genre:5,d:1,ex:'メールの件名は内容がすぐわかるように具体的に記載するのがマナーです。',oex:['漠然とした表現は不適切です','挨拶は件名に適しません','正解。具体的な内容を件名に記載します','挨拶だけでは内容がわかりません']},{q:'クレーム対応の基本姿勢として最も適切なものはどれか？',o:['まず相手の話を傾聴し、お詫びの気持ちを伝える','反論して自社の正当性を主張する','すぐに値引きを提案する','無視して放置する'],a:0,genre:5,d:2,ex:'クレーム対応では、まず相手の話をしっかり聞き、不快な思いをさせたことへのお詫びを伝えることが基本です。',oex:['正解。傾聴とお詫びが基本です','反論は状況を悪化させます','安易な値引きは解決になりません','無視は最悪の対応です']},{q:'建設業法で定められている施工体制台帳の作成義務が発生する下請代金の合計額はいくら以上か？',o:['3,000万円以上','1,000万円以上','4,500万円以上','1億円以上'],a:2,genre:5,d:3,ex:'元請負人は下請代金の額の合計が4,500万円（建築一式工事は7,000万円）以上の場合、施工体制台帳を作成する義務があります。',oex:['3,000万円ではありません','1,000万円ではありません','正解。4,500万円以上で作成義務があります','1億円ではありません']},{q:'社内文書と社外文書の違いとして正しいものはどれか？',o:['社内文書は敬語を使わなくてよい','社内文書には頭語・結語は不要である','社外文書は略語を多用してよい','社内文書は署名が不要である'],a:1,genre:5,d:2,ex:'社内文書は社外文書と異なり、頭語（拝啓等）や結語（敬具等）は不要で、簡潔に記載します。',oex:['社内でも一定の敬語は必要です','正解。社内文書に頭語・結語は不要です','社外文書では正式な表現を使います','社内文書でも署名は必要です']},{q:'安全衛生管理体制で、統括安全衛生責任者を選任する義務がある特定元方事業者の労働者数は何人以上か？',o:['10人以上','30人以上','50人以上','100人以上'],a:2,genre:5,d:3,ex:'特定元方事業者は、関係請負人の労働者を含め常時50人以上の労働者が作業する場合、統括安全衛生責任者を選任します。',oex:['10人ではありません','30人ではありません','正解。50人以上で選任義務があります','100人ではありません']},{q:'ビジネスにおける「ホウレンソウ」の「レン」は何を指すか？',o:['連絡','練習','連携','連帯'],a:0,genre:5,d:1,ex:'ホウレンソウとは「報告・連絡・相談」の略で、「レン」は連絡を指します。',oex:['正解。レンは連絡です','練習ではありません','連携ではありません','連帯ではありません']},{q:'建設現場での安全帯（フルハーネス型）の使用が義務付けられる高さは何m以上か？',o:['6.75m以上','5m以上','2m以上','1.5m以上'],a:0,genre:5,d:3,ex:'2022年の法改正により、高さ6.75m以上の作業ではフルハーネス型墜落制止用器具の使用が義務付けられています。',oex:['正解。6.75m以上でフルハーネス型が義務です','5mは基準値ではありません','2m以上は安全帯の使用義務ですが型式指定ではありません','1.5mは基準値ではありません']},{q:'取引先への年始の挨拶状（年賀状）を出す期限として適切なものはどれか？',o:['1月15日まで','12月25日まで','1月7日（松の内）まで','12月15日まで'],a:2,genre:5,d:2,ex:'年賀状は松の内（1月7日）までに届くように出すのがマナーです。それ以降は寒中見舞いとなります。',oex:['1月15日を過ぎると失礼になる場合があります','12月25日は投函期限として推奨されます','正解。1月7日（松の内）までに届くようにします','12月15日は早すぎます']},{q:'議事録の作成において、最も重要な記載事項はどれか？',o:['参加者の服装','会議室の温度','決定事項と担当者・期限','会議中に出たジョーク'],a:2,genre:5,d:1,ex:'議事録で最も重要なのは、何が決まったか、誰が担当か、いつまでにやるかを明確にすることです。',oex:['服装は議事録に不要です','温度は議事録に不要です','正解。決定事項・担当者・期限が重要です','ジョークは議事録に不要です']},{q:'建設業における安全書類（グリーンファイル）に含まれないものはどれか？',o:['営業報告書','安全衛生計画書','火気使用願','作業員名簿'],a:0,genre:5,d:2,ex:'グリーンファイルには作業員名簿、安全衛生計画書、火気使用願等が含まれますが、営業報告書は含まれません。',oex:['正解。営業報告書は安全書類ではありません','安全衛生計画書は含まれます','火気使用願は含まれます','作業員名簿は含まれます']},{q:'ビジネスの場での正しい紹介の順序はどれか？',o:['目上の人を先に紹介する','目下の人を先に紹介する','年齢の高い人を先に紹介する','社外の人を先に紹介する'],a:1,genre:5,d:2,ex:'ビジネスマナーでは、目下の人（自社側）を先に紹介し、その後目上の人（お客様等）を紹介します。',oex:['目上の人を先に紹介するのは間違いです','正解。目下の人を先に紹介します','年齢ではなく立場で順序を決めます','社外の人は後に紹介します']},{q:'工事現場の日報に記載すべき事項として適切でないものはどれか？',o:['作業員の昼食メニュー','主要な作業内容','作業人員','天候'],a:0,genre:5,d:1,ex:'日報には天候、作業人員、作業内容等を記載しますが、昼食メニューは記載事項ではありません。',oex:['正解。昼食メニューは記載事項ではありません','作業内容は記載事項です','作業人員は記載事項です','天候は記載事項です']},{q:'ビジネス文書における「殿」と「様」の使い分けとして正しいものはどれか？',o:['殿は社外向け、様は社内向けに使う','殿は公文書や社内文書、様は社外向けに使う','殿は目上、様は目下に使う','殿と様は同じ意味で互換性がある'],a:1,genre:5,d:2,ex:'「殿」は公文書や社内文書で使い、「様」は社外向けの文書で使うのが一般的です。',oex:['逆です','正解。殿は公文書・社内、様は社外です','目上・目下の区別ではありません','厳密には使い分けがあります']},{q:'安全衛生法で定められている安全衛生教育のうち、雇入れ時教育の実施義務者は誰か？',o:['国','都道府県知事','労働基準監督署長','事業者'],a:3,genre:5,d:2,ex:'労働安全衛生法第59条により、雇入れ時の安全衛生教育は事業者が実施する義務があります。',oex:['国ではありません','都道府県知事ではありません','労働基準監督署長ではありません','正解。事業者に実施義務があります']},{q:'エレベーター内での立ち位置として、来客を案内する場合に案内者が立つべき位置はどれか？',o:['奥の壁側','操作盤の前','来客の後ろ','入口の正面'],a:1,genre:5,d:2,ex:'案内者はエレベーターの操作盤の前に立ち、ドアの開閉や行先階の操作を行います。',oex:['奥は上位者の位置です','正解。操作盤の前に立ちます','来客の後ろは適切ではありません','入口正面は出入りの邪魔になります']},{q:'建設業法における主任技術者の配置が必要な工事はどれか？',o:['請負金額500万円以上の工事のみ','すべての建設工事','請負金額1億円以上の工事のみ','公共工事のみ'],a:1,genre:5,d:3,ex:'建設業法第26条により、建設業者はすべての建設工事の施工に当たり主任技術者を配置しなければなりません。',oex:['金額に関わらず必要です','正解。すべての建設工事に配置が必要です','金額に関わらず必要です','公共工事に限りません']},{q:'FAXを送信する際のビジネスマナーとして適切なものはどれか？',o:['送信後に電話で到着確認をする','送信票なしで本文だけ送る','深夜に送信する','個人情報を記載した書類をそのまま送る'],a:0,genre:5,d:1,ex:'FAX送信後は電話で到着確認をするのがビジネスマナーです。送信票を添付し、重要書類は別途確認します。',oex:['正解。到着確認の電話をします','送信票は必要です','深夜の送信は控えるべきです','個人情報の取り扱いには注意が必要です']},{q:'建設現場でのツールボックスミーティング（TBM）の適切な実施時間はどれか？',o:['30分以上','10～15分程度','1時間以上','5分以内'],a:1,genre:5,d:2,ex:'TBMは作業開始前に10～15分程度で、その日の作業内容と危険箇所を確認する短時間のミーティングです。',oex:['30分以上は長すぎます','正解。10～15分程度が適切です','1時間以上は長すぎます','5分以内では内容が薄くなります']},{q:'ビジネスにおける「リスクアセスメント」の意味として正しいものはどれか？',o:['顧客満足度調査','危険性の特定・評価と対策の決定','人事評価','利益の予測'],a:1,genre:5,d:2,ex:'リスクアセスメントとは、職場の危険性・有害性を特定し、リスクを見積もり、優先度を設定して対策を決定するプロセスです。',oex:['顧客満足度調査ではありません','正解。危険性の特定・評価と対策決定です','人事評価ではありません','利益の予測ではありません']},{q:'建設業における施工計画書に記載すべき事項として適切でないものはどれか？',o:['社員旅行の計画','品質管理計画','工事概要','施工方法'],a:0,genre:5,d:1,ex:'施工計画書には工事概要、施工方法、品質管理計画等を記載しますが、社員旅行は関係ありません。',oex:['正解。社員旅行は施工計画書と無関係です','品質管理計画は記載事項です','工事概要は記載事項です','施工方法は記載事項です']},{q:'敬語の種類で「いらっしゃる」は何語か？',o:['謙譲語','尊敬語','美化語','丁寧語'],a:1,genre:5,d:2,ex:'「いらっしゃる」は「いる」「行く」「来る」の尊敬語です。相手の動作に対して使います。',oex:['謙譲語は自分の動作を低める表現です','正解。尊敬語です','美化語は「お料理」等です','丁寧語は「です」「ます」等です']},{q:'建設業における安全表彰制度の目的として最も適切なものはどれか？',o:['優秀な作業員に賞金を与える','安全意識の向上と安全活動の推進','工事の受注を増やす','労災保険料を下げる'],a:1,genre:5,d:2,ex:'安全表彰制度は、優れた安全活動を表彰することで、全体の安全意識向上と安全活動の推進を図る制度です。',oex:['賞金が主目的ではありません','正解。安全意識の向上と活動推進が目的です','受注増加が主目的ではありません','保険料低減が主目的ではありません']},{q:'ビジネスでの謝罪の際、最初に述べるべきことはどれか？',o:['責任を他者に転嫁する','言い訳を先に述べる','問題を軽視する発言をする','まずお詫びの言葉を述べる'],a:3,genre:5,d:1,ex:'謝罪の際はまず「大変申し訳ございませんでした」等のお詫びの言葉を述べ、その後原因と対策を説明します。',oex:['責任転嫁は信頼を失います','言い訳を先にするのは逆効果です','軽視する発言は問題を悪化させます','正解。まずお詫びの言葉を述べます']},{q:'工事の「工程表」の種類として存在しないものはどれか？',o:['ネットワーク工程表','バーチャート工程表','ガントチャート','フローリング工程表'],a:3,genre:5,d:2,ex:'バーチャート、ネットワーク工程表、ガントチャートは工程管理の手法ですが、フローリング工程表は存在しません。',oex:['ネットワーク工程表は存在します','バーチャートは一般的な工程表です','ガントチャートは存在します','正解。フローリング工程表は存在しません']},{q:'労働安全衛生法で定められている作業主任者の選任が必要な作業はどれか？',o:['事務所での書類整理','酸素欠乏危険場所での作業','通常の屋外清掃','会議室の椅子の移動'],a:1,genre:5,d:2,ex:'酸素欠乏危険場所での作業には、酸素欠乏危険作業主任者の選任が必要です。',oex:['書類整理に作業主任者は不要です','正解。酸素欠乏危険場所では作業主任者が必要です','通常の清掃に作業主任者は不要です','椅子の移動に作業主任者は不要です']},{q:'ビジネスにおける「ステークホルダー」の意味として正しいものはどれか？',o:['株主だけを指す','利害関係者全体を指す','競合他社を指す','従業員だけを指す'],a:1,genre:5,d:2,ex:'ステークホルダーとは、株主、従業員、顧客、取引先、地域社会など、企業活動に影響を受ける全ての利害関係者を指します。',oex:['株主だけではありません','正解。利害関係者全体を指します','競合他社だけではありません','従業員だけではありません']},{q:'建設現場の「整理整頓」の「整理」と「整頓」の違いとして正しいものはどれか？',o:['整理と整頓は同じ意味','整理は掃除すること、整頓は飾ること','整理は記録すること、整頓は保管すること','整理は不要なものを捨てること、整頓は必要なものを使いやすく配置すること'],a:3,genre:5,d:2,ex:'整理は必要なものと不要なものを分け不要なものを処分すること、整頓は必要なものを決められた場所に配置することです。',oex:['同じ意味ではありません','掃除は「清掃」です','記録は「整理」ではありません','正解。整理は処分、整頓は配置です']},{q:'ビジネスにおける「OJT」の意味として正しいものはどれか？',o:['Off the Job Training（社外研修）','On the Job Training（職場内教育）','Open Job Test（公開試験）','Only Japanese Training（日本語研修）'],a:1,genre:5,d:1,ex:'OJTはOn the Job Trainingの略で、実際の職場で実務を通じて行う教育訓練のことです。',oex:['Off the Job Trainingは「Off-JT」です','正解。職場内教育のことです','公開試験ではありません','日本語研修ではありません']},{q:'建設業の許可区分で「特定建設業」の許可が必要となるのはどのような場合か？',o:['すべての建設工事を請け負う場合','発注者から直接請け負い、下請代金の総額が4,500万円以上となる場合','500万円以上の工事を請け負う場合','公共工事のみ請け負う場合'],a:1,genre:5,d:3,ex:'元請として工事を受注し、下請代金の総額が4,500万円（建築一式工事は7,000万円）以上となる場合は特定建設業の許可が必要です。',oex:['すべての工事ではありません','正解。下請代金総額4,500万円以上で必要です','500万円は一般建設業の許可基準です','公共工事に限りません']},{q:'名刺交換で、同時に交換する場合の正しい手順はどれか？',o:['両手で渡し、両手で受け取る','右手で渡し、左手で受け取る','テーブルの上を滑らせて渡す','片手で投げ渡す'],a:1,genre:5,d:2,ex:'同時交換の場合は、右手で自分の名刺を差し出し、左手で相手の名刺を受け取るのがマナーです。',oex:['同時交換では両手は使えません','正解。右手で渡し左手で受け取ります','滑らせるのは失礼です','投げ渡すのは大変失礼です']},{q:'建設業法における「現場代理人」の役割として正しいものはどれか？',o:['設計変更の最終決定を行う','発注者の代理として監督する','請負人の代理として現場の運営管理を行う','技術的な施工管理のみを行う'],a:2,genre:5,d:2,ex:'現場代理人は請負人の代理として工事現場の運営・管理を行い、注文者との連絡調整を行います。',oex:['設計変更の最終決定権はありません','発注者の代理ではありません','正解。請負人の代理として現場を管理します','技術管理のみではありません']},{q:'せっこうボードの標準的な厚さとして一般的に使用されるものはどれか？',o:['6.5mm','9.5mm','12.5mm','18mm'],a:2,genre:6,d:1,ex:'一般的な壁・天井の下地に使用されるせっこうボードの厚さは12.5mmが標準です。9.5mmは天井用、15mmは防火用に使われます。',oex:['6.5mmは薄すぎます','9.5mmは天井用として使われます','正解。12.5mmが標準です','18mmは一般的ではありません']}, にする仕上げ'],a:1,genre:6,d:1,ex:'腰壁は壁の下部（床から90～120cm程度）を上部と異なる仕上げ材で仕上げた壁のことです。',oex:['天井近くではありません','正解。壁の下半分を別仕上げにします','外壁ではありません','全面タイルではありません']},{q:'冷凍機の成績係数（COP）の定義として正しいものはどれか？',o:['冷凍能力÷圧縮機動力','圧縮機動力÷冷凍能力','冷凍能力×圧縮機動力','冷凍能力＋圧縮機動力'],a:0,genre:7,d:2,ex:'COP（成績係数）は冷凍能力を圧縮機の消費動力で割った値で、値が大きいほど効率が良いことを示します。',oex:['正解。COP＝冷凍能力÷圧縮機動力です。','不正解。分子と分母が逆です。','不正解。掛け算ではありません。','不正解。足し算ではありません。']},{q:'ダクトの施工において、長方形ダクトのアスペクト比（長辺と短辺の比）の上限として推奨されるものはどれか？',o:['2:1','4:1','8:1','10:1'],a:1,genre:7,d:2,ex:'長方形ダクトのアスペクト比は4:1以下が推奨されます。アスペクト比が大きいとダクトの強度が低下します。',oex:['不正解。2:1は厳しすぎる制限です。4:1以下が推奨です。','正解。アスペクト比は4:1以下が推奨されています。','不正解。8:1は大きすぎて強度不足になります。','不正解。10:1は推奨されません。']},{q:'空調配管の冷温水配管方式で、リバースリターン方式の特徴はどれか？',o:['配管長が短くなりコスト削減できる','各機器への流量バランスが取りやすい','圧力損失が最も小さくなる','メンテナンスが容易になる'],a:1,genre:7,d:3,ex:'リバースリターン方式は還り管を送り管と逆方向に配管し、各機器までの配管長を等しくして流量バランスを取りやすくします。',oex:['不正解。配管長はダイレクトリターンより長くなります。','正解。リバースリターンは流量バランスが取りやすい方式です。','不正解。圧力損失は配管が長い分、むしろ大きくなります。','不正解。メンテナンス性はダイレクトリターンと大差ありません。']},{q:'送風機の風量制御方式のうち、省エネ効果が最も高いものはどれか？',o:['吐出しベーン制御','回転数制御（インバータ制御）','吸込みベーン制御','ダンパ制御'],a:1,genre:7,d:2,ex:'インバータによる回転数制御は、風量の3乗に比例して動力が変化するため、最も省エネ効果が高い方式です。',oex:['不正解。吐出しベーン制御もインバータに劣ります。','正解。インバータ制御が最も省エネ効果の高い風量制御方式です。','不正解。吸込みベーン制御はダンパより良いですが、インバータには劣ります。','不正解。ダンパ制御は抵抗を増やすため省エネ効果は最も低いです。']},{q:'配管の保温材として使用されるグラスウールの使用温度上限はどれか？',o:['200℃','350℃','500℃','100℃'],a:1,genre:7,d:2,ex:'グラスウール保温材の使用温度上限は約350℃です。それ以上にはロックウール（600℃）を使用します。',oex:['不正解。200℃は低すぎます。上限は350℃程度です。','正解。グラスウールの使用温度上限は約350℃です。','不正解。500℃はロックウールの温度範囲に近いです。','不正解。100℃は低すぎます。']},{q:'排水管の掃除口の設置間隔として適切なものはどれか？',o:['管径100mm以下で20m以内','管径100mm以下で30m以内','管径100mm以下で10m以内','管径100mm以下で15m以内'],a:3,genre:7,d:2,ex:'排水管の掃除口は、管径100mm以下では15m以内ごと、管径100mmを超えるものは30m以内ごとに設置します。',oex:['不正解。20m以内ではなく15m以内です。','不正解。30m以内は管径100mm超の場合の基準です。','不正解。10m以内は厳しすぎます。15m以内が正しいです。','正解。管径100mm以下では15m以内ごとに掃除口を設けます。']},{q:'ネットワーク工程表において、クリティカルパスとは何か？',o:['作業員数が最も多いルート','コストが最も高いルート','最も工期が短いルート','所要日数が最も長いルート'],a:3,genre:7,d:2,ex:'クリティカルパスは開始から完了までの所要日数が最も長いルートで、工期を決定するパスです。',oex:['不正解。作業員数とは関係ありません。','不正解。コストとは直接関係ありません。','不正解。最も短いルートではなく最も長いルートです。','正解。クリティカルパスは所要日数が最長のルートです。']},{q:'給水配管のウォーターハンマーを防止するための管内流速の上限として適切なものはどれか？',o:['1.0m/s以下','2.0m/s以下','4.0m/s以下','3.0m/s以下'],a:1,genre:7,d:2,ex:'給水管のウォーターハンマー防止のため、管内流速は2.0m/s以下にすることが推奨されています。',oex:['不正解。1.0m/s以下は厳しすぎます。2.0m/s以下が推奨です。','正解。管内流速は2.0m/s以下が推奨です。','不正解。4.0m/s以下は高すぎます。','不正解。3.0m/s以下では水撃が発生しやすくなります。']},{q:'建設業法における主任技術者になるための実務経験年数（指定学科の大学卒業の場合）はどれか？',o:['10年以上','1年以上','3年以上','5年以上'],a:2,genre:7,d:2,ex:'指定学科の大学を卒業した場合、3年以上の実務経験で主任技術者になることができます。高校卒は5年以上です。',oex:['不正解。10年以上は学歴を問わない場合です。','不正解。1年では不足です。大学卒で3年以上です。','正解。指定学科の大学卒業の場合は3年以上の実務経験が必要です。','不正解。5年以上は高校卒業の場合です。']},{q:'配管工事における「ねじ込み接合」の適用範囲として正しいものはどれか？',o:['管径300mm以下','管径200mm以下','管径100mm以下（4B以下）','管径50mm以下（2B以下）'],a:2,genre:7,d:2,ex:'ねじ込み接合は一般的に管径100mm（4B）以下の配管に適用されます。それ以上はフランジ接合や溶接接合を使用します。',oex:['不正解。300mmは大きすぎます。100mm以下が一般的です。','不正解。200mmは大きすぎます。','正解。ねじ込み接合は管径100mm（4B）以下に適用されます。','不正解。50mm以下に限定されるわけではありません。']},{q:'冷媒配管のろう付け施工時、管内に流す不活性ガスはどれか？',o:['酸素','窒素','アルゴン','二酸化炭素'],a:1,genre:7,d:2,ex:'冷媒配管のろう付け時は、管内の酸化を防ぐために窒素ガスを流しながら作業します（窒素ブロー）。',oex:['不正解。酸素は燃焼・酸化を助長するため使用しません。','正解。窒素ガスを流して管内の酸化を防ぎます（窒素ブロー）。','不正解。アルゴンは溶接には使いますが、ろう付けの窒素ブローには窒素を使います。','不正解。二酸化炭素は使用しません。']},{q:'建設現場における足場の作業床の幅として最低限必要な寸法はどれか？',o:['30cm以上','40cm以上','50cm以上','60cm以上'],a:1,genre:7,d:2,ex:'労働安全衛生規則により、足場の作業床の幅は40cm以上と定められています。',oex:['不正解。30cmでは狭すぎます。40cm以上が基準です。','正解。足場の作業床の幅は40cm以上です。','不正解。50cmは基準より大きいですが、最低限は40cmです。','不正解。60cmは望ましい幅ですが、最低限は40cmです。']},{q:'パッケージ形空気調和機の冷房能力の単位として正しいものはどれか？',o:['kcal/h','BTU','kW','HP'],a:2,genre:7,d:1,ex:'現在、空調機の能力表示にはSI単位系のkW（キロワット）が使用されます。旧単位のkcal/hは使われなくなっています。',oex:['不正解。kcal/hは旧単位で、現在はkWが標準です。','不正解。BTUは英国熱量単位で、日本ではkWが使われます。','正解。現在の空調能力はkW表示が標準です。','不正解。HPは馬力で、空調能力の表示には使いません。']},{q:'排水配管で「二重トラップ」を設けてはならない理由はどれか？',o:['排水管の材料費が増加するため','トラップの封水深が過大になるため','法律で禁止されているが技術的問題はないため','排水の流れが悪くなり詰まりの原因になるため'],a:3,genre:7,d:2,ex:'二重トラップは空気の逃げ道がなくなり、排水の流れが悪くなって詰まりの原因になるため禁止されています。',oex:['不正解。コストの問題ではなく、排水不良の問題です。','不正解。封水深の問題ではなく排水の流れの問題です。','不正解。技術的問題があるから禁止されています。','正解。二重トラップは排水の流れを阻害し、詰まりの原因になります。']},{q:'管工事で使用される「チーズ」の規格表示で「TR」が意味するものはどれか？',o:['キャップ付きチーズ','同径チーズ','異径チーズ','斜め45°チーズ'],a:2,genre:7,d:2,ex:'TRはReducing Tee（異径チーズ）を意味します。同径チーズはT、エルボはL（またはEL）で表示されます。',oex:['不正解。キャップ付きは別の規格です。','不正解。同径チーズはTです。TRは異径チーズです。','正解。TRはReducing Tee（異径チーズ）の略称です。','不正解。45°の分岐はYチーズ（ワイ）です。']},{q:'空調設備の全熱交換器の主な目的はどれか？',o:['換気時のエネルギーロスを低減する','室内の空気を浄化する','室内の湿度を一定に保つ','外気のCO2濃度を調整する'],a:0,genre:7,d:2,ex:'全熱交換器は排気の持つ熱（温度と湿度）を給気に回収し、換気による空調負荷を低減する省エネ装置です。',oex:['正解。全熱交換器は換気時のエネルギーロスを低減します。','不正解。空気浄化はフィルターの役割です。','不正解。湿度制御は加湿器・除湿器の役割です。','不正解。CO2調整は換気量で制御します。']},{q:'配管の伸縮継手（エキスパンションジョイント）を設置する主な目的はどれか？',o:['配管の口径を変更する','配管の接続を容易にする','配管の分岐を行う','配管の熱伸縮を吸収する'],a:3,genre:7,d:1,ex:'伸縮継手は配管の温度変化による熱伸縮を吸収し、配管や機器に過大な力がかからないようにします。',oex:['不正解。口径変更はレジューサーの役割です。','不正解。接続容易化はユニオンやフランジの役割です。','不正解。分岐はチーズの役割です。','正解。伸縮継手は配管の熱伸縮を吸収します。']},{q:'消防法上、屋内消火栓設備の1号消火栓と2号消火栓の違いとして正しいものはどれか？',o:['1号と2号は同じ性能で設置場所が異なるだけ','2号の方が放水圧力が高い','1号は1人操作可能で2号は2人必要','2号は1人操作可能で放水量が小さい'],a:3,genre:7,d:2,ex:'2号消火栓は1人操作可能で、放水量は1号（130L/min以上）より小さい（60L/min以上）ですが操作が簡便です。',oex:['不正解。性能が異なります。','不正解。2号の方が放水圧力・放水量ともに小さいです。','不正解。1号は2人操作が原則、2号が1人操作可能です。','正解。2号消火栓は1人操作可能で放水量は小さい設計です。']},{q:'ボイラーの「ブロー」を行う目的はどれか？',o:['缶体内の圧力を上げる','缶体内のスケールや不純物を排出する','蒸気の温度を調整する','燃焼効率を向上させる'],a:1,genre:7,d:2,ex:'ブロー（吹出し）は缶体内に蓄積したスケール（水垢）や不純物を排出し、水質を維持する作業です。',oex:['不正解。圧力を上げるのはブローの目的ではありません。','正解。ブローは缶体内のスケールや不純物を排出する作業です。','不正解。温度調整はブローの目的ではありません。','不正解。燃焼効率とは直接関係ありません。']},{q:'労働安全衛生法における「作業主任者」の選任が必要な作業はどれか？',o:['すべての建設作業','政令で定める危険・有害な作業','管理者が必要と判断した作業','元請が指定した作業'],a:1,genre:7,d:2,ex:'作業主任者は、労働安全衛生法施行令で定められた危険・有害な作業について選任が義務付けられています。',oex:['不正解。すべての作業ではなく、政令で定める特定の作業です。','正解。政令で定める危険・有害な作業に作業主任者の選任が必要です。','不正解。管理者の判断ではなく、法令で定められています。','不正解。元請の指定ではなく法令による義務です。']},{q:'配管の耐圧試験において、水圧試験の試験圧力として一般的なものはどれか？',o:['最高使用圧力の2.0倍','最高使用圧力の1.25倍','最高使用圧力の1.0倍','最高使用圧力の1.5倍'],a:3,genre:7,d:2,ex:'配管の水圧試験は一般的に最高使用圧力の1.5倍の圧力で行います。ただし、設備によって基準が異なる場合があります。',oex:['不正解。2.0倍は過大です。1.5倍が一般的です。','不正解。1.25倍は気密試験の圧力に近い値です。','不正解。1.0倍では十分な試験になりません。','正解。水圧試験は最高使用圧力の1.5倍で行います。']},{q:'変風量方式（VAV）の特徴として正しいものはどれか？',o:['送風温度を変えて室温を制御する','送風量を変えて室温を制御する','冷温水量を変えて室温を制御する','送風湿度を変えて室温を制御する'],a:1,genre:7,d:2,ex:'VAV（Variable Air Volume）方式は、送風量を変化させて各ゾーンの室温を個別に制御する方式です。',oex:['不正解。送風温度を変えるのは定風量方式（CAV）での制御です。','正解。VAV方式は送風量を変えて室温を制御します。','不正解。冷温水量の制御はFCUの制御方式です。','不正解。湿度での制御はVAVの特徴ではありません。']},{q:'品質管理における「バラツキ」を表す指標はどれか？',o:['標準偏差','最大値','平均値','中央値'],a:0,genre:7,d:1,ex:'標準偏差はデータのバラツキ（散らばり具合）を表す統計指標です。値が大きいほどバラツキが大きいことを示します。',oex:['正解。標準偏差はバラツキを表す指標です。','不正解。最大値は極端な値を示すだけです。','不正解。平均値は中心的な値を示しますが、バラツキは示しません。','不正解。中央値はデータの中央の値で、バラツキとは異なります。']},{q:'冷媒配管の気密試験に使用するガスとして適切なものはどれか？',o:['酸素ガス','窒素ガス','アセチレンガス','プロパンガス'],a:1,genre:7,d:1,ex:'冷媒配管の気密試験には不活性ガスの窒素を使用します。酸素や可燃性ガスは危険なため使用禁止です。',oex:['不正解。酸素は冷凍機油と反応して爆発の危険があります。','正解。窒素ガスは不活性で安全なため気密試験に使用します。','不正解。アセチレンは可燃性ガスで使用禁止です。','不正解。プロパンは可燃性ガスで使用禁止です。']},{q:'排水・通気配管において、通気管の最小管径はどれか？',o:['20mm','25mm','30mm','40mm'],a:2,genre:7,d:2,ex:'通気管の最小管径は30mmと定められています。ただし、各個通気管は接続する排水管の1/2以上の管径が必要です。',oex:['不正解。20mmは小さすぎます。最小は30mmです。','不正解。25mmは最小管径ではありません。30mmです。','正解。通気管の最小管径は30mmです。','不正解。40mmは最小管径より大きいです。']},{q:'施工体制台帳を作成すべき工事の下請契約額の基準はどれか？',o:['3,000万円以上','1億円以上','1,000万円以上','4,500万円以上'],a:3,genre:7,d:3,ex:'建設業法により、発注者から直接請け負った工事の下請契約額の合計が4,500万円以上の場合、施工体制台帳の作成が必要です。',oex:['不正解。3,000万円ではなく4,500万円以上です。','不正解。1億円は特定建設業の許可基準とは異なります。','不正解。1,000万円ではなく4,500万円以上が基準です。','正解。下請契約額4,500万円以上で施工体制台帳の作成が必要です。']},{q:'膨張タンクの容量計算で考慮すべき要素として正しいものはどれか？',o:['配管の材質','システム内の保有水量と温度変化','ポンプの揚程','外気温度'],a:1,genre:7,d:3,ex:'膨張タンクの容量はシステム内の保有水量と温度変化（膨張率）に基づいて計算します。',oex:['不正解。材質は直接関係ありません。','正解。保有水量と温度変化が膨張タンク容量の計算要素です。','不正解。ポンプ揚程は別の計算に使います。','不正解。外気温度は直接関係ありません。']},{q:'コンクリートの打設において、打ち重ね時間の限度として一般的なものはどれか？（気温25℃以上の場合）',o:['2時間以内','4時間以内','1時間以内','2.5時間以内'],a:0,genre:7,d:3,ex:'気温25℃以上の場合、コンクリートの打ち重ね時間の限度は2時間以内とされています（25℃未満は2.5時間以内）。',oex:['正解。気温25℃以上では2時間以内が限度です。','不正解。4時間は長すぎます。','不正解。1時間は短すぎます。2時間以内です。','不正解。2.5時間以内は気温25℃未満の場合の基準です。']},{q:'管工事施工管理における「出来形管理」とは何か？',o:['施工した構造物の寸法や位置を測定し規格値と比較すること','工事の原価を管理すること','作業員の出勤を管理すること','工程の進捗を管理すること'],a:0,genre:7,d:1,ex:'出来形管理は施工した構造物の形状・寸法・位置などを測定し、設計図書の規格値と比較して品質を確認する管理です。',oex:['正解。出来形管理は施工結果の寸法等を規格値と比較する管理です。','不正解。原価管理は別の管理項目です。','不正解。出勤管理は労務管理です。','不正解。工程管理は工期に関する管理です。']},{q:'飲料水系統の配管材料として使用できないものはどれか？',o:['水道用硬質塩化ビニルライニング鋼管','水道用ステンレス鋼管','鉛管','水道用架橋ポリエチレン管'],a:2,genre:7,d:1,ex:'鉛管は水道法により飲料水系統への使用が禁止されています。鉛の溶出による健康被害のリスクがあるためです。',oex:['不正解。ライニング鋼管は飲料水系統に使用できます。','不正解。ステンレス鋼管は飲料水系統に使用できます。','正解。鉛管は健康被害のリスクから飲料水系統への使用が禁止されています。','不正解。架橋ポリエチレン管は飲料水系統に使用できます。']},{q:'空調設備の加湿方式のうち、蒸気加湿方式の特徴はどれか？',o:['濡れた面に空気を通過させる方式','水滴を空気中に噴霧する方式','超音波で水を微粒化する方式','蒸気を空気中に供給する方式で加湿応答が速い'],a:3,genre:7,d:2,ex:'蒸気加湿方式は蒸気を直接空気に供給するため、加湿の応答が速く、衛生的で制御性が高い方式です。',oex:['不正解。濡れた面を通過させるのは気化式です。','不正解。水滴の噴霧は気化式加湿です。','不正解。超音波微粒化は超音波式加湿です。','正解。蒸気加湿は応答が速く衛生的な方式です。']},{q:'安全管理における「ハインリッヒの法則」の比率として正しいものはどれか？',o:['1:50:500','1:5:25','1:29:300','1:10:100'],a:2,genre:7,d:2,ex:'ハインリッヒの法則は「1件の重大事故の背後に29件の軽微な事故、300件のヒヤリハットがある」という法則です。',oex:['不正解。1:50:500ではありません。','不正解。1:5:25ではありません。','正解。ハインリッヒの法則は1:29:300です。','不正解。1:10:100ではなく1:29:300です。']},{q:'給排水設備で使用される「SUS304」と「SUS316」の違いとして正しいものはどれか？',o:['SUS316はSUS304より安価である','SUS316はSUS304よりモリブデンを含み耐食性が高い','SUS304はSUS316より耐熱性が高い','両者に性能差はない'],a:1,genre:7,d:3,ex:'SUS316はSUS304にモリブデンを添加した鋼種で、耐食性（特に耐塩素性）が優れています。海岸部や温泉地で使用されます。',oex:['不正解。SUS316はSUS304より高価です。','正解。SUS316はモリブデンを含み耐食性が高いです。','不正解。耐熱性に大きな差はありません。','不正解。SUS316の方が耐食性に優れています。']},{q:'ダクトの漏風試験において、低圧ダクトの漏風量の判定基準はどれか？',o:['ダクト表面積1m²当たり0.06m³/min以下','ダクト表面積1m²当たり0.12m³/min以下','ダクト長さ1m当たり0.06m³/min以下','ダクト重量1kg当たり0.06m³/min以下'],a:0,genre:7,d:3,ex:'低圧ダクトの漏風量はダクト表面積1m²当たり0.06m³/min以下（500Pa時）が判定基準です。',oex:['正解。低圧ダクトの漏風量基準は表面積1m²当たり0.06m³/min以下です。','不正解。0.12は中圧ダクトに近い値です。低圧は0.06です。','不正解。表面積当たりで計算し、長さ当たりではありません。','不正解。重量当たりではなく表面積当たりです。']},{q:'便器の洗浄方式のうち「サイホンゼット式」の特徴はどれか？',o:['洗い落とし式より洗浄力が弱い','ゼット穴から噴出する水流でサイホン作用を促進する','洗浄水量が最も少ない','施工が最も簡単'],a:1,genre:7,d:2,ex:'サイホンゼット式は便器のゼット穴から水を噴出させてサイホン作用を強力に起こし、汚物を排出する方式です。',oex:['不正解。サイホンゼット式は洗浄力が強い方式です。','正解。ゼット穴からの噴出水流でサイホン作用を促進します。','不正解。洗浄水量は比較的多い方式です。','不正解。施工の簡易さはこの方式の特徴ではありません。']},{q:'鋼管の腐食防止方法として「犠牲陽極法」の原理はどれか？',o:['配管を樹脂でライニングする','配管を塗装して外部環境から遮断する','配管に電流を流して腐食を防ぐ','配管より卑な金属を取り付けてその金属を優先的に腐食させる'],a:3,genre:7,d:3,ex:'犠牲陽極法は鋼管より卑な金属（亜鉛やマグネシウム）を接続し、その金属を優先的に腐食させて鋼管を保護する電気防食法です。',oex:['不正解。ライニングは物理的防食法です。','不正解。塗装は物理的防食法であり、犠牲陽極法ではありません。','不正解。外部から電流を流すのは外部電源法です。','正解。犠牲陽極法は卑な金属を優先的に腐食させて配管を保護します。']},{q:'空調の「外気負荷」を構成する2つの要素はどれか？',o:['顕熱負荷と潜熱負荷','放射負荷と対流負荷','伝導負荷と輻射負荷','動的負荷と静的負荷'],a:0,genre:7,d:2,ex:'外気負荷は外気の温度差による顕熱負荷と湿度差による潜熱負荷の2つから構成されます。',oex:['正解。外気負荷は顕熱負荷と潜熱負荷で構成されます。','不正解。放射と対流は壁体の熱負荷の分類です。','不正解。伝導と輻射は熱の伝わり方の分類です。','不正解。動的・静的負荷という分類はありません。']},{q:'配管支持における「固定支持」と「可動支持」の使い分けとして正しいものはどれか？',o:['固定支持は使用しない','すべて可動支持にすべき','すべて固定支持にすべき','膨張の基点となる箇所に固定支持を、伸縮を許容する箇所に可動支持を使用する'],a:3,genre:7,d:2,ex:'配管支持では膨張の基点（アンカー）に固定支持を、熱伸縮を許容する箇所にはスライド等の可動支持を使い分けます。',oex:['不正解。固定支持（アンカー）は必要です。','不正解。すべて可動にすると配管が不安定になります。','不正解。すべて固定にすると熱伸縮で配管が破損します。','正解。固定と可動を適切に使い分けることが重要です。']},{q:'建設工事の安全管理で「リスクアセスメント」の手順として正しい順序はどれか？',o:['評価→特定→対策→見直し','対策→特定→評価→見直し','見直し→評価→特定→対策','特定→評価→対策→見直し'],a:3,genre:7,d:2,ex:'リスクアセスメントは危険性の特定→リスクの見積り（評価）→リスク低減対策→実施後の見直しの順で行います。',oex:['不正解。特定が先で、その後に評価を行います。','不正解。最初に危険の特定が必要です。','不正解。この順序は正しくありません。','正解。特定→評価→対策→見直しが正しい手順です。']},{q:'排水管の管径決定に用いる「器具排水負荷単位法」で、大便器（洗浄弁式）の器具排水負荷単位はどれか？',o:['2','4','6','8'],a:2,genre:7,d:3,ex:'洗浄弁式大便器の器具排水負荷単位は6です。洗浄タンク式は4、洗面器は1〜2です。',oex:['不正解。2は洗面器の負荷単位に近い値です。','不正解。4は洗浄タンク式大便器の負荷単位です。','正解。洗浄弁式大便器の器具排水負荷単位は6です。','不正解。8は大きすぎます。']},{q:'配管工事における「管の切断」で、ステンレス管の切断に適した工具はどれか？',o:['バンドソー（帯鋸盤）','ガス切断','たがね','パイプカッター（ローラーカッター）'],a:0,genre:7,d:2,ex:'ステンレス管の切断にはバンドソーやディスクグラインダーが適しています。パイプカッターは軟質管向きです。',oex:['正解。バンドソーはステンレス管の切断に適した工具です。','不正解。ガス切断はステンレスの切断には適しません（酸化被膜のため）。','不正解。たがねは管の切断工具ではありません。','不正解。パイプカッターはステンレスには不向きです。銅管や塩ビ管向きです。']},{q:'湿り空気線図（h-x線図）で読み取れない値はどれか？',o:['乾球温度','相対湿度','風速','露点温度'],a:2,genre:7,d:2,ex:'湿り空気線図では乾球温度、湿球温度、相対湿度、絶対湿度、比エンタルピー、露点温度などが読み取れますが、風速は読み取れません。',oex:['不正解。乾球温度は湿り空気線図で読み取れます。','不正解。相対湿度は湿り空気線図で読み取れます。','正解。風速は湿り空気線図では読み取れません。','不正解。露点温度は湿り空気線図で読み取れます。']},{q:'配管の溶接接合で「突合せ溶接」の開先形式のうち、「V形開先」の開先角度として一般的なものはどれか？',o:['30°','45°','60°','90°'],a:2,genre:7,d:3,ex:'V形開先の開先角度は一般的に60°（片側30°）です。溶接品質と溶接量のバランスが良い角度です。',oex:['不正解。30°は片側の角度です。開先角度としては60°が一般的です。','不正解。45°ではなく60°が標準です。','正解。V形開先の開先角度は60°が一般的です。','不正解。90°は大きすぎて溶接量が過大になります。']},{q:'空気調和設備における「コイル」のうち、冷却コイルの通過面風速として適切なものはどれか？',o:['1.0m/s以下','2.0〜3.0m/s','5.0〜6.0m/s','8.0m/s以上'],a:1,genre:7,d:2,ex:'冷却コイルの通過面風速は2.0〜3.0m/sが適切です。風速が高すぎると水滴飛散が起こります。',oex:['不正解。1.0m/s以下では伝熱性能が低下します。','正解。2.0〜3.0m/sが適切な通過面風速です。','不正解。5.0m/s以上では水滴飛散が発生します。','不正解。8.0m/s以上は高すぎます。']},{q:'工程管理で使用される「マイルストーン」とは何か？',o:['作業の中間点','予算の中間報告','作業員の休憩時間','工事の重要な節目・管理点'],a:3,genre:7,d:1,ex:'マイルストーンは工事の重要な節目（着工、上棟、検査、引き渡し等）を示す管理点のことです。',oex:['不正解。単なる中間点ではなく、重要な節目です。','不正解。予算報告はマイルストーンの定義ではありません。','不正解。休憩時間とは関係ありません。','正解。マイルストーンは工事の重要な節目・管理点です。']},{q:'フランジ接合で使用するガスケットの締付けボルトの対角締め付けを行う理由はどれか？',o:['ボルトの本数を減らすため','フランジの強度を上げるため','ガスケットを均一に圧縮して漏れを防止するため','作業効率を上げるため'],a:2,genre:7,d:1,ex:'対角締め付けはガスケットを均一に圧縮し、片締めによる漏れを防止するために行います。',oex:['不正解。ボルト本数は変わりません。','不正解。フランジ強度とは関係ありません。','正解。対角締めはガスケットの均一圧縮と漏れ防止のためです。','不正解。効率よりも漏れ防止が目的です。']},{q:'冷凍機で使用されるフロン冷媒「R410A」の特性として正しいものはどれか？',o:['ODP・GWPともに高い','オゾン破壊係数（ODP）がゼロだがGWPは高い（2088）','オゾン破壊係数（ODP）がゼロで温暖化係数（GWP）も低い','R22の代替冷媒ではない'],a:1,genre:7,d:3,ex:'R410AはODPが0（オゾン層破壊なし）ですが、GWPは2088と高く、温暖化への影響が懸念されています。',oex:['不正解。ODPはゼロです。','正解。R410AはODP=0ですがGWP=2088と高い冷媒です。','不正解。GWPは2088と高いです。低くありません。','不正解。R410AはR22の代替冷媒として広く使用されています。']},{q:'消防法上、防火対象物の消防用設備等の点検結果の報告期間として、特定防火対象物の場合はどれか？',o:['6ヶ月に1回','1年に1回','3年に1回','2年に1回'],a:1,genre:7,d:2,ex:'特定防火対象物（デパート・ホテル・病院等）は1年に1回、非特定防火対象物は3年に1回消防長に報告します。',oex:['不正解。6ヶ月に1回は機器点検の頻度です。報告は1年に1回です。','正解。特定防火対象物は1年に1回報告します。','不正解。3年に1回は非特定防火対象物の報告期間です。','不正解。2年に1回は基準にありません。']},{q:'消防法における消火器の設置義務に関して、延べ面積何m²以上の防火対象物に設置が必要か？',o:['100m²以上','150m²以上','300m²以上','200m²以上'],a:1,genre:4,d:2,ex:'消防法施行令により、延べ面積150m²以上の防火対象物には消火器の設置が義務付けられています。',oe
