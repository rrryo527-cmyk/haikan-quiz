工不良です','不正解。塗装は感度に影響しますが主因ではありません']},{q:'ハロゲン化物消火設備の特徴はどれか？',o:['水で消火する','消火能力が低い','油火災に使用不可','電気設備に使用でき汚損が少ない'],a:3,genre:1,d:2,ex:'ハロゲン化物は気体消火で電気設備に安全、消火後の汚損も少ないです。',oex:['不正解。水ではなくガスで消火します','不正解。消火能力は高く即効性があります','不正解。油火災にも使用できます','正解。電気設備に使用可能で汚損少ないです']},{q:'非常ベルと自動式サイレンの違いはどれか？',o:['設置場所の違い','非常ベルは手動、サイレンは自動','音圧基準の違い','規模の違い'],a:1,genre:1,d:2,ex:'非常ベルは手動操作、自動式サイレンは火災報知器連動で自動鳴動します。',oex:['不正解。設置場所による区分ではありません','正解。起動方式が手動と自動で異なります','不正解。音圧基準は同じ（1mで90dB以上）です','不正解。規模ではなく起動方式の違いです']},{q:'消防設備点検資格者が点検できる対象はどれか？',o:['消防設備士限定の設備のみ','住宅用火災警報器のみ','全ての防火対象物','一定規模以上の防火対象物の消防設備'],a:3,genre:1,d:2,ex:'点検資格者は延べ面積1000m²以上等の一定規模以上の防火対象物の点検が可能です。',oex:['不正解。設備士以外に点検資格者も可能です','不正解。住警器は法定点検対象外です','不正解。全てではなく規模要件があります','正解。一定規模以上の防火対象物の点検が可能です']},{q:'1号消火栓に使用するノズルの種類はどれか？',o:['噴霧ノズル','スプレーノズル','フォグノズル','棒状ノズル（筒先）'],a:3,genre:1,d:2,ex:'1号消火栓には棒状放水が可能なノズル（筒先）が使用されます。',oex:['不正解。噴霧ノズルは2号消火栓等に使用','不正解。スプレーノズルは消火栓用語ではありません','不正解。フォグノズルは消防車用です','正解。1号消火栓には棒状ノズルを使用します']},{q:'消防法における防火対象物とは何か？',o:['消防法規制対象の建築物等','消火器設置建物のみ','耐火建築物のみ','消防署管轄内の建物'],a:0,genre:1,d:1,ex:'防火対象物とは消防法令の規制対象となる建築物その他の工作物の総称です。',oex:['正解。消防法規制対象の建築物等の総称です','不正解。消火器有無に関わらず対象です','不正解。耐火建築物に限定されません','不正解。管轄区域の概念とは異なります']},{q:'スプリンクラーヘッドの標準放水量はどれか？',o:['80L/min以上','30L/min','50L/min','130L/min以上'],a:0,genre:1,d:2,ex:'閉鎖型SPヘッドの標準放水量は80L/min以上です。',oex:['正解。標準放水量は80L/min以上です','不正解。30L/minは基準未満です','不正解。50L/minは基準未満です','不正解。130L/minは屋内消火栓1号の基準です']},{q:'消防設備士の免状の種類で「第4類」が対象とする設備はどれか？',o:['自動火災報知設備','スプリンクラー設備','避難器具','消火器'],a:0,genre:1,d:2,ex:'消防設備士第4類は自動火災報知設備、ガス漏れ火災警報設備等の警報設備が対象です。',oex:['正解。第4類は自動火災報知設備等が対象です','不正解。スプリンクラーは第1類です','不正解。避難器具は第5類です','不正解。消火器は第6類です']},{q:'消防設備士第6類が対象とする設備はどれか？',o:['消火器','屋内消火栓','自動火災報知設備','スプリンクラー'],a:0,genre:1,d:1,ex:'消防設備士第6類は消火器の整備・点検を行うための資格です。乙種のみ。',oex:['正解。第6類は消火器が対象です','不正解。屋内消火栓は第1類です','不正解。火災報知設備は第4類です','不正解。スプリンクラーは第1類です']},{q:'消防設備士第1類が対象とする設備はどれか？',o:['自動火災報知設備','屋内消火栓・スプリンクラー等の水系消火設備','消火器','誘導灯'],a:1,genre:1,d:2,ex:'第1類は屋内消火栓、スプリンクラー、水噴霧消火設備等の水系消火設備が対象です。',oex:['不正解。火災報知は第4類です','正解。水系消火設備が第1類の対象です','不正解。消火器は第6類です','不正解。誘導灯は第7類です']},{q:'消防設備士の講習受講義務の周期はどれか？',o:['3年ごと（最初は免状取得後2年以内）','5年ごと','1年ごと','2年ごと'],a:0,genre:1,d:2,ex:'消防設備士は免状交付後2年以内に最初の講習を受け、以降は5年ごと（実務に就いている者は前回講習から5年以内）に受講義務があります。',oex:['正解。最初は2年以内、以降は定期的に受講します','不正解。5年は講習の間隔です','不正解。1年ごとではありません','不正解。一律2年ごとではありません']},{q:'感知器の設置で取付面の高さが4m未満の居室に適した熱感知器はどれか？',o:['定温式特種','炎感知器','差動式スポット型1種','差動式スポット型2種'],a:3,genre:1,d:3,ex:'取付面4m未満の一般居室には差動式スポット型2種が広く使用されます。1種はより感度が高い。',oex:['不正解。定温式は常時高温の場所用','不正解。炎感知器は高天井用','不正解。1種は高感度で特定用途向け','正解。2種が一般居室で最も使用されます']},{q:'感知器の取付面高さが20m以上の場所に設置できる感知器はどれか？',o:['差動式スポット型','定温式スポット型','光電式分離型または炎感知器','煙感知器（光電式スポット型）'],a:2,genre:1,d:3,ex:'取付面高さ20m以上の高天井では煙や熱が到達しにくいため、光電式分離型（光線式）や炎感知器が使用されます。',oex:['不正解。差動式は8m未満まで','不正解。定温式は8m未満まで','正解。高天井には光電分離型や炎感知器が必要','不正解。スポット型煙感知器は15m未満まで']},{q:'P型受信機とR型受信機の主な違いはどれか？',o:['対応する建物規模の違いのみ','使用する電圧の違い','P型は共通線式、R型は固有信号式で個別識別が可能','製造メーカーの違い'],a:2,genre:1,d:3,ex:'P型は各回線の共通信号で警戒区域単位の表示、R型は各感知器固有のアドレスで個別識別・表示が可能です。',oex:['不正解。規模だけでなく方式が根本的に異なる','不正解。電圧の違いではありません','正解。P型は共通線式、R型は個別アドレス式','不正解。メーカーの違いではなく方式の違い']},{q:'スプリンクラー設備の制御弁の設置場所として正しいものはどれか？',o:['屋上','建物の外','地下の機械室のみ','各階またはスプリンクラーヘッドの直近'],a:3,genre:1,d:2,ex:'制御弁はスプリンクラー配管の各系統に設け、点検・修理時に部分的に止水できるよう各階等に設置します。',oex:['不正解。屋上は設置場所として一般的ではない','不正解。建物外は通常の設置場所ではない','不正解。機械室だけでは各階の制御ができない','正解。各階や系統ごとに制御弁を設けます']},{q:'消火器の「加圧式」の仕組みはどれか？',o:['常時ガスで加圧されている','電動ポンプで加圧する','手動でポンプを押して加圧する','使用時に内部の加圧用ガスボンベを破封して加圧する'],a:3,genre:1,d:2,ex:'加圧式消火器は使用時にレバーを握ることで内部の加圧用ガス容器が破封され、放出ガスにより薬剤が放射されます。',oex:['不正解。常時加圧は蓄圧式の特徴','不正解。電動式ではありません','不正解。手動ポンプ式ではありません','正解。使用時にガスボンベを破封して加圧します'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'強化液消火器の特徴はどれか？',o:['アルカリ金属塩の水溶液を放射し、冷却と浸透効果で消火する','泡を放射する','CO2ガスを放射する','粉末を放射する'],a:0,genre:1,d:2,ex:'強化液消火器は炭酸カリウム等のアルカリ金属塩水溶液を放射します。冷却効果と浸透効果で再燃防止に優れています。',oex:['正解。アルカリ金属塩水溶液で冷却・浸透消火します','不正解。泡は泡消火器です','不正解。CO2はCO2消火器です','不正解。粉末は粉末消火器です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'消火器の設置で「床面からの高さ1.5m以下」の基準が適用されるのはどれか？',o:['消火器の圧力ゲージ','消火器の上端','消火器の底部','消火器の把持部（取っ手）'],a:2,genre:1,d:2,ex:'消火器は床面から1.5m以下の高さに設置します。この高さは消火器の底部を基準とします。',oex:['不正解。ゲージではなく底部が基準です','不正解。上端ではなく底部が基準です','正解。消火器の底部が床面から1.5m以下です','不正解。把持部ではなく底部が基準です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'自動火災報知設備の「警戒区域」の面積基準はどれか？',o:['100m²以下','300m²以下','600m²以下','1000m²以下'],a:2,genre:1,d:2,ex:'警戒区域は1区域600m²以下で、一辺の長さは50m以下とするのが原則です。',oex:['不正解。100m²は小さすぎます','不正解。300m²は基準ではありません','正解。1区域600m²以下が基準です','不正解。1000m²は大きすぎます']},{q:'消防法で定める「統括防火管理者」の選任が必要な建物はどれか？',o:['延べ面積300m²以上の全建物','平屋の工場','高さ31mを超える高層建築物等の複合用途建物','10人以下の事務所'],a:2,genre:1,d:3,ex:'統括防火管理者は高さ31m超の高層建築物や地下街、複合用途の一定規模以上の建物で選任が必要です。',oex:['不正解。300m²以上の全建物ではありません','不正解。平屋工場は通常該当しません','正解。高層建築物等の複合用途建物で必要です','不正解。小規模事務所は該当しません']},{q:'消防用設備等の「着工届」を提出する時期はどれか？',o:['工事着手前','工事完了後','工事中','設備の使用開始後'],a:0,genre:1,d:2,ex:'消防用設備等の設置工事は着手する前に消防署に着工届を提出する必要があります。',oex:['正解。工事着手前に届出が必要です','不正解。完了後では遅すぎます','不正解。工事中では遅すぎます','不正解。使用開始後では遅すぎます']},{q:'消防用設備等の「設置届」を提出する時期はどれか？',o:['工事完了後4日以内','使用開始1年後','工事着手前','工事完了後30日以内'],a:0,genre:1,d:2,ex:'消防用設備等の設置届は工事が完了した日から4日以内に消防署に届出が必要です。',oex:['正解。完了後4日以内に届出します','不正解。1年後ではありません','不正解。着手前は着工届です','不正解。30日以内は別の届出です']},{q:'避難器具の「救助袋」の種類はどれか？',o:['垂直降下式と斜降式','手動式と電動式','膨張式と折りたたみ式','小型と大型'],a:0,genre:1,d:2,ex:'救助袋には垂直に降下する垂直降下式と、滑り台のように斜めに降りる斜降式の2種類があります。',oex:['正解。垂直降下式と斜降式の2種類があります','不正解。電動式の救助袋はありません','不正解。膨張式は別の避難器具です','不正解。小型・大型の分類ではありません']},{q:'消火栓ポンプの起動方式として正しいものはどれか？',o:['消火栓箱内の起動装置（ボタン）による起動','手動のみ','タイマーによる自動起動','風速計連動'],a:0,genre:1,d:1,ex:'消火栓ポンプは消火栓箱内にある起動装置（押しボタン等）を操作することで起動します。',oex:['正解。消火栓箱内の起動装置で起動します','不正解。遠隔起動が基本です','不正解。タイマー起動はありません','不正解。風速計連動はありません']},{q:'消防法における「防炎規制」の対象となるものはどれか？',o:['金属製品','木製家具','全ての布製品','高層建築物のカーテン・じゅうたん等'],a:3,genre:1,d:2,ex:'高層建築物（31m超）や地下街、劇場等ではカーテン、じゅうたん、幕類に防炎性能が求められます。',oex:['不正解。金属製品は対象外','不正解。木製家具は防炎規制の対象外','不正解。全布製品ではなく特定の場所の特定製品','正解。高層建築物等のカーテン・じゅうたん等が対象']},{q:'自動火災報知設備の「中継器」の役割はどれか？',o:['消火器を自動で作動させる','感知器の信号を増幅して受信機に伝送する','排煙設備を起動する','避難口を自動開放する'],a:1,genre:1,d:2,ex:'中継器は感知器からの信号を受信機に中継（増幅・変換）する装置で、配線距離が長い場合等に使用します。',oex:['不正解。消火器の自動作動ではありません','正解。感知器信号を増幅・中継する装置です','不正解。排煙起動は別の装置です','不正解。避難口の開放ではありません']},{q:'粉末消火設備の「選択弁」の役割はどれか？',o:['消火剤の量を調整する','消火速度を選択する','放出する区画を選択する','消火剤の種類を選ぶ'],a:2,genre:1,d:3,ex:'選択弁は複数の防護区画がある場合に、消火剤を放出する区画を選択するための弁です。',oex:['不正解。量の調整ではありません','不正解。速度の選択ではありません','正解。放出する区画を選択する弁です','不正解。消火剤の種類選択ではない']},{q:'消防法で規定する「自衛消防組織」を設置する義務があるのはどれか？',o:['全ての事業所','消防署のみ','一定規模以上の大規模事業所（収容人員等の基準）','住宅'],a:2,genre:1,d:2,ex:'自衛消防組織は一定規模以上の防火対象物（大規模事業所等）の管理者に設置義務があります。',oex:['不正解。全事業所ではなく一定規模以上','不正解。消防署は公的機関です','正解。大規模事業所に設置義務があります','不正解。住宅に設置義務はありません']},{q:'簡易消火用具（水バケツ等）が消火器の代替として認められる場合の基準はどれか？',o:['消防署の許可がある場合のみ','全ての場合に代替可能','延べ面積が小さい場合等、一定条件下で消火器の能力単位の一部を代替可能','消火器がない場合のみ'],a:2,genre:1,d:3,ex:'水バケツ、乾燥砂等の簡易消火用具は一定条件下で消火器の能力単位の1/3まで代替が認められます。',oex:['不正解。消防署許可のみでは判断しません','不正解。全ての場合ではありません','正解。一定条件下で能力単位の一部代替が可能','不正解。消火器がない場合の代替ではない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'スプリンクラー設備の水源水量の基準として標準型の場合はどれか？',o:['ヘッド10個分×20分間','ヘッド20個分×10分間','ヘッド4個分×20分間（標準的な基準）','ヘッド1個分×60分間'],a:0,genre:1,d:3,ex:'閉鎖型スプリンクラーの水源水量は、同時開放個数×放水量×20分間以上です。一般的には10個同時開放で計算します。',oex:['正解。一般的にヘッド10個×20分が標準基準です','不正解。20個×10分ではありません','不正解。4個は危険度の低い区画用','不正解。1個×60分ではありません']},{q:'防火対象物点検の報告義務がある対象はどれか？',o:['住宅','延べ面積100m²未満の建物','全ての防火対象物','特定防火対象物で収容人員300人以上等の一定規模'],a:3,genre:1,d:3,ex:'防火対象物点検は特定防火対象物で収容人員300人以上、または地階等に特定用途がある一定規模の建物が対象です。',oex:['不正解。住宅は対象外','不正解。小規模は対象外','不正解。全てではなく一定規模以上','正解。特定防火対象物で300人以上等が対象']},{q:'消火器の放射時間の目安（粉末10型）はどれか？',o:['約30秒','約60秒','約15秒','約5秒'],a:2,genre:1,d:1,ex:'粉末消火器10型の放射時間は約12～18秒（目安15秒）です。短時間で使い切るため、的確に火元を狙う必要があります。',oex:['不正解。30秒は長すぎます','不正解。60秒は大型消火器でも超えません','正解。約15秒が目安です','不正解。5秒は短すぎます'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'消火器の使用方法の手順として正しいものはどれか？',o:['レバーを握る→安全ピンを抜く→ホースを向ける','ホースを外す→レバーを握る→安全ピンを抜く','ホースを持つ→安全ピンを抜く→レバーを握る','安全ピンを抜く→ホースを火元に向ける→レバーを握る'],a:3,genre:1,d:1,ex:'消火器の使用手順は①安全ピンを抜く②ホースを火元に向ける③レバーを握って放射、の順です。',oex:['不正解。レバーはピンを抜いてから握ります','不正解。安全ピンは最初に抜きます','不正解。安全ピンを先に抜く必要があります','正解。ピン抜き→ホース→レバーの順です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'CO2消火器が適している火災はどれか？',o:['金属の火災','厨房の天ぷら油火災','電気設備の火災','木材の火災'],a:2,genre:1,d:2,ex:'CO2消火器は気体で消火するため電気設備に安全で、汚損もありません。通電中の電気室等に適しています。',oex:['不正解。金属火災には特殊消火剤が必要','不正解。天ぷら油には強化液が適切','正解。電気設備火災に適しています','不正解。木材火災にはABC粉末が適切'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'消火器の「型式失効」とは何か？',o:['国の型式認証が取り消されて販売・設置ができなくなること','消火器が壊れること','消火器の重さが変わること','消火器の色が変わること'],a:0,genre:1,d:2,ex:'型式失効は消火器の型式認証（検定合格表示）が失効し、その型式の消火器が設置基準を満たさなくなることです。',oex:['正解。型式認証が失効し基準不適合となります','不正解。故障とは異なる概念です','不正解。重さの変化ではありません','不正解。色の変化ではありません'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'開放型スプリンクラー設備の特徴はどれか？',o:['配管内に常時水が充填','ヘッドに感熱部がある','一斉開放弁により区域内の全ヘッドが同時に放水する','ヘッドが熱で自動開放する'],a:2,genre:1,d:3,ex:'開放型は一斉開放弁を開くことで区域内の全ヘッドから同時に放水します。舞台部や倉庫等に使用。ヘッドに感熱部はありません。',oex:['不正解。配管に水が充填されるのは湿式','不正解。感熱部がないのが開放型の特徴','正解。一斉開放弁で全ヘッド同時放水します','不正解。自動開放は閉鎖型の特徴']},{q:'水噴霧消火設備が設置される主な場所はどれか？',o:['一般オフィス','住宅','駐車場・変圧器室等の油火災危険箇所','倉庫'],a:2,genre:1,d:2,ex:'水噴霧消火設備は微細な霧状の水で油面を冷却・窒息消火します。駐車場、変圧器室等に設置されます。',oex:['不正解。オフィスにはSPが一般的','不正解。住宅には設置されません','正解。油火災危険箇所に設置されます','不正解。一般倉庫にはSPが使用されます']},{q:'感知器の「炎感知器」が使用される場所はどれか？',o:['厨房','天井高20m以上のアトリウム等','居室','浴室'],a:1,genre:1,d:2,ex:'炎感知器は赤外線や紫外線を検知するため、天井が極めて高い空間でも炎を直接検知できます。',oex:['不正解。厨房には定温式が適切','正解。超高天井のアトリウム等に使用されます','不正解。居室には差動式等が適切','不正解。浴室は感知器設置免除の場合あり']},{q:'P型3級受信機の特徴はどれか？',o:['個別アドレス識別が可能','1回線で小規模施設向け','多数の回線に対応','無線式専用'],a:1,genre:1,d:2,ex:'P型3級受信機は1回線のみ対応の最も小型の受信機で、小規模な施設に使用されます。',oex:['不正解。個別識別はR型の特徴','正解。1回線の小規模施設向けです','不正解。多回線はP型1級・2級','不正解。有線式です']},{q:'自動火災報知設備の「地区音響装置」の設置場所はどれか？',o:['各階の廊下・通路等で報知音が聞こえる場所','屋外のみ','受信機の横のみ','地下のみ'],a:0,genre:1,d:1,ex:'地区音響装置は各階の廊下等に設置し、火災を建物内の全ての人に確実に知らせるための警報装置です。',oex:['正解。各階に報知音が届くよう設置します','不正解。屋外は別途必要な場合あり','不正解。受信機横は主音響装置','不正解。全階に設置が必要']},{q:'防火戸の維持管理で最も重要なことはどれか？',o:['閉鎖障害がないこと（物を置かない）','定期的に塗装する','鍵をかけておく','遮光すること'],a:0,genre:1,d:1,ex:'防火戸は火災時に確実に閉鎖する必要があり、周囲に物を置いて閉鎖を妨げないことが最も重要です。',oex:['正解。閉鎖障害がないことが最重要です','不正解。塗装より閉鎖機能が重要','不正解。避難時に通行できなくなります','不正解。遮光は防火戸の目的ではない']},{q:'消火器の設置個数を算定する際に使用する「能力単位」の計算方法はどれか？',o:['延べ面積÷算定基準面積＝必要能力単位数','建物の階数×10','部屋の数×2','従業員数÷10'],a:0,genre:1,d:2,ex:'必要能力単位は延べ面積を用途ごとの算定基準面積で割って算出します。用途により基準面積が異なります。',oex:['正解。延べ面積÷算定基準面積で算出します','不正解。階数ベースではありません','不正解。部屋数ではありません','不正解。人数ベースではありません'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'消火栓の「ホース格納箱」に表示する文字はどれか？',o:['放水口','送水口','消火器','消火栓'],a:3,genre:1,d:1,ex:'屋内消火栓の格納箱には「消火栓」の表示を赤地に白文字で行います。',oex:['不正解。放水口は連結送水管の表示','不正解。送水口は連結送水管の表示','不正解。消火器は別の設備','正解。「消火栓」と表示します']},{q:'消火栓ポンプの「呼水槽」の目的はどれか？',o:['水質を浄化する','消火剤を混合する','消火水を貯留する','ポンプ起動時に確実に揚水できるようポンプ内に水を保持する'],a:3,genre:1,d:3,ex:'呼水槽はポンプ内に常時水を保持し、起動時にエア噛みせず確実に揚水できるようにする装置です。',oex:['不正解。浄化機能はありません','不正解。消火剤の混合ではない','不正解。消火水の貯留は消火水槽','正解。ポンプの確実な起動のためです']},{q:'消防法における「消防計画の届出先」はどこか？',o:['都道府県知事','国土交通大臣','市区町村長','消防長または消防署長'],a:3,genre:1,d:1,ex:'消防計画は防火管理者が作成し、消防長または消防署長に届け出ます。',oex:['不正解。知事への届出ではない','不正解。国交大臣ではない','不正解。市区町村長ではない','正解。消防長または消防署長に届出します']},{q:'消火栓設備の「非常電源」の持続時間はどれか？',o:['120分間','30分間','60分間','10分間'],a:1,genre:1,d:2,ex:'屋内消火栓設備の非常電源は30分間以上の容量が必要です。',oex:['不正解。120分間は過大です','正解。30分間以上が必要です','不正解。60分間はスプリンクラーの基準','不正解。10分間は短すぎます']},{q:'特定1階段等防火対象物で設置が必要な消防設備はどれか？',o:['消火器のみ','防火戸のみ','自動火災報知設備、避難器具等が強化される','屋外消火栓のみ'],a:2,genre:1,d:3,ex:'特定1階段等防火対象物（避難階段が1つの特定防火対象物）は火災時の避難が困難なため、消防設備の設置基準が強化されます。',oex:['不正解。消火器だけでは不十分','不正解。防火戸だけではない','正解。火災報知・避難設備等が強化されます','不正解。屋外消火栓だけではない']},{q:'消防設備の「既存不適格」とは何か？',o:['壊れている設備','法改正前に設置され、改正後の基準に適合しないが経過措置で使用が認められている設備','予備の設備','新品の設備'],a:1,genre:1,d:3,ex:'既存不適格は法令改正以前に適法に設置された設備が改正後の基準に不適合となっているもので、一定の経過措置が適用されます。',oex:['不正解。故障とは異なります','正解。法改正前の適法設備が改正後に不適合となった状態','不正解。予備の概念ではありません','不正解。新品ではありません']},{q:'消火器の内部点検（分解点検）の対象となるものはどれか？',o:['全ての消火器','10年経過した消火器のみ','製造から5年経過の加圧式、3年経過の蓄圧式','大型消火器のみ'],a:2,genre:1,d:3,ex:'消火器の内部点検は加圧式は製造5年経過、蓄圧式は3年経過のものが対象です。機能の確認を行います。',oex:['不正解。全てではなく年数基準あり','不正解。10年は耐圧試験の基準','正解。加圧式5年、蓄圧式3年経過が対象','不正解。大型に限定されません'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'スプリンクラー設備のポンプ「チャーン運転」とは何か？',o:['締切運転でポンプ性能を確認する点検方法','ポンプの高速運転','ポンプの逆転運転','ポンプの間欠運転'],a:0,genre:1,d:3,ex:'チャーン運転は吐出弁を閉めた状態（締切状態）でポンプを運転し、締切圧力が規定値を満たすか確認する点検です。',oex:['正解。締切運転で圧力性能を確認する点検です','不正解。高速運転ではない','不正解。逆転ではない','不正解。間欠運転ではない']},{q:'消防法で規定する「危険物」の分類で第4類はどれか？',o:['自然発火性物質','引火性液体','可燃性固体','酸化性固体'],a:1,genre:1,d:2,ex:'危険物第4類は引火性液体（ガソリン、灯油、軽油、重油等）です。最も取扱量が多い類です。',oex:['不正解。自然発火性は第3類','正解。第4類は引火性液体です','不正解。可燃性固体は第2類','不正解。酸化性固体は第1類']},{q:'スプリンクラー設備の配管材料として一般的に使用されるものはどれか？',o:['塩ビ管','配管用炭素鋼管（SGP）または圧力配管用炭素鋼管（STPG）','アルミ管','銅管'],a:1,genre:1,d:2,ex:'スプリンクラー配管には配管用炭素鋼管（白管）が広く使用され、高圧部にはSTGPが使われます。',oex:['不正解。塩ビ管は耐火性が不足','正解。炭素鋼管が標準的な配管材料です','不正解。アルミ管はSP配管に不適切','不正解。銅管はSP配管には一般的でない']},{q:'消火器の表示で「A-3 B-7 C」の意味はどれか？',o:['消火器のサイズ','A火災能力3単位・B火災能力7単位・C火災対応を示す能力表示','製造番号','消火剤の量'],a:1,genre:1,d:2,ex:'A-3はA火災（普通火災）の能力単位3、B-7はB火災（油火災）の能力単位7、CはC火災（電気火災）対応を示します。',oex:['不正解。サイズではなく能力表示','正解。各火災種別の能力単位を示します','不正解。製造番号ではない','不正解。薬剤量ではなく消火能力です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'避難階段の「特別避難階段」に必要な構造はどれか？',o:['通常の階段と同じ','スロープ付き階段','付室（バルコニー等）を設け、排煙設備を備えた耐火構造の階段','エレベーター'],a:2,genre:1,d:3,ex:'特別避難階段は付室またはバルコニーを介して入る構造で、煙の侵入を防ぎ安全な避難を確保します。',oex:['不正解。通常階段より厳しい構造基準','不正解。スロープは避難階段の要件ではない','正解。付室＋排煙＋耐火構造が必要です','不正解。エレベーターは避難階段ではない']},{q:'消防用水の水源として認められるものはどれか？',o:['家庭用の浴槽','雨水桝','ペットボトルの水','防火水槽・プール・河川等の消防用水利'],a:3,genre:1,d:1,ex:'消防用水利として認められるのは防火水槽、消火栓、プール、河川、池等で40m³以上の水量が必要です。',oex:['不正解。浴槽の水量は不十分','不正解。雨水桝は水量が不十分','不正解。ペットボトルは消防用水利でない','正解。防火水槽・プール・河川等が水利です']},{q:'消火栓の「起動表示灯」の色はどれか？',o:['緑色','青色','白色','赤色'],a:3,genre:1,d:1,ex:'消火栓の起動表示灯は赤色で、ポンプが起動中であることを表示します。',oex:['不正解。緑は非常口の色です','不正解。青色ではありません','不正解。白色ではありません','正解。起動表示灯は赤色です']},{q:'消火栓の「位置表示灯」の色はどれか？',o:['赤色','白色','黄色','緑色'],a:0,genre:1,d:1,ex:'消火栓の位置表示灯は赤色で、消火栓の位置を示すために常時点灯しています。',oex:['正解。位置表示灯は赤色です','不正解。白色ではありません','不正解。黄色ではありません','不正解。緑色ではありません']},{q:'自動火災報知設備の配線で「耐火配線」が必要な部分はどれか？',o:['全ての配線','地区音響装置の配線のみ','感知器間の配線のみ','非常電源から受信機までの配線等'],a:3,genre:1,d:3,ex:'耐火配線は非常電源から受信機、受信機から操作部等の主要回路に必要です。一般回線は耐熱配線で可。',oex:['不正解。全てではなく主要回路','不正解。地区音響のみではない','不正解。感知器間は耐熱配線で可','正解。非常電源〜受信機等は耐火配線が必要']},{q:'消火器の「適応火災」を示すマークの色で、A火災（普通火災）はどれか？',o:['白色','青色','なし','黄色'],a:0,genre:1,d:2,ex:'消火器の適応火災マークはA火災（普通火災）が白色、B火災（油火災）が黄色、C火災（電気火災）が青色です。',oex:['正解。A火災のマークは白色です','不正解。青色はC火災（電気火災）','不正解。マークは必ず表示されます','不正解。黄色はB火災（油火災）'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'消防法で定める「消防用設備等」の3つの区分はどれか？',o:['消火器・消火栓・スプリンクラー','消火設備・救助設備・通信設備','感知器・受信機・発信機','消火設備・警報設備・避難設備'],a:3,genre:1,d:1,ex:'消防用設備等は大きく消火設備、警報設備、避難設備の3つに区分されます。',oex:['不正解。具体的な設備名であり区分ではない','不正解。救助・通信は消防用設備の区分ではない','不正解。これらは自火報の構成機器','正解。消火・警報・避難の3区分です']},{q:'感知器の取付面から下方0.6m以内に設置する理由はどれか？',o:['法律で決まっているだけ','配線しやすいため','天井面近くに煙や熱が集まるため','美観のため'],a:2,genre:1,d:2,ex:'火災時の煙や熱は上昇して天井面に集まります。感知器は天井面またはその直下0.6m以内に設置して早期検知を確保します。',oex:['不正解。物理的根拠がある基準です','不正解。配線の利便性ではない','正解。煙・熱が天井面に集まるためです','不正解。美観目的ではない']},{q:'スプリンクラー設備の「補助散水栓」とはどれか？',o:['スプリンクラーの未警戒部分を補う消火栓','消防車用の散水口','屋外に設置する散水栓','庭園用の散水栓'],a:0,genre:1,d:2,ex:'補助散水栓はスプリンクラー設備と一体で、SP未警戒の部分（廊下・階段等）を補うための消火栓です。',oex:['正解。SP未警戒部分を補う消火栓です','不正解。消防車用ではない','不正解。屋外ではなく屋内設備','不正解。庭園用ではない']},{q:'消火設備の「水損」とは何か？',o:['水が不足すること','消火活動の放水によって建物・設備に与える水による損害','水質汚染','水圧不足'],a:1,genre:1,d:1,ex:'水損はスプリンクラーや消火栓の放水により、火災以外の部分にも水が及んで生じる二次的な損害です。',oex:['不正解。水不足ではない','正解。消火放水による水の二次被害です','不正解。水質汚染ではない','不正解。水圧不足ではない']},{q:'消防設備の「外観点検」で確認する項目はどれか？',o:['設備の設置状況・損傷・腐食・表示等を目視で確認する','設備を実際に作動させる','配線の絶縁抵抗を測定する','放水試験を行う'],a:0,genre:1,d:1,ex:'外観点検は機器点検の一部で、設置状態、損傷、腐食、変形、表示の状況等を目視で確認します。',oex:['正解。目視による設置状態・損傷等の確認です','不正解。作動試験は機能点検の項目','不正解。絶縁抵抗は機能点検の項目','不正解。放水試験は総合点検の項目']},{q:'消火器の「指示圧力計」の緑色ゾーンが示す意味はどれか？',o:['使用済み','圧力不足','圧力過大','正常な圧力範囲'],a:3,genre:1,d:1,ex:'蓄圧式消火器の指示圧力計で針が緑色ゾーンにあれば正常な圧力範囲です。黄色は圧力過大、赤は圧力不足を示します。',oex:['不正解。使用済みの表示ではない','不正解。圧力不足ではない','不正解。圧力過大ではない','正解。緑色ゾーンは正常な圧力範囲です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'屋内消火栓設備の「加圧送水装置」とはどれか？',o:['非常用発電機','スプリンクラーヘッド','消火器','消火栓ポンプ'],a:3,genre:1,d:1,ex:'加圧送水装置は消火栓やスプリンクラーに必要な水圧・水量を供給するポンプ装置です。',oex:['不正解。発電機は電源設備','不正解。SPヘッドは放水部','不正解。消火器は別の設備','正解。消火栓ポンプが加圧送水装置です']},{q:'消防設備の「不活性ガス消火設備」を設置してはいけない場所はどれか？',o:['常時人がいる居室','書庫','通信機器室','電気室'],a:0,genre:1,d:2,ex:'不活性ガス消火設備は酸素濃度を下げて消火するため、常時人がいる居室には原則設置できません。窒息の危険があります。',oex:['正解。常時人がいる居室は窒息危険で不可','不正解。書庫は適切な設置場所','不正解。通信機器室は適切な設置場所','不正解。電気室は適切な設置場所']},{q:'消防法第8条の2の5で定める「自衛消防組織」に必要な要員はどれか？',o:['全従業員','社長・部長・課長','統括管理者・班長・隊員','警備員のみ'],a:2,genre:1,d:2,ex:'自衛消防組織は統括管理者を長とし、本部隊と地区隊を編成します。各班（消火班・避難誘導班等）の班長と隊員で構成します。',oex:['不正解。全従業員が要員ではない','不正解。会社の役職とは異なります','正解。統括管理者・班長・隊員で構成します','不正解。警備員だけでは不十分']},{q:'消防設備の点検で使用する「加煙試験器」の目的はどれか？',o:['消火器の試験','煙感知器の作動試験','熱感知器の試験','スプリンクラーの試験'],a:1,genre:1,d:2,ex:'加煙試験器は煙感知器に人工的な煙を送って作動確認を行うための点検器具です。',oex:['不正解。消火器の試験ではない','正解。煙感知器の作動試験に使用します','不正解。熱感知器には加熱試験器を使用','不正解。SPの試験ではない']},{q:'消防設備の点検で使用する「加熱試験器」の目的はどれか？',o:['消火器の試験','発信機の試験','煙感知器の試験','熱感知器の作動試験'],a:3,genre:1,d:2,ex:'加熱試験器は差動式・定温式等の熱感知器に人工的な熱を加えて作動確認を行うための器具です。',oex:['不正解。消火器の試験ではない','不正解。発信機の試験ではない','不正解。煙感知器には加煙試験器を使用','正解。熱感知器の作動試験に使用します']},{q:'消防法で定める「防火管理者」の資格取得方法はどれか？',o:['試験に合格する','消防署に届出する','防火管理講習を修了する','実務経験のみ'],a:2,genre:1,d:1,ex:'防火管理者は都道府県知事等が実施する防火管理講習（甲種：2日、乙種：1日）を修了することで資格を取得します。',oex:['不正解。試験ではなく講習修了','不正解。届出だけでは取得できない','正解。防火管理講習の修了で取得します','不正解。実務経験のみでは不可']},{q:'消火栓設備の「放水試験」はいつ実施するか？',o:['機器点検時（6ヶ月ごと）','総合点検時（1年ごと）','5年ごと','3年ごと'],a:1,genre:1,d:2,ex:'放水試験は総合点検（年1回）の際に実施します。実際に放水して圧力・水量が基準を満たすか確認します。',oex:['不正解。機器点検では放水しない','正解。総合点検時に放水試験を実施します','不正解。5年ごとではない','不正解。3年ごとではない']},{q:'連結散水設備が設置される主な場所はどれか？',o:['屋上','一般居室','地下街・地下駐車場等の地階','倉庫'],a:2,genre:1,d:2,ex:'連結散水設備は消防隊の活動が困難な地下街、地下駐車場等の地階に設置される消火設備です。',oex:['不正解。屋上は設置場所ではない','不正解。一般居室には不要','正解。地下街・地下駐車場等に設置します','不正解。一般倉庫にはSP等が適切']},{q:'避難器具の設置個数は何に基づいて決まるか？',o:['建物の高さ','各階の収容人員','建物の築年数','部屋の数'],a:1,genre:1,d:2,ex:'避難器具の設置個数は各階の収容人員に基づいて算定されます。用途・収容人員により必要個数が決まります。',oex:['不正解。高さではなく収容人員','正解。各階の収容人員に基づきます','不正解。築年数では決まらない','不正解。部屋数ではない']},{q:'消火器の「廃棄方法」として正しいものはどれか？',o:['一般ゴミとして捨てる','専門の回収業者またはメーカーに依頼する','埋める','分解して捨てる'],a:1,genre:1,d:1,ex:'消火器は一般ゴミとして処分できません。専門の回収業者、メーカー、または販売店に引き取りを依頼します。',oex:['不正解。一般ゴミとして処分不可','正解。専門業者またはメーカーに依頼します','不正解。埋めることは違法','不正解。分解は危険で禁止'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'消防設備の「無窓階」の判定基準はどれか？',o:['避難上有効な開口部の面積が床面積の1/30以下の階','地下階のみ','屋上階のみ','窓がない階'],a:0,genre:1,d:3,ex:'無窓階は避難上・消火活動上有効な開口部の面積が当該階の床面積の1/30以下の階で、消防設備の設置基準が強化されます。',oex:['正解。有効開口面積が床面積の1/30以下の階','不正解。地下階に限定されない','不正解。屋上階に限定されない','不正解。窓の有無だけでなく面積基準で判定']},{q:'消防用設備等の「技術基準」を定める政令はどれか？',o:['建築基準法施行令','労働安全衛生法施行令','水道法施行令','消防法施行令'],a:3,genre:1,d:2,ex:'消防用設備等の技術基準は消防法施行令で定められています。設置基準や技術的細目が規定されています。',oex:['不正解。建基法施行令は建築関係','不正解。安衛法施行令は労働安全関係','不正解。水道法施行令は水道関係','正解。消防法施行令で技術基準を規定']},{q:'火災時の煙の水平移動速度の目安はどれか？',o:['3～5m/s','0.1～0.3m/s','10m/s以上','0.5～1.0m/s'],a:3,genre:1,d:3,ex:'火災時の煙の水平移動速度は0.5～1.0m/s程度、垂直方向は3～5m/s程度です。人の歩行速度より遅い場合もありますが視界が悪化します。',oex:['不正解。3～5m/sは垂直方向の速度','不正解。0.1～0.3m/sは遅すぎ','不正解。10m/sは過大な見積もり','正解。水平方向は0.5～1.0m/s程度です']},{q:'感知器の「終端抵抗」の役割はどれか？',o:['感知器の感度を調整する','回線の断線を監視する','感知器の電源を制御する','感知器を起動する'],a:1,genre:1,d:3,ex:'終端抵抗はP型火災報知設備の感知器回路末端に接続し、回線が正常に導通しているか（断線していないか）を監視するためのものです。',oex:['不正解。感度調整ではない','正解。回線の断線監視が目的です','不正解。電源制御ではない','不正解。起動装置ではない']},{q:'消防設備士の類別で「第7類」が対象とする設備はどれか？',o:['屋内消火栓','漏電火災警報器','自動火災報知設備','消火器'],a:1,genre:1,d:2,ex:'消防設備士第7類は漏電火災警報器が対象です。乙種のみの区分です。',oex:['不正解。屋内消火栓は第1類','正解。第7類は漏電火災警報器が対象','不正解。火災報知設備は第4類','不正解。消火器は第6類']},{q:'消防設備士の類別で「第2類」が対象とする設備はどれか？',o:['自動火災報知設備','不活性ガス消火設備','泡消火設備','屋内消火栓'],a:2,genre:1,d:2,ex:'消防設備士第2類は泡消火設備が対象です。',oex:['不正解。火災報知は第4類','不正解。不活性ガスは第3類','正解。第2類は泡消火設備が対象です','不正解。屋内消火栓は第1類']},{q:'消防設備士の類別で「第3類」が対象とする設備はどれか？',o:['不活性ガス消火設備・ハロゲン化物消火設備・粉末消火設備','泡消火設備','自動火災報知設備','避難器具'],a:0,genre:1,d:2,ex:'第3類は不活性ガス消火設備、ハロゲン化物消火設備、粉末消火設備が対象です。',oex:['正解。ガス系・粉末消火設備が第3類です','不正解。泡消火は第2類','不正解。火災報知は第4類','不正解。避難器具は第5類']},{q:'消防設備士の類別で「第5類」が対象とする設備はどれか？',o:['消火器','屋内消火栓','避難器具（避難はしご・緩降機・救助袋等）','自動火災報知設備'],a:2,genre:1,d:2,ex:'第5類は避難器具（金属製避難はしご、緩降機、救助袋等）が対象です。',oex:['不正解。消火器は第6類','不正解。屋内消火栓は第1類','正解。第5類は避難器具が対象です','不正解。火災報知は第4類']},{q:'消防法で定める「消防同意」とは何か？',o:['防火管理者の選任許可','消防署が火災を鎮火すること','建築確認申請時に消防機関が防火上の同意を行うこと','消火器の設置許可'],a:2,genre:1,d:2,ex:'消防同意は建築基準法に基づく確認申請時に、消防長等が防火上の条件について同意する制度です。',oex:['不正解。防火管理者の選任許可ではない','不正解。鎮火ではない','正解。建築確認時に防火上の同意を行う制度です','不正解。消火器の設置許可ではない']},{q:'消防ポンプの「締切圧力」とは何か？',o:['配管内の常時圧力','ノズル先端の圧力','吐出弁を閉めた状態でのポンプの最大圧力','ポンプ停止時の圧力'],a:2,genre:1,d:3,ex:'締切圧力は吐出弁を閉じた状態でポンプを運転した時の圧力で、ポンプの性能確認に使用される指標です。',oex:['不正解。常時圧力ではない','不正解。ノズル先端圧力ではない','正解。吐出弁閉止時のポンプ最大圧力です','不正解。停止時の圧力ではない']},{q:'感知器の「蓄積機能」とは何か？',o:['煙を蓄える機能','データを記録する機能','電力を蓄える機能','一定時間信号を蓄積して非火災報を低減する機能'],a:3,genre:1,d:3,ex:'蓄積機能は感知器が一定時間（5～60秒）信号を保持し、一過性の煙等による非火災報を低減する機能です。',oex:['不正解。煙を蓄えるのではない','不正解。データ記録ではない','不正解。電力蓄積ではない','正解。信号を一定時間保持して誤報を低減します']},{q:'自動火災報知設備の「地区表示灯」の目的はどれか？',o:['避難口の位置を示す','どの警戒区域で火災が発生したか受信機で表示する','火災感知器の位置を示す','消火栓の位置を示す'],a:1,genre:1,d:2,ex:'地区表示灯は受信機において火災が発生した警戒区域を表示し、火災場所の特定を助ける装置です。',oex:['不正解。避難口は誘導灯','正解。火災発生の警戒区域を受信機で表示します','不正解。感知器位置の表示ではない','不正解。消火栓位置は位置表示灯']},{q:'消火栓の「表示灯」と「起動表示灯」の違いはどれか？',o:['同じもの','表示灯は常時点灯で位置表示、起動表示灯はポンプ起動時に点灯','色が違うだけ','明るさが違うだけ'],a:1,genre:1,d:2,ex:'表示灯（位置表示灯）は消火栓の位置を示すため常時点灯。起動表示灯はポンプが起動している間だけ点灯します。',oex:['不正解。機能が異なります','正解。位置表示は常時、起動表示はポンプ運転時','不正解。どちらも赤色です','不正解。明るさの違いではない']},{q:'消火器の設置で「通行の妨げにならない場所」に設置する理由はどれか？',o:['消火器が汚れるから','緊急時に速やかに取り出して使用できるようにするため','消火器が転倒するから','美観のため'],a:1,genre:1,d:1,ex:'消火器は火災時に速やかに取り出して使用する必要があるため、通行の妨げにならず、すぐに手に取れる場所に設置します。',oex:['不正解。汚損防止が主目的ではない','正解。緊急時の即座の使用のためです','不正解。転倒防止は固定で対応','不正解。美観が主目的ではない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'消防法施行令別表第1の「特定防火対象物」に含まれないものはどれか？',o:['映画館','百貨店','共同住宅','病院'],a:2,genre:1,d:2,ex:'共同住宅は非特定防火対象物です。映画館・百貨店・病院等の不特定多数が利用する施設が特定防火対象物です。',oex:['不正解。映画館は特定防火対象物','不正解。百貨店は特定防火対象物','正解。共同住宅は非特定防火対象物です','不正解。病院は特定防火対象物']},{q:'消防設備の「配線の耐熱保護」が必要な回路はどれか？',o:['非常電源回路・操作回路等の消防設備の主要回路','照明回路','テレビアンテナ線','コンセント回路'],a:0,genre:1,d:2,ex:'消防設備の非常電源回路や操作回路は火災時にも機能を維持する必要があり、耐火・耐熱配線が求められます。',oex:['正解。消防設備の主要回路に耐熱保護が必要','不正解。照明は一般回路','不正解。アンテナ線は消防設備でない','不正解。コンセントは一般回路']},{q:'火災通報装置（119番自動通報）が設置される主な施設はどれか？',o:['工場','事務所ビル','老人福祉施設等の収容人員が自力避難困難な施設','一般住宅'],a:2,genre:1,d:2,ex:'火災通報装置は老人福祉施設・障害者施設等、収容者の自力避難が困難な施設に設置が義務付けられています。',oex:['不正解。工場は通常不要','不正解。事務所は通常不要','正解。自力避難困難な施設に設置義務があります','不正解。住宅には義務なし']},{q:'消防用設備等の「検定品」とは何か？',o:['日本消防検定協会等が性能を認証した製品','外国製の設備','中古の設備','消防署が検査した設備'],a:0,genre:1,d:2,ex:'検定品は日本消防検定協会等の検定に合格し、性能が確認された消防設備です。検定合格表示が付されます。',oex:['正解。検定機関が性能を認証した製品です','不正解。外国製の意味ではない','不正解。中古品の意味ではない','不正解。消防署の検査ではない']},{q:'消火栓の「ホース」の耐用年数の目安はどれか？',o:['10年','5年','20年','3年'],a:0,genre:1,d:2,ex:'消火栓のホースの耐用年数は概ね10年が目安です。劣化が見られる場合は早期に交換します。',oex:['正解。10年が耐用年数の目安です','不正解。5年は短すぎ','不正解。20年は長すぎ','不正解。3年は短すぎ']},{q:'スプリンクラーヘッドの「デフレクター」の役割はどれか？',o:['熱を感知する','配管を保護する','ヘッドを固定する','放水された水を均一に散布するための板'],a:3,genre:1,d:2,ex:'デフレクターはスプリンクラーヘッドから放出された水を放射状に散布するための反射板です。',oex:['不正解。熱感知は感熱部の役割','不正解。配管保護ではない','不正解。固定はフレームの役割','正解。水を均一に散布する反射板です']},{q:'自動火災報知設備の「感知器回路」の電圧は一般的にどれか？',o:['DC12V','AC200V','AC100V','DC24V'],a:3,genre:1,d:3,ex:'自動火災報知設備の感知器回路は一般的にDC24Vで動作します。受信機から供給されます。',oex:['不正解。DC12Vは自動車等の電圧','不正解。AC200Vは動力回路','不正解。AC100Vは商用電源','正解。感知器回路はDC24Vが一般的です']},{q:'非常放送設備の「L級スピーカー」の音圧レベルはどれか？',o:['87dB以上','84dB以上','92dB以上','75dB以上'],a:2,genre:1,d:3,ex:'L級スピーカーは1W入力・1m離れた位置で92dB以上の音圧が必要です。M級は87dB以上、S級は84dB以上。',oex:['不正解。87dBはM級の基準','不正解。84dBはS級の基準','正解。L級は92dB以上です','不正解。75dBは基準未満']},{q:'消防設備の「試験結果報告書」に記載する項目に含まれないものはどれか？',o:['点検日時','点検者氏名','設備の判定結果','建物の家賃'],a:3,genre:1,d:1,ex:'点検結果報告書には点検日時、点検者、設備の種類、判定結果等を記載しますが、建物の家賃は無関係です。',oex:['不正解。点検日時は必須記載事項','不正解。点検者氏名は必須記載事項','不正解。判定結果は必須記載事項','正解。家賃は点検報告と無関係です']},{q:'消火器の「大型消火器」と「小型消火器」の区別基準はどれか？',o:['重さで区別','メーカーで区別','色で区別','能力単位がA-10またはB-20以上のものが大型'],a:3,genre:1,d:2,ex:'大型消火器はA火災の能力単位がA-10以上またはB火災の能力単位がB-20以上のものです。',oex:['不正解。重さではなく能力単位','不正解。メーカーでは区別しない','不正解。色では区別しない','正解。能力単位A-10以上またはB-20以上が大型'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'感知器の「回路試験」で確認する内容はどれか？',o:['感知器の色','感知器の重さ','感知器回路の導通と断線の有無','感知器の外観'],a:2,genre:1,d:2,ex:'回路試験は感知器回路が正常に導通しているか、断線や短絡がないかを確認する試験です。',oex:['不正解。色は確認事項ではない','不正解。重さは確認事項ではない','正解。導通と断線の有無を確認します','不正解。外観は外観点検の項目']},{q:'消防法で「消防設備等の設置届」を提出する際に添付する図書はどれか？',o:['消防設備の設計図書（配置図、系統図等）','建物の家賃表','従業員名簿','会社の決算書'],a:0,genre:1,d:2,ex:'設置届には消防設備の配置図、系統図、仕様書等の設計図書を添付して提出します。',oex:['正解。配置図・系統図等の設計図書を添付します','不正解。家賃表は無関係','不正解。従業員名簿は無関係','不正解。決算書は無関係']},{q:'屋内消火栓の「ホースの長さ」として1号消火栓の基準はどれか？',o:['10m','15m','25m（15m×2本接続可）','40m'],a:2,genre:1,d:2,ex:'1号消火栓のホースは15m×2本で合計30m（接続して25m有効）が標準的な長さです。',oex:['不正解。10mは短すぎ','不正解。15mは1本の長さ','正解。15m×2本接続が標準です','不正解。40mは長すぎ']},{q:'消防設備の「絶縁抵抗測定」の目的はどれか？',o:['水量を測る','配線の絶縁状態が正常か確認する','配管の肉厚を測る','配線の長さを測る'],a:1,genre:1,d:2,ex:'絶縁抵抗測定は消防設備の電気配線の絶縁状態を確認し、漏電のおそれがないか検査する試験です。',oex:['不正解。水量測定ではない','正解。配線の絶縁状態を確認します','不正解。配管は対象外','不正解。長さ測定ではない']},{q:'消防法における「防火対象物使用開始届」の届出時期はどれか？',o:['使用開始の7日前まで','使用開始後7日以内','使用開始の30日前まで','使用開始後30日以内'],a:0,genre:1,d:2,ex:'防火対象物使用開始届は使用開始の7日前までに消防署に届出します。',oex:['正解。使用開始の7日前までに届出します','不正解。開始後ではなく開始前','不正解。30日前ではなく7日前','不正解。開始後ではなく開始前']},{q:'スプリンクラー設備の「準備作動式」と「予作動式」の違いはどれか？',o:['メーカーの違い','設置場所の違い','準備作動式は感知器連動で弁が開き配管に充水、予作動式は感知器+ヘッド開放で放水','同じもの'],a:3,genre:1,d:3,ex:'準備作動式と予作動式は実質的に同じ方式で、感知器の信号により予作動弁を開放し、さらにヘッド開放で放水する方式です。',oex:['不正解。メーカーの違いではない','不正解。設置場所の違いではない','不正解。説明は予作動式の動作で同じ','正解。両者は実質同じ方式です']},{q:'消防設備点検で「不良」判定となった場合の対応はどれか？',o:['建物を解体する','次回点検まで放置','速やかに改修・修理を行い、改修後に再点検する','使用を中止する'],a:2,genre:1,d:1,ex:'不良判定の設備は速やかに改修・修理を行い、正常に機能することを確認する必要があります。',oex:['不正解。解体は過大な対応','不正解。放置は消防法違反になる','正解。速やかに改修し再点検します','不正解。必ずしも使用中止ではない']},{q:'煙感知器の「感度試験」で使用する試験ガスはどれか？',o:['酸素','試験用煙（専用加煙試験器の煙）','プロパンガス','二酸化炭素'],a:1,genre:1,d:2,ex:'煙感知器の感度試験は専用の加煙試験器から発生する試験用煙を使用して、所定の時間内に作動するか確認します。',oex:['不正解。酸素は試験ガスでない','正解。専用加煙試験器の煙を使用します','不正解。プロパンは可燃性で危険','不正解。CO2は試験ガスでない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/9/9f/Residential_smoke_detector.jpg/330px-Residential_smoke_detector.jpg'},{q:'非特定防火対象物の消防設備点検結果報告の周期はどれか？',o:['3年に1回','2年に1回','1年に1回','6ヶ月に1回'],a:0,genre:1,d:1,ex:'非特定防火対象物（共同住宅、事務所、工場等）の点検結果報告は3年に1回です。',oex:['正解。非特定は3年に1回の報告です','不正解。2年は基準にない','不正解。1年は特定防火対象物の報告周期','不正解。6ヶ月は機器点検の実施周期']},{q:'消火器の点検表に記録する「製造年」を確認する場所はどれか？',o:['消火器の底面','消火器の把手','消火器の本体ラベル（銘板）','消火器の安全ピン'],a:2,genre:1,d:1,ex:'消火器の製造年は本体に貼付されたラベル（銘板）に記載されています。',oex:['不正解。底面ではなくラベル','不正解。把手ではない','正解。本体ラベル（銘板）で確認します','不正解。安全ピンではない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'消防設備の「性能規定」と「仕様規定」の違いはどれか？',o:['性能規定は達成すべき性能を定める、仕様規定は具体的な仕様を定める','メーカーの違い','同じもの','コストの違い'],a:0,genre:1,d:3,ex:'性能規定は「何を達成するか」を定め、仕様規定は「どのように行うか」の具体的方法を定めるものです。',oex:['正解。性能は目標、仕様は具体的方法を規定します','不正解。メーカーの違いではない','不正解。異なる概念です','不正解。コストの違いではない']},{q:'消防設備の「自家発電設備」の試運転の頻度はどれか？',o:['毎日','毎週','毎月','毎年'],a:2,genre:1,d:2,ex:'自家発電設備は月1回以上の試運転（無負荷運転）を行い、非常時に確実に起動できることを確認します。',oex:['不正解。毎日は過剰','不正解。毎週は過剰','正解。月1回以上の試運転が必要です','不正解。毎年では不十分']},{q:'消防用設備等の「技術上の基準の特例」を認める権限者はどれか？',o:['消防長または消防署長','建築主','設計者','施工者'],a:0,genre:1,d:3,ex:'消防法施行令第32条により、消防長等は同等以上の効力があると認める場合に技術基準の特例を認めることができます。',oex:['正解。消防長または消防署長が認めます','不正解。建築主ではない','不正解。設計者ではない','不正解。施工者ではない']},{q:'消火器の「放射能力試験」とはどのような試験か？',o:['消火器を実際に放射して放射距離・放射時間を確認する試験','放射線を測る試験','耐久性の試験','外観の試験'],a:0,genre:1,d:2,ex:'放射能力試験は消火器を実際に放射し、放射距離・放射時間・放射状態が正常か確認する試験です。抜取りで実施します。',oex:['正解。実際に放射して性能を確認する試験です','不正解。放射線とは無関係','不正解。耐久性試験は別','不正解。外観試験は別'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'感知器の「確認灯」の役割はどれか？',o:['電源の表示','常時点灯する照明','故障の表示','感知器が作動したことを現場で視認するための表示灯'],a:3,genre:1,d:2,ex:'確認灯は感知器が火災を感知して作動した際に点灯し、どの感知器が作動したか現場で確認するためのLEDランプです。',oex:['不正解。電源表示ではない','不正解。常時点灯ではない','不正解。故障表示ではない','正解。作動した感知器を現場で視認する表示灯です']},{q:'スプリンクラー設備の「作動試験」で確認することはどれか？',o:['配管の外観','スプリンクラーの設置数','ヘッドの色','末端試験弁を開いて放水圧力・警報の作動を確認する'],a:3,genre:1,d:2,ex:'作動試験は末端試験弁を開放して放水し、アラーム弁の作動・圧力スイッチの動作・警報の鳴動を確認します。',oex:['不正解。外観は外観点検','不正解。設置数は設計図で確認','不正解。色の確認ではない','正解。放水圧力と警報作動を確認します']},{q:'消火栓の「放水圧力」の測定に使用する器具はどれか？',o:['温度計','騒音計','ピトーゲージ（放水圧力測定器）','流量計'],a:2,genre:1,d:2,ex:'放水圧力はピトーゲージ（ノズル先端の動圧を測定する器具）で測定します。',oex:['不正解。温度計は温度測定用','不正解。騒音計は音の測定用','正解。ピトーゲージで放水圧力を測定します','不正解。流量計は別の器具']},{q:'消防法第8条で定める「防火管理者」の業務に含まれるものはどれか？',o:['建物の設計','火災保険の加入','消防車の運転','消防計画の作成・届出、避難訓練の実施'],a:3,genre:1,d:1,ex:'防火管理者は消防計画の作成・届出、避難訓練の実施、消防設備の維持管理の監督等の業務を行います。',oex:['不正解。設計は建築士の業務','不正解。火災保険は防火管理業務でない','不正解。消防車運転は消防職員','正解。消防計画作成・避難訓練等が業務です']},{q:'屋内消火栓の「放水圧力」の基準値（1号消火栓）はどれか？',o:['0.10MPa以上','0.30MPa以上','0.17MPa以上','0.05MPa以上'],a:2,genre:1,d:2,ex:'1号消火栓の放水圧力は0.17MPa以上（ノズル先端）が基準です。放水量130L/min以上と合わせて確認します。',oex:['不正解。0.10MPaは基準未満','不正解。0.30MPaは基準を超えている','正解。1号消火栓は0.17MPa以上が基準です','不正解。0.05MPaは基準未満']},{q:'自動火災報知設備の「蓄積時間」の範囲はどれか？',o:['1～3秒','1～5分','5～60秒','10分以上'],a:2,genre:1,d:3,ex:'蓄積時間は5秒以上60秒以内と定められています。この間信号を保持し、一過性の原因による非火災報を低減します。',oex:['不正解。1～3秒は短すぎ','不正解。1～5分は長すぎ','正解。5～60秒が蓄積時間の範囲です','不正解。10分は長すぎ']},{q:'消火栓ポンプの「性能試験」で確認する項目はどれか？',o:['配管の長さ','ポンプの重さ','ポンプの色','締切圧力・規定流量時の圧力・電流値'],a:3,genre:1,d:2,ex:'性能試験では締切圧力（チャーン運転）、規定流量時の吐出圧力、モーターの電流値等を確認します。',oex:['不正解。配管長は設計図で確認','不正解。重さは性能試験でない','不正解。色は性能と無関係','正解。圧力・流量・電流値を確認します']},{q:'感知器の設置が「免除」される場所はどれか？',o:['居室','廊下','浴室・トイレ等の常時水蒸気や湿気が多い場所','階段'],a:2,genre:1,d:2,ex:'浴室・トイレ等は水蒸気や湿気により誤報が多発するため、一定の条件下で感知器の設置が免除される場合があります。',oex:['不正解。居室には設置必要','不正解。廊下には設置必要','正解。浴室等は設置免除の場合があります','不正解。階段には設置必要']},{q:'消防設備の「中間検査」とは何か？',o:['完成後の検査','書類の検査','工事の途中段階で消防機関が行う検査','消火器の検査'],a:2,genre:1,d:2,ex:'中間検査は消防設備の工事途中で、隠蔽部分等が完成前に適正施工を確認するための検査です。',oex:['不正解。完成後は完了検査','不正解。書類だけの検査ではない','正解。工事途中で適正施工を確認する検査です','不正解。消火器の検査ではない']},{q:'消防法で定める「消防設備士の義務」として正しいものはどれか？',o:['免状の携帯・誠実業務の遂行・講習の受講','特に義務はない','消防署への毎月の報告','工事のみ行えばよい'],a:0,genre:1,d:2,ex:'消防設備士は免状の携帯義務、誠実に業務を遂行する義務、定期的な講習受講義務があります。',oex:['正解。免状携帯・誠実業務・講習受講が義務です','不正解。複数の義務がある','不正解。毎月報告の義務はない','不正解。義務は工事だけでない']},{q:'ガス漏れ火災警報設備の「検知器」が設置される場所はどれか？',o:['屋上','ガス機器を使用する室内の天井面付近（都市ガス）または床面付近（LPG）','倉庫のみ','地下駐車場のみ'],a:1,genre:1,d:2,ex:'都市ガス（空気より軽い）は天井面付近、LPG（空気より重い）は床面付近に検知器を設置します。',oex:['不正解。屋上ではない','正解。ガスの比重に応じた位置に設置します','不正解。倉庫だけでない','不正解。駐車場だけでない']},{q:'消火栓設備の「呼水槽」の容量として一般的なものはどれか？',o:['10L','500L以上','50L','100L以上'],a:3,genre:1,d:3,ex:'呼水槽の容量は一般的に100L以上で、ポンプが確実に揚水を開始できるよう十分な水量を保持します。',oex:['不正解。10Lは少なすぎ','不正解。500Lは過大','不正解。50Lは少なすぎ','正解。100L以上が一般的です']},{q:'消防法で定める「消防訓練」の実施回数として特定防火対象物はどれか？',o:['月1回','年2回以上','年1回','3年に1回'],a:1,genre:1,d:1,ex:'特定防火対象物では消火訓練・避難訓練を年2回以上実施することが義務付けられています。',oex:['不正解。月1回は義務ではない','正解。特定防火対象物は年2回以上です','不正解。年1回では不足','不正解。3年に1回では不足']},{q:'消火器の点検で「安全弁」を確認する目的はどれか？',o:['重さを確認','消火剤の量を確認','美観のため','内部圧力が異常上昇した際に自動的にガスを逃がす機能を確認'],a:3,genre:1,d:2,ex:'安全弁（蓄圧式消火器）は内部圧力が異常に上昇した場合に自動的にガスを放出して破裂を防ぐ安全装置です。',oex:['不正解。重量確認は別の項目','不正解。薬剤量確認は別の項目','不正解。美観ではない','正解。異常圧力時の安全機能を確認します'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'火災報知設備の「回線数」を決める基準はどれか？',o:['建物の階数のみ','従業員数','部屋の数','警戒区域の数に基づいて決定する'],a:3,genre:1,d:2,ex:'受信機の回線数は警戒区域の数に基づきます。1回線が1警戒区域に対応するのが基本です。',oex:['不正解。階数だけでは決まらない','不正解。従業員数ではない','不正解。部屋数ではない','正解。警戒区域数に基づいて決定します']},{q:'消火栓の「ホース接続口」のねじ規格はどれか？',o:['ユニファイねじ','メートルねじ','テーパーねじ','差込式（町野式カップリング）'],a:3,genre:1,d:2,ex:'消防用ホースの接続は差込式（町野式カップリング）が標準で、素早い着脱が可能です。',oex:['不正解。ユニファイねじではない','不正解。メートルねじではない','不正解。テーパーねじは配管用','正解。差込式（町野式）が消防の標準です']},{q:'消防用設備等の「設計・施工」の根拠となる技術基準はどれか？',o:['建築基準法のみ','電気事業法','水道法','消防法施行令・施行規則・告示'],a:3,genre:1,d:1,ex:'消防設備の設計・施工は消防法施行令、施行規則、関連告示に定められた技術基準に基づきます。',oex:['不正解。建基法だけでは不足','不正解。電気事業法は電力関係','不正解。水道法は給水関係','正解。消防法施行令・規則・告示が根拠です']},{q:'消防設備の「蓄電池設備」の点検で確認する項目はどれか？',o:['電池の色','電圧・比重・液量・外観・充電状態','電池のメーカー','電池の重さ'],a:1,genre:1,d:2,ex:'蓄電池の点検では端子電圧、電解液の比重・液量、外観（膨張・腐食等）、充電状態等を確認します。',oex:['不正解。色は確認不要','正解。電圧・比重・液量・充電状態を確認します','不正解。メーカーは点検項目でない','不正解。重さは点検項目でない']},{q:'消火器の「使用温度範囲」として一般的なものはどれか？',o:['0～30℃','0～100℃','-40～+60℃','−20～+40℃（機種による）'],a:3,genre:1,d:2,ex:'消火器の使用温度範囲は一般的に-20℃～+40℃程度ですが、寒冷地用は-30℃対応のものもあります。',oex:['不正解。0～30℃は範囲が狭い','不正解。100℃は過大','不正解。-40℃対応は特殊品','正解。-20～+40℃程度が一般的です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'消防法における「定期点検」と「随時点検」の違いはどれか？',o:['同じもの','定期点検は法定の周期で実施、随時点検は災害後等に臨時で実施','定期は外部、随時は内部','定期は毎日、随時は年1回'],a:1,genre:1,d:2,ex:'定期点検は機器点検（6ヶ月）・総合点検（1年）の法定周期で実施します。随時点検は火災・地震等の後に臨時で実施します。',oex:['不正解。時期と目的が異なる','正解。定期は法定周期、随時は臨時実施です','不正解。実施者の区分ではない','不正解。頻度が違う']},{q:'消火栓ポンプの「フート弁」の役割はどれか？',o:['水圧を調整する','消火剤を混合する','放水量を調整する','吸込管内の落水を防止して呼水を保持する'],a:3,genre:1,d:3,ex:'フート弁は吸込管の最下部に設置する逆止弁で、ポンプ停止時に管内の水が落水するのを防ぎ呼水状態を保持します。',oex:['不正解。水圧調整ではない','不正解。混合装置ではない','不正解。放水量調整ではない','正解。落水防止で呼水を保持します']},{q:'消火栓の「放水口」の高さ基準はどれか？',o:['床面から0.8m以上1.5m以下','床面から0.5m以下','床面から1.5m以上','天井面から0.3m以内'],a:0,genre:1,d:2,ex:'消火栓の放水口は操作しやすい高さとして床面から0.8m以上1.5m以下に設置します。',oex:['正解。0.8m以上1.5m以下に設置します','不正解。0.5m以下は低すぎ','不正解。1.5m以上は高すぎ','不正解。天井面は感知器の基準']},{q:'消防設備の「配管の耐圧試験」の試験圧力はどれか？',o:['使用圧力の1.5倍','使用圧力と同じ','使用圧力の2倍','使用圧力の3倍'],a:0,genre:1,d:2,ex:'消防配管の耐圧試験は使用圧力の1.5倍の水圧で実施し、漏水・変形がないことを確認します。',oex:['正解。使用圧力の1.5倍で試験します','不正解。同圧では安全率が不足','不正解。2倍は過大','不正解。3倍は過大']},{q:'消火栓の「表示灯」の電球が切れた場合の対応はどれか？',o:['放置する','速やかに電球を交換し常時点灯を維持する','消火栓を撤去する','報告書だけ作成する'],a:1,genre:1,d:1,ex:'表示灯は消火栓の位置を示す重要な表示です。電球切れは速やかに交換して常時点灯を維持します。',oex:['不正解。放置は消防法違反','正解。速やかに交換して常時点灯を維持します','不正解。撤去は過大な対応','不正解。報告だけでは不十分']},{q:'感知器の「汚れ」による影響はどれか？',o:['影響なし','感度が上がる','色が変わるだけ','感度が低下し火災を見逃す、または非火災報が増える'],a:3,genre:1,d:1,ex:'感知器に埃や油脂が付着すると感度が変化し、火災の見逃しや非火災報の増加の原因になります。定期清掃が重要です。',oex:['不正解。性能に影響する','不正解。感度は上がらない','不正解。色だけの問題ではない','正解。感度低下や非火災報増加の原因になります']},{q:'消防設備士が「工事整備対象設備等」の工事に着手する際に必要なことはどれか？',o:['着工届を消防長等に届出する','隣人に挨拶する','特になし','保険に加入する'],a:0,genre:1,d:2,ex:'消防設備士は工事整備対象設備等の工事に着手する際、着工届を消防長又は消防署長に届出する必要があります。',oex:['正解。着工届の届出が必要です','不正解。挨拶は法的義務ではない','不正解。届出義務がある','不正解。保険は義務ではない']},{q:'消火器の「薬剤の詰替え」ができる消火器はどれか？',o:['全ての消火器','業務用の蓄圧式・加圧式消火器（住宅用は不可）','住宅用消火器のみ','車載用消火器のみ'],a:1,genre:1,d:2,ex:'業務用消火器は薬剤の詰替えが可能ですが、住宅用消火器は使い捨てタイプで詰替えはできません。',oex:['不正解。住宅用は詰替え不可','正解。業務用消火器は詰替え可能です','不正解。住宅用は使い捨て','不正解。車載用に限定されない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'スプリンクラー設備の「放水区域」の面積基準はどれか？',o:['50m²以下','100m²以下','3000m²以下（開放型の場合）','面積制限なし'],a:2,genre:1,d:3,ex:'開放型スプリンクラーの1放水区域は3000m²以下です。閉鎖型は区域の概念が異なります。',oex:['不正解。50m²は小さすぎ','不正解。100m²は小さすぎ','正解。開放型は3000m²以下が基準です','不正解。面積基準がある']},{q:'消防法で定める「防火管理者の再講習」の対象はどれか？',o:['甲種防火管理者で一定規模以上の防火対象物の管理者','全ての防火管理者','乙種防火管理者のみ','消防設備士のみ'],a:0,genre:1,d:2,ex:'甲種防火管理者で収容人員300人以上の特定防火対象物等の防火管理者は再講習の受講が必要です。',oex:['正解。甲種で一定規模以上の管理者が対象です','不正解。全員ではなく一定規模以上','不正解。乙種のみではない','不正解。消防設備士は別の講習']},{q:'消火栓設備の「配管の摩擦損失」を計算するために使用する公式はどれか？',o:['オームの法則','アルキメデスの原理','ボイルの法則','ヘーゼン・ウイリアムスの公式'],a:3,genre:1,d:3,ex:'消火栓の配管摩擦損失はヘーゼン・ウイリアムスの公式で計算します。管の材質・口径・流量から損失を算出します。',oex:['不正解。電気の法則','不正解。浮力の原理','不正解。気体の法則','正解。配管摩擦損失の計算に使用します']},{q:'消防設備の「副受信機」の設置場所はどれか？',o:['防災センター・守衛室等の常時人がいる場所','地下のみ','屋上のみ','屋外のみ'],a:0,genre:1,d:2,ex:'副受信機は防災センターや守衛室等、常時人がいて火災発生を直ちに確認できる場所に設置します。',oex:['正解。常時人がいる場所に設置します','不正解。地下に限定されない','不正解。屋上に限定されない','不正解。屋外ではない']},{q:'消防設備の「総合操作盤」の機能はどれか？',o:['消火器の管理','消防設備全体の監視・制御を一元的に行う装置','消防車の呼び出し','避難はしごの操作'],a:1,genre:1,d:2,ex:'総合操作盤は自火報・消火栓・スプリンクラー・排煙等の消防設備を一元的に監視・制御する防災センターの中核装置です。',oex:['不正解。消火器管理ではない','正解。消防設備全体を一元監視・制御します','不正解。消防車呼出ではない','不正解。避難はしごの操作ではない']},{q:'消防設備の「耐火電線」と「耐熱電線」の違いはどれか？',o:['耐火電線は火災中も通電維持、耐熱電線は一定時間耐熱性能を維持','同じもの','太さの違い','色の違い'],a:0,genre:1,d:3,ex:'耐火電線は火災環境下でも長時間通電を維持できる電線、耐熱電線は一定温度・時間の耐熱性能を持つ電線です。',oex:['正解。耐火は火災中通電維持、耐熱は一定時間耐熱','不正解。性能レベルが異なる','不正解。太さではなく性能の違い','不正解。色ではなく性能の違い']},{q:'消火器の点検で「本体容器の腐食」が見つかった場合の対応はどれか？',o:['塗装する','テープで補修する','そのまま使用','腐食が著しい場合は廃棄し新品に交換する'],a:3,genre:1,d:1,ex:'本体容器の腐食は破裂事故の原因になるため、腐食が著しい消火器は使用を中止して廃棄・交換します。',oex:['不正解。塗装では内部腐食は防げない','不正解。テープでは対応不可','不正解。腐食容器は破裂の危険','正解。著しい腐食は廃棄・交換が必要です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'消防設備の「光電式分離型感知器」の設置場所はどれか？',o:['厨房','浴室','天井高15m以上の大空間（アトリウム・体育館等）','狭い部屋'],a:2,genre:1,d:3,ex:'光電式分離型は送光部と受光部を対向設置し、煙で光が遮られたことを検知します。大空間に適しています。',oex:['不正解。厨房には定温式が適切','不正解。浴室は設置免除の場合あり','正解。大空間に設置する感知器です','不正解。狭い部屋にはスポット型が適切']},{q:'消火栓設備の「補給水槽」の役割はどれか？',o:['配管内の漏水分を自動補給し常時充水を維持する','排水する','消火用水を貯める','消火剤を混合する'],a:0,genre:1,d:3,ex:'補給水槽は消火栓配管の微少な漏水を自動補給し、配管内を常時充水状態に保つための小型水槽です。',oex:['正解。漏水分を補給して充水を維持します','不正解。排水ではない','不正解。消火水槽とは異なる','不正解。消火剤混合ではない']},{q:'消防法で定める「共同防火管理」が必要な建物はどれか？',o:['住宅のみ','複数の管理権原者がいる一定規模以上の建物','工場のみ','全ての建物'],a:1,genre:1,d:2,ex:'共同防火管理はテナントビル等、複数の管理権原者がいる防火対象物で全体の防火管理を協議して行う制度です。',oex:['不正解。住宅のみではない','正解。複数管理権原者の一定規模建物が対象','不正解。工場のみではない','不正解。全建物ではない']},{q:'スプリンクラー設備の「送水口」の設置場所はどれか？',o:['屋上','最上階','地下','建物の1階外壁面等で消防車が容易に接近できる場所'],a:3,genre:1,d:2,ex:'送水口は消防隊が消防車から送水するため、建物の1階外壁面で消防車が容易に接近できる位置に設置します。',oex:['不正解。屋上ではない','不正解。最上階ではない','不正解。地下ではない','正解。1階外壁の消防車接近可能な場所です']},{q:'消防設備の「受信機の予備電源」の容量基準はどれか？',o:['1時間','24時間','48時間','10分間の監視＋10分間の鳴動'],a:3,genre:1,d:3,ex:'受信機の予備電源は監視状態で10分間、その後鳴動状態で10分間以上の容量が必要です（非常電源専用受電設備がない場合は60分間）。',oex:['不正解。1時間は非常電源の基準','不正解。24時間は過大','不正解。48時間は過大','正解。10分監視＋10分鳴動が基準です']},{q:'消火栓設備の「減圧措置」が必要な場合はどれか？',o:['放水圧力が0.7MPaを超える場合','常に必要','消火器の場合','放水圧力が0.1MPa未満の場合'],a:0,genre:1,d:2,ex:'放水圧力が0.7MPaを超えると消火栓の操作が困難になるため、減圧弁やオリフィス等の減圧措置が必要です。',oex:['正解。0.7MPa超で減圧措置が必要です','不正解。常に必要ではない','不正解。消火器は別の設備','不正解。0.1MPa未満は圧力不足']},{q:'感知器の「アナログ式」とはどれか？',o:['デジタル式と同じ','温度や煙濃度を連続的な数値で検知し、火災判断を受信機が行う感知器','古い型式の感知器','手動式の感知器'],a:1,genre:1,d:3,ex:'アナログ式感知器は温度や煙濃度のアナログ値を受信機に送信し、受信機側で火災判定を行う高機能な感知器です。',oex:['不正解。デジタルとは異なる','正解。連続値を送信し受信機で判断する方式です','不正解。古い型ではなく高機能型','不正解。自動式です']},{q:'消火栓のホース格納箱に設置する「表示灯の電源」はどれか？',o:['乾電池','常用電源から供給（停電時は非常電源）','太陽光発電','手回し発電'],a:1,genre:1,d:2,ex:'消火栓の表示灯は常用電源から供給され、停電時は非常電源（蓄電池等）に自動切替えされます。',oex:['不正解。乾電池ではない','正解。常用電源＋停電時非常電源です','不正解。太陽光ではない','不正解。手回しではない']},{q:'消防設備の「非常コンセント」の設置目的はどれか？',o:['一般家電用','消防隊が活動時に使用する電源を確保するため','照明用','空調用'],a:1,genre:1,d:2,ex:'非常コンセントは火災時に消防隊が照明器具や排煙機等の電動機器の電源として使用する設備です。',oex:['不正解。一般家電用ではない','正解。消防隊の活動用電源確保が目的です','不正解。照明専用ではない','不正解。空調用ではない']},{q:'消防設備の「防排煙設備」の目的はどれか？',o:['火を消す','電気を遮断する','水を排出する','煙の拡散を防ぎ排煙して避難経路を確保する'],a:3,genre:1,d:1,ex:'防排煙設備は防煙壁で煙の拡散を防ぎ、排煙設備で煙を建物外に排出して避難経路の安全を確保します。',oex:['不正解。消火は別の設備','不正解。電気遮断は別の設備','不正解。排水は別の設備','正解。煙の拡散防止と排煙で避難経路確保です']},{q:'消防法で定める「特殊消防用設備等」とは何か？',o:['従来の基準によらず、新技術等を活用した消防設備で総務大臣の認定を受けたもの','通常の消防設備','中古の消防設備','外国製の消防設備'],a:0,genre:1,d:3,ex:'特殊消防用設備等は消防法第17条の2の5に基づき、新技術や新材料を活用し従来と同等以上の効果がある設備として認定されたものです。',oex:['正解。新技術活用で総務大臣認定の設備です','不正解。通常の設備とは異なる制度','不正解。中古の意味ではない','不正解。外国製の意味ではない']},{q:'簡易専用水道の定義として正しいものはどれか？',o:['受水槽の有効容量が20m³を超えるもの','受水槽の有効容量が10m³を超えるもの','全ての受水槽が該当する','受水槽の有効容量が5m³を超えるもの'],a:1,genre:2,d:1,ex:'簡易専用水道は水道法第3条第7項で、水道事業の用に供する水道から供給を受ける水のみを水源とし、受水槽の有効容量が10m³を超えるものと定義されています。',oex:['不正解。20m³は正しい基準ではありません','正解。有効容量10m³超が簡易専用水道の定義です','不正解。10m³以下は簡易専用水道に該当しません','不正解。5m³超は小規模貯水槽水道の条例基準です']},{q:'簡易専用水道の管理基準として水道法で定められている清掃頻度はどれか？',o:['3ヶ月に1回','1年以内ごとに1回','2年に1回','6ヶ月に1回'],a:1,genre:2,d:1,ex:'水道法施行規則第55条により、簡易専用水道の設置者は1年以内ごとに1回、定期的に貯水槽の清掃を行わなければなりません。',oex:['不正解。3ヶ月周期の法的義務はありません','正解。1年以内ごとに1回の清掃が義務です','不正解。2年に1回では法定基準を満たしません','不正解。6ヶ月周期ではありません']},{q:'簡易専用水道の検査を行う機関はどれか？',o:['保健所','水道事業者','厚生労働大臣の登録を受けた検査機関','設置者自身'],a:2,genre:2,d:1,ex:'簡易専用水道の管理状況の検査は、厚生労働大臣（現在は国土交通大臣）の登録を受けた検査機関が行います。',oex:['不正解。保健所は指導・監督の立場です','不正解。水道事業者は水の供給者です','正解。登録検査機関が検査を実施します','不正解。設置者自身の検査では要件を満たしません']},{q:'簡易専用水道の検査頻度として正しいものはどれか？',o:['3ヶ月に1回','6ヶ月に1回','1年以内ごとに1回','3年に1回'],a:2,genre:2,d:1,ex:'水道法第34条の2により、1年以内ごとに1回、登録検査機関の検査を受けなければなりません。',oex:['不正解。3ヶ月周期の検査義務はありません','不正解。6ヶ月周期ではありません','正解。年1回の検査が義務です','不正解。3年に1回では不足です']},{q:'貯水槽の消毒に使用する薬品として正しいものはどれか？',o:['エタノール','過酸化水素水','クエン酸','次亜塩素酸ナトリウム'],a:3,genre:2,d:1,ex:'貯水槽の消毒には次亜塩素酸ナトリウム溶液を使用します。有効塩素濃度50～100mg/Lの溶液で槽内面を消毒します。',oex:['不正解。エタノールは貯水槽消毒に適しません','不正解。過酸化水素水は貯水槽消毒に使用しません','不正解。クエン酸は消毒効果がありません','正解。次亜塩素酸ナトリウムが標準的な消毒剤です']},{q:'貯水槽清掃後の消毒で必要な有効塩素濃度はどれか？',o:['10～20mg/L','200～300mg/L','50～100mg/L','1～5mg/L'],a:2,genre:2,d:2,ex:'清掃後の消毒は有効塩素濃度50～100mg/Lの次亜塩素酸ナトリウム溶液で槽内面を消毒し、30分以上接触させます。',oex:['不正解。10～20mg/Lでは消毒効果が不十分です','不正解。200～300mg/Lは過剰な濃度です','正解。50～100mg/Lで30分以上接触させます','不正解。1～5mg/Lは消毒効果が不十分です']},{q:'水道水の遊離残留塩素の基準値はどれか？',o:['0.01mg/L以上','10mg/L以上','1.0mg/L以上','0.1mg/L以上'],a:3,genre:2,d:1,ex:'水道法施行規則第17条により、給水栓における遊離残留塩素は0.1mg/L以上保持することが義務付けられています。',oex:['不正解。0.01mg/Lは基準未満です','不正解。10mg/Lは過剰な値です','不正解。1.0mg/Lは基準の10倍です','正解。遊離残留塩素0.1mg/L以上が基準です']},{q:'受水槽の材質として現在最も一般的なものはどれか？',o:['コンクリート製','FRP（繊維強化プラスチック）製','木製','銅製'],a:1,genre:2,d:1,ex:'FRP製パネル型受水槽は軽量で耐食性に優れ、現場組立が容易なため最も広く使用されています。',oex:['不正解。コンクリート製は旧式で現在は少ない','正解。FRP製が最も一般的に使用されています','不正解。木製は衛生面で不適切です','不正解。銅製の受水槽は一般的ではありません'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の点検口（マンホール）の最小内径はどれか？',o:['30cm以上','45cm以上','60cm以上','90cm以上'],a:2,genre:4,d:2,ex:'受水槽のマンホールは人が出入りして清掃・点検できるよう、内径60cm以上が必要です。',oex:['不正解。30cmでは人が入れません','不正解。45cmでは狭すぎます','正解。マンホール内径は60cm以上が必要です','不正解。90cmは必要以上の大きさです'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽のオーバーフロー管の先端に設けるものはどれか？',o:['ポンプ','蓋','弁（バルブ）','防虫網（ストレーナー）'],a:3,genre:2,d:1,ex:'オーバーフロー管の先端には虫やネズミ等の異物侵入を防ぐため、防虫網を設置します。',oex:['不正解。ポンプは不要です','不正解。蓋で塞ぐと排水できなくなります','不正解。弁を設けると排水機能が損なわれます','正解。防虫網で異物侵入を防ぎます'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の6面点検とは何か？',o:['6項目の点検を行うこと','6方向から外観を確認すること','上下左右前後の6面全てに点検空間を確保すること','6ヶ月ごとに点検すること'],a:2,genre:4,d:2,ex:'6面点検とは受水槽の上下左右前後の6面全てに60cm以上（上部は100cm以上）の保守点検空間を確保し、全面から点検可能にすることです。',oex:['不正解。点検項目数のことではありません','不正解。外観確認だけではありません','正解。6面全てに点検空間を確保することです','不正解。点検周期のことではありません'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽清掃作業時の安全対策として最も重要なものはどれか？',o:['清掃道具の色を統一すること','作業速度を上げること','槽内の換気と酸素濃度の確認','作業人数を1名にすること'],a:2,genre:2,d:1,ex:'貯水槽内は密閉空間であり、酸素欠乏の危険があります。換気を十分に行い、酸素濃度18%以上を確認してから入槽する必要があります。',oex:['不正解。道具の色は安全と無関係です','不正解。速度より安全が優先です','正解。換気と酸素濃度確認が最重要です','不正解。2名以上での作業が原則です']},{q:'酸素欠乏症等防止規則で定める酸素濃度の基準はどれか？',o:['18%以上','25%以上','21%以上','15%以上'],a:0,genre:2,d:2,ex:'酸素欠乏症等防止規則では、酸素濃度18%以上を確保する必要があります。18%未満は酸素欠乏状態です。',oex:['正解。酸素濃度18%以上が基準です','不正解。25%は通常到達しない値です','不正解。21%は大気中の標準濃度です','不正解。15%は酸素欠乏状態で危険です']},{q:'貯水槽清掃の一般的な手順として正しい順序はどれか？',o:['消毒→排水→洗浄→水張り','排水→洗浄→消毒→水張り→水質検査','水張り→排水→消毒→洗浄','洗浄→水張り→排水→消毒'],a:1,genre:2,d:1,ex:'標準的な手順は、①排水②高圧洗浄等による槽内清掃③次亜塩素酸ナトリウムによる消毒④水張り⑤水質検査の順です。',oex:['不正解。消毒は洗浄後に行います','正解。排水→洗浄→消毒→水張り→水質検査の順です','不正解。水張りから始めるのは誤りです','不正解。洗浄から始めるのは誤りです']},{q:'建築物衛生法（ビル管理法）の対象となる特定建築物の延べ面積基準はどれか？',o:['1,000m²以上','10,000m²以上','5,000m²以上','3,000m²以上'],a:3,genre:2,d:2,ex:'建築物における衛生的環境の確保に関する法律では、延べ面積3,000m²以上（学校は8,000m²以上）の特定建築物が対象です。',oex:['不正解。1,000m²は基準未満です','不正解。10,000m²は基準を超えています','不正解。5,000m²は正しい基準ではありません','正解。3,000m²以上が特定建築物の基準です']},{q:'貯水槽の水質検査で確認すべき項目として含まれないものはどれか？',o:['残留塩素','濁度・色度','一般細菌・大腸菌','放射性物質'],a:3,genre:2,d:2,ex:'貯水槽清掃後の水質検査では残留塩素、色度、濁度、臭気、味、一般細菌、大腸菌等を確認します。放射性物質は通常の検査項目ではありません。',oex:['不正解。残留塩素は必須の検査項目です','不正解。濁度・色度は検査項目に含まれます','不正解。細菌検査は重要な項目です','正解。放射性物質は通常の検査項目ではありません']},{q:'FRP製受水槽の劣化の主な原因はどれか？',o:['凍結による割れ','紫外線による樹脂の劣化','酸性雨による腐食','水圧による変形'],a:1,genre:2,d:2,ex:'FRP製受水槽は紫外線により樹脂が劣化し、表面のガラス繊維が露出する「毛羽立ち」が発生します。防藻塗装等の対策が必要です。',oex:['不正解。凍結は主な劣化原因ではありません','正解。紫外線による樹脂劣化が主な原因です','不正解。FRPは耐食性に優れています','不正解。通常の水圧で変形しません'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽に藻が発生する主な原因はどれか？',o:['水温が低すぎる','残留塩素が多すぎる','日光（太陽光）が槽内に入る','水圧が高すぎる'],a:2,genre:2,d:1,ex:'藻は日光と栄養分があれば繁殖します。受水槽に光が入らないよう遮光対策が重要です。',oex:['不正解。低温は藻の繁殖を抑制します','不正解。残留塩素は藻を抑制します','正解。日光の侵入が藻の繁殖の主原因です','不正解。水圧は藻と無関係です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'ボールタップの役割として正しいものはどれか？',o:['水位に応じて給水を自動制御する','排水を制御する','水質を浄化する','水圧を調整する'],a:0,genre:2,d:1,ex:'ボールタップは浮き球が水位の上昇に伴い上がって弁を閉じ、水位低下で弁を開く自動給水制御装置です。',oex:['正解。水位に応じて給水を自動制御します','不正解。排水制御ではなく給水制御です','不正解。水質浄化機能はありません','不正解。水圧調整は減圧弁の役割です']},{q:'高置水槽の有効容量の目安として正しいものはどれか？',o:['1日使用水量の1/10','1日使用水量と同量','1日使用水量の2倍','1日使用水量の1/2'],a:0,genre:2,d:2,ex:'高置水槽の有効容量は1日使用水量の約1/10を目安とします。受水槽より小さい容量です。',oex:['正解。1日使用水量の約1/10が目安です','不正解。同量は過大です','不正解。2倍は過大すぎます','不正解。1/2は受水槽の目安です']},{q:'貯水槽の水質で「赤水」が発生する原因はどれか？',o:['藻の繁殖','水温の上昇','消毒剤の過剰投入','鉄管の腐食による錆'],a:3,genre:2,d:1,ex:'赤水は鋼管や鋳鉄管の内面腐食により錆（酸化鉄）が溶出して発生します。',oex:['不正解。藻は緑色の着色の原因です','不正解。水温上昇は直接の原因ではありません','不正解。消毒剤で赤水は発生しません','正解。鉄管の腐食が赤水の原因です']},{q:'レジオネラ属菌の繁殖を防ぐ貯湯温度はどれか？',o:['80℃以上','60℃以上','50℃以上','40℃以上'],a:1,genre:2,d:2,ex:'レジオネラ属菌は20～45℃で活発に繁殖するため、貯湯タンクは60℃以上に保持する必要があります。',oex:['不正解。80℃は必要以上の温度です','正解。60℃以上で繁殖を防止できます','不正解。50℃でも繁殖リスクがあります','不正解。40℃はレジオネラ繁殖温度域です']},{q:'受水槽のマンホール蓋に必要な条件はどれか？',o:['透明であること','密閉できず通気性があること','木製であること','施錠できる防水型であること'],a:3,genre:2,d:1,ex:'マンホール蓋は雨水・汚水・虫等の侵入を防ぐため防水型とし、いたずら防止のため施錠できるものが必要です。',oex:['不正解。透明では藻の繁殖を促進します','不正解。密閉性がないと汚染の原因になります','不正解。木製は衛生面で不適切です','正解。防水型で施錠できることが必要です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽内の水の滞留時間が長くなると起こる問題はどれか？',o:['配管が詰まる','水圧が上がる','残留塩素が低下し細菌繁殖のリスクが高まる','水温が下がる'],a:2,genre:2,d:2,ex:'滞留時間が長くなると残留塩素が消失し、細菌繁殖のリスクが高まります。適切な容量設計と水の回転が重要です。',oex:['不正解。滞留と配管の詰まりは別問題です','不正解。滞留で水圧は変わりません','正解。残留塩素低下で細菌リスクが高まります','不正解。滞留で水温が下がるとは限りません']},{q:'受水槽の通気管の先端に設けるものはどれか？',o:['弁','防虫網','ポンプ','蓋'],a:1,genre:2,d:1,ex:'通気管の先端には虫やネズミ等の異物侵入を防ぐため、防虫網（16メッシュ以上）を設置します。',oex:['不正解。弁で塞ぐと通気機能が損なわれます','正解。防虫網で異物侵入を防ぎます','不正解。ポンプは不要です','不正解。蓋で塞ぐと通気できなくなります'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'水道法で定める水質基準項目の数はどれか？',o:['31項目','21項目','101項目','51項目'],a:3,genre:2,d:3,ex:'水道法に基づく水質基準は51項目が定められています。一般細菌、大腸菌、水銀、鉛等の項目があります。',oex:['不正解。31項目は不足です','不正解。21項目は少なすぎます','不正解。101項目は多すぎます','正解。水質基準は51項目です']},{q:'簡易専用水道の設置者が管理基準に違反した場合の罰則はどれか？',o:['給水停止','罰則はない','100万円以下の罰金','建物の使用禁止'],a:2,genre:2,d:3,ex:'水道法第54条により、簡易専用水道の管理基準に違反した場合は100万円以下の罰金が科されます。',oex:['不正解。給水停止は水道事業者の判断です','不正解。罰則規定があります','正解。100万円以下の罰金が科されます','不正解。使用禁止は直接の罰則ではありません']},{q:'受水槽と高置水槽を備えた給水方式を何というか？',o:['直結直圧方式','直結増圧方式','高置水槽方式','ポンプ直送方式'],a:2,genre:2,d:1,ex:'高置水槽方式は受水槽から揚水ポンプで高置水槽に送水し、重力で各階に給水する方式です。',oex:['不正解。直結直圧は水道本管の圧力で直接給水します','不正解。直結増圧は増圧ポンプで直接給水します','正解。受水槽＋高置水槽の給水方式です','不正解。ポンプ直送は高置水槽を使いません'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽の清掃記録の保存期間として推奨されるものはどれか？',o:['1年間','3年間','5年間','10年間'],a:2,genre:2,d:2,ex:'貯水槽の清掃記録・水質検査記録は5年間保存することが推奨されています。',oex:['不正解。1年間は短すぎます','不正解。3年間では不十分です','正解。5年間の保存が推奨されています','不正解。10年間は長すぎます']},{q:'定水位弁の役割として正しいものはどれか？',o:['水質を浄化する','受水槽の水位を一定に保つ','排水を制御する','水圧を高める'],a:1,genre:2,d:2,ex:'定水位弁はボールタップの信号により大口径の弁を開閉し、受水槽の水位を一定に制御する装置です。大型の受水槽に使用されます。',oex:['不正解。浄化機能はありません','正解。水位を一定に保つ制御装置です','不正解。排水制御ではなく給水制御です','不正解。水圧を高める機能はありません']},{q:'受水槽の電極棒の役割はどれか？',o:['水質を検査する','水位を検知してポンプを制御する','水温を測定する','配管の圧力を測定する'],a:1,genre:4,d:2,ex:'電極棒は水位を電気的に検知し、揚水ポンプの発停や満水・減水の警報を制御するセンサーです。',oex:['不正解。水質検査は別の機器で行います','正解。水位検知でポンプ制御を行います','不正解。水温測定には温度計を使用します','不正解。圧力測定は圧力計で行います'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽の「死水域」とは何か？',o:['消毒された水のこと','水が滞留して入れ替わりにくい部分','排水される水のこと','高温の水がたまる部分'],a:1,genre:2,d:2,ex:'死水域は水槽内で水の流れが悪く滞留しやすい部分です。残留塩素が低下し水質悪化の原因になります。',oex:['不正解。消毒水のことではありません','正解。水が滞留して入れ替わりにくい部分です','不正解。排水のことではありません','不正解。高温水の滞留ではありません']},{q:'ステンレス製受水槽の特徴として正しいものはどれか？',o:['FRPより安価','紫外線に弱い','耐食性・耐久性に優れ長寿命','軽量で施工が容易'],a:2,genre:2,d:2,ex:'ステンレス製受水槽はSUS304やSUS316を使用し、耐食性・耐久性に優れています。FRP製より高価ですが長寿命です。',oex:['不正解。ステンレスはFRPより一般的に高価です','不正解。ステンレスは紫外線の影響を受けにくい','正解。耐食性・耐久性に優れ長寿命です','不正解。ステンレスはFRPより重量があります'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽清掃作業監督者に必要な資格はどれか？',o:['衛生管理者','特に資格は不要','貯水槽清掃作業監督者講習修了者','一級管工事施工管理技士'],a:2,genre:2,d:2,ex:'建築物衛生法に基づき、貯水槽清掃業の登録には貯水槽清掃作業監督者の配置が必要で、厚生労働大臣認定の講習修了者です。',oex:['不正解。衛生管理者とは異なる資格です','不正解。登録業者は監督者が必要です','正解。貯水槽清掃作業監督者講習修了者が必要です','不正解。管工事の資格では不十分です']},{q:'受水槽の水位が異常低下した場合に疑うべき原因はどれか？',o:['水道本管の断水や漏水','水温の上昇','通気管の詰まり','マンホール蓋の開放'],a:0,genre:2,d:1,ex:'水位の異常低下は水道本管の断水、ボールタップの故障、配管の漏水等が考えられます。',oex:['正解。断水や漏水が水位低下の主な原因です','不正解。水温上昇では水位は低下しません','不正解。通気管詰まりは水位低下の直接原因ではない','不正解。マンホール開放は汚染の原因です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽の清掃時に使用する高圧洗浄機の一般的な使用圧力はどれか？',o:['1～3MPa','15～20MPa','5～10MPa','30MPa以上'],a:2,genre:2,d:2,ex:'貯水槽清掃では5～10MPa程度の高圧洗浄機を使用します。FRP製受水槽の場合、圧力が高すぎると内面を傷めるため注意が必要です。',oex:['不正解。1～3MPaでは洗浄力が不足します','不正解。15～20MPaは通常の清掃には過大です','正解。5～10MPa程度が一般的です','不正解。30MPa以上はFRP等を損傷するおそれがあります']},{q:'水道水の一般細菌の基準値はどれか？',o:['1mL中に10個以下','1mL中に100個以下','1mL中に1000個以下','検出されないこと'],a:1,genre:2,d:2,ex:'水道水質基準では、一般細菌は1mLの検水で形成される集落数が100以下であることとされています。',oex:['不正解。10個以下は厳しすぎる基準です','正解。100個/mL以下が基準です','不正解。1000個では基準を超えています','不正解。大腸菌は検出されないことが基準ですが一般細菌は100以下です']},{q:'水道水の大腸菌の基準はどれか？',o:['100個/mL以下','1個/mL以下','検出されないこと','10個/mL以下'],a:2,genre:2,d:1,ex:'水道水質基準では、大腸菌は検出されないこと（不検出）が基準です。',oex:['不正解。大腸菌は不検出が基準です','不正解。1個でも検出されてはいけません','正解。大腸菌は検出されないことが基準です','不正解。少量でも基準違反です']},{q:'受水槽の内面塗装にエポキシ樹脂塗料を使用する目的はどれか？',o:['美観を良くする','防食・防水のため','保温のため','強度を高めるため'],a:1,genre:2,d:2,ex:'コンクリート製受水槽の内面にはエポキシ樹脂塗料等を塗布し、コンクリートからのアルカリ溶出やひび割れからの漏水を防ぎます。',oex:['不正解。美観目的ではありません','正解。防食・防水が主な目的です','不正解。保温目的ではありません','不正解。強度向上ではなく防食です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「吐水口空間」とは何か？',o:['給水管の吐水口と受水槽のオーバーフロー水面との間に確保する空間','通気管の先端空間','排水管の空間','マンホールの開口部'],a:0,genre:2,d:2,ex:'吐水口空間は逆サイホン作用による逆流防止のため、給水管の吐水口と受水槽の越流面との間に確保する垂直距離です。',oex:['正解。給水管吐水口とオーバーフロー面の間の空間です','不正解。通気管の空間ではありません','不正解。排水管の空間ではありません','不正解。マンホールの開口ではありません'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'小規模貯水槽水道（10m³以下）の管理はどの法律で規定されるか？',o:['水道法','各自治体の条例等','建築基準法','消防法'],a:1,genre:2,d:2,ex:'10m³以下の小規模貯水槽水道は水道法の適用外で、各自治体の条例等で管理基準が定められています。',oex:['不正解。水道法は10m³超が対象です','正解。自治体条例等で規定されます','不正解。建築基準法ではありません','不正解。消防法ではありません']},{q:'受水槽の底部に設ける「水抜き管」の目的はどれか？',o:['オーバーフロー用','通気のため','給水のため','清掃時に槽内の水を完全に排出するため'],a:3,genre:2,d:1,ex:'水抜き管は清掃時に受水槽の底部に残った水を完全に排出するための管です。底部の最低部に設置します。',oex:['不正解。オーバーフロー管とは別です','不正解。通気管とは別です','不正解。給水管とは別です','正解。清掃時の完全排水用です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽の遮光対策が必要な理由はどれか？',o:['凍結防止のため','光の侵入による藻類の繁殖を防ぐため','美観のため','水温を下げるため'],a:1,genre:2,d:1,ex:'受水槽に光が入ると藻類が繁殖し水質悪化の原因になります。遮光塗装や遮光カバーで対策します。',oex:['不正解。凍結防止は別の対策です','正解。藻類の繁殖防止が主目的です','不正解。美観ではなく水質保全のため','不正解。遮光は水温低下が主目的ではない']},{q:'受水槽の「満水警報」と「減水警報」はどのような場合に作動するか？',o:['水質が悪化したとき','水圧が異常なとき','水温が異常なとき','水位が上限を超えたとき（満水）・下限を下回ったとき（減水）'],a:3,genre:2,d:1,ex:'満水警報はオーバーフローの危険、減水警報は断水や給水不能の危険を知らせます。電極棒で水位を検知します。',oex:['不正解。水質悪化の検知ではありません','不正解。水圧異常の検知ではありません','不正解。水温異常ではありません','正解。水位の上限超過・下限割れで作動します'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽周囲の「保守点検空間」の基準（上部）はどれか？',o:['60cm以上','150cm以上','100cm以上','30cm以上'],a:2,genre:4,d:2,ex:'受水槽の上部は100cm以上、側面と底部は60cm以上の保守点検空間を確保する必要があります。',oex:['不正解。60cmは側面・底部の基準です','不正解。150cmは基準を超えています','正解。上部は100cm以上が必要です','不正解。30cmは不十分です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'クロスコネクション防止のために受水槽に必要な措置はどれか？',o:['水道水以外の配管と接続しない（飲料水系統の独立）','受水槽を密閉する','ポンプを追加する','配管を太くする'],a:0,genre:2,d:2,ex:'クロスコネクションは飲料水と非飲料水の系統が接続された状態で水質汚染の原因となります。系統の完全分離が必要です。',oex:['正解。飲料水系統の独立が不可欠です','不正解。密閉だけでは防止できません','不正解。ポンプ追加では防止できません','不正解。管径変更では防止できません'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「漏水」を発見する方法として適切なものはどれか？',o:['水位の異常低下・水槽周囲の湿気・水道料金の異常増加等で判断','匂いで判断する','音で判断する','色で判断する'],a:0,genre:2,d:1,ex:'漏水は水位の異常低下、水槽外面や周囲の湿気・水たまり、水道使用量の異常な増加等から発見します。',oex:['正解。水位・湿気・料金等から総合的に判断します','不正解。匂いだけでは判断困難です','不正解。音だけでは判断困難です','不正解。色だけでは判断困難です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'建築物衛生法で定める飲料水の水質検査の実施頻度はどれか？',o:['3ヶ月に1回','2年に1回','1年に1回','6ヶ月に1回（一部項目は1年に1回）'],a:3,genre:2,d:2,ex:'特定建築物では6ヶ月に1回の定期水質検査が必要です。一部の項目（有機化学物質等）は1年に1回です。',oex:['不正解。3ヶ月に1回ではありません','不正解。2年に1回ではありません','不正解。1年に1回は一部項目のみ','正解。6ヶ月に1回が基本です']},{q:'受水槽の「緊急遮断弁」の目的はどれか？',o:['通常の給水制御','水質の浄化','排水の制御','地震時等に受水槽への給水を自動遮断し水の確保と二次災害を防ぐ'],a:3,genre:2,d:2,ex:'緊急遮断弁は地震感知器と連動し、地震時に自動的に給水管を遮断して受水槽の水を確保し配管破損による漏水を防ぎます。',oex:['不正解。通常の給水制御はボールタップ','不正解。浄化機能はありません','不正解。排水制御ではありません','正解。地震時の水確保と二次災害防止です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「防虫網」に使用するメッシュの基準はどれか？',o:['4メッシュ以上','8メッシュ以上','16メッシュ以上','32メッシュ以上'],a:2,genre:2,d:2,ex:'オーバーフロー管や通気管の先端には16メッシュ以上の防虫網を設置します。蚊やハエの侵入を防止します。',oex:['不正解。4メッシュでは目が粗すぎます','不正解。8メッシュでは虫が侵入します','正解。16メッシュ以上が基準です','不正解。32メッシュは細かすぎて詰まりやすい'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽の水温管理で問題となる温度帯はどれか？',o:['0～5℃','10～15℃','20～45℃（レジオネラ等の繁殖適温）','50℃以上'],a:2,genre:2,d:2,ex:'20～45℃はレジオネラ属菌等の微生物が活発に繁殖する温度帯です。受水槽の水温上昇を防ぐ対策が重要です。',oex:['不正解。低温では細菌繁殖は少ない','不正解。10～15℃では繁殖リスクは低い','正解。20～45℃が微生物の繁殖適温帯です','不正解。50℃以上では多くの細菌が死滅']},{q:'受水槽の「水質汚染事故」が発生した場合の最初の対応はどれか？',o:['直ちに給水を停止し、関係者に通知する','清掃業者に連絡する','保健所に報告する','水質検査を依頼する'],a:0,genre:2,d:1,ex:'水質汚染が疑われる場合は直ちに給水を停止し、利用者に飲用しないよう通知した後、原因調査と関係機関への報告を行います。',oex:['正解。給水停止と関係者通知が最初の対応です','不正解。まず給水停止が最優先','不正解。給水停止が先です','不正解。検査の前に給水停止が必要'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の容量が過大な場合の問題はどれか？',o:['水圧が高くなる','水温が下がる','水の滞留時間が長くなり残留塩素が低下する','配管が詰まる'],a:2,genre:2,d:2,ex:'容量が過大だと水の入れ替わりが遅くなり、残留塩素が消失して細菌繁殖のリスクが高まります。適正容量の設計が重要です。',oex:['不正解。水圧は容量と直接関係しない','不正解。水温は容量だけでは決まらない','正解。滞留時間増加で残留塩素が低下します','不正解。容量と配管の詰まりは別問題'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'建築物衛生法に基づく「建築物環境衛生管理技術者」の職務はどれか？',o:['給排水工事の施工','電気設備の管理','消防設備の点検','特定建築物の環境衛生全般の管理・監督'],a:3,genre:2,d:2,ex:'建築物環境衛生管理技術者（ビル管理士）は特定建築物の空気環境、給排水、清掃等の衛生管理全般を監督します。',oex:['不正解。工事の施工は別の資格者が担当','不正解。電気設備は別の資格者が担当','不正解。消防設備は別の資格者が担当','正解。環境衛生全般の管理・監督が職務です']},{q:'受水槽のFRP製パネルの接合部から漏水した場合の補修方法はどれか？',o:['セメントで埋める','交換せず放置する','テープで応急処置する','FRP補修用の樹脂とガラスマットで補修する'],a:3,genre:2,d:2,ex:'FRP製受水槽の漏水補修はFRP補修用のポリエステル樹脂とガラスマット（ガラスクロス）を使用して積層補修を行います。',oex:['不正解。セメントはFRPとの密着性が悪い','不正解。放置は水質汚染の原因','不正解。テープは一時的で根本解決にならない','正解。FRP樹脂とガラスマットで補修します'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の清掃作業で「2名以上」で作業する理由はどれか？',o:['作業速度を上げるため','法律で3名以上と決められているから','槽内作業者の安全確保（監視員の配置）のため','1名では清掃道具が運べないから'],a:2,genre:2,d:1,ex:'貯水槽内は密閉空間で酸素欠乏の危険があるため、槽内作業者と外部監視員の2名以上での作業が原則です。',oex:['不正解。速度ではなく安全のため','不正解。法定人数は2名以上','正解。安全確保のため2名以上が原則です','不正解。安全管理が理由です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「連通管」とは何か？',o:['排水管のこと','複数の受水槽を接続して水位を均等にする管','オーバーフロー管のこと','通気管のこと'],a:1,genre:2,d:2,ex:'連通管は複数の受水槽を接続して水位を均等に保つための管です。大型受水槽が2槽以上に分かれている場合に使用します。',oex:['不正解。排水管ではありません','正解。複数槽の水位を均等にする管です','不正解。オーバーフロー管とは別です','不正解。通気管とは別です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「二槽式」にする目的はどれか？',o:['一方を清掃・修理中でも給水を継続するため','容量を増やすため','法律で義務付けられているため','見た目のため'],a:0,genre:2,d:1,ex:'二槽式は一方を停止して清掃・修理する間も、もう一方から給水を継続できる利点があります。',oex:['正解。清掃中も給水継続が可能です','不正解。容量増加が主目的ではない','不正解。法的義務ではなく推奨事項','不正解。見た目の問題ではない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「揚水ポンプ」の役割はどれか？',o:['受水槽の水を高置水槽や各階に送水する','雨水を排出する','排水を汲み上げる','消火水を送る'],a:0,genre:4,d:1,ex:'揚水ポンプは受水槽から高置水槽へ水を送る、またはポンプ直送方式で各階に直接給水するためのポンプです。',oex:['正解。受水槽から高置水槽等に送水します','不正解。雨水排出は排水ポンプ','不正解。排水用ポンプとは異なる','不正解。消火ポンプとは別'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽周辺で「異臭」がした場合に疑うべき原因はどれか？',o:['周辺の植栽','近隣の工事','気温の変化','受水槽への汚水・雨水の混入や残留塩素の消失'],a:3,genre:2,d:1,ex:'受水槽から異臭がする場合は、マンホール蓋の不良による汚水混入、残留塩素消失による細菌繁殖等が考えられます。',oex:['不正解。植栽は通常原因にならない','不正解。工事は通常原因にならない','不正解。気温変化は直接原因にならない','正解。汚水混入や残留塩素消失が疑われます'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'水道水の「色度」の基準値はどれか？',o:['20度以下','10度以下','1度以下','5度以下'],a:3,genre:2,d:2,ex:'水道水質基準では色度は5度以下、濁度は2度以下と定められています。',oex:['不正解。20度は大幅に超過','不正解。10度は基準を超えている','不正解。1度は基準ではない','正解。色度は5度以下が基準です']},{q:'水道水の「濁度」の基準値はどれか？',o:['2度以下','10度以下','1度以下','5度以下'],a:0,genre:2,d:2,ex:'水道水質基準では濁度は2度以下と定められています。',oex:['正解。濁度は2度以下が基準です','不正解。10度は大幅超過','不正解。1度は基準ではない','不正解。5度は色度の基準']},{q:'受水槽の「防食処理」が必要なのはどのような受水槽か？',o:['全ての受水槽','FRP製','コンクリート製や鋼板製','ステンレス製'],a:2,genre:2,d:2,ex:'コンクリート製はアルカリ溶出、鋼板製は錆の発生があるため、内面の防食処理（エポキシ塗装等）が必要です。',oex:['不正解。全てではなく材質による','不正解。FRPは樹脂製で防食不要','正解。コンクリート・鋼板製に防食が必要です','不正解。ステンレスは耐食性が高い'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「水槽清掃業」の登録先はどこか？',o:['消防署','国土交通省','都道府県知事','水道事業者'],a:2,genre:2,d:2,ex:'建築物衛生法に基づく貯水槽清掃業は都道府県知事への登録が必要です。',oex:['不正解。消防署は別分野','不正解。国交省への登録ではない','正解。都道府県知事への登録が必要です','不正解。水道事業者ではない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の清掃作業で「残水処理」が重要な理由はどれか？',o:['清掃時間を短くするため','ポンプを保護するため','水がもったいないから','排水先の確保と汚水の適切な処理が必要なため'],a:3,genre:2,d:2,ex:'清掃時の排水は汚泥を含むため、公共下水道への排出許可や排水先の確認、汚泥の適正処理が必要です。',oex:['不正解。時間短縮が目的ではない','不正解。ポンプ保護ではない','不正解。節水ではなく適正処理が理由','正解。排水先確保と汚水の適正処理が必要です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽の「水質異常」を発見した場合、最初に行うべきことはどれか？',o:['水質検査を依頼する','直ちに給水を停止し利用者に周知する','清掃を予約する','保健所に連絡する'],a:1,genre:2,d:1,ex:'水質異常時は利用者の健康被害防止のため、まず給水停止と飲用禁止の周知を最優先で行います。',oex:['不正解。検査の前に給水停止が必要','正解。給水停止と利用者周知が最優先です','不正解。清掃予約より給水停止が先','不正解。保健所連絡の前に給水停止']},{q:'受水槽の「水位制御方式」のうち、電極棒式の特徴はどれか？',o:['機械的に動作する','超音波で水位を測る','水の電気伝導性を利用して水位を検知する','光で水位を検知する'],a:2,genre:4,d:2,ex:'電極棒式は水の電気伝導性を利用し、棒の長さに応じた水位を検知してポンプの発停を制御します。',oex:['不正解。機械式はフロートスイッチ','不正解。超音波式は別の方式','正解。水の電気伝導性で水位を検知します','不正解。光式は別の方式'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「フロートスイッチ」の動作原理はどれか？',o:['電気伝導性を利用','浮き球の上下動でスイッチを切り替える','温度を検知する','圧力を検知する'],a:1,genre:4,d:2,ex:'フロートスイッチは浮き球が水位の変動に伴い上下し、内部のスイッチを機械的に切り替えてポンプ制御信号を出します。',oex:['不正解。電気伝導は電極棒式','正解。浮き球の上下でスイッチ切替します','不正解。温度検知ではない','不正解。圧力検知は圧力式水位計'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「給水管」と「配水管」の違いはどれか？',o:['材質の違い','太さの違い','配水管は水道事業者の管、給水管は需要者の管','同じもの'],a:2,genre:2,d:1,ex:'配水管は道路下等にある水道事業者が管理する管、給水管は配水管から分岐して需要者の敷地内に引き込む管です。',oex:['不正解。材質だけの違いではない','不正解。太さだけの違いではない','正解。配水管は事業者、給水管は需要者の管です','不正解。管理者が異なります'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の清掃後に「水張り」を行う際の注意点はどれか？',o:['できるだけ速く水を入れる','消毒液を完全に洗い流してから水張りし、残留塩素を確認する','水張りは半分程度でよい','水張り後すぐに使用開始する'],a:1,genre:2,d:2,ex:'消毒後は消毒液を完全に排出・洗浄してから水張りします。水張り後は残留塩素0.1mg/L以上を確認してから使用開始します。',oex:['不正解。速さより消毒液の完全除去が重要','正解。消毒液除去後に水張りし塩素を確認します','不正解。満水にする必要がある','不正解。水質確認後に使用開始'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「水撃防止器（ウォーターハンマー防止器）」を設ける目的はどれか？',o:['水質を改善する','水温を下げる','弁の急閉時の衝撃圧を吸収し配管や機器を保護する','流量を増やす'],a:2,genre:2,d:2,ex:'水撃防止器はボールタップや弁の急閉時に発生する水撃（ウォーターハンマー）の衝撃圧を吸収する装置です。',oex:['不正解。水質改善ではない','不正解。水温低下ではない','正解。水撃の衝撃圧を吸収して保護します','不正解。流量増加ではない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽の水に「白濁」が生じる原因として考えられるものはどれか？',o:['藻の繁殖','空気の微細な泡（エアレーション）または亜鉛メッキ管の溶出','残留塩素が多い','鉄の溶出'],a:1,genre:2,d:2,ex:'白濁の原因は空気の微細泡（しばらく放置すると消える）や亜鉛メッキ管からの亜鉛溶出等が考えられます。',oex:['不正解。藻は緑色の着色','正解。空気の泡や亜鉛溶出が原因です','不正解。残留塩素で白濁しない','不正解。鉄溶出は赤水の原因']},{q:'受水槽の「有効水量」と「総容量」の違いはどれか？',o:['有効水量は実際に使用可能な水量で、総容量より少ない','有効水量の方が多い','地域により異なる','同じもの'],a:0,genre:2,d:2,ex:'有効水量はオーバーフロー管の下端から最低水位までの使用可能な水量で、死水や上部空間を除くため総容量より少なくなります。',oex:['正解。使用可能な水量で総容量より少ないです','不正解。総容量の方が大きい','不正解。定義は全国共通','不正解。有効水量は総容量より少ない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「保温」が必要な場合はどのようなときか？',o:['夏場のみ','常に必要','凍結のおそれがある寒冷地や外気温が低い場所','水質改善のため'],a:2,genre:2,d:1,ex:'寒冷地や屋外設置の受水槽は冬季の凍結防止のため保温材による保温が必要です。',oex:['不正解。夏場は保温不要','不正解。温暖な地域では不要','正解。凍結防止のため寒冷地等で必要です','不正解。水質改善目的ではない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の点検で「水位の異常な上昇」が見られた場合の原因はどれか？',o:['断水','漏水','ボールタップの閉止不良（弁が閉まらない）','電極棒の断線'],a:2,genre:4,d:2,ex:'水位が異常に上昇する場合はボールタップの閉止不良で給水が止まらない状態が考えられます。オーバーフローの危険があります。',oex:['不正解。断水では水位は下がる','不正解。漏水では水位は下がる','正解。ボールタップの閉止不良が原因です','不正解。断線は減水警報の原因'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「架台（基礎）」に求められる条件はどれか？',o:['十分な強度と耐久性があり、6面点検が可能な高さであること','見た目が良いこと','木製であること','地面に直接置くこと'],a:0,genre:2,d:2,ex:'受水槽の架台は水槽満水時の荷重に耐える強度があり、底面の点検が可能な高さ（60cm以上）が必要です。',oex:['正解。強度・耐久性と点検可能な高さが必要です','不正解。美観ではなく構造が重要','不正解。木製は耐久性が不十分','不正解。地面直置は6面点検不可'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'「クリプトスポリジウム」が貯水槽で問題になる理由はどれか？',o:['金属を腐食させる','配管を詰まらせる','塩素消毒に強い耐性を持つ原虫で下痢症の原因になる','水温を上げる'],a:2,genre:2,d:3,ex:'クリプトスポリジウムは塩素消毒に強い耐性を持つ原虫で、感染すると激しい下痢を引き起こします。紫外線処理や膜ろ過が有効です。',oex:['不正解。金属腐食は別の問題','不正解。配管詰まりではない','正解。塩素耐性の原虫で下痢症を引き起こします','不正解。水温とは無関係']},{q:'受水槽の「耐震対策」として必要なものはどれか？',o:['受水槽の色を変える','アンカーボルト固定・耐震架台・配管の可撓継手','受水槽を屋内に移す','受水槽を小さくする'],a:1,genre:2,d:2,ex:'地震対策としてアンカーボルトによる固定、耐震架台の採用、配管接続部の可撓継手（フレキシブルジョイント）が必要です。',oex:['不正解。色の変更は耐震と無関係','正解。固定・架台・可撓継手が耐震対策です','不正解。屋内移設だけでは不十分','不正解。容量変更は耐震対策ではない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「有効塩素濃度」が低下しやすい条件はどれか？',o:['水温が高く滞留時間が長い','水圧が高い','水温が低い','管径が小さい'],a:0,genre:2,d:2,ex:'残留塩素は水温が高いほど早く消失し、滞留時間が長いほど低下します。夏季は特に注意が必要です。',oex:['正解。高温・長時間滞留で塩素が低下しやすい','不正解。水圧は塩素と無関係','不正解。低温では塩素消失は遅い','不正解。管径は塩素と直接関係しない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「直結増圧方式」に切り替えた場合のメリットはどれか？',o:['受水槽が不要になり維持管理コスト削減・省スペース・水質向上','電気代が増える','水質が悪くなる','水圧が下がる'],a:0,genre:2,d:2,ex:'直結増圧方式は受水槽を経由せず増圧ポンプで直接給水するため、受水槽の維持管理が不要になり水質も向上します。',oex:['正解。受水槽不要で維持管理削減・水質向上です','不正解。ポンプ電気代はあるが管理費は減少','不正解。受水槽なしで水質は向上する','不正解。増圧ポンプで水圧は確保される'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽の「pHの基準値」として水道水質基準で定められているものはどれか？',o:['pH 5.0～7.0','pH 5.8～8.6','pH 7.0～9.0','pH 8.0～10.0'],a:1,genre:2,d:2,ex:'水道水質基準ではpHの基準値は5.8以上8.6以下と定められています。',oex:['不正解。5.0～7.0は酸性寄りすぎ','正解。pH 5.8～8.6が水道水質基準です','不正解。7.0～9.0は正しい範囲ではない','不正解。8.0～10.0はアルカリ性寄りすぎ']},{q:'受水槽の「越流（オーバーフロー）」が発生する主な原因はどれか？',o:['水圧が低い','排水管の詰まり','ボールタップの故障（閉止不良）','電極棒の清掃不足'],a:2,genre:2,d:1,ex:'越流はボールタップの閉止不良（弁が閉まらない）が最も多い原因です。定水位弁の故障も同様です。',oex:['不正解。低水圧では越流しない','不正解。排水管は受水槽の越流と別','正解。ボールタップの閉止不良が主原因です','不正解。電極棒不良は水位制御に影響するが主因でない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽の清掃で使用する「ブラシ・スポンジ」に求められる条件はどれか？',o:['硬いものが良い','自動洗浄機のみ使用','色が統一されていること','衛生的で槽の内面を傷つけないもの'],a:3,genre:2,d:1,ex:'清掃用具は清潔で衛生的なものを使用し、特にFRP製受水槽は表面を傷つけない柔らかい素材のものが必要です。',oex:['不正解。硬すぎると内面を傷つける','不正解。手作業での清掃も一般的','不正解。色の統一は必須ではない','正解。衛生的で内面を傷つけないものが必要です']},{q:'貯水槽の「定期的な水質検査」で最低限確認すべき項目はどれか？',o:['色・濁り・臭気・味・残留塩素','味のみ','pH のみ','水温のみ'],a:0,genre:2,d:1,ex:'日常の水質確認では色、濁り、臭気、味、残留塩素を確認します。定期検査ではさらに一般細菌・大腸菌等も検査します。',oex:['正解。色・濁り・臭気・味・残留塩素を確認します','不正解。味だけでは不十分','不正解。pHだけでは不十分','不正解。水温だけでは不十分']},{q:'受水槽の「水道直結式」と「受水槽式」の使い分けの基準はどれか？',o:['建物の色','水道本管の給水能力と建物の規模・高さ','建物の築年数','管理者の好み'],a:1,genre:2,d:2,ex:'水道本管の圧力で直接給水できる範囲（通常3～4階）を超える場合や、一時に大量の水を使う場合に受水槽式が採用されます。',oex:['不正解。建物の色は無関係','正解。本管の給水能力と建物規模で決まります','不正解。築年数ではない','不正解。好みではなく技術的要件'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「水槽内面のコケ・藻」を除去する方法はどれか？',o:['放置する','ペンキを塗る','高圧洗浄やブラシ洗浄で物理的に除去した後、次亜塩素酸ナトリウムで消毒','砂を入れる'],a:2,genre:2,d:1,ex:'コケ・藻は物理的に除去した後、次亜塩素酸ナトリウムで消毒します。再発防止のため遮光対策も行います。',oex:['不正解。放置は水質悪化','不正解。ペンキは不適切','正解。物理除去＋消毒が正しい方法です','不正解。砂は不適切'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽の管理で「建築物衛生法」が適用される条件はどれか？',o:['工場のみ','特定建築物（延べ面積3000m²以上等）','住宅のみ','全ての建物'],a:1,genre:2,d:2,ex:'建築物衛生法は延べ面積3000m²以上（学校は8000m²以上）の特定建築物に適用されます。',oex:['不正解。工場は通常対象外','正解。特定建築物（3000m²以上等）が対象です','不正解。住宅は通常対象外','不正解。全建物ではなく一定規模以上']},{q:'受水槽の「鳥害対策」として必要なものはどれか？',o:['通気管・オーバーフロー管の防虫網設置とマンホール蓋の施錠','受水槽の色を変える','受水槽を移動する','受水槽の高さを変える'],a:0,genre:2,d:1,ex:'鳥やネズミの侵入防止のため、通気管・オーバーフロー管には防虫網を設置し、マンホール蓋は施錠します。',oex:['正解。防虫網設置とマンホール施錠が必要です','不正解。色の変更は鳥害対策にならない','不正解。移動は通常不可能','不正解。高さ変更では防げない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽清掃の際に「塩素測定」に使用する試薬はどれか？',o:['リトマス試薬','銀イオン試薬','フェノールフタレイン試薬','DPD試薬'],a:3,genre:2,d:2,ex:'残留塩素の測定にはDPD（ジエチルパラフェニレンジアミン）試薬を使用します。遊離残留塩素と反応してピンク色に発色します。',oex:['不正解。リトマスはpH測定用','不正解。銀イオンは塩素測定に使わない','不正解。フェノールフタレインはpH指示薬','正解。DPD試薬で残留塩素を測定します']},{q:'受水槽の「結合残留塩素」と「遊離残留塩素」の違いはどれか？',o:['測定方法の違い','遊離残留塩素は次亜塩素酸等、結合残留塩素はクロラミン類で殺菌力が異なる','同じもの','濃度の違い'],a:1,genre:2,d:3,ex:'遊離残留塩素（次亜塩素酸等）は殺菌力が強く、結合残留塩素（クロラミン類）は殺菌力が弱いです。水道水質基準は遊離残留塩素0.1mg/L以上です。',oex:['不正解。測定法は同じDPD法も可','正解。遊離塩素は殺菌力が強く、結合塩素は弱い','不正解。化学的に異なる物質','不正解。濃度だけの違いではない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「水槽清掃作業従事者」に必要な健康管理はどれか？',o:['赤痢・腸チフス等の保菌者でないことの確認（検便等）','特に不要','聴力検査','視力検査'],a:0,genre:2,d:2,ex:'貯水槽清掃作業者は飲料水に触れるため、赤痢・腸チフス等の消化器系伝染病の保菌者でないことの確認が必要です。',oex:['正解。消化器系伝染病の保菌者でないことを確認します','不正解。飲料水に関わるため健康管理が必要','不正解。聴力検査は主目的でない','不正解。視力検査は主目的でない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「ポンプ直送方式」の特徴はどれか？',o:['高置水槽が必要','手動で給水する方式','水道本管から直接給水','受水槽から加圧ポンプで各階に直接給水する方式で高置水槽が不要'],a:3,genre:4,d:2,ex:'ポンプ直送方式は受水槽の水を加圧ポンプで直接各階に送水する方式で、高置水槽が不要なため省スペースです。',oex:['不正解。高置水槽は不要','不正解。自動制御です','不正解。受水槽を経由する方式','正解。加圧ポンプで直接給水し高置水槽不要です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽の「防錆処理」が必要な部分はどれか？',o:['鋼製受水槽の内外面やボルト・架台等の金属部分','FRP製受水槽の内面','ステンレス製受水槽全体','全ての受水槽'],a:0,genre:2,d:2,ex:'鋼板製受水槽の内外面、ボルト、架台等の金属部分は錆びるため防錆塗装（エポキシ塗装等）が必要です。',oex:['正解。鋼製の金属部分に防錆処理が必要です','不正解。FRPは樹脂製で防錆不要','不正解。ステンレスは耐食性が高い','不正解。材質による']},{q:'受水槽の清掃で「事前の断水告知」が必要な理由はどれか？',o:['清掃中は受水槽の水が使えなくなるため居住者・利用者に周知が必要','電気を使うため','法律で義務のため','騒音が出るため'],a:0,genre:2,d:1,ex:'清掃中は受水槽を空にするため建物への給水が停止します。事前に居住者・利用者に断水の日時と範囲を告知する必要があります。',oex:['正解。断水による影響を事前に周知します','不正解。電気は主な理由ではない','不正解。法律だけでなく実務上も必要','不正解。騒音は主な理由ではない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「SUS304」と「SUS316」の違いはどれか？',o:['色の違い','重さの違い','同じもの','SUS316はモリブデンを含み耐食性がより高い（海岸部等に適する）'],a:3,genre:2,d:3,ex:'SUS316はSUS304にモリブデンを添加したもので、耐海水性・耐薬品性に優れ、海岸部や腐食環境での使用に適しています。',oex:['不正解。色の違いではない','不正解。重さの違いではない','不正解。組成が異なる','正解。SUS316はモリブデン含有で耐食性が高い'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「通気管」と「オーバーフロー管」を兼用してはいけない理由はどれか？',o:['管径が合わない','コストがかかる','見た目が悪い','オーバーフロー時に通気機能が失われ、給水に支障が出るため'],a:3,genre:2,d:2,ex:'兼用するとオーバーフロー時に通気管が水で塞がれ通気機能が失われます。給水ポンプのエア噛みや水位制御不良の原因になります。',oex:['不正解。管径の問題ではない','不正解。コストの問題ではない','不正解。見た目の問題ではない','正解。通気機能の喪失を防ぐため兼用不可です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽の「水質事故」の主な原因として多いものはどれか？',o:['水道本管の水質異常','マンホール蓋の不備による汚水・異物侵入','地震','近隣の工事'],a:1,genre:2,d:2,ex:'貯水槽の水質事故はマンホール蓋の施錠忘れや破損、防虫網の不備等により汚水・雨水・異物が侵入するケースが最も多いです。',oex:['不正解。本管の問題は貯水槽の管理外','正解。マンホール蓋の不備が最多の原因です','不正解。地震は稀な原因','不正解。工事は稀な原因']},{q:'受水槽の「水位制御盤」の役割はどれか？',o:['水質を管理する','水圧を制御する','水温を制御する','電極棒やフロートスイッチの信号を受けてポンプの発停や警報を制御する'],a:3,genre:4,d:2,ex:'水位制御盤は水位センサーの信号に基づき、揚水ポンプの自動発停、満水・減水警報の発報等を制御する装置です。',oex:['不正解。水質管理は別の装置','不正解。水圧制御は減圧弁等','不正解。水温制御ではない','正解。水位信号でポンプ発停・警報を制御します'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽清掃後の「消毒時間」として必要な最低時間はどれか？',o:['5分','10分','30分以上','2時間以上'],a:2,genre:2,d:2,ex:'次亜塩素酸ナトリウム溶液（50～100mg/L）で消毒した後、30分以上の接触時間を確保する必要があります。',oex:['不正解。5分では消毒効果が不十分','不正解。10分では不十分','正解。30分以上の接触時間が必要です','不正解。2時間は目安より長い']},{q:'受水槽の「水道法第34条の2」で定められている義務はどれか？',o:['清掃の実施','登録検査機関による検査の受検','水質検査の実施','全て'],a:3,genre:2,d:2,ex:'水道法第34条の2では簡易専用水道の設置者に①清掃②検査の受検③水質異常時の措置の義務が定められています。',oex:['不正解。清掃は義務の一つ','不正解。検査受検は義務の一つ','不正解。水質検査も管理の一部','正解。清掃・検査・水質管理が全て義務です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「圧力水槽方式」とはどのような給水方式か？',o:['手動ポンプ方式','直結方式','密閉された圧力タンク内の空気圧で加圧して給水する方式','高置水槽を使う方式'],a:2,genre:2,d:3,ex:'圧力水槽方式は密閉タンク内の空気を圧縮して水を加圧し各階に給水する方式で、高置水槽が不要です。',oex:['不正解。手動ではなく自動加圧','不正解。直結方式とは異なる','正解。密閉タンク内の空気圧で加圧給水します','不正解。高置水槽は使わない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽に「虫や小動物」が侵入した場合の対応はどれか？',o:['塩素を追加するだけでよい','直ちに給水停止→排水→清掃・消毒→水張り→水質確認','虫を取り除くだけでよい','そのまま使用する'],a:1,genre:2,d:1,ex:'虫や小動物の侵入は重大な水質事故です。給水停止→完全排水→清掃・消毒→水張り→水質確認の手順で対応します。',oex:['不正解。塩素追加だけでは不十分','正解。給水停止から水質確認まで全手順が必要','不正解。除去だけでは不十分','不正解。使用継続は健康被害の危険'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽の水質で「カビ臭」が発生する原因はどれか？',o:['管径が大きい','水温が低い','水源にカビ臭物質（ジェオスミン・2-MIB）が含まれる','塩素が多すぎる'],a:2,genre:2,d:3,ex:'カビ臭はダム・湖沼の水源で藍藻類が産生するジェオスミンや2-MIBが原因で、浄水処理で除去しきれない場合があります。',oex:['不正解。管径は関係しない','不正解。水温は直接関係しない','正解。水源のカビ臭物質が原因です','不正解。塩素過多ではカビ臭にならない']},{q:'受水槽の「水撃作用」の防止策はどれか？',o:['水温を上げる','管を短くする','ウォーターハンマー防止器の設置やスローリリース弁の採用','管径を小さくする'],a:2,genre:2,d:2,ex:'水撃防止にはウォーターハンマー防止器、エアチャンバー、スローリリース弁（ゆっくり閉じる弁）等を採用します。',oex:['不正解。水温は関係しない','不正解。管の長さだけでは解決しない','正解。防止器やスローリリース弁が有効です','不正解。管径縮小は逆効果になることがある'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「給水管」に逆止弁を設ける目的はどれか？',o:['流量を増やす','水温を調整する','受水槽の水が水道本管に逆流するのを防ぐ','管を保護する'],a:2,genre:2,d:1,ex:'逆止弁は受水槽の水が水道本管側に逆流する（逆サイホン作用等）のを防ぐために設置します。',oex:['不正解。流量増加ではない','不正解。水温調整ではない','正解。逆流防止が目的です','不正解。管保護ではない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽の「鉄バクテリア」による問題はどれか？',o:['管を強くする','鉄分を酸化して赤褐色の沈殿物を生成し、赤水や管の閉塞を引き起こす','水温を下げる','塩素を増加させる'],a:1,genre:2,d:3,ex:'鉄バクテリアは鉄分を酸化して赤褐色のスライムを生成し、赤水・異臭・管の閉塞の原因になります。',oex:['不正解。管を弱くする','正解。赤褐色の沈殿物 kipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'貯水槽清掃業の「登録基準」に含まれる設備要件はどれか？',o:['高圧洗浄機・消毒用機器・残留塩素測定器等の必要機材','特になし','コンピュータ','大型トラック'],a:0,genre:2,d:2,ex:'貯水槽清掃業の登録には高圧洗浄機、消毒用噴霧器、残留塩素測定器、吸水ポンプ等の機材が必要です。',oex:['正解。必要機材の保有が登録基準です','不正解。設備要件がある','不正解。コンピュータは登録基準でない','不正解。大型トラックは必須でない']},{q:'受水槽の「スケール（水垢）」が付着する原因はどれか？',o:['水中のカルシウム・マグネシウム等のミネラル分が析出するため','管が新しい','水温が低い','管径が大きい'],a:0,genre:2,d:2,ex:'硬水に含まれるカルシウムやマグネシウムが受水槽の壁面や配管内面に析出し、白色のスケール（水垢）を形成します。',oex:['正解。ミネラル分の析出がスケールの原因です','不正解。管の新しさとは無関係','不正解。低温はスケールを促進しない','不正解。管径は直接の原因でない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「水位計」の種類はどれか？',o:['温度計','pH計','流量計','電極式・フロート式・圧力式・超音波式等'],a:3,genre:2,d:2,ex:'水位計には電極式（電極棒）、フロート式（フロートスイッチ）、圧力式、超音波式等の種類があります。',oex:['不正解。温度計は水位計でない','不正解。pH計は水質測定器','不正解。流量計は水位計でない','正解。電極式・フロート式等の種類があります'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「簡易専用水道」の管理で怠った場合に保健所が行える措置はどれか？',o:['特になし','罰金の直接徴収','建物の解体命令','改善指導・改善命令・給水停止命令'],a:3,genre:2,d:2,ex:'簡易専用水道の管理が不適切な場合、保健所は改善指導や改善命令を行い、是正されない場合は給水停止を命じることができます。',oex:['不正解。措置が行える','不正解。罰金は裁判所が科す','不正解。解体命令は過大','正解。改善指導から給水停止命令まで段階的に'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「送水管」と「配水管」の違いはどれか？',o:['同じもの','送水管は浄水場から配水池への管、配水管は配水池から需要者への管','材質の違い','太さの違い'],a:1,genre:2,d:3,ex:'送水管は浄水場→配水池の水を送る管、配水管は配水池から各家庭・建物に水を配る管です。用語の区別が重要です。',oex:['不正解。用途が異なる','正解。送水は浄水場→配水池、配水は配水池→需要者','不正解。材質だけの違いでない','不正解。太さの違いだけでない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「ステンレス製」受水槽の溶接部の注意点はどれか？',o:['塗装で対応','特になし','溶接は不要','溶接部の酸化スケールを除去（酸洗い）しないと耐食性が低下する'],a:3,genre:2,d:3,ex:'ステンレスの溶接部は熱により酸化スケールが生じ、不動態皮膜が破壊されます。酸洗いで除去しないと腐食の原因になります。',oex:['不正解。塗装では不十分','不正解。溶接部は注意が必要','不正解。パネル型以外は溶接がある','正解。酸洗いで酸化スケールを除去します'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「水道法第20条」に基づく水質検査の実施者はどれか？',o:['設備業者','消防署','地方公共団体の機関または厚生労働大臣の登録を受けた検査機関','建物管理者'],a:2,genre:2,d:2,ex:'水道法第20条の水質検査は地方公共団体の機関または厚生労働大臣登録の水質検査機関が実施します。',oex:['不正解。設備業者は検査機関でない','不正解。消防署は消防関係','正解。登録検査機関が実施します','不正解。管理者自身では実施不可'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「サクションカバー」の目的はどれか？',o:['水温を下げる','揚水ポンプの吸込口に渦巻きが生じるのを防ぎエア噛みを防止する','水質を改善する','管を保護する'],a:1,genre:2,d:3,ex:'サクションカバーはポンプ吸込口付近に渦が発生するのを防ぎ、空気を吸い込んでポンプの揚水不良が起きるのを防止します。',oex:['不正解。水温低下ではない','正解。渦巻き防止でエア噛みを防ぎます','不正解。水質改善ではない','不正解。管保護ではない'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「清掃作業の写真記録」で撮影すべき場面はどれか？',o:['清掃前・清掃中・清掃後・消毒中・水張り後の各段階','天気の写真','作業者の顔写真','建物の外観のみ'],a:0,genre:2,d:1,ex:'清掃作業の写真記録は清掃前の状態、清掃中、清掃後の状態、消毒中、水張り後等の各段階を撮影し報告書に添付します。',oex:['正解。各段階の写真記録が必要です','不正解。天気は主要記録でない','不正解。顔写真は主目的でない','不正解。外観のみでは不十分'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「満水時の重量」が架台設計で重要な理由はどれか？',o:['見た目のため','水質に影響するため','管の材質に影響するため','受水槽は満水時に非常に重くなるため架台は十分な強度が必要'],a:3,genre:2,d:1,ex:'水は1m³あたり1トンの重量があり、10m³の受水槽は満水時に10トン＋水槽自重の荷重がかかるため架台の強度計算が重要です。',oex:['不正解。見た目ではなく安全性','不正解。水質とは別問題','不正解。管材質とは別問題','正解。満水時の荷重に耐える架台が必要です'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「集合住宅での清掃」の際の居住者対応はどれか？',o:['断水の事前告知・清掃日時の案内・清掃後の通水報告','特に不要','連絡は清掃後のみ','管理会社だけに連絡'],a:0,genre:2,d:1,ex:'集合住宅では居住者全員に断水の事前告知（日時・範囲）を行い、清掃後は通水確認後に使用可能を告知します。',oex:['正解。事前告知・日時案内・通水報告が必要です','不正解。居住者対応は必須','不正解。事前の告知が必要','不正解。居住者全員への連絡が必要'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'受水槽の「パネル型水槽」のメリットはどれか？',o:['小さい','軽い','現場でパネルを組み立てるため搬入が
