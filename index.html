<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>建築設備 知識クイズ Pro</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&family=Inter:wght@300;400;500;600;700;800;900&family=Oswald:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #232633;
    --border: #2d3148;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --accent-glow: rgba(108,92,231,0.3);
    --text: #e8e8ef;
    --text-muted: #8b8fa3;
    --correct: #00b894;
    --correct-bg: rgba(0,184,148,0.15);
    --wrong: #ff6b6b;
    --wrong-bg: rgba(255,107,107,0.15);
    --gold: #ffd32a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', 'Inter', 'Hiragino Kaku Gothic ProN', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(108,92,231,0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(162,155,254,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(0,184,148,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: conic-gradient(from 0deg at 50% 50%, transparent 0deg, rgba(108,92,231,0.02) 60deg, transparent 120deg, rgba(0,184,148,0.02) 180deg, transparent 240deg, rgba(255,211,42,0.01) 300deg, transparent 360deg);
    animation: bgRotate 60s linear infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes bgRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .container { width: 100%; max-width: 780px; position: relative; z-index: 1; animation: fadeInUp 0.6s ease-out; }
  @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

  .header { text-align: center; padding: 32px 0 24px; }
  .header-label { font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 6px; color: var(--accent2); text-transform: uppercase; margin-bottom: 10px; font-weight: 600; opacity: 0.8; }
  .header h1 { font-weight: 900; font-size: 32px; color: var(--text); line-height: 1.2; background: linear-gradient(135deg, var(--accent2), var(--accent), var(--correct)); background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: headerGlow 5s ease-in-out infinite; }
  @keyframes headerGlow { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
  .header h1 span { -webkit-text-fill-color: var(--accent2); }
  .header::after { content: ''; display: block; width: 60px; height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent2)); margin: 16px auto 0; border-radius: 2px; }

  #startScreen { text-align: center; padding: 30px 0; }

  .start-card { background: linear-gradient(135deg, rgba(26,29,39,0.95), rgba(35,38,51,0.9)); border: 1px solid rgba(108,92,231,0.2); border-radius: 20px; padding: 36px; margin-bottom: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(108,92,231,0.15), inset 0 1px 0 rgba(255,255,255,0.05); backdrop-filter: blur(20px); transition: transform 0.3s ease, box-shadow 0.3s ease; }
  .start-card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.35), 0 0 0 1px rgba(108,92,231,0.25), inset 0 1px 0 rgba(255,255,255,0.05); }
  .start-card h2 { font-size: 20px; font-weight: 700; margin-bottom: 16px; color: var(--accent); }
  .start-card p { color: var(--text-muted); font-size: 14px; line-height: 1.8; margin-bottom: 8px; }

  .genre-selector { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin: 12px 0 20px; }
  .genre-btn { background: linear-gradient(145deg, var(--surface2), rgba(35,38,51,0.8)); border: 2px solid var(--border); color: var(--text-muted); padding: 12px 14px; border-radius: 14px; cursor: pointer; font-size: 13px; font-weight: 700; font-family: inherit; transition: all 0.35s cubic-bezier(0.4,0,0.2,1); flex: 1; min-width: 90px; text-align: center; line-height: 1.4; position: relative; overflow: hidden; }
  .genre-btn::before { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(108,92,231,0.1), rgba(0,184,148,0.05)); opacity: 0; transition: opacity 0.3s; border-radius: 12px; }
  .genre-btn:hover::before { opacity: 1; }
  .genre-btn:hover { border-color: var(--accent); color: var(--accent2); box-shadow: 0 0 16px var(--accent-glow); }
  .genre-btn.selected { border-color: var(--accent); color: #fff; background: linear-gradient(135deg, var(--accent), #8b5cf6); box-shadow: 0 4px 16px var(--accent-glow); }
  .genre-btn .genre-icon { display: block; font-size: 22px; margin-bottom: 4px; }
  .genre-btn .genre-count { display: block; font-size: 10px; font-weight: 400; opacity: 0.8; margin-top: 2px; }

  .count-selector { display: flex; gap: 10px; justify-content: center; margin: 16px 0 24px; flex-wrap: wrap; }
  .count-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 14px; font-family: inherit; transition: all 0.2s; }
  .count-btn:hover, .count-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(230,126,0,0.08); }

  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-weight: 700; font-size: 17px; padding: 18px 52px; border: none; border-radius: 14px; cursor: pointer; font-family: inherit; transition: all 0.3s cubic-bezier(0.4,0,0.2,1); letter-spacing: 2px; box-shadow: 0 4px 20px var(--accent-glow); position: relative; overflow: hidden; text-transform: uppercase; }
  .btn-primary::before { content: ''; position: absolute; inset: -2px; background: linear-gradient(135deg, var(--accent), var(--accent2), var(--correct), var(--accent)); background-size: 300% 300%; border-radius: 14px; z-index: -1; animation: btnGlow 4s ease infinite; }
  @keyframes btnGlow { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
  .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 32px var(--accent-glow), 0 0 0 2px var(--accent); }
  .btn-secondary { background: var(--surface2); color: var(--text-muted); font-size: 14px; padding: 12px 24px; border: 1px solid var(--border); border-radius: 10px; cursor: pointer; font-family: inherit; transition: all 0.3s; margin-top: 12px; }
  .btn-secondary:hover { border-color: var(--accent); color: var(--accent2); background: rgba(108,92,231,0.08); }

  #quizScreen { display: none; }

  .progress-bar-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; margin-bottom: 16px; display: flex; align-items: center; gap: 14px; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .progress-info { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
  .progress-info strong { color: var(--accent); font-size: 18px; }
  .bar-bg { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2), var(--correct)); background-size: 200% 100%; border-radius: 4px; transition: width 0.5s cubic-bezier(0.4,0,0.2,1); box-shadow: 0 0 12px var(--accent-glow); animation: barPulse 2s ease-in-out infinite; }
  @keyframes barPulse { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
  .score-display { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
  .score-display strong { color: var(--correct); }

  .genre-badge { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 700; white-space: nowrap; }
  .genre-0 { background: rgba(30,120,190,0.1); color: #1a6fb5; border: 1px solid rgba(30,120,190,0.3); }
  .genre-1 { background: rgba(220,60,60,0.1); color: #c03030; border: 1px solid rgba(220,60,60,0.3); }
  .genre-2 { background: rgba(40,160,80,0.1); color: #28803c; border: 1px solid rgba(40,160,80,0.3); }
  .genre-3 { background: rgba(160,60,160,0.1); color: #9c3c9c; border: 1px solid rgba(160,60,160,0.3); }
  .genre-4 { background: rgba(200,150,30,0.1); color: #9a7a10; border: 1px solid rgba(200,150,30,0.3); }
  .genre-5 { background: rgba(70,130,180,0.1); color: #3a7ab5; border: 1px solid rgba(70,130,180,0.3); }
  .genre-6 { background: rgba(139,90,43,0.1); color: #8b5a2b; border: 1px solid rgba(139,90,43,0.3); }
  .genre-7 { background: rgba(100,60,150,0.1); color: #6a3ca0; border: 1px solid rgba(100,60,150,0.3); }
  .genre-8 { background: rgba(180,100,30,0.1); color: #b46420; border: 1px solid rgba(180,100,30,0.3); }
  .genre-9 { background: rgba(0,100,180,0.1); color: #0064b4; border: 1px solid rgba(0,100,180,0.3); }
  .genre-10 { background: rgba(0,128,128,0.1); color: #008080; border: 1px solid rgba(0,128,128,0.3); }
  .genre-11 { background: rgba(220,120,20,0.1); color: #d07814; border: 1px solid rgba(220,120,20,0.3); }

  .question-card { background: linear-gradient(135deg, rgba(26,29,39,0.98), rgba(35,38,51,0.95)); border: 1px solid rgba(45,49,72,0.8); border-radius: 20px; padding: 28px; margin-bottom: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.03); position: relative; }
  .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .q-difficulty { font-size: 11px; color: var(--text-muted); margin-left: auto; }

  .question-image { margin-bottom: 14px; text-align: center; display: none; }
  .question-image img { max-width: 100%; max-height: 260px; border-radius: 8px; border: 1px solid var(--border); object-fit: contain; background: #f9f9f9; }
  .question-image.show { display: block; }

  .question-text { font-size: 19px; font-weight: 700; line-height: 1.7; color: var(--text); }

  .result-badge { display: none; font-size: 20px; font-weight: 900; padding: 10px 20px; border-radius: 8px; text-align: center; margin-top: 16px; letter-spacing: 2px; }
  .result-badge.show { display: block; }
  .result-badge.correct { background: var(--correct-bg); color: var(--correct); border: 2px solid var(--correct); }
  .result-badge.wrong { background: var(--wrong-bg); color: var(--wrong); border: 2px solid var(--wrong); }

  .hint-area { margin-top: 12px; }
  .hint-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--accent); padding: 8px 18px; border-radius: 8px; cursor: pointer; font-size: 13px; font-family: inherit; transition: all 0.2s; }
  .hint-btn:hover { background: rgba(230,126,0,0.08); border-color: var(--accent); }
  .hint-btn:disabled { cursor: default; opacity: 0.5; }
  .hint-text { background: #fff8ed; border: 1px solid #f0d9a8; border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 10px 14px; font-size: 13px; line-height: 1.7; color: #7a5c00; margin-top: 8px; display: none; }
  .hint-text.show { display: block; }

  .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .option-btn { background: linear-gradient(135deg, var(--surface2), rgba(35,38,51,0.9)); border: 1px solid var(--border); color: var(--text); padding: 16px 20px; border-radius: 14px; cursor: pointer; font-size: 16px; font-family: inherit; text-align: left; transition: all 0.3s cubic-bezier(0.4,0,0.2,1); display: flex; align-items: center; gap: 14px; line-height: 1.5; position: relative; overflow: hidden; }
  .option-btn::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(108,92,231,0.08), transparent); opacity: 0; transition: opacity 0.3s; }
  .option-btn:hover:not(:disabled)::after { opacity: 1; }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: rgba(108,92,231,0.1); box-shadow: 0 2px 12px var(--accent-glow); transform: translateX(4px); }
  .option-label { width: 28px; height: 28px; min-width: 28px; border-radius: 50%; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; font-family: 'Oswald', sans-serif; }
  .option-btn.correct { border-color: var(--correct); background: var(--correct-bg); color: #1a7f37; }
  .option-btn.correct .option-label { background: var(--correct); border-color: var(--correct); color: #fff; }
  .option-btn.wrong { border-color: var(--wrong); background: var(--wrong-bg); color: #cf222e; }
  .option-btn.wrong .option-label { background: var(--wrong); border-color: var(--wrong); color: #fff; }
  .option-btn:disabled { cursor: default; }

  .option-explanation { font-size: 13px; line-height: 1.6; padding: 4px 12px 8px 58px; display: none; }
  .option-explanation.show { display: block; }
  .option-explanation.correct-exp { color: var(--correct); }
  .option-explanation.wrong-exp { color: #8b6914; }

  .explanation { background: var(--surface2); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 0 8px 8px 0; padding: 14px 18px; font-size: 15px; line-height: 1.8; color: var(--text-muted); margin-bottom: 14px; display: none; }
  .explanation.show { display: block; }
  .explanation strong { color: var(--text); }

  .nav-btn { width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; font-weight: 700; font-size: 15px; padding: 16px; border: none; border-radius: 12px; cursor: pointer; font-family: inherit; transition: all 0.3s; display: none; box-shadow: 0 4px 16px var(--accent-glow); }
  .nav-btn.show { display: block; }
  .nav-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--accent-glow); }

  .quiz-sub-actions { display: flex; gap: 8px; margin-top: 10px; margin-bottom: 30px; }
  .quiz-sub-btn { flex: 1; background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); font-size: 13px; padding: 10px; border-radius: 8px; cursor: pointer; font-family: inherit; transition: all 0.2s; }
  .quiz-sub-btn:hover { border-color: var(--accent); color: var(--accent); }

  #resultScreen { display: none; text-align: center; padding: 30px 0; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 36px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .result-score { font-size: 80px; font-weight: 900; background: linear-gradient(135deg, var(--accent2), var(--gold), var(--correct)); background-size: 200% 200%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; margin: 14px 0 6px; font-family: 'Inter', sans-serif; animation: scoreGlow 3s ease-in-out infinite; }
  @keyframes scoreGlow { 0%,100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
  .result-total { font-size: 16px; color: var(--text-muted); margin-bottom: 20px; }
  .result-rank { font-size: 22px; font-weight: 700; margin-bottom: 20px; }
  .result-breakdown { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin: 20px 0; }
  .breakdown-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 8px; font-size: 12px; color: var(--text-muted); }
  .breakdown-item .val { font-size: 20px; font-weight: 700; color: var(--text); display: block; margin-bottom: 4px; font-family: 'Oswald', sans-serif; }

  /* 用語辞典 */
  #glossaryScreen { display: none; padding: 20px 0; }
  .glossary-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .glossary-header h2 { font-size: 20px; font-weight: 700; color: var(--accent); }
  .glossary-back { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 13px; }
  .glossary-back:hover { border-color: var(--accent); color: var(--accent); }
  .glossary-search { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 8px; font-size: 15px; font-family: inherit; margin-bottom: 12px; background: var(--surface); color: var(--text); }
  .glossary-search:focus { outline: none; border-color: var(--accent); }
  .glossary-cats { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .glossary-cat-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; font-family: inherit; transition: all 0.2s; }
  .glossary-cat-btn:hover, .glossary-cat-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(230,126,0,0.08); }
  .glossary-list { display: flex; flex-direction: column; gap: 8px; }
  .glossary-item { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .glossary-item-header { padding: 14px 18px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-weight: 700; font-size: 15px; color: var(--text); transition: background 0.15s; }
  .glossary-item-header:hover { background: var(--surface2); }
  .glossary-item-header .arrow { color: var(--text-muted); font-size: 12px; transition: transform 0.2s; }
  .glossary-item-header .arrow.open { transform: rotate(90deg); }
  .glossary-item-body { display: none; padding: 0 18px 16px; font-size: 14px; line-height: 1.8; color: var(--text-muted); border-top: 1px solid var(--border); }
  .glossary-item-body.show { display: block; padding-top: 12px; }
  .glossary-item-img { max-width: 200px; max-height: 150px; border-radius: 6px; border: 1px solid var(--border); margin-top: 8px; object-fit: contain; background: #f9f9f9; display: block; }
  .glossary-item-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
  .glossary-empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }

  @media (max-width: 600px) {
    body { padding: 10px; padding-bottom: 40px; }
    .header h1 { font-size: 22px; }
    .question-text { font-size: 17px; }
    .option-btn { font-size: 15px; padding: 12px 14px; }
    .option-explanation { padding-left: 42px; }
    .result-breakdown { grid-template-columns: 1fr 1fr; }
    .question-card { padding: 18px; }
    .start-card { padding: 20px; }
    .result-badge { font-size: 18px; }
    .genre-btn { min-width: 70px; font-size: 11px; padding: 8px 6px; }
    .genre-btn .genre-icon { font-size: 18px; }
    .nav-btn { margin-bottom: 8px; }
    .quiz-sub-actions { margin-bottom: 40px; }
  }

  /* Enhanced scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* Selection color */
  ::selection { background: rgba(108,92,231,0.3); color: var(--text); }

  /* Focus styles for accessibility */
  *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* Smooth transitions for all interactive elements */
  button, input { transition: all 0.2s ease; }

  /* Loading state */
  .loading { position: relative; pointer-events: none; }
  .loading::after { content: ''; position: absolute; inset: 0; background: rgba(15,17,23,0.5); border-radius: inherit; display: flex; align-items: center; justify-content: center; }

  /* Badge pulse for correct answer */
  .result-badge.correct { animation: correctPulse 0.5s ease-out; }
  @keyframes correctPulse { 0% { transform: scale(0.8); opacity: 0; } 50% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
  .result-badge.wrong { animation: wrongShake 0.5s ease-out; }
  @keyframes wrongShake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-4px); } 40%,80% { transform: translateX(4px); } }

  /* Footer branding */
  .app-footer { text-align: center; padding: 24px 0 12px; font-size: 11px; color: var(--text-muted); opacity: 0.5; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-label">Professional Training System</div>
    <h1>建築設備 知識クイズ Pro</h1>
  </div>

  <div id="startScreen">
    <div class="start-card">
      <h2>🔧 ジャンルを選んでください</h2>
      <div class="genre-selector" id="genreSelector">
        <button class="genre-btn selected" data-genre="0"><span class="genre-icon">🔧</span>配管工事<span class="genre-count" id="genreCount0"></span></button>
        <button class="genre-btn" data-genre="1"><span class="genre-icon">🧯</span>消防設備点検<span class="genre-count" id="genreCount1"></span></button>
        <button class="genre-btn" data-genre="2"><span class="genre-icon">💧</span>貯水槽清掃<span class="genre-count" id="genreCount2"></span></button>
        <button class="genre-btn" data-genre="3"><span class="genre-icon">🚿</span>排水管清掃<span class="genre-count" id="genreCount3"></span></button>

<script>
const GENRES=[{name:'配管工事',icon:'🔧',cls:'genre-0'},{name:'消防設備点検',icon:'🧯',cls:'genre-1'},{name:'貯水槽清掃',icon:'💧',cls:'genre-2'},{name:'排水管清掃',icon:'🚿',cls:'genre-3'},{name:'設備点検',icon:'📋',cls:'genre-4'},{name:'ビジネスマナー',icon:'🤝',cls:'genre-5'},{name:'内装工事',icon:'🏗️',cls:'genre-6'},{name:'管工事施工管理',icon:'🔧',cls:'genre-7'},{name:'土木施工管理',icon:'🚧',cls:'genre-8'},{name:'建築施工管理',icon:'🏢',cls:'genre-9'},{name:'給水装置',icon:'🚰',cls:'genre-10'},{name:'第2種電気工事士',icon:'⚡',cls:'genre-11'}];
const ALL_QUESTIONS=[{q:'給水管に最もよく使用される管の種類はどれか？',o:['水道用硬質塩化ビニルライニング鋼管','硬質塩化ビニル管（VU管）','排水用硬質塩化ビニル管','鋳鉄管'],a:0,genre:0,d:1,ex:'給水管には錆びにくく耐久性のある水道用硬質塩化ビニルライニング鋼管（SGP-VL）が広く用いられています。',oex:['正解。給水管には錆びにくく耐久性のある水道用硬質塩化ビニルライニング鋼管（S。','不正解。硬質塩化ビニル管（VU管）ではなく、水道用硬質塩化ビニルライニング鋼管が正しい答えです。','不正解。排水用硬質塩化ビニル管ではなく、水道用硬質塩化ビニルライニング鋼管が正しい答えです。','不正解。鋳鉄管ではなく、水道用硬質塩化ビニルライニング鋼管が正しい答えです。']},{q:'排水管の勾配として適切なものはどれか？（管径100mm）',o:['1/1000以上','1/100以上','1/500以上','1/10以上'],a:1,genre:0,d:1,ex:'管径100mmの場合、排水管の最小勾配は1/100とされています。管径が大きくなると最小勾配は緩くなります。',oex:['不正解。1/1000以上ではなく、1/100以上が正しい答えです。','正解。管径100mmの場合、排水管の最小勾配は1/100とされています','不正解。1/500以上ではなく、1/100以上が正しい答えです。','不正解。1/10以上ではなく、1/100以上が正しい答えです。']},{q:'給水方式のうち、高層建物で最もよく採用されるものはどれか？',o:['直結直圧式','直結増圧式','高置水槽式','ポンプ直送式'],a:3,genre:0,d:2,ex:'高層建物ではポンプ直送方式が広く採用されます。水を一旦受水槽に貯め、加圧給水ポンプで各階に直接給水します。',oex:['不正解。直結直圧式ではなく、ポンプ直送式が正しい答えです。','不正解。直結増圧式ではなく、ポンプ直送式が正しい答えです。','不正解。高置水槽式ではなく、ポンプ直送式が正しい答えです。','正解。高層建物ではポンプ直送方式が広く採用されます']},{q:'受水槽の有効容量の目安として正しいものはどれか？',o:['1日の使用水量の1/2','1日の使用水量の1/4','1日の使用水量の2倍','1日の使用水量の4倍'],a:0,genre:0,d:2,ex:'受水槽の有効容量は、一般的に1日の使用水量の約1/2を目安に設計します。',oex:['正解。受水槽の有効容量は、一般的に1日の使用水量の約1/2を目安に設計します','不正解。1日の使用水量の1/4ではなく、1日の使用水量の1/2が正しい答えです。','不正解。1日の使用水量の2倍ではなく、1日の使用水量の1/2が正しい答えです。','不正解。1日の使用水量の4倍ではなく、1日の使用水量の1/2が正しい答えです。'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/2/29/Water_storage_tank.jpg/330px-Water_storage_tank.jpg'},{q:'排水トラップの封水深として正しいものはどれか？',o:['10cm以上15cm以下','5cm以上10cm以下','3cm以上5cm未満','15cm以上20cm以下'],a:1,genre:0,d:1,ex:'排水トラップの封水深は5cm以上10cm以下が適切です。これにより下水臭気の逆流を防ぎます。',oex:['不正解。10cm以上15cm以下ではなく、5cm以上10cm以下が正しい答えです。','正解。排水トラップの封水深は5cm以上10cm以下が適切です','不正解。3cm以上5cm未満ではなく、5cm以上10cm以下が正しい答えです。','不正解。15cm以上20cm以下ではなく、5cm以上10cm以下が正しい答えです。']},{q:'水道水の残留塩素の基準値として正しいものはどれか？',o:['1.0mg/L以上','0.1mg/L以上','0.01mg/L以上','10mg/L以上'],a:1,genre:0,d:2,ex:'水道法により、給水栓末端での遊離残留塩素は0.1mg/L以上であることが義務付けられています。',oex:['不正解。1.0mg/L以上ではなく、0.1mg/L以上が正しい答えです。','正解。水道法により、給水栓末端での遊離残留塩素は0.1mg/L以上であること。','不正解。0.01mg/L以上ではなく、0.1mg/L以上が正しい答えです。','不正解。10mg/L以上ではなく、0.1mg/L以上が正しい答えです。']},{q:'通気管を設ける主な目的はどれか？',o:['給水圧力を維持するため','排水管内の臭気を排出するため','トラップ封水の保護と排水の流れを円滑にするため','排水管内の水温を下げるため'],a:2,genre:0,d:1,ex:'通気管はトラップ封水の破封を防ぎ、排水管内の空気圧力変動を緩和して排水をスムーズにする目的で設けます。',oex:['不正解。給水圧力を維持するためではなく、トラップ封水の保護と排水の流れを円滑にするためが正しい答えです。','不正解。排水管内の臭気を排出するためではなく、トラップ封水の保護と排水の流れを円滑にするためが正しい答えです。','正解。通気管はトラップ封水の破封を防ぎ、排水管内の空気圧力変動を緩和して排水。','不正解。排水管内の水温を下げるためではなく、トラップ封水の保護と排水の流れを円滑にするためが正しい答えです。']},{q:'硬質塩化ビニル管（VU管とVP管）の違いとして正しいものはどれか？',o:['VP管の方が肉厚が厚い','VU管の方が肉厚が厚い','両者の肉厚は同じ','VU管は給水専用である'],a:0,genre:0,d:2,ex:'VP管（一般用）はVU管（薄肉）より肉厚が厚く、高圧に耐えられます。VU管は主に排水管に使用されます。',oex:['正解。VP管（一般用）はVU管（薄肉）より肉厚が厚く、高圧に耐えられます','不正解。VU管の方が肉厚が厚いではなく、VP管の方が肉厚が厚いが正しい答えです。','不正解。両者の肉厚は同じではなく、VP管の方が肉厚が厚いが正しい答えです。','不正解。VU管は給水専用であるではなく、VP管の方が肉厚が厚いが正しい答えです。']},{q:'給湯温度の衛生的観点から適切な貯湯温度はどれか？',o:['70℃以上','50℃以上','40℃以上','60℃以上'],a:3,genre:0,d:2,ex:'レジオネラ属菌の繁殖防止のため、貯湯タンクは60℃以上に保持する必要があります。',oex:['不正解。70℃以上ではなく、60℃以上が正しい答えです。','不正解。50℃以上ではなく、60℃以上が正しい答えです。','不正解。40℃以上ではなく、60℃以上が正しい答えです。','正解。レジオネラ属菌の繁殖防止のため、貯湯タンクは60℃以上に保持する必要が。']},{q:'クロスコネクションとは何か？',o:['分岐配管の一種','2本の配管を並列に接続すること','給水管と排水管を誤って交差させること','飲料水系統と非飲料水系統が接続されること'],a:3,genre:0,d:2,ex:'クロスコネクションは飲料水系統と非飲料水系統（雑用水・工業用水等）が誤って接続された状態で、水質汚染の原因となります。',oex:['不正解。分岐配管の一種ではなく、飲料水系統と非飲料水系統が接続されることが正しい答えです。','不正解。2本の配管を並列に接続することではなく、飲料水系統と非飲料水系統が接続されることが正しい答えです。','不正解。給水管と排水管を誤って交差させることではなく、飲料水系統と非飲料水系統が接続されることが正しい答えです。','正解。クロスコネクションは飲料水系統と非飲料水系統（雑用水・工業用水等）が誤。']},{q:'ウォーターハンマー（水撃作用）が発生しやすい状況はどれか？',o:['管径が大きい場合','水温が高い場合','管内流速が遅い場合','弁を急激に閉鎖した場合'],a:3,genre:0,d:1,ex:'ウォーターハンマーは弁の急閉や急開時に管内の流速が急変することで発生します。防止にはスローリリース弁やウォーターハンマー防止器を使用します。',oex:['不正解。管径が大きい場合ではなく、弁を急激に閉鎖した場合が正しい答えです。','不正解。水温が高い場合ではなく、弁を急激に閉鎖した場合が正しい答えです。','不正解。管内流速が遅い場合ではなく、弁を急激に閉鎖した場合が正しい答えです。','正解。ウォーターハンマーは弁の急閉や急開時に管内の流速が急変することで発生し。'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e8/Water_hammer_pressure.jpg/330px-Water_hammer_pressure.jpg'},{q:'逆止弁（チェック弁）の主な用途はどれか？',o:['流体の逆流を防ぐ','流量を調節する','圧力を一定に保つ','流体の温度を調節する'],a:0,genre:0,d:1,ex:'逆止弁（チェ 置不要ではなく、配管と壁との隙間をモルタル等の不燃材料で埋め、防火措置を施すが正しい答えです。']},{q:'電気設備の「漏電遮断器（ELCB）」の設置義務に関する法律はどれか？',o:['建設業法','電気設備に関する技術基準を定める省令（電技省令）','水道法','労働安全衛生法'],a:1,genre:0,d:2,ex:'漏電遮断器の設置は電技省令（電気設備に関する技術基準）等で規定されています。工事現場では労安法でも求められます。',oex:['不正解。建設業法ではなく、電気設備に関する技術基準を定める省令（電技省令）が正しい答えです。','正解。漏電遮断器の設置は電技省令（電気設備に関する技術基準）等で規定されてい。','不正解。水道法ではなく、電気設備に関する技術基準を定める省令（電技省令）が正しい答えです。','不正解。労働安全衛生法ではなく、電気設備に関する技術基準を定める省令（電技省令）が正しい答えです。']},{q:'「公共工事の品質確保の促進に関する法律（品確法）」の主な目的はどれか？',o:['建設業者の倒産を防ぐ','価格だけでなく技術力等を含む総合的な入札・発注により公共工事の品質を確保する','工事価格の上昇を防ぐ','下請保護'],a:1,genre:0,d:2,ex:'品確法は発注者が技術提案・実績等を評価する総合評価方式を推進し、公共工事の品質確保を目指すものです。',oex:['不正解。建設業者の倒産を防ぐではなく、価格だけでなく技術力等を含む総合的な入札・発注により公共工事の品質を確保するが正しい答えです。','正解。品確法は発注者が技術提案・実績等を評価する総合評価方式を推進し、公共工。','不正解。工事価格の上昇を防ぐではなく、価格だけでなく技術力等を含む総合的な入札・発注により公共工事の品質を確保するが正しい答えです。','不正解。下請保護ではなく、価格だけでなく技術力等を含む総合的な入札・発注により公共工事の品質を確保するが正しい答えです。']},{q:'消防法に基づく「屋内消火栓設備」の設置が義務付けられる建物の規模の目安はどれか？',o:['延べ面積100m²以上','木造建物のみ','全ての建物','延べ面積700m²以上（用途による）'],a:3,genre:1,d:2,ex:'屋内消火栓の設置基準は用途・構造・延べ面積により異なりますが、一般的に700m²または延べ面積1400m²が目安となります（用途によって異なります）。',oex:['不正解。延べ面積100m²以上ではなく、延べ面積700m²以上（用途による）が正しい答えです。','不正解。木造建物のみではなく、延べ面積700m²以上（用途による）が正しい答えです。','不正解。全ての建物ではなく、延べ面積700m²以上（用途による）が正しい答えです。','正解。屋内消火栓の設置基準は用途・構造・延べ面積により異なりますが、一般的に。']},{q:'「建築士法」における「設計」と「工事監理」の定義として正しいものはどれか？',o:['設計は建築物の図面作成、工事監理はその設計と工事が合致しているか確認する業務','設計と工事監理は同じ業務','工事監理は施工を直接行う業務','設計は工事の安全管理のみを行う業務'],a:0,genre:0,d:2,ex:'設計は建築物の図面等作成業務、工事監理は設計図書と施工が一致しているか確認する業務で、両者は明確に区別されます。',oex:['正解。設計は建築物の図面等作成業務、工事監理は設計図書と施工が一致しているか。','不正解。設計と工事監理は同じ業務ではなく、設計は建築物の図面作成、工事監理はその設計と工事が合致しているか確認する業務が正しい答えです。','不正解。工事監理は施工を直接行う業務ではなく、設計は建築物の図面作成、工事監理はその設計と工事が合致しているか確認する業務が正しい答えです。','不正解。設計は工事の安全管理のみを行う業務ではなく、設計は建築物の図面作成、工事監理はその設計と工事が合致しているか確認する業務が正しい答えです。']},{q:'労働安全衛生法における「特別教育」が必要な業務として正しいものはどれか？',o:['フォークリフトの運転・研削砥石の取扱い・低圧電気取扱い等の危険業務','事務作業','一般的な清掃業務','全ての業務'],a:0,genre:0,d:2,ex:'特別教育は危険・有害業務に従事する前に受講が義務付けられた安全衛生教育です。フォークリフトや電気関係等が対象です。',oex:['正解。特別教育は危険・有害業務に従事する前に受講が義務付けられた安全衛生教育。','不正解。事務作業ではなく、フォークリフトの運転・研削砥石の で洗えば再利用できるではなく、老朽化したパッキンは硬化・変形し漏水しやすいため、必ず新品に交換するが正しい答えです。','不正解。メーカー指定品でなくてよいではなく、老朽化したパッキンは硬化・変形し漏水しやすいため、必ず新品に交換するが正しい答えです。']},{q:'塩ビ接着剤の「適正量」についての説明として正しいものはどれか？',o:['多く塗るほど接合強度が上がる','塗りすぎはソルベントクラックの原因になり、少なすぎは接合不良になる','片面だけに塗ればよい','乾いてから塗り直せばよい'],a:1,genre:0,d:2,ex:'塩ビ接着剤は溶剤系で塗りすぎるとソルベントクラックを引き起こし、少なすぎると接合不良になります。適正量を両面に手早く均一に塗布することが重要です。',oex:['不正解。多く塗るほど接合強度が上がるではなく、塗りすぎはソルベントクラックの原因になり、少なすぎは接合不良になるが正しい答えです。','正解。塩ビ接着剤は溶剤系で塗りすぎるとソルベントクラックを引き起こし、少なす。','不正解。片面だけに塗ればよいではなく、塗りすぎはソルベントクラックの原因になり、少なすぎは接合不良になるが正しい答えです。','不正解。乾いてから塗り直せばよいではなく、塗りすぎはソルベントクラックの原因になり、少なすぎは接合不良になるが正しい答えです。']},{q:'「インクリーザー（IN）」の継手の用途はどれか？',o:['管の端部を塞ぐ','管の口径を変更する（異径接続）','管を分岐する','管を曲げる'],a:1,genre:0,d:1,ex:'インクリーザー（IN、異径継手）は径の異なる管を接続するための継手です。S（ソケット型）・L（エルボ型）・T（チーズ型）があります。',oex:['不正解。管の端部を塞ぐではなく、管の口径を変更する（異径接続）が正しい答えです。','正解。インクリーザー（IN、異径継手）は径の異なる管を接続するための継手です','不正解。管を分岐するではなく、管の口径を変更する（異径接続）が正しい答えです。','不正解。管を曲げるではなく、管の口径を変更する（異径接続）が正しい答えです。']},{q:'「バルブソケット（VS）」の特徴はどれか？',o:['フランジ接合用の継手','片方がTS接合でもう片方がねじ接合になっている異種管接合継手','両端がねじ接合','両端がTS接合'],a:1,genre:0,d:2,ex:'バルブソケット（VS）は塩ビ管側をTS接合、異種管（金属管や機器）側をねじ接合で接続するための異種管接合継手です。',oex:['不正解。フランジ接合用の継手ではなく、片方がTS接合でもう片方がねじ接合になっている異種管接合継手が正しい答えです。','正解。バルブソケット（VS）は塩ビ管側をTS接合、異種管（金属管や機器）側を。','不正解。両端がねじ接合ではなく、片方がTS接合でもう片方がねじ接合になっている異種管接合継手が正しい答えです。','不正解。両端がTS接合ではなく、片方がTS接合でもう片方がねじ接合になっている異種管接合継手が正しい答えです。']},{q:'「メーターユニオン（シモク）」の用途はどれか？',o:['流量を計測する','塩ビ管を水道メーター器またはメーターユニットに直接接続するための継手','逆流を防ぐ','圧力を調整する'],a:1,genre:0,d:2,ex:'メーターユニオン（シモク）は塩ビ管をメーター器や計量ユニットに接続するための専用継手で、袋ナットとパッキンの使用が必須です。',oex:['不正解。流量を計測するではなく、塩ビ管を水道メーター器またはメーターユニットに直接接続するための継手が正しい答えです。','正解。メーターユニオン（シモク）は塩ビ管をメーター器や計量ユニットに接続する。','不正解。逆流を防ぐではなく、塩ビ管を水道メーター器またはメーターユニットに直接接続するための継手が正しい答えです。','不正解。圧力を調整するではなく、塩ビ管を水道メーター器またはメーターユニットに直接接続するための継手が正しい答えです。']},{q:'「床出しソケット（床出しS）」を使用する場面はどれか？',o:['床下配管の途中','排水管の終端処理','天井配管の固定','器具の水道管接続口を床や壁から出した場合に、床・壁に直接固定できる羽付きのソケット'],a:3,genre:0,d:2,ex:'床出しソケットは固定用の羽（フランジ）が付いており、給水管接続口を床や壁から出す際に直接固定できます。洗面台・便器周りでよく使用されます。',oex:['不正解。床下配管の途中ではなく、器具の水道管接続口を床や壁から出した場合に、床 れ確認→止水栓が開いていることを確認→穿孔→穿孔完了を感触で確認の順で行うが正しい答えです。']},{q:'配管の「勾配確認」を埋設中も怠らない理由はどれか？',o:['勾配は施工後に確認すればよい','勾配はポンプで補える','勾配は見た目だけの問題','管が見えている間に修正できるが、埋めてしまうと後から修正が大変だから'],a:3,genre:0,d:2,ex:'排水管は適切な勾配が排水性能の生命線です。埋設中は管が見えているうちに随時勾配確認し、不適切なら即修正します。埋め戻し後の修正は大変な手間となります。',oex:['不正解。勾配は施工後に確認すればよいではなく、管が見えている間に修正できるが、埋めてしまうと後から修正が大変だからが正しい答えです。','不正解。勾配はポンプで補えるではなく、管が見えている間に修正できるが、埋めてしまうと後から修正が大変だからが正しい答えです。','不正解。勾配は見た目だけの問題ではなく、管が見えている間に修正できるが、埋めてしまうと後から修正が大変だからが正しい答えです。','正解。排水管は適切な勾配が排水性能の生命線です']},{q:'「道路下の配管工事（引込工事等）は1人で行わない」理由として最も適切なものはどれか？',o:['法律で禁止されているから','費用が安くなるから','使用する機械の操作に資格が必要なため','作業量が多く安全管理上、最低でも2〜3名が必要なため'],a:3,genre:0,d:1,ex:'道路下工事は交通誘導・安全管理・掘削・配管と多岐にわたる作業が同時進行します。1人では安全管理と施工を同時にこなすことができないため、複数名での作業が必須です。',oex:['不正解。法律で禁止されているからではなく、作業量が多く安全管理上、最低でも2〜3名が必要なためが正しい答えです。','不正解。費用が安くなるからではなく、作業量が多く安全管理上、最低でも2〜3名が必要なためが正しい答えです。','不正解。使用する機械の操作に資格が必要なためではなく、作業量が多く安全管理上、最低でも2〜3名が必要なためが正しい答えです。','正解。道路下工事は交通誘導・安全管理・掘削・配管と多岐にわたる作業が同時進行。']},{q:'「埋設配管の深度と不動構造物からの距離を記録・写真撮影する」理由はどれか？',o:['次回の周辺工事の際に配管の位置が把握でき、施工事故を防ぐため','写真を記念に残すため','費用請求のための証拠','管理会社への報告義務'],a:0,genre:0,d:2,ex:'埋設配管の位置記録は、将来の他工事で誤って配管を破損する「施工事故」を防ぐために非常に重要です。深度と不動構造物（建物基礎等）からの距離を記録します。',oex:['正解。埋設配管の位置記録は、将来の他工事で誤って配管を破損する「施工事故」を。','不正解。写真を記念に残すためではなく、次回の周辺工事の際に配管の位置が把握でき、施工事故を防ぐためが正しい答えです。','不正解。費用請求のための証拠ではなく、次回の周辺工事の際に配管の位置が把握でき、施工事故を防ぐためが正しい答えです。','不正解。管理会社への報告義務ではなく、次回の周辺工事の際に配管の位置が把握でき、施工事故を防ぐためが正しい答えです。']},{q:'消火器の法定点検周期として正しいものはどれか？',o:['6ヶ月に1回（機器点検）','3ヶ月に1回','1年に1回','2年に1回'],a:0,genre:1,d:1,ex:'消防用設備等の機器点検は6ヶ月に1回、総合点検は1年に1回行うことが消防法施行規則で定められています。',oex:['正解。機器点検は6ヶ月に1回が法定周期です','不正解。3ヶ月周期の法定点検はありません','不正解。1年に1回は総合点検の周期です','不正解。2年に1回という点検周期はありません'],img:'https://upload.wikimedia.org/wikipedia/commons/thumb/e/e0/Fire-Extinguisher.JPG/330px-Fire-Extinguisher.JPG'},{q:'粉末消火器に使用される最も一般的な消火薬剤はどれか？',o:['リン酸アンモニウム（ABC粉末）','塩化ナトリウム','炭酸水素ナトリウム（BC粉末）','炭酸カリウム'],a:0,genre:1,d:1,ex:'ABC粉末消火器はリン酸アンモニウムを主成分とし、普通火災(A)・油火災(B)・電気火災(C)の全てに対応できます。',oex:['正解。ABC粉末は最も一般的で全火災種別に対応します','不正解。塩化ナトリウムは金属火災用の特殊消火剤です','
